# lancache-ng (https://github.com/wiki-mod/lancache-ng)
# Compose file for a remote secondary DNS node: runs a PowerDNS instance that
# syncs zone data from the primary over NATS, so DNS-based caching can be
# served from a second location.
# Secondary DNS node — run on a remote host.
# Generated by setup.sh secondary — do not edit manually.
# To update credentials, rerun setup.sh secondary --rotate ...

services:
  dns-secondary:
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/dns:${LANCACHE_IMAGE_TAG:-latest}
    environment:
      - PROXY_IP=${PROXY_IP}
      - PDNS_API_KEY=${PDNS_API_KEY}
      - NATS_URL=${NATS_URL}
      - NATS_USER=${NATS_USER}
      - NATS_PASSWORD=${NATS_PASSWORD}
      - NATS_CONSUMER=${NATS_CONSUMER}
      - DDNS_ALLOW_FROM=127.0.0.1
    volumes:
      - pdns-data:/var/lib/powerdns
    ports:
      - "${LISTEN_IP:-0.0.0.0}:53:53/udp"
      - "${LISTEN_IP:-0.0.0.0}:53:53/tcp"
    healthcheck:
      test: ["CMD", "rec_control", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  pdns-data:
