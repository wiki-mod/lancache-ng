# lancache-ng — https://github.com/wiki-mod/lancache-ng
# Production Compose stack wired to prebuilt lancache-ng service images.

name: lancache-ng

services:

  # ── Unified proxy (standard + SSL mode in one container) ─────────────────
  # Port 80: HTTP caching (shared cache for both modes)
  # Port 8443 (standard): SNI passthrough to real CDN (no client cert needed)
  # Port 443 (SSL): HTTPS caching via TLS interception (CA cert required)
  proxy:
    container_name: lancache-proxy
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/proxy:${LANCACHE_IMAGE_TAG:-latest}
    env_file:
      - ../../config/prod/proxy.env
    environment:
      - IP_STANDARD=${IP_STANDARD}
      - IP_SSL=${IP_SSL}
      - SSL_ENABLED=${SSL_ENABLED:-1}
    volumes:
      - ../../certs:/etc/nginx/ssl/ca
      - ../../services/proxy/cdn-ssl-domains.txt:/etc/nginx/cdn-ssl-domains.txt
      - proxy-cache:/var/cache/nginx/lancache
      - proxy-logs:/var/log/nginx
    ports:
      - "${IP_STANDARD}:80:80"
      - "${IP_STANDARD}:443:8443"
      - "${IP_SSL}:80:80"
      - "${IP_SSL}:443:443"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1/healthz >/dev/null && { [ \"$${SSL_ENABLED:-0}\" != \"1\" ] || curl -ksf https://127.0.0.1/healthz >/dev/null; }"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dns-standard:
    container_name: lancache-dns-standard
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/dns:${LANCACHE_IMAGE_TAG:-latest}
    env_file:
      - ../../config/prod/dns-standard.env
    environment:
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
      - PDNS_API_KEY=${PDNS_API_KEY}
      - NATS_URL=nats://nats:4222
      - NATS_USER=${NATS_DNS_WRITER_USER:?NATS_DNS_WRITER_USER is required}
      - NATS_PASSWORD=${NATS_DNS_WRITER_PASSWORD:?NATS_DNS_WRITER_PASSWORD is required}
      - NATS_CONSUMER=dns-standard
      - NATS_RECONCILER=1
    volumes:
      - ../../services/dns/cdn-domains.txt:/etc/pdns/cdn-domains.txt
      - /srv/lancache/pdns-standard:/var/lib/powerdns
    ports:
      - "${IP_STANDARD}:53:53/udp"
      - "${IP_STANDARD}:53:53/tcp"
    expose:
      - "8081"
      - "8082"
    healthcheck:
      test: ["CMD-SHELL", "rec_control ping && ss -lnu | grep -q ':53 '"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - nats
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  dns-ssl:
    container_name: lancache-dns-ssl
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/dns:${LANCACHE_IMAGE_TAG:-latest}
    env_file:
      - ../../config/prod/dns-ssl.env
    environment:
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
      - PDNS_API_KEY=${PDNS_API_KEY}
      - NATS_URL=nats://nats:4222
      - NATS_USER=${NATS_DNS_READER_USER:?NATS_DNS_READER_USER is required}
      - NATS_PASSWORD=${NATS_DNS_READER_PASSWORD:?NATS_DNS_READER_PASSWORD is required}
      - NATS_CONSUMER=dns-ssl
    volumes:
      - ../../services/dns/cdn-domains.txt:/etc/pdns/cdn-domains.txt
      - /srv/lancache/pdns-ssl:/var/lib/powerdns
    ports:
      - "${IP_SSL}:53:53/udp"
      - "${IP_SSL}:53:53/tcp"
    expose:
      - "8081"
      - "8082"
    healthcheck:
      test: ["CMD-SHELL", "rec_control ping && ss -lnu | grep -q ':53 '"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - nats
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Watchdog (health monitor, auto-restart, purge cron) ──────────────────
  # socket-proxy limits Docker access to Admin UI/watchdog operations:
  # container inspect/list, restart, and exec; no image/volume/system access.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: "1"
      POST: "1"
      EXEC: "1"
    networks:
      - docker-api
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  watchdog:
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/watchdog:${LANCACHE_IMAGE_TAG:-latest}
    env_file:
      - ../../config/prod/watchdog.env
    volumes:
      - proxy-cache:/cache/standard
      - watchdog-status:/var/run/watchdog
    depends_on:
      - docker-socket-proxy
    networks:
      - default
      - docker-api
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── DHCP Server (Kea) ─────────────────────────────────────────────────────
  # Full DHCP server with REST API control
  # network_mode: host allows DHCP broadcast (port 67/udp)
  dhcp:
    container_name: lancache-dhcp
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/dhcp:${LANCACHE_IMAGE_TAG:-latest}
    profiles:
      - dhcp-kea
    env_file:
      - ../../config/prod/dhcp.env
    environment:
      - DHCP_DNS_PRIMARY=${IP_STANDARD}
      - DHCP_DNS_SECONDARY=${IP_SSL}
      - DHCP_DNS_SERVER_IP=${IP_STANDARD}
      - DHCP_DNS_SERVER_IP_SSL=${IP_SSL}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
      - KEA_CTRL_TOKEN=${KEA_CTRL_TOKEN}
      - DHCP_MODE=${DHCP_MODE:-disabled}
    volumes:
      - /srv/lancache/kea:/var/lib/kea    # runtime config + leases; create with: mkdir -p /srv/lancache/kea
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
      - NET_ADMIN       # needed for iptables rules restricting port 8000 to Docker-internal
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          host="$${KEA_CTRL_HOST:-127.0.0.1}";
          [ "$$host" = "0.0.0.0" ] && host=127.0.0.1;
          curl -sf -u admin:$${KEA_CTRL_TOKEN}
          -H 'Content-Type: application/json'
          -d '{"command":"config-get","service":["dhcp4"]}'
          "http://$$host:8000/" | jq -e '.[0].result == 0' >/dev/null
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── DHCP Proxy (dnsmasq) ──────────────────────────────────────────────────
  # Proxy mode: sits next to existing DHCP server, overrides DNS options only.
  # Mutually exclusive with Kea mode (both want port 67/udp).
  # Activate with: docker compose --profile dhcp-proxy up -d
  dhcp-proxy:
    container_name: lancache-dhcp-proxy
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/dhcp-proxy:${LANCACHE_IMAGE_TAG:-latest}
    env_file:
      - ../../config/prod/dhcp-proxy.env
    environment:
      - DHCP_MODE=${DHCP_MODE:-disabled}
      - DHCP_SUBNET_START=${DHCP_SUBNET_START:-}
      - DHCP_DNS_PRIMARY=${DHCP_DNS_PRIMARY:-${IP_STANDARD}}
      - DHCP_DNS_SECONDARY=${DHCP_DNS_SECONDARY:-${IP_SSL:-${IP_STANDARD}}}
      - UPSTREAM_DHCP_IP=${UPSTREAM_DHCP_IP:-${DHCP_GATEWAY:-}}
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    profiles:
      - dhcp-proxy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── NATS (message bus for DNS record sync) ────────────────────────────────
  nats:
    image: nats:2-alpine@sha256:c11af972c99ae542de8925e6a7d9c533aa1eb039660420d2074beed6089b3bf0
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /etc/nats
        escape_sed() {
          printf '%s' "$$1" | sed 's/[\/&|]/\\&/g'
        }
        # Keep the shared config writable by the Admin UI user (UID/GID 10001) after NATS restarts.
        tmp_nats_conf="$(mktemp /etc/nats/.nats.conf.XXXXXX)"
        trap 'rm -f "$$tmp_nats_conf"' EXIT
        cat > /tmp/nats.conf.template <<'EOF'
        jetstream {
          store_dir: /data
        }
        authorization {
          users = [
            {
              user: "__NATS_UI_USER__"
              password: "__NATS_UI_PASSWORD__"
              permissions = {
                publish = ["lancache.dns.record", "lancache.dns.flush"]
              }
            }
            {
              user: "__NATS_DNS_WRITER_USER__"
              password: "__NATS_DNS_WRITER_PASSWORD__"
              permissions = {
                publish = [
                  "lancache.dns.record",
                  "$$JS.API.STREAM.INFO.LANCACHE_DNS",
                  "$$JS.API.STREAM.CREATE.LANCACHE_DNS",
                  "$$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
                  "$$JS.ACK.LANCACHE_DNS.>"
                ]
                subscribe = ["lancache.dns.>", "_INBOX.>"]
              }
            }
            {
              user: "__NATS_DNS_READER_USER__"
              password: "__NATS_DNS_READER_PASSWORD__"
              permissions = {
                publish = [
                  "$$JS.API.STREAM.INFO.LANCACHE_DNS",
                  "$$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
                  "$$JS.ACK.LANCACHE_DNS.>"
                ]
                subscribe = ["lancache.dns.>", "_INBOX.>"]
              }
            }
          ]
        }
        EOF
        sed \
          -e "s|__NATS_UI_USER__|$$(escape_sed "$$NATS_UI_USER")|g" \
          -e "s|__NATS_UI_PASSWORD__|$$(escape_sed "$$NATS_UI_PASSWORD")|g" \
          -e "s|__NATS_DNS_WRITER_USER__|$$(escape_sed "$$NATS_DNS_WRITER_USER")|g" \
          -e "s|__NATS_DNS_WRITER_PASSWORD__|$$(escape_sed "$$NATS_DNS_WRITER_PASSWORD")|g" \
          -e "s|__NATS_DNS_READER_USER__|$$(escape_sed "$$NATS_DNS_READER_USER")|g" \
          -e "s|__NATS_DNS_READER_PASSWORD__|$$(escape_sed "$$NATS_DNS_READER_PASSWORD")|g" \
          /tmp/nats.conf.template > "$$tmp_nats_conf"
        chown 10001:10001 "$$tmp_nats_conf"
        mv "$$tmp_nats_conf" /etc/nats/nats.conf
        trap - EXIT
        exec nats-server -c /etc/nats/nats.conf
    volumes:
      - /srv/lancache/nats:/data
      - /srv/lancache/nats-conf:/etc/nats
    environment:
      - NATS_UI_USER=${NATS_UI_USER:?NATS_UI_USER is required}
      - NATS_UI_PASSWORD=${NATS_UI_PASSWORD:?NATS_UI_PASSWORD is required}
      - NATS_DNS_WRITER_USER=${NATS_DNS_WRITER_USER:?NATS_DNS_WRITER_USER is required}
      - NATS_DNS_WRITER_PASSWORD=${NATS_DNS_WRITER_PASSWORD:?NATS_DNS_WRITER_PASSWORD is required}
      - NATS_DNS_READER_USER=${NATS_DNS_READER_USER:?NATS_DNS_READER_USER is required}
      - NATS_DNS_READER_PASSWORD=${NATS_DNS_READER_PASSWORD:?NATS_DNS_READER_PASSWORD is required}
    expose:
      - "4222"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Admin UI ──────────────────────────────────────────────────────────────
  ui:
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/ui:${LANCACHE_IMAGE_TAG:-latest}
    volumes:
      - ../../services/dns/cdn-domains.txt:/data/cdn-domains.txt
      - ../../services/proxy/cdn-ssl-domains.txt:/data/cdn-ssl-domains.txt
      - proxy-logs:/var/log/nginx:ro
      - proxy-cache:/var/cache/proxy:ro
      - /srv/lancache/nats-conf:/etc/nats   # shared with NATS: UI writes nats.conf here
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - DOCKER_PROXY_URL=http://docker-socket-proxy:2375
      - DNS_STANDARD_SERVICE=dns-standard
      - DNS_SSL_SERVICE=dns-ssl
      - PROXY_SERVICE=proxy
      - SSL_ENABLED=${SSL_ENABLED:-1}
      - PROXY_STANDARD_URL=http://proxy
      - PROXY_SSL_URL=http://proxy
      - PROXY_SSL_SERVICE=proxy
      - STANDARD_LOG=/var/log/nginx/access.log
      - SSL_LOG=/var/log/nginx/access.log
      - STANDARD_CACHE_DIR=/var/cache/proxy
      - SSL_CACHE_DIR=/var/cache/proxy
      - NETDATA_URL=http://netdata:19999
      - CACHE_MAX_GB=50
      - STANDARD_IP=${IP_STANDARD}
      - SSL_IP=${IP_SSL}
      - LANCACHE_IMAGE_REGISTRY=${LANCACHE_IMAGE_REGISTRY:-ghcr.io}
      - LANCACHE_IMAGE_PREFIX=${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}
      - LANCACHE_IMAGE_CHANNEL=${LANCACHE_IMAGE_CHANNEL:-}
      - LANCACHE_IMAGE_TAG=${LANCACHE_IMAGE_TAG:-latest}
      - UI_AUTH_USER=${UI_AUTH_USER:-}
      - UI_AUTH_PASSWORD=${UI_AUTH_PASSWORD:-}
      - ALLOW_INSECURE_UI=${ALLOW_INSECURE_UI:-false}
      - DHCP_MODE=${DHCP_MODE:-disabled}
      - DHCP_API_URL=http://host.docker.internal:8000
      - DHCP_API_TOKEN=${KEA_CTRL_TOKEN}
      - PDNS_AUTH_URL=http://dns-standard:8081
      - PDNS_REC_URL=http://dns-standard:8082
      - PDNS_API_KEY=${PDNS_API_KEY}
      - NATS_URL=nats://nats:4222
      - NATS_UI_USER=${NATS_UI_USER:?NATS_UI_USER is required}
      - NATS_UI_PASSWORD=${NATS_UI_PASSWORD:?NATS_UI_PASSWORD is required}
      - NATS_DNS_WRITER_USER=${NATS_DNS_WRITER_USER:?NATS_DNS_WRITER_USER is required}
      - NATS_DNS_WRITER_PASSWORD=${NATS_DNS_WRITER_PASSWORD:?NATS_DNS_WRITER_PASSWORD is required}
      - NATS_DNS_READER_USER=${NATS_DNS_READER_USER:?NATS_DNS_READER_USER is required}
      - NATS_DNS_READER_PASSWORD=${NATS_DNS_READER_PASSWORD:?NATS_DNS_READER_PASSWORD is required}
      - SECONDARY_REGISTRATION_TOKEN=${SECONDARY_REGISTRATION_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - docker-api
    depends_on:
      - docker-socket-proxy
      - proxy
      - netdata
      - nats
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Netdata (system metrics backend, kein externer Port) ──────────────────
  netdata:
    image: netdata/netdata@sha256:a130dbbf3d6e6a5472efdebaa123797190a5822627e908106d34edae02bc8a74
    hostname: lancache-netdata
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  docker-api:
    internal: true

volumes:
  proxy-cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/lancache/cache
  proxy-logs:
  watchdog-status:
  netdataconfig:
  netdatalib:
  netdatacache:
