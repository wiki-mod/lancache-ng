# lancache-ng (https://github.com/wiki-mod/lancache-ng)
#
# Production stack: proxy, DNS, DHCP, Admin UI, and supporting services
# (NATS, docker-socket-proxy) wired up with production-sized defaults
# (large host-mounted cache volume, standard DNS ports, query logging off).
# See CLAUDE.md's "Dev vs Prod Split" for the differences from deploy/dev.

name: lancache-ng

x-docker-socket-proxy-command: &docker-socket-proxy-command |
  cat > /tmp/lancache-haproxy.cfg <<'EOF'
  # Docker exec and generic container creation are intentionally banned here:
  # the Admin UI and watchdog only need narrowly scoped lifecycle operations for
  # known lancache-ng containers. A compromised UI should not gain a general
  # Docker API that can create privileged containers or attach to unrelated
  # workloads on the host.
  global
      log stdout format raw daemon info
      pidfile /run/haproxy.pid
      maxconn 4000

  defaults
      mode http
      log global
      option httplog
      option dontlognull
      option http-server-close
      timeout http-request 10s
      timeout connect 10s
      timeout client 10m
      timeout server 10m

  backend dockerbackend
      server dockersocket /var/run/docker.sock

  frontend dockerfrontend
      bind [::]:2375 v4v6
      # Permit only Docker daemon health/version checks plus a small set of
      # container operations for fixed lancache-ng container names.
      acl safe_get method GET
      acl safe_head method HEAD
      acl safe_post method POST
      acl safe_ping path,url_dec -m reg -i ^(/v[0-9.]+)?/_ping$
      acl safe_version path,url_dec -m reg -i ^(/v[0-9.]+)?/version$
      acl docker_container_path path,url_dec -m reg -i ^(/v[0-9.]+)?/containers/
      acl lancache_container path,url_dec -m reg -i ^(/v[0-9.]+)?/containers/(lancache-proxy|lancache-dns-standard|lancache-dns-ssl|lancache-dhcp|lancache-dhcp-proxy|lancache-dhcp-probe|lancache-nats)(/|$)
      acl safe_container_inspect path,url_dec -m reg -i ^(/v[0-9.]+)?/containers/(lancache-proxy|lancache-dns-standard|lancache-dns-ssl|lancache-dhcp|lancache-dhcp-proxy|lancache-dhcp-probe|lancache-nats)/json$
      acl safe_container_logs path,url_dec -m reg -i ^(/v[0-9.]+)?/containers/lancache-dhcp-probe/logs$
      acl safe_service_restart path,url_dec -m reg -i ^(/v[0-9.]+)?/containers/(lancache-proxy|lancache-dns-standard|lancache-dns-ssl|lancache-nats)/restart$
      acl safe_dhcp_action path,url_dec -m reg -i ^(/v[0-9.]+)?/containers/(lancache-dhcp|lancache-dhcp-proxy)/(start|stop)$
      acl safe_probe_action path,url_dec -m reg -i ^(/v[0-9.]+)?/containers/lancache-dhcp-probe/(start|stop|wait)$
      http-request allow if safe_get safe_ping
      http-request allow if safe_head safe_ping
      http-request allow if safe_get safe_version
      http-request allow if safe_get safe_container_inspect
      http-request allow if safe_get safe_container_logs
      http-request allow if safe_post safe_service_restart
      http-request allow if safe_post safe_dhcp_action
      http-request allow if safe_post safe_probe_action
      http-request deny if docker_container_path !lancache_container
      http-request deny
      default_backend dockerbackend
  EOF
  exec haproxy -f /tmp/lancache-haproxy.cfg

services:

  # ── Unified proxy (standard + SSL mode in one container) ─────────────────
  # Port 80: HTTP caching (shared cache for both modes)
  # Port 8443 (standard): SNI passthrough to real CDN (no client cert needed)
  # Port 443 (SSL): HTTPS caching via TLS interception (CA cert required)
  proxy:
    container_name: lancache-proxy
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/proxy:${LANCACHE_IMAGE_TAG:-latest}
    env_file:
      - ../../config/prod/proxy.env
    environment:
      - IP_STANDARD=${IP_STANDARD}
      - IP_SSL=${IP_SSL}
      - SSL_ENABLED=${SSL_ENABLED:-1}
    volumes:
      - ../../certs:/etc/nginx/ssl/ca
      - ../../services/dns/cdn-domains.txt:/etc/nginx/cdn-domains.txt
      # Named volume resolves to the single host CACHE_DIR device below.
      # Both standard and SSL proxy paths write into this same cache tree.
      - proxy-cache:/var/cache/nginx/lancache
      - proxy-logs:/var/log/nginx
      # Known-good nginx config snapshots (#415): must be a persistent,
      # service-owned volume, not the ephemeral container layer, so
      # rollback survives container restarts/recreates.
      - proxy-config-snapshots:/var/lib/lancache-proxy
    ports:
      - "${IP_STANDARD}:80:80"
      - "${IP_STANDARD}:443:8443"
      - "${IP_SSL}:80:80"
      - "${IP_SSL}:443:443"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1/healthz >/dev/null && { [ \"$${SSL_ENABLED:-0}\" != \"1\" ] || curl -ksf https://127.0.0.1/healthz >/dev/null; }"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dns-standard:
    container_name: lancache-dns-standard
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/dns:${LANCACHE_IMAGE_TAG:-latest}
    env_file:
      - ../../config/prod/dns-standard.env
    environment:
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
      - PDNS_API_KEY=${PDNS_API_KEY}
      - NATS_URL=nats://nats:4222
      - NATS_USER=${NATS_DNS_WRITER_USER:?NATS_DNS_WRITER_USER is required}
      - NATS_PASSWORD=${NATS_DNS_WRITER_PASSWORD:?NATS_DNS_WRITER_PASSWORD is required}
      - NATS_CONSUMER=dns-standard
      - NATS_RECONCILER=1
    volumes:
      - ../../services/dns/cdn-domains.txt:/etc/pdns/cdn-domains.txt
      # Normal production keeps these overrides unset so one LANCACHE_STATE_DIR
      # move retargets DNS and NATS together. setup.sh writes explicit keys only
      # when it has to preserve a real legacy/custom path during update.
      - ${PDNS_STANDARD_DIR:-${LANCACHE_STATE_DIR:-/opt/lancache-ng}/pdns-standard}:/var/lib/powerdns
      - ${PDNS_FILTER_STATE_DIR:-${LANCACHE_STATE_DIR:-/opt/lancache-ng}/pdns-filter-state}:/var/lib/powerdns-state
    ports:
      - "${IP_STANDARD}:53:53/udp"
      - "${IP_STANDARD}:53:53/tcp"
    expose:
      - "8081"
      - "8082"
    healthcheck:
      test: ["CMD-SHELL", "rec_control ping && ss -lnu | grep -q ':53 '"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - nats
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  dns-ssl:
    container_name: lancache-dns-ssl
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/dns:${LANCACHE_IMAGE_TAG:-latest}
    env_file:
      - ../../config/prod/dns-ssl.env
    environment:
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
      - PDNS_API_KEY=${PDNS_API_KEY}
      - NATS_URL=nats://nats:4222
      - NATS_USER=${NATS_DNS_READER_USER:?NATS_DNS_READER_USER is required}
      - NATS_PASSWORD=${NATS_DNS_READER_PASSWORD:?NATS_DNS_READER_PASSWORD is required}
      - NATS_CONSUMER=dns-ssl
    volumes:
      - ../../services/dns/cdn-domains.txt:/etc/pdns/cdn-domains.txt
      - ${PDNS_SSL_DIR:-${LANCACHE_STATE_DIR:-/opt/lancache-ng}/pdns-ssl}:/var/lib/powerdns
      - ${PDNS_FILTER_STATE_DIR:-${LANCACHE_STATE_DIR:-/opt/lancache-ng}/pdns-filter-state}:/var/lib/powerdns-state
    ports:
      - "${IP_SSL}:53:53/udp"
      - "${IP_SSL}:53:53/tcp"
    expose:
      - "8081"
      - "8082"
    healthcheck:
      test: ["CMD-SHELL", "rec_control ping && ss -lnu | grep -q ':53 '"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - nats
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Watchdog (health monitor, auto-restart, purge cron) ──────────────────
  # socket-proxy limits Docker access to Admin UI/watchdog operations. The
  # custom HAProxy config above replaces Tecnativa's broad CONTAINERS/POST
  # toggles with a deny-by-default allowlist for named lancache-ng containers.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    entrypoint: ["/usr/local/bin/lancache-docker-socket-proxy.sh"]
    command: []
    stdin_open: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../../scripts/docker-socket-proxy.sh:/usr/local/bin/lancache-docker-socket-proxy.sh:ro
    networks:
      - docker-api
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  watchdog:
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/watchdog:${LANCACHE_IMAGE_TAG:-latest}
    env_file:
      - ../../config/prod/watchdog.env
    volumes:
      # Watchdog sees the same cache tree as nginx so disk alerts and purge
      # decisions match the real proxy cache, not a stale split-cache path.
      - proxy-cache:/var/cache/lancache
      - watchdog-status:/var/run/watchdog
    depends_on:
      - docker-socket-proxy
    networks:
      - default
      - docker-api
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── DHCP Server (Kea) ─────────────────────────────────────────────────────
  # Full DHCP server with REST API control
  # network_mode: host allows DHCP broadcast (port 67/udp)
  dhcp:
    container_name: lancache-dhcp
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/dhcp:${LANCACHE_IMAGE_TAG:-latest}
    profiles:
      - dhcp-kea
    env_file:
      - ../../config/prod/dhcp.env
    environment:
      - DHCP_DNS_PRIMARY=${IP_STANDARD}
      - DHCP_DNS_SECONDARY=${IP_SSL}
      - DHCP_DNS_SERVER_IP=${IP_STANDARD}
      - DHCP_DNS_SERVER_IP_SSL=${IP_SSL}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
      - KEA_CTRL_TOKEN=${KEA_CTRL_TOKEN}
      - DHCP_MODE=${DHCP_MODE:-disabled}
    volumes:
      # Kea follows the same state-root contract as PowerDNS/NATS; leave
      # KEA_DATA_DIR unset unless this service truly lives off the shared root.
      - ${KEA_DATA_DIR:-${LANCACHE_STATE_DIR:-/opt/lancache-ng}/kea}:/var/lib/kea
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
      - NET_ADMIN       # needed for iptables rules restricting port 8000 to Docker-internal
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          host="$${KEA_CTRL_HOST:-127.0.0.1}";
          [ "$$host" = "0.0.0.0" ] && host=127.0.0.1;
          curl -sf -u admin:$${KEA_CTRL_TOKEN}
          -H 'Content-Type: application/json'
          -d '{"command":"config-get","service":["dhcp4"]}'
          "http://$$host:8000/" | jq -e '.[0].result == 0' >/dev/null
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── DHCP Proxy (dnsmasq) ──────────────────────────────────────────────────
  # Proxy mode: sits next to an existing DHCP server and serves proxy-DHCP/PXE clients.
  # Mutually exclusive with Kea mode (both want port 67/udp).
  # Activate with: docker compose --env-file .env.local --profile dhcp-proxy up -d
  dhcp-proxy:
    container_name: lancache-dhcp-proxy
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/dhcp-proxy:${LANCACHE_IMAGE_TAG:-latest}
    env_file:
      - ../../config/prod/dhcp-proxy.env
    volumes:
      - ui-data:/data:ro
      # Known-good dnsmasq config snapshots (#415): persistent, service-owned
      # volume so rollback survives container restarts/recreates.
      - dhcp-proxy-config-snapshots:/var/lib/lancache-dhcp-proxy
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    profiles:
      - dhcp-proxy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── DHCP conflict probe ────────────────────────────────────────────────────
  # Predeclared start/stop/wait helper for the Admin UI's "check for other
  # DHCP servers" feature. Reuses the UI image (already has nmap and dhclient
  # installed). The Admin UI stops then starts this container on demand and
  # reads its output — it never creates or removes it — so the narrowed
  # docker-socket-proxy only needs to permit start/restart, the same capability
  # class already used for the NATS and proxy-ssl reload flows, not generic
  # container creation.
  dhcp-probe:
    container_name: lancache-dhcp-probe
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/ui:${LANCACHE_IMAGE_TAG:-latest}
    entrypoint: ["/usr/local/bin/dhcp-probe.sh"]
    network_mode: host
    restart: "no"

  # ── NATS (message bus for DNS record sync) ────────────────────────────────
  nats:
    container_name: lancache-nats
    image: nats:2-alpine@sha256:c11af972c99ae542de8925e6a7d9c533aa1eb039660420d2074beed6089b3bf0
    # On every start: generate nats.conf from this container's own credentials
    # into the shared volume, chown it back to the Admin UI user, then exec
    # nats-server. In the v0.1.0 shared-token model the UI writes the same
    # shared config and restarts this service to reload it; regenerating here
    # keeps full recreates with rotated .env credentials convergent.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /etc/nats
        escape_sed() {
          printf '%s' "$$1" | sed 's/[\/&|]/\\&/g'
        }
        # Keep the shared config writable by the Admin UI user (UID/GID 10001) after NATS restarts.
        tmp_nats_conf="$(mktemp /etc/nats/.nats.conf.XXXXXX)"
        trap 'rm -f "$$tmp_nats_conf"' EXIT
        cat > /tmp/nats.conf.template <<'EOF'
        jetstream {
          store_dir: /data
        }
        authorization {
          users = [
            {
              user: "__NATS_UI_USER__"
              password: "__NATS_UI_PASSWORD__"
              permissions = {
                publish = ["lancache.dns.record", "lancache.dns.flush"]
              }
            }
            {
              user: "__NATS_DNS_WRITER_USER__"
              password: "__NATS_DNS_WRITER_PASSWORD__"
              permissions = {
                publish = [
                  "lancache.dns.record",
                  "$$JS.API.STREAM.INFO.LANCACHE_DNS",
                  "$$JS.API.STREAM.CREATE.LANCACHE_DNS",
                  "$$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
                  "$$JS.ACK.LANCACHE_DNS.>"
                ]
                subscribe = ["lancache.dns.>", "_INBOX.>"]
              }
            }
            {
              user: "__NATS_DNS_READER_USER__"
              password: "__NATS_DNS_READER_PASSWORD__"
              permissions = {
                publish = [
                  "$$JS.API.STREAM.INFO.LANCACHE_DNS",
                  "$$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
                  "$$JS.ACK.LANCACHE_DNS.>"
                ]
                subscribe = ["lancache.dns.>", "_INBOX.>"]
              }
            }
          ]
        }
        EOF
        sed \
          -e "s|__NATS_UI_USER__|$$(escape_sed "$$NATS_UI_USER")|g" \
          -e "s|__NATS_UI_PASSWORD__|$$(escape_sed "$$NATS_UI_PASSWORD")|g" \
          -e "s|__NATS_DNS_WRITER_USER__|$$(escape_sed "$$NATS_DNS_WRITER_USER")|g" \
          -e "s|__NATS_DNS_WRITER_PASSWORD__|$$(escape_sed "$$NATS_DNS_WRITER_PASSWORD")|g" \
          -e "s|__NATS_DNS_READER_USER__|$$(escape_sed "$$NATS_DNS_READER_USER")|g" \
          -e "s|__NATS_DNS_READER_PASSWORD__|$$(escape_sed "$$NATS_DNS_READER_PASSWORD")|g" \
          /tmp/nats.conf.template > "$$tmp_nats_conf"
        chown 10001:10001 "$$tmp_nats_conf"
        mv "$$tmp_nats_conf" /etc/nats/nats.conf
        trap - EXIT
        exec nats-server -c /etc/nats/nats.conf
    volumes:
      # nats-conf is generated runtime state, so the root-derived default keeps
      # it outside the checkout while still allowing an explicit override.
      - ${NATS_DATA_DIR:-${LANCACHE_STATE_DIR:-/opt/lancache-ng}/nats}:/data
      - ${NATS_CONF_DIR:-${LANCACHE_STATE_DIR:-/opt/lancache-ng}/nats-conf}:/etc/nats
    environment:
      - NATS_UI_USER=${NATS_UI_USER:?NATS_UI_USER is required}
      - NATS_UI_PASSWORD=${NATS_UI_PASSWORD:?NATS_UI_PASSWORD is required}
      - NATS_DNS_WRITER_USER=${NATS_DNS_WRITER_USER:?NATS_DNS_WRITER_USER is required}
      - NATS_DNS_WRITER_PASSWORD=${NATS_DNS_WRITER_PASSWORD:?NATS_DNS_WRITER_PASSWORD is required}
      - NATS_DNS_READER_USER=${NATS_DNS_READER_USER:?NATS_DNS_READER_USER is required}
      - NATS_DNS_READER_PASSWORD=${NATS_DNS_READER_PASSWORD:?NATS_DNS_READER_PASSWORD is required}
    expose:
      - "4222"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Admin UI ──────────────────────────────────────────────────────────────
  ui:
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/ui:${LANCACHE_IMAGE_TAG:-latest}
    volumes:
      - ui-data:/data
      - ../../services/dns/cdn-domains.txt:/data/cdn-domains.txt
      - proxy-logs:/var/log/nginx:ro
      # Admin UI only reads this mount for cache-size reporting.
      - proxy-cache:/var/cache/proxy:ro
      - ${PDNS_FILTER_STATE_DIR:-${LANCACHE_STATE_DIR:-/opt/lancache-ng}/pdns-filter-state}:/var/lib/powerdns-state
      - ${NATS_CONF_DIR:-${LANCACHE_STATE_DIR:-/opt/lancache-ng}/nats-conf}:/etc/nats   # shared with NATS: UI writes nats.conf here
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - DOCKER_PROXY_URL=http://docker-socket-proxy:2375
      - DNS_STANDARD_SERVICE=dns-standard
      - DNS_SSL_SERVICE=dns-ssl
      - PROXY_SERVICE=proxy
      - SSL_ENABLED=${SSL_ENABLED:-1}
      - PROXY_STANDARD_URL=http://proxy
      - PROXY_SSL_URL=http://proxy
      - PROXY_SSL_SERVICE=proxy
      - STANDARD_LOG=/var/log/nginx/access.log
      - SSL_LOG=/var/log/nginx/access.log
      - CACHE_DIR=/var/cache/proxy
      - NETDATA_URL=http://netdata:19999
      - CACHE_MAX_GB=${CACHE_MAX_GB:-${STANDARD_CACHE_MAX_GB:-${SSL_CACHE_MAX_GB:-}}}
      - STANDARD_IP=${IP_STANDARD}
      - SSL_IP=${IP_SSL}
      - DNS_STANDARD_STATE_DIR=/var/lib/powerdns-state
      - DNS_SSL_STATE_DIR=/var/lib/powerdns-state
      - LANCACHE_IMAGE_REGISTRY=${LANCACHE_IMAGE_REGISTRY:-ghcr.io}
      - LANCACHE_IMAGE_PREFIX=${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}
      - LANCACHE_IMAGE_CHANNEL=${LANCACHE_IMAGE_CHANNEL:-}
      - LANCACHE_IMAGE_TAG=${LANCACHE_IMAGE_TAG:-latest}
      - UI_AUTH_USER=${UI_AUTH_USER:-}
      - UI_AUTH_PASSWORD=${UI_AUTH_PASSWORD:-}
      - ALLOW_INSECURE_UI=${ALLOW_INSECURE_UI:-false}
      - UI_SESSION_TTL_SECONDS=${UI_SESSION_TTL_SECONDS:-86400}
      - DHCP_MODE=${DHCP_MODE:-disabled}
      - DHCP_API_URL=http://host.docker.internal:8000
      - DHCP_API_TOKEN=${KEA_CTRL_TOKEN}
      - PDNS_AUTH_URL=http://dns-standard:8081
      - PDNS_REC_URL=http://dns-standard:8082
      - PDNS_API_KEY=${PDNS_API_KEY}
      - NATS_URL=nats://nats:4222
      - NATS_UI_USER=${NATS_UI_USER:?NATS_UI_USER is required}
      - NATS_UI_PASSWORD=${NATS_UI_PASSWORD:?NATS_UI_PASSWORD is required}
      - NATS_DNS_WRITER_USER=${NATS_DNS_WRITER_USER:?NATS_DNS_WRITER_USER is required}
      - NATS_DNS_WRITER_PASSWORD=${NATS_DNS_WRITER_PASSWORD:?NATS_DNS_WRITER_PASSWORD is required}
      - NATS_DNS_READER_USER=${NATS_DNS_READER_USER:?NATS_DNS_READER_USER is required}
      - NATS_DNS_READER_PASSWORD=${NATS_DNS_READER_PASSWORD:?NATS_DNS_READER_PASSWORD is required}
      - SECONDARY_REGISTRATION_TOKEN=${SECONDARY_REGISTRATION_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - docker-api
    depends_on:
      - docker-socket-proxy
      - proxy
      - netdata
      - nats
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Netdata (system metrics backend, kein externer Port) ──────────────────
  netdata:
    image: netdata/netdata@sha256:a130dbbf3d6e6a5472efdebaa123797190a5822627e908106d34edae02bc8a74
    hostname: lancache-netdata
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  docker-api:
    internal: true

volumes:
  proxy-cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      # CACHE_DIR stays available as an advanced override, but the
      # normal production path is derived from the shared state root.
      device: ${CACHE_DIR:-${LANCACHE_STATE_DIR:-/opt/lancache-ng}/cache}
  proxy-logs:
  # Known-good config snapshots (#415), one persistent volume per adapter.
  # Deliberately plain Docker-managed volumes (not part of the LANCACHE_STATE_DIR
  # bind-mount contract used by cache/kea/pdns/nats): see
  # docs/known-good-config-snapshots.md for why these are out of scope for
  # setup.sh backup/restore in this change.
  proxy-config-snapshots:
  dhcp-proxy-config-snapshots:
  watchdog-status:
  netdataconfig:
  netdatalib:
  netdatacache:
  ui-data:
