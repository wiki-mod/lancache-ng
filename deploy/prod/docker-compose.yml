services:

  # ── Standard mode (no CA cert required) ──────────────────────────────────
  # HTTP: cached. HTTPS: SNI passthrough to real CDN (not cached).
  proxy-standard:
    container_name: lancache-proxy-standard
    image: ghcr.io/wiki-mod/lancache-ng/proxy-standard:latest
    build:
      context: ../../services/proxy-standard
    env_file:
      - ../../config/prod/proxy.env
    volumes:
      - proxy-standard-cache:/var/cache/nginx/lancache
      - proxy-standard-logs:/var/log/nginx
    ports:
      - "${IP_STANDARD}:80:80"
      - "${IP_STANDARD}:443:443"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dns-standard:
    container_name: lancache-dns-standard
    image: ghcr.io/wiki-mod/lancache-ng/dns:latest
    build:
      context: ../../services/dns
    env_file:
      - ../../config/prod/dns-standard.env
    environment:
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
    volumes:
      - ../../services/dns/cdn-domains.txt:/etc/bind/cdn-domains.txt
      - /srv/lancache/pdns-standard:/var/lib/powerdns
    ports:
      - "${IP_STANDARD}:53:53/udp"
      - "${IP_STANDARD}:53:53/tcp"
    expose:
      - "8081"
      - "8082"
    healthcheck:
      test: ["CMD-SHELL", "dig @127.0.0.1 steamcontent.com A +short +time=2 +tries=1 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── SSL mode (CA cert must be installed on clients) ───────────────────────
  # HTTP + HTTPS: both cached via TLS interception.
  proxy-ssl:
    container_name: lancache-proxy-ssl
    image: ghcr.io/wiki-mod/lancache-ng/proxy:latest
    build:
      context: ../../services/proxy
    env_file:
      - ../../config/prod/proxy.env
    volumes:
      - ../../certs:/etc/nginx/ssl/ca:ro
      - proxy-ssl-cache:/var/cache/nginx/lancache
      - proxy-ssl-logs:/var/log/nginx
      - ../../services/proxy/cdn-ssl-domains.txt:/etc/nginx/cdn-ssl-domains.txt
    ports:
      - "${IP_SSL}:80:80"
      - "${IP_SSL}:443:443"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dns-ssl:
    container_name: lancache-dns-ssl
    image: ghcr.io/wiki-mod/lancache-ng/dns:latest
    build:
      context: ../../services/dns
    env_file:
      - ../../config/prod/dns-ssl.env
    environment:
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
    volumes:
      - ../../services/dns/cdn-domains.txt:/etc/bind/cdn-domains.txt
      - /srv/lancache/pdns-ssl:/var/lib/powerdns
    ports:
      - "${IP_SSL}:53:53/udp"
      - "${IP_SSL}:53:53/tcp"
    expose:
      - "8081"
      - "8082"
    healthcheck:
      test: ["CMD-SHELL", "dig @127.0.0.1 steamcontent.com A +short +time=2 +tries=1 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Watchdog (health monitor, auto-restart, purge cron) ──────────────────
  # socket-proxy limits Docker access to container inspect + restart only
  # (tecnativa/docker-socket-proxy: CONTAINERS=1 + POST=1 — no exec, no images)
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: "1"
      POST: "1"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  watchdog:
    image: ghcr.io/wiki-mod/lancache-ng/watchdog:latest
    build:
      context: ../../services/watchdog
    env_file:
      - ../../config/prod/watchdog.env
    volumes:
      - /srv/lancache/standard:/cache/standard
      - /srv/lancache/ssl:/cache/ssl
      - watchdog-status:/var/run/watchdog
    depends_on:
      - docker-socket-proxy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── DHCP Server (Kea) ─────────────────────────────────────────────────────
  # Full DHCP server with REST API control
  # network_mode: host allows DHCP broadcast (port 67/udp)
  dhcp:
    container_name: lancache-dhcp
    image: ghcr.io/wiki-mod/lancache-ng/dhcp:latest
    build:
      context: ../../services/dhcp
    env_file:
      - ../../config/prod/dhcp.env
    environment:
      - DHCP_DNS_PRIMARY=${IP_STANDARD}
      - DHCP_DNS_SECONDARY=${IP_SSL}
      - DHCP_DNS_SERVER_IP=${IP_STANDARD}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
    volumes:
      - /srv/lancache/kea:/var/lib/kea    # runtime config + leases; create with: mkdir -p /srv/lancache/kea
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
      - NET_ADMIN       # needed for iptables rules restricting port 8000 to Docker-internal
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── DHCP Proxy (dnsmasq) ──────────────────────────────────────────────────
  # Proxy mode: sits next to existing DHCP server, overrides DNS options only.
  # Mutually exclusive with Kea mode (both want port 67/udp).
  # Activate with: docker compose --profile dhcp-proxy up -d
  dhcp-proxy:
    container_name: lancache-dhcp-proxy
    image: ghcr.io/wiki-mod/lancache-ng/dhcp-proxy:latest
    build:
      context: ../../services/dhcp-proxy
    env_file:
      - ../../config/prod/dhcp-proxy.env
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    profiles:
      - dhcp-proxy
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Admin UI ──────────────────────────────────────────────────────────────
  ui:
    image: ghcr.io/wiki-mod/lancache-ng/ui:latest
    build:
      context: ../../services/ui
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../services/dns/cdn-domains.txt:/data/cdn-domains.txt
      - ../../services/proxy/cdn-ssl-domains.txt:/data/cdn-ssl-domains.txt
      - proxy-standard-logs:/var/log/nginx/standard:ro
      - proxy-ssl-logs:/var/log/nginx/ssl:ro
      - /srv/lancache/standard:/var/cache/standard:ro
      - /srv/lancache/ssl:/var/cache/ssl:ro
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - DNS_STANDARD_SERVICE=dns-standard
      - DNS_SSL_SERVICE=dns-ssl
      - PROXY_SSL_SERVICE=proxy-ssl
      - NETDATA_URL=http://netdata:19999
      - STANDARD_CACHE_MAX_GB=500
      - SSL_CACHE_MAX_GB=500
      - STANDARD_IP=${IP_STANDARD}
      - SSL_IP=${IP_SSL}
      - DHCP_API_URL=http://host.docker.internal:8000
      - DHCP_API_TOKEN=lancache-dhcp-prod-secret
      - PDNS_AUTH_URL=http://dns-standard:8081
      - PDNS_REC_URL=http://dns-standard:8082
      - PDNS_API_KEY=lancache-pdns-prod-secret
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - proxy-standard
      - proxy-ssl
      - netdata
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Netdata (system metrics backend, kein externer Port) ──────────────────
  netdata:
    image: netdata/netdata
    hostname: lancache-netdata
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  proxy-standard-cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/lancache/standard
  proxy-ssl-cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/lancache/ssl
  proxy-standard-logs:
  proxy-ssl-logs:
  watchdog-status:
  netdataconfig:
  netdatalib:
  netdatacache:
