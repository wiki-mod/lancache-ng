name: lancache-ng

services:

  # ── Standard mode (no CA cert required) ──────────────────────────────────
  # HTTP: cached. HTTPS: SNI passthrough to real CDN (not cached).
  proxy-standard:
    container_name: lancache-proxy-standard
    build:
      context: ../../services/proxy-standard
    env_file:
      - ../../config/dev/proxy.env
    volumes:
      - proxy-standard-cache:/var/cache/nginx/lancache
      - proxy-standard-logs:/var/log/nginx
    ports:
      - "${IP_STANDARD}:8080:80"    # use port 8080 in dev to avoid conflicts
      - "${IP_STANDARD}:8443:443"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      lancache:
        ipv4_address: 172.28.0.2
    restart: unless-stopped

  dns-standard:
    container_name: lancache-dns-standard
    build:
      context: ../../services/dns
    env_file:
      - ../../config/dev/dns-standard.env
    environment:
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
      - NATS_URL=nats://nats:4222
      - NATS_TOKEN=${NATS_LOCAL_TOKEN:-lancache-nats-dev-secret}
      - NATS_CONSUMER=dns-standard
      - NATS_RECONCILER=1
    volumes:
      - ../../services/dns/cdn-domains.txt:/etc/pdns/cdn-domains.txt
      - pdns-data-standard:/var/lib/powerdns
    ports:
      # NOTE (Windows): Port 53 is used by the Windows DNS client.
      # Stop "DNS Client" in services.msc, or test the proxy directly:
      #   curl --resolve steamcontent.com:8080:127.0.0.1 http://steamcontent.com/
      - "${IP_STANDARD}:5300:53/udp"   # port 5300 in dev to avoid conflicts
      - "${IP_STANDARD}:5300:53/tcp"
    expose:
      - "8081"
      - "8082"
    healthcheck:
      test: ["CMD-SHELL", "rec_control ping && ss -lnu | grep -q ':53 '"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      lancache:
        ipv4_address: 172.28.0.3
    depends_on:
      - nats
    restart: unless-stopped

  # ── SSL mode (CA cert must be installed on clients) ───────────────────────
  # HTTP + HTTPS: both cached via TLS interception.
  proxy-ssl:
    container_name: lancache-proxy-ssl
    build:
      context: ../../services/proxy
    env_file:
      - ../../config/dev/proxy.env
    volumes:
      - ../../certs:/etc/nginx/ssl/ca
      - proxy-ssl-cache:/var/cache/nginx/lancache
      - proxy-ssl-logs:/var/log/nginx
      - ../../services/proxy/cdn-ssl-domains.txt:/etc/nginx/cdn-ssl-domains.txt
    ports:
      - "${IP_SSL}:80:80"
      - "${IP_SSL}:443:443"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      lancache:
        ipv4_address: 172.28.0.4
    restart: unless-stopped

  dns-ssl:
    container_name: lancache-dns-ssl
    build:
      context: ../../services/dns
    env_file:
      - ../../config/dev/dns-ssl.env
    environment:
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
      - NATS_URL=nats://nats:4222
      - NATS_TOKEN=${NATS_LOCAL_TOKEN:-lancache-nats-dev-secret}
      - NATS_CONSUMER=dns-ssl
    volumes:
      - ../../services/dns/cdn-domains.txt:/etc/pdns/cdn-domains.txt
      - pdns-data-ssl:/var/lib/powerdns
    ports:
      - "${IP_SSL}:5353:53/udp"
      - "${IP_SSL}:5353:53/tcp"
    expose:
      - "8081"
      - "8082"
    healthcheck:
      test: ["CMD-SHELL", "rec_control ping && ss -lnu | grep -q ':53 '"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      lancache:
        ipv4_address: 172.28.0.5
    depends_on:
      - nats
    restart: unless-stopped

  # ── Watchdog (health monitor, auto-restart, purge cron) ──────────────────
  # socket-proxy limits Docker access to container inspect + restart only
  # (tecnativa/docker-socket-proxy: CONTAINERS=1 + POST=1 — no exec, no images)
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: "1"
      POST: "1"
    networks:
      - lancache
    restart: unless-stopped

  watchdog:
    build:
      context: ../../services/watchdog
    env_file:
      - ../../config/dev/watchdog.env
    volumes:
      - proxy-standard-cache:/cache/standard
      - proxy-ssl-cache:/cache/ssl
      - watchdog-status:/var/run/watchdog
    depends_on:
      - docker-socket-proxy
    networks:
      - lancache
    restart: unless-stopped

  # ── DHCP Server (Kea) ─────────────────────────────────────────────────────
  # Full DHCP server with REST API control
  dhcp:
    container_name: lancache-dhcp
    build:
      context: ../../services/dhcp
    env_file:
      - ../../config/dev/dhcp.env
    environment:
      - DHCP_DNS_PRIMARY=${IP_STANDARD}
      - DHCP_DNS_SECONDARY=${IP_SSL}
      - DHCP_DNS_SERVER_IP=172.28.0.3
      - DHCP_DNS_SERVER_IP_SSL=${IP_SSL}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
    volumes:
      - kea-data:/var/lib/kea    # runtime config + leases persist across restarts
    ports:
      - "67:67/udp"      # DHCP
      - "127.0.0.1:8000:8000"  # Kea Control Agent API (localhost only in dev)
    networks:
      lancache:
        ipv4_address: 172.28.0.6
    restart: unless-stopped


  # ── DHCP Proxy (dnsmasq) ──────────────────────────────────────────────────
  # Proxy mode: sits next to existing DHCP server, overrides DNS options only.
  # Mutually exclusive with Kea mode (both want port 67/udp).
  # Activate with: docker compose --profile dhcp-proxy up
  dhcp-proxy:
    container_name: lancache-dhcp-proxy
    build:
      context: ../../services/dhcp-proxy
    env_file:
      - ../../config/dev/dhcp-proxy.env
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    profiles:
      - dhcp-proxy
    restart: unless-stopped

  # ── NATS (message bus for DNS record sync) ────────────────────────────────
  nats:
    image: nats:2-alpine
    # On first start: copy default conf (no auth) into the shared volume,
    # then exec nats-server. The UI overwrites nats.conf with auth on startup
    # and sends SIGHUP to reload without a container restart.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /etc/nats
        sed "s/__NATS_LOCAL_TOKEN__/$NATS_LOCAL_TOKEN/" /nats-default.conf > /etc/nats/nats.conf
        exec nats-server -c /etc/nats/nats.conf
    volumes:
      - nats-data:/data
      - nats-conf:/etc/nats
      - ../../services/nats/nats.conf:/nats-default.conf:ro
    environment:
      - NATS_LOCAL_TOKEN=${NATS_LOCAL_TOKEN:-lancache-nats-dev-secret}
    networks:
      lancache:
        ipv4_address: 172.28.0.8
    restart: unless-stopped

  # ── Log aggregator (optional, start with: docker compose --profile logging up) ──
  syslog:
    image: fluent/fluent-bit:3
    profiles: [logging]
    volumes:
      - proxy-standard-logs:/var/log/nginx/standard:ro
      - proxy-ssl-logs:/var/log/nginx/ssl:ro
      - ../../services/syslog/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - logs:/var/log/lancache
      - syslog-data:/data
    restart: unless-stopped

  # ── Admin UI ──────────────────────────────────────────────────────────────
  ui:
    build:
      context: ../../services/ui
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../services/dns/cdn-domains.txt:/data/cdn-domains.txt
      - ../../services/proxy/cdn-ssl-domains.txt:/data/cdn-ssl-domains.txt
      - proxy-standard-logs:/var/log/nginx/standard:ro
      - proxy-ssl-logs:/var/log/nginx/ssl:ro
      - proxy-standard-cache:/var/cache/standard:ro
      - proxy-ssl-cache:/var/cache/ssl:ro
      - nats-conf:/etc/nats          # shared with NATS: UI writes nats.conf here
    ports:
      - "9090:8080"    # proxy-standard belegt schon 127.0.0.1:8080 → UI auf 9090
    environment:
      - DNS_STANDARD_SERVICE=dns-standard
      - DNS_SSL_SERVICE=dns-ssl
      - PROXY_SSL_SERVICE=proxy-ssl
      - NETDATA_URL=http://netdata:19999
      - STANDARD_CACHE_MAX_GB=10
      - SSL_CACHE_MAX_GB=10
      - STANDARD_IP=${IP_STANDARD}
      - SSL_IP=${IP_SSL}
      - DHCP_API_URL=http://dhcp:8000
      - DHCP_API_TOKEN=lancache-dhcp-dev-secret
      - PDNS_AUTH_URL=http://dns-standard:8081
      - PDNS_REC_URL=http://dns-standard:8082
      - PDNS_API_KEY=lancache-pdns-dev-secret
      - NATS_URL=nats://nats:4222
      - NATS_LOCAL_TOKEN=${NATS_LOCAL_TOKEN:-lancache-nats-dev-secret}
      - SECONDARY_REGISTRATION_TOKEN=${SECONDARY_REGISTRATION_TOKEN:-lancache-reg-dev-secret}
    networks:
      - lancache
    depends_on:
      - proxy-standard
      - proxy-ssl
      - netdata
      - dhcp
      - nats
    restart: unless-stopped

  # ── Netdata (system metrics backend, kein externer Port) ──────────────────
  netdata:
    image: netdata/netdata
    hostname: lancache-netdata
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - logs:/var/log/lancache:ro
      - ../../services/syslog/netdata-web_log.conf:/etc/netdata/go.d/web_log.conf:ro
    networks:
      - lancache
    restart: unless-stopped

networks:
  lancache:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

volumes:
  proxy-standard-cache:
  proxy-ssl-cache:
  proxy-standard-logs:
  proxy-ssl-logs:
  watchdog-status:
  kea-data:
  nats-data:
  nats-conf:
  netdataconfig:
  netdatalib:
  netdatacache:
  pdns-data-standard:
  pdns-data-ssl:
  logs:
  syslog-data:
