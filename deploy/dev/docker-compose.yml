name: lancache-ng

services:

  # ── Unified proxy (standard + SSL mode in one container) ─────────────────
  # Port 80: HTTP caching (shared cache for both modes)
  # Port 8443 (standard): SNI passthrough to real CDN (no client cert needed)
  # Port 443 (SSL): HTTPS caching via TLS interception (CA cert required)
  proxy:
    container_name: lancache-proxy
    build:
      context: ../../services/proxy
    env_file:
      - ../../config/dev/proxy.env
    environment:
      - IP_STANDARD=${IP_STANDARD}
      - IP_SSL=${IP_SSL}
      - SSL_ENABLED=${SSL_ENABLED:-1}
    volumes:
      - ../../certs:/etc/nginx/ssl/ca
      - ../../services/proxy/cdn-ssl-domains.txt:/etc/nginx/cdn-ssl-domains.txt
      - proxy-cache:/var/cache/nginx/lancache
      - proxy-logs:/var/log/nginx
    ports:
      - "${IP_STANDARD}:8080:80"    # use port 8080 in dev to avoid conflicts
      - "${IP_STANDARD}:8443:8443"  # standard mode SNI passthrough
      - "${IP_SSL}:80:80"
      - "${IP_SSL}:443:443"         # SSL mode TLS interception
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1/healthz >/dev/null && { [ \"$${SSL_ENABLED:-0}\" != \"1\" ] || curl -ksf https://127.0.0.1/healthz >/dev/null; }"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      lancache:
        ipv4_address: 172.28.0.2
    restart: unless-stopped

  dns-standard:
    container_name: lancache-dns-standard
    build:
      context: ../../services/dns
    env_file:
      - ../../config/dev/dns-standard.env
    environment:
      - PDNS_API_KEY=${PDNS_API_KEY:-lancache-pdns-dev-secret}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
      - NATS_URL=nats://nats:4222
      - NATS_USER=${NATS_DNS_WRITER_USER:-lancache-dns-writer}
      - NATS_PASSWORD=${NATS_DNS_WRITER_PASSWORD:-lancache-nats-writer-dev-secret}
      - NATS_CONSUMER=dns-standard
      - NATS_RECONCILER=1
    volumes:
      - ../../services/dns/cdn-domains.txt:/etc/pdns/cdn-domains.txt
      - pdns-data-standard:/var/lib/powerdns
    ports:
      # NOTE (Windows): Port 53 is used by the Windows DNS client.
      # Stop "DNS Client" in services.msc, or test the proxy directly:
      #   curl --resolve steamcontent.com:8080:127.0.0.1 http://steamcontent.com/
      - "${IP_STANDARD}:5300:53/udp"   # port 5300 in dev to avoid conflicts
      - "${IP_STANDARD}:5300:53/tcp"
    expose:
      - "8081"
      - "8082"
    healthcheck:
      test: ["CMD-SHELL", "rec_control ping && ss -lnu | grep -q ':53 '"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      lancache:
        ipv4_address: 172.28.0.3
    depends_on:
      - nats
    restart: unless-stopped

  dns-ssl:
    container_name: lancache-dns-ssl
    build:
      context: ../../services/dns
    env_file:
      - ../../config/dev/dns-ssl.env
    environment:
      - PDNS_API_KEY=${PDNS_API_KEY:-lancache-pdns-dev-secret}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
      - NATS_URL=nats://nats:4222
      - NATS_USER=${NATS_DNS_READER_USER:-lancache-dns-reader}
      - NATS_PASSWORD=${NATS_DNS_READER_PASSWORD:-lancache-nats-reader-dev-secret}
      - NATS_CONSUMER=dns-ssl
    volumes:
      - ../../services/dns/cdn-domains.txt:/etc/pdns/cdn-domains.txt
      - pdns-data-ssl:/var/lib/powerdns
    ports:
      - "${IP_SSL}:5353:53/udp"
      - "${IP_SSL}:5353:53/tcp"
    expose:
      - "8081"
      - "8082"
    healthcheck:
      test: ["CMD-SHELL", "rec_control ping && ss -lnu | grep -q ':53 '"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      lancache:
        ipv4_address: 172.28.0.5
    depends_on:
      - nats
    restart: unless-stopped

  # ── Watchdog (health monitor, auto-restart, purge cron) ──────────────────
  # socket-proxy limits Docker access to Admin UI/watchdog operations:
  # container inspect/list, restart, and exec; no image/volume/system access.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: "1"
      POST: "1"
      EXEC: "1"
    networks:
      - docker-api
    restart: unless-stopped

  watchdog:
    build:
      context: ../../services/watchdog
    env_file:
      - ../../config/dev/watchdog.env
    volumes:
      - proxy-cache:/cache/standard
      - watchdog-status:/var/run/watchdog
    depends_on:
      - docker-socket-proxy
    networks:
      - lancache
      - docker-api
    restart: unless-stopped

  # ── DHCP Server (Kea) ─────────────────────────────────────────────────────
  # Full DHCP server with REST API control
  dhcp:
    container_name: lancache-dhcp
    build:
      context: ../../services/dhcp
    profiles:
      - dhcp-kea
    env_file:
      - ../../config/dev/dhcp.env
    environment:
      - DHCP_DNS_PRIMARY=${IP_STANDARD}
      - DHCP_DNS_SECONDARY=${IP_SSL}
      - DHCP_DNS_SERVER_IP=172.28.0.3
      - DHCP_DNS_SERVER_IP_SSL=${IP_SSL}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
      - KEA_CTRL_TOKEN=${KEA_CTRL_TOKEN}
      - DHCP_MODE=${DHCP_MODE:-disabled}
    volumes:
      - kea-data:/var/lib/kea    # runtime config + leases persist across restarts
    ports:
      - "67:67/udp"      # DHCP
      - "127.0.0.1:8000:8000"  # Kea Control Agent API (localhost only in dev)
    cap_add:
      - NET_ADMIN
    networks:
      lancache:
        ipv4_address: 172.28.0.6
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          host="$${KEA_CTRL_HOST:-127.0.0.1}";
          [ "$$host" = "0.0.0.0" ] && host=127.0.0.1;
          curl -sf -u admin:$${KEA_CTRL_TOKEN}
          -H 'Content-Type: application/json'
          -d '{"command":"config-get","service":["dhcp4"]}'
          "http://$$host:8000/" | jq -e '.[0].result == 0' >/dev/null
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped


  # ── DHCP Proxy (dnsmasq) ──────────────────────────────────────────────────
  # Proxy mode: sits next to existing DHCP server, overrides DNS options only.
  # Mutually exclusive with Kea mode (both want port 67/udp).
  # Activate with: docker compose --profile dhcp-proxy up
  dhcp-proxy:
    container_name: lancache-dhcp-proxy
    build:
      context: ../../services/dhcp-proxy
    env_file:
      - ../../config/dev/dhcp-proxy.env
    network_mode: host
    environment:
      - DHCP_MODE=${DHCP_MODE:-disabled}
      - DHCP_SUBNET_START=${DHCP_SUBNET_START:-}
      - DHCP_DNS_PRIMARY=${DHCP_DNS_PRIMARY:-${IP_STANDARD}}
      - DHCP_DNS_SECONDARY=${DHCP_DNS_SECONDARY:-${IP_SSL:-${IP_STANDARD}}}
      - UPSTREAM_DHCP_IP=${UPSTREAM_DHCP_IP:-${DHCP_GATEWAY:-}}
    cap_add:
      - NET_BIND_SERVICE
    profiles:
      - dhcp-proxy
    restart: unless-stopped

  # ── NATS (message bus for DNS record sync) ────────────────────────────────
  nats:
    image: nats:2-alpine@sha256:c11af972c99ae542de8925e6a7d9c533aa1eb039660420d2074beed6089b3bf0
    # On first start: copy default conf (no auth) into the shared volume,
    # then exec nats-server. The UI overwrites nats.conf with auth on startup
    # and sends SIGHUP to reload without a container restart.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /etc/nats
        escape_sed() {
          printf '%s' "$$1" | sed 's/[\/&|]/\\&/g'
        }
        # Keep the shared config writable by the Admin UI user (UID/GID 10001) after NATS restarts.
        tmp_nats_conf="$(mktemp /etc/nats/.nats.conf.XXXXXX)"
        trap 'rm -f "$$tmp_nats_conf"' EXIT
        cat > /tmp/nats.conf.template <<'EOF'
        jetstream {
          store_dir: /data
        }
        authorization {
          users = [
            {
              user: "__NATS_UI_USER__"
              password: "__NATS_UI_PASSWORD__"
              permissions = {
                publish = ["lancache.dns.record", "lancache.dns.flush"]
              }
            }
            {
              user: "__NATS_DNS_WRITER_USER__"
              password: "__NATS_DNS_WRITER_PASSWORD__"
              permissions = {
                publish = [
                  "lancache.dns.record",
                  "$$JS.API.STREAM.INFO.LANCACHE_DNS",
                  "$$JS.API.STREAM.CREATE.LANCACHE_DNS",
                  "$$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
                  "$$JS.ACK.LANCACHE_DNS.>"
                ]
                subscribe = ["lancache.dns.>", "_INBOX.>"]
              }
            }
            {
              user: "__NATS_DNS_READER_USER__"
              password: "__NATS_DNS_READER_PASSWORD__"
              permissions = {
                publish = [
                  "$$JS.API.STREAM.INFO.LANCACHE_DNS",
                  "$$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
                  "$$JS.ACK.LANCACHE_DNS.>"
                ]
                subscribe = ["lancache.dns.>", "_INBOX.>"]
              }
            }
          ]
        }
        EOF
        sed \
          -e "s|__NATS_UI_USER__|$$(escape_sed "$$NATS_UI_USER")|g" \
          -e "s|__NATS_UI_PASSWORD__|$$(escape_sed "$$NATS_UI_PASSWORD")|g" \
          -e "s|__NATS_DNS_WRITER_USER__|$$(escape_sed "$$NATS_DNS_WRITER_USER")|g" \
          -e "s|__NATS_DNS_WRITER_PASSWORD__|$$(escape_sed "$$NATS_DNS_WRITER_PASSWORD")|g" \
          -e "s|__NATS_DNS_READER_USER__|$$(escape_sed "$$NATS_DNS_READER_USER")|g" \
          -e "s|__NATS_DNS_READER_PASSWORD__|$$(escape_sed "$$NATS_DNS_READER_PASSWORD")|g" \
          /tmp/nats.conf.template > "$$tmp_nats_conf"
        chown 10001:10001 "$$tmp_nats_conf"
        mv "$$tmp_nats_conf" /etc/nats/nats.conf
        trap - EXIT
        exec nats-server -c /etc/nats/nats.conf
    volumes:
      - nats-data:/data
      - nats-conf:/etc/nats
      - ../../services/nats/nats.conf:/nats-default.conf:ro
    environment:
      - NATS_UI_USER=${NATS_UI_USER:-lancache-ui}
      - NATS_UI_PASSWORD=${NATS_UI_PASSWORD:-lancache-nats-ui-dev-secret}
      - NATS_DNS_WRITER_USER=${NATS_DNS_WRITER_USER:-lancache-dns-writer}
      - NATS_DNS_WRITER_PASSWORD=${NATS_DNS_WRITER_PASSWORD:-lancache-nats-writer-dev-secret}
      - NATS_DNS_READER_USER=${NATS_DNS_READER_USER:-lancache-dns-reader}
      - NATS_DNS_READER_PASSWORD=${NATS_DNS_READER_PASSWORD:-lancache-nats-reader-dev-secret}
    networks:
      lancache:
        ipv4_address: 172.28.0.8
    restart: unless-stopped

  # ── Log aggregator (optional, start with: docker compose --profile logging up) ──
  syslog:
    image: cr.fluentbit.io/fluent/fluent-bit:3.2.10@sha256:d6dec000c4929a439562525728c708f6e99800d7ddc82efd6aa4f45f3a20b562
    profiles: [logging]
    volumes:
      - proxy-logs:/var/log/nginx:ro
      - ../../services/syslog/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - logs:/var/log/lancache
      - syslog-data:/data
    restart: unless-stopped

  # ── Admin UI ──────────────────────────────────────────────────────────────
  ui:
    build:
      context: ../../services/ui
    volumes:
      - ../../services/dns/cdn-domains.txt:/data/cdn-domains.txt
      - ../../services/proxy/cdn-ssl-domains.txt:/data/cdn-ssl-domains.txt
      - proxy-logs:/var/log/nginx:ro
      - proxy-cache:/var/cache/proxy:ro
      - nats-conf:/etc/nats          # shared with NATS: UI writes nats.conf here
    ports:
      - "9090:8080"
    environment:
      - DOCKER_PROXY_URL=http://docker-socket-proxy:2375
      - DNS_STANDARD_SERVICE=dns-standard
      - DNS_SSL_SERVICE=dns-ssl
      - PROXY_SERVICE=proxy
      - SSL_ENABLED=${SSL_ENABLED:-1}
      - PROXY_STANDARD_URL=http://proxy
      - PROXY_SSL_URL=http://proxy
      - PROXY_SSL_SERVICE=proxy
      - STANDARD_LOG=/var/log/nginx/access.log
      - SSL_LOG=/var/log/nginx/access.log
      - STANDARD_CACHE_DIR=/var/cache/proxy
      - SSL_CACHE_DIR=/var/cache/proxy
      - NETDATA_URL=http://netdata:19999
      - CACHE_MAX_GB=10
      - STANDARD_IP=${IP_STANDARD}
      - SSL_IP=${IP_SSL}
      - UI_AUTH_USER=${UI_AUTH_USER:-}
      - UI_AUTH_PASSWORD=${UI_AUTH_PASSWORD:-}
      - ALLOW_INSECURE_UI=${ALLOW_INSECURE_UI:-false}
      - DHCP_MODE=${DHCP_MODE:-disabled}
      - DHCP_API_URL=http://dhcp:8000
      - DHCP_API_TOKEN=${KEA_CTRL_TOKEN}
      - PDNS_AUTH_URL=http://dns-standard:8081
      - PDNS_REC_URL=http://dns-standard:8082
      - PDNS_API_KEY=${PDNS_API_KEY:-lancache-pdns-dev-secret}
      - NATS_URL=nats://nats:4222
      - NATS_UI_USER=${NATS_UI_USER:-lancache-ui}
      - NATS_UI_PASSWORD=${NATS_UI_PASSWORD:-lancache-nats-ui-dev-secret}
      - NATS_DNS_WRITER_USER=${NATS_DNS_WRITER_USER:-lancache-dns-writer}
      - NATS_DNS_WRITER_PASSWORD=${NATS_DNS_WRITER_PASSWORD:-lancache-nats-writer-dev-secret}
      - NATS_DNS_READER_USER=${NATS_DNS_READER_USER:-lancache-dns-reader}
      - NATS_DNS_READER_PASSWORD=${NATS_DNS_READER_PASSWORD:-lancache-nats-reader-dev-secret}
      - SECONDARY_REGISTRATION_TOKEN=${SECONDARY_REGISTRATION_TOKEN:-lancache-reg-dev-secret}
    networks:
      - lancache
      - docker-api
    depends_on:
      - docker-socket-proxy
      - proxy
      - netdata
      - nats
    restart: unless-stopped

  # ── Netdata (system metrics backend, kein externer Port) ──────────────────
  netdata:
    image: netdata/netdata@sha256:a130dbbf3d6e6a5472efdebaa123797190a5822627e908106d34edae02bc8a74
    hostname: lancache-netdata
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - logs:/var/log/lancache:ro
      - ../../services/syslog/netdata-web_log.conf:/etc/netdata/go.d/web_log.conf:ro
    networks:
      - lancache
    restart: unless-stopped

networks:
  lancache:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
  docker-api:
    internal: true

volumes:
  proxy-cache:
  proxy-logs:
  watchdog-status:
  kea-data:
  nats-data:
  nats-conf:
  netdataconfig:
  netdatalib:
  netdatacache:
  pdns-data-standard:
  pdns-data-ssl:
  logs:
  syslog-data:
