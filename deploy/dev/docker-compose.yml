# lancache-ng (https://github.com/wiki-mod/lancache-ng)
#
# Local development stack: proxy, DNS, DHCP, Admin UI, and supporting
# services (NATS, docker-socket-proxy) wired up with dev-sized defaults
# (small cache volume, offset DNS ports, query logging on). See CLAUDE.md's
# "Dev vs Prod Split" for the differences from deploy/prod.

name: lancache-ng

# The Docker socket proxy's HAProxy allowlist lives in exactly one place,
# scripts/docker-socket-proxy.sh (mounted read-only below), which is the
# canonical source per docs/naming-conventions.md. This file used to also
# carry an unreferenced x-docker-socket-proxy-command YAML anchor with a
# near-duplicate copy of that same config -- it was never aliased anywhere
# (dead weight that could silently drift from the real script with no
# functional effect) and has been removed.

services:

  # ── Unified proxy (standard + SSL mode in one container) ─────────────────
  # Port 80: HTTP caching (shared cache for both modes)
  # Port 8443 (standard): SNI passthrough to real CDN (no client cert needed)
  # Port 443 (SSL): HTTPS caching via TLS interception (CA cert required)
  proxy:
    container_name: lancache-proxy
    build:
      context: ../../services/proxy
      # Bakes in a build-time snapshot of the DNS domain list as a fallback
      # default for deployments that never mount a live cdn-domains.txt (see
      # deploy/quickstart, which pulls a pre-built image with no local repo
      # checkout to bind-mount from). dev/prod always shadow this baked
      # default with the live bind-mount below at container start.
      additional_contexts:
        - dns-domains=../../services/dns
    env_file:
      - ../../config/dev/proxy.env
    environment:
      - IP_STANDARD=${IP_STANDARD}
      - IP_SSL=${IP_SSL}
      - SSL_ENABLED=${SSL_ENABLED:-1}
    volumes:
      - ../../certs:/etc/nginx/ssl/ca
      - ../../services/dns/cdn-domains.txt:/etc/nginx/cdn-domains.txt
      # Dev also uses one shared proxy cache volume so it exercises the same
      # single-CACHE_DIR behavior as prod/quickstart.
      - proxy-cache:/var/cache/nginx/lancache
      - proxy-logs:/var/log/nginx
      # Known-good nginx config snapshots (#415): must be a persistent,
      # service-owned volume, not the ephemeral container layer, so
      # rollback survives container restarts/recreates.
      - proxy-config-snapshots:/var/lib/lancache-proxy
    ports:
      - "${IP_STANDARD}:8080:80"    # use port 8080 in dev to avoid conflicts
      - "${IP_STANDARD}:8443:8443"  # standard mode SNI passthrough
      - "${IP_SSL}:80:80"
      - "${IP_SSL}:443:443"         # SSL mode TLS interception
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1/healthz >/dev/null && { [ \"$${SSL_ENABLED:-0}\" != \"1\" ] || curl -ksf https://127.0.0.1/healthz >/dev/null; }"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      lancache:
        ipv4_address: 172.28.0.2
    restart: unless-stopped

  dns-standard:
    container_name: lancache-dns-standard
    build:
      context: ../../services/dns
    env_file:
      - ../../config/dev/dns-standard.env
    environment:
      - PDNS_API_KEY=${PDNS_API_KEY:-lancache-pdns-dev-secret}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
      - NATS_URL=nats://nats:4222
      - NATS_USER=${NATS_DNS_WRITER_USER:-lancache-dns-writer}
      - NATS_PASSWORD=${NATS_DNS_WRITER_PASSWORD:-lancache-nats-writer-dev-secret}
      # Shared-secret bootstrap (#858): resolve NATS_PASSWORD against this role's
      # shared file so it matches the value the nats server generates. Inert in
      # stock dev (the dev-secret default above is non-placeholder, so the
      # entrypoint's resolver returns it untouched) -- present for parity.
      - NATS_PASSWORD_SHARED_SECRET=nats-dns-writer-password
      - NATS_CONSUMER=dns-standard
      - NATS_RECONCILER=1
    volumes:
      - ../../services/dns/cdn-domains.txt:/etc/pdns/cdn-domains.txt
      # Shared-secret bootstrap (#858): first-writer-wins PDNS_API_KEY/DDNS_TSIG_KEY.
      - shared-secrets:/var/lib/lancache-secrets
      - pdns-data-standard:/var/lib/powerdns
      - pdns-filter-state:/var/lib/powerdns-state
      # Known-good pdns.conf/recursor.conf snapshots (#615): must be a
      # persistent, service-owned volume, not the ephemeral container layer,
      # so rollback survives container restarts/recreates.
      - pdns-config-snapshots-standard:/var/lib/lancache-dns
      # Central logging pipeline (#633): PowerDNS has no native file-log
      # directive (see services/dns/entrypoint.sh's run_auth/run_recursor,
      # which `tee` each daemon's stdout here instead).
      - dns-logs-standard:/var/log/lancache-dns
    ports:
      # NOTE (Windows): Port 53 is used by the Windows DNS client.
      # Stop "DNS Client" in services.msc, or test the proxy directly:
      #   curl --resolve steamcontent.com:8080:127.0.0.1 http://steamcontent.com/
      - "${IP_STANDARD}:5300:53/udp"   # port 5300 in dev to avoid conflicts
      - "${IP_STANDARD}:5300:53/tcp"
    expose:
      - "8081"
      - "8082"
      - "8083"
    healthcheck:
      # Real query/response probe (AG-VAL-018), not `rec_control ping` (liveness
      # only, AG-VAL-019) or `ss -lnu` (proves a socket is listening, not that
      # DNS actually answers -- also `ss` itself is banned outright, AG-VAL-020).
      # Matches deploy/quickstart/docker-compose.yml's compliant check (#869):
      # dnsutils/dig is already installed in every profile's dns image
      # (services/dns/Dockerfile), so there's no tooling gap to work around.
      test: ["CMD-SHELL", "dig @127.0.0.1 steamcontent.com A +short +time=2 +tries=1 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      lancache:
        ipv4_address: 172.28.0.3
    depends_on:
      - nats
    restart: unless-stopped

  dns-ssl:
    container_name: lancache-dns-ssl
    build:
      context: ../../services/dns
    env_file:
      - ../../config/dev/dns-ssl.env
    environment:
      - PDNS_API_KEY=${PDNS_API_KEY:-lancache-pdns-dev-secret}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
      - NATS_URL=nats://nats:4222
      - NATS_USER=${NATS_DNS_REPLICA_USER:-lancache-dns-replica}
      - NATS_PASSWORD=${NATS_DNS_REPLICA_PASSWORD:-lancache-nats-replica-dev-secret}
      # Shared-secret bootstrap (#858): resolve NATS_PASSWORD against this role's
      # shared file so it matches the value the nats server generates. Inert in
      # stock dev (the dev-secret default above is non-placeholder, so the
      # entrypoint's resolver returns it untouched) -- present for parity.
      - NATS_PASSWORD_SHARED_SECRET=nats-dns-replica-password
      - NATS_CONSUMER=dns-ssl
    volumes:
      - ../../services/dns/cdn-domains.txt:/etc/pdns/cdn-domains.txt
      # Shared-secret bootstrap (#858): first-writer-wins PDNS_API_KEY/DDNS_TSIG_KEY.
      - shared-secrets:/var/lib/lancache-secrets
      - pdns-data-ssl:/var/lib/powerdns
      - pdns-filter-state:/var/lib/powerdns-state
      - pdns-config-snapshots-ssl:/var/lib/lancache-dns
      # Central logging pipeline (#633): PowerDNS has no native file-log
      # directive (see services/dns/entrypoint.sh's run_auth/run_recursor,
      # which `tee` each daemon's stdout here instead).
      - dns-logs-ssl:/var/log/lancache-dns
    ports:
      - "${IP_SSL}:5353:53/udp"
      - "${IP_SSL}:5353:53/tcp"
    expose:
      - "8081"
      - "8082"
      - "8083"
    healthcheck:
      # Real query/response probe (AG-VAL-018), not `rec_control ping` (liveness
      # only, AG-VAL-019) or `ss -lnu` (proves a socket is listening, not that
      # DNS actually answers -- also `ss` itself is banned outright, AG-VAL-020).
      # Matches deploy/quickstart/docker-compose.yml's compliant check (#869):
      # dnsutils/dig is already installed in every profile's dns image
      # (services/dns/Dockerfile), so there's no tooling gap to work around.
      test: ["CMD-SHELL", "dig @127.0.0.1 steamcontent.com A +short +time=2 +tries=1 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      lancache:
        ipv4_address: 172.28.0.5
    depends_on:
      - nats
    restart: unless-stopped

  # ── Watchdog (health monitor, auto-restart, purge cron) ──────────────────
  # socket-proxy limits Docker access to Admin UI/watchdog operations. The
  # custom HAProxy config in scripts/docker-socket-proxy.sh (mounted below)
  # replaces Tecnativa's broad CONTAINERS/POST toggles with a deny-by-default
  # allowlist for named lancache-ng containers.
  docker-socket-proxy:
    container_name: lancache-docker-socket-proxy
    image: tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    entrypoint: ["/usr/local/bin/lancache-docker-socket-proxy.sh"]
    command: []
    stdin_open: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../../scripts/docker-socket-proxy.sh:/usr/local/bin/lancache-docker-socket-proxy.sh:ro
    networks:
      - docker-api
    restart: unless-stopped

  watchdog:
    container_name: lancache-watchdog
    build:
      context: ../../services/watchdog
    # Central logging pipeline (#633): watchdog.sh writes only to stdout
    # (its log() function, see services/watchdog/watchdog.sh) and is never
    # itself changed -- this entrypoint override tees that stdout into a
    # file in addition to the container's normal stdout, so `docker logs`
    # keeps working unchanged while fluent-bit also gets a file to tail.
    # Process substitution (`> >(...)`) requires bash, not the image's
    # default entrypoint form; `exec` still replaces this shell with
    # watchdog.sh itself, so it stays PID 1 and signal handling (restart/
    # stop) is unaffected.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        mkdir -p /var/log/lancache-watchdog
        exec /watchdog.sh > >(tee -a /var/log/lancache-watchdog/watchdog.log) 2>&1
    env_file:
      - ../../config/dev/watchdog.env
    # Syslog retention engine (#633): SYSLOG_ENABLED defaults to "false" so
    # watchdog does not touch this path at all on installs that never opt
    # into the `logging` profile. Unlike every other consumer of this
    # volume (fluent-bit's syslog-ng destination reads/writes it as the
    # owner; a future Admin UI reader would mount it `:ro`), watchdog needs
    # read-write access here since maybe_prune_syslog() deletes files.
    environment:
      - SYSLOG_ENABLED=${SYSLOG_ENABLED:-false}
      - SYSLOG_MAX_GB=${SYSLOG_MAX_GB:-10}
      - SYSLOG_RETENTION_DAYS=${SYSLOG_RETENTION_DAYS:-30}
      # SYSLOG_LOG_ROOT is intentionally NOT wired here (#757 review): see
      # the matching comment in deploy/prod/docker-compose.yml -- watchdog.sh
      # already defaults it to /var/log/lancache-syslog-ng, matching the
      # fixed mount target below, and exposing it as an independently
      # settable compose var would silently break pruning if ever changed.
    volumes:
      # Watchdog validates the unified cache path in dev; it should not grow a
      # second standard/ssl split-cache convention.
      - proxy-cache:/var/cache/lancache
      - watchdog-status:/var/run/watchdog
      - logs-syslog-ng:/var/log/lancache-syslog-ng
      - watchdog-logs:/var/log/lancache-watchdog
    healthcheck:
      # Freshness-based (mtime), not just existence -- see
      # services/watchdog/healthcheck.sh's own comment for why a stalled
      # main loop would otherwise leave a stale-but-present status.json
      # reading as healthy forever.
      test: ["CMD", "/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 2
      start_period: 15s
    depends_on:
      - docker-socket-proxy
    networks:
      - lancache
      - docker-api
    restart: unless-stopped

  # ── DHCP Server (Kea) ─────────────────────────────────────────────────────
  # Full DHCP server with REST API control
  dhcp:
    container_name: lancache-dhcp
    build:
      context: ../../services/dhcp
    profiles:
      - dhcp-kea
    env_file:
      - ../../config/dev/dhcp.env
    environment:
      - DHCP_DNS_PRIMARY=${IP_STANDARD}
      - DHCP_DNS_SECONDARY=${IP_SSL}
      - DHCP_DNS_SERVER_IP=172.28.0.3
      - DHCP_DNS_SERVER_IP_SSL=${IP_SSL}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
      - KEA_CTRL_TOKEN=${KEA_CTRL_TOKEN}
      - DHCP_MODE=${DHCP_MODE:-disabled}
    volumes:
      # Shared-secret bootstrap (#858): first-writer-wins KEA_CTRL_TOKEN/DDNS_TSIG_KEY.
      - shared-secrets:/var/lib/lancache-secrets
      - kea-data:/var/lib/kea    # runtime config + leases persist across restarts
      # Central logging pipeline (#633): Kea's loggers dual-write here (see
      # kea-dhcp4.conf.template's "output-options") in addition to stdout.
      - dhcp-logs:/var/log/kea
    ports:
      - "67:67/udp"      # DHCP
      - "127.0.0.1:8000:8000"  # Kea Control Agent API (localhost only in dev)
    cap_add:
      - NET_ADMIN
    networks:
      lancache:
        ipv4_address: 172.28.0.6
    # Shared-secret bootstrap (#858): this healthcheck runs as a separate
    # `docker exec`-style CMD-SHELL invocation, which only sees the container's
    # compose-defined environment, NOT anything the entrypoint later exports
    # after resolving/generating KEA_CTRL_TOKEN. Without the fallback below, a
    # self-healed (originally empty/placeholder) token would leave Kea's Control
    # Agent running correctly with the generated token while this check keeps
    # authenticating with the empty compose value -- permanently `unhealthy`
    # despite the daemon being fine (live-verified: exactly this failure mode).
    # Mirrors the entrypoint's own placeholder list so both sides agree on which
    # value is authoritative.
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          host="$${KEA_CTRL_HOST:-127.0.0.1}";
          [ "$$host" = "0.0.0.0" ] && host=127.0.0.1;
          token="$${KEA_CTRL_TOKEN:-}";
          case "$$token" in ""|CHANGE_ME_KEA_CTRL_TOKEN|lancache-dhcp-secret|lancache-dhcp-dev-secret|lancache-dhcp-prod-secret)
          token="$$(cat /var/lib/lancache-secrets/kea-ctrl-token 2>/dev/null)" ;; esac;
          curl -sf -u admin:$$token
          -H 'Content-Type: application/json'
          -d '{"command":"config-get","service":["dhcp4"]}'
          "http://$$host:8000/" | jq -e '.[0].result == 0' >/dev/null
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped


  # ── DHCP Proxy (dnsmasq) ──────────────────────────────────────────────────
  # Proxy mode: sits next to an existing DHCP server and serves proxy-DHCP/PXE clients.
  # Mutually exclusive with Kea mode (both want port 67/udp).
  # Activate with: docker compose --profile dhcp-proxy up
  dhcp-proxy:
    container_name: lancache-dhcp-proxy
    build:
      context: ../../services/dhcp-proxy
    env_file:
      - ../../config/dev/dhcp-proxy.env
    volumes:
      - ui-data:/data:ro
      # Known-good dnsmasq config snapshots (#415): persistent, service-owned
      # volume so rollback survives container restarts/recreates.
      - dhcp-proxy-config-snapshots:/var/lib/lancache-dhcp-proxy
      # Central logging pipeline (#633): dnsmasq's own `log-facility=`
      # directive (see dnsmasq.conf.template) writes here.
      - dhcp-proxy-logs:/var/log/lancache-dhcp-proxy
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
      # dnsmasq's ProxyDHCP/PXE reply path needs a raw broadcast socket;
      # without NET_ADMIN, dnsmasq passes its own config self-test but then
      # fails to actually start ("process is missing required capability
      # NET_ADMIN"), confirmed live with a real dnsmasq build against the
      # pre-issue-#450 four-variable config alone -- this was already
      # broken before this issue's new options existed. Matches the dhcp
      # (Kea) service's cap_add above, which needs it for the same reason.
      - NET_ADMIN
    profiles:
      - dhcp-proxy
    restart: unless-stopped

  # ── DHCP conflict probe ────────────────────────────────────────────────────
  # Predeclared start/stop/wait helper for the Admin UI's "check for other
  # DHCP servers" feature. Reuses the UI image (already has nmap and dhclient
  # installed). The Admin UI stops then starts this container on demand and
  # reads its output — it never creates or removes it — so the narrowed
  # docker-socket-proxy only needs to permit start/restart, the same capability
  # class already used for the NATS and proxy-ssl reload flows, not generic
  # container creation.
  dhcp-probe:
    container_name: lancache-dhcp-probe
    build:
      context: ../../services/ui
    entrypoint: ["/usr/local/bin/dhcp-probe.sh"]
    network_mode: host
    restart: "no"

  # ── NATS (message bus for DNS record sync) ────────────────────────────────
  nats:
    container_name: lancache-nats
    image: nats:2-alpine@sha256:c11af972c99ae542de8925e6a7d9c533aa1eb039660420d2074beed6089b3bf0
    # Boot-time job (idempotent, safely re-run on every start/restart):
    # regenerate ONLY this container's own static half of the config --
    # nats.conf with jetstream, log_file, and the four static roles (UI,
    # DNS-writer, DNS-replica, and the Admin UI's auth-callout responder user)
    # -- from the NATS_* env below, chown it to the Admin UI user, then exec
    # nats-server. The auth_callout {} stanza is deliberately NOT written here:
    # it needs the Admin UI's runtime-generated issuer public key this
    # container cannot know. Instead nats.conf `include`s a separate
    # auth_callout.conf fragment that ONLY the Admin UI writes
    # (services/ui/src/routes/secondaries.rs::update_nats_conf; see
    # services/ui/src/nats_auth_callout.rs for the full flow, issue #583).
    #
    # This split is the whole point of issue #811's fix: regenerating the
    # static subset on every restart is now safe because it never touches the
    # UI's fragment -- exactly the convergence discipline pdns/kea/nginx/
    # dhcp-proxy already follow (each regenerates only its own file, never the
    # separately-persisted operator/UI-written one; see
    # docs/known-good-config-snapshots.md). Previously this entrypoint wrote
    # the WHOLE config unconditionally, so the Admin UI's restart -- which is
    # REQUIRED to apply auth_callout, since nats-server explicitly refuses to
    # hot-reload it ("config reload not supported for AuthCallout", verified
    # against nats-server 2.14.3) -- re-ran this script and clobbered the UI's
    # auth_callout every single time, permanently breaking the callout on real
    # installs. Keeping the static subset here also keeps full recreates with
    # rotated .env credentials convergent even before the UI's first write.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        # Shared-secret bootstrap (#858): resolve the four NATS_*_PASSWORD
        # handshake secrets from the shared-secrets volume so nats-server and its
        # clients (Admin UI, dns writer/replica) agree even when .env left them
        # empty/placeholder. Sources the same tested helper the dns/dhcp/ui
        # entrypoints embed (mounted read-only below). Inert in stock dev (the
        # checked-in defaults are already consistent non-placeholder values, so
        # every resolve_shared_secret call below returns its input untouched and
        # never touches the shared volume) -- present for parity across all
        # deploy profiles per issue #858, not just where the gap was found.
        . /usr/local/lib/shared-secret-bootstrap.sh
        # Fail closed (Codex review, PR #886): resolve_shared_secret only returns
        # non-zero when the shared-secrets volume itself is unwritable -- silently
        # keeping the empty/placeholder value here would let nats-server boot with
        # empty static-user passwords instead of refusing to start. Matches the
        # same guard added to deploy/prod/docker-compose.yml.
        if secret_is_placeholder "$$NATS_UI_PASSWORD"; then NATS_UI_PASSWORD=""; fi
        if ! NATS_UI_PASSWORD="$$(resolve_shared_secret nats-ui-password "$$NATS_UI_PASSWORD" lancache_gen_hex32)"; then
          echo "[lancache-nats] FATAL: NATS_UI_PASSWORD is unset/placeholder and the shared-secrets volume is not writable, so no shared password could be generated." >&2
          echo "[lancache-nats] Mount the shared-secrets volume, or set NATS_UI_PASSWORD to a real value (openssl rand -hex 32)." >&2
          exit 1
        fi
        if secret_is_placeholder "$$NATS_DNS_WRITER_PASSWORD"; then NATS_DNS_WRITER_PASSWORD=""; fi
        if ! NATS_DNS_WRITER_PASSWORD="$$(resolve_shared_secret nats-dns-writer-password "$$NATS_DNS_WRITER_PASSWORD" lancache_gen_hex32)"; then
          echo "[lancache-nats] FATAL: NATS_DNS_WRITER_PASSWORD is unset/placeholder and the shared-secrets volume is not writable, so no shared password could be generated." >&2
          echo "[lancache-nats] Mount the shared-secrets volume, or set NATS_DNS_WRITER_PASSWORD to a real value (openssl rand -hex 32)." >&2
          exit 1
        fi
        if secret_is_placeholder "$$NATS_DNS_REPLICA_PASSWORD"; then NATS_DNS_REPLICA_PASSWORD=""; fi
        if ! NATS_DNS_REPLICA_PASSWORD="$$(resolve_shared_secret nats-dns-replica-password "$$NATS_DNS_REPLICA_PASSWORD" lancache_gen_hex32)"; then
          echo "[lancache-nats] FATAL: NATS_DNS_REPLICA_PASSWORD is unset/placeholder and the shared-secrets volume is not writable, so no shared password could be generated." >&2
          echo "[lancache-nats] Mount the shared-secrets volume, or set NATS_DNS_REPLICA_PASSWORD to a real value (openssl rand -hex 32)." >&2
          exit 1
        fi
        if secret_is_placeholder "$$NATS_CALLOUT_PASSWORD"; then NATS_CALLOUT_PASSWORD=""; fi
        if ! NATS_CALLOUT_PASSWORD="$$(resolve_shared_secret nats-callout-password "$$NATS_CALLOUT_PASSWORD" lancache_gen_hex32)"; then
          echo "[lancache-nats] FATAL: NATS_CALLOUT_PASSWORD is unset/placeholder and the shared-secrets volume is not writable, so no shared password could be generated." >&2
          echo "[lancache-nats] Mount the shared-secrets volume, or set NATS_CALLOUT_PASSWORD to a real value (openssl rand -hex 32)." >&2
          exit 1
        fi
        mkdir -p /etc/nats
        mkdir -p /var/log/lancache-nats
        escape_sed() {
          printf '%s' "$$1" | sed 's/[\/&|]/\\&/g'
        }
        # Keep the shared config writable by the Admin UI user (UID/GID 10001) after NATS restarts.
        tmp_nats_conf="$(mktemp /etc/nats/.nats.conf.XXXXXX)"
        trap 'rm -f "$$tmp_nats_conf"' EXIT
        cat > /tmp/nats.conf.template <<'EOF'
        jetstream {
          store_dir: /data
        }
        # Monitor endpoint: nats-server shipped with no HTTP monitor
        # listening (no http_port set), so the Docker healthcheck below and
        # Netdata's go.d NATS collector both saw a hard connection refused
        # against :8222 on every attempt -- not a timing issue, the port
        # simply never opened. Verified live against this pinned image
        # (nats-server 2.14.3): once set, /healthz and /varz answer
        # immediately after "Server is ready". Only reachable from other
        # containers on this compose network -- not published to the host --
        # and carries no secrets of its own (nats-server's monitor endpoint
        # has no built-in auth).
        http_port: 8222
        # Central logging pipeline (#633): nats-server logs to exactly one
        # destination -- setting this disables stdout for the process
        # lifetime (no dual-output mode exists, unlike Kea's
        # "output-options" array), so `docker logs` on this container goes
        # quiet while the `logging` compose profile is active; fluent-bit
        # tails this file instead. Since issue #811 this entrypoint's nats.conf
        # is the SOLE governor of log_file: the Admin UI now writes only the
        # auth_callout.conf fragment (which carries no log_file directive), so
        # this literal value -- the same path config.rs's NATS_LOG_FILE
        # defaults to -- is authoritative for the process lifetime.
        log_file: /var/log/lancache-nats/nats.log
        authorization {
          users = [
            {
              user: "__NATS_UI_USER__"
              password: "__NATS_UI_PASSWORD__"
              permissions = {
                publish = ["lancache.dns.record", "lancache.dns.flush"]
              }
            }
            {
              user: "__NATS_DNS_WRITER_USER__"
              password: "__NATS_DNS_WRITER_PASSWORD__"
              permissions = {
                publish = [
                  "lancache.dns.record",
                  "$$JS.API.STREAM.INFO.LANCACHE_DNS",
                  "$$JS.API.STREAM.CREATE.LANCACHE_DNS",
                  "$$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
                  "$$JS.ACK.LANCACHE_DNS.>"
                ]
                subscribe = ["lancache.dns.>", "_INBOX.>"]
              }
            }
            {
              user: "__NATS_DNS_REPLICA_USER__"
              password: "__NATS_DNS_REPLICA_PASSWORD__"
              permissions = {
                publish = [
                  "$$JS.API.STREAM.INFO.LANCACHE_DNS",
                  "$$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
                  "$$JS.ACK.LANCACHE_DNS.>"
                ]
                subscribe = ["lancache.dns.>", "_INBOX.>"]
              }
            }
            {
              # The Admin UI's own auth-callout responder connection identity
              # (services/ui/src/nats_auth_callout.rs). It carries no subject
              # permissions -- it only answers auth-callout requests. It is a
              # STATIC user (not routed through the callout) because the UI's
              # fragment lists it in auth_users, so nats-server checks its
              # password against this list. Must stay in lockstep with the ui
              # service's NATS_CALLOUT_USER/PASSWORD (the same compose vars feed
              # both services below) -- if they ever diverge the responder can't
              # connect and the callout silently fails.
              user: "__NATS_CALLOUT_USER__"
              password: "__NATS_CALLOUT_PASSWORD__"
            }
          ]
          # The auth_callout {} stanza lives in a SEPARATE file that only the
          # Admin UI writes (routes/secondaries.rs::update_nats_conf), because
          # it needs the UI's runtime-generated issuer public key this container
          # can't know. Including it -- rather than embedding it -- is what lets
          # this entrypoint keep regenerating its own static subset above on
          # every restart without ever clobbering the UI's fragment (issue
          # #811). nats-server resolves this path relative to nats.conf's own
          # directory (/etc/nats). The placeholder-creation step below
          # guarantees the target always exists before nats-server starts: a
          # missing include file is a FATAL boot error (verified against
          # nats-server 2.14.3), while an empty one is valid (no callout active
          # yet). `include` inside authorization {} is supported and the
          # included auth_callout goes fully live -- also verified against 2.14.3.
          include "auth_callout.conf"
        }
        EOF
        sed \
          -e "s|__NATS_UI_USER__|$$(escape_sed "$$NATS_UI_USER")|g" \
          -e "s|__NATS_UI_PASSWORD__|$$(escape_sed "$$NATS_UI_PASSWORD")|g" \
          -e "s|__NATS_DNS_WRITER_USER__|$$(escape_sed "$$NATS_DNS_WRITER_USER")|g" \
          -e "s|__NATS_DNS_WRITER_PASSWORD__|$$(escape_sed "$$NATS_DNS_WRITER_PASSWORD")|g" \
          -e "s|__NATS_DNS_REPLICA_USER__|$$(escape_sed "$$NATS_DNS_REPLICA_USER")|g" \
          -e "s|__NATS_DNS_REPLICA_PASSWORD__|$$(escape_sed "$$NATS_DNS_REPLICA_PASSWORD")|g" \
          -e "s|__NATS_CALLOUT_USER__|$$(escape_sed "$$NATS_CALLOUT_USER")|g" \
          -e "s|__NATS_CALLOUT_PASSWORD__|$$(escape_sed "$$NATS_CALLOUT_PASSWORD")|g" \
          /tmp/nats.conf.template > "$$tmp_nats_conf"
        chown 10001:10001 "$$tmp_nats_conf"
        mv "$$tmp_nats_conf" /etc/nats/nats.conf
        trap - EXIT
        # Guarantee the UI-owned auth_callout fragment exists before starting
        # nats-server: a missing `include` target is a FATAL boot error, and on
        # a fresh volume the Admin UI has not written it yet. Create an EMPTY
        # placeholder ONLY when absent (an empty include is valid = no callout
        # yet) so nats-server can boot and the UI can connect as its static user
        # to write the real fragment. NEVER overwrite an existing one: once the
        # UI has written the real auth_callout {} block, every subsequent
        # restart re-runs this script and must leave that fragment untouched, or
        # we reintroduce issue #811's clobber.
        if [ ! -e /etc/nats/auth_callout.conf ]; then
          : > /etc/nats/auth_callout.conf
          chown 10001:10001 /etc/nats/auth_callout.conf
        fi
        exec nats-server -c /etc/nats/nats.conf
    volumes:
      # Shared-secret bootstrap (#858): first-writer-wins NATS_*_PASSWORD, plus the
      # canonical helper sourced by the command block above (mounted read-only).
      - shared-secrets:/var/lib/lancache-secrets
      - ../../scripts/lib/shared-secret-bootstrap.sh:/usr/local/lib/shared-secret-bootstrap.sh:ro
      - nats-data:/data
      - nats-conf:/etc/nats
      - ../../services/nats/nats.conf:/nats-default.conf:ro
      # Central logging pipeline (#633): this entrypoint's nats.conf sets
      # `log_file: /var/log/lancache-nats/nats.log` (the UI's auth_callout.conf
      # fragment carries no log_file since issue #811); fluent-bit tails it.
      - nats-logs:/var/log/lancache-nats
    environment:
      - NATS_UI_USER=${NATS_UI_USER:-lancache-ui}
      - NATS_UI_PASSWORD=${NATS_UI_PASSWORD:-lancache-nats-ui-dev-secret}
      - NATS_DNS_WRITER_USER=${NATS_DNS_WRITER_USER:-lancache-dns-writer}
      - NATS_DNS_WRITER_PASSWORD=${NATS_DNS_WRITER_PASSWORD:-lancache-nats-writer-dev-secret}
      - NATS_DNS_REPLICA_USER=${NATS_DNS_REPLICA_USER:-lancache-dns-replica}
      - NATS_DNS_REPLICA_PASSWORD=${NATS_DNS_REPLICA_PASSWORD:-lancache-nats-replica-dev-secret}
      # The auth-callout responder's static bypass identity. MUST match the ui
      # service's NATS_CALLOUT_USER/PASSWORD (same compose vars + defaults):
      # the ui process connects the responder with these creds and nats-server
      # authenticates it against the static user this entrypoint writes above
      # (issue #811 / #583).
      - NATS_CALLOUT_USER=${NATS_CALLOUT_USER:-lancache-nats-callout}
      - NATS_CALLOUT_PASSWORD=${NATS_CALLOUT_PASSWORD:-lancache-nats-callout-dev-secret}
    healthcheck:
      # Real HTTP probe against the monitor endpoint (http_port: 8222 in the
      # entrypoint above), not just a bare TCP connect -- proves nats-server's
      # HTTP monitor is actually answering, not merely that something is
      # listening on the port. Uses wget (BusyBox), not curl: verified
      # empirically that nats:2-alpine ships BusyBox's wget/nc but no curl.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8222/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      lancache:
        ipv4_address: 172.28.0.8
    restart: unless-stopped

  # ── Log collector (#453; optional, start with: docker compose --profile logging up) ──
  # Tails the proxy access log into two independent pipelines: a local
  # plain-text file (kept for Netdata's web_log parser) and a forward to the
  # central syslog-ng receiver below. Config is passed as CLI flags (not a
  # bind-mounted or generated file) because this image ships no shell at all
  # (distroless-style), and because quickstart has no local repo checkout to
  # bind-mount a config file from -- CLI flags are the one delivery mechanism
  # that works identically across dev/prod/quickstart.
