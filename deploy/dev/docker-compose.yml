# lancache-ng (https://github.com/wiki-mod/lancache-ng)
#
# Local development stack: proxy, DNS, DHCP, Admin UI, and supporting
# services (NATS, docker-socket-proxy) wired up with dev-sized defaults
# (small cache volume, offset DNS ports, query logging on). See CLAUDE.md's
# "Dev vs Prod Split" for the differences from deploy/prod.

name: lancache-ng

x-docker-socket-proxy-command: &docker-socket-proxy-command |
  cat > /tmp/lancache-haproxy.cfg <<'EOF'
  # Docker exec and generic container creation are intentionally banned here:
  # the Admin UI and watchdog only need narrowly scoped lifecycle operations for
  # known lancache-ng containers. A compromised UI should not gain a general
  # Docker API that can create privileged containers or attach to unrelated
  # workloads on the host.
  global
      log stdout format raw daemon info
      pidfile /run/haproxy.pid
      maxconn 4000

  defaults
      mode http
      log global
      option httplog
      option dontlognull
      option http-server-close
      timeout http-request 10s
      timeout connect 10s
      timeout client 10m
      timeout server 10m

  backend dockerbackend
      server dockersocket /var/run/docker.sock

  frontend dockerfrontend
      bind [::]:2375 v4v6
      # Permit only Docker daemon health/version checks plus a small set of
      # container operations for fixed lancache-ng container names.
      acl safe_get method GET
      acl safe_head method HEAD
      acl safe_post method POST
      acl safe_ping path,url_dec -m reg -i ^(/v[0-9.]+)?/_ping$
      acl safe_version path,url_dec -m reg -i ^(/v[0-9.]+)?/version$
      acl docker_container_path path,url_dec -m reg -i ^(/v[0-9.]+)?/containers/
      acl lancache_container path,url_dec -m reg -i ^(/v[0-9.]+)?/containers/(lancache-proxy|lancache-dns-standard|lancache-dns-ssl|lancache-dhcp|lancache-dhcp-proxy|lancache-dhcp-probe|lancache-nats)(/|$)
      acl safe_container_inspect path,url_dec -m reg -i ^(/v[0-9.]+)?/containers/(lancache-proxy|lancache-dns-standard|lancache-dns-ssl|lancache-dhcp|lancache-dhcp-proxy|lancache-dhcp-probe|lancache-nats)/json$
      acl safe_container_logs path,url_dec -m reg -i ^(/v[0-9.]+)?/containers/lancache-dhcp-probe/logs$
      acl safe_service_restart path,url_dec -m reg -i ^(/v[0-9.]+)?/containers/(lancache-proxy|lancache-dns-standard|lancache-dns-ssl|lancache-nats)/restart$
      acl safe_dhcp_action path,url_dec -m reg -i ^(/v[0-9.]+)?/containers/(lancache-dhcp|lancache-dhcp-proxy)/(start|stop)$
      acl safe_probe_action path,url_dec -m reg -i ^(/v[0-9.]+)?/containers/lancache-dhcp-probe/(start|stop|wait)$
      http-request allow if safe_get safe_ping
      http-request allow if safe_head safe_ping
      http-request allow if safe_get safe_version
      http-request allow if safe_get safe_container_inspect
      http-request allow if safe_get safe_container_logs
      http-request allow if safe_post safe_service_restart
      http-request allow if safe_post safe_dhcp_action
      http-request allow if safe_post safe_probe_action
      http-request deny if docker_container_path !lancache_container
      http-request deny
      default_backend dockerbackend
  EOF
  exec haproxy -f /tmp/lancache-haproxy.cfg

services:

  # ── Unified proxy (standard + SSL mode in one container) ─────────────────
  # Port 80: HTTP caching (shared cache for both modes)
  # Port 8443 (standard): SNI passthrough to real CDN (no client cert needed)
  # Port 443 (SSL): HTTPS caching via TLS interception (CA cert required)
  proxy:
    container_name: lancache-proxy
    build:
      context: ../../services/proxy
      # Bakes in a build-time snapshot of the DNS domain list as a fallback
      # default for deployments that never mount a live cdn-domains.txt (see
      # deploy/quickstart, which pulls a pre-built image with no local repo
      # checkout to bind-mount from). dev/prod always shadow this baked
      # default with the live bind-mount below at container start.
      additional_contexts:
        - dns-domains=../../services/dns
    env_file:
      - ../../config/dev/proxy.env
    environment:
      - IP_STANDARD=${IP_STANDARD}
      - IP_SSL=${IP_SSL}
      - SSL_ENABLED=${SSL_ENABLED:-1}
    volumes:
      - ../../certs:/etc/nginx/ssl/ca
      - ../../services/dns/cdn-domains.txt:/etc/nginx/cdn-domains.txt
      # Dev also uses one shared proxy cache volume so it exercises the same
      # single-CACHE_DIR behavior as prod/quickstart.
      - proxy-cache:/var/cache/nginx/lancache
      - proxy-logs:/var/log/nginx
      # Known-good nginx config snapshots (#415): must be a persistent,
      # service-owned volume, not the ephemeral container layer, so
      # rollback survives container restarts/recreates.
      - proxy-config-snapshots:/var/lib/lancache-proxy
    ports:
      - "${IP_STANDARD}:8080:80"    # use port 8080 in dev to avoid conflicts
      - "${IP_STANDARD}:8443:8443"  # standard mode SNI passthrough
      - "${IP_SSL}:80:80"
      - "${IP_SSL}:443:443"         # SSL mode TLS interception
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1/healthz >/dev/null && { [ \"$${SSL_ENABLED:-0}\" != \"1\" ] || curl -ksf https://127.0.0.1/healthz >/dev/null; }"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      lancache:
        ipv4_address: 172.28.0.2
    restart: unless-stopped

  dns-standard:
    container_name: lancache-dns-standard
    build:
      context: ../../services/dns
    env_file:
      - ../../config/dev/dns-standard.env
    environment:
      - PDNS_API_KEY=${PDNS_API_KEY:-lancache-pdns-dev-secret}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
      - NATS_URL=nats://nats:4222
      - NATS_USER=${NATS_DNS_WRITER_USER:-lancache-dns-writer}
      - NATS_PASSWORD=${NATS_DNS_WRITER_PASSWORD:-lancache-nats-writer-dev-secret}
      - NATS_CONSUMER=dns-standard
      - NATS_RECONCILER=1
    volumes:
      - ../../services/dns/cdn-domains.txt:/etc/pdns/cdn-domains.txt
      - pdns-data-standard:/var/lib/powerdns
      - pdns-filter-state:/var/lib/powerdns-state
    ports:
      # NOTE (Windows): Port 53 is used by the Windows DNS client.
      # Stop "DNS Client" in services.msc, or test the proxy directly:
      #   curl --resolve steamcontent.com:8080:127.0.0.1 http://steamcontent.com/
      - "${IP_STANDARD}:5300:53/udp"   # port 5300 in dev to avoid conflicts
      - "${IP_STANDARD}:5300:53/tcp"
    expose:
      - "8081"
      - "8082"
    healthcheck:
      test: ["CMD-SHELL", "rec_control ping && ss -lnu | grep -q ':53 '"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      lancache:
        ipv4_address: 172.28.0.3
    depends_on:
      - nats
    restart: unless-stopped

  dns-ssl:
    container_name: lancache-dns-ssl
    build:
      context: ../../services/dns
    env_file:
      - ../../config/dev/dns-ssl.env
    environment:
      - PDNS_API_KEY=${PDNS_API_KEY:-lancache-pdns-dev-secret}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
      - NATS_URL=nats://nats:4222
      - NATS_USER=${NATS_DNS_READER_USER:-lancache-dns-reader}
      - NATS_PASSWORD=${NATS_DNS_READER_PASSWORD:-lancache-nats-reader-dev-secret}
      - NATS_CONSUMER=dns-ssl
    volumes:
      - ../../services/dns/cdn-domains.txt:/etc/pdns/cdn-domains.txt
      - pdns-data-ssl:/var/lib/powerdns
      - pdns-filter-state:/var/lib/powerdns-state
    ports:
      - "${IP_SSL}:5353:53/udp"
      - "${IP_SSL}:5353:53/tcp"
    expose:
      - "8081"
      - "8082"
    healthcheck:
      test: ["CMD-SHELL", "rec_control ping && ss -lnu | grep -q ':53 '"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      lancache:
        ipv4_address: 172.28.0.5
    depends_on:
      - nats
    restart: unless-stopped

  # ── Watchdog (health monitor, auto-restart, purge cron) ──────────────────
  # socket-proxy limits Docker access to Admin UI/watchdog operations. The
  # custom HAProxy config above replaces Tecnativa's broad CONTAINERS/POST
  # toggles with a deny-by-default allowlist for named lancache-ng containers.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    entrypoint: ["/usr/local/bin/lancache-docker-socket-proxy.sh"]
    command: []
    stdin_open: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../../scripts/docker-socket-proxy.sh:/usr/local/bin/lancache-docker-socket-proxy.sh:ro
    networks:
      - docker-api
    restart: unless-stopped

  watchdog:
    build:
      context: ../../services/watchdog
    env_file:
      - ../../config/dev/watchdog.env
    volumes:
      # Watchdog validates the unified cache path in dev; it should not grow a
      # second standard/ssl split-cache convention.
      - proxy-cache:/var/cache/lancache
      - watchdog-status:/var/run/watchdog
    depends_on:
      - docker-socket-proxy
    networks:
      - lancache
      - docker-api
    restart: unless-stopped

  # ── DHCP Server (Kea) ─────────────────────────────────────────────────────
  # Full DHCP server with REST API control
  dhcp:
    container_name: lancache-dhcp
    build:
      context: ../../services/dhcp
    profiles:
      - dhcp-kea
    env_file:
      - ../../config/dev/dhcp.env
    environment:
      - DHCP_DNS_PRIMARY=${IP_STANDARD}
      - DHCP_DNS_SECONDARY=${IP_SSL}
      - DHCP_DNS_SERVER_IP=172.28.0.3
      - DHCP_DNS_SERVER_IP_SSL=${IP_SSL}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY}
      - KEA_CTRL_TOKEN=${KEA_CTRL_TOKEN}
      - DHCP_MODE=${DHCP_MODE:-disabled}
    volumes:
      - kea-data:/var/lib/kea    # runtime config + leases persist across restarts
    ports:
      - "67:67/udp"      # DHCP
      - "127.0.0.1:8000:8000"  # Kea Control Agent API (localhost only in dev)
    cap_add:
      - NET_ADMIN
    networks:
      lancache:
        ipv4_address: 172.28.0.6
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          host="$${KEA_CTRL_HOST:-127.0.0.1}";
          [ "$$host" = "0.0.0.0" ] && host=127.0.0.1;
          curl -sf -u admin:$${KEA_CTRL_TOKEN}
          -H 'Content-Type: application/json'
          -d '{"command":"config-get","service":["dhcp4"]}'
          "http://$$host:8000/" | jq -e '.[0].result == 0' >/dev/null
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped


  # ── DHCP Proxy (dnsmasq) ──────────────────────────────────────────────────
  # Proxy mode: sits next to an existing DHCP server and serves proxy-DHCP/PXE clients.
  # Mutually exclusive with Kea mode (both want port 67/udp).
  # Activate with: docker compose --profile dhcp-proxy up
  dhcp-proxy:
    container_name: lancache-dhcp-proxy
    build:
      context: ../../services/dhcp-proxy
    env_file:
      - ../../config/dev/dhcp-proxy.env
    volumes:
      - ui-data:/data:ro
      # Known-good dnsmasq config snapshots (#415): persistent, service-owned
      # volume so rollback survives container restarts/recreates.
      - dhcp-proxy-config-snapshots:/var/lib/lancache-dhcp-proxy
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    profiles:
      - dhcp-proxy
    restart: unless-stopped

  # ── DHCP conflict probe ────────────────────────────────────────────────────
  # Predeclared start/stop/wait helper for the Admin UI's "check for other
  # DHCP servers" feature. Reuses the UI image (already has nmap and dhclient
  # installed). The Admin UI stops then starts this container on demand and
  # reads its output — it never creates or removes it — so the narrowed
  # docker-socket-proxy only needs to permit start/restart, the same capability
  # class already used for the NATS and proxy-ssl reload flows, not generic
  # container creation.
  dhcp-probe:
    container_name: lancache-dhcp-probe
    build:
      context: ../../services/ui
    entrypoint: ["/usr/local/bin/dhcp-probe.sh"]
    network_mode: host
    restart: "no"

  # ── NATS (message bus for DNS record sync) ────────────────────────────────
  nats:
    container_name: lancache-nats
    image: nats:2-alpine@sha256:c11af972c99ae542de8925e6a7d9c533aa1eb039660420d2074beed6089b3bf0
    # On every start: generate nats.conf from this container's own credentials
    # into the shared volume, chown it back to the Admin UI user, then exec
    # nats-server. In the v0.1.0 shared-token model the UI writes the same
    # shared config and restarts this service to reload it; regenerating here
    # keeps full recreates with rotated .env credentials convergent.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /etc/nats
        escape_sed() {
          printf '%s' "$$1" | sed 's/[\/&|]/\\&/g'
        }
        # Keep the shared config writable by the Admin UI user (UID/GID 10001) after NATS restarts.
        tmp_nats_conf="$(mktemp /etc/nats/.nats.conf.XXXXXX)"
        trap 'rm -f "$$tmp_nats_conf"' EXIT
        cat > /tmp/nats.conf.template <<'EOF'
        jetstream {
          store_dir: /data
        }
        authorization {
          users = [
            {
              user: "__NATS_UI_USER__"
              password: "__NATS_UI_PASSWORD__"
              permissions = {
                publish = ["lancache.dns.record", "lancache.dns.flush"]
              }
            }
            {
              user: "__NATS_DNS_WRITER_USER__"
              password: "__NATS_DNS_WRITER_PASSWORD__"
              permissions = {
                publish = [
                  "lancache.dns.record",
                  "$$JS.API.STREAM.INFO.LANCACHE_DNS",
                  "$$JS.API.STREAM.CREATE.LANCACHE_DNS",
                  "$$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
                  "$$JS.ACK.LANCACHE_DNS.>"
                ]
                subscribe = ["lancache.dns.>", "_INBOX.>"]
              }
            }
            {
              user: "__NATS_DNS_READER_USER__"
              password: "__NATS_DNS_READER_PASSWORD__"
              permissions = {
                publish = [
                  "$$JS.API.STREAM.INFO.LANCACHE_DNS",
                  "$$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
                  "$$JS.ACK.LANCACHE_DNS.>"
                ]
                subscribe = ["lancache.dns.>", "_INBOX.>"]
              }
            }
          ]
        }
        EOF
        sed \
          -e "s|__NATS_UI_USER__|$$(escape_sed "$$NATS_UI_USER")|g" \
          -e "s|__NATS_UI_PASSWORD__|$$(escape_sed "$$NATS_UI_PASSWORD")|g" \
          -e "s|__NATS_DNS_WRITER_USER__|$$(escape_sed "$$NATS_DNS_WRITER_USER")|g" \
          -e "s|__NATS_DNS_WRITER_PASSWORD__|$$(escape_sed "$$NATS_DNS_WRITER_PASSWORD")|g" \
          -e "s|__NATS_DNS_READER_USER__|$$(escape_sed "$$NATS_DNS_READER_USER")|g" \
          -e "s|__NATS_DNS_READER_PASSWORD__|$$(escape_sed "$$NATS_DNS_READER_PASSWORD")|g" \
          /tmp/nats.conf.template > "$$tmp_nats_conf"
        chown 10001:10001 "$$tmp_nats_conf"
        mv "$$tmp_nats_conf" /etc/nats/nats.conf
        trap - EXIT
        exec nats-server -c /etc/nats/nats.conf
    volumes:
      - nats-data:/data
      - nats-conf:/etc/nats
      - ../../services/nats/nats.conf:/nats-default.conf:ro
    environment:
      - NATS_UI_USER=${NATS_UI_USER:-lancache-ui}
      - NATS_UI_PASSWORD=${NATS_UI_PASSWORD:-lancache-nats-ui-dev-secret}
      - NATS_DNS_WRITER_USER=${NATS_DNS_WRITER_USER:-lancache-dns-writer}
      - NATS_DNS_WRITER_PASSWORD=${NATS_DNS_WRITER_PASSWORD:-lancache-nats-writer-dev-secret}
      - NATS_DNS_READER_USER=${NATS_DNS_READER_USER:-lancache-dns-reader}
      - NATS_DNS_READER_PASSWORD=${NATS_DNS_READER_PASSWORD:-lancache-nats-reader-dev-secret}
    networks:
      lancache:
        ipv4_address: 172.28.0.8
    restart: unless-stopped

  # ── Log collector (#453; optional, start with: docker compose --profile logging up) ──
  # Tails the proxy access log into two independent pipelines: a local
  # plain-text file (kept for Netdata's web_log parser) and a forward to the
  # central syslog-ng receiver below. Config is generated inline (not
  # bind-mounted) so quickstart -- which has no local repo checkout to
  # bind-mount from -- runs the exact same fluent-bit behavior as dev/prod.
  syslog:
    image: cr.fluentbit.io/fluent/fluent-bit:3.2.10@sha256:d6dec000c4929a439562525728c708f6e99800d7ddc82efd6aa4f45f3a20b562
    profiles: [logging]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /fluent-bit/etc
        cat > /fluent-bit/etc/fluent-bit.conf <<'EOF'
        [SERVICE]
            Flush         5
            Daemon        Off
            Log_Level     warn
            storage.path  /data/flb-storage

        [INPUT]
            Name          tail
            Path          /var/log/nginx/access.log
            Tag           nginx.file
            DB            /data/flb-proxy-file.db
            Skip_Long_Lines On

        [INPUT]
            Name          tail
            Path          /var/log/nginx/access.log
            Tag           nginx.syslog
            DB            /data/flb-proxy-syslog.db
            Skip_Long_Lines On

        [FILTER]
            Name          record_modifier
            Match         nginx.syslog
            Record        host lancache-proxy
            Record        ident nginx-access

        [OUTPUT]
            Name          file
            Match         nginx.file
            Path          /var/log/lancache
            File          nginx-proxy.log
            Format        template
            Template      {log}

        [OUTPUT]
            Name                 syslog
            Match                nginx.syslog
            Host                 syslog-ng
            Port                 601
            Mode                 tcp
            Syslog_Format        rfc5424
            Syslog_Hostname_key  host
            Syslog_Appname_key   ident
            Syslog_Message_key   log
        EOF
        exec /fluent-bit/bin/fluent-bit -c /fluent-bit/etc/fluent-bit.conf
    volumes:
      - proxy-logs:/var/log/nginx:ro
      - logs:/var/log/lancache
      - syslog-data:/data
    depends_on:
      - syslog-ng
    networks:
      - lancache
    restart: unless-stopped

  # ── Central log receiver (#453; optional, start with: docker compose --profile logging up) ──
  # Receives forwarded logs from the `syslog` (fluent-bit) service above over
  # TCP/601 (RFC 5424, plain LF framing -- what fluent-bit's syslog output
  # sends by default) and writes them per-source, per-day under
  # logs-syslog-ng. Config and the rotation/compression loop are generated
  # inline for the same reason as fluent-bit above.
  syslog-ng:
    image: balabit/syslog-ng:latest@sha256:78ad81d617f83e46bf6fa9f45d5c437a841464be5e1cddfda2745e01e87dd335
    profiles: [logging]
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        mkdir -p /etc/syslog-ng
        cat > /etc/syslog-ng/syslog-ng.conf <<'EOF'
        @version: 4.8

        options {
            time-reap(30);
            mark-freq(10);
            keep-hostname(yes);
            create-dirs(yes);
            dir-perm(0750);
            perm(0640);
        };

        source s_forwarders {
            network(transport(tcp) port(601) flags(syslog-protocol));
        };

        destination d_lancache {
            file(
                "/var/log/lancache-syslog-ng/$${HOST}/$${YEAR}$${MONTH}$${DAY}.log"
                template("$$ISODATE $$HOST $$PROGRAM: $$MSGONLY\n")
                create-dirs(yes)
            );
        };

        log { source(s_forwarders); destination(d_lancache); };
        EOF
        # Size-bounded rotation + zstd high-compression (#453): every
        # SYSLOG_NG_ROTATE_INTERVAL_SECONDS, rotate any active log file once it
        # exceeds SYSLOG_MAX_FILE_MB, signal syslog-ng to reopen the (now
        # recreated) destination file, then compress the rotated file with
        # zstd -T0 (all cores) at SYSLOG_COMPRESSION_LEVEL. Falls back to gzip
        # if zstd cannot be installed (e.g. no network egress at startup), so
        # rotation/compression degrades gracefully instead of failing hard.
        # This is a fixed-threshold baseline, not the full SYSLOG_MAX_GB /
        # SYSLOG_RETENTION_DAYS size-priority budget engine -- see follow-up #633.
        (
          if ! command -v zstd >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y --no-install-recommends zstd >/dev/null 2>&1 || true
          fi
          while true; do
            sleep "$${SYSLOG_NG_ROTATE_INTERVAL_SECONDS:-300}"
            find /var/log/lancache-syslog-ng -type f -name '*.log' -size +"$${SYSLOG_MAX_FILE_MB:-100}"M 2>/dev/null | while read -r f; do
              ts="$$(date -u +%Y%m%dT%H%M%SZ)"
              mv "$$f" "$${f}.$${ts}"
              kill -HUP 1 2>/dev/null || true
              if command -v zstd >/dev/null 2>&1; then
                zstd -q -T0 "-$${SYSLOG_COMPRESSION_LEVEL:-19}" --rm "$${f}.$${ts}" 2>/dev/null || true
              else
                gzip "$${f}.$${ts}" 2>/dev/null || true
              fi
            done
          done
        ) &
        exec /usr/local/bin/entrypoint.sh
    environment:
      - SYSLOG_MAX_FILE_MB=${SYSLOG_MAX_FILE_MB:-100}
      - SYSLOG_COMPRESSION_LEVEL=${SYSLOG_COMPRESSION_LEVEL:-19}
      - SYSLOG_NG_ROTATE_INTERVAL_SECONDS=${SYSLOG_NG_ROTATE_INTERVAL_SECONDS:-300}
    volumes:
      - logs-syslog-ng:/var/log/lancache-syslog-ng
    healthcheck:
      test: ["CMD-SHELL", "syslog-ng-ctl healthcheck --timeout 5"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - lancache
    restart: unless-stopped

  # ── Admin UI ──────────────────────────────────────────────────────────────
  ui:
    build:
      context: ../../services/ui
    volumes:
      - ui-data:/data
      - ../../services/dns/cdn-domains.txt:/data/cdn-domains.txt
      - proxy-logs:/var/log/nginx:ro
      # Read-only cache view used for dashboard size reporting.
      - proxy-cache:/var/cache/proxy:ro
      - pdns-filter-state:/var/lib/powerdns-state
      - nats-conf:/etc/nats          # shared with NATS: UI writes nats.conf here
    ports:
      - "9090:8080"
    environment:
      - DOCKER_PROXY_URL=http://docker-socket-proxy:2375
      - DNS_STANDARD_SERVICE=dns-standard
      - DNS_SSL_SERVICE=dns-ssl
      - PROXY_SERVICE=proxy
      - SSL_ENABLED=${SSL_ENABLED:-1}
      - PROXY_STANDARD_URL=http://proxy
      - PROXY_SSL_URL=http://proxy
      - PROXY_SSL_SERVICE=proxy
      - STANDARD_LOG=/var/log/nginx/access.log
      - SSL_LOG=/var/log/nginx/access.log
      - CACHE_DIR=/var/cache/proxy
      - NETDATA_URL=http://netdata:19999
      - CACHE_MAX_GB=10
      - STANDARD_IP=${IP_STANDARD}
      - SSL_IP=${IP_SSL}
      - DNS_STANDARD_STATE_DIR=/var/lib/powerdns-state
      - DNS_SSL_STATE_DIR=/var/lib/powerdns-state
      - LANCACHE_IMAGE_REGISTRY=${LANCACHE_IMAGE_REGISTRY:-ghcr.io}
      - LANCACHE_IMAGE_PREFIX=${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}
      - LANCACHE_IMAGE_CHANNEL=${LANCACHE_IMAGE_CHANNEL:-dev}
      - LANCACHE_IMAGE_TAG=${LANCACHE_IMAGE_TAG:-dev}
      - UI_AUTH_USER=${UI_AUTH_USER:-}
      - UI_AUTH_PASSWORD=${UI_AUTH_PASSWORD:-}
      - ALLOW_INSECURE_UI=${ALLOW_INSECURE_UI:-false}
      - UI_SESSION_TTL_SECONDS=${UI_SESSION_TTL_SECONDS:-86400}
      - DHCP_MODE=${DHCP_MODE:-disabled}
      - DHCP_API_URL=http://dhcp:8000
      - DHCP_API_TOKEN=${KEA_CTRL_TOKEN}
      - PDNS_AUTH_URL=http://dns-standard:8081
      - PDNS_REC_URL=http://dns-standard:8082
      - PDNS_API_KEY=${PDNS_API_KEY:-lancache-pdns-dev-secret}
      - NATS_URL=nats://nats:4222
      - NATS_UI_USER=${NATS_UI_USER:-lancache-ui}
      - NATS_UI_PASSWORD=${NATS_UI_PASSWORD:-lancache-nats-ui-dev-secret}
      - NATS_DNS_WRITER_USER=${NATS_DNS_WRITER_USER:-lancache-dns-writer}
      - NATS_DNS_WRITER_PASSWORD=${NATS_DNS_WRITER_PASSWORD:-lancache-nats-writer-dev-secret}
      - NATS_DNS_READER_USER=${NATS_DNS_READER_USER:-lancache-dns-reader}
      - NATS_DNS_READER_PASSWORD=${NATS_DNS_READER_PASSWORD:-lancache-nats-reader-dev-secret}
      - SECONDARY_REGISTRATION_TOKEN=${SECONDARY_REGISTRATION_TOKEN:-lancache-reg-dev-secret}
    networks:
      - lancache
      - docker-api
    depends_on:
      - docker-socket-proxy
      - proxy
      - netdata
      - nats
    restart: unless-stopped

  # ── Netdata (system metrics backend, kein externer Port) ──────────────────
  netdata:
    image: netdata/netdata@sha256:a130dbbf3d6e6a5472efdebaa123797190a5822627e908106d34edae02bc8a74
    hostname: lancache-netdata
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - logs:/var/log/lancache:ro
      - ../../services/syslog/netdata-web_log.conf:/etc/netdata/go.d/web_log.conf:ro
    networks:
      - lancache
    restart: unless-stopped

networks:
  lancache:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
  docker-api:
    internal: true

volumes:
  proxy-cache:
  proxy-logs:
  # Known-good config snapshots (#415), one persistent volume per adapter.
  proxy-config-snapshots:
  dhcp-proxy-config-snapshots:
  watchdog-status:
  kea-data:
  nats-data:
  nats-conf:
  netdataconfig:
  netdatalib:
  netdatacache:
  pdns-data-standard:
  pdns-data-ssl:
  pdns-filter-state:
  logs:
  syslog-data:
  logs-syslog-ng:
  ui-data:
