# lancache-ng (https://github.com/wiki-mod/lancache-ng)
#
# LanCache-NG — Quickstart (no repo clone needed)
#
# Prerequisites:
#   1. Run setup.sh — configures .env and starts everything automatically
#      Or manually:
#   2. Edit .env: adjust IPs and the shared cache path
#   3. Create the cache directory:
#        mkdir -p /opt/lancache-ng/cache
#   4. (optional) Add second LAN IP:
#        ip addr add 192.168.234.11/24 dev eth0
#   5. Start:
#        docker compose pull && docker compose up -d
#   6. Get CA certificate for SSL mode (after first start):
#        ./certs/ca.crt → install on clients (docs: github.com/wiki-mod/lancache-ng)
#
# Customize domain lists: via Admin UI (port 8080) or
# mount custom files (see deploy/prod/docker-compose.yml in repo).

name: lancache-ng

# The Docker socket proxy's HAProxy allowlist lives in exactly one place,
# scripts/docker-socket-proxy.sh (mounted read-only below), which is the
# canonical source per docs/naming-conventions.md. This file used to also
# carry an unreferenced x-docker-socket-proxy-command YAML anchor with a
# near-duplicate copy of that same config -- it was never aliased anywhere
# (dead weight that could silently drift from the real script with no
# functional effect) and has been removed.

services:

  # ── Unified proxy (standard + SSL mode in one container) ─────────────────
  proxy:
    container_name: lancache-proxy
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/proxy:${LANCACHE_IMAGE_TAG:-latest}
    environment:
      - CACHE_MAX_SIZE=${CACHE_MAX_SIZE}
      - CACHE_MEM_MB=${CACHE_MEM_MB}
      - CACHE_INACTIVE=${CACHE_INACTIVE}
      - CACHE_SLICE_SIZE=${CACHE_SLICE_SIZE}
      - CACHE_VALID_HIT=${CACHE_VALID_HIT}
      - CACHE_VALID_ANY=${CACHE_VALID_ANY}
      - IP_STANDARD=${IP_STANDARD}
      - IP_SSL=${IP_SSL}
      - SSL_ENABLED=${SSL_ENABLED:-0}
      - NGINX_UPSTREAM_RESOLVER=${NGINX_UPSTREAM_RESOLVER}
      - PROXY_SECURITY_MODE=${PROXY_SECURITY_MODE:-lazy}
      - PROXY_ALLOWED_CLIENT_CIDRS=${PROXY_ALLOWED_CLIENT_CIDRS:-}
      - KEEP_KNOWN_GOOD_CONFIGS=${KEEP_KNOWN_GOOD_CONFIGS:-3}
    volumes:
      - ./certs:/etc/nginx/ssl/ca
      # One host cache directory is mounted into the unified proxy. Older
      # standard/ssl split-cache installs must be migrated before using this stack.
      - ${CACHE_DIR:?CACHE_DIR is required}:/var/cache/nginx/lancache
      - proxy-logs:/var/log/nginx
      # Known-good nginx config snapshots (#415): persistent, service-owned
      # volume so rollback survives container restarts/recreates.
      - proxy-config-snapshots:/var/lib/lancache-proxy
    ports:
      - "${IP_STANDARD}:80:80"
      - "${IP_STANDARD}:443:8443"
      - "${IP_SSL:-127.0.0.1}:80:80"
      - "${IP_SSL:-127.0.0.1}:443:443"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1/healthz >/dev/null && { [ \"$${SSL_ENABLED:-0}\" != \"1\" ] || curl -ksf https://127.0.0.1/healthz >/dev/null; }"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  nats:
    container_name: lancache-nats
    image: nats:2-alpine@sha256:c11af972c99ae542de8925e6a7d9c533aa1eb039660420d2074beed6089b3bf0
    # Boot-time job (idempotent, safely re-run on every start/restart):
    # regenerate ONLY this container's own static half of the config --
    # nats.conf with jetstream, log_file, and the four static roles (UI,
    # DNS-writer, DNS-replica, and the Admin UI's auth-callout responder user)
    # -- from the NATS_* env below, chown it back to the Admin UI user, then
    # exec nats-server. The auth_callout {} stanza is deliberately NOT written
    # here: it needs the Admin UI's runtime-generated issuer public key this
    # container cannot know. Instead nats.conf `include`s a separate
    # auth_callout.conf fragment that ONLY the Admin UI writes
    # (services/ui/src/routes/secondaries.rs::update_nats_conf; see
    # services/ui/src/nats_auth_callout.rs for the full flow, issue #583).
    #
    # This split is the whole point of issue #811's fix: regenerating the
    # static subset on every restart is now safe because it never touches the
    # UI's fragment -- exactly the convergence discipline pdns/kea/nginx/
    # dhcp-proxy already follow. Previously this entrypoint wrote the WHOLE
    # config unconditionally, so the Admin UI's restart -- which is REQUIRED to
    # apply auth_callout, since nats-server explicitly refuses to hot-reload it
    # ("config reload not supported for AuthCallout", verified against
    # nats-server 2.14.3) -- re-ran this script and clobbered the UI's
    # auth_callout every single time, permanently breaking the callout. Keeping
    # the static subset here also keeps full recreates with rotated .env
    # credentials convergent even before the UI's first write.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /etc/nats
        mkdir -p /var/log/lancache-nats
        escape_sed() {
          printf '%s' "$$1" | sed 's/[\/&|]/\\&/g'
        }
        # Keep the shared config writable by the Admin UI user (UID/GID 10001) after NATS restarts.
        tmp_nats_conf="$(mktemp /etc/nats/.nats.conf.XXXXXX)"
        trap 'rm -f "$$tmp_nats_conf"' EXIT
        cat > /tmp/nats.conf.template <<'EOF'
        jetstream {
          store_dir: /data
        }
        # Monitor endpoint: nats-server shipped with no HTTP monitor
        # listening (no http_port set), so the Docker healthcheck below and
        # Netdata's go.d NATS collector both saw a hard connection refused
        # against :8222 on every attempt -- not a timing issue, the port
        # simply never opened. Verified live against this pinned image
        # (nats-server 2.14.3): once set, /healthz and /varz answer
        # immediately after "Server is ready". Only reachable from other
        # containers on this compose network -- not published to the host --
        # and carries no secrets of its own (nats-server's monitor endpoint
        # has no built-in auth).
        http_port: 8222
        # Central logging pipeline (#633): nats-server logs to exactly one
        # destination -- setting this disables stdout for the process
        # lifetime (no dual-output mode exists, unlike Kea's
        # "output-options" array), so `docker logs` on this container goes
        # quiet while the `logging` compose profile is active; fluent-bit
        # tails this file instead. Since issue #811 this entrypoint's nats.conf
        # is the SOLE governor of log_file: the Admin UI now writes only the
        # auth_callout.conf fragment (which carries no log_file directive), so
        # this literal value -- the same path config.rs's NATS_LOG_FILE
        # defaults to -- is authoritative for the process lifetime.
        log_file: /var/log/lancache-nats/nats.log
        authorization {
          users = [
            {
              user: "__NATS_UI_USER__"
              password: "__NATS_UI_PASSWORD__"
              permissions = {
                publish = ["lancache.dns.record", "lancache.dns.flush"]
              }
            }
            {
              user: "__NATS_DNS_WRITER_USER__"
              password: "__NATS_DNS_WRITER_PASSWORD__"
              permissions = {
                publish = [
                  "lancache.dns.record",
                  "$$JS.API.STREAM.INFO.LANCACHE_DNS",
                  "$$JS.API.STREAM.CREATE.LANCACHE_DNS",
                  "$$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
                  "$$JS.ACK.LANCACHE_DNS.>"
                ]
                subscribe = ["lancache.dns.>", "_INBOX.>"]
              }
            }
            {
              user: "__NATS_DNS_REPLICA_USER__"
              password: "__NATS_DNS_REPLICA_PASSWORD__"
              permissions = {
                publish = [
                  "$$JS.API.STREAM.INFO.LANCACHE_DNS",
                  "$$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
                  "$$JS.ACK.LANCACHE_DNS.>"
                ]
                subscribe = ["lancache.dns.>", "_INBOX.>"]
              }
            }
            {
              # The Admin UI's own auth-callout responder connection identity
              # (services/ui/src/nats_auth_callout.rs). It carries no subject
              # permissions -- it only answers auth-callout requests. It is a
              # STATIC user (not routed through the callout) because the UI's
              # fragment lists it in auth_users, so nats-server checks its
              # password against this list. Must stay in lockstep with the ui
              # service's NATS_CALLOUT_USER/PASSWORD (the same compose vars feed
              # both services below) -- if they ever diverge the responder can't
              # connect and the callout silently fails.
              user: "__NATS_CALLOUT_USER__"
              password: "__NATS_CALLOUT_PASSWORD__"
            }
          ]
          # The auth_callout {} stanza lives in a SEPARATE file that only the
          # Admin UI writes (routes/secondaries.rs::update_nats_conf), because
          # it needs the UI's runtime-generated issuer public key this container
          # can't know. Including it -- rather than embedding it -- is what lets
          # this entrypoint keep regenerating its own static subset above on
          # every restart without ever clobbering the UI's fragment (issue
          # #811). nats-server resolves this path relative to nats.conf's own
          # directory (/etc/nats). The placeholder-creation step below
          # guarantees the target always exists before nats-server starts: a
          # missing include file is a FATAL boot error (verified against
          # nats-server 2.14.3), while an empty one is valid (no callout active
          # yet). `include` inside authorization {} is supported and the
          # included auth_callout goes fully live -- also verified against 2.14.3.
          include "auth_callout.conf"
        }
        EOF
        sed \
          -e "s|__NATS_UI_USER__|$$(escape_sed "$$NATS_UI_USER")|g" \
          -e "s|__NATS_UI_PASSWORD__|$$(escape_sed "$$NATS_UI_PASSWORD")|g" \
          -e "s|__NATS_DNS_WRITER_USER__|$$(escape_sed "$$NATS_DNS_WRITER_USER")|g" \
          -e "s|__NATS_DNS_WRITER_PASSWORD__|$$(escape_sed "$$NATS_DNS_WRITER_PASSWORD")|g" \
          -e "s|__NATS_DNS_REPLICA_USER__|$$(escape_sed "$$NATS_DNS_REPLICA_USER")|g" \
          -e "s|__NATS_DNS_REPLICA_PASSWORD__|$$(escape_sed "$$NATS_DNS_REPLICA_PASSWORD")|g" \
          -e "s|__NATS_CALLOUT_USER__|$$(escape_sed "$$NATS_CALLOUT_USER")|g" \
          -e "s|__NATS_CALLOUT_PASSWORD__|$$(escape_sed "$$NATS_CALLOUT_PASSWORD")|g" \
          /tmp/nats.conf.template > "$$tmp_nats_conf"
        chown 10001:10001 "$$tmp_nats_conf"
        mv "$$tmp_nats_conf" /etc/nats/nats.conf
        trap - EXIT
        # Guarantee the UI-owned auth_callout fragment exists before starting
        # nats-server: a missing `include` target is a FATAL boot error, and on
        # a fresh volume the Admin UI has not written it yet. Create an EMPTY
        # placeholder ONLY when absent (an empty include is valid = no callout
        # yet) so nats-server can boot and the UI can connect as its static user
        # to write the real fragment. NEVER overwrite an existing one: once the
        # UI has written the real auth_callout {} block, every subsequent
        # restart re-runs this script and must leave that fragment untouched, or
        # we reintroduce issue #811's clobber.
        if [ ! -e /etc/nats/auth_callout.conf ]; then
          : > /etc/nats/auth_callout.conf
          chown 10001:10001 /etc/nats/auth_callout.conf
        fi
        exec nats-server -c /etc/nats/nats.conf
    environment:
      - NATS_UI_USER=${NATS_UI_USER:?NATS_UI_USER is required}
      - NATS_UI_PASSWORD=${NATS_UI_PASSWORD:?NATS_UI_PASSWORD is required}
      - NATS_DNS_WRITER_USER=${NATS_DNS_WRITER_USER:?NATS_DNS_WRITER_USER is required}
      - NATS_DNS_WRITER_PASSWORD=${NATS_DNS_WRITER_PASSWORD:?NATS_DNS_WRITER_PASSWORD is required}
      - NATS_DNS_REPLICA_USER=${NATS_DNS_REPLICA_USER:?NATS_DNS_REPLICA_USER is required}
      - NATS_DNS_REPLICA_PASSWORD=${NATS_DNS_REPLICA_PASSWORD:?NATS_DNS_REPLICA_PASSWORD is required}
      # The auth-callout responder's static bypass identity. MUST match the ui
      # service's NATS_CALLOUT_USER/PASSWORD (same compose vars): the ui process
      # connects the responder with these creds and nats-server authenticates it
      # against the static user this entrypoint writes above (issue #811 / #583).
      - NATS_CALLOUT_USER=${NATS_CALLOUT_USER:?NATS_CALLOUT_USER is required}
      - NATS_CALLOUT_PASSWORD=${NATS_CALLOUT_PASSWORD:?NATS_CALLOUT_PASSWORD is required}
    volumes:
      - nats-data:/data
      - nats-conf:/etc/nats
      # Central logging pipeline (#633): this entrypoint's nats.conf sets
      # `log_file: /var/log/lancache-nats/nats.log` (the UI's auth_callout.conf
      # fragment carries no log_file since issue #811); fluent-bit tails it.
      - nats-logs:/var/log/lancache-nats
    healthcheck:
      # Real HTTP probe against the monitor endpoint (http_port: 8222 in the
      # entrypoint above), not just a bare TCP connect -- proves nats-server's
      # HTTP monitor is actually answering, not merely that something is
      # listening on the port. Uses wget (BusyBox), not curl: verified
      # empirically that nats:2-alpine ships BusyBox's wget/nc but no curl.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8222/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Log collector (#453; optional, start with: docker compose --profile logging up -d) ──
  # Tails the proxy access log into two independent pipelines: a local
  # plain-text file (kept for Netdata's web_log parser) and a forward to the
  # central syslog-ng receiver below. Config is passed as CLI flags because
  # this image ships no shell at all (distroless-style), and because
  # quickstart has no local repo checkout to bind-mount a config file from --
  # CLI flags are the one delivery mechanism that works identically across
  # dev/prod/quickstart.
  syslog:
    container_name: lancache-syslog
    image: cr.fluentbit.io/fluent/fluent-bit:3.2.10@sha256:d6dec000c4929a439562525728c708f6e99800d7ddc82efd6aa4f45f3a20b562
    profiles: [logging]
    command:
      # -H/-P enable fluent-bit's built-in HTTP monitoring server (default
      # bind 0.0.0.0, no separate --listen flag exists -- confirmed via
      # `fluent-bit --help` and a live `/api/v1/health` probe) for operator
      # visibility (e.g. Netdata scraping); NOT the healthcheck mechanism
      # below, which cannot reach it (see the healthcheck block's comment).
      - -H
      - -P
      - "2020"
      - -f
      - "5"
      - -b
      - /data/flb-storage
      - -i
      - tail
      - -p
      - path=/var/log/nginx/access.log
      - -p
      - tag=nginx.file
      - -p
      - db=/data/flb-proxy-file.db
      - -p
      - skip_long_lines=on
      - -i
      - tail
      - -p
      - path=/var/log/nginx/access.log
      - -p
      - tag=nginx.syslog
      - -p
      - db=/data/flb-proxy-syslog.db
      - -p
      - skip_long_lines=on
      - -F
      - record_modifier
      - -m
      - nginx.syslog
      - -p
      - record=host lancache-proxy
      - -p
      - record=ident nginx-access
      - -o
      - file
      - -m
      - nginx.file
      - -p
      - path=/var/log/lancache
      - -p
      - file=nginx-proxy.log
      - -p
      - format=template
      - -p
      - template={log}
      - -o
      - syslog
      - -m
      - nginx.syslog
      - -p
      - host=syslog-ng
      - -p
      - port=601
      - -p
      - mode=tcp
      - -p
      - syslog_format=rfc5424
      - -p
      - syslog_hostname_key=host
      - -p
      - syslog_appname_key=ident
      - -p
      - syslog_message_key=log
      # Proxy remainder (#633): nginx's error.log and stream.log (SNI
      # passthrough logging, standard mode) get the identical dual-pipeline
      # treatment as access.log above -- one local-file copy, one syslog-ng
      # forward -- just with their own path/tag/db/record values so their
      # tail offsets and fluent-bit routing never collide with access.log's.
      - -i
      - tail
      - -p
      - path=/var/log/nginx/error.log
      - -p
      - tag=nginx-error.file
      - -p
      - db=/data/flb-proxy-error-file.db
      - -p
      - skip_long_lines=on
      - -i
      - tail
      - -p
      - path=/var/log/nginx/error.log
      - -p
      - tag=nginx-error.syslog
      - -p
      - db=/data/flb-proxy-error-syslog.db
      - -p
      - skip_long_lines=on
      - -i
      - tail
      - -p
      - path=/var/log/nginx/stream.log
      - -p
      - tag=nginx-stream.file
      - -p
      - db=/data/flb-proxy-stream-file.db
      - -p
      - skip_long_lines=on
      - -i
      - tail
      - -p
      - path=/var/log/nginx/stream.log
      - -p
      - tag=nginx-stream.syslog
      - -p
      - db=/data/flb-proxy-stream-syslog.db
      - -p
      - skip_long_lines=on
      - -F
      - record_modifier
      - -m
      - nginx-error.syslog
      - -p
      - record=host lancache-proxy
      - -p
      - record=ident nginx-error
      - -F
      - record_modifier
      - -m
      - nginx-stream.syslog
      - -p
      - record=host lancache-proxy
      - -p
      - record=ident nginx-stream
      - -o
      - file
      - -m
      - nginx-error.file
      - -p
      - path=/var/log/lancache
      - -p
      - file=nginx-proxy-error.log
      - -p
      - format=template
      - -p
      - template={log}
      - -o
      - syslog
      - -m
      - nginx-error.syslog
      - -p
      - host=syslog-ng
      - -p
      - port=601
      - -p
      - mode=tcp
      - -p
      - syslog_format=rfc5424
      - -p
      - syslog_hostname_key=host
      - -p
      - syslog_appname_key=ident
      - -p
      - syslog_message_key=log
      - -o
      - file
      - -m
      - nginx-stream.file
      - -p
      - path=/var/log/lancache
      - -p
      - file=nginx-proxy-stream.log
      - -p
      - format=template
      - -p
      - template={log}
      - -o
      - syslog
      - -m
      - nginx-stream.syslog
      - -p
      - host=syslog-ng
      - -p
      - port=601
      - -p
      - mode=tcp
      - -p
      - syslog_format=rfc5424
      - -p
      - syslog_hostname_key=host
      - -p
      - syslog_appname_key=ident
      - -p
      - syslog_message_key=log
      # Remaining logging-matrix services (#633): one syslog-only
      # pipeline per service (no local plain-text copy -- that side of the
      # dual pipeline exists above only because Netdata's web_log module
      # parses nginx's specific access-log format; none of these services
      # have an equivalent local consumer). Each tail input uses a glob so
      # a service with more than one log file (e.g. dns-standard's separate
      # pdns_server/pdns_recursor files) is picked up by a single input block.
      - -i
      - tail
      - -p
      - path=/var/log/lancache-dns-standard/*.log
      - -p
      - tag=dns-standard.syslog
      - -p
      - db=/data/flb-dns-standard-syslog.db
      - -p
      - skip_long_lines=on
      - -i
      - tail
      - -p
      - path=/var/log/lancache-dns-ssl/*.log
      - -p
      - tag=dns-ssl.syslog
      - -p
      - db=/data/flb-dns-ssl-syslog.db
      - -p
      - skip_long_lines=on
      - -i
      - tail
      - -p
      - path=/var/log/kea/*.log
      - -p
      - tag=dhcp.syslog
      - -p
      - db=/data/flb-dhcp-syslog.db
      - -p
      - skip_long_lines=on
      - -i
      - tail
      - -p
      - path=/var/log/lancache-dhcp-proxy/*.log
      - -p
      - tag=dhcp-proxy.syslog
      - -p
      - db=/data/flb-dhcp-proxy-syslog.db
      - -p
      - skip_long_lines=on
      - -i
      - tail
      - -p
      - path=/var/log/lancache-ui/*.log
      - -p
      - tag=ui.syslog
      - -p
      - db=/data/flb-ui-syslog.db
      - -p
      - skip_long_lines=on
      - -i
      - tail
      - -p
      - path=/var/log/lancache-watchdog/*.log
      - -p
      - tag=watchdog.syslog
      - -p
      - db=/data/flb-watchdog-syslog.db
      - -p
      - skip_long_lines=on
      - -i
      - tail
      - -p
      - path=/var/log/lancache-nats/*.log
      - -p
      - tag=nats.syslog
      - -p
      - db=/data/flb-nats-syslog.db
      - -p
      - skip_long_lines=on
      - -i
      - tail
      - -p
      - path=/var/log/lancache-netdata/*.log
      - -p
      - tag=netdata.syslog
      - -p
      - db=/data/flb-netdata-syslog.db
      - -p
      - skip_long_lines=on
      - -F
      - record_modifier
      - -m
      - dns-standard.syslog
      - -p
      - record=host lancache-dns-standard
      - -p
      - record=ident pdns
      - -F
      - record_modifier
      - -m
      - dns-ssl.syslog
      - -p
      - record=host lancache-dns-ssl
      - -p
      - record=ident pdns
      - -F
      - record_modifier
      - -m
      - dhcp.syslog
      - -p
      - record=host lancache-dhcp
      - -p
      - record=ident kea-dhcp4
      - -F
      - record_modifier
      - -m
      - dhcp-proxy.syslog
      - -p
      - record=host lancache-dhcp-proxy
      - -p
      - record=ident dnsmasq
      - -F
      - record_modifier
      - -m
      - ui.syslog
      - -p
      - record=host lancache-ui
      - -p
      - record=ident lancache-ui
      - -F
      - record_modifier
      - -m
      - watchdog.syslog
      - -p
      - record=host lancache-watchdog
      - -p
      - record=ident watchdog
      - -F
      - record_modifier
      - -m
      - nats.syslog
      - -p
      - record=host lancache-nats
      - -p
      - record=ident nats-server
      - -F
      - record_modifier
      - -m
      - netdata.syslog
      - -p
