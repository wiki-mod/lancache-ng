# LanCache-NG — Quickstart (no repo clone needed)
#
# Prerequisites:
#   1. Run setup.sh — configures .env and starts everything automatically
#      Or manually:
#   2. Edit .env: adjust IPs and cache paths
#   3. Create cache directories:
#        mkdir -p /opt/lancache-ng/cache/standard /opt/lancache-ng/cache/ssl
#   4. (optional) Add second LAN IP:
#        ip addr add 192.168.234.11/24 dev eth0
#   5. Start:
#        docker compose pull && docker compose up -d
#   6. Get CA certificate for SSL mode (after first start):
#        ./certs/ca.crt → install on clients (docs: github.com/wiki-mod/lancache-ng)
#
# Customize domain lists: via Admin UI (port 8080) or
# mount custom files (see deploy/prod/docker-compose.yml in repo).

name: lancache-ng

services:

  # ── Standard mode (no CA certificate needed) ──────────────────────────────
  proxy-standard:
    container_name: lancache-proxy-standard
    image: ghcr.io/wiki-mod/lancache-ng/proxy-standard:latest
    environment:
      - CACHE_MAX_SIZE=${CACHE_MAX_SIZE}
      - CACHE_MEM_MB=${CACHE_MEM_MB}
      - CACHE_INACTIVE=${CACHE_INACTIVE}
      - CACHE_SLICE_SIZE=${CACHE_SLICE_SIZE}
      - CACHE_VALID_HIT=${CACHE_VALID_HIT}
      - CACHE_VALID_ANY=${CACHE_VALID_ANY}
    volumes:
      - ${CACHE_DIR_STANDARD}:/var/cache/nginx/lancache
      - proxy-standard-logs:/var/log/nginx
    ports:
      - "${IP_STANDARD}:80:80"
      - "${IP_STANDARD}:443:443"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  nats:
    image: nats:2-alpine
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /etc/nats
        printf 'jetstream { store_dir: /data }\nauthorization { token: "%s" }\n' "$NATS_LOCAL_TOKEN" > /etc/nats/nats.conf
        exec nats-server -c /etc/nats/nats.conf
    environment:
      - NATS_LOCAL_TOKEN=${NATS_LOCAL_TOKEN}
    volumes:
      - nats-data:/data
      - nats-conf:/etc/nats
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Log aggregator (optional, start with: docker compose --profile logging up) ──
  syslog:
    image: fluent/fluent-bit:3
    profiles: [logging]
    command: >
      /fluent-bit/bin/fluent-bit
      -i tail -p path=/var/log/nginx/standard/access.log -p tag=nginx.standard -p db=/data/flb-standard.db
      -i tail -p path=/var/log/nginx/ssl/access.log -p tag=nginx.ssl -p db=/data/flb-ssl.db
      -o file -m nginx.standard -p path=/var/log/lancache -p file=nginx-standard.log -p format=plain
      -o file -m nginx.ssl -p path=/var/log/lancache -p file=nginx-ssl.log -p format=plain
    volumes:
      - proxy-standard-logs:/var/log/nginx/standard:ro
      - proxy-ssl-logs:/var/log/nginx/ssl:ro
      - logs:/var/log/lancache
      - syslog-data:/data
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  dns-standard:
    container_name: lancache-dns-standard
    image: ghcr.io/wiki-mod/lancache-ng/dns:latest
    environment:
      - PROXY_IP=${IP_STANDARD}
      - LOG_QUERIES=0
      - NATS_URL=nats://nats:4222
      - NATS_TOKEN=${NATS_LOCAL_TOKEN}
      - NATS_CONSUMER=dns-standard
      - NATS_RECONCILER=1
      - PDNS_API_KEY=lancache-pdns-prod-secret
    volumes:
      - dns-standard-data:/var/lib/powerdns
    depends_on:
      - nats
    ports:
      - "${IP_STANDARD}:53:53/udp"
      - "${IP_STANDARD}:53:53/tcp"
    healthcheck:
      test: ["CMD-SHELL", "rec_control ping && ss -lnu | grep -q ':53 '"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── SSL mode (install CA certificate on clients) ───────────────────────────
  # Only active if COMPOSE_PROFILES contains ssl (setup.sh prompts for this)
  proxy-ssl:
    profiles: [ssl]
    container_name: lancache-proxy-ssl
    image: ghcr.io/wiki-mod/lancache-ng/proxy:latest
    environment:
      - CACHE_MAX_SIZE=${CACHE_MAX_SIZE}
      - CACHE_MEM_MB=${CACHE_MEM_MB}
      - CACHE_INACTIVE=${CACHE_INACTIVE}
      - CACHE_SLICE_SIZE=${CACHE_SLICE_SIZE}
      - CACHE_VALID_HIT=${CACHE_VALID_HIT}
      - CACHE_VALID_ANY=${CACHE_VALID_ANY}
    volumes:
      - ./certs:/etc/nginx/ssl/ca          # CA is generated here on first start
      - ${CACHE_DIR_SSL}:/var/cache/nginx/lancache
      - proxy-ssl-logs:/var/log/nginx
    ports:
      - "${IP_SSL}:80:80"
      - "${IP_SSL}:443:443"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  dns-ssl:
    profiles: [ssl]
    container_name: lancache-dns-ssl
    image: ghcr.io/wiki-mod/lancache-ng/dns:latest
    environment:
      - PROXY_IP=${IP_SSL}
      - LOG_QUERIES=0
      - NATS_URL=nats://nats:4222
      - NATS_TOKEN=${NATS_LOCAL_TOKEN}
      - NATS_CONSUMER=dns-ssl
      - PDNS_API_KEY=lancache-pdns-prod-secret
    volumes:
      - dns-ssl-data:/var/lib/powerdns
    depends_on:
      - nats
    ports:
      - "${IP_SSL}:53:53/udp"
      - "${IP_SSL}:53:53/tcp"
    healthcheck:
      test: ["CMD-SHELL", "rec_control ping && ss -lnu | grep -q ':53 '"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Watchdog (health monitoring, auto-restart, purge cron) ──────────────────
  # socket-proxy limits Docker access to container inspect + restart only
  # (tecnativa/docker-socket-proxy: CONTAINERS=1 + POST=1 — no exec, no images)
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: "1"
      POST: "1"
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  watchdog:
    image: ghcr.io/wiki-mod/lancache-ng/watchdog:latest
    environment:
      - DOCKER_PROXY_URL=http://docker-socket-proxy:2375
      - CHECK_INTERVAL=30
      - RESTART_AFTER=3
      - DISK_WARN_PCT=85
      - DISK_ALARM_PCT=95
      - CACHE_VALID_DAYS=365
      - CACHE_DIR_STANDARD=/cache/standard
      - CACHE_DIR_SSL=/cache/ssl
      - CONTAINER_PROXY_STANDARD=lancache-proxy-standard
      - CONTAINER_PROXY_SSL=lancache-proxy-ssl
      - CONTAINER_DNS_STANDARD=lancache-dns-standard
      - CONTAINER_DNS_SSL=lancache-dns-ssl
      - SSL_ENABLED=${SSL_ENABLED:-1}
    volumes:
      - ${CACHE_DIR_STANDARD}:/cache/standard
      - ${CACHE_DIR_SSL}:/cache/ssl
      - watchdog-status:/var/run/watchdog
    depends_on:
      - docker-socket-proxy
      - proxy-standard
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Admin UI ───────────────────────────────────────────────────────────────
  ui:
    image: ghcr.io/wiki-mod/lancache-ng/ui:latest
    volumes:
      # NOTE: Docker socket is mounted read-only for security.
      # Full read-write access would expose complete Docker API on LAN without auth.
      # For full control (container restart, image pull, etc), use socket-proxy pattern
      # (see deploy/prod/docker-compose.yml with tecnativa/docker-socket-proxy).
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - proxy-standard-logs:/var/log/nginx/standard:ro
      - proxy-ssl-logs:/var/log/nginx/ssl:ro
      - ${CACHE_DIR_STANDARD}:/var/cache/standard:ro
      - ${CACHE_DIR_SSL}:/var/cache/ssl:ro
      - nats-conf:/etc/nats
    ports:
      - "${IP_STANDARD}:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DNS_STANDARD_SERVICE=dns-standard
      - DNS_SSL_SERVICE=dns-ssl
      - PROXY_SSL_SERVICE=proxy-ssl
      - NETDATA_URL=http://netdata:19999
      - STANDARD_IP=${IP_STANDARD}
      - SSL_IP=${IP_SSL}
      - STANDARD_CACHE_MAX_GB=${STANDARD_CACHE_MAX_GB}
      - SSL_CACHE_MAX_GB=${SSL_CACHE_MAX_GB}
      - UI_AUTH_USER=${UI_AUTH_USER:-}
      - UI_AUTH_PASSWORD=${UI_AUTH_PASSWORD:-}
      - PDNS_AUTH_URL=http://dns-standard:8081
      - PDNS_REC_URL=http://dns-standard:8082
      - PDNS_API_KEY=lancache-pdns-prod-secret
      - DHCP_API_URL=http://host.docker.internal:8000
      - NATS_URL=nats://nats:4222
      - NATS_LOCAL_TOKEN=${NATS_LOCAL_TOKEN}
      - SECONDARY_REGISTRATION_TOKEN=${SECONDARY_REGISTRATION_TOKEN}
    depends_on:
      - proxy-standard
      - netdata
      - nats
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Netdata (system metrics) ───────────────────────────────────────────────
  netdata:
    image: netdata/netdata
    hostname: lancache-netdata
    cap_add: [SYS_PTRACE]
    security_opt: [apparmor:unconfined]
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - logs:/var/log/lancache:ro
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ── Watchtower (automatic updates) ────────────────────────────────────────────
  # Only active if COMPOSE_PROFILES contains watchtower (setup.sh prompts for this)
  # Fork from nicholas-fedor: actively maintained, NegotiateAPIVersion=true (Docker 29+)
  watchtower:
    profiles: [watchtower]
    image: ghcr.io/nicholas-fedor/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

volumes:
  proxy-standard-logs:
  proxy-ssl-logs:
  watchdog-status:
  nats-data:
  nats-conf:
  netdataconfig:
  netdatalib:
  netdatacache:
  logs:
  syslog-data:
  dns-standard-data:
  dns-ssl-data:
