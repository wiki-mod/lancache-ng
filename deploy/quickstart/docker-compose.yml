      - syslog-data:/data
      - dns-logs-standard:/var/log/lancache-dns-standard:ro
      - dns-logs-ssl:/var/log/lancache-dns-ssl:ro
      - dhcp-logs:/var/log/kea:ro
      - dhcp-proxy-logs:/var/log/lancache-dhcp-proxy:ro
      - ui-logs:/var/log/lancache-ui:ro
      - watchdog-logs:/var/log/lancache-watchdog:ro
      - nats-logs:/var/log/lancache-nats:ro
      - netdata-logs:/var/log/lancache-netdata:ro
    # Cannot mirror syslog-ng's `syslog-ng-ctl healthcheck` shape exactly:
    # this image ships no shell and no wget/curl (see the `command:` comment
    # above), so neither a CMD-SHELL script nor an HTTP probe against the
    # monitoring port above can run *inside* the container. `fluent-bit -V`
    # is the one self-contained exec-form check available -- it only proves
    # the binary is intact and executable, not that the live pipeline is
    # healthy (weaker than syslog-ng's check by necessity, not by choice).
    healthcheck:
      test: ["CMD", "/fluent-bit/bin/fluent-bit", "-V"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - syslog-ng
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Central log receiver (#453; optional, start with: docker compose --profile logging up -d) ──
  # Receives forwarded logs from the `syslog` (fluent-bit) service above over
  # TCP/601 (RFC 5424, plain LF framing -- what fluent-bit's syslog output
  # sends by default) and writes them per-source, per-day under
  # logs-syslog-ng. Config and the rotation/compression loop are generated
  # inline for the same reason as fluent-bit above.
  syslog-ng:
    image: balabit/syslog-ng:latest@sha256:78ad81d617f83e46bf6fa9f45d5c437a841464be5e1cddfda2745e01e87dd335
    profiles: [logging]
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        mkdir -p /etc/syslog-ng
        cat > /etc/syslog-ng/syslog-ng.conf <<'EOF'
        @version: 4.8

        options {
            time-reap(30);
            mark-freq(10);
            keep-hostname(yes);
            create-dirs(yes);
            dir-perm(0750);
            perm(0640);
            # This container runs as root (no user() drop configured), so
            # files/dirs it creates default to root:root -- the 0750/0640
            # perms above then leave zero access for the Admin UI's
            # unprivileged `lancache` user (uid/gid 10001, pinned in
            # services/ui/Dockerfile): not owner, not in root's group, and
            # "other" has no bits. Chgrp'ing to that same fixed gid lets the
            # existing perm bits' group-read allowance actually reach the
            # UI's read-only mount (this file's `ui.volumes`
            # logs-syslog-ng entry) without loosening perms to
            # world-readable. syslog-ng accepts a bare numeric gid here, no
            # "lancache" group needs to exist in this image's /etc/group
            # (see PR #758 review). The `logs-syslog-ng` volume root itself
            # isn't created by syslog-ng -- Docker auto-creates a missing
            # named volume's root as root:root 0755, which already grants
            # "other" the r-x needed to traverse into it, so only the
            # per-host subdirs/files below need this fix.
            dir-group(10001);
            group(10001);
        };

        source s_forwarders {
            network(transport(tcp) port(601) flags(syslog-protocol));
        };

        destination d_lancache {
            file(
                "/var/log/lancache-syslog-ng/$${HOST}/$${YEAR}$${MONTH}$${DAY}.log"
                template("$$ISODATE $$HOST $$PROGRAM: $$MSGONLY\n")
                create-dirs(yes)
            );
        };

        log { source(s_forwarders); destination(d_lancache); };
        EOF
        # Size-bounded rotation + zstd high-compression (#453): every
        # SYSLOG_NG_ROTATE_INTERVAL_SECONDS, rotate any active log file once it
        # exceeds SYSLOG_MAX_FILE_MB, signal syslog-ng to reopen the (now
        # recreated) destination file, then compress the rotated file with
        # zstd -T0 (all cores) at SYSLOG_COMPRESSION_LEVEL. Falls back to gzip
        # if zstd cannot be installed (e.g. no network egress at startup), so
        # rotation/compression degrades gracefully instead of failing hard.
        # This is a fixed-threshold baseline, not the full SYSLOG_MAX_GB /
        # SYSLOG_RETENTION_DAYS size-priority budget engine -- see follow-up #633.
        (
          if ! command -v zstd >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y --no-install-recommends zstd >/dev/null 2>&1 || true
          fi
          while true; do
            sleep "$${SYSLOG_NG_ROTATE_INTERVAL_SECONDS:-300}"
            find /var/log/lancache-syslog-ng -type f -name '*.log' -size +"$${SYSLOG_MAX_FILE_MB:-100}"M 2>/dev/null | while read -r f; do
              ts="$$(date -u +%Y%m%dT%H%M%SZ)"
              mv "$$f" "$${f}.$${ts}"
              kill -HUP 1 2>/dev/null || true
              if command -v zstd >/dev/null 2>&1; then
                zstd -q -T0 "-$${SYSLOG_COMPRESSION_LEVEL:-19}" --rm "$${f}.$${ts}" 2>/dev/null || true
              else
                gzip "$${f}.$${ts}" 2>/dev/null || true
              fi
            done
          done
        ) &
        exec /usr/local/bin/entrypoint.sh
    environment:
      - SYSLOG_MAX_FILE_MB=${SYSLOG_MAX_FILE_MB:-100}
      - SYSLOG_COMPRESSION_LEVEL=${SYSLOG_COMPRESSION_LEVEL:-19}
      - SYSLOG_NG_ROTATE_INTERVAL_SECONDS=${SYSLOG_NG_ROTATE_INTERVAL_SECONDS:-300}
    volumes:
      - logs-syslog-ng:/var/log/lancache-syslog-ng
    healthcheck:
      test: ["CMD-SHELL", "syslog-ng-ctl healthcheck --timeout 5"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  dns-standard:
    container_name: lancache-dns-standard
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/dns:${LANCACHE_IMAGE_TAG:-latest}
    environment:
      - PROXY_IP=${IP_STANDARD}
      - LOG_QUERIES=0
      - NATS_URL=nats://nats:4222
      - NATS_USER=${NATS_DNS_WRITER_USER:?NATS_DNS_WRITER_USER is required}
      - NATS_PASSWORD=${NATS_DNS_WRITER_PASSWORD:?NATS_DNS_WRITER_PASSWORD is required}
      - NATS_CONSUMER=dns-standard
      - NATS_RECONCILER=1
      - PDNS_API_KEY=${PDNS_API_KEY:?PDNS_API_KEY is required}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY:-}
      # issue #706: without this, DDNS_ALLOW_FROM defaults to 127.0.0.1
      # (services/dns/entrypoint.sh), silently rejecting every DDNS update
      # from the dhcp container. Verified empirically that a DDNS update
      # from the dhcp container (network_mode: host) always arrives with
      # source = the host's primary LAN IP, i.e. IP_STANDARD in this
      # project's documented setup flow; IP_SSL is included as a low-cost
      # hedge -- TSIG (DDNS_TSIG_KEY above) is the real auth control either way.
      - DDNS_ALLOW_FROM=${IP_STANDARD},${IP_SSL:-}
      - KEEP_KNOWN_GOOD_CONFIGS=${KEEP_KNOWN_GOOD_CONFIGS:-3}
    volumes:
      - pdns-data-standard:/var/lib/powerdns
      - pdns-filter-state:/var/lib/powerdns-state
      - pdns-config-snapshots-standard:/var/lib/lancache-dns
      # Central logging pipeline (#633): PowerDNS has no native file-log
      # directive (see services/dns/entrypoint.sh's run_auth/run_recursor,
      # which `tee` each daemon's stdout here instead).
      - dns-logs-standard:/var/log/lancache-dns
    depends_on:
      - nats
    ports:
      - "${IP_STANDARD}:53:53/udp"
      - "${IP_STANDARD}:53:53/tcp"
      # 5300/udp only (issue #706): see deploy/prod/docker-compose.yml's
      # identical publish on dns-standard for the full reasoning.
      - "${IP_STANDARD}:5300:5300/udp"
    healthcheck:
      test: ["CMD-SHELL", "dig @127.0.0.1 steamcontent.com A +short +time=2 +tries=1 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}
  dns-ssl:
    profiles: [ssl]
    container_name: lancache-dns-ssl
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/dns:${LANCACHE_IMAGE_TAG:-latest}
    environment:
      - PROXY_IP=${IP_SSL}
      - LOG_QUERIES=0
      - NATS_URL=nats://nats:4222
      - NATS_USER=${NATS_DNS_REPLICA_USER:?NATS_DNS_REPLICA_USER is required}
      - NATS_PASSWORD=${NATS_DNS_REPLICA_PASSWORD:?NATS_DNS_REPLICA_PASSWORD is required}
      - NATS_CONSUMER=dns-ssl
      - PDNS_API_KEY=${PDNS_API_KEY:?PDNS_API_KEY is required}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY:-}
      # issue #706: see the identical DDNS_ALLOW_FROM override on
      # dns-standard above for the full reasoning -- this service needs the
      # same value (IP_STANDARD, not IP_SSL) because the empirically-
      # observed DDNS update source is always the host's primary LAN IP,
      # regardless of which of the two DNS servers Kea's D2 daemon targets.
      - DDNS_ALLOW_FROM=${IP_STANDARD},${IP_SSL:-}
      - KEEP_KNOWN_GOOD_CONFIGS=${KEEP_KNOWN_GOOD_CONFIGS:-3}
    volumes:
      - pdns-data-ssl:/var/lib/powerdns
      - pdns-filter-state:/var/lib/powerdns-state
      - pdns-config-snapshots-ssl:/var/lib/lancache-dns
      # Central logging pipeline (#633): PowerDNS has no native file-log
      # directive (see services/dns/entrypoint.sh's run_auth/run_recursor,
      # which `tee` each daemon's stdout here instead).
      - dns-logs-ssl:/var/log/lancache-dns
    depends_on:
      - nats
    ports:
      - "${IP_SSL}:53:53/udp"
      - "${IP_SSL}:53:53/tcp"
      # 5300/udp only (issue #706): see deploy/prod/docker-compose.yml's
      # identical publish on dns-standard for the full reasoning.
      - "${IP_SSL}:5300:5300/udp"
    healthcheck:
      test: ["CMD-SHELL", "dig @127.0.0.1 steamcontent.com A +short +time=2 +tries=1 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Watchdog (health monitoring, auto-restart, purge cron) ──────────────────
  # socket-proxy provides scoped Docker API access for UI and watchdog only.
  # A custom HAProxy allowlist replaces Tecnativa's broad CONTAINERS/POST
  # toggles with a deny-by-default allowlist for named lancache-ng containers.
  # It is isolated on docker-api so other services cannot reach the proxy API.
  docker-socket-proxy:
    container_name: lancache-docker-socket-proxy
    image: tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    entrypoint: ["/usr/local/bin/lancache-docker-socket-proxy.sh"]
    command: []
    stdin_open: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./scripts/docker-socket-proxy.sh:/usr/local/bin/lancache-docker-socket-proxy.sh:ro
    networks:
      - docker-api
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  watchdog:
    container_name: lancache-watchdog
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/watchdog:${LANCACHE_IMAGE_TAG:-latest}
    # Central logging pipeline (#633): watchdog.sh writes only to stdout
    # (its log() function, see services/watchdog/watchdog.sh) and is never
    # itself changed -- this entrypoint override tees that stdout into a
    # file in addition to the container's normal stdout, so `docker logs`
    # keeps working unchanged while fluent-bit also gets a file to tail.
    # Process substitution (`> >(...)`) requires bash, not the image's
    # default entrypoint form; `exec` still replaces this shell with
    # watchdog.sh itself, so it stays PID 1 and signal handling (restart/
    # stop) is unaffected.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        mkdir -p /var/log/lancache-watchdog
        exec /watchdog.sh > >(tee -a /var/log/lancache-watchdog/watchdog.log) 2>&1
    environment:
      - DOCKER_PROXY_URL=http://docker-socket-proxy:2375
      - CHECK_INTERVAL=30
      - RESTART_AFTER=3
      - DISK_WARN_PCT=85
      - DISK_ALARM_PCT=95
      - CACHE_VALID_DAYS=365
      - CACHE_DIR=/var/cache/lancache
      - CONTAINER_PROXY=lancache-proxy
      - CONTAINER_DNS_STANDARD=lancache-dns-standard
      - CONTAINER_DNS_SSL=lancache-dns-ssl
      - SSL_ENABLED=${SSL_ENABLED:-0}
      # Syslog retention engine (#633): SYSLOG_ENABLED defaults to "false" so
      # watchdog does not touch this path at all on installs that never opt
      # into the `logging` profile.
      - SYSLOG_ENABLED=${SYSLOG_ENABLED:-false}
      - SYSLOG_MAX_GB=${SYSLOG_MAX_GB:-10}
      - SYSLOG_RETENTION_DAYS=${SYSLOG_RETENTION_DAYS:-30}
      # SYSLOG_LOG_ROOT is intentionally NOT wired here (#757 review): see
      # the matching comment in deploy/prod/docker-compose.yml -- watchdog.sh
      # already defaults it to /var/log/lancache-syslog-ng, matching the
      # fixed mount target below, and exposing it as an independently
      # settable compose var would silently break pruning if ever changed.
    volumes:
      # The watchdog reports and purges the same shared cache path the proxy uses.
      # Do not point this at a per-mode subdirectory; the split paths no longer exist.
      - ${CACHE_DIR:?CACHE_DIR is required}:/var/cache/lancache
      - watchdog-status:/var/run/watchdog
      # Unlike every other consumer of this volume (fluent-bit's syslog-ng
      # destination reads/writes it as the owner; a future Admin UI reader
      # would mount it `:ro`), watchdog needs read-write access here since
      # maybe_prune_syslog() deletes files.
      - logs-syslog-ng:/var/log/lancache-syslog-ng
      - watchdog-logs:/var/log/lancache-watchdog
    depends_on:
      - docker-socket-proxy
    networks:
      - default
      - docker-api
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── DHCP Server (Kea) ─────────────────────────────────────────────────────
  # Full DHCP mode with Control Agent API. Active only with COMPOSE_PROFILES=dhcp-kea.
  dhcp:
    profiles: [dhcp-kea]
    container_name: lancache-dhcp
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/dhcp:${LANCACHE_IMAGE_TAG:-latest}
    environment:
      - DHCP_DNS_PRIMARY=${IP_STANDARD}
      - DHCP_DNS_SECONDARY=${IP_SSL:-${IP_STANDARD}}
      - DHCP_DNS_SERVER_IP=${IP_STANDARD}
      - DHCP_DNS_SERVER_IP_SSL=${IP_SSL:-${IP_STANDARD}}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY:-}
      - KEA_CTRL_TOKEN=${KEA_CTRL_TOKEN:?KEA_CTRL_TOKEN is required}
      - DHCP_MODE=${DHCP_MODE:-disabled}
      - DHCP_SUBNET=${DHCP_SUBNET:-}
      - DHCP_GATEWAY=${DHCP_GATEWAY:-}
      - DHCP_RANGE_START=${DHCP_RANGE_START:-}
      - DHCP_RANGE_END=${DHCP_RANGE_END:-}
    volumes:
      - ${KEA_DATA_DIR:-./kea}:/var/lib/kea
      # Central logging pipeline (#633): Kea's loggers dual-write here (see
      # kea-dhcp4.conf.template's "output-options") in addition to stdout.
      - dhcp-logs:/var/log/kea
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
      - NET_ADMIN
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          host="$${KEA_CTRL_HOST:-127.0.0.1}";
          [ "$$host" = "0.0.0.0" ] && host=127.0.0.1;
          curl -sf -u admin:$${KEA_CTRL_TOKEN}
          -H 'Content-Type: application/json'
          -d '{"command":"config-get","service":["dhcp4"]}'
          "http://$$host:8000/" | jq -e '.[0].result == 0' >/dev/null
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── DHCP Proxy (dnsmasq) ──────────────────────────────────────────────────
  # Proxy mode keeps an existing router DHCP server and serves proxy-DHCP/PXE clients.
  dhcp-proxy:
    profiles: [dhcp-proxy]
    container_name: lancache-dhcp-proxy
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/dhcp-proxy:${LANCACHE_IMAGE_TAG:-latest}
    volumes:
      - ui-data:/data:ro
      # Known-good dnsmasq config snapshots (#415): persistent, service-owned
      # volume so rollback survives container restarts/recreates.
      - dhcp-proxy-config-snapshots:/var/lib/lancache-dhcp-proxy
      # Central logging pipeline (#633): dnsmasq's own `log-facility=`
      # directive (see dnsmasq.conf.template) writes here.
      - dhcp-proxy-logs:/var/log/lancache-dhcp-proxy
    environment:
      - DHCP_SUBNET_START=${DHCP_SUBNET_START:-}
      - DHCP_DNS_PRIMARY=${DHCP_DNS_PRIMARY:-}
      - DHCP_DNS_SECONDARY=${DHCP_DNS_SECONDARY:-}
      - UPSTREAM_DHCP_IP=${UPSTREAM_DHCP_IP:-}
      # Issue #450: additional optional dnsmasq relay/proxy options.
      - DHCP_PROXY_INTERFACE=${DHCP_PROXY_INTERFACE:-}
      - DHCP_PROXY_ROUTER=${DHCP_PROXY_ROUTER:-}
      - DHCP_NTP_SERVERS=${DHCP_NTP_SERVERS:-}
      - DHCP_PROXY_DOMAIN=${DHCP_PROXY_DOMAIN:-}
      - DHCP_PROXY_BOOT_FILENAME=${DHCP_PROXY_BOOT_FILENAME:-}
      - DHCP_PROXY_BOOT_SERVER=${DHCP_PROXY_BOOT_SERVER:-}
      - DHCP_PROXY_CUSTOM_OPTIONS=${DHCP_PROXY_CUSTOM_OPTIONS:-}
      # Issue #705: PXE boot-pointer opt-in. Without these three passed
      # through, the container never sees them even if set in .env, so the
      # feature stays silently disabled for every quickstart install
      # regardless of what the operator configures (found in PR #765 review).
      - DHCP_PROXY_PXE_BOOT_SERVER=${DHCP_PROXY_PXE_BOOT_SERVER:-}
      - DHCP_PROXY_PXE_BOOT_FILENAME_BIOS=${DHCP_PROXY_PXE_BOOT_FILENAME_BIOS:-}
      - DHCP_PROXY_PXE_BOOT_FILENAME_UEFI=${DHCP_PROXY_PXE_BOOT_FILENAME_UEFI:-}
      - KEEP_KNOWN_GOOD_CONFIGS=${KEEP_KNOWN_GOOD_CONFIGS:-3}
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
      # dnsmasq's ProxyDHCP/PXE reply path needs a raw broadcast socket;
      # without NET_ADMIN, dnsmasq passes its own config self-test but then
      # fails to actually start ("process is missing required capability
      # NET_ADMIN"), confirmed live with a real dnsmasq build against the
      # pre-issue-#450 four-variable config alone -- this was already
      # broken before this issue's new options existed. Matches the dhcp
      # (Kea) service's cap_add, which needs it for the same reason.
      - NET_ADMIN
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── DHCP conflict probe ────────────────────────────────────────────────────
  # Predeclared start/stop/wait helper for the Admin UI's "check for other
  # DHCP servers" feature. Reuses the UI image (already has nmap and dhclient
  # installed). The Admin UI stops then starts this container on demand and
  # reads its output — it never creates or removes it — so the narrowed
  # docker-socket-proxy only needs to permit start/restart, the same capability
  # class already used for the NATS and proxy-ssl reload flows, not generic
  # container creation.
  dhcp-probe:
    container_name: lancache-dhcp-probe
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/ui:${LANCACHE_IMAGE_TAG:-latest}
    entrypoint: ["/usr/local/bin/dhcp-probe.sh"]
    network_mode: host
    volumes:
      - ./scripts/dhcp-probe.sh:/usr/local/bin/dhcp-probe.sh:ro
    restart: "no"

  # ── Admin UI ───────────────────────────────────────────────────────────────
  # UI is LAN-reachable by default for the quickstart workflow. Password protection
  # remains optional, but is recommended on shared or untrusted networks. Set
  # UI_BIND_IP=127.0.0.1 to restrict access to the host. Direct Docker socket mount
  # removed; Docker operations are proxied through the isolated docker-api network.
  ui:
    container_name: lancache-ui
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/ui:${LANCACHE_IMAGE_TAG:-latest}
    volumes:
      - ui-data:/data
      - proxy-logs:/var/log/nginx:ro
      # Read-only cache mount is for size reporting only. Mutations stay in the proxy/watchdog.
      - ${CACHE_DIR:?CACHE_DIR is required}:/var/cache/proxy:ro
      - pdns-filter-state:/var/lib/powerdns-state
      - nats-conf:/etc/nats
      # Shared with the dhcp (Kea) service: UI writes known-good Kea config
      # snapshots into config-snapshots/ here (#614), never touching Kea's
      # own kea-dhcp4.conf/kea-leases4.csv/etc. in the same directory.
      - ${KEA_DATA_DIR:-./kea}:/var/lib/kea
      # Central logging pipeline (#633): main.rs's init_tracing() writes
      # UI_LOG_FILE (default matches this path) alongside stdout.
      - ui-logs:/var/log/lancache-ui
      # Central syslog store reader (#633 PR4): read-only, since watchdog
      # (not the UI) owns pruning of this volume. A missing mount here would
      # make syslog_client's SYSLOG_LOG_ROOT reads silently return empty
      # results, not fail, so this is required for SYSLOG_ENABLED=true to
      # actually show anything on /logs or the dashboard.
      - logs-syslog-ng:/var/log/lancache-syslog-ng:ro
    ports:
      - "${UI_BIND_IP:-${IP_STANDARD}}:8080:8080"
    environment:
      - DOCKER_PROXY_URL=http://docker-socket-proxy:2375
      - DNS_STANDARD_SERVICE=dns-standard
      - DNS_SSL_SERVICE=dns-ssl
      - PROXY_SERVICE=proxy
      - SSL_ENABLED=${SSL_ENABLED:-0}
      - PROXY_STANDARD_URL=http://proxy
      - PROXY_SSL_URL=http://proxy
      - PROXY_SSL_SERVICE=proxy
      - STANDARD_LOG=/var/log/nginx/access.log
      - SSL_LOG=/var/log/nginx/access.log
      - CACHE_DIR=/var/cache/proxy
      - NETDATA_URL=http://netdata:19999
      - STANDARD_IP=${IP_STANDARD}
      - SSL_IP=${IP_SSL}
      - LANCACHE_IMAGE_REGISTRY=${LANCACHE_IMAGE_REGISTRY:-ghcr.io}
      - LANCACHE_IMAGE_PREFIX=${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}
      - LANCACHE_IMAGE_CHANNEL=${LANCACHE_IMAGE_CHANNEL:-}
      - LANCACHE_IMAGE_TAG=${LANCACHE_IMAGE_TAG:-latest}
      - CACHE_MAX_GB=${CACHE_MAX_GB:-50}
      - UI_AUTH_USER=${UI_AUTH_USER:-}
      - UI_AUTH_PASSWORD=${UI_AUTH_PASSWORD:-}
      - ALLOW_INSECURE_UI=${ALLOW_INSECURE_UI:-false}
      - UI_SESSION_TTL_SECONDS=${UI_SESSION_TTL_SECONDS:-86400}
      - DHCP_MODE=${DHCP_MODE:-disabled}
      - DNS_STANDARD_STATE_DIR=/var/lib/powerdns-state
      - DNS_SSL_STATE_DIR=/var/lib/powerdns-state
      - NATS_URL=nats://nats:4222
      - NATS_UI_USER=${NATS_UI_USER:?NATS_UI_USER is required}
      - NATS_UI_PASSWORD=${NATS_UI_PASSWORD:?NATS_UI_PASSWORD is required}
      - NATS_DNS_WRITER_USER=${NATS_DNS_WRITER_USER:?NATS_DNS_WRITER_USER is required}
      - NATS_DNS_WRITER_PASSWORD=${NATS_DNS_WRITER_PASSWORD:?NATS_DNS_WRITER_PASSWORD is required}
      - NATS_DNS_REPLICA_USER=${NATS_DNS_REPLICA_USER:?NATS_DNS_REPLICA_USER is required}
      - NATS_DNS_REPLICA_PASSWORD=${NATS_DNS_REPLICA_PASSWORD:?NATS_DNS_REPLICA_PASSWORD is required}
      - NATS_CALLOUT_USER=${NATS_CALLOUT_USER:?NATS_CALLOUT_USER is required}
      - NATS_CALLOUT_PASSWORD=${NATS_CALLOUT_PASSWORD:?NATS_CALLOUT_PASSWORD is required}
      - SECONDARY_REGISTRATION_TOKEN=${SECONDARY_REGISTRATION_TOKEN:-}
      - PDNS_AUTH_URL=http://dns-standard:8081
      - PDNS_REC_URL=http://dns-standard:8082
      # Zone/record known-good snapshot rollback listener (#628), scoped to
      # dns-standard only for now -- same single-primary convention
      # PDNS_AUTH_URL/PDNS_REC_URL already use (see services/ui/src/routes/
      # dns_snapshots.rs's module doc comment for why dns-ssl isn't wired up
      # here yet).
      - DNS_ROLLBACK_URL=http://dns-standard:8083
      - PDNS_API_KEY=${PDNS_API_KEY:?PDNS_API_KEY is required}
      - DHCP_API_URL=http://host.docker.internal:8000
      - DHCP_API_TOKEN=${DHCP_API_TOKEN:-${KEA_CTRL_TOKEN:-}}
      - KEEP_KNOWN_GOOD_CONFIGS=${KEEP_KNOWN_GOOD_CONFIGS:-3}
      # Central syslog store reader (#633 PR4): same 4 vars/defaults as the
      # watchdog retention engine (PR3/#757), so the UI's "enabled" toggle
      # and its actual budget display always agree with what watchdog is
      # enforcing.
      - SYSLOG_ENABLED=${SYSLOG_ENABLED:-false}
      - SYSLOG_LOG_ROOT=/var/log/lancache-syslog-ng
      - SYSLOG_MAX_GB=${SYSLOG_MAX_GB:-10}
      - SYSLOG_RETENTION_DAYS=${SYSLOG_RETENTION_DAYS:-30}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # Shallow liveness probe against services/ui/src/main.rs's own /health
      # route (its comment there documents it as existing specifically for
      # container healthchecks) -- proves the HTTP server is accepting
      # connections, not that NATS/Docker/DNS are reachable. curl is present
      # in this image's apt-get install list (services/ui/Dockerfile).
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      - docker-socket-proxy
      - proxy
      - netdata
      - nats
    networks:
      - default
      - docker-api
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Netdata (system metrics) ───────────────────────────────────────────────
  netdata:
    container_name: lancache-netdata
    image: netdata/netdata@sha256:a130dbbf3d6e6a5472efdebaa123797190a5822627e908106d34edae02bc8a74
    hostname: lancache-netdata
    cap_add: [SYS_PTRACE]
    security_opt: [apparmor:unconfined]
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Central logging pipeline (#633): netdata writes health/collector/
      # error logs under /var/log/netdata by default; mount that onto a
      # shared volume so fluent-bit can tail it.
      - netdata-logs:/var/log/netdata
      - logs:/var/log/lancache:ro
    restart: always
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

networks:
  docker-api:
    internal: true

volumes:
  proxy-logs:
  # Known-good config snapshots (#415, #615), one persistent volume per
  # adapter. dns-standard and dns-ssl are separate containers with
  # independently-generated config, so each gets its own snapshot history.
  proxy-config-snapshots:
  dhcp-proxy-config-snapshots:
  pdns-config-snapshots-standard:
  pdns-config-snapshots-ssl:
  watchdog-status:
  nats-data:
  nats-conf:
  netdataconfig:
  netdatalib:
  netdatacache:
  logs:
  syslog-data:
  # Per-service source logs (#633): each service writes here (dual-output
  # alongside stdout where the underlying daemon supports it, single-
  # destination where it doesn't -- see docs/architecture-ng.md's logging
  # matrix for which), and the `syslog` (fluent-bit) service tails these
  # read-only and forwards to syslog-ng. Same "rotated log output, not
  # operational state" classification as `logs`/`syslog-data` above.
  dns-logs-standard:
  dns-logs-ssl:
  dhcp-logs:
  dhcp-proxy-logs:
  ui-logs:
  watchdog-logs:
  nats-logs:
  netdata-logs:
  logs-syslog-ng:
  pdns-data-standard:
  pdns-data-ssl:
  pdns-filter-state:
  ui-data:
