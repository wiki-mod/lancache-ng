# LanCache-NG — Quickstart (kein Repo-Clone nötig)
#
# Voraussetzungen:
#   1. setup.sh ausführen — konfiguriert .env und startet alles automatisch
#      Oder manuell:
#   2. .env editieren: IPs und Cache-Pfade anpassen
#   3. Cache-Verzeichnisse anlegen:
#        mkdir -p /opt/lancache-ng/cache/standard /opt/lancache-ng/cache/ssl
#   4. (optional) Zweite LAN-IP hinzufügen:
#        ip addr add 192.168.234.11/24 dev eth0
#   5. Starten:
#        docker compose pull && docker compose up -d
#   6. CA-Zertifikat für SSL-Modus abholen (nach dem ersten Start):
#        ./certs/ca.crt → auf Clients installieren (docs: github.com/wiki-mod/lancache-ng)
#
# Domain-Listen anpassen: über Admin-UI (Port 8080) oder
# eigene Dateien mounten (siehe deploy/prod/docker-compose.yml im Repo).

services:

  # ── Standard-Modus (kein CA-Zertifikat nötig) ─────────────────────────────
  proxy-standard:
    container_name: lancache-proxy-standard
    image: ghcr.io/wiki-mod/lancache-ng/proxy-standard:latest
    environment:
      - CACHE_MAX_SIZE=${CACHE_MAX_SIZE}
      - CACHE_MEM_MB=${CACHE_MEM_MB}
      - CACHE_INACTIVE=${CACHE_INACTIVE}
      - CACHE_SLICE_SIZE=${CACHE_SLICE_SIZE}
      - CACHE_VALID_HIT=${CACHE_VALID_HIT}
      - CACHE_VALID_ANY=${CACHE_VALID_ANY}
    volumes:
      - ${CACHE_DIR_STANDARD}:/var/cache/nginx/lancache
      - proxy-standard-logs:/var/log/nginx
    ports:
      - "${IP_STANDARD}:80:80"
      - "${IP_STANDARD}:443:443"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  dns-standard:
    container_name: lancache-dns-standard
    image: ghcr.io/wiki-mod/lancache-ng/dns:latest
    environment:
      - PROXY_IP=${IP_STANDARD}
      - LOG_QUERIES=0
    ports:
      - "${IP_STANDARD}:53:53/udp"
      - "${IP_STANDARD}:53:53/tcp"
    healthcheck:
      test: ["CMD-SHELL", "dig @127.0.0.1 steamcontent.com A +short +time=2 +tries=1 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── SSL-Modus (CA-Zertifikat auf Clients installieren) ─────────────────────
  # Nur aktiv wenn COMPOSE_PROFILES ssl enthält (setup.sh fragt danach)
  proxy-ssl:
    profiles: [ssl]
    container_name: lancache-proxy-ssl
    image: ghcr.io/wiki-mod/lancache-ng/proxy:latest
    environment:
      - CACHE_MAX_SIZE=${CACHE_MAX_SIZE}
      - CACHE_MEM_MB=${CACHE_MEM_MB}
      - CACHE_INACTIVE=${CACHE_INACTIVE}
      - CACHE_SLICE_SIZE=${CACHE_SLICE_SIZE}
      - CACHE_VALID_HIT=${CACHE_VALID_HIT}
      - CACHE_VALID_ANY=${CACHE_VALID_ANY}
    volumes:
      - ./certs:/etc/nginx/ssl/ca          # CA wird hier beim ersten Start erzeugt
      - ${CACHE_DIR_SSL}:/var/cache/nginx/lancache
      - proxy-ssl-logs:/var/log/nginx
    ports:
      - "${IP_SSL}:80:80"
      - "${IP_SSL}:443:443"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  dns-ssl:
    profiles: [ssl]
    container_name: lancache-dns-ssl
    image: ghcr.io/wiki-mod/lancache-ng/dns:latest
    environment:
      - PROXY_IP=${IP_SSL}
      - LOG_QUERIES=0
    ports:
      - "${IP_SSL}:53:53/udp"
      - "${IP_SSL}:53:53/tcp"
    healthcheck:
      test: ["CMD-SHELL", "dig @127.0.0.1 steamcontent.com A +short +time=2 +tries=1 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Watchdog (Health-Monitor, Auto-Restart, Purge-Cron) ──────────────────
  # socket-proxy begrenzt Docker-Zugriff auf Container-Inspect + Restart
  # (tecnativa/docker-socket-proxy: CONTAINERS=1 + POST=1 — kein exec, keine Images)
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: "1"
      POST: "1"
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  watchdog:
    image: ghcr.io/wiki-mod/lancache-ng/watchdog:latest
    environment:
      - DOCKER_PROXY_URL=http://docker-socket-proxy:2375
      - CHECK_INTERVAL=30
      - RESTART_AFTER=3
      - DISK_WARN_PCT=85
      - DISK_ALARM_PCT=95
      - CACHE_VALID_DAYS=365
      - CACHE_DIR_STANDARD=/cache/standard
      - CACHE_DIR_SSL=/cache/ssl
      - CONTAINER_PROXY_STANDARD=lancache-proxy-standard
      - CONTAINER_PROXY_SSL=lancache-proxy-ssl
      - CONTAINER_DNS_STANDARD=lancache-dns-standard
      - CONTAINER_DNS_SSL=lancache-dns-ssl
      - SSL_ENABLED=${SSL_ENABLED:-1}
    volumes:
      - ${CACHE_DIR_STANDARD}:/cache/standard
      - ${CACHE_DIR_SSL}:/cache/ssl
      - watchdog-status:/var/run/watchdog
    depends_on:
      - docker-socket-proxy
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Admin-UI ───────────────────────────────────────────────────────────────
  ui:
    image: ghcr.io/wiki-mod/lancache-ng/ui:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - proxy-standard-logs:/var/log/nginx/standard:ro
      - proxy-ssl-logs:/var/log/nginx/ssl:ro
      - ${CACHE_DIR_STANDARD}:/var/cache/standard:ro
      - ${CACHE_DIR_SSL}:/var/cache/ssl:ro
    ports:
      - "${IP_STANDARD}:8080:8080"
    environment:
      - DNS_STANDARD_SERVICE=dns-standard
      - DNS_SSL_SERVICE=dns-ssl
      - PROXY_SSL_SERVICE=proxy-ssl
      - NETDATA_URL=http://netdata:19999
      - STANDARD_IP=${IP_STANDARD}
      - SSL_IP=${IP_SSL}
      - STANDARD_CACHE_MAX_GB=${STANDARD_CACHE_MAX_GB}
      - SSL_CACHE_MAX_GB=${SSL_CACHE_MAX_GB}
      - UI_AUTH_USER=${UI_AUTH_USER:-}
      - UI_AUTH_PASSWORD=${UI_AUTH_PASSWORD:-}
    depends_on:
      - proxy-standard
      - proxy-ssl
      - netdata
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Netdata (System-Metriken) ──────────────────────────────────────────────
  netdata:
    image: netdata/netdata
    hostname: lancache-netdata
    cap_add: [SYS_PTRACE]
    security_opt: [apparmor:unconfined]
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ── Watchtower (automatische Image-Updates, täglich) ──────────────────────
  # Aktiv wenn COMPOSE_PROFILES=watchtower in .env gesetzt ist (Standard).
  # Deaktivieren: COMPOSE_PROFILES= (leer lassen) oder beim setup.sh Opt-out wählen.
  watchtower:
    image: containrrr/watchtower:1.7.2
    profiles: [watchtower]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=86400
      - WATCHTOWER_CLEANUP=true
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

volumes:
  proxy-standard-logs:
  proxy-ssl-logs:
  watchdog-status:
  netdataconfig:
  netdatalib:
  netdatacache:
