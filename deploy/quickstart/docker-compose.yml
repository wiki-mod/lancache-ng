# LanCache-NG — Quickstart (no repo clone needed)
#
# Prerequisites:
#   1. Run setup.sh — configures .env and starts everything automatically
#      Or manually:
#   2. Edit .env: adjust IPs and cache paths
#   3. Create cache directories:
#        mkdir -p /opt/lancache-ng/cache/standard /opt/lancache-ng/cache/ssl
#   4. (optional) Add second LAN IP:
#        ip addr add 192.168.234.11/24 dev eth0
#   5. Start:
#        docker compose pull && docker compose up -d
#   6. Get CA certificate for SSL mode (after first start):
#        ./certs/ca.crt → install on clients (docs: github.com/wiki-mod/lancache-ng)
#
# Customize domain lists: via Admin UI (port 8080) or
# mount custom files (see deploy/prod/docker-compose.yml in repo).

name: lancache-ng

services:

  # ── Unified proxy (standard + SSL mode in one container) ─────────────────
  proxy:
    container_name: lancache-proxy
    image: ghcr.io/wiki-mod/lancache-ng/proxy:latest
    environment:
      - CACHE_MAX_SIZE=${CACHE_MAX_SIZE}
      - CACHE_MEM_MB=${CACHE_MEM_MB}
      - CACHE_INACTIVE=${CACHE_INACTIVE}
      - CACHE_SLICE_SIZE=${CACHE_SLICE_SIZE}
      - CACHE_VALID_HIT=${CACHE_VALID_HIT}
      - CACHE_VALID_ANY=${CACHE_VALID_ANY}
      - IP_STANDARD=${IP_STANDARD}
      - IP_SSL=${IP_SSL}
      - SSL_ENABLED=${SSL_ENABLED:-0}
      - NGINX_UPSTREAM_RESOLVER=${NGINX_UPSTREAM_RESOLVER}
      - PROXY_SECURITY_MODE=${PROXY_SECURITY_MODE:-lazy}
      - PROXY_ALLOWED_CLIENT_CIDRS=${PROXY_ALLOWED_CLIENT_CIDRS:-}
    volumes:
      - ./certs:/etc/nginx/ssl/ca
      - ${CACHE_DIR_STANDARD}:/var/cache/nginx/lancache
      - proxy-logs:/var/log/nginx
    ports:
      - "${IP_STANDARD}:80:80"
      - "${IP_STANDARD}:443:8443"
      - "${IP_SSL:-127.0.0.1}:80:80"
      - "${IP_SSL:-127.0.0.1}:443:443"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  nats:
    image: nats:2-alpine
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /etc/nats
        printf 'jetstream { store_dir: /data }\nauthorization { token: "%s" }\n' "$${NATS_LOCAL_TOKEN}" > /etc/nats/nats.conf
        exec nats-server -c /etc/nats/nats.conf
    environment:
      - NATS_LOCAL_TOKEN=${NATS_LOCAL_TOKEN:-}
    volumes:
      - nats-data:/data
      - nats-conf:/etc/nats
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Log aggregator (optional, start with: docker compose --profile logging up) ──
  syslog:
    image: fluent/fluent-bit:3
    profiles: [logging]
    command: >
      /fluent-bit/bin/fluent-bit
      -i tail -p path=/var/log/nginx/access.log -p tag=nginx -p db=/data/flb.db
      -o file -m nginx -p path=/var/log/lancache -p file=nginx.log -p format=plain
    volumes:
      - proxy-logs:/var/log/nginx:ro
      - logs:/var/log/lancache
      - syslog-data:/data
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  dns-standard:
    container_name: lancache-dns-standard
    image: ghcr.io/wiki-mod/lancache-ng/dns:latest
    environment:
      - PROXY_IP=${IP_STANDARD}
      - LOG_QUERIES=0
      - NATS_URL=nats://nats:4222
      - NATS_TOKEN=${NATS_LOCAL_TOKEN:-}
      - NATS_CONSUMER=dns-standard
      - NATS_RECONCILER=1
      - PDNS_API_KEY=${PDNS_API_KEY:-}
    volumes:
      - pdns-data-standard:/var/lib/powerdns
    depends_on:
      - nats
    ports:
      - "${IP_STANDARD}:53:53/udp"
      - "${IP_STANDARD}:53:53/tcp"
    healthcheck:
      test: ["CMD-SHELL", "dig @127.0.0.1 steamcontent.com A +short +time=2 +tries=1 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}
  dns-ssl:
    profiles: [ssl]
    container_name: lancache-dns-ssl
    image: ghcr.io/wiki-mod/lancache-ng/dns:latest
    environment:
      - PROXY_IP=${IP_SSL}
      - LOG_QUERIES=0
      - NATS_URL=nats://nats:4222
      - NATS_TOKEN=${NATS_LOCAL_TOKEN:-}
      - NATS_CONSUMER=dns-ssl
      - PDNS_API_KEY=${PDNS_API_KEY:-}
    volumes:
      - pdns-data-ssl:/var/lib/powerdns
    depends_on:
      - nats
    ports:
      - "${IP_SSL}:53:53/udp"
      - "${IP_SSL}:53:53/tcp"
    healthcheck:
      test: ["CMD-SHELL", "dig @127.0.0.1 steamcontent.com A +short +time=2 +tries=1 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Watchdog (health monitoring, auto-restart, purge cron) ──────────────────
  # socket-proxy provides scoped Docker API access for UI and watchdog only.
  # CONTAINERS=1 + EXEC=1 + POST=1 permits container inspect/restart/exec
  # without granting image, volume, network, or host-management endpoints.
  # It is isolated on docker-api so other services cannot reach its EXEC-enabled API.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: "1"
      EXEC: "1"
      POST: "1"
    networks:
      - docker-api
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  watchdog:
    image: ghcr.io/wiki-mod/lancache-ng/watchdog:latest
    environment:
      - DOCKER_PROXY_URL=http://docker-socket-proxy:2375
      - CHECK_INTERVAL=30
      - RESTART_AFTER=3
      - DISK_WARN_PCT=85
      - DISK_ALARM_PCT=95
      - CACHE_VALID_DAYS=365
      - CACHE_DIR_STANDARD=/cache/cache
      - CONTAINER_PROXY=lancache-proxy
      - CONTAINER_DNS_STANDARD=lancache-dns-standard
      - CONTAINER_DNS_SSL=lancache-dns-ssl
      - SSL_ENABLED=${SSL_ENABLED:-0}
    volumes:
      - ${CACHE_DIR_STANDARD}:/cache/cache
      - watchdog-status:/var/run/watchdog
    depends_on:
      - docker-socket-proxy
    networks:
      - default
      - docker-api
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}


  # ── Admin UI ───────────────────────────────────────────────────────────────
  # UI is LAN-reachable by default for the quickstart workflow. Password protection
  # remains optional, but is recommended on shared or untrusted networks. Set
  # UI_BIND_IP=127.0.0.1 to restrict access to the host. Direct Docker socket mount
  # removed; Docker operations are proxied through the isolated docker-api network.
  ui:
    image: ghcr.io/wiki-mod/lancache-ng/ui:latest
    volumes:
      - proxy-logs:/var/log/nginx:ro
      - ${CACHE_DIR_STANDARD}:/var/cache/proxy:ro
      - nats-conf:/etc/nats
    ports:
      - "${UI_BIND_IP:-${IP_STANDARD}}:8080:8080"
    environment:
      - DOCKER_PROXY_URL=http://docker-socket-proxy:2375
      - DNS_STANDARD_SERVICE=dns-standard
      - DNS_SSL_SERVICE=dns-ssl
      - PROXY_SERVICE=proxy
      - NETDATA_URL=http://netdata:19999
      - STANDARD_IP=${IP_STANDARD}
      - SSL_IP=${IP_SSL}
      - STANDARD_CACHE_MAX_GB=${STANDARD_CACHE_MAX_GB}
      - SSL_CACHE_MAX_GB=${SSL_CACHE_MAX_GB}
      - UI_AUTH_USER=${UI_AUTH_USER:-}
      - UI_AUTH_PASSWORD=${UI_AUTH_PASSWORD:-}
      - NATS_URL=nats://nats:4222
      - NATS_LOCAL_TOKEN=${NATS_LOCAL_TOKEN:-}
      - SECONDARY_REGISTRATION_TOKEN=${SECONDARY_REGISTRATION_TOKEN:-}
      - PDNS_AUTH_URL=http://dns-standard:8081
      - PDNS_REC_URL=http://dns-standard:8082
      - PDNS_API_KEY=${PDNS_API_KEY:-}
      - DHCP_API_URL=http://dhcp:8000
      - DHCP_API_TOKEN=${DHCP_API_TOKEN:-${KEA_CTRL_TOKEN:-}}
    depends_on:
      - docker-socket-proxy
      - proxy
      - netdata
      - nats
    networks:
      - default
      - docker-api
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Netdata (system metrics) ───────────────────────────────────────────────
  netdata:
    image: netdata/netdata
    hostname: lancache-netdata
    cap_add: [SYS_PTRACE]
    security_opt: [apparmor:unconfined]
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - logs:/var/log/lancache:ro
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ── Watchtower (automatic updates) ────────────────────────────────────────────
  # Only active if COMPOSE_PROFILES contains watchtower (setup.sh prompts for this)
  # Fork from nicholas-fedor: actively maintained, NegotiateAPIVersion=true (Docker 29+)
  watchtower:
    profiles: [watchtower]
    image: ghcr.io/nicholas-fedor/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

networks:
  docker-api:
    internal: true

volumes:
  proxy-logs:
  watchdog-status:
  nats-data:
  nats-conf:
  netdataconfig:
  netdatalib:
  netdatacache:
  logs:
  syslog-data:
  pdns-data-standard:
  pdns-data-ssl:
