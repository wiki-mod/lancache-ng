# lancache-ng (https://github.com/wiki-mod/lancache-ng)
#
# LanCache-NG — Quickstart (no repo clone needed)
#
# Prerequisites:
#   1. Run setup.sh — configures .env and starts everything automatically
#      Or manually:
#   2. Edit .env: adjust IPs and the shared cache path
#   3. Create the cache directory:
#        mkdir -p /opt/lancache-ng/cache
#   4. (optional) Add second LAN IP:
#        ip addr add 192.168.234.11/24 dev eth0
#   5. Start:
#        docker compose pull && docker compose up -d
#   6. Get CA certificate for SSL mode (after first start):
#        ./certs/ca.crt → install on clients (docs: github.com/wiki-mod/lancache-ng)
#
# Customize domain lists: via Admin UI (port 8080) or
# mount custom files (see deploy/prod/docker-compose.yml in repo).

name: lancache-ng

# The Docker socket proxy's HAProxy allowlist lives in exactly one place,
# scripts/docker-socket-proxy.sh (mounted read-only below), which is the
# canonical source per docs/naming-conventions.md. This file used to also
# carry an unreferenced x-docker-socket-proxy-command YAML anchor with a
# near-duplicate copy of that same config -- it was never aliased anywhere
# (dead weight that could silently drift from the real script with no
# functional effect) and has been removed.

services:

  # ── Unified proxy (standard + SSL mode in one container) ─────────────────
  proxy:
    container_name: lancache-proxy
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/proxy:${LANCACHE_IMAGE_TAG:-latest}
    environment:
      - CACHE_MAX_SIZE=${CACHE_MAX_SIZE}
      - CACHE_MEM_MB=${CACHE_MEM_MB}
      - CACHE_INACTIVE=${CACHE_INACTIVE}
      - CACHE_SLICE_SIZE=${CACHE_SLICE_SIZE}
      - CACHE_VALID_HIT=${CACHE_VALID_HIT}
      - CACHE_VALID_ANY=${CACHE_VALID_ANY}
      - IP_STANDARD=${IP_STANDARD}
      - IP_SSL=${IP_SSL}
      - SSL_ENABLED=${SSL_ENABLED:-0}
      - NGINX_UPSTREAM_RESOLVER=${NGINX_UPSTREAM_RESOLVER}
      - PROXY_SECURITY_MODE=${PROXY_SECURITY_MODE:-lazy}
      - PROXY_ALLOWED_CLIENT_CIDRS=${PROXY_ALLOWED_CLIENT_CIDRS:-}
      - KEEP_KNOWN_GOOD_CONFIGS=${KEEP_KNOWN_GOOD_CONFIGS:-3}
    volumes:
      - ./certs:/etc/nginx/ssl/ca
      # One host cache directory is mounted into the unified proxy. Older
      # standard/ssl split-cache installs must be migrated before using this stack.
      - ${CACHE_DIR:?CACHE_DIR is required}:/var/cache/nginx/lancache
      - proxy-logs:/var/log/nginx
      # Known-good nginx config snapshots (#415): persistent, service-owned
      # volume so rollback survives container restarts/recreates.
      - proxy-config-snapshots:/var/lib/lancache-proxy
    ports:
      - "${IP_STANDARD}:80:80"
      - "${IP_STANDARD}:443:8443"
      - "${IP_SSL:-127.0.0.1}:80:80"
      - "${IP_SSL:-127.0.0.1}:443:443"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1/healthz >/dev/null && { [ \"$${SSL_ENABLED:-0}\" != \"1\" ] || curl -ksf https://127.0.0.1/healthz >/dev/null; }"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  nats:
    container_name: lancache-nats
    image: nats:2-alpine@sha256:c11af972c99ae542de8925e6a7d9c533aa1eb039660420d2074beed6089b3bf0
    # On every start: generate nats.conf from this container's own credentials
    # into the shared volume, chown it back to the Admin UI user, then exec
    # nats-server. In the v0.1.0 shared-token model the UI writes the same
    # shared config and restarts this service to reload it; regenerating here
    # keeps full recreates with rotated .env credentials convergent.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mkdir -p /etc/nats
        escape_sed() {
          printf '%s' "$$1" | sed 's/[\/&|]/\\&/g'
        }
        # Keep the shared config writable by the Admin UI user (UID/GID 10001) after NATS restarts.
        tmp_nats_conf="$(mktemp /etc/nats/.nats.conf.XXXXXX)"
        trap 'rm -f "$$tmp_nats_conf"' EXIT
        cat > /tmp/nats.conf.template <<'EOF'
        jetstream {
          store_dir: /data
        }
        authorization {
          users = [
            {
              user: "__NATS_UI_USER__"
              password: "__NATS_UI_PASSWORD__"
              permissions = {
                publish = ["lancache.dns.record", "lancache.dns.flush"]
              }
            }
            {
              user: "__NATS_DNS_WRITER_USER__"
              password: "__NATS_DNS_WRITER_PASSWORD__"
              permissions = {
                publish = [
                  "lancache.dns.record",
                  "$$JS.API.STREAM.INFO.LANCACHE_DNS",
                  "$$JS.API.STREAM.CREATE.LANCACHE_DNS",
                  "$$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
                  "$$JS.ACK.LANCACHE_DNS.>"
                ]
                subscribe = ["lancache.dns.>", "_INBOX.>"]
              }
            }
            {
              user: "__NATS_DNS_READER_USER__"
              password: "__NATS_DNS_READER_PASSWORD__"
              permissions = {
                publish = [
                  "$$JS.API.STREAM.INFO.LANCACHE_DNS",
                  "$$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
                  "$$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
                  "$$JS.ACK.LANCACHE_DNS.>"
                ]
                subscribe = ["lancache.dns.>", "_INBOX.>"]
              }
            }
          ]
        }
        EOF
        sed \
          -e "s|__NATS_UI_USER__|$$(escape_sed "$$NATS_UI_USER")|g" \
          -e "s|__NATS_UI_PASSWORD__|$$(escape_sed "$$NATS_UI_PASSWORD")|g" \
          -e "s|__NATS_DNS_WRITER_USER__|$$(escape_sed "$$NATS_DNS_WRITER_USER")|g" \
          -e "s|__NATS_DNS_WRITER_PASSWORD__|$$(escape_sed "$$NATS_DNS_WRITER_PASSWORD")|g" \
          -e "s|__NATS_DNS_READER_USER__|$$(escape_sed "$$NATS_DNS_READER_USER")|g" \
          -e "s|__NATS_DNS_READER_PASSWORD__|$$(escape_sed "$$NATS_DNS_READER_PASSWORD")|g" \
          /tmp/nats.conf.template > "$$tmp_nats_conf"
        chown 10001:10001 "$$tmp_nats_conf"
        mv "$$tmp_nats_conf" /etc/nats/nats.conf
        trap - EXIT
        exec nats-server -c /etc/nats/nats.conf
    environment:
      - NATS_UI_USER=${NATS_UI_USER:?NATS_UI_USER is required}
      - NATS_UI_PASSWORD=${NATS_UI_PASSWORD:?NATS_UI_PASSWORD is required}
      - NATS_DNS_WRITER_USER=${NATS_DNS_WRITER_USER:?NATS_DNS_WRITER_USER is required}
      - NATS_DNS_WRITER_PASSWORD=${NATS_DNS_WRITER_PASSWORD:?NATS_DNS_WRITER_PASSWORD is required}
      - NATS_DNS_READER_USER=${NATS_DNS_READER_USER:?NATS_DNS_READER_USER is required}
      - NATS_DNS_READER_PASSWORD=${NATS_DNS_READER_PASSWORD:?NATS_DNS_READER_PASSWORD is required}
    volumes:
      - nats-data:/data
      - nats-conf:/etc/nats
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Log collector (#453; optional, start with: docker compose --profile logging up -d) ──
  # Tails the proxy access log into two independent pipelines: a local
  # plain-text file (kept for Netdata's web_log parser) and a forward to the
  # central syslog-ng receiver below. Config is passed as CLI flags because
  # this image ships no shell at all (distroless-style), and because
  # quickstart has no local repo checkout to bind-mount a config file from --
  # CLI flags are the one delivery mechanism that works identically across
  # dev/prod/quickstart.
  syslog:
    container_name: lancache-syslog
    image: cr.fluentbit.io/fluent/fluent-bit:3.2.10@sha256:d6dec000c4929a439562525728c708f6e99800d7ddc82efd6aa4f45f3a20b562
    profiles: [logging]
    command:
      - -f
      - "5"
      - -b
      - /data/flb-storage
      - -i
      - tail
      - -p
      - path=/var/log/nginx/access.log
      - -p
      - tag=nginx.file
      - -p
      - db=/data/flb-proxy-file.db
      - -p
      - skip_long_lines=on
      - -i
      - tail
      - -p
      - path=/var/log/nginx/access.log
      - -p
      - tag=nginx.syslog
      - -p
      - db=/data/flb-proxy-syslog.db
      - -p
      - skip_long_lines=on
      - -F
      - record_modifier
      - -m
      - nginx.syslog
      - -p
      - record=host lancache-proxy
      - -p
      - record=ident nginx-access
      - -o
      - file
      - -m
      - nginx.file
      - -p
      - path=/var/log/lancache
      - -p
      - file=nginx-proxy.log
      - -p
      - format=template
      - -p
      - template={log}
      - -o
      - syslog
      - -m
      - nginx.syslog
      - -p
      - host=syslog-ng
      - -p
      - port=601
      - -p
      - mode=tcp
      - -p
      - syslog_format=rfc5424
      - -p
      - syslog_hostname_key=host
      - -p
      - syslog_appname_key=ident
      - -p
      - syslog_message_key=log
    volumes:
      - proxy-logs:/var/log/nginx:ro
      - logs:/var/log/lancache
      - syslog-data:/data
    depends_on:
      - syslog-ng
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Central log receiver (#453; optional, start with: docker compose --profile logging up -d) ──
  # Receives forwarded logs from the `syslog` (fluent-bit) service above over
  # TCP/601 (RFC 5424, plain LF framing -- what fluent-bit's syslog output
  # sends by default) and writes them per-source, per-day under
  # logs-syslog-ng. Config and the rotation/compression loop are generated
  # inline for the same reason as fluent-bit above.
  syslog-ng:
    image: balabit/syslog-ng:latest@sha256:78ad81d617f83e46bf6fa9f45d5c437a841464be5e1cddfda2745e01e87dd335
    profiles: [logging]
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        mkdir -p /etc/syslog-ng
        cat > /etc/syslog-ng/syslog-ng.conf <<'EOF'
        @version: 4.8

        options {
            time-reap(30);
            mark-freq(10);
            keep-hostname(yes);
            create-dirs(yes);
            dir-perm(0750);
            perm(0640);
        };

        source s_forwarders {
            network(transport(tcp) port(601) flags(syslog-protocol));
        };

        destination d_lancache {
            file(
                "/var/log/lancache-syslog-ng/$${HOST}/$${YEAR}$${MONTH}$${DAY}.log"
                template("$$ISODATE $$HOST $$PROGRAM: $$MSGONLY\n")
                create-dirs(yes)
            );
        };

        log { source(s_forwarders); destination(d_lancache); };
        EOF
        # Size-bounded rotation + zstd high-compression (#453): every
        # SYSLOG_NG_ROTATE_INTERVAL_SECONDS, rotate any active log file once it
        # exceeds SYSLOG_MAX_FILE_MB, signal syslog-ng to reopen the (now
        # recreated) destination file, then compress the rotated file with
        # zstd -T0 (all cores) at SYSLOG_COMPRESSION_LEVEL. Falls back to gzip
        # if zstd cannot be installed (e.g. no network egress at startup), so
        # rotation/compression degrades gracefully instead of failing hard.
        # This is a fixed-threshold baseline, not the full SYSLOG_MAX_GB /
        # SYSLOG_RETENTION_DAYS size-priority budget engine -- see follow-up #633.
        (
          if ! command -v zstd >/dev/null 2>&1; then
            apt-get update -qq && apt-get install -y --no-install-recommends zstd >/dev/null 2>&1 || true
          fi
          while true; do
            sleep "$${SYSLOG_NG_ROTATE_INTERVAL_SECONDS:-300}"
            find /var/log/lancache-syslog-ng -type f -name '*.log' -size +"$${SYSLOG_MAX_FILE_MB:-100}"M 2>/dev/null | while read -r f; do
              ts="$$(date -u +%Y%m%dT%H%M%SZ)"
              mv "$$f" "$${f}.$${ts}"
              kill -HUP 1 2>/dev/null || true
              if command -v zstd >/dev/null 2>&1; then
                zstd -q -T0 "-$${SYSLOG_COMPRESSION_LEVEL:-19}" --rm "$${f}.$${ts}" 2>/dev/null || true
              else
                gzip "$${f}.$${ts}" 2>/dev/null || true
              fi
            done
          done
        ) &
        exec /usr/local/bin/entrypoint.sh
    environment:
      - SYSLOG_MAX_FILE_MB=${SYSLOG_MAX_FILE_MB:-100}
      - SYSLOG_COMPRESSION_LEVEL=${SYSLOG_COMPRESSION_LEVEL:-19}
      - SYSLOG_NG_ROTATE_INTERVAL_SECONDS=${SYSLOG_NG_ROTATE_INTERVAL_SECONDS:-300}
    volumes:
      - logs-syslog-ng:/var/log/lancache-syslog-ng
    healthcheck:
      test: ["CMD-SHELL", "syslog-ng-ctl healthcheck --timeout 5"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  dns-standard:
    container_name: lancache-dns-standard
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/dns:${LANCACHE_IMAGE_TAG:-latest}
    environment:
      - PROXY_IP=${IP_STANDARD}
      - LOG_QUERIES=0
      - NATS_URL=nats://nats:4222
      - NATS_USER=${NATS_DNS_WRITER_USER:?NATS_DNS_WRITER_USER is required}
      - NATS_PASSWORD=${NATS_DNS_WRITER_PASSWORD:?NATS_DNS_WRITER_PASSWORD is required}
      - NATS_CONSUMER=dns-standard
      - NATS_RECONCILER=1
      - PDNS_API_KEY=${PDNS_API_KEY:?PDNS_API_KEY is required}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY:-}
    volumes:
      - pdns-data-standard:/var/lib/powerdns
      - pdns-filter-state:/var/lib/powerdns-state
    depends_on:
      - nats
    ports:
      - "${IP_STANDARD}:53:53/udp"
      - "${IP_STANDARD}:53:53/tcp"
    healthcheck:
      test: ["CMD-SHELL", "dig @127.0.0.1 steamcontent.com A +short +time=2 +tries=1 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}
  dns-ssl:
    profiles: [ssl]
    container_name: lancache-dns-ssl
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/dns:${LANCACHE_IMAGE_TAG:-latest}
    environment:
      - PROXY_IP=${IP_SSL}
      - LOG_QUERIES=0
      - NATS_URL=nats://nats:4222
      - NATS_USER=${NATS_DNS_READER_USER:?NATS_DNS_READER_USER is required}
      - NATS_PASSWORD=${NATS_DNS_READER_PASSWORD:?NATS_DNS_READER_PASSWORD is required}
      - NATS_CONSUMER=dns-ssl
      - PDNS_API_KEY=${PDNS_API_KEY:?PDNS_API_KEY is required}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY:-}
    volumes:
      - pdns-data-ssl:/var/lib/powerdns
      - pdns-filter-state:/var/lib/powerdns-state
    depends_on:
      - nats
    ports:
      - "${IP_SSL}:53:53/udp"
      - "${IP_SSL}:53:53/tcp"
    healthcheck:
      test: ["CMD-SHELL", "dig @127.0.0.1 steamcontent.com A +short +time=2 +tries=1 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Watchdog (health monitoring, auto-restart, purge cron) ──────────────────
  # socket-proxy provides scoped Docker API access for UI and watchdog only.
  # A custom HAProxy allowlist replaces Tecnativa's broad CONTAINERS/POST
  # toggles with a deny-by-default allowlist for named lancache-ng containers.
  # It is isolated on docker-api so other services cannot reach the proxy API.
  docker-socket-proxy:
    container_name: lancache-docker-socket-proxy
    image: tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    entrypoint: ["/usr/local/bin/lancache-docker-socket-proxy.sh"]
    command: []
    stdin_open: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./scripts/docker-socket-proxy.sh:/usr/local/bin/lancache-docker-socket-proxy.sh:ro
    networks:
      - docker-api
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  watchdog:
    container_name: lancache-watchdog
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/watchdog:${LANCACHE_IMAGE_TAG:-latest}
    environment:
      - DOCKER_PROXY_URL=http://docker-socket-proxy:2375
      - CHECK_INTERVAL=30
      - RESTART_AFTER=3
      - DISK_WARN_PCT=85
      - DISK_ALARM_PCT=95
      - CACHE_VALID_DAYS=365
      - CACHE_DIR=/var/cache/lancache
      - CONTAINER_PROXY=lancache-proxy
      - CONTAINER_DNS_STANDARD=lancache-dns-standard
      - CONTAINER_DNS_SSL=lancache-dns-ssl
      - SSL_ENABLED=${SSL_ENABLED:-0}
    volumes:
      # The watchdog reports and purges the same shared cache path the proxy uses.
      # Do not point this at a per-mode subdirectory; the split paths no longer exist.
      - ${CACHE_DIR:?CACHE_DIR is required}:/var/cache/lancache
      - watchdog-status:/var/run/watchdog
    depends_on:
      - docker-socket-proxy
    networks:
      - default
      - docker-api
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── DHCP Server (Kea) ─────────────────────────────────────────────────────
  # Full DHCP mode with Control Agent API. Active only with COMPOSE_PROFILES=dhcp-kea.
  dhcp:
    profiles: [dhcp-kea]
    container_name: lancache-dhcp
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/dhcp:${LANCACHE_IMAGE_TAG:-latest}
    environment:
      - DHCP_DNS_PRIMARY=${IP_STANDARD}
      - DHCP_DNS_SECONDARY=${IP_SSL:-${IP_STANDARD}}
      - DHCP_DNS_SERVER_IP=${IP_STANDARD}
      - DHCP_DNS_SERVER_IP_SSL=${IP_SSL:-${IP_STANDARD}}
      - DDNS_TSIG_KEY=${DDNS_TSIG_KEY:-}
      - KEA_CTRL_TOKEN=${KEA_CTRL_TOKEN:?KEA_CTRL_TOKEN is required}
      - DHCP_MODE=${DHCP_MODE:-disabled}
      - DHCP_SUBNET=${DHCP_SUBNET:-}
      - DHCP_GATEWAY=${DHCP_GATEWAY:-}
      - DHCP_RANGE_START=${DHCP_RANGE_START:-}
      - DHCP_RANGE_END=${DHCP_RANGE_END:-}
    volumes:
      - ${KEA_DATA_DIR:-./kea}:/var/lib/kea
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
      - NET_ADMIN
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          host="$${KEA_CTRL_HOST:-127.0.0.1}";
          [ "$$host" = "0.0.0.0" ] && host=127.0.0.1;
          curl -sf -u admin:$${KEA_CTRL_TOKEN}
          -H 'Content-Type: application/json'
          -d '{"command":"config-get","service":["dhcp4"]}'
          "http://$$host:8000/" | jq -e '.[0].result == 0' >/dev/null
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── DHCP Proxy (dnsmasq) ──────────────────────────────────────────────────
  # Proxy mode keeps an existing router DHCP server and serves proxy-DHCP/PXE clients.
  dhcp-proxy:
    profiles: [dhcp-proxy]
    container_name: lancache-dhcp-proxy
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/dhcp-proxy:${LANCACHE_IMAGE_TAG:-latest}
    volumes:
      - ui-data:/data:ro
      # Known-good dnsmasq config snapshots (#415): persistent, service-owned
      # volume so rollback survives container restarts/recreates.
      - dhcp-proxy-config-snapshots:/var/lib/lancache-dhcp-proxy
    environment:
      - DHCP_SUBNET_START=${DHCP_SUBNET_START:-}
      - DHCP_DNS_PRIMARY=${DHCP_DNS_PRIMARY:-}
      - DHCP_DNS_SECONDARY=${DHCP_DNS_SECONDARY:-}
      - UPSTREAM_DHCP_IP=${UPSTREAM_DHCP_IP:-}
      - KEEP_KNOWN_GOOD_CONFIGS=${KEEP_KNOWN_GOOD_CONFIGS:-3}
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── DHCP conflict probe ────────────────────────────────────────────────────
  # Predeclared start/stop/wait helper for the Admin UI's "check for other
  # DHCP servers" feature. Reuses the UI image (already has nmap and dhclient
  # installed). The Admin UI stops then starts this container on demand and
  # reads its output — it never creates or removes it — so the narrowed
  # docker-socket-proxy only needs to permit start/restart, the same capability
  # class already used for the NATS and proxy-ssl reload flows, not generic
  # container creation.
  dhcp-probe:
    container_name: lancache-dhcp-probe
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/ui:${LANCACHE_IMAGE_TAG:-latest}
    entrypoint: ["/usr/local/bin/dhcp-probe.sh"]
    network_mode: host
    volumes:
      - ./scripts/dhcp-probe.sh:/usr/local/bin/dhcp-probe.sh:ro
    restart: "no"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ── Admin UI ───────────────────────────────────────────────────────────────
  # UI is LAN-reachable by default for the quickstart workflow. Password protection
  # remains optional, but is recommended on shared or untrusted networks. Set
  # UI_BIND_IP=127.0.0.1 to restrict access to the host. Direct Docker socket mount
  # removed; Docker operations are proxied through the isolated docker-api network.
  ui:
    container_name: lancache-ui
    image: ${LANCACHE_IMAGE_REGISTRY:-ghcr.io}/${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}/ui:${LANCACHE_IMAGE_TAG:-latest}
    volumes:
      - ui-data:/data
      - proxy-logs:/var/log/nginx:ro
      # Read-only cache mount is for size reporting only. Mutations stay in the proxy/watchdog.
      - ${CACHE_DIR:?CACHE_DIR is required}:/var/cache/proxy:ro
      - pdns-filter-state:/var/lib/powerdns-state
      - nats-conf:/etc/nats
    ports:
      - "${UI_BIND_IP:-${IP_STANDARD}}:8080:8080"
    environment:
      - DOCKER_PROXY_URL=http://docker-socket-proxy:2375
      - DNS_STANDARD_SERVICE=dns-standard
      - DNS_SSL_SERVICE=dns-ssl
      - PROXY_SERVICE=proxy
      - SSL_ENABLED=${SSL_ENABLED:-0}
      - PROXY_STANDARD_URL=http://proxy
      - PROXY_SSL_URL=http://proxy
      - PROXY_SSL_SERVICE=proxy
      - STANDARD_LOG=/var/log/nginx/access.log
      - SSL_LOG=/var/log/nginx/access.log
      - CACHE_DIR=/var/cache/proxy
      - NETDATA_URL=http://netdata:19999
      - STANDARD_IP=${IP_STANDARD}
      - SSL_IP=${IP_SSL}
      - LANCACHE_IMAGE_REGISTRY=${LANCACHE_IMAGE_REGISTRY:-ghcr.io}
      - LANCACHE_IMAGE_PREFIX=${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}
      - LANCACHE_IMAGE_CHANNEL=${LANCACHE_IMAGE_CHANNEL:-}
      - LANCACHE_IMAGE_TAG=${LANCACHE_IMAGE_TAG:-latest}
      - CACHE_MAX_GB=${CACHE_MAX_GB:-50}
      - UI_AUTH_USER=${UI_AUTH_USER:-}
      - UI_AUTH_PASSWORD=${UI_AUTH_PASSWORD:-}
      - ALLOW_INSECURE_UI=${ALLOW_INSECURE_UI:-false}
      - UI_SESSION_TTL_SECONDS=${UI_SESSION_TTL_SECONDS:-86400}
      - DHCP_MODE=${DHCP_MODE:-disabled}
      - DNS_STANDARD_STATE_DIR=/var/lib/powerdns-state
      - DNS_SSL_STATE_DIR=/var/lib/powerdns-state
      - NATS_URL=nats://nats:4222
      - NATS_UI_USER=${NATS_UI_USER:?NATS_UI_USER is required}
      - NATS_UI_PASSWORD=${NATS_UI_PASSWORD:?NATS_UI_PASSWORD is required}
      - NATS_DNS_WRITER_USER=${NATS_DNS_WRITER_USER:?NATS_DNS_WRITER_USER is required}
      - NATS_DNS_WRITER_PASSWORD=${NATS_DNS_WRITER_PASSWORD:?NATS_DNS_WRITER_PASSWORD is required}
      - NATS_DNS_READER_USER=${NATS_DNS_READER_USER:?NATS_DNS_READER_USER is required}
      - NATS_DNS_READER_PASSWORD=${NATS_DNS_READER_PASSWORD:?NATS_DNS_READER_PASSWORD is required}
      - SECONDARY_REGISTRATION_TOKEN=${SECONDARY_REGISTRATION_TOKEN:-}
      - PDNS_AUTH_URL=http://dns-standard:8081
      - PDNS_REC_URL=http://dns-standard:8082
      - PDNS_API_KEY=${PDNS_API_KEY:?PDNS_API_KEY is required}
      - DHCP_API_URL=http://host.docker.internal:8000
      - DHCP_API_TOKEN=${DHCP_API_TOKEN:-${KEA_CTRL_TOKEN:-}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - docker-socket-proxy
      - proxy
      - netdata
      - nats
    networks:
      - default
      - docker-api
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

  # ── Netdata (system metrics) ───────────────────────────────────────────────
  netdata:
    container_name: lancache-netdata
    image: netdata/netdata@sha256:a130dbbf3d6e6a5472efdebaa123797190a5822627e908106d34edae02bc8a74
    hostname: lancache-netdata
    cap_add: [SYS_PTRACE]
    security_opt: [apparmor:unconfined]
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - logs:/var/log/lancache:ro
    restart: always
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # ── Watchtower (optional helper updates) ──────────────────────────────────────
  # Only active if COMPOSE_PROFILES contains watchtower (setup.sh prompts for this)
  # Fork from nicholas-fedor: actively maintained, NegotiateAPIVersion=true (Docker 29+)
  watchtower:
    container_name: lancache-watchtower
    profiles: [watchtower]
    image: ghcr.io/nicholas-fedor/watchtower:latest@sha256:c1dfdf27fe805dcfefe1cf048cee6960a511c097a99aa355b0bc4be6e6bb3bdf
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
    restart: always
    logging:
      driver: json-file
      options: {max-size: "5m", max-file: "2"}

networks:
  docker-api:
    internal: true

volumes:
  proxy-logs:
  # Known-good config snapshots (#415), one persistent volume per adapter.
  proxy-config-snapshots:
  dhcp-proxy-config-snapshots:
  watchdog-status:
  nats-data:
  nats-conf:
  netdataconfig:
  netdatalib:
  netdatacache:
  logs:
  syslog-data:
  logs-syslog-ng:
  pdns-data-standard:
  pdns-data-ssl:
  pdns-filter-state:
  ui-data:
