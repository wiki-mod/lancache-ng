# lancache-ng (https://github.com/wiki-mod/lancache-ng)
#
# Path-based auto-labeling config for actions/labeler (see
# .github/workflows/labeler.yml). Reduces, but does not replace, the
# AG-GH-008 requirement that a PR carry at least one label -- this can
# only infer which service/area changed from file paths, it has no way to
# know the correct issue Type or Milestone. Keep this in sync with the
# label list in the repository settings and with services/*'s actual
# directory names when either changes.

dns:
  - changed-files:
      - any-glob-to-any-file: "services/dns/**"

pdns:
  - changed-files:
      - any-glob-to-any-file: "services/dns/**"

dhcp:
  - changed-files:
      - any-glob-to-any-file: "services/dhcp/**"

kea:
  - changed-files:
      - any-glob-to-any-file: "services/dhcp/**"

dhcp-proxy:
  - changed-files:
      - any-glob-to-any-file: "services/dhcp-proxy/**"

dnsmasq:
  - changed-files:
      - any-glob-to-any-file: "services/dhcp-proxy/**"

proxy:
  - changed-files:
      - any-glob-to-any-file: "services/proxy/**"

nginx:
  - changed-files:
      - any-glob-to-any-file: "services/proxy/**"

admin-ui:
  - changed-files:
      - any-glob-to-any-file: "services/ui/**"

rust:
  - changed-files:
      - any-glob-to-any-file:
          - "services/ui/**/*.rs"
          - "services/dns/nats-subscriber/**/*.rs"

watchdog:
  - changed-files:
      - any-glob-to-any-file: "services/watchdog/**"

syslog:
  - changed-files:
      - any-glob-to-any-file: "services/syslog/**"

nats:
  - changed-files:
      - any-glob-to-any-file: "services/nats/**"

setup:
  - changed-files:
      - any-glob-to-any-file:
          - "setup.sh"
          - "deploy/**"
          - "config/**"

docker:
  - changed-files:
      - any-glob-to-any-file:
          - "deploy/**"
          - "**/Dockerfile"

build-tools:
  - changed-files:
      - any-glob-to-any-file: "tools/build-tools/**"

ci:
  - changed-files:
      - any-glob-to-any-file: ".github/workflows/**"

github_actions:
  - changed-files:
      - any-glob-to-any-file: ".github/workflows/**"

tooling:
  - changed-files:
      - any-glob-to-any-file: "scripts/**"

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "**/*.md"
