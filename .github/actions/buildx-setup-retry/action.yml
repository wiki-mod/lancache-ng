# lancache-ng (https://github.com/wiki-mod/lancache-ng)
name: Docker Buildx setup with retry
description: >-
  Wraps docker/setup-buildx-action with a retry policy for GitHub-hosted
  arm64 runners (issue #930): set up once, and on failure wait and retry the
  identical setup -- up to 4 total attempts (1 initial + 3 retries).

# GitHub Actions composite steps cannot loop, and `uses:` cannot be
# parameterized by an input (the action reference must be static YAML), so
# the "at least 3 retries" attempt count below is 4 explicit, chained
# docker/setup-buildx-action steps -- same constraint and same shape as
# .github/actions/ghcr-build-push-retry and .github/actions/ghcr-attest-retry.
#
# Unlike those two actions, there is no re-authentication step between
# attempts here: the failure this wraps (issue #930) is
# `docker buildx create --use`'s implicit bootstrap pull of
# `moby/buildkit:buildx-stable-1` from Docker Hub failing with
# "unauthorized: authentication required" -- Docker Hub's anonymous-pull
# rate limit surfacing as an auth error, hit because a GitHub-hosted arm64
# runner is a fresh VM every run (no local image cache) pulling that image
# unauthenticated. There is no credential to re-supply before a retry: the
# pull is anonymous by design (see issue #930's option 2 -- provisioning
# Docker Hub auth for this pull needs a maintainer-approved new secret and
# is explicitly out of scope for this action). Waiting out the momentary
# rate-limit window and retrying the identical, still-anonymous pull is
# sufficient, since the failure has been confirmed transient (a rerun with
# zero code changes succeeds).
#
# Scope: only wrap the Buildx bootstrap on GitHub-hosted arm64 runners with
# this action. Self-hosted amd64 runners persist their local Buildx
# cache/image pulls across runs and have never shown this symptom -- do not
# switch their plain `docker/setup-buildx-action` step to this action.
inputs:
  version:
    required: false
    default: ""
  driver:
    required: false
    default: "docker-container"
  driver-opts:
    required: false
    default: ""
  buildkitd-flags:
    required: false
    default: ""
  buildkitd-config:
    required: false
    default: ""
  buildkitd-config-inline:
    required: false
    default: ""
  use:
    required: false
    default: "true"
  name:
    required: false
    default: ""
  endpoint:
    required: false
    default: ""
  platforms:
    required: false
    default: ""
  append:
    required: false
    default: ""
  keep-state:
    required: false
    default: "false"
  cache-binary:
    required: false
    default: "true"
  cleanup:
    required: false
    default: "true"
  backoff-seconds:
    description: Seconds to wait before each retry.
    required: false
    default: "30"
outputs:
  name:
    description: Builder name from whichever attempt succeeded.
    value: ${{ steps.resolve.outputs.name }}
  driver:
    description: Builder driver from whichever attempt succeeded.
    value: ${{ steps.resolve.outputs.driver }}
  platforms:
    description: Builder node platforms from whichever attempt succeeded.
    value: ${{ steps.resolve.outputs.platforms }}
  nodes:
    description: Builder nodes metadata from whichever attempt succeeded.
    value: ${{ steps.resolve.outputs.nodes }}
  endpoint:
    description: Builder node endpoint (deprecated) from whichever attempt succeeded.
    value: ${{ steps.resolve.outputs.endpoint }}
  status:
    description: Builder node status (deprecated) from whichever attempt succeeded.
    value: ${{ steps.resolve.outputs.status }}
  flags:
    description: Builder node flags (deprecated) from whichever attempt succeeded.
    value: ${{ steps.resolve.outputs.flags }}
runs:
  using: composite
  steps:
    - id: attempt1
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      continue-on-error: true
      with:
        version: ${{ inputs.version }}
        driver: ${{ inputs.driver }}
        driver-opts: ${{ inputs.driver-opts }}
        buildkitd-flags: ${{ inputs.buildkitd-flags }}
        buildkitd-config: ${{ inputs.buildkitd-config }}
        buildkitd-config-inline: ${{ inputs.buildkitd-config-inline }}
        use: ${{ inputs.use }}
        name: ${{ inputs.name }}
        endpoint: ${{ inputs.endpoint }}
        platforms: ${{ inputs.platforms }}
        append: ${{ inputs.append }}
        keep-state: ${{ inputs.keep-state }}
        cache-binary: ${{ inputs.cache-binary }}
        cleanup: ${{ inputs.cleanup }}

    - name: Wait before retry 1
      if: steps.attempt1.outcome == 'failure'
      shell: bash
      run: sleep "${{ inputs.backoff-seconds }}"

    - id: attempt2
      if: steps.attempt1.outcome == 'failure'
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      continue-on-error: true
      with:
        version: ${{ inputs.version }}
        driver: ${{ inputs.driver }}
        driver-opts: ${{ inputs.driver-opts }}
        buildkitd-flags: ${{ inputs.buildkitd-flags }}
        buildkitd-config: ${{ inputs.buildkitd-config }}
        buildkitd-config-inline: ${{ inputs.buildkitd-config-inline }}
        use: ${{ inputs.use }}
        name: ${{ inputs.name }}
        endpoint: ${{ inputs.endpoint }}
        platforms: ${{ inputs.platforms }}
        append: ${{ inputs.append }}
        keep-state: ${{ inputs.keep-state }}
        cache-binary: ${{ inputs.cache-binary }}
        cleanup: ${{ inputs.cleanup }}

    - name: Wait before retry 2
      if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
      shell: bash
      run: sleep "${{ inputs.backoff-seconds }}"

    - id: attempt3
      if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      continue-on-error: true
      with:
        version: ${{ inputs.version }}
        driver: ${{ inputs.driver }}
        driver-opts: ${{ inputs.driver-opts }}
        buildkitd-flags: ${{ inputs.buildkitd-flags }}
        buildkitd-config: ${{ inputs.buildkitd-config }}
        buildkitd-config-inline: ${{ inputs.buildkitd-config-inline }}
        use: ${{ inputs.use }}
        name: ${{ inputs.name }}
        endpoint: ${{ inputs.endpoint }}
        platforms: ${{ inputs.platforms }}
        append: ${{ inputs.append }}
        keep-state: ${{ inputs.keep-state }}
        cache-binary: ${{ inputs.cache-binary }}
        cleanup: ${{ inputs.cleanup }}

    - name: Wait before retry 3
      if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure' && steps.attempt3.outcome == 'failure'
      shell: bash
      run: sleep "${{ inputs.backoff-seconds }}"

    - id: attempt4
      if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure' && steps.attempt3.outcome == 'failure'
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      continue-on-error: true
      with:
        version: ${{ inputs.version }}
        driver: ${{ inputs.driver }}
        driver-opts: ${{ inputs.driver-opts }}
        buildkitd-flags: ${{ inputs.buildkitd-flags }}
        buildkitd-config: ${{ inputs.buildkitd-config }}
        buildkitd-config-inline: ${{ inputs.buildkitd-config-inline }}
        use: ${{ inputs.use }}
        name: ${{ inputs.name }}
        endpoint: ${{ inputs.endpoint }}
        platforms: ${{ inputs.platforms }}
        append: ${{ inputs.append }}
        keep-state: ${{ inputs.keep-state }}
        cache-binary: ${{ inputs.cache-binary }}
        cleanup: ${{ inputs.cleanup }}

    # continue-on-error on every attempt above means none of their failures
    # fail this composite action by itself -- this step is what actually
    # surfaces success/failure to the calling job, and is the only step that
    # inspects all four outcomes to find whichever attempt (if any) produced
    # real outputs.
    #
    # All attempt outcomes/outputs are passed via `env:` rather than spliced
    # directly into the script body as `${{ ... }}`. `nodes` is a multi-line
    # JSON blob containing double quotes (buildx node metadata, e.g. a
    # `"buildkitd-flags": "--allow-insecure-entitlement ..."` field) -- GitHub
    # Actions substitutes `${{ }}` expressions into the script as raw text
    # before bash ever parses it, so embedding that value inside a
    # double-quoted shell assignment (`nodes="${{ ... }}"`) let its own
    # embedded quotes break out of the shell string, turning fragments of the
    # JSON into separate, unintended commands (confirmed for real: this
    # produced `security.insecure: command not found`, exit 127, in CI on the
    # very first attempt-1-succeeds path -- not just a retry edge case).
    # `env:` values are passed through the runner's environment, not spliced
    # into the script source, so this class of injection cannot happen
    # regardless of what characters an attempt's outputs contain.
    - name: Resolve outcome across all attempts
      id: resolve
      if: always()
      shell: bash
      env:
        ATTEMPT1_OUTCOME: ${{ steps.attempt1.outcome }}
        ATTEMPT1_NAME: ${{ steps.attempt1.outputs.name }}
        ATTEMPT1_DRIVER: ${{ steps.attempt1.outputs.driver }}
        ATTEMPT1_PLATFORMS: ${{ steps.attempt1.outputs.platforms }}
        ATTEMPT1_NODES: ${{ steps.attempt1.outputs.nodes }}
        ATTEMPT1_ENDPOINT: ${{ steps.attempt1.outputs.endpoint }}
        ATTEMPT1_STATUS: ${{ steps.attempt1.outputs.status }}
        ATTEMPT1_FLAGS: ${{ steps.attempt1.outputs.flags }}
        ATTEMPT2_OUTCOME: ${{ steps.attempt2.outcome }}
        ATTEMPT2_NAME: ${{ steps.attempt2.outputs.name }}
        ATTEMPT2_DRIVER: ${{ steps.attempt2.outputs.driver }}
        ATTEMPT2_PLATFORMS: ${{ steps.attempt2.outputs.platforms }}
        ATTEMPT2_NODES: ${{ steps.attempt2.outputs.nodes }}
        ATTEMPT2_ENDPOINT: ${{ steps.attempt2.outputs.endpoint }}
        ATTEMPT2_STATUS: ${{ steps.attempt2.outputs.status }}
        ATTEMPT2_FLAGS: ${{ steps.attempt2.outputs.flags }}
        ATTEMPT3_OUTCOME: ${{ steps.attempt3.outcome }}
        ATTEMPT3_NAME: ${{ steps.attempt3.outputs.name }}
        ATTEMPT3_DRIVER: ${{ steps.attempt3.outputs.driver }}
        ATTEMPT3_PLATFORMS: ${{ steps.attempt3.outputs.platforms }}
        ATTEMPT3_NODES: ${{ steps.attempt3.outputs.nodes }}
        ATTEMPT3_ENDPOINT: ${{ steps.attempt3.outputs.endpoint }}
        ATTEMPT3_STATUS: ${{ steps.attempt3.outputs.status }}
        ATTEMPT3_FLAGS: ${{ steps.attempt3.outputs.flags }}
        ATTEMPT4_OUTCOME: ${{ steps.attempt4.outcome }}
        ATTEMPT4_NAME: ${{ steps.attempt4.outputs.name }}
        ATTEMPT4_DRIVER: ${{ steps.attempt4.outputs.driver }}
        ATTEMPT4_PLATFORMS: ${{ steps.attempt4.outputs.platforms }}
        ATTEMPT4_NODES: ${{ steps.attempt4.outputs.nodes }}
        ATTEMPT4_ENDPOINT: ${{ steps.attempt4.outputs.endpoint }}
        ATTEMPT4_STATUS: ${{ steps.attempt4.outputs.status }}
        ATTEMPT4_FLAGS: ${{ steps.attempt4.outputs.flags }}
      run: |
        set -euo pipefail
        if [[ "$ATTEMPT1_OUTCOME" == "success" ]]; then
          name="$ATTEMPT1_NAME"
          driver="$ATTEMPT1_DRIVER"
          platforms="$ATTEMPT1_PLATFORMS"
          nodes="$ATTEMPT1_NODES"
          endpoint="$ATTEMPT1_ENDPOINT"
          status="$ATTEMPT1_STATUS"
          flags="$ATTEMPT1_FLAGS"
        elif [[ "$ATTEMPT2_OUTCOME" == "success" ]]; then
          name="$ATTEMPT2_NAME"
          driver="$ATTEMPT2_DRIVER"
          platforms="$ATTEMPT2_PLATFORMS"
          nodes="$ATTEMPT2_NODES"
          endpoint="$ATTEMPT2_ENDPOINT"
          status="$ATTEMPT2_STATUS"
          flags="$ATTEMPT2_FLAGS"
        elif [[ "$ATTEMPT3_OUTCOME" == "success" ]]; then
          name="$ATTEMPT3_NAME"
          driver="$ATTEMPT3_DRIVER"
          platforms="$ATTEMPT3_PLATFORMS"
          nodes="$ATTEMPT3_NODES"
          endpoint="$ATTEMPT3_ENDPOINT"
          status="$ATTEMPT3_STATUS"
          flags="$ATTEMPT3_FLAGS"
        elif [[ "$ATTEMPT4_OUTCOME" == "success" ]]; then
          name="$ATTEMPT4_NAME"
          driver="$ATTEMPT4_DRIVER"
          platforms="$ATTEMPT4_PLATFORMS"
          nodes="$ATTEMPT4_NODES"
          endpoint="$ATTEMPT4_ENDPOINT"
          status="$ATTEMPT4_STATUS"
          flags="$ATTEMPT4_FLAGS"
        else
          echo "::error::All Docker Buildx setup attempts failed." >&2
          exit 1
        fi
        {
          echo "name=$name"
          echo "driver=$driver"
          echo "platforms=$platforms"
          echo "endpoint=$endpoint"
          echo "status=$status"
          echo "flags=$flags"
        } >> "$GITHUB_OUTPUT"
        {
          echo "nodes<<BUILDX_NODES"
          printf '%s\n' "$nodes"
          echo "BUILDX_NODES"
        } >> "$GITHUB_OUTPUT"
