# lancache-ng (https://github.com/wiki-mod/lancache-ng)
# GitHub Action for validating Rust build acceleration infrastructure (sccache, sccache-dist, distcc) configuration and connectivity
name: Rust acceleration infrastructure preflight
description: Validate Rust build acceleration infrastructure outside BuildKit cacheable Docker build layers.

inputs:
  service:
    description: Service name used for logs and sccache key prefix.
    required: true
  redis-file:
    description: Optional file containing the sccache Redis URL.
    required: false
    default: ""
  dist-config-file:
    description: Optional sccache-dist client configuration file.
    required: false
    default: ""
  distcc-hosts-file:
    description: Optional file containing DISTCC_POTENTIAL_HOSTS.
    required: false
    default: ""
  build-tools-image:
    description: Build tools image that provides rustc, sccache, distcc, and distcc-pump.
    required: false
    default: ghcr.io/wiki-mod/lancache-ng/build-tools:latest
  build-network:
    description: Docker network mode shared with the real Rust image builds.
    required: false
    default: bridge
  platform:
    description: Docker platform shared with the real Rust image builds.
    required: false
    default: linux/amd64

runs:
  using: composite
  steps:
    - name: Validate acceleration-infrastructure secrets
      shell: bash
      env:
        LANCACHE_SERVICE: ${{ inputs.service }}
        REDIS_FILE: ${{ inputs.redis-file }}
        DIST_CONFIG_FILE: ${{ inputs.dist-config-file }}
        DISTCC_HOSTS_FILE: ${{ inputs.distcc-hosts-file }}
        BUILD_TOOLS_IMAGE: ${{ inputs.build-tools-image }}
        BUILD_NETWORK: ${{ inputs.build-network }}
        BUILD_PLATFORM: ${{ inputs.platform }}
      run: |
        set -euo pipefail

        # This preflight is intentionally inert when no acceleration secrets are present.
        # Fallback CI paths should continue without LAN-only acceleration.
        mount_args=()
        if [ -n "$REDIS_FILE" ]; then
          [ -s "$REDIS_FILE" ] || { echo "::error::redis-file input points to an empty or missing file."; exit 1; }
          mount_args+=(-v "$REDIS_FILE:/run/lancache/sccache-redis-url:ro")
        fi
        if [ -n "$DIST_CONFIG_FILE" ]; then
          [ -s "$DIST_CONFIG_FILE" ] || { echo "::error::dist-config-file input points to an empty or missing file."; exit 1; }
          mount_args+=(-v "$DIST_CONFIG_FILE:/run/lancache/sccache-dist-config:ro")
        fi
        if [ -n "$DISTCC_HOSTS_FILE" ]; then
          [ -s "$DISTCC_HOSTS_FILE" ] || { echo "::error::distcc-hosts-file input points to an empty or missing file."; exit 1; }
          mount_args+=(-v "$DISTCC_HOSTS_FILE:/run/lancache/distcc-potential-hosts:ro")
        fi

        if [ "${#mount_args[@]}" -eq 0 ]; then
          echo "[INFO] no Rust acceleration secrets configured; skipping external preflight."
          exit 0
        fi

        # Pull and run the tools image outside BuildKit so cache layers cannot mask
        # acceleration-infrastructure failures.
        docker pull --platform "$BUILD_PLATFORM" "$BUILD_TOOLS_IMAGE" >/dev/null

        docker run --rm -i --platform "$BUILD_PLATFORM" --network "$BUILD_NETWORK" \
          "${mount_args[@]}" \
          -e "LANCACHE_SERVICE=$LANCACHE_SERVICE" \
          "$BUILD_TOOLS_IMAGE" \
          bash -s <<'PREFLIGHT'
            set -euo pipefail

            preflight_dir="$(mktemp -d)"
            cleanup() {
              if [ -n "${pump_started:-}" ]; then
                distcc-pump --shutdown >/dev/null 2>&1 || true
              fi
              rm -rf "$preflight_dir"
            }
            trap cleanup EXIT

            scan_log() {
              local log_file="$1"
              if grep -Eai "(^|[^[:alpha:]])(warning|warn|error|failed|failure|panic)([^[:alpha:]]|$)" "$log_file"; then
                echo "[ERROR] Rust acceleration preflight emitted a forbidden diagnostic." >&2
                exit 1
              fi
            }

            run_logged() {
              local log_file="$1"
              shift

              if ! "$@" >"$log_file" 2>&1; then
                cat "$log_file" >&2
                echo "[ERROR] Rust acceleration preflight command failed: $*" >&2
                exit 1
              fi
              scan_log "$log_file"
            }

            require_sccache_dist_connected() {
              local status_file="$1"
              if ! jq -e 'type == "object" and has("SchedulerStatus")' "$status_file" >/dev/null; then
                echo "[ERROR] sccache-dist did not report a connected scheduler status." >&2
                cat "$status_file" >&2
                exit 1
              fi
            }

            require_sccache_activity() {
              local stats_file="$1"
              local require_cache_write="$2"
              local count_cache_entries='
                def count_entries:
                  if type == "number" then .
                  elif type == "object" then ([.. | numbers] | add // 0)
                  else 0
                  end;
              '

              if ! jq -e '(.stats.compile_requests // 0) > 0' "$stats_file" >/dev/null; then
                echo "[ERROR] sccache did not record the Rust compile request." >&2
                cat "$stats_file" >&2
                exit 1
              fi

              if [ "$require_cache_write" = "1" ]; then
                if ! jq -e '(.stats.cache_writes // 0) > 0' "$stats_file" >/dev/null; then
                  echo "[ERROR] Redis-backed sccache did not record a cache write." >&2
                  cat "$stats_file" >&2
                  exit 1
                fi

                if ! jq -e "$count_cache_entries (.stats.cache_hits // {} | count_entries) > 0" "$stats_file" >/dev/null; then
                  echo "[ERROR] Redis-backed sccache did not record a cache read hit." >&2
                  cat "$stats_file" >&2
                  exit 1
                fi

                if ! jq -e '
                  (.stats.cache_read_errors // 0) == 0
                  and (.stats.cache_write_errors // 0) == 0
                  and (.stats.cache_timeouts // 0) == 0
                ' "$stats_file" >/dev/null; then
                  echo "[ERROR] Redis-backed sccache recorded cache read, write, or timeout errors." >&2
                  cat "$stats_file" >&2
                  exit 1
                fi

                if ! jq -e "$count_cache_entries (.stats.cache_errors // {} | count_entries) == 0" "$stats_file" >/dev/null; then
                  echo "[ERROR] Redis-backed sccache recorded cache backend errors." >&2
                  cat "$stats_file" >&2
                  exit 1
                fi
              fi
            }

            require_sccache_dist_activity() {
              local stats_file="$1"

              if ! jq -e '(.stats.dist_errors // 0) == 0' "$stats_file" >/dev/null; then
                echo "[ERROR] sccache-dist recorded distributed compile errors." >&2
                cat "$stats_file" >&2
                exit 1
              fi

              if ! jq -e '
                (.stats.dist_compiles // {}) as $dist
                | if ($dist | type) == "object" then
                    (($dist | to_entries | map(.value // 0) | add) // 0) > 0
                  else
                    (($dist | tonumber?) // 0) > 0
                  end
              ' "$stats_file" >/dev/null; then
                echo "[ERROR] sccache-dist did not record a successful distributed compile." >&2
                cat "$stats_file" >&2
                exit 1
              fi
            }

            if [ -s /run/lancache/sccache-redis-url ] || [ -s /run/lancache/sccache-dist-config ]; then
              export SCCACHE_NO_DAEMON=1
              export SCCACHE_SERVER_UDS="$preflight_dir/sccache.sock"
              export SCCACHE_REDIS_KEY_PREFIX="lancache-${LANCACHE_SERVICE}"
              require_cache_write=0
              require_dist_activity=0
              if [ -s /run/lancache/sccache-redis-url ]; then
                SCCACHE_REDIS="$(cat /run/lancache/sccache-redis-url)"
                export SCCACHE_REDIS
                require_cache_write=1
              fi
              if [ -s /run/lancache/sccache-dist-config ]; then
                export SCCACHE_CONF=/run/lancache/sccache-dist-config
                require_dist_activity=1
                dist_log="$preflight_dir/sccache-dist-status.log"
                run_logged "$dist_log" sccache --dist-status
                require_sccache_dist_connected "$dist_log"
              fi

              zero_stats_log="$preflight_dir/sccache-zero-stats.log"
              run_logged "$zero_stats_log" sccache --zero-stats
              mkdir -p "$preflight_dir/out"
              printf '%s\n' 'pub fn lancache_accel_preflight() -> u8 { 42 }' > "$preflight_dir/lib.rs"
              rust_log="$preflight_dir/sccache-rustc.log"
              run_logged "$rust_log" sccache rustc --crate-name lancache_accel_preflight --crate-type lib "$preflight_dir/lib.rs" --emit=link,dep-info --out-dir "$preflight_dir/out"
              run_logged "$rust_log" sccache rustc --crate-name lancache_accel_preflight --crate-type lib "$preflight_dir/lib.rs" --emit=link,dep-info --out-dir "$preflight_dir/out"
              stats_log="$preflight_dir/sccache-stats.log"
              run_logged "$stats_log" sccache --show-stats --stats-format=json
              require_sccache_activity "$stats_log" "$require_cache_write"
              if [ "$require_dist_activity" = "1" ]; then
                require_sccache_dist_activity "$stats_log"
              fi
              echo "[INFO] sccache preflight completed."
            fi

            if [ -s /run/lancache/distcc-potential-hosts ]; then
              wrapper_dir=""
              for candidate in /usr/local/lib/distcc /usr/lib/distcc; do
                if [ -x "$candidate/cc" ] && [ -x "$candidate/gcc" ] && [ -x "$candidate/c++" ] && [ -x "$candidate/g++" ]; then
                  wrapper_dir="$candidate"
                  break
                fi
              done
              if [ -z "$wrapper_dir" ]; then
                echo "[ERROR] distcc wrapper directory not found." >&2
                exit 1
              fi

              printf '%s\n' 'int main(void) { return 0; }' > "$preflight_dir/distcc-probe.c"

              distcc_hosts=""
              distcc_pump_hosts=""
              distcc_hosts_without_pump=""
              distcc_pump_filtered_hosts=""
              for distcc_host_spec in $(cat /run/lancache/distcc-potential-hosts); do
                distcc_host_base="${distcc_host_spec%%,*}"
                if [ -n "$distcc_host_base" ]; then
                  distcc_hosts="${distcc_hosts:+$distcc_hosts }$distcc_host_base"
                fi
                case "$distcc_host_spec" in
                  *,cpp*) distcc_pump_hosts="${distcc_pump_hosts:+$distcc_pump_hosts }$distcc_host_spec" ;;
                  *) distcc_hosts_without_pump="${distcc_hosts_without_pump:+$distcc_hosts_without_pump }$distcc_host_spec" ;;
                esac
              done
              if [ -z "$distcc_hosts" ]; then
                echo "[ERROR] DISTCC_POTENTIAL_HOSTS does not contain usable distcc hosts." >&2
                exit 1
              fi
              distcc_hosts_without_pump="${distcc_hosts_without_pump:-$distcc_hosts}"

              export PATH="$wrapper_dir:$PATH"
              export DISTCC_FALLBACK=0

              if [ -n "$distcc_pump_hosts" ]; then
                export DISTCC_POTENTIAL_HOSTS="$distcc_pump_hosts"
                unset DISTCC_HOSTS
                pump_env="$(distcc-pump --startup)"
                eval "$pump_env"
                distcc_pump_filtered_hosts="${DISTCC_HOSTS:-}"
                PATH="$wrapper_dir:$PATH"
                export PATH
                pump_started=1
                pump_log="$preflight_dir/distcc-pump.log"
                run_logged "$pump_log" cc -c "$preflight_dir/distcc-probe.c" -o "$preflight_dir/distcc-pump.o"
                distcc-pump --shutdown >/dev/null 2>&1 || true
                unset pump_started INCLUDE_SERVER_PORT INCLUDE_SERVER_PID DISTCC_POTENTIAL_HOSTS DISTCC_HOSTS
              fi

              distcc_hosts_without_pump="${distcc_pump_filtered_hosts:-$distcc_hosts_without_pump}"
              export DISTCC_HOSTS="$distcc_hosts_without_pump"
              distcc_log="$preflight_dir/distcc.log"
              run_logged "$distcc_log" cc -c "$preflight_dir/distcc-probe.c" -o "$preflight_dir/distcc.o"
              echo "[INFO] distcc preflight completed."
            fi
        PREFLIGHT
