# lancache-ng (https://github.com/wiki-mod/lancache-ng)
# release-drafter (https://github.com/release-drafter/release-drafter) config.
# Drafts/updates a GitHub Release incrementally on every merge to master/v0.2.0
# (see .github/workflows/release-drafter.yml), so release notes never need a
# manual collection step (#899, decided on #894).
#
# change-template uses $NUMBER + $TITLE only (not $BODY): $BODY is a merged
# PR's ENTIRE body (Summary, Scope Boundaries, Risk/Rollback, etc., not just
# its `## Changelog` section), and reliably isolating just that section via
# `replacers` regex across many concatenated per-PR blocks was tested against
# real PR bodies from this repo and found genuinely fragile to ship without a
# live release-drafter run to verify against (#899 tracks this as a
# deliberate fast-follow, not done here).
name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
change-template: '- #$NUMBER | $TITLE'
change-title-escapes: '\<*_&' # escape markdown special characters in PR titles

# Categories/labels below are matched against this repo's real, existing
# label set only (verified via `gh api repos/wiki-mod/lancache-ng/labels`) --
# no "fix"/"feature"/"major"/"minor"/"patch" labels exist here, so a config
# referencing them would just silently never match.
#
# Schema migrated to release-drafter's unified category model (#1131,
# https://github.com/release-drafter/release-drafter/pull/1558) to clear 8
# deprecation warnings the old top-level `categories[*].labels`,
# `exclude-labels`, and `version-resolver.{minor,patch}.labels` fields
# produced in real CI runs. No behavior change: each changelog category
# below still matches the same label(s) it did before (now via `when`
# instead of its own `label`/`labels` field) and carries the same
# `semver-increment` the old `version-resolver` block gave that label,
# since every version-resolver label already mapped 1:1 onto one of these
# categories. The trailing `type: "version-resolver"` category with no
# `when` reproduces the old `version-resolver.default: patch` fallback for
# PRs that don't match any category above -- per release-drafter's docs,
# such a category acts purely as that fallback, and "the highest matching
# increment wins across both category types", so it never overrides a
# category above that already resolved to `minor`.
categories:
  - title: '🐛 Fixed'
    semver-increment: 'patch'
    when:
      label: 'bug'
  - title: '🚀 Added'
    semver-increment: 'minor'
    when:
      label: 'enhancement'
  - title: '📚 Documentation'
    semver-increment: 'patch'
    when:
      label: 'documentation'
  - title: '🔧 Dependencies'
    semver-increment: 'patch'
    when:
      label: 'dependencies'
  - title: '🧰 Chore / CI'
    semver-increment: 'patch'
    when:
      labels: ['chore', 'ci']
  - type: 'pre-exclude' # opt out a PR from release notes by applying this label
    when:
      label: 'skip-changelog' # new label, added alongside this config
  - type: 'version-resolver' # fallback for PRs matching none of the categories above
    semver-increment: 'patch'
    # No "major" label/category exists yet either -- add one (a category with
    # `semver-increment: 'major'`) when this project actually needs to signal
    # a breaking-change release.

sort-by: merged_at
sort-direction: descending

template: |
  ## Changes

  $CHANGES
