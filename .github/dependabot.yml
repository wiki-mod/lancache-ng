# lancache-ng (https://github.com/wiki-mod/lancache-ng)
# Dependabot configuration for automated dependency updates (GitHub Actions, Rust, Docker)
#
# Every ecosystem is duplicated once per target-branch. Dependabot's own
# target-branch key accepts exactly one branch per update entry -- there is
# no way to list multiple branches for a single block -- and defaults to the
# repo's default branch (master) when omitted. All real feature/dependency
# work now lands on the `current_dev` branch (found and fixed per #709's
# audit of hardcoded v0.2.0 branch-name references: `v0.2.0` was the active
# branch when this file was first written, but it is now frozen and
# `current_dev` took over that role -- relying on the implicit master
# default, or on stale v0.2.0-only coverage, would silently leave the actual
# active branch with zero automated dependency scanning). `v0.2.0` keeps its
# own entries for now since it may still need security-only dependency
# updates while frozen; `master` keeps its own entries too rather than
# losing coverage there.
#
# BURST-FAN-OUT CONTROL (see issue #1065): each ecosystem is deliberately kept
# to ONE grouped update per target-branch so a weekly run opens ~3 PRs per
# branch, not one-per-directory. The Cargo and Docker blocks below use the
# multi-`directories` form with a single `groups:` entry so every crate's
# lockfile bump (Cargo) and every service Dockerfile's base-image bump (Docker)
# collapse into a SINGLE cross-directory PR per branch instead of one PR per
# directory. This matters because each merged PR is a push to a channel branch,
# and every such push runs the full per-service build/scan matrix on the scarce
# 5-runner `lancache-heavy` pool. The un-grouped, per-directory Docker layout
# previously fanned a single weekly `library/debian` digest bump out into six
# separate per-service PRs per branch; merging that backlog produced the
# near-simultaneous merge burst that saturated the heavy pool for over an hour
# (#1065). Grouping does not change WHAT gets updated -- only how many separate
# PRs/merges/pushes it takes to land the same set of updates.
version: 2
updates:
  # GitHub Actions -- one grouped PR per target branch (single directory: /).
  - package-ecosystem: github-actions
    directory: /
    target-branch: master
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    target-branch: current_dev
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: github-actions
    directory: /
    target-branch: v0.2.0
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Rust (Cargo) -- both crates (Admin UI + DNS NATS subscriber) collapse into
  # ONE grouped PR per target branch via the multi-`directories` form, instead
  # of a separate PR per crate directory.
  - package-ecosystem: cargo
    directories:
      - /services/ui
      - /services/dns/nats-subscriber
    target-branch: master
    schedule:
      interval: weekly
    groups:
      rust-deps:
        patterns: ["*"]
  - package-ecosystem: cargo
    directories:
      - /services/ui
      - /services/dns/nats-subscriber
    target-branch: current_dev
    schedule:
      interval: weekly
    groups:
      rust-deps:
        patterns: ["*"]
  - package-ecosystem: cargo
    directories:
      - /services/ui
      - /services/dns/nats-subscriber
    target-branch: v0.2.0
    schedule:
      interval: weekly
    groups:
      rust-deps:
        patterns: ["*"]

  # Docker base images -- all service Dockerfiles collapse into ONE grouped PR
  # per target branch. Every service pins the same Debian base, so a single
  # upstream digest bump previously opened six near-identical per-service PRs
  # per branch; the multi-`directories` group makes it one cross-service PR.
  - package-ecosystem: docker
    directories:
      - /services/proxy
      - /services/dns
      - /services/watchdog
      - /services/dhcp
      - /services/dhcp-proxy
      - /services/ui
    target-branch: master
    schedule:
      interval: weekly
    groups:
      docker-base-images:
        patterns: ["*"]
  - package-ecosystem: docker
    directories:
      - /services/proxy
      - /services/dns
      - /services/watchdog
      - /services/dhcp
      - /services/dhcp-proxy
      - /services/ui
    target-branch: current_dev
    schedule:
      interval: weekly
    groups:
      docker-base-images:
        patterns: ["*"]
  - package-ecosystem: docker
    directories:
      - /services/proxy
      - /services/dns
      - /services/watchdog
      - /services/dhcp
      - /services/dhcp-proxy
      - /services/ui
    target-branch: v0.2.0
    schedule:
      interval: weekly
    groups:
      docker-base-images:
        patterns: ["*"]
