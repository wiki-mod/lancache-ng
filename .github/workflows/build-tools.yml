# lancache-ng (https://github.com/wiki-mod/lancache-ng)
# CI workflow that builds, smoke-tests, and scans the multi-arch build-tools container
# image (providing rustc, sccache, distcc) locally, then publishes it to GHCR on a
# weekly schedule, on relevant pushes to master, and on manual dispatch. This
# image is CI infrastructure for acceleration checks, not a product runtime
# dependency.
#
# arm64 builds natively on a GitHub-hosted ubuntu-24.04-arm runner (same
# pattern as build-push.yml's build-arm64/merge-manifests, added by #592)
# instead of QEMU emulation on the self-hosted amd64 pool. Confirmed directly
# on #606: emulating tools/build-tools/Dockerfile's docker-compose source
# build (a large dependency tree pulling in github.com/moby/moby/client) under
# QEMU fails reproducibly with a Go compiler "bufio: buffer full" error while
# reading export data -- not a transient flake, a genuine emulation resource
# limit that the small pre-#606 actionlint-only arm64 build never hit. The
# same Dockerfile change built cleanly in ~6m37s on ubuntu-24.04-arm in the
# same PR's build-push.yml run, confirming native arm64 is the fix, not a
# tuning knob on the emulated build.
name: Build Tools Image

on:
  workflow_dispatch:
  schedule:
    # Weekly refresh for base-image and package updates without requiring a
    # product-code change.
    - cron: "23 3 * * 0"
  push:
    branches: [master, v0.2.0]
    paths:
      - "tools/build-tools/**"
      - ".github/workflows/build-tools.yml"
      - "tests/bats/**"
      - "tests/shellspec/**"
      - "setup.sh"
  pull_request:
    branches: [master, v0.2.0]
    paths:
      - "tools/build-tools/**"
      - ".github/workflows/build-tools.yml"
      - "tests/bats/**"
      - "tests/shellspec/**"
      - "setup.sh"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

env:
  BUILD_TOOLS_IMAGE: ghcr.io/${{ github.repository }}/build-tools
  BUILD_TOOLS_SCAN_IMAGE_AMD64: lancache-ng-build-tools-scan:${{ github.run_id }}-${{ github.run_attempt }}-amd64
  BUILD_TOOLS_SCAN_IMAGE_ARM64: lancache-ng-build-tools-scan:${{ github.run_id }}-${{ github.run_attempt }}-arm64

defaults:
  run:
    shell: bash

jobs:
  build-tools:
    name: build amd64 build-tools image
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    timeout-minutes: 90
    outputs:
      should-publish: ${{ steps.should-publish.outputs.should-publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # tests/bats/**, tests/shellspec/**, and setup.sh are in this workflow's
      # path filter so the local smoke-test/Bats/ShellSpec steps below
      # actually run when setup.sh changes, but a setup.sh-only change must
      # not also rebuild and publish the build-tools image itself -- that
      # stays tied to build-tools inputs (tools/build-tools/** or this
      # workflow file), per the "routine PRs must not rebuild the build-tools
      # image unless build-tools inputs changed" contract.
      - name: Determine whether build-tools inputs actually changed
        id: should-publish
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "push" ]; then
            # workflow_dispatch and the weekly schedule are explicit,
            # intentional rebuild requests; always publish. pull_request
            # never publishes regardless (gated separately below).
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before_sha="${{ github.event.before }}"
          if [ -z "$before_sha" ] || [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            # No usable base to diff (e.g. the branch's first push): fail
            # safe by publishing rather than silently skipping a real change.
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # The default checkout is shallow; fetch just the one missing base
          # commit on demand instead of a full-history clone (fetch-depth: 0
          # on this repo hit real "inflate: data stream error" checkout
          # failures on the runner -- confirmed by actually running this).
          if ! git cat-file -e "${before_sha}^{commit}" 2>/dev/null; then
            git fetch --quiet --depth=1 origin "$before_sha" 2>/dev/null || true
          fi

          if ! git cat-file -e "${before_sha}^{commit}" 2>/dev/null; then
            echo "::notice::Could not fetch base commit $before_sha to diff against; publishing to be safe."
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$before_sha" "${{ github.sha }}" -- tools/build-tools .github/workflows/build-tools.yml | grep -q .; then
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Only test-only paths (tests/bats/**, tests/shellspec/**, setup.sh) changed; skipping build-tools image rebuild/publish."
            echo "should-publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Prepare local Buildx cache
        id: buildx-cache
        env:
          BUILDX_CACHE_ROOT: /var/tmp/lancache-ng-buildx-cache
          BUILDX_CACHE_READ: ${{ runner.temp }}/lancache-ng-build-tools-cache/read
          BUILDX_CACHE_DEST: ${{ runner.temp }}/lancache-ng-build-tools-cache/new
        run: |
          set -euo pipefail

          if ! command -v flock >/dev/null 2>&1; then
            echo "::error::flock is required for safe local Buildx cache locking."
            exit 1
          fi

          cache_dir="$BUILDX_CACHE_ROOT/build-tools-amd64"
          lock_file="$BUILDX_CACHE_ROOT/build-tools-amd64.lock"

          mkdir -p "$BUILDX_CACHE_ROOT"
          rm -rf "$BUILDX_CACHE_READ" "$BUILDX_CACHE_DEST"
          mkdir -p "$BUILDX_CACHE_READ" "$(dirname "$BUILDX_CACHE_DEST")"

          (
            flock -x 9
            mkdir -p "$cache_dir"
            cp -a "$cache_dir/." "$BUILDX_CACHE_READ/"
          ) 9>"$lock_file"

          {
            echo "cache-from=$BUILDX_CACHE_READ"
            echo "cache-to=$BUILDX_CACHE_DEST"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && steps.should-publish.outputs.should-publish == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        # Suffixed like build-push.yml's per-platform legs: this job never
        # writes the real sha-<commit> tag directly -- merge-build-tools-manifests
        # combines this with build-tools-arm64's linux/arm64 tag into that tag.
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.BUILD_TOOLS_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short,suffix=-amd64

      - name: Compute immutable pushed source tag
        id: source-tag
        if: github.event_name != 'pull_request' && steps.should-publish.outputs.should-publish == 'true'
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::7}"
          printf 'image=%s:sha-%s-amd64\n' "$BUILD_TOOLS_IMAGE" "$short_sha" >> "$GITHUB_OUTPUT"

      # Pull requests cannot push to GHCR, so they build a local scan image
      # and run the smoke/Trivy checks before the workflow can pass.
      - name: Build local amd64 scan image
        id: local-build-amd64
        timeout-minutes: 60
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: tools/build-tools
          load: true
          pull: true
          tags: ${{ env.BUILD_TOOLS_SCAN_IMAGE_AMD64 }}
          platforms: linux/amd64
          provenance: false
          cache-from: type=local,src=${{ steps.buildx-cache.outputs.cache-from }}
          cache-to: type=local,dest=${{ steps.buildx-cache.outputs.cache-to }},mode=max

      - name: Smoke-test acceleration-infrastructure tools
        run: |
          set -euo pipefail

          docker run --rm --platform linux/amd64 "${BUILD_TOOLS_SCAN_IMAGE_AMD64:?BUILD_TOOLS_SCAN_IMAGE_AMD64 is required}" bash -c '
          set -euo pipefail

          required_tools=(
            actionlint
            bash
            bats
            cargo
            cargo-audit
            cargo-tarpaulin
            clippy-driver
            dig
            distcc
            distcc-pump
            docker
            envsubst
            jq
            rustc
            rustfmt
            sccache
            shellspec
            shellcheck
          )

          for tool in "${required_tools[@]}"; do
            command -v "$tool" >/dev/null
          done

          cargo --version
          cargo audit --version
          cargo-audit --version
          cargo tarpaulin --version
          cargo-tarpaulin --version
          sccache --version
          actionlint --version
          bats --version
          shellspec --version
          shellcheck --version
          distcc --version
          distcc-pump --help >/dev/null
          docker --version
          docker compose version
          '

      - name: Run Bats setup fixtures
        run: |
          set -euo pipefail

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_SCAN_IMAGE_AMD64:?BUILD_TOOLS_SCAN_IMAGE_AMD64 is required}" \
            bash -lc 'set -euo pipefail; bats tests/bats'

      - name: Run ShellSpec setup fixtures
        run: |
          set -euo pipefail

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_SCAN_IMAGE_AMD64:?BUILD_TOOLS_SCAN_IMAGE_AMD64 is required}" \
            bash -lc 'set -euo pipefail; shellspec --shell bash tests/shellspec'

      - name: Prepare local Trivy cache
        run: |
          set -euo pipefail
          mkdir -p /var/tmp/lancache-ng-trivy-cache/build-tools

      - name: Scan local build-tools amd64 image with Trivy
        timeout-minutes: 20
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.BUILD_TOOLS_SCAN_IMAGE_AMD64 }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          skip-dirs: /usr/local/rustup/toolchains
          hide-progress: true
          cache: "false"
          cache-dir: /var/tmp/lancache-ng-trivy-cache/build-tools
          timeout: 10m
          exit-code: "1"

      # Trusted refs publish only an immutable sha-*-amd64 source tag first.
      # merge-build-tools-manifests combines this with build-tools-arm64's tag
      # into the real sha-<commit> tag; mutable branch/latest tags are
      # promoted only after that combined tag exists.
      - name: Build and push amd64 build-tools image
        id: build
        if: github.event_name != 'pull_request' && steps.should-publish.outputs.should-publish == 'true'
        timeout-minutes: 60
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: tools/build-tools
          push: true
          tags: ${{ steps.source-tag.outputs.image }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: false
          pull: true
          cache-from: type=local,src=${{ steps.buildx-cache.outputs.cache-to }}

      - name: Prepare pushed build-tools Trivy cache
        if: github.event_name != 'pull_request' && steps.should-publish.outputs.should-publish == 'true'
        run: |
          set -euo pipefail
          mkdir -p /var/tmp/lancache-ng-trivy-cache/build-tools-pushed

      - name: Scan pushed amd64 build-tools digest with Trivy
        if: github.event_name != 'pull_request' && steps.should-publish.outputs.should-publish == 'true'
        timeout-minutes: 20
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.BUILD_TOOLS_IMAGE }}@${{ steps.build.outputs.digest }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          skip-dirs: /usr/local/rustup/toolchains
          hide-progress: true
          cache: "false"
          cache-dir: /var/tmp/lancache-ng-trivy-cache/build-tools-pushed
          timeout: 10m
          exit-code: "1"

      - name: Attest amd64 build-tools image provenance
        if: github.event_name != 'pull_request' && steps.should-publish.outputs.should-publish == 'true'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ env.BUILD_TOOLS_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Rotate local Buildx cache
        if: >-
          ${{
            always() &&
            steps.local-build-amd64.outcome == 'success' &&
            (
              github.event_name == 'pull_request' ||
              steps.build.outcome == 'success'
            )
          }}
        env:
          BUILDX_CACHE_ROOT: /var/tmp/lancache-ng-buildx-cache
          BUILDX_CACHE_DEST: ${{ steps.buildx-cache.outputs.cache-to }}
        run: |
          set -euo pipefail

          if [ ! -d "$BUILDX_CACHE_DEST" ]; then
            exit 0
          fi

          cache_dir="$BUILDX_CACHE_ROOT/build-tools-amd64"
          lock_file="$BUILDX_CACHE_ROOT/build-tools-amd64.lock"

          mkdir -p "$BUILDX_CACHE_ROOT"
          (
            flock -x 9
            rm -rf "$cache_dir"
            mv "$BUILDX_CACHE_DEST" "$cache_dir"
          ) 9>"$lock_file"

      - name: Remove local scan image
        if: always()
        run: |
          docker rmi "${BUILD_TOOLS_SCAN_IMAGE_AMD64}" || true

  build-tools-arm64:
    # Native linux/arm64 leg, same rationale as build-push.yml's build-arm64
    # (added by #592): a GitHub-hosted arm64 runner instead of QEMU on the
    # self-hosted amd64 pool. Runs independently of build-tools above (no
    # `needs:` between them, mirroring build/build-arm64's parallel
    # structure) -- only merge-build-tools-manifests below needs both.
    # This runner is outside the self-hosted LAN and cannot reach the local
    # Buildx cache volume, so it uses the GitHub Actions cache backend
    # (type=gha) instead, same as build-push.yml's build-arm64.
    name: build arm64 build-tools image (native)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    outputs:
      should-publish: ${{ steps.should-publish.outputs.should-publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Determine whether build-tools inputs actually changed
        id: should-publish
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "push" ]; then
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before_sha="${{ github.event.before }}"
          if [ -z "$before_sha" ] || [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git cat-file -e "${before_sha}^{commit}" 2>/dev/null; then
            git fetch --quiet --depth=1 origin "$before_sha" 2>/dev/null || true
          fi

          if ! git cat-file -e "${before_sha}^{commit}" 2>/dev/null; then
            echo "::notice::Could not fetch base commit $before_sha to diff against; publishing to be safe."
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$before_sha" "${{ github.sha }}" -- tools/build-tools .github/workflows/build-tools.yml | grep -q .; then
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Only test-only paths (tests/bats/**, tests/shellspec/**, setup.sh) changed; skipping build-tools image rebuild/publish."
            echo "should-publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && steps.should-publish.outputs.should-publish == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.BUILD_TOOLS_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short,suffix=-arm64

      - name: Compute immutable pushed source tag
        id: source-tag
        if: github.event_name != 'pull_request' && steps.should-publish.outputs.should-publish == 'true'
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::7}"
          printf 'image=%s:sha-%s-arm64\n' "$BUILD_TOOLS_IMAGE" "$short_sha" >> "$GITHUB_OUTPUT"

      - name: Build local arm64 scan image
        id: local-build-arm64
        timeout-minutes: 60
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: tools/build-tools
          load: true
          pull: true
          tags: ${{ env.BUILD_TOOLS_SCAN_IMAGE_ARM64 }}
          platforms: linux/arm64
          provenance: false
          cache-from: type=gha,scope=build-tools-arm64
          cache-to: type=gha,scope=build-tools-arm64,mode=max

      - name: Smoke-test acceleration-infrastructure tools
        run: |
          set -euo pipefail

          docker run --rm --platform linux/arm64 "${BUILD_TOOLS_SCAN_IMAGE_ARM64:?BUILD_TOOLS_SCAN_IMAGE_ARM64 is required}" bash -c '
          set -euo pipefail

          required_tools=(
            actionlint
            bash
            bats
            cargo
            cargo-audit
            cargo-tarpaulin
            clippy-driver
            dig
            distcc
            distcc-pump
            docker
            envsubst
            jq
            rustc
            rustfmt
            sccache
            shellspec
            shellcheck
          )

          for tool in "${required_tools[@]}"; do
            command -v "$tool" >/dev/null
          done

          cargo --version
          cargo audit --version
          cargo-audit --version
          cargo tarpaulin --version
          cargo-tarpaulin --version
          sccache --version
          actionlint --version
          bats --version
          shellspec --version
          shellcheck --version
          distcc --version
          distcc-pump --help >/dev/null
          docker --version
          docker compose version
          '

      - name: Scan local build-tools arm64 image with Trivy
        timeout-minutes: 20
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.BUILD_TOOLS_SCAN_IMAGE_ARM64 }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          skip-dirs: /usr/local/rustup/toolchains
          hide-progress: true
          cache: "false"
          timeout: 10m
          exit-code: "1"

      - name: Build and push arm64 build-tools image
        id: build
        if: github.event_name != 'pull_request' && steps.should-publish.outputs.should-publish == 'true'
        timeout-minutes: 60
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: tools/build-tools
          push: true
          tags: ${{ steps.source-tag.outputs.image }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          provenance: false
          pull: true
          cache-from: type=gha,scope=build-tools-arm64
          cache-to: type=gha,scope=build-tools-arm64,mode=max

      - name: Scan pushed arm64 build-tools digest with Trivy
        if: github.event_name != 'pull_request' && steps.should-publish.outputs.should-publish == 'true'
        timeout-minutes: 20
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.BUILD_TOOLS_IMAGE }}@${{ steps.build.outputs.digest }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          skip-dirs: /usr/local/rustup/toolchains
          hide-progress: true
          cache: "false"
          timeout: 10m
          exit-code: "1"

      - name: Attest arm64 build-tools image provenance
        if: github.event_name != 'pull_request' && steps.should-publish.outputs.should-publish == 'true'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ env.BUILD_TOOLS_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Remove local scan image
        if: always()
        run: |
          docker rmi "${BUILD_TOOLS_SCAN_IMAGE_ARM64}" || true

  merge-build-tools-manifests:
    # Combines build-tools's linux/amd64 tag with build-tools-arm64's
    # linux/arm64 tag into the real sha-<commit> multi-platform tag that
    # scripts/select-build-tools-image.sh and setup.sh consume -- same
    # imagetools create pattern as build-push.yml's merge-manifests, no image
    # is rebuilt here, only a manifest list assembled from two already-pushed
    # digests.
    name: merge build-tools multi-platform manifest
    needs: [build-tools, build-tools-arm64]
    if: >-
      ${{
        !cancelled() &&
        needs['build-tools'].result == 'success' &&
        needs['build-tools-arm64'].result == 'success' &&
        github.event_name != 'pull_request' &&
        needs['build-tools'].outputs.should-publish == 'true'
      }}
    runs-on: [self-hosted, linux, lancache, lancache-light]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform manifest and promote mutable tags
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::7}"
          amd64_image="${BUILD_TOOLS_IMAGE}:sha-${short_sha}-amd64"
          arm64_image="${BUILD_TOOLS_IMAGE}:sha-${short_sha}-arm64"
          source_tag="${BUILD_TOOLS_IMAGE}:sha-${short_sha}"

          docker buildx imagetools create -t "$source_tag" "$amd64_image" "$arm64_image"

          branch_tag="$(printf '%s' "$REF_NAME" | tr '/:@' '---' | tr -cd 'A-Za-z0-9_.-')"
          if [ -z "$branch_tag" ]; then
            echo "::error::Could not derive a safe mutable build-tools branch tag from '$REF_NAME'."
            exit 1
          fi

          docker buildx imagetools create --prefer-index=false -t "${BUILD_TOOLS_IMAGE}:${branch_tag}" "$source_tag"
          if [ "$REF_NAME" = "$DEFAULT_BRANCH" ]; then
            docker buildx imagetools create --prefer-index=false -t "${BUILD_TOOLS_IMAGE}:latest" "$source_tag"
          fi
