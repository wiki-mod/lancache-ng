# lancache-ng (https://github.com/wiki-mod/lancache-ng)
# CI workflow that builds, smoke-tests, and scans the multi-arch build-tools container
# image (providing rustc, sccache, distcc) locally, then publishes it to GHCR on a
# weekly schedule, on relevant pushes to master, and on manual dispatch. This
# image is CI infrastructure for acceleration checks, not a product runtime
# dependency.
name: Build Tools Image

on:
  workflow_dispatch:
  schedule:
    # Weekly refresh for base-image and package updates without requiring a
    # product-code change.
    - cron: "23 3 * * 0"
  push:
    branches: [master, v0.2.0]
    paths:
      - "tools/build-tools/**"
      - ".github/workflows/build-tools.yml"
      - "tests/bats/**"
      - "setup.sh"
  pull_request:
    branches: [master, v0.2.0]
    paths:
      - "tools/build-tools/**"
      - ".github/workflows/build-tools.yml"
      - "tests/bats/**"
      - "setup.sh"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

env:
  BUILD_TOOLS_IMAGE: ghcr.io/${{ github.repository }}/build-tools
  BUILD_TOOLS_PLATFORMS: linux/amd64,linux/arm64
  BUILD_TOOLS_SCAN_IMAGE: lancache-ng-build-tools-scan:${{ github.run_id }}-${{ github.run_attempt }}

defaults:
  run:
    shell: bash

jobs:
  build-tools:
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Prepare local Buildx cache
        id: buildx-cache
        env:
          BUILDX_CACHE_ROOT: /var/tmp/lancache-ng-buildx-cache
          BUILDX_CACHE_READ: ${{ runner.temp }}/lancache-ng-build-tools-cache/read
          BUILDX_CACHE_DEST: ${{ runner.temp }}/lancache-ng-build-tools-cache/new
        run: |
          set -euo pipefail

          if ! command -v flock >/dev/null 2>&1; then
            echo "::error::flock is required for safe local Buildx cache locking."
            exit 1
          fi

          cache_dir="$BUILDX_CACHE_ROOT/build-tools"
          lock_file="$BUILDX_CACHE_ROOT/build-tools.lock"

          mkdir -p "$BUILDX_CACHE_ROOT"
          rm -rf "$BUILDX_CACHE_READ" "$BUILDX_CACHE_DEST"
          mkdir -p "$BUILDX_CACHE_READ" "$(dirname "$BUILDX_CACHE_DEST")"

          (
            flock -x 9
            mkdir -p "$cache_dir"
            cp -a "$cache_dir/." "$BUILDX_CACHE_READ/"
          ) 9>"$lock_file"

          {
            echo "cache-from=$BUILDX_CACHE_READ"
            echo "cache-to=$BUILDX_CACHE_DEST"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.BUILD_TOOLS_IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=short

      - name: Compute immutable pushed source tag
        id: source-tag
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::7}"
          printf 'image=%s:sha-%s\n' "$BUILD_TOOLS_IMAGE" "$short_sha" >> "$GITHUB_OUTPUT"

      # Pull requests cannot push to GHCR, so they build a local amd64 image and
      # run the same smoke/Trivy checks before the workflow can pass.
      - name: Build local scan image
        id: local-build
        timeout-minutes: 60
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: tools/build-tools
          load: true
          pull: true
          tags: ${{ env.BUILD_TOOLS_SCAN_IMAGE }}
          platforms: linux/amd64
          provenance: false
          cache-from: type=local,src=${{ steps.buildx-cache.outputs.cache-from }}
          cache-to: type=local,dest=${{ steps.buildx-cache.outputs.cache-to }},mode=max

      - name: Smoke-test acceleration-infrastructure tools
        run: |
          set -euo pipefail

          docker run --rm "${BUILD_TOOLS_SCAN_IMAGE}" bash -c '
            set -euo pipefail

            required_tools=(
              actionlint
              bash
              bats
              cargo
              cargo-audit
              cargo-tarpaulin
              clippy-driver
              dig
              distcc
              distcc-pump
              docker
              envsubst
              jq
              rustc
              rustfmt
              sccache
              shellcheck
            )

            for tool in "${required_tools[@]}"; do
              command -v "$tool" >/dev/null
            done

            cargo --version
            cargo audit --version
            cargo-audit --version
            cargo tarpaulin --version
            cargo-tarpaulin --version
            sccache --version
            actionlint --version
            bats --version
            shellcheck --version
            distcc --version
            distcc-pump --help >/dev/null
            docker --version
            docker compose version
          '

      - name: Run Bats setup fixtures
        run: |
          set -euo pipefail

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_SCAN_IMAGE:?BUILD_TOOLS_SCAN_IMAGE is required}" \
            bash -lc 'set -euo pipefail; bats tests/bats'

      - name: Prepare local Trivy cache
        run: |
          set -euo pipefail
          mkdir -p /var/tmp/lancache-ng-trivy-cache/build-tools

      - name: Scan local build-tools image with Trivy
        timeout-minutes: 20
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.BUILD_TOOLS_SCAN_IMAGE }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          skip-dirs: /usr/local/rustup/toolchains
          hide-progress: true
          cache: "false"
          cache-dir: /var/tmp/lancache-ng-trivy-cache/build-tools
          timeout: 10m
          exit-code: "1"

      - name: Note arm64 scan coverage deferral
        run: |
          set -euo pipefail

          echo "::notice::The build-tools workflow validates the amd64 scan image before publishing multi-architecture tags. Arm64 scan coverage is deferred for v0.1.0-alpha."

      # Trusted refs publish only an immutable sha-* source tag first. Mutable
      # branch/latest tags are promoted after the exact pushed digest has passed
      # Trivy and provenance attestation.
      - name: Build and push multi-architecture build-tools image
        id: build
        if: github.event_name != 'pull_request'
        timeout-minutes: 90
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: tools/build-tools
          push: true
          tags: ${{ steps.source-tag.outputs.image }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ env.BUILD_TOOLS_PLATFORMS }}
          provenance: false
          cache-from: type=local,src=${{ steps.buildx-cache.outputs.cache-to }}

      - name: Prepare pushed build-tools Trivy cache
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          mkdir -p /var/tmp/lancache-ng-trivy-cache/build-tools-pushed

      - name: Scan pushed build-tools digest with Trivy
        if: github.event_name != 'pull_request'
        timeout-minutes: 20
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.BUILD_TOOLS_IMAGE }}@${{ steps.build.outputs.digest }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          skip-dirs: /usr/local/rustup/toolchains
          hide-progress: true
          cache: "false"
          cache-dir: /var/tmp/lancache-ng-trivy-cache/build-tools-pushed
          timeout: 10m
          exit-code: "1"

      - name: Attest build-tools image provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ env.BUILD_TOOLS_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Promote build-tools mutable tags
        if: github.event_name != 'pull_request'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PUSHED_DIGEST: ${{ steps.build.outputs.digest }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          source_image="${BUILD_TOOLS_IMAGE}@${PUSHED_DIGEST}"
          branch_tag="$(printf '%s' "$REF_NAME" | tr '/:@' '---' | tr -cd 'A-Za-z0-9_.-')"
          if [ -z "$branch_tag" ]; then
            echo "::error::Could not derive a safe mutable build-tools branch tag from '$REF_NAME'."
            exit 1
          fi

          docker buildx imagetools create --prefer-index=false -t "${BUILD_TOOLS_IMAGE}:${branch_tag}" "$source_image"
          if [ "$REF_NAME" = "$DEFAULT_BRANCH" ]; then
            docker buildx imagetools create --prefer-index=false -t "${BUILD_TOOLS_IMAGE}:latest" "$source_image"
          fi

      - name: Rotate local Buildx cache
        if: >-
          ${{
            always() &&
            steps.local-build.outcome == 'success' &&
            (
              github.event_name == 'pull_request' ||
              steps.build.outcome == 'success'
            )
          }}
        env:
          BUILDX_CACHE_ROOT: /var/tmp/lancache-ng-buildx-cache
          BUILDX_CACHE_DEST: ${{ steps.buildx-cache.outputs.cache-to }}
        run: |
          set -euo pipefail

          if [ ! -d "$BUILDX_CACHE_DEST" ]; then
            exit 0
          fi

          cache_dir="$BUILDX_CACHE_ROOT/build-tools"
          lock_file="$BUILDX_CACHE_ROOT/build-tools.lock"

          mkdir -p "$BUILDX_CACHE_ROOT"
          (
            flock -x 9
            rm -rf "$cache_dir"
            mv "$BUILDX_CACHE_DEST" "$cache_dir"
          ) 9>"$lock_file"

      - name: Remove local scan image
        if: always()
        run: docker rmi "${BUILD_TOOLS_SCAN_IMAGE}" || true
