# lancache-ng (https://github.com/wiki-mod/lancache-ng)
#
# Automatically adds newly opened issues and pull requests to the
# KANBAN-Lancache-NG project board (AGENTS.md AG-GH-002/AG-GH-008). The
# default Actions GITHUB_TOKEN cannot write to an org-owned Projects v2
# board (same constraint documented in gc-pr-staging-images.yml for
# GHCR_PACKAGE_DELETE_PAT), so this requires PROJECT_AUTOMATION_PAT -- a
# classic PAT with the `project` scope, created by a repo/org admin and
# added as a repository secret. Until that secret exists, the step below is
# skipped (if: secrets.PROJECT_AUTOMATION_PAT != '') rather than running and
# failing -- actions/add-to-project requires a non-empty github-token input
# and errors out immediately if it's blank, which would otherwise leave a
# red, failed run on every single new issue/PR in the documented
# before-the-secret-exists deployment state. This has to be a step-level
# `if:`, not a job-level one: GitHub Actions does not allow the `secrets`
# context in a job's own `if:` condition (only `github`/`inputs`/`needs`/
# `vars` are available there -- confirmed by actionlint rejecting the
# job-level form this file originally used). A skipped step still shows the
# job as green, matching the harmless-no-op behavior this file's header
# always intended: the item just isn't auto-added; add it manually with
# `gh project item-add`.
name: Add to project board

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  contents: read

jobs:
  add-to-project:
    name: Add to KANBAN-Lancache-NG
    runs-on: ubuntu-latest
    steps:
      - name: Add issue/PR to project board
        if: ${{ secrets.PROJECT_AUTOMATION_PAT != '' }}
        uses: actions/add-to-project@5afcf98fcd03f1c2f92c3c83f58ae24323cc57fd # v2.0.0
        with:
          project-url: https://github.com/orgs/wiki-mod/projects/6
          github-token: ${{ secrets.PROJECT_AUTOMATION_PAT }}
