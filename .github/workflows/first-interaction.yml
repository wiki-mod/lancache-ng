name: First Interaction

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome first-time contributors
        uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d # v3.1.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue in lancache-ng.

            Please make sure the issue includes:
            - expected behavior
            - actual behavior
            - logs or reproduction steps
            - relevant configuration without secrets

            Do not post private keys, tokens, passwords, personal data, or private infrastructure details.
            Security-sensitive reports should use the project's private security reporting channel.
          pr-message: |
            Thanks for opening your first pull request in lancache-ng.

            Please make sure the pull request:
            - links the related issue
            - explains the user-visible behavior change
            - lists the validation that was run
            - does not include private keys, tokens, passwords, personal data, or private infrastructure details

            Security-sensitive reports should use the project's private security reporting channel.
