# lancache-ng (https://github.com/wiki-mod/lancache-ng)
#
# Manual recovery workflow for the stable latest stack channel. It is limited
# to audited operator-triggered backfills so normal master builds still cannot
# move latest.

name: Backfill Stack Latest

on:
  workflow_dispatch:
    inputs:
      source_release_tag:
        description: Stable stack release tag to read, for example v0.1.0.
        required: true
        default: v0.1.0
      expected_source_tag:
        description: Expected immutable sha-* tag from stack.env.
        required: true
      expected_source_commit:
        description: Expected full 40-character source commit from stack.env.
        required: true
      confirmation:
        description: Type promote-latest to move latest.
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  # `latest` writes must serialize with the normal release promotion job in
  # build-push.yml so rollback state cannot interleave across workflows.
  group: "Build & Push-publish"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  backfill-latest:
    name: backfill latest from existing stack pointer
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    steps:
      - name: Require default branch dispatch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_PROTECTED: ${{ github.ref_protected }}
          SOURCE_RELEASE_TAG: ${{ inputs.source_release_tag }}
          EXPECTED_SOURCE_TAG: ${{ inputs.expected_source_tag }}
          EXPECTED_SOURCE_COMMIT: ${{ inputs.expected_source_commit }}
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail

          [[ "$CONFIRMATION" = "promote-latest" ]] \
            || { echo "::error::confirmation must be promote-latest."; exit 1; }
          [[ "$DEFAULT_BRANCH" = "master" ]] \
            || { echo "::error::Repository default branch must be master for this package-writing workflow."; exit 1; }
          [[ "$GITHUB_REF" = "refs/heads/${DEFAULT_BRANCH}" ]] \
            || { echo "::error::Backfill must be dispatched from refs/heads/${DEFAULT_BRANCH}, got ${GITHUB_REF}."; exit 1; }
          [[ "$GITHUB_REF_PROTECTED" = "true" ]] \
            || { echo "::error::Backfill must run on the protected master branch before any checkout or registry login."; exit 1; }
          [[ "$SOURCE_RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] \
            || { echo "::error::source_release_tag must be a stable release tag such as v0.1.0."; exit 1; }
          [[ "$EXPECTED_SOURCE_TAG" =~ ^(sha-[0-9a-f]{7,}|v[0-9]+\.[0-9]+\.[0-9]+)$ ]] \
            || { echo "::error::expected_source_tag must be a stable release tag or immutable sha-* tag."; exit 1; }
          [[ "$EXPECTED_SOURCE_COMMIT" =~ ^[0-9a-f]{40}$ ]] \
            || { echo "::error::expected_source_commit must be a full 40-character commit SHA."; exit 1; }

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backfill latest channel
        env:
          REPOSITORY: ${{ github.repository }}
          SOURCE_RELEASE_TAG: ${{ inputs.source_release_tag }}
          EXPECTED_SOURCE_TAG: ${{ inputs.expected_source_tag }}
          EXPECTED_SOURCE_COMMIT: ${{ inputs.expected_source_commit }}
          # release/stack-images.yml declares every runtime service's "latest"
          # channel (and the stack pointer) as linux/amd64 + linux/arm64; keep
          # this in sync with that manifest so a backfill from an older
          # amd64-only release tag cannot silently reset latest to an
          # amd64-only stack and break arm64 installs on the default channel (#665).
          REQUIRED_PLATFORMS: linux/amd64,linux/arm64
        run: |
          set -euo pipefail

          # Product stack latest backfill intentionally excludes build-tools:
          # that tooling image has its own build/publish workflow and mutable
          # channel, so mixing it here would make a stable product backfill race
          # with normal toolchain refreshes.
          services=(proxy dns watchdog dhcp dhcp-proxy ui)
          source_stack="ghcr.io/${REPOSITORY}/stack:${SOURCE_RELEASE_TAG}"
          container_id=""
          stack_env=""
          resolved_source_tag=""
          declared_commit=""
          source_release_commit=""
          declare -A previous_refs=()
          promoted_targets=()

          digest_for_image() {
            local image=$1 digest

            # shellcheck disable=SC2016 # Go template is evaluated by Docker.
            if ! digest="$(docker buildx imagetools inspect "$image" --format '{{json .Manifest.Digest}}' 2>/dev/null)"; then
              return 1
            fi
            digest="${digest%\"}"
            digest="${digest#\"}"
            [[ -n "$digest" && "$digest" != "null" ]]
            printf '%s\n' "$digest"
          }

          rollback_promotions() {
            local status=$? target_image previous_digest

            if [[ -n "$container_id" ]]; then
              docker rm "$container_id" >/dev/null 2>&1 || true
            fi
            if [[ "$status" = "0" || "${#promoted_targets[@]}" = "0" ]]; then
              exit "$status"
            fi

            echo "::error::Latest backfill failed after one or more tags moved; attempting best-effort rollback."
            for target_image in "${promoted_targets[@]}"; do
              previous_digest="${previous_refs[$target_image]:-}"
              if [[ -n "$previous_digest" ]]; then
                docker buildx imagetools create --prefer-index=false -t "$target_image" "${target_image%:*}@${previous_digest}" \
                  || echo "::error::Could not restore previous digest for $target_image."
              else
                echo "::error::No previous digest existed for $target_image; manual GHCR inspection is required."
              fi
            done
            exit "$status"
          }
          trap rollback_promotions EXIT

          docker buildx imagetools inspect "$source_stack" >/dev/null
          docker pull "$source_stack" >/dev/null
          container_id="$(docker create "$source_stack")"
          stack_env="$(docker cp "${container_id}:/stack.env" - | tar -xO)"
          docker rm "$container_id" >/dev/null
          container_id=""

          # shellcheck disable=SC2016 # AWK fields must stay literal.
          resolved_source_tag="$(awk -F= '$1 == "LANCACHE_IMAGE_TAG" {print $2; exit}' <<< "$stack_env")"
          # shellcheck disable=SC2016 # AWK fields must stay literal.
          declared_commit="$(awk -F= '$1 == "LANCACHE_IMAGE_COMMIT" {print $2; exit}' <<< "$stack_env")"
          [[ "$resolved_source_tag" = "$EXPECTED_SOURCE_TAG" ]] \
            || { echo "::error::${source_stack} resolves to ${resolved_source_tag}, expected ${EXPECTED_SOURCE_TAG}."; exit 1; }
          [[ "$resolved_source_tag" =~ ^sha-[0-9a-f]{7,}$ ]] \
            || { echo "::error::Resolved source tag is not immutable: ${resolved_source_tag}."; exit 1; }
          [[ "$declared_commit" =~ ^[0-9a-f]{40}$ ]] \
            || { echo "::error::stack.env is missing a full source commit."; exit 1; }
          [[ "$declared_commit" = "$EXPECTED_SOURCE_COMMIT" ]] \
            || { echo "::error::${source_stack} declares commit ${declared_commit}, expected ${EXPECTED_SOURCE_COMMIT}."; exit 1; }

          git fetch --force --depth=1 origin "refs/tags/${SOURCE_RELEASE_TAG}:refs/tags/${SOURCE_RELEASE_TAG}"
          source_release_commit="$(git rev-list -n 1 "$SOURCE_RELEASE_TAG")"
          [[ "$source_release_commit" = "$declared_commit" ]] \
            || { echo "::error::${SOURCE_RELEASE_TAG} points at ${source_release_commit}, but stack.env declares ${declared_commit}."; exit 1; }
          git checkout --detach "$SOURCE_RELEASE_TAG"

          source_stack_immutable="ghcr.io/${REPOSITORY}/stack:${resolved_source_tag}"
          source_stack_digest="$(digest_for_image "$source_stack")"
          source_stack_immutable_digest="$(digest_for_image "$source_stack_immutable")"
          [[ "$source_stack_digest" = "$source_stack_immutable_digest" ]] \
            || { echo "::error::${source_stack} digest does not match ${source_stack_immutable}; refusing to promote drifted release sources."; exit 1; }
          bash scripts/require-image-platforms.sh "ghcr.io/${REPOSITORY}/stack@${source_stack_digest}" "$REQUIRED_PLATFORMS"

          for service in "${services[@]}"; do
            source_release_image="ghcr.io/${REPOSITORY}/${service}:${SOURCE_RELEASE_TAG}"
            source_image="ghcr.io/${REPOSITORY}/${service}:${resolved_source_tag}"
            source_release_digest="$(digest_for_image "$source_release_image")"
            source_sha_digest="$(digest_for_image "$source_image")"
            [[ "$source_release_digest" = "$source_sha_digest" ]] \
              || { echo "::error::${source_release_image} digest does not match ${source_image}; refusing to promote drifted release sources."; exit 1; }
            bash scripts/require-image-platforms.sh "ghcr.io/${REPOSITORY}/${service}@${source_release_digest}" "$REQUIRED_PLATFORMS"
          done

          bash scripts/check-stable-external-images.sh

          for service in "${services[@]}"; do
            source_release_image="ghcr.io/${REPOSITORY}/${service}:${SOURCE_RELEASE_TAG}"
            source_release_digest="$(digest_for_image "$source_release_image")"
            target_image="ghcr.io/${REPOSITORY}/${service}:latest"
            previous_refs["$target_image"]="$(digest_for_image "$target_image" || true)"
            docker buildx imagetools create --prefer-index=false -t "$target_image" "ghcr.io/${REPOSITORY}/${service}@${source_release_digest}"
            promoted_targets+=("$target_image")
          done

          target_stack="ghcr.io/${REPOSITORY}/stack:latest"
          previous_refs["$target_stack"]="$(digest_for_image "$target_stack" || true)"
          docker buildx imagetools create --prefer-index=false -t "$target_stack" "ghcr.io/${REPOSITORY}/stack@${source_stack_digest}"
          promoted_targets+=("$target_stack")

          for service in "${services[@]}"; do
            source_release_image="ghcr.io/${REPOSITORY}/${service}:${SOURCE_RELEASE_TAG}"
            target_image="ghcr.io/${REPOSITORY}/${service}:latest"
            [[ "$(digest_for_image "$source_release_image")" = "$(digest_for_image "$target_image")" ]] \
              || { echo "::error::latest digest mismatch for ${service}."; exit 1; }
          done
          [[ "$(digest_for_image "$source_stack")" = "$(digest_for_image "$target_stack")" ]] \
            || { echo "::error::latest digest mismatch for stack pointer."; exit 1; }

          {
            printf '%s\n\n' "### Backfilled latest channel"
            printf -- '- Source release tag: %s\n' "$SOURCE_RELEASE_TAG"
            printf -- '- Resolved source tag: %s\n' "$resolved_source_tag"
            printf -- '- Source commit: %s\n' "$declared_commit"
            printf -- '- Target channel: latest\n'
          } >> "$GITHUB_STEP_SUMMARY"
