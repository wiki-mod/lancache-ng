name: CodeQL

on:
  push:
    branches: [master]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**/*.md"
  schedule:
    - cron: "24 3 * * *"
  workflow_dispatch:  

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Run advanced CodeQL on repository-owned runners to avoid GitHub-hosted minutes.
    # Repository default setup must be disabled in GitHub Security settings before SARIF upload.
    runs-on: [self-hosted, linux, lancache, codeql]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/codeql-${{ matrix.language }}'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/codeql-${{ matrix.language }}'
          } >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ vars.SCCACHE_REDIS_URL }}
          key-prefix: lancache-codeql-${{ matrix.language }}
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build Rust crates for CodeQL
        run: |
          cargo build --locked --manifest-path services/dns/nats-subscriber/Cargo.toml
          cargo build --locked --manifest-path services/ui/Cargo.toml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:${{ matrix.language }}"
