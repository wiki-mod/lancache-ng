# lancache-ng (https://github.com/wiki-mod/lancache-ng)
# CI workflow that runs CodeQL static analysis (GitHub Actions and Rust languages)
# on pushes, pull requests, and a daily schedule, uploading SARIF results as security alerts.
name: CodeQL

on:
  push:
    branches: [master, v0.2.0]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [master, v0.2.0]
    paths-ignore:
      - "**/*.md"
  schedule:
    - cron: "24 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  CARGO_BUILD_JOBS: ${{ vars.CARGO_BUILD_JOBS }}

defaults:
  run:
    shell: bash

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Run advanced CodeQL on repository-owned runners to avoid GitHub-hosted minutes.
    # CodeQL can compile Rust and is memory-heavy enough to avoid the light runner tier.
    # Repository default setup must be disabled in GitHub Security settings before SARIF upload.
    runs-on: [self-hosted, linux, lancache, codeql, lancache-heavy]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          # CodeQL Rust extraction can silently degrade while the job still reports success.
          # Observed historical example (PR #357, run 28596839186): the Rust extractor reported
          # "12 files extracted with errors" vs "2 without error" (partial `macro expansion failed`
          # for ordinary macros like format!, vec!, json!, tracing::*, assert!) yet the job
          # concluded `success`. This is a known upstream limitation of CodeQL's Rust extractor,
          # not a defect in this repository, and it is not tunable here: Rust supports only
          # `build-mode: none` (manual/autobuild modes do not exist for Rust). Tracked upstream in
          # github/codeql #19966, #19982, #20643, #20659, and locally in issue #394.
          #
          # CodeQL's own authoritative quality gate is the `rust/diagnostic/database-quality`
          # ("Low Rust analysis quality") diagnostic query. On the observed degraded run it did NOT
          # fire (the extractor's macro-expansion errors are classified as normal), so CodeQL does
          # not treat this state as low quality. The raw per-file counts are metric-query output
          # printed only to the analysis log summary; they are not exposed as a supported,
          # machine-readable workflow output (github/codeql-action #1742, open since 2023) and the
          # database is cleaned after `analyze`. The "Report CodeQL Rust extraction-quality signal"
          # step below therefore surfaces CodeQL's own determination and a standing caveat instead
          # of a hand-rolled count threshold. A green CodeQL Rust job must NOT be read as full
          # security-scan coverage of the Rust codebase.
          - language: rust
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Isolate Rust toolchain paths
        if: matrix.language == 'rust'
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/codeql-${{ matrix.language }}'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/codeql-${{ matrix.language }}'
          } >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: stable
      # Optional acceleration only: CodeQL must still run if Redis-backed sccache is unavailable.
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            matrix.language == 'rust' &&
            github.actor != 'dependabot[bot]' &&
            (
              github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository
            )
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-codeql-${{ matrix.language }}
          dist-scheduler-url: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          dist-auth-token: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build DNS Rust crate for CodeQL
        if: matrix.language == 'rust'
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo build --locked --manifest-path services/dns/nats-subscriber/Cargo.toml

      - name: Build UI Rust crate for CodeQL
        if: matrix.language == 'rust'
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo build --locked --manifest-path services/ui/Cargo.toml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          category: "/language:${{ matrix.language }}"
          # Persist the interpreted SARIF locally so the extraction-quality step can read
          # CodeQL's own diagnostic notifications. Results are still uploaded as usual.
          output: ${{ runner.temp }}/codeql-sarif

      # Make CodeQL's Rust extraction-quality determination visible on every run so a green
      # CodeQL Rust job is not silently misread as full extraction coverage (issue #394).
      # This keys on CodeQL's own `rust/diagnostic/database-quality` signal rather than a
      # hand-rolled count threshold, so it never turns red on the known, upstream, permanent
      # macro-expansion limitation. It is warn-only and can never fail the job or manufacture
      # false confidence: it always prints the standing caveat, and warns (not fails) only when
      # CodeQL itself flags low quality or when the signal cannot be read.
      - name: Report CodeQL Rust extraction-quality signal
        if: always() && matrix.language == 'rust'
        env:
          SARIF_DIR: ${{ runner.temp }}/codeql-sarif
        run: |
          set -uo pipefail
          {
            printf '%s\n' '### CodeQL Rust extraction-quality signal'
            printf '\n'
            printf '%s\n' 'A green CodeQL Rust job does NOT by itself confirm full extraction coverage.'
            printf '%s\n' "CodeQL's Rust extractor (build-mode: none is the only supported Rust mode)"
            printf '%s\n' 'reports partial "macro expansion failed" errors for ordinary macros as a known'
            printf '%s\n' 'upstream limitation (github/codeql #19966, #19982, #20643, #20659; local #394).'
            printf '\n'
          } >> "$GITHUB_STEP_SUMMARY"

          sarif_file="$(find "$SARIF_DIR" -maxdepth 1 -name '*.sarif' -print -quit 2>/dev/null || true)"
          if [ -z "$sarif_file" ] || ! command -v jq >/dev/null 2>&1; then
            echo "::warning::Could not read the CodeQL Rust extraction-quality signal (SARIF or jq unavailable). Do not treat a green CodeQL Rust job as full Rust security-scan coverage (issue #394)."
            echo '- Extraction-quality signal unavailable this run (SARIF or jq missing).' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # `rust/diagnostic/database-quality` ("Low Rust analysis quality") appears as a SARIF
          # notification only when CodeQL itself judges extraction degraded beyond the tolerated
          # macro-expansion errors. Count matches across both possible notification id fields.
          quality_hits="$(jq '[.runs[]?.invocations[]?.toolExecutionNotifications[]?
            | select((.descriptor.id? // .associatedRule.id? // "") == "rust/diagnostic/database-quality")]
            | length' "$sarif_file" 2>/dev/null || echo 0)"
          quality_hits="${quality_hits:-0}"

          if [ "$quality_hits" -gt 0 ]; then
            echo "::warning::CodeQL flagged Low Rust analysis quality (rust/diagnostic/database-quality). Rust extraction is degraded beyond the known macro-expansion limitation this run; investigate (issue #394)."
            echo "- CodeQL flagged Low Rust analysis quality this run (${quality_hits} notification(s)). See issue #394." >> "$GITHUB_STEP_SUMMARY"
          else
            echo '- CodeQL did not flag Low Rust analysis quality this run. That gate tolerates partial macro-expansion extraction, so it is not proof of full semantic coverage (issue #394).' >> "$GITHUB_STEP_SUMMARY"
          fi
          exit 0
