# lancache-ng (https://github.com/wiki-mod/lancache-ng)
# CI workflow that runs CodeQL static analysis (GitHub Actions and Rust languages)
# on pushes, pull requests, and a daily schedule, uploading SARIF results as security alerts.
name: CodeQL

on:
  push:
    branches: [master]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**/*.md"
  schedule:
    - cron: "24 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  CARGO_BUILD_JOBS: ${{ vars.CARGO_BUILD_JOBS }}

defaults:
  run:
    shell: bash

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Run advanced CodeQL on repository-owned runners to avoid GitHub-hosted minutes.
    # CodeQL can compile Rust and is memory-heavy enough to avoid the light runner tier.
    # Repository default setup must be disabled in GitHub Security settings before SARIF upload.
    runs-on: [self-hosted, linux, lancache, codeql, lancache-heavy]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: rust
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Isolate Rust toolchain paths
        if: matrix.language == 'rust'
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/codeql-${{ matrix.language }}'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/codeql-${{ matrix.language }}'
          } >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            matrix.language == 'rust' &&
            github.actor != 'dependabot[bot]' &&
            (
              github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository
            )
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-codeql-${{ matrix.language }}
          dist-scheduler-url: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          dist-auth-token: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build DNS Rust crate for CodeQL
        if: matrix.language == 'rust'
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo build --locked --manifest-path services/dns/nats-subscriber/Cargo.toml

      - name: Build UI Rust crate for CodeQL
        if: matrix.language == 'rust'
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo build --locked --manifest-path services/ui/Cargo.toml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:${{ matrix.language }}"
