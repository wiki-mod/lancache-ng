# lancache-ng (https://github.com/wiki-mod/lancache-ng)
#
# DEEP full-setup validation gate (#715). This is the THIRD, additive check
# the project owner asked for in #715's clarification comments: a strict
# SUPERSET of both existing checks, wired to run automatically on every
# relevant PR.
#
#   - It does everything build-push.yml's shallow "validate full-setup image"
#     job does (bring the full-setup compose stack up on real images, assert
#     every container is healthy and not crash-looping)...
#   - ...PLUS every real functional simulation that until now lived only in
#     the manual-dispatch-only full-setup-validate.yml (SSL/HTTP/HTTPS
#     caching, UI->NATS->PowerDNS integration, setup.sh CLI, Kea DHCP lease
#     flow, per-secondary NATS auth-callout).
#
# Neither existing workflow is modified: build-push.yml's shallow job and the
# manual full-setup-validate.yml both stay exactly as they are, so their fast
# and on-demand fallback paths remain available (see #715's comments on why
# the two originals are kept untouched rather than merged in place).
#
# On a pull_request event this validates the PR's OWN commits by reusing the
# #626/#627 pr-<N>-sha-<short> staging-tag mechanism (see
# scripts/ensure-pr-staging-images.sh) -- it does NOT reinvent a second
# tagging scheme. workflow_dispatch is preserved as a manual trigger for
# ad-hoc runs against a specific published channel tag.
#
# BRANCH PROTECTION NOTE: making this a REQUIRED check is a repository
# branch-protection setting, which lives in GitHub's settings and not in any
# file in this repo -- it cannot be set by this PR's diff. A maintainer must
# add the "deep full-setup validation" job (the always-run aggregate below,
# whose name is stable precisely so it can be required) to the branch
# protection required-status-checks list for v0.2.0/master. The aggregate is
# designed to always run and report a real pass/fail (never "skipped"), so it
# is safe to require without blocking docs-only PRs -- a required check that
# gets skipped would otherwise leave a PR permanently un-mergeable.
#
# RUNNER CAPACITY NOTE: these sims run serially on the shared lancache-light
# tier (per AG-CI-002); the image BUILDS they wait on run on the scarce
# lancache-heavy tier, so the wait cannot deadlock the builds (different
# runner pools). But this does roughly double the light-tier full-setup
# footprint per PR (build-push's own shallow job still runs too), and the
# staging-wait job holds one light slot while polling. See the PR body for
# the capacity trade-off; #715 states CI time is not the constraint but
# acknowledges self-hosted CAPACITY under higher trigger frequency is a real,
# separate concern to watch.

name: Full-Setup Deep Validate

on:
  # Branch-filtered to match build-push.yml's own pull_request trigger
  # EXACTLY (see build-push.yml's `on.pull_request.branches`). This suite's
  # whole pr_staging_available/ensure-pr-staging-images mechanism assumes
  # build-push.yml ran for the same PR and pushed its pr-<N>-sha-<short>
  # staging tags -- vit_pr_staging_available() (scripts/lib/
  # validation-image-tag.sh) has no base-branch check of its own, so without
  # this filter a PR opened against a base branch build-push.yml ignores
  # would still be marked staging-available here, and
  # ensure-pr-staging-images would poll for tags that no workflow will ever
  # push until it times out and fails closed (Codex review finding on
  # #764). Restricting the trigger the same way build-push.yml is restricted
  # is the correct fix rather than teaching the planner a fallback: a PR
  # against an unprotected branch isn't covered by branch-protection
  # required-status-checks anyway (see the BRANCH PROTECTION NOTE above), so
  # skipping this workflow entirely for it loses nothing.
  pull_request:
    branches: [master, "v[0-9]*"]
  workflow_dispatch:
    inputs:
      image_tag:
        # Same rationale as full-setup-validate.yml: nightly (not latest) is the
        # channel actually promoted from master; latest is a stale pre-release
        # leftover. Operators can point an ad-hoc run at any published tag.
        description: Stack image tag to validate against (manual runs only).
        required: false
        default: nightly

# Cancel superseded runs for the same PR/ref: a new push makes an in-flight
# deep run obsolete, and these are expensive serial suites on a shared runner
# tier. Manual (publish) runs are never grouped together so two operators'
# dispatches don't cancel each other.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-{1}', github.workflow, github.ref) || format('{0}-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Always runs (both events) and always succeeds, so every downstream gate
  # keys off one place. Decides whether the deep suite should run at all
  # (should_run) and resolves the single image tag the whole suite validates.
  plan:
    name: plan deep validation
    runs-on: [self-hosted, linux, lancache, lancache-light]
    outputs:
      should_run: ${{ steps.plan.outputs.should_run }}
      image_tag: ${{ steps.plan.outputs.image_tag }}
      pr_staging_available: ${{ steps.plan.outputs.pr_staging_available }}
      base_channel_tag: ${{ steps.plan.outputs.base_channel_tag }}
      workflow: ${{ steps.plan.outputs.workflow }}
      proxy: ${{ steps.plan.outputs.proxy }}
      dns_image: ${{ steps.plan.outputs.dns_image }}
      watchdog: ${{ steps.plan.outputs.watchdog }}
      ui: ${{ steps.plan.outputs.ui }}
      build_tools: ${{ steps.plan.outputs.build_tools }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # detect-full-setup-changes.sh diffs from the PR's real merge-base,
          # which needs full history (same reason build-push's detect-changes
          # uses fetch-depth: 0).
          fetch-depth: 0

      - name: Plan
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # github.sha, NOT the PR head sha: for a pull_request event this is
          # the synthetic base+head merge commit build-push actually built and
          # tagged. Must match build-push's staging-tag key exactly.
          BUILD_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REPOSITORY: ${{ github.repository }}
          DISPATCH_TAG: ${{ github.event.inputs.image_tag }}
        run: bash scripts/plan-deep-validation.sh

  # Cross-workflow wait + fail-closed staging guard. Only meaningful for a
  # same-repo PR (pr_staging_available): waits for build-push to push the
  # PR's touched-service staging tags, fails closed if a touched tag never
  # appears, and back-fills untouched services from the base channel. Skipped
  # on workflow_dispatch and Dependabot/fork PRs, where the suite validates a
  # published channel tag that already exists.
  ensure-pr-staging-images:
    name: ensure PR staging images
    needs: plan
    if: needs.plan.outputs.should_run == 'true' && needs.plan.outputs.pr_staging_available == 'true'
    runs-on: [self-hosted, linux, lancache, lancache-light]
    permissions:
      contents: read
      packages: write
      # #895: scripts/ensure-pr-staging-images.sh's congestion probe reads
      # build-push.yml's own run status for this commit via `gh api
      # repos/{repo}/actions/workflows/build-push.yml/runs` once the normal
      # poll budget is exceeded, to tell a still-building run apart from a
      # confirmed-finished one. Reading workflow run status needs this scope
      # explicitly since the job already narrows permissions below the
      # repository default.
      actions: read
    steps:
      # #808: fetch-depth: 0 (not the default shallow depth-1 clone) so
      # scripts/ensure-pr-staging-images.sh can prove real git ancestry
      # (`git merge-base --is-ancestor`) between this PR's base.sha and a
      # base-channel image's build-commit label before backfilling an
      # untouched service from it. Same requirement, and same fix, as the
      # `plan` job's own fetch-depth: 0 checkout above (needed for
      # detect-full-setup-changes.sh's merge-base diff).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for and ensure PR staging images
        env:
          REPOSITORY: ${{ github.repository }}
          PR_TAG: ${{ needs.plan.outputs.image_tag }}
          BASE_CHANNEL_TAG: ${{ needs.plan.outputs.base_channel_tag }}
          WORKFLOW_CHANGED: ${{ needs.plan.outputs.workflow }}
          PROXY_TOUCHED: ${{ needs.plan.outputs.proxy }}
          DNS_TOUCHED: ${{ needs.plan.outputs.dns_image }}
          WATCHDOG_TOUCHED: ${{ needs.plan.outputs.watchdog }}
          UI_TOUCHED: ${{ needs.plan.outputs.ui }}
          BUILD_TOOLS_TOUCHED: ${{ needs.plan.outputs.build_tools }}
          # #808: this PR's own base commit, needed to prove a base-channel
          # image was actually built from a commit at or after it before
          # backfilling an untouched service from that channel. Always
          # present here: this job only runs on a pull_request event (see
          # this job's own `if:` above, gated on pr_staging_available).
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          # #895: github.sha on a pull_request event is the same synthetic
          # merge commit build-push.yml built and tagged (see this workflow's
          # own BUILD_SHA comment in the "plan" job) -- kept here purely for
          # the congestion probe's log/error text (it names the exact commit
          # PR_TAG's suffix is keyed on), NOT for the `gh api` query itself
          # anymore -- see PR_HEAD_SHA below and #975.
          BUILD_SHA: ${{ github.sha }}
          # #975: the PR's real head branch commit, NOT the synthetic merge
          # commit above. The GitHub Actions "list workflow runs" API's
          # `head_sha` filter/field for a pull_request-triggered run always
          # reports the PR's real branch head, never the merge commit --
          # confirmed live (PRs #948/#949/#960/#962): the pre-#975 congestion
          # probe queried `runs?head_sha=<BUILD_SHA>` (the merge commit),
          # which can never match any real run, so it unconditionally
          # reported build-push's run as "not active" and failed this gate at
          # the normal budget even while build-push's matching run for the
          # very same push was still healthily building. The congestion probe
          # now queries by this value instead.
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # #895: authenticates the congestion probe's `gh api` call (list
          # workflow runs). Same default token already used for the GHCR
          # login above, scoped down to actions:read/contents:read/
          # packages:write by this job's `permissions:` block.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # #822: lets backfill_from_base's real imagetools create (the exact
          # operation that failed live 3x on 2026-07-14) retry with a fresh
          # login instead of the single bare attempt it had before.
          GHCR_RETRY_USERNAME: ${{ github.actor }}
          GHCR_RETRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ensure-pr-staging-images.sh

  # The ten simulation/validation jobs this suite shares with the manual
  # full-setup-validate.yml now live in one reusable workflow (issue #1014).
  # This per-PR gate invokes them with the PR's own resolved staging tag; the
  # caller keeps its own trigger, plan gating, and ensure-pr-staging-images
  # ordering. That job's failure/cancel guard therefore lives here on the
  # `uses:` job rather than on each job inside the reusable workflow.
  full-setup-sims:
    name: full-setup simulations
    needs: [plan, ensure-pr-staging-images]
    if: >-
      always() &&
      needs.plan.outputs.should_run == 'true' &&
      needs['ensure-pr-staging-images'].result != 'failure' &&
      needs['ensure-pr-staging-images'].result != 'cancelled'
    uses: ./.github/workflows/full-setup-sims.yml
    with:
      image_tag: ${{ needs.plan.outputs.image_tag }}
      should_run: ${{ needs.plan.outputs.should_run }}
      pr_staging_available: ${{ needs.plan.outputs.pr_staging_available }}
      build_tools_touched: ${{ needs.plan.outputs.build_tools }}
    secrets: inherit

  dns-zone-rollback-simulation:
    # Real end-to-end test (#628) of the PowerDNS zone/record known-good
    # snapshot + rollback mechanism: makes two real DNS writes through the
    # real UI/NATS path, calls the new rollback listener
    # (services/dns/nats-subscriber/src/rollback_listener.rs, port 8083)
    # directly over HTTP with the real X-API-Key, and confirms via real
    # `dig` queries that PowerDNS's data and dns-standard's own recursor
    # cache were both actually rolled back -- see
    # scripts/dns-zone-rollback-simulation.sh's header comment for why this
    # is needed alongside the crate's unit tests (they cannot exercise a
    # live PowerDNS/recursor round-trip). Pulls the real dns/ui/nats images,
    # so it threads the PR staging tag to test the PR's own code.
    name: DNS zone/record rollback simulation
    needs: [plan, ensure-pr-staging-images, full-setup-sims]
    if: >-
      always() &&
      needs.plan.outputs.should_run == 'true' &&
      needs['ensure-pr-staging-images'].result != 'failure' &&
      needs['ensure-pr-staging-images'].result != 'cancelled'
    runs-on: [self-hosted, linux, lancache, lancache-light]
    env:
      LANCACHE_IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
      # The run-in-validation-subnet.sh wrapper below self-reserves a
      # collision-free /27 slot and exports the full VALIDATION_* set for it.
      # Issue #1014: this job no longer threads compute-validation-network's
      # per-run outputs as job-level env -- that job now lives in the reusable
      # full-setup-sims.yml, and the wrapper supplies the addresses anyway.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve build-tools image
        # See ssl-mitm-cache-simulation's identical step above for why a
        # same-PR build-tools change prefers the confirmed PR staging tag.
        # BUILD_TOOLS_REQUIRE_PUBLISHED: this job's dig/curl/jq client checks
        # only need tools already in every published build-tools image.
        id: build-tools-image
        run: |
          set -euo pipefail
          if [[ "${{ needs.plan.outputs.pr_staging_available }}" == "true" && "${{ needs.plan.outputs.build_tools }}" == "true" ]]; then
            image="ghcr.io/${{ github.repository }}/build-tools:${{ needs.plan.outputs.image_tag }}"
            echo "::notice::This PR touched tools/build-tools; using its confirmed staging image $image instead of build-tools:latest."
          else
            image="$(BUILD_TOOLS_REQUIRE_PUBLISHED=true bash scripts/select-build-tools-image.sh)"
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"
      - name: Run DNS zone/record rollback simulation
        env:
          BUILD_TOOLS_IMAGE: ${{ steps.build-tools-image.outputs.image }}
        run: |
          set -euo pipefail
          # Reserve a collision-free subnet (flock + retry, #820) and run the
          # sim inside it rather than racing the shared job-level subnet.
          bash scripts/lib/run-in-validation-subnet.sh bash scripts/dns-zone-rollback-simulation.sh

  dhcp-kea-ui-rollback-simulation:
    # Real end-to-end proof for issue #837: the Admin UI's OWN Kea rollback
    # route (POST /dhcp/snapshot/rollback, rollback_kea_snapshot in
    # services/ui/src/routes/dhcp.rs) must genuinely roll a real, running Kea
    # server back to an earlier known-good config via its Control Agent API,
    # not just return an HTTP redirect. The CLI fallback
    # (setup.sh reset-to-last-known-good-config kea) is separately proven by
    # setup-reset-kea-config-simulation (now inside full-setup-sims.yml, issue
    # #1014); this covers the UI-reachable path that one does not. Builds Kea
    # from THIS checkout's services/dhcp (like the sibling sims), so it needs
    # no staging tag for that image; only the published `ui` image is pulled.
    # See scripts/dhcp-kea-ui-rollback-simulation.sh's own header for exactly
    # what this does and does not prove.
    #
    # This job is deep-validate-only (it has no counterpart in the manual
    # full-setup-validate.yml), so unlike its former sibling
    # setup-reset-kea-config-simulation it did NOT move into the reusable
    # full-setup-sims.yml (issue #1014) -- doing so would run it in the
    # manual-dispatch context where it never existed. Instead it stays a
    # top-level job here, alongside dns-zone-rollback-simulation and
    # syslog-forwarding-simulation, needing the whole full-setup-sims caller
    # job (its former dependency, ui-reachability-crash-loop-simulation, is
    # now one of the jobs folded inside it and no longer addressable by name
    # at this level) instead of compute-validation-network's raw per-job
    # outputs directly.
    name: Admin UI Kea rollback (POST /dhcp/snapshot/rollback) simulation
    needs: [plan, ensure-pr-staging-images, full-setup-sims]
    if: >-
      always() &&
      needs.plan.outputs.should_run == 'true' &&
      needs['ensure-pr-staging-images'].result != 'failure' &&
      needs['ensure-pr-staging-images'].result != 'cancelled'
    runs-on: [self-hosted, linux, lancache, lancache-light]
    env:
      LANCACHE_IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
      # The run-in-validation-subnet.sh wrapper below self-reserves a
      # collision-free slot and exports the full VALIDATION_* set for it.
      # Issue #1014: this job no longer threads compute-validation-network's
      # per-run outputs as job-level env -- that job now lives in the reusable
      # full-setup-sims.yml, and the wrapper supplies the addresses anyway
      # (same reasoning as dns-zone-rollback-simulation above).
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve build-tools image
        # No BUILD_TOOLS_REQUIRE_PUBLISHED: same-PR tools/build-tools override
        # preference, matching every other job in this suite.
        id: build-tools-image
        run: |
          set -euo pipefail
          if [[ "${{ needs.plan.outputs.pr_staging_available }}" == "true" && "${{ needs.plan.outputs.build_tools }}" == "true" ]]; then
            image="ghcr.io/${{ github.repository }}/build-tools:${{ needs.plan.outputs.image_tag }}"
            echo "::notice::This PR touched tools/build-tools; using its confirmed staging image $image instead of build-tools:latest."
          else
            image="$(BUILD_TOOLS_REQUIRE_PUBLISHED=true bash scripts/select-build-tools-image.sh)"
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"
      - name: Run Admin UI Kea rollback (POST /dhcp/snapshot/rollback) simulation
        env:
          BUILD_TOOLS_IMAGE: ${{ steps.build-tools-image.outputs.image }}
        run: |
          set -euo pipefail
          # Reserve a collision-free subnet (flock + retry, #820) and run the
          # sim inside it, exactly like the other deep-only sims above -- both
          # stand up a full validation stack and must not share a _validation
          # network with a concurrent run.
          bash scripts/lib/run-in-validation-subnet.sh bash scripts/dhcp-kea-ui-rollback-simulation.sh

  syslog-forwarding-simulation:
    # Real end-to-end proof for #453's last two comments: not just "a log
    # line reached syslog-ng on disk" (which #756/#757/#758 already covered
    # at the config/render-time level via scripts/check-logging-matrix.sh),
    # but "the operator can actually see that line through the real Admin UI
    # /logs route" -- the gap the maintainer identified as the same #822
    # Pattern G shape ("a check that never really looked"). See
    # scripts/syslog-forwarding-simulation.sh's header comment for the full
    # design (compose base, per-service trigger mechanisms, and why dhcp/
    # dhcp-proxy are explicit, tracked follow-up rather than silently
    # skipped).
    #
    # NEEDS is deliberately hoisted to [plan, ensure-pr-staging-images]
    # rather than chained after dns-zone-rollback-simulation while this job
    # is still being iterated on in CI: chaining last would mean waiting on
    # the entire existing ~10-job serial suite for every single iteration.
    # Originally tracked as a follow-up under #453 (now closed -- its
    # closure covered #453's own core scope, not this narrow CI-ordering
    # item, so the pending reordering below is still outstanding, not
    # resolved by that closure): once this job is green, move it back to
    # `needs: [plan, ensure-pr-staging-images, dns-zone-rollback-simulation]`
    # to match every other simulation job's serial position ahead of the
    # aggregate.
    name: Syslog forwarding + Admin UI visibility simulation
    needs: [plan, ensure-pr-staging-images]
    if: >-
      always() &&
      needs.plan.outputs.should_run == 'true' &&
      needs['ensure-pr-staging-images'].result != 'failure' &&
      needs['ensure-pr-staging-images'].result != 'cancelled'
    runs-on: [self-hosted, linux, lancache, lancache-light]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve build-tools image
        # No BUILD_TOOLS_REQUIRE_PUBLISHED: this script needs `expect` (real
        # setup.sh CLI fresh install, same reason setup-cli-simulation.sh
        # needs it) from build-tools. Same PR-staging-tag preference as
        # setup-cli-simulation above, for the same reason (Codex review
        # finding on #764).
        id: build-tools-image
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.plan.outputs.pr_staging_available }}" == "true" && "${{ needs.plan.outputs.build_tools }}" == "true" ]]; then
            image="ghcr.io/${{ github.repository }}/build-tools:${{ needs.plan.outputs.image_tag }}"
            echo "::notice::This PR touched tools/build-tools; using its confirmed staging image $image."
          else
            image="$(bash scripts/select-build-tools-image.sh)"
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"
      - name: Run syslog forwarding + Admin UI visibility simulation
        # Mounted at the SAME absolute path inside the container as on the
        # host, same reason as setup-cli-simulation.sh's identical step: the
        # script's own `docker compose` calls (through the bind-mounted host
        # socket) resolve bind-mount sources against the HOST daemon.
        #
        # flock (#453 follow-up, same #819-follow-up class as
        # setup-cli-simulation.sh): this script's own header says it reuses
        # setup-cli-simulation.sh's "unique COMPOSE_PROJECT_NAME + loopback
        # IP + retry-on-collision" isolation against deploy/quickstart/
        # docker-compose.yml -- but that compose file pins FIXED container
        # names (lancache-nats, lancache-ui, ...) for a real operator's
        # single-host install, deliberately (#669 item 6), which
        # COMPOSE_PROJECT_NAME does not scope. Two concurrent runs of this
        # job (or of this job and setup-cli-simulation's) landing on the
        # SAME physical runner host fight over the exact same container
        # names -- confirmed as the real cause of `nats did not become
        # healthy` / `ui did not become healthy` here, matching the
        # container-name collision class setup-cli-simulation's own flock
        # already guards against. A host-local flock around the whole
        # simulation is sufficient (not a distributed lock): the collision
        # can only happen between two runs sharing the same Docker daemon,
        # i.e. the same physical host, which is exactly what a per-host lock
        # file serializes. MUST be the SAME lock file setup-cli-simulation.sh
        # uses, not a separate one: this job's own `needs:` is deliberately
        # hoisted to [plan, ensure-pr-staging-images] (see the pending
        # reordering note on the job definition above) rather than chained
        # after the existing serial sim sequence,
        # so within a single PR's own CI run this job can run genuinely
        # CONCURRENTLY with setup-cli-simulation -- and both drive the exact
        # same fixed container names from the exact same
        # deploy/quickstart/docker-compose.yml. A separate lock file (the
        # first version of this fix) only serialized this job against
        # OTHER runs of itself, not against setup-cli-simulation running at
        # the same time in the same workflow run -- confirmed as the actual
        # cause of a repeat `nats did not become healthy` failure even after
        # that first fix landed (docker-socket-proxy's own access log showed
        # a `POST /containers/lancache-nats/restart` mid-run, i.e. two
        # simulations fighting over the same container). The lock itself now
        # comes from scripts/lib/quickstart-compose-lock.sh (issue #838),
        # sharing that ONE file's single hardcoded lock path -- see its
        # header for why the path must stay a shared constant rather than a
        # per-caller argument (a caller-supplied path is exactly the mistake
        # this job's own first fix attempt made, described above).
        env:
          BUILD_TOOLS_IMAGE: ${{ steps.build-tools-image.outputs.image }}
          SETUP_SIM_IMAGE_CHANNEL: ${{ needs.plan.outputs.pr_staging_available == 'true' && 'pinned' || needs.plan.outputs.image_tag }}
          SETUP_SIM_IMAGE_TAG: ${{ needs.plan.outputs.pr_staging_available == 'true' && needs.plan.outputs.image_tag || '' }}
        run: |
          set -euo pipefail

          # shellcheck source=scripts/lib/quickstart-compose-lock.sh
          source "scripts/lib/quickstart-compose-lock.sh"
          quickstart_compose_lock_acquire

          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:$PWD" \
            -w "$PWD" \
            -e BUILD_TOOLS_IMAGE \
            -e SETUP_SIM_IMAGE_CHANNEL \
            -e SETUP_SIM_IMAGE_TAG \
            -e GITHUB_RUN_ID \
            -e GITHUB_RUN_ATTEMPT \
            "$BUILD_TOOLS_IMAGE" \
            bash scripts/syslog-forwarding-simulation.sh

  # THE REQUIRED CHECK. Always runs (even when the suite was skipped for a
  # docs-only PR, or a sim failed), so branch protection always sees a real
  # conclusion from a job named "deep full-setup validation" -- never a
  # perpetually-pending or "skipped" required check that would wedge a PR.
  # Passes when the shared suite and all three deep-only sims succeeded (or
  # were legitimately skipped); fails if any actually failed or staging prep
  # failed.
  deep-full-setup-validation:
    name: deep full-setup validation
    needs:
      - plan
      - ensure-pr-staging-images
      - full-setup-sims
      - dns-zone-rollback-simulation
      - dhcp-kea-ui-rollback-simulation
      - syslog-forwarding-simulation
    if: always()
    runs-on: [self-hosted, linux, lancache, lancache-light]
    steps:
      - name: Aggregate deep validation result
        env:
          SHOULD_RUN: ${{ needs.plan.outputs.should_run }}
          PLAN_RESULT: ${{ needs.plan.result }}
          ENSURE_RESULT: ${{ needs['ensure-pr-staging-images'].result }}
          # One combined result for the ten shared jobs now in the reusable
          # full-setup-sims.yml (compute-validation-network + full-setup-validate
          # + the eight simulations). A reusable-workflow caller job reports
          # 'failure' if ANY job inside it failed, so this single result is a
          # faithful pass/fail for the whole shared set; GitHub's checks UI still
          # lists each inner job so a failure is attributable.
          FULL_SETUP_SIMS_RESULT: ${{ needs['full-setup-sims'].result }}
          DNS_ROLLBACK_RESULT: ${{ needs['dns-zone-rollback-simulation'].result }}
          UI_KEA_ROLLBACK_RESULT: ${{ needs['dhcp-kea-ui-rollback-simulation'].result }}
          SYSLOG_FORWARDING_RESULT: ${{ needs['syslog-forwarding-simulation'].result }}
        run: |
          set -euo pipefail

          if [[ "$PLAN_RESULT" != "success" ]]; then
            echo "::error::Deep validation could not be planned (plan job result: $PLAN_RESULT)."
            exit 1
          fi

          if [[ "$SHOULD_RUN" != "true" ]]; then
            echo "Deep full-setup validation skipped: this change does not touch the stack, its images, deploy assembly, driver scripts, or the CI contract. Reporting success."
            exit 0
          fi

          # Hard requirement, deliberately NOT routed through the lenient
          # check() helper below: the shared full-setup-sims suite contains
          # compute-validation-network (the per-run subnet/IP derivation every
          # job relies on for collision-free isolation) plus full-setup-validate
          # and the eight simulations. should_run is already 'true' here, so this
          # suite must have actually run and succeeded -- never merely be
          # 'skipped' (which check() treats as fine and would let this required
          # gate go green after silently losing the isolation guarantee, the
          # Codex review finding on #764 this preserves).
          if [[ "$FULL_SETUP_SIMS_RESULT" != "success" ]]; then
            echo "::error::The shared full-setup simulation suite did not succeed (full-setup-sims result: $FULL_SETUP_SIMS_RESULT); see its individual jobs in the checks UI. Failing closed."
            exit 1
          fi

          # A required check must fail only on a genuine problem. 'skipped' is
          # legitimate (ensure-pr-staging-images skips on dispatch/Dependabot; a
          # deep-only sim can skip if staging prep failed, itself reported via
          # ENSURE_RESULT). 'success' passes. Anything else fails the gate.
          overall=0
          check() {
            local name="$1" result="$2"
            case "$result" in
              success | skipped) echo "  $name: $result" ;;
              *) echo "::error::  $name: $result"; overall=1 ;;
            esac
          }
          echo "Deep validation job results:"
          check "ensure-pr-staging-images" "$ENSURE_RESULT"
          check "dns-zone-rollback-simulation" "$DNS_ROLLBACK_RESULT"
          check "dhcp-kea-ui-rollback-simulation" "$UI_KEA_ROLLBACK_RESULT"
          check "syslog-forwarding-simulation" "$SYSLOG_FORWARDING_RESULT"

          if [[ "$overall" -ne 0 ]]; then
            echo "::error::Deep full-setup validation failed -- see the failing job(s) above."
            exit 1
          fi
          echo "Deep full-setup validation passed: all simulations succeeded."
