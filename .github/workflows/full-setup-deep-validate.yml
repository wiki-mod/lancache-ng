# lancache-ng (https://github.com/wiki-mod/lancache-ng)
#
# DEEP full-setup validation gate (#715). This is the THIRD, additive check
# the project owner asked for in #715's clarification comments: a strict
# SUPERSET of both existing checks, wired to run automatically on every
# relevant PR.
#
#   - It does everything build-push.yml's shallow "validate full-setup image"
#     job does (bring the full-setup compose stack up on real images, assert
#     every container is healthy and not crash-looping)...
#   - ...PLUS every real functional simulation that until now lived only in
#     the manual-dispatch-only full-setup-validate.yml (SSL/HTTP/HTTPS
#     caching, UI->NATS->PowerDNS integration, Watchtower update behaviour,
#     setup.sh CLI, Kea DHCP lease flow, per-secondary NATS auth-callout).
#
# Neither existing workflow is modified: build-push.yml's shallow job and the
# manual full-setup-validate.yml both stay exactly as they are, so their fast
# and on-demand fallback paths remain available (see #715's comments on why
# the two originals are kept untouched rather than merged in place).
#
# On a pull_request event this validates the PR's OWN commits by reusing the
# #626/#627 pr-<N>-sha-<short> staging-tag mechanism (see
# scripts/ensure-pr-staging-images.sh) -- it does NOT reinvent a second
# tagging scheme. workflow_dispatch is preserved as a manual trigger for
# ad-hoc runs against a specific published channel tag.
#
# BRANCH PROTECTION NOTE: making this a REQUIRED check is a repository
# branch-protection setting, which lives in GitHub's settings and not in any
# file in this repo -- it cannot be set by this PR's diff. A maintainer must
# add the "deep full-setup validation" job (the always-run aggregate below,
# whose name is stable precisely so it can be required) to the branch
# protection required-status-checks list for v0.2.0/master. The aggregate is
# designed to always run and report a real pass/fail (never "skipped"), so it
# is safe to require without blocking docs-only PRs -- a required check that
# gets skipped would otherwise leave a PR permanently un-mergeable.
#
# RUNNER CAPACITY NOTE: these sims run serially on the shared lancache-light
# tier (per AG-CI-002); the image BUILDS they wait on run on the scarce
# lancache-heavy tier, so the wait cannot deadlock the builds (different
# runner pools). But this does roughly double the light-tier full-setup
# footprint per PR (build-push's own shallow job still runs too), and the
# staging-wait job holds one light slot while polling. See the PR body for
# the capacity trade-off; #715 states CI time is not the constraint but
# acknowledges self-hosted CAPACITY under higher trigger frequency is a real,
# separate concern to watch.

name: Full-Setup Deep Validate

on:
  # Branch-filtered to match build-push.yml's own pull_request trigger
  # EXACTLY (see build-push.yml's `on.pull_request.branches`). This suite's
  # whole pr_staging_available/ensure-pr-staging-images mechanism assumes
  # build-push.yml ran for the same PR and pushed its pr-<N>-sha-<short>
  # staging tags -- vit_pr_staging_available() (scripts/lib/
  # validation-image-tag.sh) has no base-branch check of its own, so without
  # this filter a PR opened against a base branch build-push.yml ignores
  # would still be marked staging-available here, and
  # ensure-pr-staging-images would poll for tags that no workflow will ever
  # push until it times out and fails closed (Codex review finding on
  # #764). Restricting the trigger the same way build-push.yml is restricted
  # is the correct fix rather than teaching the planner a fallback: a PR
  # against an unprotected branch isn't covered by branch-protection
  # required-status-checks anyway (see the BRANCH PROTECTION NOTE above), so
  # skipping this workflow entirely for it loses nothing.
  pull_request:
    branches: [master, "v[0-9]*"]
  workflow_dispatch:
    inputs:
      image_tag:
        # Same rationale as full-setup-validate.yml: edge (not latest) is the
        # channel actually promoted from master; latest is a stale pre-release
        # leftover. Operators can point an ad-hoc run at any published tag.
        description: Stack image tag to validate against (manual runs only).
        required: false
        default: edge

# Cancel superseded runs for the same PR/ref: a new push makes an in-flight
# deep run obsolete, and these are expensive serial suites on a shared runner
# tier. Manual (publish) runs are never grouped together so two operators'
# dispatches don't cancel each other.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-{1}', github.workflow, github.ref) || format('{0}-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Always runs (both events) and always succeeds, so every downstream gate
  # keys off one place. Decides whether the deep suite should run at all
  # (should_run) and resolves the single image tag the whole suite validates.
  plan:
    name: plan deep validation
    runs-on: [self-hosted, linux, lancache, lancache-light]
    outputs:
      should_run: ${{ steps.plan.outputs.should_run }}
      image_tag: ${{ steps.plan.outputs.image_tag }}
      pr_staging_available: ${{ steps.plan.outputs.pr_staging_available }}
      base_channel_tag: ${{ steps.plan.outputs.base_channel_tag }}
      workflow: ${{ steps.plan.outputs.workflow }}
      proxy: ${{ steps.plan.outputs.proxy }}
      dns_image: ${{ steps.plan.outputs.dns_image }}
      watchdog: ${{ steps.plan.outputs.watchdog }}
      ui: ${{ steps.plan.outputs.ui }}
      build_tools: ${{ steps.plan.outputs.build_tools }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # detect-full-setup-changes.sh diffs from the PR's real merge-base,
          # which needs full history (same reason build-push's detect-changes
          # uses fetch-depth: 0).
          fetch-depth: 0

      - name: Plan
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # github.sha, NOT the PR head sha: for a pull_request event this is
          # the synthetic base+head merge commit build-push actually built and
          # tagged. Must match build-push's staging-tag key exactly.
          BUILD_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REPOSITORY: ${{ github.repository }}
          DISPATCH_TAG: ${{ github.event.inputs.image_tag }}
        run: bash scripts/plan-deep-validation.sh

  # Derives a per-run validation subnet keyed on this run's own id/attempt
  # (#623), so the deep suite never collides with build-push.yml's shallow
  # validate job even when both run for the same PR at the same time.
  compute-validation-network:
    name: derive per-run validation subnet
    needs: plan
    if: needs.plan.outputs.should_run == 'true'
    runs-on: [self-hosted, linux, lancache, lancache-light]
    outputs:
      subnet: ${{ steps.derive.outputs.subnet }}
      gateway: ${{ steps.derive.outputs.gateway }}
      proxy_ip: ${{ steps.derive.outputs.proxy_ip }}
      proxy_ssl_ip: ${{ steps.derive.outputs.proxy_ssl_ip }}
      dns_standard_ip: ${{ steps.derive.outputs.dns_standard_ip }}
      dns_ssl_ip: ${{ steps.derive.outputs.dns_ssl_ip }}
      watchdog_ip: ${{ steps.derive.outputs.watchdog_ip }}
      netdata_ip: ${{ steps.derive.outputs.netdata_ip }}
      nats_ip: ${{ steps.derive.outputs.nats_ip }}
      ui_ip: ${{ steps.derive.outputs.ui_ip }}
      standard_shim_ip: ${{ steps.derive.outputs.standard_shim_ip }}
      project_name: ${{ steps.derive.outputs.project_name }}
      ui_port: ${{ steps.derive.outputs.ui_port }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Derive validation network
        id: derive
        uses: ./.github/actions/derive-validation-network

  # Cross-workflow wait + fail-closed staging guard. Only meaningful for a
  # same-repo PR (pr_staging_available): waits for build-push to push the
  # PR's touched-service staging tags, fails closed if a touched tag never
  # appears, and back-fills untouched services from the base channel. Skipped
  # on workflow_dispatch and Dependabot/fork PRs, where the suite validates a
  # published channel tag that already exists.
  ensure-pr-staging-images:
    name: ensure PR staging images
    needs: plan
    if: needs.plan.outputs.should_run == 'true' && needs.plan.outputs.pr_staging_available == 'true'
    runs-on: [self-hosted, linux, lancache, lancache-light]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for and ensure PR staging images
        env:
          REPOSITORY: ${{ github.repository }}
          PR_TAG: ${{ needs.plan.outputs.image_tag }}
          BASE_CHANNEL_TAG: ${{ needs.plan.outputs.base_channel_tag }}
          WORKFLOW_CHANGED: ${{ needs.plan.outputs.workflow }}
          PROXY_TOUCHED: ${{ needs.plan.outputs.proxy }}
          DNS_TOUCHED: ${{ needs.plan.outputs.dns_image }}
          WATCHDOG_TOUCHED: ${{ needs.plan.outputs.watchdog }}
          UI_TOUCHED: ${{ needs.plan.outputs.ui }}
          BUILD_TOOLS_TOUCHED: ${{ needs.plan.outputs.build_tools }}
        run: bash scripts/ensure-pr-staging-images.sh

  # Strict superset of build-push.yml's shallow "validate full-setup image"
  # job: same compose-config validation, subnet-collision guard, stack
  # bring-up, health/crash-loop assertions and client simulation -- but on a
  # PR it pulls the PR's OWN staging tag (resolved by plan) instead of a base
  # channel.
  full-setup-validate:
    name: validate full-setup image
    needs: [plan, compute-validation-network, ensure-pr-staging-images]
    # Runs whenever the suite should run AND staging prep did not fail (it is
    # 'skipped' on dispatch/Dependabot, which is fine). Not gated on the other
    # sims, so it always contributes its own signal.
    if: >-
      always() &&
      needs.plan.outputs.should_run == 'true' &&
      needs['compute-validation-network'].result != 'failure' &&
      needs['compute-validation-network'].result != 'cancelled' &&
      needs['ensure-pr-staging-images'].result != 'failure' &&
      needs['ensure-pr-staging-images'].result != 'cancelled'
    runs-on: [self-hosted, linux, lancache, lancache-light]
    env:
      LANCACHE_IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
      VALIDATION_SUBNET: ${{ needs.compute-validation-network.outputs.subnet }}
      VALIDATION_GATEWAY: ${{ needs.compute-validation-network.outputs.gateway }}
      VALIDATION_PROXY_IP: ${{ needs.compute-validation-network.outputs.proxy_ip }}
      VALIDATION_PROXY_SSL_IP: ${{ needs.compute-validation-network.outputs.proxy_ssl_ip }}
      VALIDATION_DNS_STANDARD_IP: ${{ needs.compute-validation-network.outputs.dns_standard_ip }}
      VALIDATION_DNS_SSL_IP: ${{ needs.compute-validation-network.outputs.dns_ssl_ip }}
      VALIDATION_WATCHDOG_IP: ${{ needs.compute-validation-network.outputs.watchdog_ip }}
      VALIDATION_NETDATA_IP: ${{ needs.compute-validation-network.outputs.netdata_ip }}
      VALIDATION_NATS_IP: ${{ needs.compute-validation-network.outputs.nats_ip }}
      VALIDATION_UI_IP: ${{ needs.compute-validation-network.outputs.ui_ip }}
      COMPOSE_PROJECT_NAME: ${{ needs.compute-validation-network.outputs.project_name }}
      VALIDATION_UI_PORT: ${{ needs.compute-validation-network.outputs.ui_port }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build full-setup validation image
        run: |
          set -euo pipefail
          docker build \
            --build-arg LANCACHE_IMAGE_REGISTRY=ghcr.io \
            --build-arg LANCACHE_IMAGE_PREFIX=wiki-mod/lancache-ng \
            --build-arg LANCACHE_IMAGE_TAG="$LANCACHE_IMAGE_TAG" \
            -t lancache-ng-full-setup:validation \
            deploy/full-setup

      - name: Validate compose configuration
        env:
          LANCACHE_IMAGE_REGISTRY: ghcr.io
          LANCACHE_IMAGE_PREFIX: wiki-mod/lancache-ng
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD/deploy/full-setup:/validation:ro" \
            -w /validation \
            --env LANCACHE_IMAGE_REGISTRY \
            --env LANCACHE_IMAGE_PREFIX \
            --env LANCACHE_IMAGE_TAG \
            docker:latest \
            docker compose -f docker-compose.yml config >/dev/null

      # Defense-in-depth against a leftover bridge from a crashed prior run;
      # see build-push.yml's identical step for the full rationale. Networks
      # named for our own compose project are ignored (docker recreates them
      # by name); only a foreign overlap fails the run with a clear message.
      - name: Check for a validation subnet collision
        run: |
          set -euo pipefail
          target_subnet="${VALIDATION_SUBNET:-172.30.99.0/24}"
          conflict="$(python3 - "$target_subnet" <<'PYEOF'
          import ipaddress, os, subprocess, sys
          target = ipaddress.ip_network(sys.argv[1])
          own_prefix = os.environ.get("COMPOSE_PROJECT_NAME", "lancache-ng-validation")
          ids = subprocess.run(["docker", "network", "ls", "-q"], capture_output=True, text=True, check=True).stdout.split()
          for network_id in ids:
              fmt = "{{.Name}}|{{range .IPAM.Config}}{{.Subnet}} {{end}}"
              line = subprocess.run(["docker", "network", "inspect", network_id, "--format", fmt], capture_output=True, text=True, check=True).stdout.strip()
              name, _, subnets_str = line.partition("|")
              if name.startswith(own_prefix):
                  continue
              for subnet_str in subnets_str.split():
                  try:
                      existing = ipaddress.ip_network(subnet_str)
                  except ValueError:
                      continue
                  if target.overlaps(existing):
                      print(f"docker network {name} ({subnet_str})")
          route_output = subprocess.run(["ip", "-4", "-o", "addr", "show"], capture_output=True, text=True, check=True).stdout
          for line in route_output.splitlines():
              parts = line.split()
              try:
                  inet_index = parts.index("inet")
                  iface = parts[1]
                  cidr = parts[inet_index + 1]
              except (ValueError, IndexError):
                  continue
              try:
                  existing = ipaddress.ip_interface(cidr).network
              except ValueError:
                  continue
              if target.overlaps(existing):
                  print(f"host interface {iface} ({cidr})")
          PYEOF
          )"
          if [[ -n "$conflict" ]]; then
            echo "::error::Validation subnet $target_subnet overlaps existing network state on this runner: $conflict. Set VALIDATION_SUBNET (and matching VALIDATION_*_IP / VALIDATION_GATEWAY) to a free range and re-run."
            exit 1
          fi
          echo "Validation subnet $target_subnet is free."

      - name: Start full-setup validation stack
        working-directory: deploy/full-setup
        env:
          LANCACHE_IMAGE_REGISTRY: ghcr.io
          LANCACHE_IMAGE_PREFIX: wiki-mod/lancache-ng
        run: |
          set -euo pipefail
          docker compose pull --quiet
          docker compose up -d

      - name: Wait for the stack to stabilize and check container health
        working-directory: deploy/full-setup
        run: |
          set -euo pipefail
          services_with_healthcheck="proxy dns-standard dns-ssl watchdog nats ui netdata"
          all_services="docker-socket-proxy $services_with_healthcheck"

          deadline=$((SECONDS + 90))
          while (( SECONDS < deadline )); do
            all_ready=1
            for service in $services_with_healthcheck; do
              cid="$(docker compose ps -q "$service")"
              status="$(docker inspect --format '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "unknown")"
              if [[ "$status" != "healthy" ]]; then
                all_ready=0
              fi
            done
            if [[ "$all_ready" -eq 1 ]]; then
              break
            fi
            sleep 5
          done

          echo "::group::Final container status"
          docker compose ps
          echo "::endgroup::"

          failed=0
          for service in $all_services; do
            cid="$(docker compose ps -q "$service")"
            if [[ -z "$cid" ]]; then
              echo "::error::$service has no running container"
              failed=1
              continue
            fi
            restart_count="$(docker inspect --format '{{.RestartCount}}' "$cid")"
            container_status="$(docker inspect --format '{{.State.Status}}' "$cid")"
            if [[ "$container_status" != "running" ]]; then
              echo "::error::$service is not running (state: $container_status)"
              failed=1
            elif (( restart_count > 1 )); then
              # > 1, not > 0: one restart during normal startup ordering is
              # expected and not a crash loop (same threshold build-push.yml
              # and watchtower-update-simulation.sh both rely on).
              echo "::error::$service has restarted $restart_count times (crash-loop suspected)"
              failed=1
            fi
            if [[ " $services_with_healthcheck " == *" $service "* ]]; then
              health="$(docker inspect --format '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "unknown")"
              if [[ "$health" != "healthy" ]]; then
                echo "::error::$service did not become healthy (status: $health)"
                failed=1
              fi
            fi
          done

          if [[ "$failed" -eq 1 ]]; then
            echo "::group::Logs from all services (failure diagnostics)"
            docker compose logs --no-color
            echo "::endgroup::"
            exit 1
          fi
          echo "Full-setup stack is stable: all services running and healthy."

      - name: Run client simulation against the full-setup stack
        env:
          FULL_SETUP_CLIENT_TOOLS_IMAGE: ghcr.io/${{ github.repository }}/build-tools:${{ needs.plan.outputs.image_tag }}
        run: |
          set -euo pipefail
          bash scripts/full-setup-client-simulation.sh

      - name: Tear down full-setup validation stack
        if: always()
        working-directory: deploy/full-setup
        run: |
          set -euo pipefail
          docker compose down --volumes --remove-orphans || true

      - name: Clean up image
        if: always()
        run: docker rmi lancache-ng-full-setup:validation || true

  ssl-mitm-cache-simulation:
    # Real DNS/HTTP/HTTPS caching test (deb.debian.org). Chained after the
    # health-check job to serialize onto the shared runner tier and the
    # fixed validation IPs; if: always() keeps its signal independent of that
    # job's own result. LANCACHE_IMAGE_TAG threads the resolved PR staging
    # tag so it tests the PR's own proxy/dns.
    name: SSL MITM cache simulation
    needs: [plan, compute-validation-network, ensure-pr-staging-images, full-setup-validate]
    if: >-
      always() &&
      needs.plan.outputs.should_run == 'true' &&
      needs['compute-validation-network'].result != 'failure' &&
      needs['compute-validation-network'].result != 'cancelled' &&
      needs['ensure-pr-staging-images'].result != 'failure' &&
      needs['ensure-pr-staging-images'].result != 'cancelled'
    runs-on: [self-hosted, linux, lancache, lancache-light]
    env:
      LANCACHE_IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
      # Per-run compose project name + UI host port keep this sim isolated from
      # build-push.yml's own shallow validate job when both run for the same
      # PR (they derive different values from different run ids). The
      # VALIDATION_SUBNET/*_IP/GATEWAY block below is needed too, not just
      # the project name: scripts/ssl-mitm-cache-simulation.sh calls `docker
      # compose up` against deploy/full-setup/docker-compose.yml, whose
      # network block falls back to the fixed 172.30.99.0/24 subnet
      # (docker-compose.yml's own ${VALIDATION_SUBNET:-172.30.99.0/24}
      # default) whenever these are unset -- a different project NAME alone
      # does not stop two concurrent runs' bridge networks from overlapping
      # on the same fixed subnet on a shared self-hosted host (Codex review
      # finding on #764: the isolation claim above was only true for the
      # full-setup-validate job, which already threaded these through; the
      # sibling simulation jobs below did not).
      VALIDATION_SUBNET: ${{ needs.compute-validation-network.outputs.subnet }}
      VALIDATION_GATEWAY: ${{ needs.compute-validation-network.outputs.gateway }}
      VALIDATION_PROXY_IP: ${{ needs.compute-validation-network.outputs.proxy_ip }}
      VALIDATION_PROXY_SSL_IP: ${{ needs.compute-validation-network.outputs.proxy_ssl_ip }}
      VALIDATION_DNS_STANDARD_IP: ${{ needs.compute-validation-network.outputs.dns_standard_ip }}
      VALIDATION_DNS_SSL_IP: ${{ needs.compute-validation-network.outputs.dns_ssl_ip }}
      VALIDATION_WATCHDOG_IP: ${{ needs.compute-validation-network.outputs.watchdog_ip }}
      VALIDATION_NETDATA_IP: ${{ needs.compute-validation-network.outputs.netdata_ip }}
      VALIDATION_NATS_IP: ${{ needs.compute-validation-network.outputs.nats_ip }}
      VALIDATION_UI_IP: ${{ needs.compute-validation-network.outputs.ui_ip }}
      # This is the only job in this workflow that threads this through: the
      # standard-passthrough-shim service it names is Compose-profile-gated
      # (see deploy/full-setup/docker-compose.yml), so only this job's own
      # `docker compose up ... standard-passthrough-shim` call ever starts
      # it -- no other job needs a collision-safe value for it (issue #668).
      VALIDATION_STANDARD_SHIM_IP: ${{ needs.compute-validation-network.outputs.standard_shim_ip }}
      COMPOSE_PROJECT_NAME: ${{ needs.compute-validation-network.outputs.project_name }}
      VALIDATION_UI_PORT: ${{ needs.compute-validation-network.outputs.ui_port }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve build-tools image
        # BUILD_TOOLS_REQUIRE_PUBLISHED=true: this job's dig/curl client checks
        # only need tools already in every published build-tools image, so it
        # should fail loudly rather than silently build a branch-local one.
        # EXCEPTION: when this PR itself touched tools/build-tools,
        # ensure-pr-staging-images has already polled for and confirmed
        # build-tools:$PR_TAG exists (scripts/ensure-pr-staging-images.sh),
        # so use that PR-scoped image directly instead of build-tools:latest
        # -- otherwise a same-PR build-tools change that still happens to
        # pass select-build-tools-image.sh's baseline smoke test would never
        # actually be exercised by this job (Codex review finding on #764).
        id: build-tools-image
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.plan.outputs.pr_staging_available }}" == "true" && "${{ needs.plan.outputs.build_tools }}" == "true" ]]; then
            image="ghcr.io/${{ github.repository }}/build-tools:${{ needs.plan.outputs.image_tag }}"
            echo "::notice::This PR touched tools/build-tools; using its confirmed staging image $image instead of build-tools:latest."
          else
            image="$(BUILD_TOOLS_REQUIRE_PUBLISHED=true bash scripts/select-build-tools-image.sh)"
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"
      - name: Run SSL MITM cache simulation
        env:
          BUILD_TOOLS_IMAGE: ${{ steps.build-tools-image.outputs.image }}
        run: |
          set -euo pipefail
          bash scripts/ssl-mitm-cache-simulation.sh

  ui-nats-dns-integration-simulation:
    # Real UI -> NATS -> nats-subscriber -> PowerDNS integration test. Wiring
    # LANCACHE_IMAGE_TAG here is the direct fix for the inconsistency #715
    # calls out: the manual full-setup-validate.yml never passed its image_tag
    # through to this job, so it always tested "edge" regardless of intent.
    name: UI/NATS/DNS integration simulation
    needs: [plan, compute-validation-network, ensure-pr-staging-images, ssl-mitm-cache-simulation]
    if: >-
      always() &&
      needs.plan.outputs.should_run == 'true' &&
      needs['compute-validation-network'].result != 'failure' &&
      needs['compute-validation-network'].result != 'cancelled' &&
      needs['ensure-pr-staging-images'].result != 'failure' &&
      needs['ensure-pr-staging-images'].result != 'cancelled'
    runs-on: [self-hosted, linux, lancache, lancache-light]
    env:
      LANCACHE_IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
      # See ssl-mitm-cache-simulation's identical block above for why the
      # full VALIDATION_SUBNET/*_IP/GATEWAY set (not just the project name)
      # is required for this job's own `docker compose up` call to actually
      # land on this run's derived, collision-free subnet.
      VALIDATION_SUBNET: ${{ needs.compute-validation-network.outputs.subnet }}
      VALIDATION_GATEWAY: ${{ needs.compute-validation-network.outputs.gateway }}
      VALIDATION_PROXY_IP: ${{ needs.compute-validation-network.outputs.proxy_ip }}
      VALIDATION_PROXY_SSL_IP: ${{ needs.compute-validation-network.outputs.proxy_ssl_ip }}
      VALIDATION_DNS_STANDARD_IP: ${{ needs.compute-validation-network.outputs.dns_standard_ip }}
      VALIDATION_DNS_SSL_IP: ${{ needs.compute-validation-network.outputs.dns_ssl_ip }}
      VALIDATION_WATCHDOG_IP: ${{ needs.compute-validation-network.outputs.watchdog_ip }}
      VALIDATION_NETDATA_IP: ${{ needs.compute-validation-network.outputs.netdata_ip }}
      VALIDATION_NATS_IP: ${{ needs.compute-validation-network.outputs.nats_ip }}
      VALIDATION_UI_IP: ${{ needs.compute-validation-network.outputs.ui_ip }}
      COMPOSE_PROJECT_NAME: ${{ needs.compute-validation-network.outputs.project_name }}
      VALIDATION_UI_PORT: ${{ needs.compute-validation-network.outputs.ui_port }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve build-tools image
        # See ssl-mitm-cache-simulation's identical step above for why a
        # same-PR build-tools change prefers the confirmed PR staging tag.
        id: build-tools-image
        run: |
          set -euo pipefail
          if [[ "${{ needs.plan.outputs.pr_staging_available }}" == "true" && "${{ needs.plan.outputs.build_tools }}" == "true" ]]; then
            image="ghcr.io/${{ github.repository }}/build-tools:${{ needs.plan.outputs.image_tag }}"
            echo "::notice::This PR touched tools/build-tools; using its confirmed staging image $image instead of build-tools:latest."
          else
            image="$(BUILD_TOOLS_REQUIRE_PUBLISHED=true bash scripts/select-build-tools-image.sh)"
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"
      - name: Run UI/NATS/DNS integration simulation
        env:
          BUILD_TOOLS_IMAGE: ${{ steps.build-tools-image.outputs.image }}
        run: |
          set -euo pipefail
          bash scripts/ui-nats-dns-integration-simulation.sh

  watchtower-update-simulation:
    # Real Watchtower verification: it seeds a private mirror from the
    # currently-published proxy:$LANCACHE_IMAGE_TAG, so threading the PR
    # staging tag makes it exercise the PR's own proxy image.
    name: Watchtower update simulation
    needs: [plan, compute-validation-network, ensure-pr-staging-images, ui-nats-dns-integration-simulation]
    if: >-
      always() &&
      needs.plan.outputs.should_run == 'true' &&
      needs['compute-validation-network'].result != 'failure' &&
      needs['compute-validation-network'].result != 'cancelled' &&
      needs['ensure-pr-staging-images'].result != 'failure' &&
      needs['ensure-pr-staging-images'].result != 'cancelled'
    runs-on: [self-hosted, linux, lancache, lancache-light]
    env:
      LANCACHE_IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
      # See ssl-mitm-cache-simulation's identical block above: this job's own
      # `docker compose up proxy netdata` call (in
      # scripts/watchtower-update-simulation.sh) needs these to land on this
      # run's derived subnet instead of the fixed 172.30.99.0/24 default.
      # (This does NOT cover the script's own local registry container name /
      # host port, a separate, already-tracked gap -- see #661.)
      VALIDATION_SUBNET: ${{ needs.compute-validation-network.outputs.subnet }}
      VALIDATION_GATEWAY: ${{ needs.compute-validation-network.outputs.gateway }}
      VALIDATION_PROXY_IP: ${{ needs.compute-validation-network.outputs.proxy_ip }}
      VALIDATION_PROXY_SSL_IP: ${{ needs.compute-validation-network.outputs.proxy_ssl_ip }}
      VALIDATION_DNS_STANDARD_IP: ${{ needs.compute-validation-network.outputs.dns_standard_ip }}
      VALIDATION_DNS_SSL_IP: ${{ needs.compute-validation-network.outputs.dns_ssl_ip }}
      VALIDATION_WATCHDOG_IP: ${{ needs.compute-validation-network.outputs.watchdog_ip }}
      VALIDATION_NETDATA_IP: ${{ needs.compute-validation-network.outputs.netdata_ip }}
      VALIDATION_NATS_IP: ${{ needs.compute-validation-network.outputs.nats_ip }}
      VALIDATION_UI_IP: ${{ needs.compute-validation-network.outputs.ui_ip }}
      COMPOSE_PROJECT_NAME: ${{ needs.compute-validation-network.outputs.project_name }}
      VALIDATION_UI_PORT: ${{ needs.compute-validation-network.outputs.ui_port }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run Watchtower update simulation
        run: |
          set -euo pipefail
          bash scripts/watchtower-update-simulation.sh

  setup-cli-simulation:
    # Runs the real setup.sh installer end-to-end (fresh install, update/
    # migration, rollback, restore). Its unique value is driving setup.sh's own
    # CLI/migration/rollback logic -- but doing so still brings a real stack up
    # on real images, so WHICH images matters.
    #
    # This used to hardcode the `edge` channel inside setup-cli-simulation.sh,
    # on the rationale that the job was "independent of PR image content." That
    # coupled a per-PR gate to a mutable channel tag refreshed far more slowly
    # than the gate runs: `edge` only moves on a push to master, which has sat
    # frozen for a long time, so every PR revalidated stale, months-old images
    # (and a v0.2.0 PR tested master's frozen edge, not v0.2.0's own line at
    # all). It is the same "blocking check coupled to a slow-moving channel tag"
    # class of bug as #775 (build-tools :latest) and #777 (promote starvation).
    #
    # Fix: install the PR's OWN immutable pr-<N>-sha image set instead (pinned,
    # threaded via plan's image_tag). That SUPERSEDES the old rationale rather
    # than contradicting it -- testing setup.sh against this PR's already-built
    # images + this PR's checked-out compose is strictly more correct than
    # against a stale channel, at zero extra build cost (the pr-<N>-sha images
    # already exist for the other sims), and is 1:1 with the PR's diff so no
    # channel-promotion timing can make it stale. Because it now consumes those
    # staging images, it is gated on ensure-pr-staging-images (skipped on
    # dispatch/fork is fine -- see the env block). Testing that the currently-
    # published channel still installs cleanly is a real but SEPARATE concern
    # that belongs on a schedule/post-merge, not a per-PR gate; #785 tracks
    # adding that scheduled channel-install smoke check (it is what re-covers
    # setup.sh's channel->stack-pointer->sha path, now only exercised here on
    # dispatch/fork/Dependabot runs rather than on the common same-repo PR).
    name: setup.sh CLI simulation
    needs: [plan, ensure-pr-staging-images, watchtower-update-simulation]
    if: >-
      always() &&
      needs.plan.outputs.should_run == 'true' &&
      needs['ensure-pr-staging-images'].result != 'failure' &&
      needs['ensure-pr-staging-images'].result != 'cancelled'
    runs-on: [self-hosted, linux, lancache, lancache-light]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve build-tools image
        # No BUILD_TOOLS_REQUIRE_PUBLISHED: setup-cli-simulation.sh needs
        # `expect` from build-tools. On a PR that touched tools/build-tools,
        # prefer the confirmed PR staging tag (ensure-pr-staging-images
        # already waited for and verified build-tools:$PR_TAG exists) over
        # select-build-tools-image.sh's own trusted-ref fallback: that
        # fallback only rebuilds branch-local when the published `latest`
        # image FAILS its smoke test, so a same-PR build-tools change that
        # still happens to pass the baseline smoke test would otherwise
        # silently run against `latest` instead of the PR's own image
        # (Codex review finding on #764).
        id: build-tools-image
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.plan.outputs.pr_staging_available }}" == "true" && "${{ needs.plan.outputs.build_tools }}" == "true" ]]; then
            image="ghcr.io/${{ github.repository }}/build-tools:${{ needs.plan.outputs.image_tag }}"
            echo "::notice::This PR touched tools/build-tools; using its confirmed staging image $image."
          else
            image="$(bash scripts/select-build-tools-image.sh)"
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"
      - name: Run setup.sh CLI simulation
        # Mounted at the SAME absolute path inside the container as on the host
        # so docker compose bind-mount sources (resolved against the HOST
        # daemon) match; see full-setup-validate.yml's identical step comment.
        env:
          BUILD_TOOLS_IMAGE: ${{ steps.build-tools-image.outputs.image }}
          # Which images setup.sh installs (see setup-cli-simulation.sh for the
          # full rationale). Same-repo PR: pin the PR's own immutable
          # pr-<N>-sha tag (plan.image_tag) so the gate tests THIS PR's code and
          # can never go stale. Otherwise (dispatch/fork/Dependabot, where
          # image_tag is already a channel word): install the base-ref channel
          # -- resolved by plan, never hardcoded edge -- which also keeps
          # setup.sh's channel->stack-pointer->sha resolution path covered.
          SETUP_SIM_IMAGE_CHANNEL: ${{ needs.plan.outputs.pr_staging_available == 'true' && 'pinned' || needs.plan.outputs.image_tag }}
          SETUP_SIM_IMAGE_TAG: ${{ needs.plan.outputs.pr_staging_available == 'true' && needs.plan.outputs.image_tag || '' }}
        run: |
          set -euo pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:$PWD" \
            -w "$PWD" \
            -e SETUP_SIM_IMAGE_CHANNEL \
            -e SETUP_SIM_IMAGE_TAG \
            "$BUILD_TOOLS_IMAGE" \
            bash scripts/setup-cli-simulation.sh

  dhcp-kea-lease-flow-simulation:
    # Real DHCP lease flow against a Kea container built from THIS checkout's
    # services/dhcp source -- so it already tests the PR's own DHCP code
    # directly and needs no staging tag. This is where dhcp coverage lands in
    # the automatic gate (it was absent from the shallow check). dhcp-proxy
    # still has no deep job (tracked in #705) and so is still uncovered here.
    name: DHCP Kea lease-flow simulation
    needs: [plan, setup-cli-simulation]
    if: always() && needs.plan.outputs.should_run == 'true'
    runs-on: [self-hosted, linux, lancache, lancache-light]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve build-tools image
        # No BUILD_TOOLS_REQUIRE_PUBLISHED: needs isc-dhcp-client from
        # build-tools. Same PR-staging-tag preference as setup-cli-simulation
        # above, for the same reason: select-build-tools-image.sh's
        # trusted-ref fallback only rebuilds branch-local when the published
        # `latest` FAILS its smoke test, which a same-PR build-tools change
        # would often still pass (Codex review finding on #764).
        id: build-tools-image
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.plan.outputs.pr_staging_available }}" == "true" && "${{ needs.plan.outputs.build_tools }}" == "true" ]]; then
            image="ghcr.io/${{ github.repository }}/build-tools:${{ needs.plan.outputs.image_tag }}"
            echo "::notice::This PR touched tools/build-tools; using its confirmed staging image $image."
          else
            image="$(bash scripts/select-build-tools-image.sh)"
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"
      - name: Run DHCP Kea lease-flow simulation
        env:
          DHCP_LEASE_FLOW_CLIENT_IMAGE: ${{ steps.build-tools-image.outputs.image }}
        run: |
          set -euo pipefail
          bash scripts/dhcp-kea-lease-flow-simulation.sh

  nats-auth-callout-simulation:
    # Real per-secondary NATS auth-callout integration test. Pulls the real
    # dns/ui/nats images (via the script), so it threads the PR staging tag to
    # test the PR's own secondary credentialing code.
    name: NATS auth-callout simulation
    needs: [plan, compute-validation-network, ensure-pr-staging-images, dhcp-kea-lease-flow-simulation]
    if: >-
      always() &&
      needs.plan.outputs.should_run == 'true' &&
      needs['compute-validation-network'].result != 'failure' &&
      needs['compute-validation-network'].result != 'cancelled' &&
      needs['ensure-pr-staging-images'].result != 'failure' &&
      needs['ensure-pr-staging-images'].result != 'cancelled'
    runs-on: [self-hosted, linux, lancache, lancache-light]
    env:
      LANCACHE_IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
      # See ssl-mitm-cache-simulation's identical block above: this job's own
      # `docker compose up proxy docker-socket-proxy dns-standard dns-ssl nats
      # ui` call (in scripts/nats-secondary-auth-callout-simulation.sh) needs
      # these to land on this run's derived subnet.
      VALIDATION_SUBNET: ${{ needs.compute-validation-network.outputs.subnet }}
      VALIDATION_GATEWAY: ${{ needs.compute-validation-network.outputs.gateway }}
      VALIDATION_PROXY_IP: ${{ needs.compute-validation-network.outputs.proxy_ip }}
      VALIDATION_PROXY_SSL_IP: ${{ needs.compute-validation-network.outputs.proxy_ssl_ip }}
      VALIDATION_DNS_STANDARD_IP: ${{ needs.compute-validation-network.outputs.dns_standard_ip }}
      VALIDATION_DNS_SSL_IP: ${{ needs.compute-validation-network.outputs.dns_ssl_ip }}
      VALIDATION_WATCHDOG_IP: ${{ needs.compute-validation-network.outputs.watchdog_ip }}
      VALIDATION_NETDATA_IP: ${{ needs.compute-validation-network.outputs.netdata_ip }}
      VALIDATION_NATS_IP: ${{ needs.compute-validation-network.outputs.nats_ip }}
      VALIDATION_UI_IP: ${{ needs.compute-validation-network.outputs.ui_ip }}
      COMPOSE_PROJECT_NAME: ${{ needs.compute-validation-network.outputs.project_name }}
      VALIDATION_UI_PORT: ${{ needs.compute-validation-network.outputs.ui_port }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve build-tools image
        # See ssl-mitm-cache-simulation's identical step above for why a
        # same-PR build-tools change prefers the confirmed PR staging tag.
        id: build-tools-image
        run: |
          set -euo pipefail
          if [[ "${{ needs.plan.outputs.pr_staging_available }}" == "true" && "${{ needs.plan.outputs.build_tools }}" == "true" ]]; then
            image="ghcr.io/${{ github.repository }}/build-tools:${{ needs.plan.outputs.image_tag }}"
            echo "::notice::This PR touched tools/build-tools; using its confirmed staging image $image instead of build-tools:latest."
          else
            image="$(BUILD_TOOLS_REQUIRE_PUBLISHED=true bash scripts/select-build-tools-image.sh)"
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"
      - name: Run NATS auth-callout simulation
        env:
          BUILD_TOOLS_IMAGE: ${{ steps.build-tools-image.outputs.image }}
        run: |
          set -euo pipefail
          bash scripts/nats-secondary-auth-callout-simulation.sh

  # THE REQUIRED CHECK. Always runs (even when the suite was skipped for a
  # docs-only PR, or a sim failed), so branch protection always sees a real
  # conclusion from a job named "deep full-setup validation" -- never a
  # perpetually-pending or "skipped" required check that would wedge a PR.
  # Passes when every sim that ran succeeded (or was legitimately skipped);
  # fails if any sim actually failed or the staging prep failed.
  deep-full-setup-validation:
    name: deep full-setup validation
    needs:
      - plan
      - compute-validation-network
      - ensure-pr-staging-images
      - full-setup-validate
      - ssl-mitm-cache-simulation
      - ui-nats-dns-integration-simulation
      - watchtower-update-simulation
      - setup-cli-simulation
      - dhcp-kea-lease-flow-simulation
      - nats-auth-callout-simulation
    if: always()
    runs-on: [self-hosted, linux, lancache, lancache-light]
    steps:
      - name: Aggregate deep validation result
        env:
          SHOULD_RUN: ${{ needs.plan.outputs.should_run }}
          PLAN_RESULT: ${{ needs.plan.result }}
          COMPUTE_NETWORK_RESULT: ${{ needs['compute-validation-network'].result }}
          ENSURE_RESULT: ${{ needs['ensure-pr-staging-images'].result }}
          FULL_SETUP_RESULT: ${{ needs['full-setup-validate'].result }}
          SSL_RESULT: ${{ needs['ssl-mitm-cache-simulation'].result }}
          UINATS_RESULT: ${{ needs['ui-nats-dns-integration-simulation'].result }}
          WATCHTOWER_RESULT: ${{ needs['watchtower-update-simulation'].result }}
          SETUP_RESULT: ${{ needs['setup-cli-simulation'].result }}
          DHCP_RESULT: ${{ needs['dhcp-kea-lease-flow-simulation'].result }}
          NATS_RESULT: ${{ needs['nats-auth-callout-simulation'].result }}
        run: |
          set -euo pipefail

          if [[ "$PLAN_RESULT" != "success" ]]; then
            echo "::error::Deep validation could not be planned (plan job result: $PLAN_RESULT)."
            exit 1
          fi

          if [[ "$SHOULD_RUN" != "true" ]]; then
            echo "Deep full-setup validation skipped: this change does not touch the stack, its images, deploy assembly, driver scripts, or the CI contract. Reporting success."
            exit 0
          fi

          # Hard requirement, deliberately NOT routed through the lenient
          # check() helper below: compute-validation-network derives the
          # per-run subnet/IPs every other job in this suite relies on for
          # collision-free isolation (see its own job comment). If it fails
          # or is cancelled, downstream jobs are skipped by their own `if:`
          # guards -- and check() treats 'skipped' as fine, so without this
          # explicit, unconditional check this required gate could still go
          # green after silently losing the isolation guarantee it depends
          # on (Codex review finding on #764). should_run is already 'true'
          # here (checked above), so compute-validation-network must have
          # actually run and succeeded, never merely be 'skipped'.
          if [[ "$COMPUTE_NETWORK_RESULT" != "success" ]]; then
            echo "::error::Per-run validation network derivation did not succeed (compute-validation-network result: $COMPUTE_NETWORK_RESULT); this suite cannot guarantee collision-free isolation from other concurrent runs. Failing closed."
            exit 1
          fi

          # A required check must fail only on a genuine problem. 'skipped' is
          # legitimate (ensure-pr-staging-images skips on dispatch/Dependabot;
          # a sim can skip if staging prep failed, which is itself reported via
          # ENSURE_RESULT). 'success' passes. Anything else (failure/cancelled)
          # fails the gate.
          overall=0
          check() {
            local name="$1" result="$2"
            case "$result" in
              success | skipped) echo "  $name: $result" ;;
              *) echo "::error::  $name: $result"; overall=1 ;;
            esac
          }
          echo "Deep validation job results:"
          check "ensure-pr-staging-images" "$ENSURE_RESULT"
          check "full-setup-validate" "$FULL_SETUP_RESULT"
          check "ssl-mitm-cache-simulation" "$SSL_RESULT"
          check "ui-nats-dns-integration-simulation" "$UINATS_RESULT"
          check "watchtower-update-simulation" "$WATCHTOWER_RESULT"
          check "setup-cli-simulation" "$SETUP_RESULT"
          check "dhcp-kea-lease-flow-simulation" "$DHCP_RESULT"
          check "nats-auth-callout-simulation" "$NATS_RESULT"

          if [[ "$overall" -ne 0 ]]; then
            echo "::error::Deep full-setup validation failed -- see the failing job(s) above."
            exit 1
          fi
          echo "Deep full-setup validation passed: all simulations succeeded."
