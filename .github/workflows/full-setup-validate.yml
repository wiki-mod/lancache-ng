# lancache-ng (https://github.com/wiki-mod/lancache-ng)
#
# Standalone, manually-triggered end-to-end check for the full-setup
# validation stack (deploy/full-setup/docker-compose.yml). Actually starts
# the stack with real published images and fails if any service is
# unhealthy or crash-looping. Deliberately separate from Build & Push: it
# has no build/push/promote/release jobs, so it can be re-run on demand
# without any risk of touching production images.

name: Full-Setup Validate

on:
  workflow_dispatch:
    inputs:
      image_tag:
        # latest is intentionally not the default: this project has not cut
        # a stable release yet, so every first-party service's :latest tag
        # is an untouched leftover from before the promote/versioning
        # contract existed (confirmed directly: ui/proxy/dns/watchdog/dhcp/
        # dhcp-proxy:latest are all 1-2 weeks stale, and stack:latest --
        # the coherent multi-service pointer -- does not exist at all). edge
        # is the channel actually promoted daily from master.
        description: Stack image tag to validate against.
        required: false
        default: edge

permissions:
  contents: read

jobs:
  # A fixed validation subnet collided repeatedly across different,
  # concurrent workflow runs sharing one of the 3 physical self-hosted
  # runner hosts (#623) -- `needs:` below only serializes jobs *within* this
  # one run. Deriving the subnet from this run's own id/attempt gives every
  # run its own subnet, so two runs on the same host (almost) never collide.
  #
  # "Almost": this job's own hash-only derivation has no coordination
  # between concurrent runs at all, so two runs deriving the exact same
  # slot close together was a genuine (rare, but confirmed for real -
  # #703) race, not just a low-probability event. This job's `subnet`/
  # `gateway`/`*_ip` outputs below are therefore only the STARTING
  # candidate: full-setup-validate's own "Reserve a validation subnet and
  # start the stack" step is what actually makes the chosen subnet
  # collision-safe, via a host-local flock plus a re-derive-and-retry loop
  # if that starting candidate turns out to be locked or in use. This job's
  # `project_name`/`ui_port` outputs are unaffected -- see that step's own
  # comment for why a possible subnet retry deliberately does not also
  # change those.
  compute-validation-network:
    name: derive per-run validation subnet
    runs-on: [self-hosted, linux, lancache, lancache-light]
    outputs:
      subnet: ${{ steps.derive.outputs.subnet }}
      gateway: ${{ steps.derive.outputs.gateway }}
      proxy_ip: ${{ steps.derive.outputs.proxy_ip }}
      proxy_ssl_ip: ${{ steps.derive.outputs.proxy_ssl_ip }}
      dns_standard_ip: ${{ steps.derive.outputs.dns_standard_ip }}
      dns_ssl_ip: ${{ steps.derive.outputs.dns_ssl_ip }}
      watchdog_ip: ${{ steps.derive.outputs.watchdog_ip }}
      netdata_ip: ${{ steps.derive.outputs.netdata_ip }}
      nats_ip: ${{ steps.derive.outputs.nats_ip }}
      ui_ip: ${{ steps.derive.outputs.ui_ip }}
      project_name: ${{ steps.derive.outputs.project_name }}
      ui_port: ${{ steps.derive.outputs.ui_port }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Derive validation network
        id: derive
        uses: ./.github/actions/derive-validation-network

  full-setup-validate:
    name: validate full-setup image
    needs: compute-validation-network
    runs-on: [self-hosted, linux, lancache, lancache-light]
    # NONE of VALIDATION_SUBNET/GATEWAY/*_IP, COMPOSE_PROJECT_NAME, or
    # VALIDATION_UI_PORT are set here from compute-validation-network's
    # outputs. A job-level `env:` entry is re-applied on top of every step's
    # accumulated $GITHUB_ENV state, so a fixed entry here would always win
    # in every later step, silently overriding whatever a retry inside the
    # "Reserve a validation subnet and start the stack" step below wrote via
    # $GITHUB_ENV.
    #
    # COMPOSE_PROJECT_NAME/VALIDATION_UI_PORT used to be set here from
    # compute-validation-network's outputs on the theory that only the
    # subnet itself is affected by a retry. That was wrong: both are also
    # derived from the SAME slot compute-validation-network derives
    # (project_name = "lancache-ng-validation-<slot>", ui_port = 9000 +
    # <slot>, see that action's own derive step), so whenever a retry lands
    # on a DIFFERENT slot than the one two colliding concurrent runs both
    # started from -- exactly the #703 scenario this whole mechanism exists
    # to handle -- the run that retried would keep the ORIGINAL slot's
    # project name and UI port (job-level env, unaffected by $GITHUB_ENV)
    # while using the NEW slot's subnet. That reintroduces, on the compose
    # project name and host UI port specifically, the exact same
    # concurrent-run collision (colliding container/network names, colliding
    # 127.0.0.1:<port> bind) that deriving them per-run was supposed to
    # prevent in the first place. So these two are now rederived from the
    # actually-reserved slot by that same step, alongside
    # VALIDATION_SUBNET/GATEWAY/*_IP, for the same reason.
    #
    # Downstream jobs (ssl-mitm-cache-simulation and later) are unaffected by
    # THIS job's own retry loop specifically, but were NOT actually safe
    # before issue #820: an earlier version of this comment claimed they
    # "deliberately use the fixed 172.30.99.0/27 default subnet" as if that
    # were an intentional, harmless choice -- it was not. They simply never
    # had VALIDATION_SUBNET/GATEWAY/*_IP threaded to them at all (only
    # COMPOSE_PROJECT_NAME/VALIDATION_UI_PORT), so every one of them fell
    # back to that literal subnet unconditionally, which is a deterministic
    # collision the moment two such networks exist on the same host at once
    # -- confirmed for real (#820): this workflow's own nats-auth-callout-
    # simulation and dhcp-kea-ctrl-agent-mutation-simulation jobs both died
    # on "Pool overlaps" for the identical reason. Each downstream job now
    # wraps its own script invocation in scripts/lib/run-in-validation-
    # subnet.sh, which performs its OWN independent host-locked reservation
    # (not reading compute-validation-network's output at all) -- see each
    # job's own header comment.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build full-setup validation image
        run: |
          set -euo pipefail

          docker build \
            --build-arg LANCACHE_IMAGE_REGISTRY=ghcr.io \
            --build-arg LANCACHE_IMAGE_PREFIX=wiki-mod/lancache-ng \
            --build-arg LANCACHE_IMAGE_TAG="${{ inputs.image_tag }}" \
            -t lancache-ng-full-setup:validation \
            deploy/full-setup

      - name: Validate compose configuration
        env:
          LANCACHE_IMAGE_REGISTRY: ghcr.io
          LANCACHE_IMAGE_PREFIX: wiki-mod/lancache-ng
          LANCACHE_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          docker run --rm \
            -v "$PWD/deploy/full-setup:/validation:ro" \
            -w /validation \
            --env LANCACHE_IMAGE_REGISTRY \
            --env LANCACHE_IMAGE_PREFIX \
            --env LANCACHE_IMAGE_TAG \
            docker:latest \
            docker compose -f docker-compose.yml config >/dev/null

      # VALIDATION_SUBNET (and the matching VALIDATION_*_IP /
      # VALIDATION_GATEWAY vars, see docker-compose.yml) starts from the
      # candidate compute-validation-network derived per-run (#623), but
      # that job's own hash derivation alone had an unlocked check-then-
      # create race between two different, genuinely concurrent workflow
      # runs on the same self-hosted host (#703): two runs could derive the
      # same slot, both pass a `docker network ls`-based pre-flight check
      # (only catches a leftover Docker network, not another run mid-way
      # through its own check-then-create window), and then race the kernel
      # to actually create the bridge, with only one winning.
      #
      # This step closes that gap with the same host-local `flock` idiom
      # this project already uses for another shared-per-host resource
      # (build-tools.yml/build-push.yml's Buildx cache lock), via
      # scripts/lib/reserve-validation-subnet.sh: before this job ever
      # touches Docker, it must hold an exclusive, non-blocking flock on the
      # candidate slot, for as long as the validation stack stays up (the
      # lock's holder PID is threaded through $GITHUB_ENV so the teardown
      # step below can release it explicitly once the stack comes down).
      # flock's lock is tied to an open file descriptor, not to a marker
      # file's mere existence, so a crashed or cancelled run can never leave
      # a stale lock behind.
      #
      # Three things can still make a given candidate slot unusable even
      # after its lock is held: (1) another concurrent run already holds
      # that slot's lock; (2) the defense-in-depth check below (carried
      # over from the pre-#703 "Check for a validation subnet collision"
      # step, which only this step's own header comment used to hold) finds
      # a real host-interface or non-project Docker-network conflict Docker
      # itself doesn't track under this project's own compose-project
      # prefix; (3) the genuine TOCTOU case #703's linked run actually hit:
      # both of the above pass, and `docker compose up` still fails with a
      # network-overlap error. Any of the three releases the lock and
      # retries with a freshly re-derived (salted) candidate, bounded to
      # max_attempts so a persistently broken host fails the job instead of
      # looping forever. Any OTHER `docker compose up` failure (a bad image,
      # a missing env var, ...) is not retried -- it would fail again
      # identically every time, so it's surfaced immediately instead of
      # burning through every remaining attempt on an error retrying can
      # never fix.
      #
      # Static config validation above only checks YAML/Compose structure. A
      # successful `docker compose up` here does not yet mean the stack is
      # healthy -- it cannot catch a service that starts but immediately
      # crash-loops (the motivating case for the "Wait for the stack to
      # stabilize" step below: #450/#485, dnsmasq trying to bind an
      # already-used port).
      - name: Reserve a validation subnet and start the stack (locked, retries on collision)
        id: reserve-and-start
        working-directory: deploy/full-setup
        env:
          LANCACHE_IMAGE_REGISTRY: ghcr.io
          LANCACHE_IMAGE_PREFIX: wiki-mod/lancache-ng
          LANCACHE_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          : "${GITHUB_RUN_ID:?GITHUB_RUN_ID is required}"
          : "${GITHUB_RUN_ATTEMPT:?GITHUB_RUN_ATTEMPT is required}"

          if ! command -v flock >/dev/null 2>&1; then
            echo "::error::flock is required for safe validation-subnet locking."
            exit 1
          fi

          # shellcheck source=scripts/lib/reserve-validation-subnet.sh
          source "$GITHUB_WORKSPACE/scripts/lib/reserve-validation-subnet.sh"

          lock_root="/tmp/lancache-validation-locks"
          max_attempts=10

          # Defense-in-depth check carried over from the pre-#703 "Check for
          # a validation subnet collision" step: Docker-managed networks
          # only cover Docker's own view. A route or interface address
          # already on the host (another NIC, a VPN, a leftover bridge from
          # something outside Docker entirely) doesn't show up in
          # `docker network ls` at all, but the kernel still refuses to
          # create an overlapping bridge for it -- confirmed for real in
          # #703's linked run: this exact check found zero Docker-network
          # conflicts while `docker compose up` still failed with "Pool
          # overlaps". validation_subnet_conflicts (sourced above) is the
          # single shared definition of this check -- issue #820 consolidated
          # what used to be this step's own copy-pasted python block (plus
          # near-identical copies in full-setup-deep-validate.yml's reserve
          # step, scripts/lib/run-in-validation-subnet.sh, and the DHCP
          # simulation scripts) into one place in the lib, closing off exactly
          # the kind of silent divergence that had left this step's own copy
          # one step behind (a bare `startswith(own_prefix)` rather than the
          # delimited-child match the other copies already used).

          docker compose pull --quiet

          reserved_slot=""
          holder_pid=""
          next_attempt=1

          while [[ -z "$reserved_slot" && "$next_attempt" -le "$max_attempts" ]]; do
            reservation="$(validation_subnet_reserve "$lock_root" "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" "$next_attempt" "$max_attempts")" || {
              echo "::error::Could not lock a free validation subnet slot after $max_attempts attempts."
              exit 1
            }
            attempt="$(printf '%s\n' "$reservation" | sed -n 's/^attempt=//p')"
            slot="$(printf '%s\n' "$reservation" | sed -n 's/^slot=//p')"
            candidate_pid="$(printf '%s\n' "$reservation" | sed -n 's/^holder_pid=//p')"

            # Rederive the COMPLETE VALIDATION_* set (subnet, gateway, every
            # service IP, COMPOSE_PROJECT_NAME, VALIDATION_UI_PORT) from THIS
            # attempt's own candidate slot via the single shared
            # validation_subnet_export_env (reserve-validation-subnet.sh) --
            # the SAME function full-setup-deep-validate.yml's own reserve
            # step and scripts/lib/run-in-validation-subnet.sh call, instead
            # of this step keeping its own separate, hand-written copy of the
            # export formula (a real divergence risk #832's inventory found:
            # this step and build-push.yml's own "Reserve a validation subnet
            # and start the stack" step had each drifted into their own
            # copy-pasted export block). Both used to come only from
            # compute-validation-network's job-level outputs -- i.e. from the
            # FIRST slot ever tried, attempt 1 -- which stayed wrong for the
            # rest of this loop on any actual retry (a different slot). That
            # mattered in two ways: (1) validation_subnet_conflicts below
            # reads COMPOSE_PROJECT_NAME to recognize a leftover Docker
            # network from THIS SAME run's own earlier (crashed, never torn
            # down) attempt at the CURRENT candidate slot as "ours" rather
            # than a foreign conflict -- a stale value would misidentify a
            # genuinely reusable leftover as a foreign collision and waste a
            # retry; (2) two different, genuinely concurrent workflow runs
            # that both started from the SAME initial slot (the exact #703
            # scenario) but where one loses the lock race and retries onto a
            # DIFFERENT slot would otherwise keep sharing the ORIGINAL slot's
            # project name and UI port even after diverging on subnet --
            # reintroducing, on the compose project namespace and host UI
            # port specifically, the very same concurrent-run collision
            # deriving them per-run was meant to prevent in the first place.
            validation_subnet_export_env "$slot"

            conflict="$(validation_subnet_conflicts "$VALIDATION_SUBNET" "$COMPOSE_PROJECT_NAME")"
            if [[ -n "$conflict" ]]; then
              echo "Slot $slot's subnet $VALIDATION_SUBNET overlaps existing host/Docker state ($conflict); releasing and trying the next candidate."
              validation_subnet_release "$candidate_pid"
              next_attempt=$((attempt + 1))
              continue
            fi

            echo "Attempting to start the validation stack on locked, pre-checked subnet $VALIDATION_SUBNET (attempt $attempt)."
            if up_output="$(docker compose up -d 2>&1)"; then
              echo "$up_output"
              reserved_slot="$slot"
              holder_pid="$candidate_pid"
              break
            fi

            echo "$up_output"
            validation_subnet_release "$candidate_pid"

            if ! validation_subnet_output_is_collision "$up_output"; then
              echo "::error::docker compose up failed for a reason unrelated to a subnet collision; not retrying."
              exit 1
            fi

            echo "docker compose up failed with a network-overlap error on attempt $attempt, retrying with a different subnet."
            next_attempt=$((attempt + 1))
          done

          if [[ -z "$reserved_slot" ]]; then
            echo "::error::Could not reserve a free validation subnet and start the stack after $max_attempts attempts."
            exit 1
          fi

          echo "Validation stack is up on subnet $VALIDATION_SUBNET (lock held by PID $holder_pid)."

          # Persist the SAME VALIDATION_*/COMPOSE_PROJECT_NAME/
          # VALIDATION_UI_PORT set the winning attempt above already
          # exported (via validation_subnet_export_env) for its own
          # `docker compose up`, so every later step in this job (the
          # health-check step, the client-simulation step, and the teardown
          # step's own `docker compose down`) keeps targeting the
          # actually-running stack instead of falling back to whatever a
          # stale job-level env would have held on a retry.
          {
            echo "COMPOSE_PROJECT_NAME=$COMPOSE_PROJECT_NAME"
            echo "VALIDATION_UI_PORT=$VALIDATION_UI_PORT"
            echo "VALIDATION_LOCK_HOLDER_PID=$holder_pid"
            echo "VALIDATION_SUBNET=$VALIDATION_SUBNET"
            echo "VALIDATION_GATEWAY=$VALIDATION_GATEWAY"
            echo "VALIDATION_PROXY_IP=$VALIDATION_PROXY_IP"
            echo "VALIDATION_DNS_STANDARD_IP=$VALIDATION_DNS_STANDARD_IP"
            echo "VALIDATION_PROXY_SSL_IP=$VALIDATION_PROXY_SSL_IP"
            echo "VALIDATION_DNS_SSL_IP=$VALIDATION_DNS_SSL_IP"
            echo "VALIDATION_WATCHDOG_IP=$VALIDATION_WATCHDOG_IP"
            echo "VALIDATION_NETDATA_IP=$VALIDATION_NETDATA_IP"
            echo "VALIDATION_NATS_IP=$VALIDATION_NATS_IP"
            echo "VALIDATION_UI_IP=$VALIDATION_UI_IP"
            echo "VALIDATION_STANDARD_SHIM_IP=$VALIDATION_STANDARD_SHIM_IP"
          } >> "$GITHUB_ENV"

      - name: Wait for the stack to stabilize and check container health
        working-directory: deploy/full-setup
        run: |
          set -euo pipefail

          # Services with an explicit healthcheck report a real "healthy"
          # status; docker-socket-proxy has none, so it's only checked for
          # "running" plus a restart-count ceiling (catches a crash loop
          # without needing a healthcheck definition for every service).
          services_with_healthcheck="proxy dns-standard dns-ssl watchdog nats ui netdata"
          all_services="docker-socket-proxy $services_with_healthcheck"

          deadline=$((SECONDS + 90))
          while (( SECONDS < deadline )); do
            all_ready=1
            for service in $services_with_healthcheck; do
              cid="$(docker compose ps -q "$service")"
              status="$(docker inspect --format '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "unknown")"
              if [[ "$status" != "healthy" ]]; then
                all_ready=0
              fi
            done
            if [[ "$all_ready" -eq 1 ]]; then
              break
            fi
            sleep 5
          done

          echo "::group::Final container status"
          docker compose ps
          echo "::endgroup::"

          failed=0
          for service in $all_services; do
            cid="$(docker compose ps -q "$service")"
            if [[ -z "$cid" ]]; then
              echo "::error::$service has no running container"
              failed=1
              continue
            fi

            restart_count="$(docker inspect --format '{{.RestartCount}}' "$cid")"
            container_status="$(docker inspect --format '{{.State.Status}}' "$cid")"

            if [[ "$container_status" != "running" ]]; then
              echo "::error::$service is not running (state: $container_status)"
              failed=1
            elif (( restart_count > 1 )); then
              # > 1, not > 0: a single restart during normal startup
              # ordering (e.g. waiting on a dependency that wasn't healthy
              # yet) is expected and not itself a crash loop.
              echo "::error::$service has restarted $restart_count times (crash-loop suspected)"
              failed=1
            fi

            if [[ " $services_with_healthcheck " == *" $service "* ]]; then
              health="$(docker inspect --format '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "unknown")"
              if [[ "$health" != "healthy" ]]; then
                echo "::error::$service did not become healthy (status: $health)"
                failed=1
              fi
            fi
          done

          if [[ "$failed" -eq 1 ]]; then
            echo "::group::Logs from all services (failure diagnostics)"
            docker compose logs --no-color
            echo "::endgroup::"
            exit 1
          fi

          echo "Full-setup stack is stable: all services running and healthy."

      - name: Run client simulation against the full-setup stack
        env:
          FULL_SETUP_CLIENT_TOOLS_IMAGE: ghcr.io/${{ github.repository }}/build-tools:${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          bash scripts/full-setup-client-simulation.sh

      - name: Tear down full-setup validation stack
        if: always()
        working-directory: deploy/full-setup
        run: |
          set -euo pipefail
          docker compose down --volumes --remove-orphans || true

          # `down` above can lose Docker's own "has active endpoints" race
          # (a container-removal API call can return before its network
          # endpoint is actually unwired -- confirmed for real in CI, see
          # validation_project_networks_teardown's own comment in
          # reserve-validation-subnet.sh) and silently leave this project's
          # network(s) non-empty, poisoning them for whichever run reserves
          # this slot next. Wait for and force a real removal instead of
          # trusting `down`'s own exit code.
          # shellcheck source=scripts/lib/reserve-validation-subnet.sh
          source "$GITHUB_WORKSPACE/scripts/lib/reserve-validation-subnet.sh"
          # This step runs unconditionally (`if: always()`), including when
          # the "Reserve a validation subnet and start the stack" step above
          # failed before ever setting COMPOSE_PROJECT_NAME -- under
          # `set -u`, a bare "$COMPOSE_PROJECT_NAME" would abort this whole
          # step with "unbound variable" in exactly that case (confirmed in
          # CI). The safe-default form skips teardown when there is nothing
          # to tear down instead.
          if [[ -n "${COMPOSE_PROJECT_NAME:-}" ]]; then
            validation_project_networks_teardown "$COMPOSE_PROJECT_NAME" || true
          fi

          # Release the host-local subnet lock the "Reserve a validation
          # subnet and start the stack" step above acquired (see that
          # step's own comment), so the slot becomes available to the next
          # run immediately rather than waiting for this whole job's process
          # tree to exit. $VALIDATION_LOCK_HOLDER_PID is only set once that
          # step actually reserved a lock -- if it failed before reaching
          # that point (e.g. every candidate in range was already locked or
          # in use), there is nothing to release.
          if [[ -n "${VALIDATION_LOCK_HOLDER_PID:-}" ]]; then
            kill "$VALIDATION_LOCK_HOLDER_PID" 2>/dev/null || true
          fi

      - name: Clean up image
        if: always()
        run: |
          docker rmi lancache-ng-full-setup:validation || true

  ssl-mitm-cache-simulation:
    # Real DNS/HTTP/HTTPS caching test against a genuinely fetchable target
    # (issue #597, part of #557 scenario 1). Most cdn-domains.txt entries
    # are game CDNs that need signed/session URLs and won't serve a plain
    # curl request -- but this project also caches Linux distro mirrors
    # (see the "Debian"/"Fedora"/etc. sections of that file), and
    # deb.debian.org is already one of them. So this uses the real,
    # already-published dns/proxy images as-is, no custom build needed, via
    # deploy/full-setup/docker-compose.yml (NATS, networking, healthchecks
    # already proven there).
    # Independent of full-setup-validate above (this job starts only
    # proxy/dns-standard/dns-ssl/nats, not the full compose profile).
    # `needs:` here exists purely to serialize onto the shared runner tier
    # (this job's own subnet reservation below is already collision-safe
    # against a concurrent full-setup-validate, issue #820 -- it does not
    # need that job to have finished first) -- it is NOT expressing a real
    # success dependency on full-setup-validate's own result. `if:
    # always()` is what keeps that distinction real: without it, a failure
    # in full-setup-validate would cascade-skip this job (GitHub Actions'
    # default), silently losing this job's own independent diagnostic
    # signal for a completely unrelated part of the stack. Every later job
    # in this file chains the same way for the same reason.
    #
    # Real, previously-undiscovered gap (issue #820): unlike its
    # full-setup-deep-validate.yml namesake, this job never had
    # VALIDATION_SUBNET/GATEWAY/*_IP threaded to it at all -- only
    # COMPOSE_PROJECT_NAME/VALIDATION_UI_PORT (below, now removed). Every
    # invocation of scripts/ssl-mitm-cache-simulation.sh in THIS workflow
    # therefore always fell back to deploy/full-setup/docker-compose.yml's
    # own hardcoded ${VALIDATION_SUBNET:-172.30.99.0/27} default, regardless
    # of the run's own derived slot -- a deterministic collision the
    # moment any two such networks (from any job, any concurrent run) existed
    # at once, not a rare birthday-paradox event. scripts/lib/
    # run-in-validation-subnet.sh (issue #820) now wraps this job's script
    # invocation: it reserves a host-locked, overlap-checked slot per
    # attempt, exports the complete VALIDATION_* set (superseding the
    # removed job-level COMPOSE_PROJECT_NAME/VALIDATION_UI_PORT, which the
    # wrapper's own export would have shadowed within this step anyway), and
    # retries on a genuine collision.
    name: SSL MITM cache simulation
    needs: [compute-validation-network, full-setup-validate]
    if: always()
    runs-on: [self-hosted, linux, lancache, lancache-light]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve build-tools image
        # BUILD_TOOLS_REQUIRE_PUBLISHED=true: this job's own client checks
        # (dig/curl) only need tools that already exist in every published
        # build-tools image, so it can and should fail loudly if that image
        # is somehow unavailable rather than silently falling back to a
        # branch-local build -- unlike setup-cli-simulation/
        # dhcp-kea-lease-flow-simulation below, which genuinely need a tool
        # added to tools/build-tools/Dockerfile only on this branch and so
        # deliberately omit this flag (see their own comments).
        id: build-tools-image
        run: |
          set -euo pipefail
          image="$(BUILD_TOOLS_REQUIRE_PUBLISHED=true bash scripts/select-build-tools-image.sh)"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Run SSL MITM cache simulation
        # dig/curl client verification runs through build-tools (matching
        # the existing scripts/full-setup-client-simulation.sh pattern);
        # starting the real proxy/dns-standard/dns-ssl/nats containers
        # happens directly via the runner's own docker, same as
        # full-setup-validate's own steps above. Wrapped in
        # run-in-validation-subnet.sh (issue #820) -- see this job's own
        # header comment.
        env:
          BUILD_TOOLS_IMAGE: ${{ steps.build-tools-image.outputs.image }}
        run: |
          set -euo pipefail
          bash scripts/lib/run-in-validation-subnet.sh bash scripts/ssl-mitm-cache-simulation.sh

  ui-nats-dns-integration-simulation:
    # Real UI -> NATS -> nats-subscriber -> PowerDNS integration test
    # (issue #400, sub-item of #398 priority 1). Adds a LAN DNS record
    # through the real Admin UI HTTP route, verifies it resolves via a real
    # DNS query, removes it, verifies it's gone. Building this surfaced
    # three independent, real product bugs (see #607) that made this
    # feature completely non-functional -- fixed in the same PR as this job.
    # Wrapped in run-in-validation-subnet.sh (issue #820) for the same
    # reason as ssl-mitm-cache-simulation's own header comment: this job
    # never had VALIDATION_SUBNET/GATEWAY/*_IP threaded to it, only
    # COMPOSE_PROJECT_NAME/VALIDATION_UI_PORT (now removed, superseded by
    # the wrapper's own export) -- so it always fell back to the compose
    # file's hardcoded 172.30.99.0/27 default, a deterministic collision
    # magnet shared with every other unwrapped job on this same subnet.
    name: UI/NATS/DNS integration simulation
    needs: [compute-validation-network, ssl-mitm-cache-simulation]
    if: always()
    runs-on: [self-hosted, linux, lancache, lancache-light]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve build-tools image
        # BUILD_TOOLS_REQUIRE_PUBLISHED=true: same reasoning as
        # ssl-mitm-cache-simulation's own step above.
        id: build-tools-image
        run: |
          set -euo pipefail
          image="$(BUILD_TOOLS_REQUIRE_PUBLISHED=true bash scripts/select-build-tools-image.sh)"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Run UI/NATS/DNS integration simulation
        env:
          BUILD_TOOLS_IMAGE: ${{ steps.build-tools-image.outputs.image }}
        run: |
          set -euo pipefail
          bash scripts/lib/run-in-validation-subnet.sh bash scripts/ui-nats-dns-integration-simulation.sh

  setup-cli-simulation:
    # Runs the real setup.sh CLI end-to-end (fresh install through its
    # interactive prompts, update/migration, and one rollback-safety
    # scenario) instead of only bash -n syntax checking it -- see issue
    # #403. Independent of full-setup-validate above in what it exercises
    # (that job runs deploy/full-setup/docker-compose.yml directly; this one
    # runs the setup.sh installer itself, which generates and manages its
    # own deploy/quickstart-derived install directory), but both jobs bind
    # the same host ports (127.0.0.1:443, :8080, ...) on this shared
    # self-hosted runner tier. Confirmed directly: running both jobs
    # concurrently on the same workflow_dispatch produced "port is already
    # allocated" here and a flaky "ui did not become healthy" in the other
    # job. Chained after ui-nats-dns-integration-simulation (the last job in
    # the full-setup-validate -> ssl-mitm-cache-simulation ->
    # ui-nats-dns-integration-simulation sequence) rather than directly after
    # full-setup-validate or in parallel with it, so this job is guaranteed
    # to never run concurrently with any of them. (A former
    # watchtower-update-simulation job used to sit in this chain between
    # ui-nats-dns-integration-simulation and this job; it was removed with
    # Watchtower itself -- #819 -- so this job now chains directly off
    # ui-nats-dns-integration-simulation instead.)
    name: setup.sh CLI simulation
    needs: ui-nats-dns-integration-simulation
    if: always()
    runs-on: [self-hosted, linux, lancache, lancache-light]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve build-tools image
        # Deliberately not BUILD_TOOLS_REQUIRE_PUBLISHED=true: this workflow
        # only ever runs via workflow_dispatch (event_name != pull_request),
        # so select-build-tools-image.sh's trusted-ref path already always
        # builds a fresh branch-local image from this checkout's Dockerfile
        # instead of trying the published tag first. That is what's actually
        # wanted here -- expect (added to tools/build-tools/Dockerfile in
        # this same change) only exists on this branch, not yet in any
        # published build-tools image.
        id: build-tools-image
        run: |
          set -euo pipefail
          image="$(bash scripts/select-build-tools-image.sh)"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Run setup.sh CLI simulation
        # expect and the Docker CLI needed to drive setup.sh's interactive
        # prompts and manage the resulting stack both live in the build-tools
        # image, per AG-VAL-016. The host's Docker socket is mounted so
        # containers setup.sh starts inside this container are real sibling
        # containers on the runner's own Docker daemon, not nested
        # docker-in-docker.
        #
        # Mounted at the SAME absolute path ($PWD) inside this container as
        # on the host, not at an arbitrary path like /work: docker compose,
        # run from inside this container, resolves its bind-mount sources
        # against the HOST daemon, which has no idea this container's
        # filesystem exists. A path that only looks valid from inside this
        # container (e.g. /work/...) resolves to nothing on the host, so the
        # host daemon silently auto-creates it as an empty directory and
        # then fails mounting that directory onto a file destination.
        # Confirmed directly. Using the identical path on both sides is what
        # makes any bind mount setup.sh itself declares (e.g.
        # ./scripts/dhcp-probe.sh) resolve correctly no matter which side
        # evaluates it.
        #
        # --network host (#819): setup.sh's update flow now runs a real
        # functional health probe (verify_stack_functional_health) against
        # the stack's own loopback-published addresses (IP_STANDARD/IP_SSL,
        # e.g. 127.0.0.2 in this simulation). Loopback addresses are
        # per-network-namespace -- without --network host, this container has
        # its OWN isolated 127.0.0.0/8, completely separate from the runner
        # host's, where the sibling `proxy` container actually publishes its
        # port. Confirmed directly on a runner: the identical curl from a
        # sibling container without --network host gets connection-refused
        # (000) permanently, forever, regardless of how long the health-gate
        # waits, while the exact same curl from the host (or a sibling
        # container WITH --network host) succeeds immediately. This is what
        # caused `setup.sh update`'s new post-update health gate to always
        # roll back inside this specific simulation harness -- not a flaky
        # timing issue, not a bug in the health-gate logic itself, and (per
        # the same reasoning) not something a real operator would hit, since
        # setup.sh always runs directly on the host in production, never
        # inside a container without host networking.
        # flock (#819 follow-up): scripts/setup-cli-simulation.sh installs a
        # real quickstart stack, whose compose file pins FIXED container
        # names (lancache-nats, lancache-ui, ...) for a real operator's
        # single-host install -- deliberately, see #669 item 6. Those names
        # are NOT project-name-prefixed the way volumes/networks are, so two
        # concurrent runs of this job that land on the SAME physical runner
        # host (this repo registers several runner instances per host, all
        # sharing one Docker daemon; concurrency: above only serializes
        # *this ref's own* runs, never across different PRs/branches) fight
        # over the exact same container names. Confirmed as the real cause
        # of a `nats has no running container` failure during a genuine
        # rollback-safety test: at that exact failure's timestamp, several
        # *other* branches' Full-Setup Deep Validate runs were independently
        # in flight too. Not the #820/#821 class (that fix only covers the
        # per-slot Docker *network* subnet full-setup-validate/deep-validate
        # reserve for their own throwaway stacks) -- this job never goes
        # through that reservation at all, since it installs the real
        # quickstart flow with real fixed names instead. A host-local flock
        # around the whole simulation is sufficient (not a distributed lock):
        # the collision can only happen between two runs sharing the same
        # Docker daemon, i.e. the same physical host, which is exactly what a
        # per-host lock file serializes.
        env:
          BUILD_TOOLS_IMAGE: ${{ steps.build-tools-image.outputs.image }}
        run: |
          set -euo pipefail
          exec {lock_fd}>/tmp/lancache-setup-cli-simulation.lock
          flock "$lock_fd"
          docker run --rm \
            --network host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:$PWD" \
            -w "$PWD" \
            "$BUILD_TOOLS_IMAGE" \
            bash scripts/setup-cli-simulation.sh

  dhcp-kea-lease-flow-simulation:
    # Real DHCP behavior test for our own Kea service (issue #448) --
    # distinct from services/ui/dhcp-probe.sh's existing #377 broadcast
    # conflict-discovery check, which only detects whether ANY DHCP server
    # answers, not whether OUR service hands out correct options. Builds a
    # throwaway Kea container from THIS checkout's services/dhcp on a
    # dedicated, isolated Docker bridge network it creates and destroys
    # itself (never the full-setup-validate compose project's network, and
    # never a host interface), then drives a real dhclient
    # Discover/Offer/Request/Ack against it and asserts the offered
    # address/server-identifier/router/DNS/NTP/lease-time/domain-name
    # options match what this run configured. Also configures a real static
    # host reservation directly through Kea's Control Agent API and asserts
    # it is honored by a subsequent real lease request for that MAC, and NOT
    # by a lease request for a different, unrelated MAC (issue #707). It also
    # starts a real PowerDNS container and verifies the granted lease
    # produces a matching A record via a TSIG-authenticated DDNS update from
    # kea-dhcp-ddns (issue #706). See scripts/dhcp-kea-lease-flow-simulation.sh's
    # own header comment and docs/dhcp-modes.md for exactly what is and is
    # not verified (Refs #557). Independent of the full-setup-validate
    # compose project (its own network/containers, not deploy/full-setup's), so it
    # does not need to chain after those jobs for IP-collision reasons the
    # way ssl-mitm-cache-simulation/ui-nats-dns-integration-simulation do --
    # chained after setup-cli-simulation anyway simply to keep this
    # workflow's jobs running one at a time on the shared self-hosted
    # runner tier rather than introducing new concurrency here.
    name: DHCP Kea lease-flow simulation
    needs: setup-cli-simulation
    if: always()
    runs-on: [self-hosted, linux, lancache, lancache-light]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve build-tools image
        # Deliberately not BUILD_TOOLS_REQUIRE_PUBLISHED=true, matching
        # setup-cli-simulation's own reasoning above: isc-dhcp-client (added
        # to tools/build-tools/Dockerfile in this same change) only exists
        # on this branch, not yet in any published build-tools image. This
        # workflow only ever runs via workflow_dispatch (event_name !=
        # pull_request), so select-build-tools-image.sh's trusted-ref path
        # already always builds a fresh branch-local image instead of
        # trying the published tag first.
        id: build-tools-image
        run: |
          set -euo pipefail
          image="$(bash scripts/select-build-tools-image.sh)"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Run DHCP Kea lease-flow simulation
        env:
          DHCP_LEASE_FLOW_CLIENT_IMAGE: ${{ steps.build-tools-image.outputs.image }}
        run: |
          set -euo pipefail
          bash scripts/dhcp-kea-lease-flow-simulation.sh

  dhcp-proxy-pxe-simulation:
    # Real DHCP behavior test for our own dnsmasq-proxy ProxyDHCP/PXE mode
    # (issue #705) -- the dnsmasq-proxy service is explicitly called out as
    # out of scope by dhcp-kea-lease-flow-simulation.sh's own header comment
    # above ("The dnsmasq-proxy DHCP mode ... entirely different code path,
    # out of scope for this script"), and no other check in this repo drives
    # it with a real PXE-tagged client either: services/ui/dhcp-probe.sh's
    # #377 check never sets DHCP option 60 (vendor class = "PXEClient"), so
    # it can never exercise dnsmasq's ProxyDHCP reply path at all. Builds a
    # throwaway dnsmasq-proxy container from THIS checkout's
    # services/dhcp-proxy on a dedicated, isolated Docker bridge network it
    # creates and destroys itself (never the full-setup-validate compose
    # project's network, and never a host interface), then drives a real,
    # synthetically-crafted PXE client (scapy, since no off-the-shelf DHCP
    # client can send a real PXE-tagged DHCPDISCOVER) against it for legacy
    # BIOS and both covered UEFI architecture codes, asserting each receives
    # a DHCPOFFER carrying the operator-configured external PXE boot server
    # address, the architecture-appropriate boot filename, and the LanCache
    # NG DNS servers -- plus a negative case confirming an ordinary,
    # non-PXE-tagged DISCOVER still receives no reply at all. See
    # scripts/dhcp-proxy-pxe-simulation.sh's own header comment and
    # docs/dhcp-modes.md for exactly what is and is not verified (PXE menu
    # behavior and a real TFTP/HTTP transfer against the external boot
    # server are both explicitly out of scope -- this project only ever
    # hands out a pointer to an operator's own existing infrastructure, per
    # the maintainer-confirmed #705 scope decision).
    #
    # Independent of the full-setup-validate compose project (its own
    # network/containers, not deploy/full-setup's), so it does not need to
    # chain after those jobs for IP-collision reasons -- chained after
    # dhcp-kea-lease-flow-simulation anyway simply to keep this workflow's
    # jobs running one at a time on the shared self-hosted runner tier
    # rather than introducing new concurrency here, matching that job's own
    # rationale for being chained rather than parallel.
    name: DHCP proxy PXE simulation
    needs: dhcp-kea-lease-flow-simulation
    if: always()
    runs-on: [self-hosted, linux, lancache, lancache-light]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve build-tools image
        # Deliberately not BUILD_TOOLS_REQUIRE_PUBLISHED=true, matching
        # dhcp-kea-lease-flow-simulation's own reasoning above:
        # python3-scapy/tcpdump (added to tools/build-tools/Dockerfile in
        # this same change) only exist on this branch, not yet in any
        # published build-tools image. This workflow only ever runs via
        # workflow_dispatch (event_name != pull_request), so
        # select-build-tools-image.sh's trusted-ref path already always
        # builds a fresh branch-local image instead of trying the published
        # tag first.
        id: build-tools-image
        run: |
          set -euo pipefail
          image="$(bash scripts/select-build-tools-image.sh)"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Run DHCP proxy PXE simulation
        env:
          DHCP_PXE_SIMULATION_CLIENT_IMAGE: ${{ steps.build-tools-image.outputs.image }}
        run: |
          set -euo pipefail
          bash scripts/dhcp-proxy-pxe-simulation.sh

  nats-auth-callout-simulation:
    # Real per-secondary NATS auth-callout integration test. Drives the actual
    # Admin UI register / rotate-token / remove routes plus a real nats-server
    # and the real nats-subscriber client (the one shipped inside the published
    # dns image, i.e. the exact code a registered secondary runs) to prove that
    # each secondary gets its own genuinely unique NATS credential, that
    # removing a secondary revokes exactly that secondary's access on its next
    # connection attempt, and that rotating a credential invalidates the old
    # one immediately while the new one works -- with no impact on any other
    # secondary. See scripts/nats-secondary-auth-callout-simulation.sh's own
    # header comment for the exact properties verified.
    #
    # Uses deploy/full-setup/docker-compose.yml. Chained at the end of this
    # workflow's serial job sequence to keep every job running one at a time on
    # the shared self-hosted runner tier rather than introducing new
    # concurrency here (matching dhcp-kea-lease-flow-simulation's own rationale
    # for being chained rather than parallel).
    #
    # Wrapped in run-in-validation-subnet.sh (issue #820) for the same reason
    # as ssl-mitm-cache-simulation's own header comment: this job never had
    # VALIDATION_SUBNET/GATEWAY/*_IP threaded to it, only
    # COMPOSE_PROJECT_NAME/VALIDATION_UI_PORT (now removed, superseded by the
    # wrapper's own export) -- so its own compose stack always fell back to
    # the hardcoded 172.30.99.0/27 default, confirmed for real: this exact
    # job died on "Pool overlaps" for lancache-ng-validation-69-auth-callout_
    # validation in the run that surfaced this gap.
    name: NATS auth-callout simulation
    needs: [compute-validation-network, dhcp-proxy-pxe-simulation]
    if: always()
    runs-on: [self-hosted, linux, lancache, lancache-light]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve build-tools image
        # Unlike dhcp-kea-lease-flow-simulation (which genuinely needs
        # isc-dhcp-client/dhclient, not yet present in any published
        # build-tools image), this job's own script
        # (scripts/nats-secondary-auth-callout-simulation.sh) only drives
        # curl/awk-style HTTP checks against the real Admin UI/nats-server/
        # nats-subscriber containers it starts -- confirmed directly by
        # reading that script. It has no unpublished-tool dependency, so
        # BUILD_TOOLS_REQUIRE_PUBLISHED=true is safe here and avoids an
        # unnecessary full branch-local tools/build-tools Docker build on
        # every workflow_dispatch run of this otherwise lightweight job.
        id: build-tools-image
        env:
          BUILD_TOOLS_REQUIRE_PUBLISHED: "true"
        run: |
          set -euo pipefail
          image="$(bash scripts/select-build-tools-image.sh)"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Run NATS auth-callout simulation
        # curl/awk client verification runs through the published build-tools
        # image (matching ssl-mitm-cache-simulation / ui-nats-dns-integration-
        # simulation); the real proxy/dns/nats/ui and nats-subscriber
        # containers come from the already-published images the script pulls
        # itself.
        env:
          BUILD_TOOLS_IMAGE: ${{ steps.build-tools-image.outputs.image }}
        run: |
          set -euo pipefail
          bash scripts/lib/run-in-validation-subnet.sh bash scripts/nats-secondary-auth-callout-simulation.sh

  dhcp-kea-ctrl-agent-mutation-simulation:
    # Real Kea Control Agent mutation round-trip (issue #634): the sibling
    # dhcp-kea-lease-flow-simulation job above proves our Kea service hands
    # out correct DHCP options, but never mutates Kea's config, so it never
    # exercises the Admin UI's kea_config_modify() code path (the function
    # whose config-get/config-test/config-set/config-write sequence had a
    # real, previously-undetected bug because every existing `cargo test` for
    # it mocks Kea's response instead of hitting a real Control Agent). This
    # job adds and removes a real static host reservation through the actual
    # Admin UI HTTP route (POST /dhcp/static/add and /dhcp/static/remove),
    # against a real Kea container built from this checkout's services/dhcp,
    # and asserts a SUBSEQUENT real DHCP lease request actually reflects each
    # change -- not just that the API call returned success or that the
    # config file was written. See
    # scripts/dhcp-kea-ctrl-agent-mutation-simulation.sh's own header comment
    # and docs/dhcp-modes.md for exactly what is and is not verified.
    # Independent of the full-setup-validate compose project's own running
    # containers (it starts docker-socket-proxy/proxy/nats/ui and a
    # standalone Kea container itself, tearing all of them down again), so
    # like dhcp-kea-lease-flow-simulation it does not need to chain after the
    # earlier jobs for IP-collision reasons -- chained after
    # nats-auth-callout-simulation (the current last job in this workflow's
    # serial chain) anyway simply to keep every job running one at a time on
    # the shared self-hosted runner tier rather than introducing new
    # concurrency here.
    # Wrapped in run-in-validation-subnet.sh (issue #820): this job's own
    # script used to hardcode 172.30.99.0/27 unconditionally, with no per-run
    # derivation and no retry at all -- worse than the birthday-paradox-odds
    # bug its siblings had, since EVERY invocation of this exact script, from
    # ANY concurrent run, requested the identical literal subnet (a
    # deterministic collision, not a rare one). Confirmed for real: this
    # exact job died on "Pool overlaps" for lancache-ng-validation-69_
    # validation in the run that surfaced this gap. The script itself
    # (scripts/dhcp-kea-ctrl-agent-mutation-simulation.sh) now reads
    # VALIDATION_SUBNET/GATEWAY/UI_IP with the same fallback-default pattern
    # its siblings use, so wrapping it here is sufficient -- no separate
    # per-job env threading is needed, the wrapper supplies the complete set.
    name: DHCP Kea Control Agent mutation simulation
    needs: [compute-validation-network, nats-auth-callout-simulation]
    if: always()
    runs-on: [self-hosted, linux, lancache, lancache-light]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve build-tools image
        # Deliberately not BUILD_TOOLS_REQUIRE_PUBLISHED=true, matching
        # dhcp-kea-lease-flow-simulation's own reasoning: confirmed directly
        # (both the published :latest and :edge build-tools images) that
        # isc-dhcp-client (dhclient) is not yet present in any published
        # build-tools image, only in this checkout's
        # tools/build-tools/Dockerfile. This workflow only ever runs via
        # workflow_dispatch (event_name != pull_request), so
        # select-build-tools-image.sh's trusted-ref path already always
        # builds a fresh branch-local image instead of trying the published
        # tag first.
        id: build-tools-image
        run: |
          set -euo pipefail
          image="$(bash scripts/select-build-tools-image.sh)"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Run DHCP Kea Control Agent mutation simulation
        env:
          DHCP_CTRL_AGENT_CLIENT_IMAGE: ${{ steps.build-tools-image.outputs.image }}
          LANCACHE_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          bash scripts/lib/run-in-validation-subnet.sh bash scripts/dhcp-kea-ctrl-agent-mutation-simulation.sh

  ui-reachability-crash-loop-simulation:
    # Real end-to-end proof for #763: deliberately crash-loops `proxy` (a
    # real `ui` depends_on entry) and confirms the Admin UI still starts,
    # becomes healthy, and answers a real HTTP request throughout -- proving
    # deploy/full-setup/docker-compose.yml's `ui` depends_on list has no
    # condition: service_healthy gate on it, rather than just reading the
    # compose file and assuming so. See
    # scripts/ui-reachability-crash-loop-simulation.sh's own header for
    # exactly what this does and does not prove. Chained after
    # dhcp-kea-ctrl-agent-mutation-simulation (the current last job in this
    # workflow's serial chain) for the same reason every other job here
    # chains onto the previous one: one job at a time on the shared
    # self-hosted runner tier.
    name: Admin UI reachability during dependency crash-loop
    needs: [compute-validation-network, dhcp-kea-ctrl-agent-mutation-simulation]
    if: always()
    runs-on: [self-hosted, linux, lancache, lancache-light]
    env:
      COMPOSE_PROJECT_NAME: ${{ needs.compute-validation-network.outputs.project_name }}
      VALIDATION_UI_PORT: ${{ needs.compute-validation-network.outputs.ui_port }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve build-tools image
        # This job's script only drives a curl check against the real ui
        # container it starts, matching ui-nats-dns-integration-simulation's
        # own reasoning above -- no unpublished-tool dependency.
        id: build-tools-image
        env:
          BUILD_TOOLS_REQUIRE_PUBLISHED: "true"
        run: |
          set -euo pipefail
          image="$(bash scripts/select-build-tools-image.sh)"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Run Admin UI reachability during crash-loop simulation
        env:
          BUILD_TOOLS_IMAGE: ${{ steps.build-tools-image.outputs.image }}
          LANCACHE_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          bash scripts/ui-reachability-crash-loop-simulation.sh

  setup-reset-kea-config-simulation:
    # Real end-to-end proof for #763's CLI-fallback item: `setup.sh
    # reset-to-last-known-good-config kea` must genuinely roll a real,
    # running Kea server back to an earlier config via its Control Agent API,
    # not just return success. See
    # scripts/setup-reset-kea-config-simulation.sh's own header for exactly
    # what this does and does not prove. Chained after
    # ui-reachability-crash-loop-simulation (the current last job in this
    # workflow's serial chain) for the same one-job-at-a-time reason every
    # other job here chains onto the previous one.
    name: setup.sh reset-to-last-known-good-config (Kea) simulation
    needs: [compute-validation-network, ui-reachability-crash-loop-simulation]
    if: always()
    runs-on: [self-hosted, linux, lancache, lancache-light]
    env:
      COMPOSE_PROJECT_NAME: ${{ needs.compute-validation-network.outputs.project_name }}
      VALIDATION_UI_PORT: ${{ needs.compute-validation-network.outputs.ui_port }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve build-tools image
        # This job's own script only drives curl checks against the real ui
        # container it starts (see dhcp-kea-ctrl-agent-mutation-simulation's
        # identical reasoning above) -- no unpublished-tool dependency.
        id: build-tools-image
        run: |
          set -euo pipefail
          image="$(bash scripts/select-build-tools-image.sh)"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Run setup.sh reset-to-last-known-good-config (Kea) simulation
        env:
          BUILD_TOOLS_IMAGE: ${{ steps.build-tools-image.outputs.image }}
          LANCACHE_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          bash scripts/setup-reset-kea-config-simulation.sh
