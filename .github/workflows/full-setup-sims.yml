      VALIDATION_SUBNET: ${{ needs.compute-validation-network.outputs.subnet }}
      VALIDATION_GATEWAY: ${{ needs.compute-validation-network.outputs.gateway }}
      VALIDATION_PROXY_IP: ${{ needs.compute-validation-network.outputs.proxy_ip }}
      VALIDATION_PROXY_SSL_IP: ${{ needs.compute-validation-network.outputs.proxy_ssl_ip }}
      VALIDATION_DNS_STANDARD_IP: ${{ needs.compute-validation-network.outputs.dns_standard_ip }}
      VALIDATION_DNS_SSL_IP: ${{ needs.compute-validation-network.outputs.dns_ssl_ip }}
      VALIDATION_WATCHDOG_IP: ${{ needs.compute-validation-network.outputs.watchdog_ip }}
      VALIDATION_NETDATA_IP: ${{ needs.compute-validation-network.outputs.netdata_ip }}
      VALIDATION_NATS_IP: ${{ needs.compute-validation-network.outputs.nats_ip }}
      VALIDATION_UI_IP: ${{ needs.compute-validation-network.outputs.ui_ip }}
      COMPOSE_PROJECT_NAME: ${{ needs.compute-validation-network.outputs.project_name }}
      VALIDATION_UI_PORT: ${{ needs.compute-validation-network.outputs.ui_port }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve build-tools image
        # No BUILD_TOOLS_REQUIRE_PUBLISHED: this job's curl check only needs
        # tools already in every published build-tools image, matching
        # ssl-mitm-cache-simulation's own step, but the same-PR
        # tools/build-tools override below still applies for the same reason
        # documented there.
        id: build-tools-image
        run: |
          set -euo pipefail
          if [[ "${{ inputs.pr_staging_available }}" == "true" && "${{ inputs.build_tools_touched }}" == "true" ]]; then
            image="ghcr.io/${{ github.repository }}/build-tools:${{ inputs.image_tag }}"
            echo "::notice::This PR touched tools/build-tools; using its confirmed staging image $image instead of build-tools:latest."
          else
            image="$(BUILD_TOOLS_REQUIRE_PUBLISHED=true bash scripts/select-build-tools-image.sh)"
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"
      - name: Run Admin UI reachability during crash-loop simulation
        env:
          BUILD_TOOLS_IMAGE: ${{ steps.build-tools-image.outputs.image }}
        run: |
          set -euo pipefail
          # Reserve a collision-free subnet (flock + retry, #820) and run the
          # sim inside it, instead of racing the single job-level
          # VALIDATION_SUBNET against every other concurrent run on this host.
          # This job used to invoke its script directly, consuming
          # compute-validation-network's raw output via the job-level env
          # block above with no reservation in between -- confirmed for real:
          # this exact job died on "Pool overlaps" for a concurrent run's
          # _validation network, the same failure class
          # ssl-mitm-cache-simulation/ui-nats-dns-integration-simulation
          # already guard against with this same wrapper.
          bash scripts/lib/run-in-validation-subnet.sh bash scripts/ui-reachability-crash-loop-simulation.sh

