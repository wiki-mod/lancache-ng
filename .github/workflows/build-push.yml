    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    # Job-level concurrency (#891 follow-up, mirroring dns_test's own group
    # above for the same reason): scarce lancache-heavy capacity, safe to
    # cancel mid-flight -- ci_scope_policy's push-branch check on this job's
    # result now uses require_success_or_intentional_cancellation(), and
    # rust_coverage's own `success`/`skipped` gate on ui_test already treats
    # a non-matching result as a clean skip.
    concurrency:
      group: >-
        ${{
          (github.event_name == 'workflow_dispatch' || github.run_attempt != '1') &&
          format('{0}-ui-test-{1}-{2}', github.workflow, github.ref, github.run_id) ||
          format('{0}-ui-test-{1}', github.workflow, github.ref)
        }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
