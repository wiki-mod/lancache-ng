# lancache-ng (https://github.com/wiki-mod/lancache-ng)
#
# Main CI/CD pipeline: detects changed paths, lints and tests the DNS/UI Rust
# crates and shell scripts, validates the docker-compose files, scans
# container images, then builds, pushes, promotes, and releases the stack
# images on the relevant triggers.

name: Build & Push

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Also promote this channel from the dispatched ref, in addition to the automatic branch/tag rule below (e.g. spot-check a feature branch as "dev" without merging it first).
        type: choice
        options: [none, dev, nightly]
        default: none
  schedule:
    # Daily nightly-channel refresh (issues #1035, #1056). The `promote` job
    # only moves the `nightly` stack channel on a push to master, so between
    # master pushes the channel's images can silently go stale (exactly #1035's
    # failure mode for the old `edge` name). A `schedule` event runs from the
    # default branch (master), and because `detect-changes` only gates
    # pull_request events -- every non-PR event builds all services
    # unconditionally -- this rebuilds the full stack and re-runs `promote`,
    # whose `refs/heads/master -> nightly` case then re-points the channel. So
    # `nightly` can never drift more than ~24h behind master even with no push.
    #
    # 01:00 UTC == 02:00 CET (the intended local refresh time). GitHub Actions
    # cron has no timezone concept and always fires in UTC, so during CEST
    # (European summer DST, UTC+2) this lands at 03:00 local instead. That
    # one-hour seasonal drift is deliberately accepted rather than worked around
    # -- there is no DST-aware cron here to match, and an off-by-one-hour nightly
    # rebuild has no correctness impact.
    - cron: "0 1 * * *"
  push:
    branches: [master, current_dev, "v[0-9]*"]
    tags: ["v*"]
  pull_request:
    branches: [master, current_dev, "v[0-9]*"]
    # Default GitHub activity set is opened/synchronize/reopened only. AG-GH-008's
    # pr-tracking-metadata-check reads labels/milestone/draft state straight out of
    # the github.event.pull_request webhook snapshot for this run (see that job's
    # own comment) -- with only the default types, a label added by labeler.yml or
    # a human, a milestone set later, or a draft marked ready-for-review would never
    # re-trigger this workflow, leaving a stale pass/fail on the Checks tab until
    # someone pushes another commit. Adding these four extra types re-evaluates the
    # metadata check (and everything else in this monolithic workflow) whenever PR
    # metadata actually changes. `edited` is deliberately excluded -- it fires on
    # title/body/base-ref edits, which are unrelated to labels/milestone and would
    # add much higher-frequency reruns of the full heavy pipeline for no metadata
    # benefit. Yes, this reruns build/test/scan jobs too on a bare label/milestone
    # change (they have no metadata-only fast path -- see AG-GH-008 Enforcement
    # Notes for why that tradeoff was accepted rather than building one): labels
    # and milestones are set rarely per PR (usually once, by a human or the
    # labeler), unlike commits, so the added self-hosted-runner cost is bounded.
    types: [opened, synchronize, reopened, labeled, unlabeled, milestoned, demilestoned, ready_for_review]

permissions:
  contents: read
  # Workflow-level floor for pull-requests: a job's own `permissions:` block
  # can only NARROW this, never widen it (#903 follow-up -- pr-template-check
  # and pr-template-check-hosted added `pull-requests: read` at the job level
  # to fetch the PR body live via `gh pr view`, but without it granted here
  # too, that job-level grant was silently capped back down to nothing,
  # exactly the same class of permissions-widening mistake already documented
  # for id-token/attestations/artifact-metadata in build-tools.yml).
  pull-requests: read

concurrency:
  # Push/tag events use a run_id-suffixed key instead of the old
  # `{workflow}-publish` one (same pattern as full-setup-deep-validate.yml's
  # own non-PR branch): this deliberately makes the group never collide
  # with itself, so it no longer serializes whole runs one at a time (that
  # old key also never included the ref, so master and v0.2.0 pushes
  # contended for the same single pending slot even though they are
  # unrelated -- also fixed by moving to a run-scoped key). That whole-run
  # serialization was the ONLY thing standing between a rapid burst of
  # pushes and `promote` being torn down mid-write: `promote` used to have
  # its own job-level concurrency group (`Build & Push-promote`, added by
  # #793) shared with backfill-stack-latest.yml, but that group only
  # serialized `promote` against OTHER users of that exact same group name
  # -- it did NOT protect `promote` from being killed mid-execution if THIS
  # (top-level) group's own cancel-in-progress were true and cancelled the
  # whole run out from under it. #897 replaced that job-level group with
  # scripts/lib/promote-lock.sh's git-ref lock (see the `promote` job's own
  # comments), for an unrelated reason (the group could also silently drop
  # an older still-queued `promote` run entirely) -- the reasoning below
  # about why THIS top-level group's cancel-in-progress must stay false is
  # independent of that change and still applies exactly as written.
  # Confirmed against GitHub's own docs: workflow-level
  # `cancel-in-progress: true` cancels the entire previous run, including
  # every job already in progress, not just still-queued ones -- a job's
  # own separate concurrency group offers no immunity from that. Rather
  # than take that risk, per-job cancellation for the actual
  # runner-hogging jobs (`build`, `container-scan`) is scoped directly on
  # those jobs below, keyed by service+ref, so a superseded commit's heavy
  # self-hosted-runner work gets reclaimed promptly while
  # `merge-manifests`/`promote`/`release` simply never start for it (a
  # clean skip via their existing `needs.<job>.result == 'success'` gates)
  # instead of being torn down mid-write.
  #
  # `cancel-in-progress` stays false for BOTH branches of the group key
  # below, on purpose: for push/tag events it no longer matters (the key
  # is run-id-scoped and never collides, so no cancellation can ever fire
  # here regardless of this value); for pull_request events it matters a
  # lot and must stay false. Live-tested flipping it to true on this exact
  # PR (#888) and it backfired immediately: opening a PR with labels and a
  # milestone already set (this project's own AG-GH-008 convention) fires
  # `opened` plus a `labeled`/`milestoned` event for each field within the
  # same second, each spawning a competing run for this same per-PR-ref
  # group -- with cancel-in-progress:true, the first run's `detect-changes`
  # job (already dispatched and running) was killed mid-execution by the
  # very next of those events, producing a spurious "detect changed paths
  # ... got 'cancelled'" failure on a PR that had no actual problem.
  # `promote`/`release` never run on `pull_request` events at all (gated on
  # `github.event_name != 'pull_request'` further down) so there was never
  # a registry-correctness reason to flip this branch -- only a scheduling
  # one, and that one is not worth the reintroduced noise. `build` and
  # `container-scan` still get real per-commit cancellation on PR branches
  # via their own job-level groups below (keyed by service+ref,
  # independent of this setting), so rapid-fire pushes to a PR branch still
  # get the intended benefit without this failure mode. See #888 for the
  # full investigation and #889-adjacent discussion for why this stays a
  # code-comment rather than a CHANGELOG essay.
  group: ${{ github.event_name == 'pull_request' && format('{0}-{1}', github.workflow, github.ref) || format('{0}-publish-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: false

env:
  CARGO_BUILD_JOBS: ${{ vars.CARGO_BUILD_JOBS }}
  DOCKER_METADATA_SHORT_SHA_LENGTH: "7"
  RELEASE_PLATFORMS: linux/amd64,linux/arm64
  RUST_ACCELERATION_NETWORK: bridge

defaults:
  run:
    shell: bash

jobs:
  # PR-only change classification: skips per-crate/per-service heavy work only
  # when a PR clearly cannot affect it. Service-image decisions are based on
  # each Dockerfile's COPY graph, while docs/governance/setup/deploy/release
  # classes stay visible for policy checks. Build-affecting workflow or
  # composite-action changes are treated as touching runtime services, since the
  # CI logic itself changed. Dedicated release helper workflows remain release
  # contract changes, and build-tools rebuilds stay tied to build-tools inputs.
  # Master/tag pushes are never scoped: they always run the full pipeline.
  detect-changes:
    name: detect changed paths
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, linux, lancache, lancache-light]
    outputs:
      dns_rust: ${{ steps.filter.outputs.dns_rust }}
      dns_image: ${{ steps.filter.outputs.dns_image }}
      ui: ${{ steps.filter.outputs.ui }}
      watchdog: ${{ steps.filter.outputs.watchdog }}
      dhcp: ${{ steps.filter.outputs.dhcp }}
      dhcp_proxy: ${{ steps.filter.outputs.dhcp_proxy }}
      proxy: ${{ steps.filter.outputs.proxy }}
      build_tools: ${{ steps.filter.outputs.build_tools }}
      workflow: ${{ steps.filter.outputs.workflow }}
      docs: ${{ steps.filter.outputs.docs }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
      governance: ${{ steps.filter.outputs.governance }}
      setup_runtime: ${{ steps.filter.outputs.setup_runtime }}
      deploy: ${{ steps.filter.outputs.deploy }}
      release_contract: ${{ steps.filter.outputs.release_contract }}
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Determine changed top-level paths
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          : "${BASE_SHA:?pull request base SHA is required}"
          : "${GITHUB_SHA:?GitHub checkout SHA is required}"

          # The per-path classification -- and the merge-base #536 fix that
          # keeps an unrelated already-merged PR from being misattributed to
          # this branch -- now lives in scripts/classify-image-impact.sh so the
          # promote job's version-bump logic (#819) reuses the exact same rules
          # instead of a drifting inline copy. The script writes the
          # "Changed files:" listing to stderr and the key=value booleans (plus
          # the additive IMAGE_IMPACT verdict, unused by this job) to stdout.
          # checkout above runs with fetch-depth: 0, which merge-base needs.
          bash scripts/classify-image-impact.sh "$BASE_SHA" "$GITHUB_SHA" >> "$GITHUB_OUTPUT"

  file-headers:
    # Cheap repository hygiene gate. It runs before expensive Rust/image work so
    # generated files and hand-written scripts keep the expected project header.
    name: file purpose headers
    runs-on: [self-hosted, linux, lancache, lancache-light]
    # Job-level concurrency (#891, extending #888/#892's proven build/
    # container-scan pattern): a superseded commit's file-headers run gets
    # reclaimed instead of running to completion. Safe to cancel mid-flight:
    # unlike detect-changes/dns_test/ui_test/dns_cargo_audit/ui_cargo_audit
    # (excluded from this pattern -- see this workflow's ci_scope_policy job),
    # nothing asserts file-headers' result with a hard-failing script. The
    # only consumers are build/build-arm64's own `if:` gates
    # (`needs['file-headers'].result == 'success'`, PR-only), which cleanly
    # skip rather than error when this job shows cancelled.
    concurrency:
      group: >-
        ${{
          (github.event_name == 'workflow_dispatch' || github.run_attempt != '1') &&
          format('{0}-file-headers-{1}-{2}', github.workflow, github.ref, github.run_id) ||
          format('{0}-file-headers-{1}', github.workflow, github.ref)
        }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check repository header on all tracked files
        run: bash scripts/check-file-headers.sh

  pr-template-check:
    name: PR template validation
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, linux, lancache, lancache-light]
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate PR template completeness
        env:
          # Fetched live via `gh pr view` instead of trusting
          # github.event.pull_request.body: that field is a snapshot taken
          # when THIS event fired, and a rerun/retrigger of an older event
          # (or, per a real 2026-07-16 incident, an event whose payload
          # lagged the PR's actual current body for other reasons) can carry
          # a stale value -- causing this check to report sections "missing"
          # that a live look at the PR shows are genuinely present and
          # filled. A live fetch is always current regardless of why/when
          # this job runs.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          # Dependabot's own PR author identity -- see
          # validate-pr-template.sh's dependabot[bot] exemption.
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          # Temporary diagnostics (2026-07-16): this fetch has failed to
          # return the real PR body twice despite #903/#905's fixes, with no
          # visible gh CLI error -- capture stderr and byte count to find out
          # why, instead of guessing further. Remove once root-caused.
          gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json body -q .body > /tmp/pr-body-live.txt 2> /tmp/pr-body-live.stderr || {
            echo "::error::gh pr view failed, exit code $?"
            cat /tmp/pr-body-live.stderr
            exit 1
          }
          echo "::notice::gh pr view succeeded. Body byte count: $(wc -c < /tmp/pr-body-live.txt). stderr: $(cat /tmp/pr-body-live.stderr)"
          bash scripts/validate-pr-template.sh /tmp/pr-body-live.txt

  pr-template-check-hosted:
    # Same zero-LAN-dependency property as file-headers-hosted: this check
    # only reads github.event.pull_request context and runs a plain bash
    # script, so it keeps the self-hosted job's own `if:` guard directly
    # (not a needs:-based dependency on another job's result) -- see
    # docs/ci-github-hosted-fallback-decision.md for why that distinction
    # matters for GitHub-hosted fallback jobs.
    name: PR template validation (GitHub-hosted fallback)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: GitHub-hosted fallback notice
        run: |
          echo "::notice::Running PR template validation on GitHub-hosted runner as fallback for non-LAN-dependent linting."
      - name: Validate PR template completeness
        env:
          # See the primary pr-template-check job's identical step for why
          # this fetches the body live via `gh pr view` instead of trusting
          # github.event.pull_request.body.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          # Dependabot's own PR author identity -- see
          # validate-pr-template.sh's dependabot[bot] exemption.
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json body -q .body > /tmp/pr-body-live.txt
          bash scripts/validate-pr-template.sh /tmp/pr-body-live.txt

  pr-tracking-metadata-check:
    # Enforces AGENTS.md AG-GH-008: a PR must carry labels, a milestone,
    # and (when PROJECT_AUTOMATION_PAT is configured) project-board
    # placement. Same zero-LAN-dependency shape as pr-template-check --
    # reads github.event.pull_request context plus one outbound call to
    # api.github.com, no self-hosted-specific resource needed -- but kept
    # on the self-hosted pool as the primary job with a hosted fallback
    # below, matching every other zero-LAN check in this file.
    #
    # check-pr-tracking-metadata.sh runs python3 (JSON parsing) and curl (the
    # project-board GraphQL call) -- per AG-VAL-016, host-local tools on the
    # runner must be treated as absent/stale, so this executes inside the
    # same pinned build-tools image validate-compose already resolved for
    # this run, the same pattern shellcheck/check-governance-guards.sh use,
    # rather than relying on whatever python3/curl happen to be on
    # lancache-light.
    name: PR tracking metadata (labels/milestone/project)
    if: github.event_name == 'pull_request'
    needs: validate-compose
    runs-on: [self-hosted, linux, lancache, lancache-light]
    permissions:
      contents: read
      pull-requests: read
    env:
      BUILD_TOOLS_IMAGE: ${{ needs['validate-compose'].outputs.build_tools_image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Fetch current labels/milestone live
        # Same class of bug found and fixed in pr-template-check (2026-07-16):
        # github.event.pull_request.labels/.milestone is a snapshot taken when
        # THIS event fired, and can go stale (confirmed live: a PR that
        # genuinely had labels and a milestone set was reported as having
        # neither). Fetched live via `gh pr view` on the runner instead, then
        # threaded into the container the same way the event-derived values
        # used to be.
        id: live-metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json labels -q '.labels' > /tmp/pr-labels-live.json
          milestone_title="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json milestone -q '.milestone.title // ""')"
          {
            echo "labels_file=/tmp/pr-labels-live.json"
            echo "milestone_title=$milestone_title"
          } >> "$GITHUB_OUTPUT"
      - name: Validate labels, milestone, and project-board placement
        env:
          PR_LABELS_JSON: ${{ steps.live-metadata.outputs.labels_file }}
          PR_MILESTONE_TITLE: ${{ steps.live-metadata.outputs.milestone_title }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION_PAT }}
          # GitHub does not pass repository secrets (other than the
          # read-only GITHUB_TOKEN) to pull_request-triggered runs from a
          # forked repository, so GH_TOKEN above is empty for every external
          # contributor's PR even once PROJECT_AUTOMATION_PAT is configured.
          # Telling the script whether this run is from a fork lets it warn
          # with the right explanation instead of implying the secret is
          # simply unconfigured -- see check-pr-tracking-metadata.sh.
          PR_IS_FORK: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
          # Dependabot's own PR author identity -- see
          # check-pr-tracking-metadata.sh's dependabot[bot] exemption.
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          # PR_LABELS_JSON now names a live-fetched file (mounted below),
          # not an inline JSON string -- read its content before handing it
          # to the container as an env var, same shape the script always
          # expected.
          labels_json="$(cat "$PR_LABELS_JSON")"
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            -e PR_LABELS_JSON="$labels_json" \
            -e PR_MILESTONE_TITLE \
            -e PR_DRAFT \
            -e PR_NUMBER \
            -e REPO \
            -e GH_TOKEN \
            -e PR_IS_FORK \
            -e PR_AUTHOR \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-pr-tracking-metadata.sh

  pr-tracking-metadata-check-hosted:
    name: PR tracking metadata (labels/milestone/project) (GitHub-hosted fallback)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select build-tools image
        # This fallback job must resolve its own image rather than depending
        # on validate-compose's output (like the self-hosted job above does)
        # -- it exists specifically for when self-hosted runners (and
        # anything that depends on them, including validate-compose) are
        # unavailable, so a needs: dependency on that job would defeat the
        # fallback's purpose. Matches shellcheck-hosted's own resolution step.
        env:
          GITHUB_EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail
          printf 'BUILD_TOOLS_IMAGE=%s\n' "$(BUILD_TOOLS_REQUIRE_PUBLISHED=true bash scripts/select-build-tools-image.sh)" >> "$GITHUB_ENV"
      - name: GitHub-hosted fallback notice
        run: |
          echo "::notice::Running PR tracking metadata check on GitHub-hosted runner as fallback for non-LAN-dependent linting."
      - name: Fetch current labels/milestone live
        # See the primary pr-tracking-metadata-check job's identical step for
        # why this fetches live via `gh pr view` instead of trusting
        # github.event.pull_request.labels/.milestone.
        id: live-metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json labels -q '.labels' > /tmp/pr-labels-live.json
          milestone_title="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json milestone -q '.milestone.title // ""')"
          {
            echo "labels_file=/tmp/pr-labels-live.json"
            echo "milestone_title=$milestone_title"
          } >> "$GITHUB_OUTPUT"
      - name: Validate labels, milestone, and project-board placement
        env:
          PR_LABELS_JSON: ${{ steps.live-metadata.outputs.labels_file }}
          PR_MILESTONE_TITLE: ${{ steps.live-metadata.outputs.milestone_title }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.PROJECT_AUTOMATION_PAT }}
          # GitHub does not pass repository secrets (other than the
          # read-only GITHUB_TOKEN) to pull_request-triggered runs from a
          # forked repository, so GH_TOKEN above is empty for every external
          # contributor's PR even once PROJECT_AUTOMATION_PAT is configured.
          # Telling the script whether this run is from a fork lets it warn
          # with the right explanation instead of implying the secret is
          # simply unconfigured -- see check-pr-tracking-metadata.sh.
          PR_IS_FORK: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          set -euo pipefail
          labels_json="$(cat "$PR_LABELS_JSON")"
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            -e PR_LABELS_JSON="$labels_json" \
            -e PR_MILESTONE_TITLE \
            -e PR_DRAFT \
            -e PR_NUMBER \
            -e REPO \
            -e GH_TOKEN \
            -e PR_IS_FORK \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-pr-tracking-metadata.sh

  pr-title-convention-check:
    # Enforces AGENTS.md AG-GH-018: a PR title must follow this repo's
    # Conventional-Commit taxonomy (audited from real history in #850) --
    # this repo merges (not squashes) pull requests, so the PR title, not
    # any individual commit message, is the unit any future release-please
    # automation (#819) would read to compute the next vX.Y.Z bump. Same
    # zero-LAN-dependency shape as pr-template-check/
    # pr-tracking-metadata-check -- reads github.event.pull_request context
    # plus one live `gh pr view` call, no self-hosted-specific resource
    # needed -- but kept on the self-hosted pool as the primary job with a
    # hosted fallback below, matching every other zero-LAN check in this
    # file.
    #
    # check-pr-title-convention.sh only needs bash itself, but still runs
    # inside the pinned build-tools image (per AG-VAL-016), the same
    # pattern pr-tracking-metadata-check uses for python3/curl: project
    # verification should not depend on whichever bash happens to be
    # preinstalled on a given runner host.
    name: PR title Conventional-Commit lint
    if: github.event_name == 'pull_request'
    needs: validate-compose
    runs-on: [self-hosted, linux, lancache, lancache-light]
    permissions:
      contents: read
      pull-requests: read
    env:
      BUILD_TOOLS_IMAGE: ${{ needs['validate-compose'].outputs.build_tools_image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Fetch current PR title live
        # Same class of bug found and fixed in pr-template-check and
        # pr-tracking-metadata-check (2026-07-16): github.event.pull_request
        # .title is a snapshot taken when THIS event fired, and an edited
        # title (without a new commit, which does not retrigger this
        # workflow's declared event types) can leave that snapshot stale.
        # A live `gh pr view` fetch is always current regardless of why/when
        # this job runs.
        id: live-title
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json title -q .title > /tmp/pr-title-live.txt
      - name: Validate PR title convention
        env:
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          # Dependabot's own PR author identity -- see
          # check-pr-title-convention.sh's dependabot[bot] exemption.
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          # Grace-period switch (see check-pr-title-convention.sh's header
          # comment): unset (the default) currently means "warn", per the
          # maintainer's 2026-07-23 decision on #850 -- a transitional grace
          # period, not a permanent downgrade; a warn result is still a real
          # AG-GH-018 violation that must be fixed before merge, it just
          # doesn't hard-block CI yet. Set this optional repository variable
          # to "block" once the maintainer is ready for full enforcement,
          # with no code change needed.
          PR_TITLE_LINT_MODE: ${{ vars.PR_TITLE_LINT_MODE }}
        run: |
          set -euo pipefail
          pr_title="$(cat /tmp/pr-title-live.txt)"
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            -e PR_TITLE="$pr_title" \
            -e PR_DRAFT \
            -e PR_AUTHOR \
            -e PR_TITLE_LINT_MODE \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-pr-title-convention.sh

  pr-title-convention-check-hosted:
    name: PR title Conventional-Commit lint (GitHub-hosted fallback)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select build-tools image
        # This fallback job must resolve its own image rather than depending
        # on validate-compose's output (like the self-hosted job above does)
        # -- it exists specifically for when self-hosted runners (and
        # anything that depends on them, including validate-compose) are
        # unavailable, so a needs: dependency on that job would defeat the
        # fallback's purpose. Matches pr-tracking-metadata-check-hosted's own
        # resolution step.
        env:
          GITHUB_EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail
          printf 'BUILD_TOOLS_IMAGE=%s\n' "$(BUILD_TOOLS_REQUIRE_PUBLISHED=true bash scripts/select-build-tools-image.sh)" >> "$GITHUB_ENV"
      - name: GitHub-hosted fallback notice
        run: |
          echo "::notice::Running PR title convention check on GitHub-hosted runner as fallback for non-LAN-dependent linting."
      - name: Fetch current PR title live
        # See the primary pr-title-convention-check job's identical step for
        # why this fetches live via `gh pr view` instead of trusting
        # github.event.pull_request.title.
        id: live-title
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json title -q .title > /tmp/pr-title-live.txt
      - name: Validate PR title convention
        env:
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_TITLE_LINT_MODE: ${{ vars.PR_TITLE_LINT_MODE }}
        run: |
          set -euo pipefail
          pr_title="$(cat /tmp/pr-title-live.txt)"
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            -e PR_TITLE="$pr_title" \
            -e PR_DRAFT \
            -e PR_AUTHOR \
            -e PR_TITLE_LINT_MODE \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-pr-title-convention.sh

  file-headers-hosted:
    name: file purpose headers (GitHub-hosted fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: GitHub-hosted fallback notice
        run: |
          echo "::notice::Running file-headers check on GitHub-hosted runner as fallback for non-LAN-dependent linting."
      - name: Check repository header on all tracked files
        run: bash scripts/check-file-headers.sh

  line-endings:
    # Cheap repository hygiene gate (issue #601). .gitattributes already
    # normalizes line endings for files git touches going forward, but does
    # not catch files where that normalization was bypassed.
    #
    # Runs inside the same build-tools image selected by validate-compose,
    # same as shellcheck -- per AGENTS.md's Build-tools Verification
    # Contract, verification must run in that container, not against
    # whatever bash/grep happen to be installed on the runner host.
    name: line endings
    needs: validate-compose
    runs-on: [self-hosted, linux, lancache, lancache-light]
    # Job-level concurrency (#891): cancel-in-progress is pull_request-only --
    # see `build`'s group comment for the full #979 rationale. build/
    # build-arm64 require `needs['line-endings'].result == 'success'`
    # unconditionally (on every event), so on push this is a hard gate on the
    # dev-channel publish path: a cancelled line-endings run makes build skip
    # and publishes no dev image, starving the channel in a merge cascade. It
    # must survive to completion on push. On a PR that same cancelled result
    # cleanly skips build/build-arm64 via their `if:` gates, so cancelling a
    # superseded run there just reclaims a lancache-light slot.
    concurrency:
      group: >-
        ${{
          (github.event_name == 'workflow_dispatch' || github.run_attempt != '1') &&
          format('{0}-line-endings-{1}-{2}', github.workflow, github.ref, github.run_id) ||
          format('{0}-line-endings-{1}', github.workflow, github.ref)
        }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    env:
      BUILD_TOOLS_IMAGE: ${{ needs['validate-compose'].outputs.build_tools_image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check tracked files use Unix (LF) line endings
        run: |
          set -euo pipefail
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash -lc 'set -euo pipefail; bash scripts/check-line-endings.sh'

  line-endings-hosted:
    name: line endings (GitHub-hosted fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: GitHub-hosted fallback notice
        run: |
          echo "::notice::Running line-endings check on GitHub-hosted runner as fallback for non-LAN-dependent linting."
      - name: Check tracked files use Unix (LF) line endings
        run: bash scripts/check-line-endings.sh

  # GitHub-hosted fallback is deliberately limited to cheap lint/policy jobs
  # with no LAN dependency of their own: file-headers-hosted,
  # line-endings-hosted, shellcheck-hosted, pr-template-check-hosted, and
  # watchdog_test-hosted. Rust builds, image scans, and publish paths stay on
  # self-hosted runners because they still depend on the shared build-tools
  # image, sccache/distcc acceleration, or registry credentials that do not
  # have a safe hosted equivalent yet -- see
  # docs/ci-github-hosted-fallback-decision.md for the full reasoning and
  # recommendation per job class.
  #
  # Explicit decision on ci_scope_policy's own hosted fallback (issue #509's
  # second acceptance criterion): NOT feasible as a real fallback today, and
  # deliberately not attempted here. ci_scope_policy's whole job is to check
  # the *results* of dns_rust_quality/ui_rust_quality/dns_test/ui_test/
  # watchdog_test/dns_cargo_audit/ui_cargo_audit -- all self-hosted-only Rust
  # jobs with no hosted equivalent of their own yet. A "ci_scope_policy-hosted"
  # job would have to depend on those same self-hosted jobs, so if self-hosted
  # runners are genuinely unavailable (the scenario this fallback exists for),
  # it would sit queued waiting on its own needs: forever, same as the jobs
  # it's meant to be a fallback for. There is no real fallback for this check
  # until the Rust build/test jobs themselves get a hosted path -- tracked
  # separately, not solved by this workflow file alone.
  shellcheck:
    # ShellCheck and ActionLint run inside the same build-tools image selected
    # by validate-compose. That keeps linting independent from whatever happens
    # to be installed on the runner host.
    needs: validate-compose
    runs-on: [self-hosted, linux, lancache, lancache-light]
    # Job-level concurrency (#891): cancel-in-progress is pull_request-only --
    # see `build`'s group comment for the full #979 rationale. build/
    # build-arm64 require `needs.shellcheck.result == 'success'`
    # unconditionally (on every event), so on push this is a hard gate on the
    # dev-channel publish path: a cancelled shellcheck makes build skip and
    # publishes no dev image, starving the channel in a merge cascade. It must
    # survive to completion on push. On a PR that same cancelled result cleanly
    # skips build/build-arm64 via their `if:` gates, so cancelling a superseded
    # run there just reclaims a lancache-light slot.
    concurrency:
      group: >-
        ${{
          (github.event_name == 'workflow_dispatch' || github.run_attempt != '1') &&
          format('{0}-shellcheck-{1}-{2}', github.workflow, github.ref, github.run_id) ||
          format('{0}-shellcheck-{1}', github.workflow, github.ref)
        }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    # pull-requests: read is required for the "Run governance guardrails" step
    # below to fetch the PR title/body live via `gh pr view` (issue #805).
    # contents: read is restated here too, matching the pr-template-check
    # convention (#903) -- job-level permissions replace rather than extend
    # the workflow-level defaults, and this job still needs contents: read
    # for actions/checkout.
    permissions:
      contents: read
      pull-requests: read
    env:
      BUILD_TOOLS_IMAGE: ${{ needs['validate-compose'].outputs.build_tools_image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run ShellCheck and ActionLint
        run: |
          set -euo pipefail
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash -lc 'set -euo pipefail; find . \( -name "*.sh" -o -name "*.bats" \) -not -path "./.git/*" -not -path "*/target/*" -print0 | xargs -0 --no-run-if-empty shellcheck --severity=warning; actionlint .github/workflows/*.yml'

      - name: Run governance guardrails
        if: github.event_name == 'pull_request'
        env:
          GOVERNANCE_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GOVERNANCE_BASE_REF: ${{ github.event.pull_request.base.ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          changed_files="$(mktemp "$PWD/.governance-changed-files.XXXXXX")"
          trap 'rm -f "$changed_files"' EXIT
          git fetch --no-tags --depth=1 origin \
            "+refs/heads/${GOVERNANCE_BASE_REF}:refs/remotes/origin/${GOVERNANCE_BASE_REF}"
          # GOVERNANCE_BASE_SHA is github.event.pull_request.base.sha -- a
          # webhook-payload snapshot frozen when the triggering event fired,
          # NOT necessarily the base branch's current tip. On a long-lived PR
          # whose base branch has advanced past that snapshot (a busy v0.2.0
          # merge cascade), the --depth=1 branch-tip fetch above does not
          # include the snapshot commit, so the git cat-file -e below would
          # hard-crash (fatal: Not a valid object name <sha>^{commit}, exit
          # 128) instead of scanning the PR's own diff. Fetch the exact commit
          # by SHA on demand: GitHub serves any commit reachable from a ref by
          # exact SHA even once it is no longer a branch tip -- the same
          # direct-SHA-fetch idiom build-tools.yml already uses to resolve its
          # github.event.before push base. The two-dot `git diff base.sha
          # GITHUB_SHA` below stays correct and shallow-safe: base.sha is this
          # merge commit's base parent, so the diff is exactly the PR's own
          # changes and needs only the two commit objects, never the connected
          # history a merge-base/three-dot diff would require.
          git fetch --no-tags --depth=1 origin "$GOVERNANCE_BASE_SHA"
          git cat-file -e "${GOVERNANCE_BASE_SHA}^{commit}"
          git cat-file -e "${GITHUB_SHA}^{commit}"
          git diff --name-only --diff-filter=ACMRTUXB "$GOVERNANCE_BASE_SHA" "$GITHUB_SHA" > "$changed_files"

          # github.event.pull_request.title/.body are webhook-payload
          # snapshots taken when the triggering event fired, not the PR's
          # current title/body (issue #805): editing either after a failed
          # check and re-running with a plain `gh run rerun` replayed the
          # stale snapshot and failed identically, even once the content was
          # actually fixed. Fetched live instead, via the same `gh pr view`
          # pattern #903/#905 already established (and proved working in
          # this repo's own CI) for pr-template-check's PR-body fetch.
          governance_pr_title="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json title -q .title)"
          governance_pr_body="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json body -q .body)"

          # Passed to check-governance-guards.sh only as `-e KEY=VALUE`
          # docker arguments below -- never interpolated into a run: string
          # -- so PR title/body content can never be executed as shell code.
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            -e GITHUB_REPOSITORY \
            -e GOVERNANCE_PR_TITLE="$governance_pr_title" \
            -e GOVERNANCE_PR_BODY="$governance_pr_body" \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-governance-guards.sh --changed-files-file "/work/$(basename "$changed_files")"

      # Warn-only guard (#893): flags a PR that edits CHANGELOG.md directly,
      # since #899 that file is normally written by an automated bot commit
      # (.github/workflows/update-changelog.yaml on release publish), never
      # through a PR -- see CONTRIBUTING.md's "Releasing Changes to
      # CHANGELOG.md". This step is deliberately independent of the
      # governance-guardrails step above rather than extending it: that
      # step's own $changed_files tempfile is already deleted by its EXIT
      # trap before this step starts (each `run:` block is its own shell
      # process), so a self-contained fetch here is simpler than threading
      # state between steps. This can NEVER fail the job: the script itself
      # always exits 0 (see its header), and `|| true` below is a deliberate,
      # documented fallback (not a hidden failure per AG-VAL-004) covering
      # the unlikely case where the docker run invocation itself errors for
      # an infra reason -- a warn-only check must never become a hard gate
      # by accident.
      - name: Warn on direct CHANGELOG.md edits outside a release PR
        if: github.event_name == 'pull_request'
        env:
          GOVERNANCE_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GOVERNANCE_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set -uo pipefail

          changelog_guard_changed_files="$(mktemp "$PWD/.changelog-guard-changed-files.XXXXXX")"
          trap 'rm -f "$changelog_guard_changed_files"' EXIT

          if git fetch --no-tags --depth=1 origin \
               "+refs/heads/${GOVERNANCE_BASE_REF}:refs/remotes/origin/${GOVERNANCE_BASE_REF}" \
             && git fetch --no-tags --depth=1 origin "$GOVERNANCE_BASE_SHA" \
             && git cat-file -e "${GOVERNANCE_BASE_SHA}^{commit}" \
             && git cat-file -e "${GITHUB_SHA}^{commit}"; then
            git diff --name-only --diff-filter=ACMRTUXB "$GOVERNANCE_BASE_SHA" "$GITHUB_SHA" > "$changelog_guard_changed_files"
          else
            echo "::warning::check-changelog-direct-edit: could not compute this PR's changed-files diff; skipping the CHANGELOG.md direct-edit check for this run."
            : > "$changelog_guard_changed_files"
          fi

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            -e CHANGELOG_GUARD_PR_LABELS="$PR_LABELS" \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-changelog-direct-edit.sh --changed-files-file "/work/$(basename "$changelog_guard_changed_files")" \
          || true

      - name: Run setup migration semantics tests
        run: |
          set -euo pipefail
          # tests/setup-migration-semantics.sh only reads setup.sh and writes to
          # mktemp -d (container /tmp), so the read-only repo mount is sufficient.
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash tests/setup-migration-semantics.sh

      - name: Check pinned GitHub Actions for deprecated Node runtimes (#801)
        # check-action-node-versions.sh calls curl against api.github.com to
        # resolve each pinned action's own action.yml -- runs inside the
        # build-tools container per AG-VAL-016 (curl must not be a host-local
        # tool), same as check-pr-tracking-metadata.sh's GraphQL call above.
        # GH_TOKEN just raises the API rate limit; this also works fine
        # unauthenticated at this repo's current pin count.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            -e GH_TOKEN \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-action-node-versions.sh

      - name: Check validation-subnet wrapper coverage (#896)
        # Standing guard: #820 wrapped every full-setup-validate.yml/
        # full-setup-deep-validate.yml job that starts its own compose stack
        # from compute-validation-network's raw per-run subnet in
        # scripts/lib/run-in-validation-subnet.sh's collision-safe
        # reservation, but only for the jobs that existed at the time. #896
        # found two jobs added later that never got wired through it and hit
        # a real "Pool overlaps" collision under concurrent CI load; #907
        # fixed those two. This check is what stops a THIRD job from
        # silently repeating the same gap -- a pure text/YAML-structure
        # check with no LAN or Docker dependency of its own, same class as
        # check-action-node-versions.sh above.
        run: |
          set -euo pipefail
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-validation-subnet-wrapper-coverage.sh

      - name: Check executable bits on bare-path script invocations (#1019)
        # Standing guard for #822 Pattern B: a repo script committed 100644
        # but invoked by a bare path (scripts/foo.sh, not bash scripts/foo.sh)
        # fails in CI with exit 126, a defect invisible from a Windows /
        # core.filemode=false author host (Rule-Ref: AG-VAL-024). The class
        # recurred four times (#617/#711/PR #804) with only a single
        # hardcoded test -x watchdog.sh guarding it. This scans every
        # workflow + composite-action file for bare-path invocations and
        # every .githooks/ hook, asserting each is committed 100755 -- a pure
        # git-metadata/YAML check, same class as the checks above. Runs in
        # the build-tools container because it reads committed modes via git
        # (AG-VAL-016).
        run: |
          set -euo pipefail
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-executable-bits.sh

      - name: Check build-tools smoke-test coverage (#790/#791)
        # Standing guard for #822 Pattern G: keeps select-build-tools-image.sh's
        # smoke_test_image() required-tools list from drifting behind
        # tools/build-tools/Dockerfile's own verification list, so a tool the
        # image installs and a consumer needs can never again be silently
        # unverified by the smoke test (#775/#787/#790/#791). Pure text
        # comparison of two files, no Docker/LAN dependency of its own, same
        # class as the checks above.
        run: |
          set -euo pipefail
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-build-tools-smoke-coverage.sh

  shellcheck-hosted:
    name: shellcheck (GitHub-hosted fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select build-tools image
        # Always resolve through the digest-pinned, smoke-tested selector --
        # never fall back to a bare :latest tag here. This job exists so
        # ShellCheck/ActionLint still run when self-hosted runners are down;
        # it shouldn't trade the self-hosted job's verified image for an
        # unpinned, unverified one just because the runner changed.
        # BUILD_TOOLS_REQUIRE_PUBLISHED=true matches validate-compose's own
        # resolution (no local-build fallback -- this hosted runner shouldn't
        # need to build the toolchain image itself for a lint-only job).
        env:
          GITHUB_EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail
          printf 'BUILD_TOOLS_IMAGE=%s\n' "$(BUILD_TOOLS_REQUIRE_PUBLISHED=true bash scripts/select-build-tools-image.sh)" >> "$GITHUB_ENV"
      - name: GitHub-hosted fallback notice
        run: |
          echo "::notice::Running ShellCheck and ActionLint on GitHub-hosted runner as fallback for non-LAN-dependent linting."
      - name: Run ShellCheck and ActionLint
        run: |
          set -euo pipefail
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash -lc 'set -euo pipefail; find . \( -name "*.sh" -o -name "*.bats" \) -not -path "./.git/*" -not -path "*/target/*" -print0 | xargs -0 --no-run-if-empty shellcheck --severity=warning; actionlint .github/workflows/*.yml'

      - name: Check pinned GitHub Actions for deprecated Node runtimes (#801)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            -e GH_TOKEN \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-action-node-versions.sh

      - name: Check validation-subnet wrapper coverage (#896)
        # Same guard as the self-hosted shellcheck job's own step above (see
        # its comment for the full rationale); duplicated here so the
        # GitHub-hosted fallback path enforces it too when self-hosted
        # runners are unavailable.
        run: |
          set -euo pipefail
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-validation-subnet-wrapper-coverage.sh

      - name: Check executable bits on bare-path script invocations (#1019)
        # Same guard as the self-hosted shellcheck job's own step above (see
        # its comment for the full rationale); duplicated here so the
        # GitHub-hosted fallback path enforces it too when self-hosted
        # runners are unavailable.
        run: |
          set -euo pipefail
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-executable-bits.sh

      - name: Check build-tools smoke-test coverage (#790/#791)
        # Same guard as the self-hosted shellcheck job's own step above (see
        # its comment for the full rationale); duplicated here so the
        # GitHub-hosted fallback path enforces it too when self-hosted
        # runners are unavailable.
        run: |
          set -euo pipefail
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-build-tools-smoke-coverage.sh

  validate-compose:
    # This job is the lightweight project-wide gate. It validates compose/setup
    # contracts and exports one smoke-tested build-tools image reference for all
    # downstream jobs, so later jobs do not independently select mutable tags.
    runs-on: [self-hosted, linux, lancache, lancache-light]
    # Job-level concurrency (#891 follow-up): cancel-in-progress is
    # pull_request-only -- see `build`'s group comment for the full #979
    # rationale. validate-compose is the shared `needs:` root that exports the
    # smoke-tested build-tools image for the whole workflow, and it is an
    # unconditional `needs:`-success gate for build/build-arm64 (their `if:`
    # requires `needs['validate-compose'].result == 'success'` on every
    # event). So on push it is the sharpest gate on the dev-channel publish
    # path: cancelling it in a merge cascade makes the entire build path skip
    # and starves the channel. It must therefore survive to completion on
    # push. On a PR every consumer cleanly skips a cancelled result (the soft
    # `if:`-gates on build/build-arm64/rust_coverage, the automatic
    # `needs:`-skip default for shellcheck/file-headers/line-endings, and
    # ci_scope_policy's tolerance logic), so reclaiming a superseded run there
    # is pure benefit.
    #
    # NOTE: because validate-compose no longer cancels on push, its downstream
    # `skipped` cascade onto dns_test/ui_test/watchdog_test/dns_cargo_audit/
    # ui_cargo_audit can no longer fire on push. dns_test/ui_test/
    # dns_cargo_audit/ui_cargo_audit still keep their own cancel-on-push
    # groups (deliberately unchanged -- they are NOT on the publish path, so
    # cancelling a superseded push's copy saves scarce runners at no
    # freshness cost), so ci_scope_policy still needs its direct-cancellation
    # tolerance for them; see ci_scope_policy's comment.
    concurrency:
      group: >-
        ${{
          (github.event_name == 'workflow_dispatch' || github.run_attempt != '1') &&
          format('{0}-validate-compose-{1}-{2}', github.workflow, github.ref, github.run_id) ||
          format('{0}-validate-compose-{1}', github.workflow, github.ref)
        }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    outputs:
      build_tools_image: ${{ steps.select-compose-validation-image.outputs.build_tools_image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx for manifest inspection
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Resolve compose validation image
        id: select-compose-validation-image
        env:
          GITHUB_EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail

          # Resolve the required published image FIRST. If it's unavailable or fails
          # smoke checks, this exits before the permissive selector below ever builds
          # the (large) local fallback image, so there's nothing left to clean up.
          downstream_build_tools_image="$(BUILD_TOOLS_REQUIRE_PUBLISHED=true bash scripts/select-build-tools-image.sh)"

          case "$downstream_build_tools_image" in
            *@sha256:*)
              ;;
            *)
              echo "::error::Expected a digest-qualified build-tools image from the published build-tools selector, got '$downstream_build_tools_image'."
              exit 1
              ;;
          esac

          # validate-compose runs on the light tier, so it must not trigger the
          # selector's trusted-ref fallback Docker build. Reuse the already
          # smoke-tested published digest for this job and for downstream jobs.
          validation_build_tools_image="$downstream_build_tools_image"

          printf 'BUILD_TOOLS_IMAGE=%s\n' "$validation_build_tools_image" >> "$GITHUB_ENV"
          printf 'build_tools_image=%s\n' "$downstream_build_tools_image" >> "$GITHUB_OUTPUT"

      - name: Validate stack image contract
        run: |
          set -euo pipefail

          docker run --rm -i \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/validate-stack-images.sh

      - name: Validate prebuilt production install path
        run: |
          set -euo pipefail

          docker run --rm -i \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash -s <<'VALIDATE_PREBUILT'
          set -euo pipefail

          if grep -RInE '^[[:space:]]+build:' deploy/prod deploy/quickstart; then
            echo "::error::Production and quickstart compose files must use prebuilt images only."
            exit 1
          fi

          if grep -RIn -- '--build' README.md deploy/prod deploy/quickstart setup.sh; then
            echo "::error::User-facing production install paths must not instruct users to build images locally."
            exit 1
          fi

          if grep -RIn -- '/srv/lancache' README.md CLAUDE.md deploy/prod deploy/quickstart services/ui/src; then
            echo "::error::Runtime defaults and user-facing install paths must use /opt/lancache-ng, not legacy /srv/lancache."
            exit 1
          fi

          # State-root migration contract:
          # - manual prod keeps one normal root knob (LANCACHE_STATE_DIR)
          # - optional per-service keys are preserved only for real legacy/custom paths
          # - setup.sh must not treat a bare /srv/lancache directory as active state
          #
          # CACHE_DIR_STANDARD/CACHE_DIR_SSL are deliberately NOT in this loop.
          # Every other key here is a legitimate, permanent advanced override
          # an operator may still want (see set_optional_env_path_override_if_needed's
          # own "preserve intentionally templated/custom values" behavior). The two
          # cache keys are different: they are being fully retired in favor of one
          # shared CACHE_DIR, so setup.sh update collapses them into CACHE_DIR and
          # unconditionally removes them (remove_env_key) instead of preserving them
          # as an optional override -- keeping them "preservable" would recreate the
          # exact split-brain (two possible cache locations) this migration exists
          # to eliminate.
          for key in PDNS_STANDARD_DIR PDNS_SSL_DIR PDNS_FILTER_STATE_DIR NATS_DATA_DIR NATS_CONF_DIR; do
            grep -F "set_optional_env_path_override_if_needed ${key}" setup.sh >/dev/null \
              || { echo "::error::setup.sh update must preserve ${key} only when legacy/custom state would otherwise move away from the one-root contract."; exit 1; }
            grep -F "${key}" deploy/prod/.env >/dev/null \
              || { echo "::error::deploy/prod/.env must document ${key} for manual production upgrades."; exit 1; }
            grep -F "${key}" docs/backup-restore.md >/dev/null \
              || { echo "::error::backup docs must mention ${key}."; exit 1; }
          done

          grep -F 'LANCACHE_STATE_DIR=/opt/lancache-ng' deploy/prod/.env >/dev/null \
            || { echo "::error::deploy/prod/.env must expose one production state root for manual upgrade paths."; exit 1; }
          grep -F 'set_env_key_if_empty_or_missing LANCACHE_STATE_DIR' setup.sh >/dev/null \
            || { echo "::error::setup.sh update must write LANCACHE_STATE_DIR before per-service state keys."; exit 1; }
          grep -F 'production_state_root_default()' setup.sh >/dev/null \
            || { echo "::error::setup.sh must keep a state-root default helper for setup installs and manual deploy/prod updates."; exit 1; }
          grep -F 'legacy_state_root_or_default()' setup.sh >/dev/null \
            || { echo "::error::setup.sh must only select legacy /srv/lancache when known child state still exists."; exit 1; }
          grep -F 'basename "$(dirname "$install_dir")")" = "deploy"' setup.sh >/dev/null \
            || { echo "::error::setup.sh deploy/prod updates must default runtime state to /opt/lancache-ng, not the checkout."; exit 1; }
          grep -F 'install_dir=$(realpath -m "$install_dir")' setup.sh >/dev/null \
            || { echo "::error::setup.sh update must normalize install_dir before cd so deploy/prod backups are path-stable."; exit 1; }
          # Manual deploy/prod rollback snapshot:
          # capture every repo-root input reached via ../../ and remap that
          # snapshot to a different checkout path during restore.
          grep -F 'deploy_prod_repo_input_paths()' setup.sh >/dev/null \
            || { echo "::error::deploy/prod backups must snapshot repo-root runtime inputs reached via ../../ paths."; exit 1; }
          grep -F 'config/prod' setup.sh >/dev/null \
            && grep -F 'services/dns/cdn-domains.txt' setup.sh >/dev/null \
            || { echo "::error::deploy/prod backups must include repo-root config/prod env files and the domain list."; exit 1; }
          grep -F 'scripts/docker-socket-proxy.sh' setup.sh >/dev/null \
            || { echo "::error::deploy/prod backups must include the repo-root scripts/docker-socket-proxy.sh bind-mount input (see docs/naming-conventions.md)."; exit 1; }
          grep -F 'deploy_prod_repo_root "$archived_install"' setup.sh >/dev/null \
            && grep -F 'deploy_prod_repo_root "$install_dir"' setup.sh >/dev/null \
            || { echo "::error::deploy/prod restore must remap repo-root snapshot entries to the new checkout path."; exit 1; }
          grep -F 'sudo ./setup.sh update "$(pwd)/deploy/prod"' README.md >/dev/null \
            || { echo "::error::README manual production updates must pass deploy/prod explicitly to setup.sh update."; exit 1; }
          grep -F 'deploy/prod/.env.local' .gitignore >/dev/null \
            || { echo "::error::Manual deploy/prod runtime env must be ignored as deploy/prod/.env.local."; exit 1; }
          grep -F 'runtime_env_file_for_install_dir()' setup.sh >/dev/null \
            && grep -F 'is_deploy_prod_install_dir "$install_dir"' setup.sh >/dev/null \
            && grep -F '$install_dir/.env.local' setup.sh >/dev/null \
            || { echo "::error::setup.sh must prefer deploy/prod/.env.local as the active manual prod runtime env when present."; exit 1; }
          grep -F 'cp deploy/prod/.env deploy/prod/.env.local' README.md >/dev/null \
            && grep -F 'docker compose --env-file deploy/prod/.env.local -f deploy/prod/docker-compose.yml' README.md >/dev/null \
            || { echo "::error::README manual production flow must keep deploy/prod/.env as a clean template and run compose with deploy/prod/.env.local."; exit 1; }
          if awk '
            /sudo \.\/setup\.sh backup --config "\$\(pwd\)\/deploy\/prod"/ { backup_seen=1 }
            /git pull --ff-only/ && !backup_seen { print FILENAME ":" FNR ":" $0; found=1 }
            END { exit found ? 0 : 1 }
          ' README.md; then
            echo "::error::README manual production updates must create a config backup before git pull changes tracked files."
            exit 1
          fi
          grep -F '${LANCACHE_STATE_DIR:-/opt/lancache-ng}/pdns-standard' deploy/prod/docker-compose.yml >/dev/null \
            || { echo "::error::prod compose must derive PowerDNS state from LANCACHE_STATE_DIR when no per-service override is set."; exit 1; }
          grep -F '${LANCACHE_STATE_DIR:-/opt/lancache-ng}/nats-conf' deploy/prod/docker-compose.yml >/dev/null \
            || { echo "::error::prod compose must derive NATS config state from LANCACHE_STATE_DIR when no per-service override is set."; exit 1; }
          grep -F 'LANCACHE_STATE_DIR' docs/backup-restore.md >/dev/null \
            || { echo "::error::backup docs must describe LANCACHE_STATE_DIR coverage."; exit 1; }
          grep -F 'legacy_dir_or_default "$(legacy_state_path cache)"' setup.sh >/dev/null \
            || { echo "::error::setup.sh update must preserve an existing legacy /srv/lancache/cache before changing cache defaults."; exit 1; }
          grep -F 'pdns_filter_state_dir=$(get_env_var PDNS_FILTER_STATE_DIR "$env_file")' setup.sh >/dev/null \
            || { echo "::error::backup_manifest must read PDNS_FILTER_STATE_DIR."; exit 1; }
          grep -F 'nats_conf_dir=$(get_env_var NATS_CONF_DIR "$env_file")' setup.sh >/dev/null \
            || { echo "::error::backup_manifest must read NATS_CONF_DIR."; exit 1; }
          VALIDATE_PREBUILT

      - name: Validate compose files
        env:
          # CACHE_DIR_STANDARD/CACHE_DIR_SSL are intentionally absent here: no
          # compose file reads either key anymore (issue #445), so injecting
          # one would validate a var no service consumes. SSL_CACHE_MAX_GB and
          # STANDARD_CACHE_MAX_GB stay below because deploy/prod/docker-compose.yml
          # still falls back to them when CACHE_MAX_GB is unset, for installs
          # that haven't gone through setup.sh update yet.
          CACHE_INACTIVE: 365d
          CACHE_MAX_SIZE: 10g
          CACHE_MEM_MB: "256"
          CACHE_SLICE_SIZE: 1m
          CACHE_VALID_ANY: 1h
          CACHE_VALID_HIT: 30d
          DDNS_TSIG_KEY: ci-ddns-tsig-key
          IP_SSL: 127.0.0.2
          IP_STANDARD: 127.0.0.1
          LISTEN_IP: 127.0.0.3
          ALLOW_INSECURE_UI: "true"
          KEA_CTRL_TOKEN: ci-kea-token
          NATS_CONSUMER: ci-secondary
          NATS_DNS_REPLICA_PASSWORD: ci-nats-dns-replica-password
          NATS_DNS_REPLICA_USER: ci-nats-dns-replica
          NATS_DNS_WRITER_PASSWORD: ci-nats-dns-writer-password
          NATS_DNS_WRITER_USER: ci-nats-dns-writer
          NATS_CALLOUT_PASSWORD: ci-nats-callout-password
          NATS_CALLOUT_USER: ci-nats-callout
          NATS_PASSWORD: ci-nats-password
          NATS_UI_PASSWORD: ci-nats-ui-password
          NATS_UI_USER: ci-nats-ui
          NATS_USER: ci-nats-user
          NATS_TOKEN: ci-nats-token
          NATS_URL: nats://127.0.0.1:4222
          NGINX_UPSTREAM_RESOLVER: 1.1.1.1
          PDNS_API_KEY: ci-pdns-api-key
          PROXY_IP: 127.0.0.1
          SECONDARY_REGISTRATION_TOKEN: ci-secondary-registration-token
          SSL_CACHE_MAX_GB: "10"
          STANDARD_CACHE_MAX_GB: "10"
        run: |
          set -euo pipefail

          docker run --rm -i \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            --env HOME=/tmp \
            --env DOCKER_CONFIG=/tmp/.docker \
            --env CACHE_INACTIVE \
            --env CACHE_MAX_SIZE \
            --env CACHE_MEM_MB \
            --env CACHE_SLICE_SIZE \
            --env CACHE_VALID_ANY \
            --env CACHE_VALID_HIT \
            --env DDNS_TSIG_KEY \
            --env IP_SSL \
            --env IP_STANDARD \
            --env LISTEN_IP \
            --env ALLOW_INSECURE_UI \
            --env KEA_CTRL_TOKEN \
            --env NATS_CONSUMER \
            --env NATS_DNS_REPLICA_PASSWORD \
            --env NATS_DNS_REPLICA_USER \
            --env NATS_DNS_WRITER_PASSWORD \
            --env NATS_DNS_WRITER_USER \
            --env NATS_CALLOUT_PASSWORD \
            --env NATS_CALLOUT_USER \
            --env NATS_PASSWORD \
            --env NATS_UI_PASSWORD \
            --env NATS_UI_USER \
            --env NATS_USER \
            --env NATS_TOKEN \
            --env NATS_URL \
            --env NGINX_UPSTREAM_RESOLVER \
            --env PDNS_API_KEY \
            --env PROXY_IP \
            --env SECONDARY_REGISTRATION_TOKEN \
            --env SSL_CACHE_MAX_GB \
            --env STANDARD_CACHE_MAX_GB \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash -s <<'VALIDATE_COMPOSE'
          set -euo pipefail

          validate_compose() {
            local output

            if ! output="$(docker compose "$@" config --quiet 2>&1)"; then
              printf '%s\n' "$output"
              return 1
            fi

            if printf '%s\n' "$output" | grep -Eqi '(^|[[:space:]])(warn|warning|level=warning)'; then
              printf 'docker compose emitted warnings; treating warnings as errors:\n%s\n' "$output"
              return 1
            fi

            if [ -n "$output" ]; then
              printf '%s\n' "$output"
            fi
          }

          validate_compose -f deploy/quickstart/docker-compose.yml --profile ssl
          validate_compose -f deploy/dev/docker-compose.yml
          validate_compose -f deploy/prod/docker-compose.yml
          validate_compose -f deploy/secondary/docker-compose.yml
          validate_compose --env-file deploy/quickstart/.env -f deploy/quickstart/docker-compose.yml --profile ssl

          # The default (profile-less) renders above skip the dhcp/dhcp-proxy
          # service blocks entirely, because Compose omits services behind an
          # inactive profile. Both DHCP modes (issue #343) therefore need
          # explicit profile activation so their service definitions are
          # actually parsed and validated, not silently excluded.
          for compose_file in \
            deploy/dev/docker-compose.yml \
            deploy/prod/docker-compose.yml \
            deploy/quickstart/docker-compose.yml; do
            validate_compose -f "$compose_file" --profile dhcp-kea
            validate_compose -f "$compose_file" --profile dhcp-proxy
            # Same reasoning as above, for the syslog-ng/fluent-bit logging
            # profile (#453): it must be activated explicitly or its service
            # blocks are silently skipped by this validation.
            validate_compose -f "$compose_file" --profile logging
          done

          validate_nats_config_ownership() {
            local path

            for path in \
              deploy/dev/docker-compose.yml \
              deploy/prod/docker-compose.yml \
              deploy/quickstart/docker-compose.yml
            do
              grep -Fq 'tmp_nats_conf="$(mktemp /etc/nats/.nats.conf.XXXXXX)"' "$path" \
                || {
                  printf '::error file=%s::NATS must stage the shared config in a temp file inside /etc/nats.\n' "$path"
                  return 1
                }
              grep -Fq 'chown 10001:10001 "$$tmp_nats_conf"' "$path" \
                || {
                  printf '::error file=%s::NATS must restore shared config ownership to UID/GID 10001 after writing.\n' "$path"
                  return 1
                }
              grep -Fq 'mv "$$tmp_nats_conf" /etc/nats/nats.conf' "$path" \
                || {
                  printf '::error file=%s::NATS must atomically replace the shared nats.conf after fixing ownership.\n' "$path"
                  return 1
                }
            done
          }

          validate_nats_config_ownership
          grep -Fq 'fn write_nats_conf_atomically(' services/ui/src/routes/secondaries.rs \
            || { echo "::error::Admin UI must keep an atomic nats.conf write helper for the v0.1.0 shared-token path."; exit 1; }
          grep -Fq 'fs::rename(&tmp_path, target)' services/ui/src/routes/secondaries.rs \
            || { echo "::error::Admin UI nats.conf writes must use temp-file plus rename, not direct overwrite."; exit 1; }

          grep -Fq 'render_template_atomic' services/dns/entrypoint.sh \
            || { echo "::error::DNS entrypoint must render generated configs through the atomic helper."; exit 1; }
          grep -Fq 'mktemp "${target_dir}/.${target_name}.tmp.XXXXXX"' services/dns/entrypoint.sh \
            || { echo "::error::DNS entrypoint generated configs must stage temp files in the target directory."; exit 1; }
          if grep -Fq '> /tmp/recursor.conf' services/dns/entrypoint.sh \
            || grep -Fq '> /tmp/pdns.conf' services/dns/entrypoint.sh; then
            echo "::error::DNS entrypoint must not render PDNS configs through /tmp before replacing target configs."
            exit 1
          fi
          if grep -Fq "sed -i 's/^  loglevel: 3$/  loglevel: 6/' /etc/pdns/recursor.conf" services/dns/entrypoint.sh; then
            echo "::error::DNS query logging must be applied to the staged recursor.conf before replacement."
            exit 1
          fi
          grep -Fq 'write_generated_runtime_file "${secondary_dir}/docker-compose.yml"' setup.sh \
            || { echo "::error::Secondary setup must atomically write generated docker-compose.yml."; exit 1; }
          grep -Fq 'write_env_file "${secondary_dir}/.env"' setup.sh \
            || { echo "::error::Secondary setup must use the safe env writer for generated .env files."; exit 1; }

          if grep -F 'EXEC: "1"' deploy/dev/docker-compose.yml deploy/prod/docker-compose.yml deploy/quickstart/docker-compose.yml >/dev/null; then
            echo "::error::Docker exec is banned from the Admin UI/watchdog proxy for security reasons; use predeclared container actions instead."
            exit 1
          fi
          if grep -E '^[[:space:]]*(CONTAINERS|POST): "1"' deploy/dev/docker-compose.yml deploy/prod/docker-compose.yml deploy/quickstart/docker-compose.yml >/dev/null; then
            echo "::error::Broad CONTAINERS=1/POST=1 exposes generic Docker container APIs; use the explicit HAProxy allowlist instead."
            exit 1
          fi
          # The HAProxy allowlist itself lives in exactly one place,
          # scripts/docker-socket-proxy.sh (see docs/naming-conventions.md's
          # "Docker socket proxy allowlist" section) -- it used to also be
          # duplicated into an unreferenced x-docker-socket-proxy-command
          # anchor in each of the three Compose files, which this check used
          # to validate instead of the real script. Those anchors were dead
          # (never aliased) and have been removed; validate the one real
          # copy directly instead of three unreachable shadow copies.
          socket_proxy_script="scripts/docker-socket-proxy.sh"
          grep -Fq 'acl safe_service_restart' "$socket_proxy_script" \
            && grep -Fq 'acl safe_dhcp_action' "$socket_proxy_script" \
            && grep -Fq 'acl safe_probe_action' "$socket_proxy_script" \
            && grep -Fq 'acl lancache_container' "$socket_proxy_script" \
            && grep -Fq 'lancache-dns-standard|lancache-dns-ssl' "$socket_proxy_script" \
            && grep -Fq 'lancache-proxy|lancache-dns-standard|lancache-dns-ssl|lancache-nats)/restart' "$socket_proxy_script" \
            && grep -Fq 'lancache-dhcp|lancache-dhcp-proxy)/(start|stop)' "$socket_proxy_script" \
            && grep -Fq 'lancache-dhcp-probe/(start|stop|wait)' "$socket_proxy_script" \
            && ! grep -Fq 'lancache-proxy|lancache-dns-standard|lancache-dns-ssl|lancache-dhcp|lancache-dhcp-proxy|lancache-dhcp-probe|lancache-nats)/(start|stop|restart|wait)' "$socket_proxy_script" \
            && grep -Fq 'http-request deny if docker_container_path !lancache_container' "$socket_proxy_script" \
            && grep -Fq 'http-request deny' "$socket_proxy_script" \
            && ! grep -Fq '/containers/create' "$socket_proxy_script" \
            && ! grep -Fq '/containers/json' "$socket_proxy_script" \
            && ! grep -Fq '[A-Za-z0-9_.-]+/(start|stop|restart|attach)' "$socket_proxy_script" \
            || {
              echo "::error file=${socket_proxy_script}::Docker socket proxy must deny generic container listing/creation and only allow explicit project container actions; stop/start/wait are restricted to the DHCP probe."
              exit 1
            }

          for compose_file in deploy/dev/docker-compose.yml deploy/prod/docker-compose.yml deploy/quickstart/docker-compose.yml; do
            grep -Fq 'docker-socket-proxy.sh:/usr/local/bin/lancache-docker-socket-proxy.sh:ro' "$compose_file" \
              || {
                echo "::error file=${compose_file}::docker-socket-proxy service must mount the one real scripts/docker-socket-proxy.sh, not an inline or divergent copy."
                exit 1
              }
            # Match only the real top-level YAML key/anchor syntax here, not
            # any occurrence of the string -- the explanatory comment above
            # (and in docs/naming-conventions.md) legitimately mentions
            # "x-docker-socket-proxy-command" as prose describing what was
            # removed, and a substring match would flag that prose as a
            # reintroduction on every run.
            grep -Eq '^x-docker-socket-proxy-command:' "$compose_file" \
              && {
                echo "::error file=${compose_file}::The dead x-docker-socket-proxy-command anchor must not be reintroduced; it duplicated scripts/docker-socket-proxy.sh without ever being referenced."
                exit 1
              }
            true
          done

          missing_required=0
          while IFS= read -r key; do
            if ! grep -Eq "^${key}=[^[:space:]]+" deploy/quickstart/.env; then
              echo "::error::deploy/quickstart/.env must define non-empty ${key} because quickstart compose marks it required."
              missing_required=1
            fi
          done < <(
            grep -oE '\$\{[A-Za-z0-9_]+:\?[^}]+\}' deploy/quickstart/docker-compose.yml \
              | sed -E 's/^\$\{([^:]+):.*/\1/' \
              | sort -u
          )
          if [[ "$missing_required" = "1" ]]; then
            exit 1
          fi

          validate_dhcp_proxy_env_file_contract() {
            local compose_file="$1"
            local expected_env_file="$2"

            awk -v compose_file="$compose_file" -v expected_env_file="$expected_env_file" '
              function trim(value) {
                sub(/^[[:space:]]+/, "", value)
                sub(/[[:space:]]+$/, "", value)
                return value
              }
              function content_indent(value, prefix) {
                match(value, /^[[:space:]]*/)
                prefix = substr(value, 1, RLENGTH)
                return length(prefix)
              }
              function strip_inline_comment(value) {
                sub(/[[:space:]]+#.*/, "", value)
                return value
              }
              /^  dhcp-proxy:/ {
                in_service=1
                saw_service=1
                in_env_file_block=0
                next
              }
              in_service && /^  [[:alnum:]_-]+:/ {
                in_service=0
                in_env_file_block=0
              }
              in_service {
                line=strip_inline_comment($0)
                stripped=trim(line)

                if (in_env_file_block && stripped != "" && content_indent(line) <= env_file_indent) {
                  in_env_file_block=0
                }
                if (in_env_file_block && stripped ~ /^-/ && index(stripped, expected_env_file) > 0) {
                  saw_env_file=1
                }

                if (line ~ /^[[:space:]]*env_file:[[:space:]]*$/) {
                  in_env_file_block=1
                  env_file_indent=content_indent(line)
                } else if (line ~ /^[[:space:]]*env_file:[[:space:]]*/ && index(line, expected_env_file) > 0) {
                  saw_env_file=1
                }

                if (line ~ /^[[:space:]]*environment:[[:space:]]*/) {
                  saw_environment=1
                }
                if (stripped ~ /^-[[:space:]]*(DHCP_SUBNET_START|DHCP_DNS_PRIMARY|DHCP_DNS_SECONDARY|UPSTREAM_DHCP_IP)=\$\{/ || stripped ~ /[{,][[:space:]]*(DHCP_SUBNET_START|DHCP_DNS_PRIMARY|DHCP_DNS_SECONDARY|UPSTREAM_DHCP_IP):[[:space:]]*"\$\{/) {
                  saw_interpolated_dhcp_key=1
                }
              }
              END {
                if (!saw_service) {
                  printf "::error file=%s::dhcp-proxy service is missing.\n", compose_file
                  exit 1
                }
                if (!saw_env_file) {
                  printf "::error file=%s::dhcp-proxy must keep using env_file %s so setup-managed dnsmasq-proxy values are not lost.\n", compose_file, expected_env_file
                  exit 1
                }
                if (saw_environment || saw_interpolated_dhcp_key) {
                  printf "::error file=%s::dhcp-proxy must not reintroduce Compose environment interpolation for dnsmasq-proxy values; env_file is the contract for dev/prod.\n", compose_file
                  exit 1
                }
              }
            ' "$compose_file"
          }

          # Dev/prod dhcp-proxy values are written by setup into env files.
          # Compose interpolation does not read env_file values, so explicit
          # environment entries here would silently erase the configured proxy
          # DHCP settings. Quickstart is intentionally separate because setup
          # writes its single .env file directly.
          validate_dhcp_proxy_env_file_contract deploy/dev/docker-compose.yml ../../config/dev/dhcp-proxy.env
          validate_dhcp_proxy_env_file_contract deploy/prod/docker-compose.yml ../../config/prod/dhcp-proxy.env

          # Issue #450: dnsmasq relay/proxy optional-option surface. Guards
          # against silently dropping the new keys from any layer of the
          # env-file -> entrypoint -> template pipeline.
          dhcp_proxy_optional_keys=(
            DHCP_PROXY_INTERFACE
            DHCP_PROXY_ROUTER
            DHCP_NTP_SERVERS
            DHCP_PROXY_DOMAIN
            DHCP_PROXY_BOOT_FILENAME
            DHCP_PROXY_BOOT_SERVER
            DHCP_PROXY_CUSTOM_OPTIONS
          )
          for env_file in config/dev/dhcp-proxy.env config/prod/dhcp-proxy.env deploy/quickstart/.env; do
            for key in "${dhcp_proxy_optional_keys[@]}"; do
              grep -Eq "^${key}=" "$env_file" \
                || { echo "::error file=${env_file}::${env_file} must define ${key} (empty by default) for the dnsmasq relay/proxy optional-option surface added by issue #450."; exit 1; }
            done
          done
          grep -F 'DHCP_PROXY_INTERFACE=${DHCP_PROXY_INTERFACE:-}' deploy/quickstart/docker-compose.yml >/dev/null \
            || { echo "::error::deploy/quickstart/docker-compose.yml's dhcp-proxy service must pass through DHCP_PROXY_INTERFACE like the other optional dnsmasq relay/proxy keys."; exit 1; }
          grep -F 'DHCP_PROXY_CUSTOM_OPTIONS=${DHCP_PROXY_CUSTOM_OPTIONS:-}' deploy/quickstart/docker-compose.yml >/dev/null \
            || { echo "::error::deploy/quickstart/docker-compose.yml's dhcp-proxy service must pass through DHCP_PROXY_CUSTOM_OPTIONS like the other optional dnsmasq relay/proxy keys."; exit 1; }

          # Issue #705: PXE boot-pointer opt-in surface. Same guard shape as
          # #450 above -- a PR review (#765) found the quickstart Compose
          # environment allowlist silently stopped before these three keys,
          # leaving the opt-in feature unreachable there even when set in
          # .env; this also checks explicit compose passthrough (not just
          # env-file presence) so that specific class of regression is
          # caught here instead of only by manual review next time.
          dhcp_proxy_pxe_keys=(
            DHCP_PROXY_PXE_BOOT_SERVER
            DHCP_PROXY_PXE_BOOT_FILENAME_BIOS
            DHCP_PROXY_PXE_BOOT_FILENAME_UEFI
          )
          for env_file in config/dev/dhcp-proxy.env config/prod/dhcp-proxy.env deploy/quickstart/.env; do
            for key in "${dhcp_proxy_pxe_keys[@]}"; do
              grep -Eq "^${key}=" "$env_file" \
                || { echo "::error file=${env_file}::${env_file} must define ${key} (empty by default) for the PXE boot-pointer opt-in surface added by issue #705."; exit 1; }
            done
          done
          for key in "${dhcp_proxy_pxe_keys[@]}"; do
            grep -F "${key}=\${${key}:-}" deploy/quickstart/docker-compose.yml >/dev/null \
              || { echo "::error::deploy/quickstart/docker-compose.yml's dhcp-proxy service must pass through ${key} like the other optional dnsmasq relay/proxy keys."; exit 1; }
          done

          grep -F '_dhcp_proxy_render_optional_directives()' services/dhcp-proxy/entrypoint.sh >/dev/null \
            || { echo "::error::services/dhcp-proxy/entrypoint.sh must render the issue #450 optional dnsmasq relay/proxy directives."; exit 1; }
          grep -F '_dhcp_proxy_render_optional_directives /etc/dnsmasq.conf' services/dhcp-proxy/entrypoint.sh >/dev/null \
            || { echo "::error::services/dhcp-proxy/entrypoint.sh must call _dhcp_proxy_render_optional_directives before validating dnsmasq.conf."; exit 1; }
          if grep -F 'dhcp-proxy=${UPSTREAM_DHCP_IP}' services/dhcp-proxy/dnsmasq.conf.template >/dev/null; then
            echo "::error::services/dhcp-proxy/dnsmasq.conf.template must not reintroduce 'dhcp-proxy=\${UPSTREAM_DHCP_IP}': that flag means \"treat these DHCP-relay agents as full proxies\" (RFC 5107), it does nothing without --dhcp-relay=, and this service never configures one. Confirmed against a live dnsmasq --help/--test; see docs/dhcp-modes.md."
            exit 1
          fi

          if grep -RInE '^(NATS_LOCAL_TOKEN|NATS_TOKEN)=' deploy/quickstart/.env deploy/prod/.env 2>/dev/null; then
            echo "::error::Quickstart/prod env templates must not use deprecated NATS token keys; use role credentials instead."
            exit 1
          fi

          setup_required_keys=(
            DDNS_TSIG_KEY
            KEA_CTRL_TOKEN
            LANCACHE_IMAGE_TAG
            NATS_DNS_REPLICA_PASSWORD
            NATS_DNS_REPLICA_USER
            NATS_DNS_WRITER_PASSWORD
            NATS_DNS_WRITER_USER
            NATS_CALLOUT_PASSWORD
            NATS_CALLOUT_USER
            NATS_UI_PASSWORD
            NATS_UI_USER
            PDNS_API_KEY
            SECONDARY_REGISTRATION_TOKEN
          )
          for key in "${setup_required_keys[@]}"; do
            grep -F "$key" setup.sh >/dev/null \
              || { echo "::error::setup.sh must generate or migrate required runtime key ${key}."; exit 1; }
          done

          grep -F 'run_kea_dhcp_activation_preflight()' setup.sh >/dev/null \
            || { echo "::error::setup.sh must define a DHCP discovery preflight before Kea activation."; exit 1; }
          grep -F 'run_kea_dhcp_activation_preflight "$INSTALL_DIR/.env"' setup.sh >/dev/null \
            || { echo "::error::setup.sh must call the Kea discovery preflight before starting the stack."; exit 1; }
          grep -F 'nmap --script broadcast-dhcp-discover --script-args broadcast-dhcp-discover.timeout=5' setup.sh >/dev/null \
            || { echo "::error::setup.sh must probe DHCP discovery with the Kea image before activation."; exit 1; }
          if grep -F 'nmap --script broadcast-dhcp-discover -e any' setup.sh >/dev/null; then
            echo "::error::setup.sh must not pass -e any to nmap; that is not a valid nmap interface and makes the preflight fail its own execution on every run."
            exit 1
          fi
          grep -F 'nmap' services/dhcp/Dockerfile >/dev/null \
            || { echo "::error::services/dhcp/Dockerfile must install nmap for the Kea discovery preflight."; exit 1; }
          grep -F 'nmap|/usr/bin/nmap|/bin/nmap)' services/dhcp/entrypoint.sh >/dev/null \
            || { echo "::error::services/dhcp/entrypoint.sh must pass through the nmap preflight command without starting Kea."; exit 1; }

          setup_update_required_repairs=(
            CACHE_INACTIVE
            CACHE_MAX_GB
            CACHE_MAX_SIZE
            CACHE_MEM_MB
            CACHE_SLICE_SIZE
            CACHE_VALID_ANY
            CACHE_VALID_HIT
            DDNS_TSIG_KEY
            KEA_CTRL_TOKEN
            LANCACHE_IMAGE_CHANNEL
            LANCACHE_IMAGE_PREFIX
            LANCACHE_IMAGE_REGISTRY
            LANCACHE_IMAGE_TAG
            NATS_DNS_REPLICA_PASSWORD
            NATS_DNS_REPLICA_USER
            NATS_DNS_WRITER_PASSWORD
            NATS_DNS_WRITER_USER
            NATS_CALLOUT_PASSWORD
            NATS_CALLOUT_USER
            NATS_UI_PASSWORD
            NATS_UI_USER
            NGINX_UPSTREAM_RESOLVER
            PDNS_API_KEY
            PROXY_SECURITY_MODE
            SSL_ENABLED
            SECONDARY_REGISTRATION_TOKEN
          )
          for key in "${setup_update_required_repairs[@]}"; do
            if awk -v key="$key" '
              /^migrate_env_for_update\(\)/ { in_func=1; next }
              in_func && /^}/ { in_func=0 }
              in_func && $0 ~ "append_env_key_if_missing[[:space:]]+" key "([[:space:]]|$)" { found=1 }
              END { exit found ? 0 : 1 }
            ' setup.sh; then
              echo "::error::setup.sh update must not preserve empty required ${key} values with append_env_key_if_missing."
              exit 1
            fi
            awk -v key="$key" '
              /^migrate_env_for_update\(\)/ { in_func=1; next }
              in_func && /^}/ { in_func=0 }
              in_func && $0 ~ "(set_env_key_if_empty_or_missing|set_env_key|ensure_secret_env_key|append_required_env_migrated_assignment_if_empty_or_missing)[[:space:]]+" key "([[:space:]]|$)" { found=1 }
              END { exit found ? 0 : 1 }
            ' setup.sh \
              || { echo "::error::setup.sh update must repair empty or missing required ${key} values."; exit 1; }
          done
          grep -F 'get_env_var_nonempty()' setup.sh >/dev/null \
            || { echo "::error::setup.sh must provide a helper that finds non-empty duplicate env values before repairing required keys."; exit 1; }
          grep -F 'get_env_assignment_value_raw_nonempty()' setup.sh >/dev/null \
            || { echo "::error::setup.sh must provide a helper that preserves the raw assignment for a non-empty duplicate env value."; exit 1; }
          grep -F 'existing_assignment=$(get_env_assignment_value_raw_nonempty "$key" "$env_file")' setup.sh >/dev/null \
            || { echo "::error::Required-key repair must preserve the raw non-empty assignment before writing a fallback."; exit 1; }
          grep -F 'source_assignment=$(get_env_assignment_value_raw_nonempty "$source_key" "$env_file")' setup.sh >/dev/null \
            || { echo "::error::Migrated assignments must preserve raw non-empty source values before writing a fallback."; exit 1; }
          grep -F 'cache_max_gb=$(get_env_var_nonempty CACHE_MAX_GB "$env_file")' setup.sh >/dev/null \
            || { echo "::error::CACHE_MAX_SIZE repair must derive from existing CACHE_MAX_GB before falling back to the default."; exit 1; }
          if ! awk '
            /^set_env_key\(\) \{/ { in_func=1; seen_next=0; next }
            in_func && /^}/ { exit seen_next ? 0 : 1 }
            in_func && /\$1 == key \{/ { in_key=1 }
            in_func && in_key && /if \(!seen\)/ { seen_next=1 }
          ' setup.sh; then
            echo "::error::set_env_key must collapse duplicate assignments instead of rewriting every duplicate key."
            exit 1
          fi
          grep -F 'validate_ui_session_ttl_seconds()' setup.sh >/dev/null \
            || { echo "::error::setup.sh must validate UI_SESSION_TTL_SECONDS before writing or reusing it."; exit 1; }
          grep -F 'validate_ui_session_ttl_seconds "$ui_session_ttl" "$env_file"' setup.sh >/dev/null \
            || { echo "::error::setup.sh update must validate preserved UI_SESSION_TTL_SECONDS before mutating or restarting the stack."; exit 1; }
          grep -F 'validate_ui_session_ttl_seconds "$UI_SESSION_TTL_SECONDS" "$env_file"' setup.sh >/dev/null \
            || { echo "::error::setup.sh install must validate UI_SESSION_TTL_SECONDS before writing the runtime .env."; exit 1; }

          if awk '
            /^  release:/ { in_release=1; next }
            in_release && /^  [[:alnum:]_-]+:/ { in_release=0 }
            in_release && /build-tools:latest/ { print FILENAME ":" FNR ":" $0; found=1 }
            END { exit found ? 0 : 1 }
          ' .github/workflows/build-push.yml; then
            echo "::error::Release jobs with write permissions must use the tag-scoped build-tools image, not mutable latest."
            exit 1
          fi
          forbidden_latest_default_branch='type=raw,value=latest,enable={{is_default'
          forbidden_latest_default_branch="${forbidden_latest_default_branch}_branch}}"
          if grep -Fq "$forbidden_latest_default_branch" .github/workflows/build-push.yml; then
            echo "::error::Default branch builds must not publish latest; latest is stable-release only."
            exit 1
          fi
          grep -F 'channel_tags+=(nightly)' .github/workflows/build-push.yml >/dev/null \
            || { echo "::error::Master promotion must publish the nightly channel."; exit 1; }
          grep -F 'channel_tags+=(latest)' .github/workflows/build-push.yml >/dev/null \
            || { echo "::error::Stable release promotion must publish the latest channel."; exit 1; }
          grep -F 'elif [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then' .github/workflows/build-push.yml >/dev/null \
            || { echo "::error::Stable release promotion must only move latest for exact vX.Y.Z tags."; exit 1; }
          grep -F 'if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then' .github/workflows/build-push.yml >/dev/null \
            || { echo "::error::Release candidate promotion must only accept exact vX.Y.Z-rc.N tags."; exit 1; }
          grep -F 'docker buildx imagetools inspect "$source_image"' .github/workflows/build-push.yml >/dev/null \
            || { echo "::error::Promotion must verify every source sha-* image before moving channel tags."; exit 1; }
          grep -F 'needs: promote' .github/workflows/build-push.yml >/dev/null \
            || { echo "::error::Release notes must run after channel promotion."; exit 1; }

          if awk '
            /if \[ "\$status" = "200" \]/ { in_patch=1 }
            /elif \[ "\$status" = "404" \]/ { in_patch=0 }
            in_patch && /(draft[[:space:]]*:[[:space:]]*false|prerelease[[:space:]]*:[[:space:]]*false)/ { print FILENAME ":" FNR ":" $0; found=1 }
            END { exit found ? 0 : 1 }
          ' .github/workflows/build-push.yml; then
            echo "::error::Existing release PATCH must preserve draft/prerelease state."
            exit 1
          fi

          if awk '
            /This script must be run as root/ { after_root=1 }
            after_root && /assert_prebuilt_image_platform_supported/ { guard_seen=1 }
            after_root && !guard_seen && /(install_docker|systemctl enable --now docker)/ { print FILENAME ":" FNR ":" $0; found=1 }
            END { exit found ? 0 : 1 }
          ' setup.sh; then
            echo "::error::Prebuilt platform guard must run before Docker install or daemon startup."
            exit 1
          fi

          if awk '
            /^cmd_update\(\) \{/ { in_update=1; pause_seen=0; next }
            /^# .*debug subcommand/ { in_update=0 }
            in_update && /pause_lancache_convergence_for_update/ { pause_seen=1 }
            in_update && !pause_seen && /(cmd_backup|git -C|cp "\$install_dir\/deploy\/quickstart\/docker-compose\.yml"|migrate_env_for_update|validate_compose_config|docker[[:space:]]+compose([[:space:]]+--env-file[[:space:]]+[^[:space:]]+)?[[:space:]]+(pull|up))/ { print FILENAME ":" FNR ":" $0; found=1 }
            END { exit found ? 0 : 1 }
          ' setup.sh; then
            echo "::error::setup.sh update must pause the convergence timer before mutating local install state."
            exit 1
          fi
          grep -F 'systemctl stop lancache-converge.service' setup.sh >/dev/null \
            || { echo "::error::setup.sh update must stop any active convergence service before mutating local install state."; exit 1; }
          if ! awk '
            /if ! \( cmd_backup --config "\$install_dir" \); then/ { in_backup_failure=1; next }
            in_backup_failure && /resume_lancache_convergence_after_update true/ { resume_seen=1 }
            in_backup_failure && /die "Pre-update rollback backup failed/ { die_seen=1; in_backup_failure=0 }
            END { exit resume_seen && die_seen ? 0 : 1 }
          ' setup.sh; then
            echo "::error::setup.sh update must restore the convergence timer when the rollback backup fails before update mutations."
            exit 1
          fi
          if awk '
            /^cmd_update_ip\(\) \{/ { in_update_ip=1; guard_seen=0; next }
            /^# .*backup subcommand/ { in_update_ip=0 }
            in_update_ip && /assert_prebuilt_image_platform_supported/ { guard_seen=1 }
            in_update_ip && !guard_seen && /(sed -i|docker compose -f)/ { print FILENAME ":" FNR ":" $0; found=1 }
            END { exit found ? 0 : 1 }
          ' setup.sh; then
            echo "::error::setup.sh update-ip must check prebuilt platform support before mutating local configuration."
            exit 1
          fi
          if awk '
            /^  shellcheck:/ { in_shellcheck=1; next }
            /^  [[:alnum:]_-]+:/ { in_shellcheck=0 }
            in_shellcheck && /^[[:space:]]+container:/ { print FILENAME ":" FNR ":" $0; found=1 }
            END { exit found ? 0 : 1 }
          ' .github/workflows/build-push.yml; then
            echo "::error::shellcheck job must not checkout inside a root-running job container."
            exit 1
          fi
          grep -F -- "--user \"\$(id -u):\$(id -g)\"" .github/workflows/build-push.yml >/dev/null \
            || { echo "::error::shellcheck container must run with the runner UID/GID."; exit 1; }
          grep -F -- "-v \"\$PWD:/work:ro\"" .github/workflows/build-push.yml >/dev/null \
            || { echo "::error::shellcheck container must mount the workspace read-only."; exit 1; }
          grep -F 'lancache-ng-build-tools-validation:${GITHUB_SHA:-local}-${GITHUB_RUN_ID:-local}-${GITHUB_RUN_ATTEMPT:-1}' scripts/select-build-tools-image.sh >/dev/null \
            || { echo "::error::Compose validation fallback image tag must be scoped to the workflow run and attempt."; exit 1; }
          grep -F -- "--env DOCKER_CONFIG=/tmp/.docker" .github/workflows/build-push.yml >/dev/null \
            || { echo "::error::Compose validation must set a writable Docker config directory inside the build-tools container."; exit 1; }
          grep -F -- "--env HOME=/tmp" .github/workflows/build-push.yml >/dev/null \
            || { echo "::error::Compose validation must set a writable HOME inside the build-tools container."; exit 1; }
          # Acceleration-infrastructure policy checks start here.
          # They validate the sccache/distcc contract, not product correctness.
          if grep -RIn 'RUSTC_WRAPPER:[[:space:]]*""' .github/workflows; then
            echo "::error::Acceleration infrastructure checks must not disable RUSTC_WRAPPER directly; use cargo-with-sccache-fallback for controlled fallback."
            exit 1
          fi
          grep -F 'rpm_legacy_docker_package_list()' setup.sh >/dev/null \
            || { echo "::error::setup.sh must keep a shared legacy Docker RPM conflict list."; exit 1; }
          grep -F 'docker-selinux' setup.sh >/dev/null \
            && grep -F 'docker-engine-selinux' setup.sh >/dev/null \
            || { echo "::error::Fedora/RHEL Docker RPM conflict guard must include legacy Docker selinux packages."; exit 1; }
          grep -F 'docker-ce|docker-ce-cli|containerd.io|docker-buildx-plugin|docker-compose-plugin)' setup.sh >/dev/null \
            || { echo "::error::Installing only docker-compose-plugin on RPM hosts must still run the Docker/Podman conflict guard."; exit 1; }
          if awk '
            /\[\[ "\$os_id" = fedora \]\]/ { in_fedora=1; next }
            /^    else$/ { in_fedora=0 }
            in_fedora && /( podman([[:space:]\\]|$)| runc([[:space:]\\]|$))/ { print FILENAME ":" FNR ":" $0; found=1 }
            END { exit found ? 0 : 1 }
          ' setup.sh; then
            echo "::error::Fedora Docker conflict guard must not block stock podman or runc."
            exit 1
          fi
          if grep -RIn -- 'timeout --foreground' .github/actions/cargo-with-sccache-fallback/action.yml; then
            echo "::error::cargo-with-sccache-fallback must not use timeout --foreground because it can leave Cargo child processes alive and bypass the fallback."
            exit 1
          fi
          for workflow in .github/workflows/build-push.yml .github/workflows/codeql.yml; do
            grep -F 'dist-scheduler-url:' "$workflow" >/dev/null \
              && grep -F 'SCCACHE_DIST_SCHEDULER_URL' "$workflow" >/dev/null \
              || { echo "::error::$workflow must wire SCCACHE_DIST_SCHEDULER_URL into configure-rust-sccache."; exit 1; }
            grep -F 'dist-auth-token:' "$workflow" >/dev/null \
              && grep -F 'SCCACHE_DIST_AUTH_TOKEN' "$workflow" >/dev/null \
              || { echo "::error::$workflow must wire SCCACHE_DIST_AUTH_TOKEN into configure-rust-sccache."; exit 1; }
          done
          grep -F 'sccache_dist_config=' .github/workflows/build-push.yml >/dev/null \
            || { echo "::error::Docker Rust builds must pass sccache-dist config through a BuildKit secret."; exit 1; }
          grep -F 'distcc_potential_hosts=' .github/workflows/build-push.yml >/dev/null \
            || { echo "::error::Docker Rust builds must pass distcc hosts through a BuildKit secret."; exit 1; }
          if awk '
            /^      - name: Prepare Rust acceleration secret files$/ { in_block=1; saw_pr_gate=0; next }
            in_block && /^      - name: / {
              if (!saw_pr_gate) {
                print FILENAME ":" FNR ":" "missing pull_request gate in Rust BuildKit secret preparation."
                bad=1
              }
              in_block=0
              next
            }
            in_block && /github.event_name != '\''pull_request'\''/ { saw_pr_gate=1 }
            in_block && /github.event.pull_request.head.repo.full_name == github.repository/ { print FILENAME ":" FNR ":" $0; bad=1 }
            END {
              if (in_block && !saw_pr_gate) bad=1
              exit bad ? 0 : 1
            }
          ' .github/workflows/build-push.yml; then
            echo "::error::Rust Docker builds must not prepare BuildKit secret-files on pull_request runs."
            exit 1
          fi
          grep -F 'uses: ./.github/actions/rust-acceleration-preflight' .github/workflows/build-push.yml >/dev/null \
            || { echo "::error::Rust acceleration infrastructure checks must run an external preflight outside BuildKit cache."; exit 1; }
          if grep -E '^[[:space:]]+RUST_ACCELERATION_NETWORK:[[:space:]]+host[[:space:]]*$' .github/workflows/build-push.yml >/dev/null; then
            echo "::error::Acceleration infrastructure network must not be globally pinned to host; trusted secret-backed builds select host per job."
            exit 1
          fi
          grep -E '^[[:space:]]+RUST_ACCELERATION_NETWORK:[[:space:]]+bridge[[:space:]]*$' .github/workflows/build-push.yml >/dev/null \
            || { echo "::error::Acceleration infrastructure network must default to bridge for untrusted and non-accelerated builds."; exit 1; }
          grep -F 'rust_network=bridge' .github/workflows/build-push.yml >/dev/null \
            && grep -F 'buildx_network=default' .github/workflows/build-push.yml >/dev/null \
            && grep -F 'rust_network=host' .github/workflows/build-push.yml >/dev/null \
