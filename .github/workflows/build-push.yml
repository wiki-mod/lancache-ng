name: Build & Push

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: find . -name "*.sh" -not -path "./.git/*" -not -path "*/target/*" -print0 | xargs -0 --no-run-if-empty shellcheck --severity=warning

  validate-compose:
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate compose files
        run: |
          docker compose -f deploy/quickstart/docker-compose.yml --profile ssl config --quiet
          docker compose -f deploy/dev/docker-compose.yml config --quiet
          docker compose -f deploy/prod/docker-compose.yml config --quiet
          docker compose -f deploy/secondary/docker-compose.yml config --quiet

  rust-quality:
    runs-on: [self-hosted, linux, lancache]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: dns/nats-subscriber
            path: services/dns/nats-subscriber
            test_command: cargo test --locked --manifest-path services/dns/nats-subscriber/Cargo.toml
          - service: ui
            path: services/ui
            test_command: cargo test --locked --manifest-path services/ui/Cargo.toml
          - service: watchdog
            path: services/watchdog
            test_command: |
              bash -n services/watchdog/watchdog.sh
              test -x services/watchdog/watchdog.sh
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        if: matrix.service != 'watchdog'
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ matrix.path }}/target
          key: ${{ runner.os }}-cargo-quality-${{ matrix.service }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.path)) }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: cargo fmt --check (${{ matrix.service }})
        run: cargo fmt --manifest-path ${{ matrix.path }}/Cargo.toml -- --check
      - name: cargo check with warnings denied (${{ matrix.service }})
        env:
          RUSTC_WRAPPER: ""
          RUSTFLAGS: "-D warnings"
        run: cargo check --locked --all-targets --manifest-path ${{ matrix.path }}/Cargo.toml
      - name: cargo clippy with warnings denied (${{ matrix.service }})
        env:
          RUSTC_WRAPPER: ""
        run: cargo clippy --locked --all-targets --manifest-path ${{ matrix.path }}/Cargo.toml -- -D warnings

  test:
    needs: [validate-compose, rust-quality]
    runs-on: [self-hosted, linux, lancache]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: dns/nats-subscriber
            path: services/dns/nats-subscriber
          - service: ui
            path: services/ui
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ matrix.path }}/target
          key: ${{ runner.os }}-cargo-test-${{ matrix.service }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.path)) }}
      - name: Install Rust toolchain
        if: matrix.service != 'watchdog'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - name: test (${{ matrix.service }})
        env:
          RUSTC_WRAPPER: ""
        run: ${{ matrix.test_command }}

  cargo-audit:
    needs: validate-compose
    runs-on: [self-hosted, linux, lancache]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: dns/nats-subscriber
            path: services/dns/nats-subscriber
          - service: ui
            path: services/ui
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        id: cache-cargo-audit
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-cargo-audit-0.21
      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --version ">=0.21" --locked
      - name: Audit Rust dependencies (${{ matrix.service }})
        run: cargo audit --deny warnings --file ${{ matrix.path }}/Cargo.lock

  container-scan:
    # Full image vulnerability scans are intentionally limited to trusted refs.
    # They build every service image and routinely dominate PR runtime on
    # self-hosted runners; PRs still exercise Dockerfiles in the build job below.
    if: github.event_name != 'pull_request'
    needs: validate-compose
    runs-on: [self-hosted, linux, lancache]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: proxy
            context: services/proxy
          - service: dns
            context: services/dns
          - service: watchdog
            context: services/watchdog
          - service: dhcp
            context: services/dhcp
          - service: dhcp-proxy
            context: services/dhcp-proxy
          - service: ui
            context: services/ui
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build local scan image
        run: docker build --pull --platform linux/amd64 -t lancache-ng-scan:${{ matrix.service }}-${{ github.run_id }} ${{ matrix.context }}
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: lancache-ng-scan:${{ matrix.service }}-${{ github.run_id }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Remove scan image
        if: always()
        run: docker rmi lancache-ng-scan:${{ matrix.service }}-${{ github.run_id }} || true

  build:
    needs: [validate-compose, test, cargo-audit]
    runs-on: [self-hosted, linux, lancache]
    timeout-minutes: 150
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: proxy
            context: services/proxy
          - service: dns
            context: services/dns
          - service: watchdog
            context: services/watchdog
          - service: dhcp
            context: services/dhcp
          - service: dhcp-proxy
            context: services/dhcp-proxy
          - service: ui
            context: services/ui

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Prepare local Buildx cache
        env:
          BUILDX_CACHE_ROOT: ${{ runner.temp }}/lancache-ng-buildx-cache
        run: |
          mkdir -p "$BUILDX_CACHE_ROOT/${{ matrix.service }}"
          rm -rf "$BUILDX_CACHE_ROOT/${{ matrix.service }}-new"

      - name: Build and push
        id: build
        timeout-minutes: 60
        continue-on-error: ${{ github.event_name != 'pull_request' }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=local,src=${{ runner.temp }}/lancache-ng-buildx-cache/${{ matrix.service }}
          cache-to: type=local,dest=${{ runner.temp }}/lancache-ng-buildx-cache/${{ matrix.service }}-new,mode=max

      - name: Retry Build and push
        id: retry-build
        if: github.event_name != 'pull_request' && steps.build.outcome == 'failure'
        timeout-minutes: 60
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=local,src=${{ runner.temp }}/lancache-ng-buildx-cache/${{ matrix.service }}
          cache-to: type=local,dest=${{ runner.temp }}/lancache-ng-buildx-cache/${{ matrix.service }}-new,mode=max

      - name: Rotate local Buildx cache
        if: always() && (steps.build.outcome == 'success' || steps.build.outcome == 'failure')
        env:
          BUILDX_CACHE_ROOT: ${{ runner.temp }}/lancache-ng-buildx-cache
        run: |
          rm -rf "$BUILDX_CACHE_ROOT/${{ matrix.service }}"
          if [ -d "$BUILDX_CACHE_ROOT/${{ matrix.service }}-new" ]; then
            mv "$BUILDX_CACHE_ROOT/${{ matrix.service }}-new" "$BUILDX_CACHE_ROOT/${{ matrix.service }}"
          fi

      - name: Attest image build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          subject-digest: ${{ steps.retry-build.outputs.digest || steps.build.outputs.digest }}
          push-to-registry: true
