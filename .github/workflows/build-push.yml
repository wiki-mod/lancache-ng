name: Build & Push

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: find . -name "*.sh" -not -path "./.git/*" -not -path "*/target/*" -print0 | xargs -0 --no-run-if-empty shellcheck --severity=warning

  validate-compose:
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate compose files
        env:
          CACHE_DIR_STANDARD: /tmp/lancache-standard
          CACHE_INACTIVE: 365d
          CACHE_MAX_SIZE: 10g
          CACHE_MEM_MB: "256"
          CACHE_SLICE_SIZE: 1m
          CACHE_VALID_ANY: 1h
          CACHE_VALID_HIT: 30d
          DDNS_TSIG_KEY: ci-ddns-tsig-key
          IP_SSL: 127.0.0.2
          IP_STANDARD: 127.0.0.1
          KEA_CTRL_TOKEN: ci-kea-token
          NATS_CONSUMER: ci-secondary
          NATS_LOCAL_TOKEN: ci-nats-local-token
          NATS_TOKEN: ci-nats-token
          NATS_URL: nats://127.0.0.1:4222
          NGINX_UPSTREAM_RESOLVER: 1.1.1.1
          PDNS_API_KEY: ci-pdns-api-key
          PROXY_IP: 127.0.0.1
          SECONDARY_REGISTRATION_TOKEN: ci-secondary-registration-token
          SSL_CACHE_MAX_GB: "10"
          STANDARD_CACHE_MAX_GB: "10"
        run: |
          set -euo pipefail

          validate_compose() {
            local output

            if ! output="$(docker compose "$@" config --quiet 2>&1)"; then
              printf '%s\n' "$output"
              return 1
            fi

            if printf '%s\n' "$output" | grep -Eqi '(^|[[:space:]])(warn|warning|level=warning)'; then
              printf 'docker compose emitted warnings; treating warnings as errors:\n%s\n' "$output"
              return 1
            fi

            if [ -n "$output" ]; then
              printf '%s\n' "$output"
            fi
          }

          validate_compose -f deploy/quickstart/docker-compose.yml --profile ssl
          validate_compose -f deploy/dev/docker-compose.yml
          validate_compose -f deploy/prod/docker-compose.yml
          validate_compose -f deploy/secondary/docker-compose.yml

  dns_rust_quality:
    name: rust-quality (dns/nats-subscriber)
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/dns-nats-subscriber'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/dns-nats-subscriber'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
      - name: cargo fmt --check (dns/nats-subscriber)
        run: cargo fmt --manifest-path services/dns/nats-subscriber/Cargo.toml -- --check
      - name: cargo check with warnings denied (dns/nats-subscriber)
        uses: ./.github/actions/cargo-with-sccache-fallback
        env:
          RUSTFLAGS: "-D warnings"
        with:
          command: cargo check --locked --all-targets --manifest-path services/dns/nats-subscriber/Cargo.toml
      - name: cargo clippy with warnings denied (dns/nats-subscriber)
        timeout-minutes: 15
        env:
          RUSTC_WRAPPER: ""
        run: cargo clippy --locked --all-targets --manifest-path services/dns/nats-subscriber/Cargo.toml -- -D warnings

  ui_rust_quality:
    name: rust-quality (ui)
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/ui'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/ui'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
      - name: cargo fmt --check (ui)
        run: cargo fmt --manifest-path services/ui/Cargo.toml -- --check
      - name: cargo check with warnings denied (ui)
        uses: ./.github/actions/cargo-with-sccache-fallback
        env:
          RUSTFLAGS: "-D warnings"
        with:
          command: cargo check --locked --all-targets --manifest-path services/ui/Cargo.toml
      - name: cargo clippy with warnings denied (ui)
        timeout-minutes: 15
        env:
          RUSTC_WRAPPER: ""
        run: cargo clippy --locked --all-targets --manifest-path services/ui/Cargo.toml -- -D warnings

  dns_test:
    name: test (dns/nats-subscriber)
    needs: [validate-compose, dns_rust_quality]
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/dns-nats-subscriber'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/dns-nats-subscriber'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
      - name: test (dns/nats-subscriber)
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo test --locked --manifest-path services/dns/nats-subscriber/Cargo.toml

  ui_test:
    name: test (ui)
    needs: [validate-compose, ui_rust_quality]
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/ui'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/ui'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
      - name: test (ui)
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo test --locked --manifest-path services/ui/Cargo.toml

  watchdog_test:
    name: test (watchdog)
    needs: validate-compose
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: test (watchdog)
        run: |
          bash -n services/watchdog/watchdog.sh
          test -x services/watchdog/watchdog.sh

  dns_cargo_audit:
    name: cargo-audit (dns/nats-subscriber)
    needs: validate-compose
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/dns-nats-subscriber'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/dns-nats-subscriber'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: cache-cargo-audit
        with:
          path: |
            ${{ runner.temp }}/cargo-home/dns-nats-subscriber/bin/cargo-audit
            ${{ runner.temp }}/cargo-home/dns-nats-subscriber/.crates.toml
            ${{ runner.temp }}/cargo-home/dns-nats-subscriber/.crates2.json
          key: ${{ runner.os }}-cargo-audit-0.21-dns-nats-subscriber
      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo install cargo-audit --version ">=0.21" --locked
      - name: Audit Rust dependencies (dns/nats-subscriber)
        run: cargo audit --deny warnings --file services/dns/nats-subscriber/Cargo.lock

  ui_cargo_audit:
    name: cargo-audit (ui)
    needs: validate-compose
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/ui'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/ui'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: cache-cargo-audit
        with:
          path: |
            ${{ runner.temp }}/cargo-home/ui/bin/cargo-audit
            ${{ runner.temp }}/cargo-home/ui/.crates.toml
            ${{ runner.temp }}/cargo-home/ui/.crates2.json
          key: ${{ runner.os }}-cargo-audit-0.21-ui
      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo install cargo-audit --version ">=0.21" --locked
      - name: Audit Rust dependencies (ui)
        run: cargo audit --deny warnings --file services/ui/Cargo.lock

  container-scan:
    # Full image vulnerability scans are intentionally limited to trusted refs.
    # They build every service image and routinely dominate PR runtime on
    # self-hosted runners; PRs still exercise Dockerfiles in the build job below.
    if: github.event_name != 'pull_request'
    needs: validate-compose
    runs-on: [self-hosted, linux, lancache]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: proxy
            context: services/proxy
          - service: dns
            context: services/dns
            rust: true
          - service: watchdog
            context: services/watchdog
          - service: dhcp
            context: services/dhcp
          - service: dhcp-proxy
            context: services/dhcp-proxy
          - service: ui
            context: services/ui
            rust: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prepare sccache Redis secret file
        if: matrix.rust == true
        id: sccache-secret
        env:
          SCCACHE_REDIS_MODE: ${{ vars.SCCACHE_REDIS_MODE }}
          SCCACHE_REDIS_URL: ${{ secrets.SCCACHE_REDIS_URL }}
        run: |
          set -euo pipefail

          mode="${SCCACHE_REDIS_MODE:-required}"

          case "$mode" in
            required|optional|off)
              ;;
            *)
              echo "::error::SCCACHE_REDIS_MODE must be one of: required, optional, off."
              exit 1
              ;;
          esac

          if [ "$mode" = "off" ]; then
            echo "Redis-backed sccache is disabled by SCCACHE_REDIS_MODE=off."
            exit 0
          fi

          if [ -z "$SCCACHE_REDIS_URL" ]; then
            if [ "$mode" = "optional" ]; then
              echo "Skipping Redis-backed sccache because SCCACHE_REDIS_URL is empty and SCCACHE_REDIS_MODE=optional."
              exit 0
            fi

            echo "::error::SCCACHE_REDIS_URL repository secret is required for trusted Rust image scans so sccache can use Redis."
            exit 1
          fi

          umask 077
          printf '%s' "$SCCACHE_REDIS_URL" > "${{ runner.temp }}/sccache-redis-url"
          echo "file=${{ runner.temp }}/sccache-redis-url" >> "$GITHUB_OUTPUT"

      - name: Build local scan image
        env:
          SCCACHE_SECRET_FILE: ${{ steps.sccache-secret.outputs.file }}
        run: |
          set -euo pipefail

          secret_args=()
          if [ -n "$SCCACHE_SECRET_FILE" ]; then
            secret_args+=(--secret "id=sccache_redis_url,src=$SCCACHE_SECRET_FILE")
          fi

          DOCKER_BUILDKIT=1 docker build \
            --pull \
            --platform linux/amd64 \
            "${secret_args[@]}" \
            -t lancache-ng-scan:${{ matrix.service }}-${{ github.run_id }} \
            ${{ matrix.context }}
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: lancache-ng-scan:${{ matrix.service }}-${{ github.run_id }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Remove scan image
        if: always()
        run: docker rmi lancache-ng-scan:${{ matrix.service }}-${{ github.run_id }} || true

  build:
    needs:
      - shellcheck
      - validate-compose
      - dns_test
      - ui_test
      - watchdog_test
      - dns_cargo_audit
      - ui_cargo_audit
      - container-scan
    if: >-
      ${{
        always() &&
        needs.shellcheck.result == 'success' &&
        needs['validate-compose'].result == 'success' &&
        needs.dns_test.result == 'success' &&
        needs.ui_test.result == 'success' &&
        needs.watchdog_test.result == 'success' &&
        needs.dns_cargo_audit.result == 'success' &&
        needs.ui_cargo_audit.result == 'success' &&
        (github.event_name == 'pull_request' || needs['container-scan'].result == 'success')
      }}
    runs-on: [self-hosted, linux, lancache]
    timeout-minutes: 150
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: proxy
            context: services/proxy
          - service: dns
            context: services/dns
            rust: true
          - service: watchdog
            context: services/watchdog
          - service: dhcp
            context: services/dhcp
          - service: dhcp-proxy
            context: services/dhcp-proxy
          - service: ui
            context: services/ui
            rust: true

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Prepare local Buildx cache
        id: buildx-cache
        env:
          BUILDX_CACHE_ROOT: /var/tmp/lancache-ng-buildx-cache
          BUILDX_CACHE_DEST: ${{ runner.temp }}/lancache-ng-buildx-cache/${{ matrix.service }}-new
        run: |
          set -euo pipefail

          mkdir -p "$BUILDX_CACHE_ROOT/${{ matrix.service }}"
          rm -rf "$BUILDX_CACHE_DEST"
          mkdir -p "$(dirname "$BUILDX_CACHE_DEST")"

          {
            echo "cache-from=$BUILDX_CACHE_ROOT/${{ matrix.service }}"
            echo "cache-to=$BUILDX_CACHE_DEST"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare sccache Redis secret file
        if: >-
          ${{
            matrix.rust == true &&
            (
              github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository
            )
          }}
        id: sccache-secret
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPOSITORY: ${{ github.repository }}
          SCCACHE_REDIS_MODE: ${{ vars.SCCACHE_REDIS_MODE }}
          SCCACHE_REDIS_URL: ${{ secrets.SCCACHE_REDIS_URL }}
        run: |
          set -euo pipefail

          mode="${SCCACHE_REDIS_MODE:-required}"

          case "$mode" in
            required|optional|off)
              ;;
            *)
              echo "::error::SCCACHE_REDIS_MODE must be one of: required, optional, off."
              exit 1
              ;;
          esac

          if [ "$mode" = "off" ]; then
            echo "Redis-backed sccache is disabled by SCCACHE_REDIS_MODE=off."
            exit 0
          fi

          if [ "$EVENT_NAME" = "pull_request" ] && [ "$HEAD_REPOSITORY" != "$BASE_REPOSITORY" ]; then
            echo "Skipping Redis-backed sccache for an untrusted fork pull request."
            exit 0
          fi

          if [ -z "$SCCACHE_REDIS_URL" ]; then
            if [ "$mode" = "optional" ]; then
              echo "Skipping Redis-backed sccache because SCCACHE_REDIS_URL is empty and SCCACHE_REDIS_MODE=optional."
              exit 0
            fi

            echo "::error::SCCACHE_REDIS_URL repository secret is required for trusted Rust image builds so sccache can use Redis."
            exit 1
          fi

          umask 077
          printf '%s' "$SCCACHE_REDIS_URL" > "${{ runner.temp }}/sccache-redis-url"
          echo "secret-files=sccache_redis_url=${{ runner.temp }}/sccache-redis-url" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        timeout-minutes: 60
        continue-on-error: true
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ matrix.context }}
          secret-files: ${{ steps.sccache-secret.outputs.secret-files }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=local,src=${{ steps.buildx-cache.outputs.cache-from }}
          cache-to: type=local,dest=${{ steps.buildx-cache.outputs.cache-to }},mode=max

      - name: Retry Build and push
        id: retry-build
        if: steps.build.outcome == 'failure'
        timeout-minutes: 60
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ matrix.context }}
          secret-files: ${{ steps.sccache-secret.outputs.secret-files }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=local,src=${{ steps.buildx-cache.outputs.cache-from }}
          cache-to: type=local,dest=${{ steps.buildx-cache.outputs.cache-to }},mode=max

      - name: Rotate local Buildx cache
        if: >-
          ${{
            always() &&
            (
              steps.build.outcome == 'success' ||
              steps.retry-build.outcome == 'success'
            )
          }}
        env:
          BUILDX_CACHE_ROOT: /var/tmp/lancache-ng-buildx-cache
          BUILDX_CACHE_DEST: ${{ steps.buildx-cache.outputs.cache-to }}
        run: |
          set -euo pipefail

          lock_dir="$BUILDX_CACHE_ROOT/${{ matrix.service }}.lock"
          locked=0

          for _ in $(seq 1 60); do
            if mkdir "$lock_dir" 2>/dev/null; then
              locked=1
              break
            fi
            sleep 2
          done

          if [ "$locked" -ne 1 ]; then
            echo "::error::Timed out waiting for Buildx cache lock: $lock_dir"
            exit 1
          fi

          cleanup_lock() {
            rmdir "$lock_dir"
          }
          trap cleanup_lock EXIT

          if [ -d "$BUILDX_CACHE_DEST" ]; then
            rm -rf "$BUILDX_CACHE_ROOT/${{ matrix.service }}"
            mv "$BUILDX_CACHE_DEST" "$BUILDX_CACHE_ROOT/${{ matrix.service }}"
          fi

      - name: Attest image build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          subject-digest: ${{ steps.retry-build.outputs.digest || steps.build.outputs.digest }}
          push-to-registry: true
