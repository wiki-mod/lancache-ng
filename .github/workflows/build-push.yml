  rust_coverage:
    name: coverage (Rust)
    needs: [validate-compose, dns_test, ui_test, detect-changes]
    if: >-
      ${{
        always() &&
        needs['validate-compose'].result == 'success' &&
        (needs.dns_test.result == 'success' || needs.dns_test.result == 'skipped') &&
        (needs.ui_test.result == 'success' || needs.ui_test.result == 'skipped') &&
        (
          github.event_name != 'pull_request' ||
          needs['detect-changes'].outputs.dns_rust == 'true' ||
          needs['detect-changes'].outputs.ui == 'true' ||
          needs['detect-changes'].outputs.workflow == 'true'
        )
      }}
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    # Job-level concurrency (#891, extending #888/#892's proven build/
    # container-scan pattern): rust_coverage is on the scarce self-hosted
    # lancache-heavy pool, same as build/container-scan, so reclaiming a
    # superseded commit's coverage run matters for real capacity, not just
    # consistency. Safe to cancel mid-flight: it is NOT one of
    # ci_scope_policy's `needs` (unlike dns_test/ui_test/dns_cargo_audit/
    # ui_cargo_audit, deliberately excluded from this pattern -- see
    # ci_scope_policy's own comment below), so nothing hard-asserts its
    # result. Its only consumer, publish_coverage_badge, gates with
    # `!cancelled() && needs.rust_coverage.result == 'success'` and only runs
    # on push events -- a cancelled rust_coverage cleanly skips the badge
    # publish instead of erroring.
    concurrency:
      group: >-
        ${{
          (github.event_name == 'workflow_dispatch' || github.run_attempt != '1') &&
          format('{0}-rust-coverage-{1}-{2}', github.workflow, github.ref, github.run_id) ||
          format('{0}-rust-coverage-{1}', github.workflow, github.ref)
        }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # This job resolves its own build-tools image rather than reusing
      # validate-compose's exported build_tools_image output. That output is
      # deliberately locked to the published, digest-qualified image (never a
      # branch-local fallback) because dns_cargo_audit/ui_cargo_audit need a
      # reproducible, previously-audited image. Coverage measurement has no
      # such reproducibility requirement, so it can accept a branch-local
      # rebuild when a PR's own Dockerfile change (like adding tarpaulin)
      # hasn't been published to ghcr.io yet.
      - name: Resolve build-tools image (with tarpaulin required)
        env:
          EXTRA_REQUIRED_TOOLS: "cargo-tarpaulin bc"
          GITHUB_EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail
          image="$(bash scripts/select-build-tools-image.sh)"
          printf 'BUILD_TOOLS_IMAGE=%s\n' "$image" >> "$GITHUB_ENV"
      # Coverage output must land on a writable host path: the repo checkout
      # itself is bind-mounted read-only into the build-tools container below,
      # matching the dns_cargo_audit/ui_cargo_audit pattern.
      - name: Prepare writable coverage output directories
        run: |
          set -euo pipefail
          mkdir -p coverage-dns coverage-ui
      - name: Run coverage (dns/nats-subscriber)
        run: |
          set -euo pipefail

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e CARGO_HOME=/tmp/cargo-home \
            -e CARGO_TARGET_DIR=/tmp/target-dns \
            -v "$PWD:/work" \
            -v "$PWD/coverage-dns:/coverage-dns" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash -c 'set -euo pipefail
              cargo tarpaulin \
                --engine llvm \
                --manifest-path services/dns/nats-subscriber/Cargo.toml \
                --locked \
                --timeout 300 \
                --out json \
                --output-dir /coverage-dns'
      - name: Run coverage (ui)
        run: |
          set -euo pipefail

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e CARGO_HOME=/tmp/cargo-home \
            -e CARGO_TARGET_DIR=/tmp/target-ui \
            -v "$PWD:/work" \
            -v "$PWD/coverage-ui:/coverage-ui" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash -c 'set -euo pipefail
              cargo tarpaulin \
                --engine llvm \
                --manifest-path services/ui/Cargo.toml \
                --locked \
                --timeout 300 \
                --out json \
                --output-dir /coverage-ui'
      - name: Merge coverage reports and check threshold
        id: coverage
        run: |
          set -euo pipefail

          mkdir -p coverage-badge
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "$PWD:/work:ro" \
            -v "$PWD/coverage-badge:/coverage-badge" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash -c 'set -euo pipefail

              # Extract coverage percentages from JSON reports inside the
              # selected build-tools image, not from incidental host binaries.
              dns_coverage=$(jq -r ".coverage" coverage-dns/tarpaulin-report.json 2>/dev/null || echo "0")
              ui_coverage=$(jq -r ".coverage" coverage-ui/tarpaulin-report.json 2>/dev/null || echo "0")

              echo "DNS coverage: ${dns_coverage}%"
              echo "UI coverage: ${ui_coverage}%"

              # Per-crate thresholds, not a shared minimum: the two crates'"'"' real
              # coverage differs by an order of magnitude (measured on CI:
              # ui ~38.6%, nats-subscriber ~0%, since nats-subscriber'"'"'s 4 tests
              # only cover its data model, not its subscribe/forward logic --
              # tracked in #504). A single shared "minimum" threshold would
              # either block ui'"'"'s real coverage from ever mattering (if set low
              # enough for nats-subscriber to pass) or permanently fail
              # nats-subscriber (if set for ui'"'"'s level). Each crate'"'"'s threshold
              # is raised independently as that crate gains real tests.
              ui_threshold=35
              dns_threshold=0

              echo "UI threshold: ${ui_threshold}%"
              echo "DNS threshold: ${dns_threshold}% (tracked gap: #504)"

              failed=0
              if (( $(echo "$ui_coverage < $ui_threshold" | bc -l) )); then
                echo "::error::UI coverage ${ui_coverage}% is below threshold of ${ui_threshold}%"
                failed=1
              fi
              if (( $(echo "$dns_coverage < $dns_threshold" | bc -l) )); then
                echo "::error::DNS coverage ${dns_coverage}% is below threshold of ${dns_threshold}%"
                failed=1
              fi

              if [[ "$failed" -eq 1 ]]; then
                exit 1
              fi

              # Badge generation reuses this same containerized jq instead of
              # assuming a host-installed jq, matching why the coverage
              # extraction above already runs in here (issue #566).
              ui_coverage_display="$(printf "%.2f" "$ui_coverage")"
              dns_coverage_display="$(printf "%.2f" "$dns_coverage")"
              badge_message="ui ${ui_coverage_display}% / dns ${dns_coverage_display}%"
              badge_color=yellow
              if awk -v ui="$ui_coverage" -v dns="$dns_coverage" "BEGIN { exit !(ui >= 80 && dns >= 80) }"; then
                badge_color=brightgreen
              fi

              jq -n \
                --arg message "$badge_message" \
                --arg color "$badge_color" \
                "{schemaVersion: 1, label: \"rust coverage\", message: \$message, color: \$color}" \
                > /coverage-badge/rust.json

              {
                printf "ui=%s\n" "$ui_coverage_display"
                printf "dns=%s\n" "$dns_coverage_display"
                printf "message=%s\n" "$badge_message"
              } > /coverage-badge/output.env

              echo "Coverage check passed"'

          cat coverage-badge/output.env >> "$GITHUB_OUTPUT"
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rust-coverage-reports
          path: |
            coverage-dns/tarpaulin-report.json
            coverage-ui/tarpaulin-report.json
          retention-days: 30
      # The badge JSON is handed off as an artifact rather than pushed from this
      # job directly: this job runs on every trigger including same-repo pull_request
      # runs that execute PR-controlled test code (cargo tarpaulin), and a job-level
      # `permissions: contents: write` would apply to that untrusted code too --
      # GitHub Actions has no step-level permissions to scope the write down to just
      # the publish step. publish_coverage_badge below is the only job with write
      # access, and it only ever runs on trusted push events.
      - name: Upload coverage badge data
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rust-coverage-badge
          path: coverage-badge/rust.json
          retention-days: 1

  publish_coverage_badge:
    # Split out of rust_coverage (see the comment on its "Upload coverage badge
    # data" step) so the contents:write token this job needs is never present
    # during the coverage measurement steps that execute PR-controlled code.
    #
    # `if:` must start with an explicit status-check function, not a bare
    # `needs.rust_coverage.result == ...` -- same trap documented on promote's
    # `if:` below. A bare condition gets an implicit `&& success()` appended by
    # GitHub Actions, and that success() walks the WHOLE transitive needs graph
    # (publish_coverage_badge -> rust_coverage -> detect-changes, which is
    # `if: github.event_name == 'pull_request'` and therefore always skipped on
    # push), not just this job's own direct `needs: rust_coverage`. Confirmed
    # live: this job skipped on the actual push that merged it (run 29184177783)
    # because of exactly this.
    name: publish rust coverage badge
    needs: rust_coverage
    if: "!cancelled() && needs.rust_coverage.result == 'success' && github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')"
    runs-on: [self-hosted, linux, lancache, lancache-light]
    # Job-level concurrency, keyed per source ref: the top-level group (see
    # top of file) is run_id-suffixed for push events and therefore never
    # collides, so it no longer serializes same-branch badge publishes the
    # way its old, fully-global key used to. cancel-in-progress stays
    # false: this queues a second same-branch publish behind a running one
    # instead of racing it.
    #
    # Deliberately per-ref, NOT workflow-wide: a single shared group would
    # let unrelated branches queue behind each other, and GitHub's
    # concurrency queue only ever holds one pending job per group -- a
    # burst of publishes for OTHER branches can bump a given branch's
    # already-queued publish out of the queue entirely before it ever
    # starts, silently skipping that branch's badge update for this push
    # (see the "Queue badge publishes instead of replacing them" review
    # finding). Per-ref scoping gives every branch its own queue slot, so
    # branches can never bump each other out of it.
    #
    # What per-ref scoping does NOT do is stop two DIFFERENT branches'
    # publishes from running at the literal same time (they're in
    # different groups) and racing the shared `badges` branch -- that race
    # is instead handled below, by retrying the fetch/commit/push instead
    # of doing it once. A badge push is cheap/fast enough that neither the
    # per-branch queueing nor the retry loop is a capacity concern the way
    # cancellation is for `build`/`container-scan`.
    concurrency:
      group: ${{ github.workflow }}-badge-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download coverage badge data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1 (v4.3.0 still declared deprecated Node 20 runtime, see #802)
        with:
          name: rust-coverage-badge
          path: coverage-badge
      - name: Publish Rust coverage badge endpoint
        # BADGE_FILE is scoped per source branch (not one shared coverage/rust.json)
        # so pushes to master and to the active vX.Y.Z integration branch don't
        # overwrite each other's badge data -- this job's own concurrency group
        # (above) is per-ref, so it only serializes writes for the SAME branch;
        # the retry loop below is what protects the shared `badges` branch
        # itself from two DIFFERENT branches' publishes racing each other.
        env:
          BADGE_BRANCH: badges
          BADGE_FILE: coverage/rust-${{ github.ref_name }}.json
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          : "${GITHUB_TOKEN:?GITHUB_TOKEN is required to publish the coverage badge endpoint}"
          : "${BADGE_BRANCH:?BADGE_BRANCH is required}"
          : "${BADGE_FILE:?BADGE_FILE is required}"

          # Debounce/coalesce, same reasoning and mechanism as promote's own
          # branch-tip check (#777, see that job's comment): the per-ref badge
          # concurrency group above only serializes the ORDER two same-branch
          # publishes execute in, it does not guarantee the newer commit's
          # coverage wins. A slow, older run's rust_coverage can still finish
          # and reach this step after a faster, newer run for the same branch
          # already published -- without this check it would silently
          # fast-forward the badge file back to stale coverage. Re-resolve
          # the branch's current tip directly from the remote and skip as a
          # no-op if a newer commit has already landed; that newer commit's
          # own run (already published, or about to) is the correct source of
          # truth.
          current_tip="$(git ls-remote origin "$GITHUB_REF" | cut -f1)"
          if [[ -z "$current_tip" ]]; then
            echo "::error::Could not resolve the current tip of ${GITHUB_REF} via git ls-remote; refusing to publish the coverage badge blind."
            exit 1
          fi
          if [[ "$current_tip" != "$GITHUB_SHA" ]]; then
            echo "::notice::${GITHUB_REF} has already moved to ${current_tip} since this run was triggered for ${GITHUB_SHA}; skipping badge publish so the run already targeting the current tip publishes instead."
            exit 0
          fi

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          cp coverage-badge/rust.json "$tmp_dir/rust.json"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Retry loop, not a single fetch/commit/push: the concurrency group
          # above is per-ref, so it only prevents two publishes for the SAME
          # branch from racing each other -- it does nothing for a DIFFERENT
          # branch's publish landing on the shared `badges` branch between
          # this attempt's fetch and its own push (previously a single plain
          # `git push`, no retry/rebase, would just fail non-fast-forward in
          # that case). Re-fetching and rebuilding the commit on the fresh
          # tip each attempt makes that self-healing instead of a hard
          # failure, without needing a single global group that would let
          # unrelated branches bump each other out of GitHub's one-pending-
          # job-per-group queue (see the group's comment above).
          max_attempts=5
          attempt=1
          while :; do
            # Explicit destination refspec, not just "origin $BADGE_BRANCH": actions/checkout's
            # sparse fetch config only tracks the ref it originally checked out, so fetching a
            # different branch by name alone lands only in FETCH_HEAD, never in
            # refs/remotes/origin/$BADGE_BRANCH -- the show-ref check below would then always
            # report "not found" and take the orphan-branch path even when badges already exists,
            # and the final push would be rejected as non-fast-forward.
            git fetch origin "$BADGE_BRANCH:refs/remotes/origin/$BADGE_BRANCH" || true
            if git show-ref --verify --quiet "refs/remotes/origin/$BADGE_BRANCH"; then
              # -C (not --create): this is a self-hosted runner, so a local badges branch left
              # over from a previous job on the same workspace makes a plain --create fail with
              # "a branch named 'badges' already exists". -C resets it to origin's tip instead,
              # discarding any local commit left over from a previous failed attempt below.
              git switch -C "$BADGE_BRANCH" "origin/$BADGE_BRANCH"
            else
              git switch --orphan "$BADGE_BRANCH"
              git rm -rf . >/dev/null 2>&1 || true
            fi

            mkdir -p "$(dirname "$BADGE_FILE")"
            cp "$tmp_dir/rust.json" "$BADGE_FILE"
            git add "$BADGE_FILE"

            if git diff --cached --quiet; then
              echo "::notice::Rust coverage badge endpoint already up to date."
              exit 0
            fi

            git commit -m "chore: update rust coverage badge"
            if git push origin "$BADGE_BRANCH"; then
              break
            fi

            if (( attempt >= max_attempts )); then
              echo "::error::Failed to push the coverage badge endpoint to ${BADGE_BRANCH} after ${max_attempts} attempts (non-fast-forward every time)."
              exit 1
            fi
            echo "::notice::Push to ${BADGE_BRANCH} was rejected, likely by a concurrent publish for another branch -- refetching and retrying (attempt $((attempt + 1))/${max_attempts})."
            attempt=$((attempt + 1))
          done

  watchdog_test:
    # Watchdog has its own small shell runtime and therefore its own scoped
    # syntax/executable gate instead of being folded into larger Rust jobs.
    name: test (watchdog)
    needs: [validate-compose, detect-changes]
    if: >-
      ${{
        always() &&
        needs['validate-compose'].result == 'success' &&
        (
          github.event_name != 'pull_request' ||
          needs['detect-changes'].outputs.watchdog == 'true' ||
          needs['detect-changes'].outputs.workflow == 'true'
        )
      }}
    runs-on: [self-hosted, linux, lancache, lancache-light]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: test (watchdog)
        run: |
          bash -n services/watchdog/watchdog.sh
          test -x services/watchdog/watchdog.sh

  watchdog_test-hosted:
    # Unlike watchdog_test above, this fallback deliberately does not gate on
    # detect-changes/validate-compose (both self-hosted-only). Depending on
    # them here would reintroduce the same trap that ruled out a
    # ci_scope_policy-hosted job elsewhere in this file: if self-hosted
    # runners are genuinely unavailable (the scenario this fallback exists
    # for), a needs: dependency on a self-hosted-only job would just sit
    # queued forever. The check itself (bash -n plus an executable-bit test
    # on one small script) is cheap enough to run unconditionally every time,
    # same as file-headers-hosted/line-endings-hosted/shellcheck-hosted.
    name: test (watchdog) (GitHub-hosted fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: GitHub-hosted fallback notice
        run: |
          echo "::notice::Running watchdog syntax check on GitHub-hosted runner as fallback for non-LAN-dependent linting."
      - name: test (watchdog)
        run: |
          bash -n services/watchdog/watchdog.sh
          test -x services/watchdog/watchdog.sh

  dns_cargo_audit:
    # Dependency audits remain crate-specific. They are skipped only when path
    # filtering proves the crate and workflow contract did not change.
    name: cargo-audit (dns/nats-subscriber)
    needs: [validate-compose, detect-changes]
    if: >-
      ${{
        always() &&
        needs['validate-compose'].result == 'success' &&
        (
          github.event_name != 'pull_request' ||
          needs['detect-changes'].outputs.dns_rust == 'true' ||
          needs['detect-changes'].outputs.workflow == 'true'
        )
      }}
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    # Job-level concurrency (#891 follow-up, same pattern/reasoning as
    # dns_test above): scarce lancache-heavy capacity, no other consumer
    # besides ci_scope_policy, whose push-branch check on this job's result
    # now uses require_success_or_intentional_cancellation().
    concurrency:
      group: >-
        ${{
          (github.event_name == 'workflow_dispatch' || github.run_attempt != '1') &&
          format('{0}-dns-cargo-audit-{1}-{2}', github.workflow, github.ref, github.run_id) ||
          format('{0}-dns-cargo-audit-{1}', github.workflow, github.ref)
        }}
      cancel-in-progress: true
    env:
      BUILD_TOOLS_IMAGE: ${{ needs['validate-compose'].outputs.build_tools_image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Audit Rust dependencies (dns/nats-subscriber)
        run: |
          set -euo pipefail

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e CARGO_HOME=/tmp/cargo-home \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash -c 'set -euo pipefail
              audit_log="$(mktemp)"
              trap '"'"'rm -f "$audit_log"'"'"' EXIT
              if ! cargo audit --deny warnings --file services/dns/nats-subscriber/Cargo.lock >"$audit_log" 2>&1; then
                cat "$audit_log"
                exit 1
              fi
              cat "$audit_log"
              if grep -Eiq '"'"'(^|[[:space:]])warning:'"'"' "$audit_log"; then
                echo "::error::cargo-audit emitted warnings."
                exit 1
              fi'

  ui_cargo_audit:
    # UI dependency audit mirrors the DNS audit and stays parallel to avoid
    # serializing independent Rust checks.
    name: cargo-audit (ui)
    needs: [validate-compose, detect-changes]
    if: >-
      ${{
        always() &&
        needs['validate-compose'].result == 'success' &&
        (
          github.event_name != 'pull_request' ||
          needs['detect-changes'].outputs.ui == 'true' ||
          needs['detect-changes'].outputs.workflow == 'true'
        )
      }}
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    # Job-level concurrency (#891 follow-up, same pattern/reasoning as
    # dns_cargo_audit above): scarce lancache-heavy capacity, no other
    # consumer besides ci_scope_policy, whose push-branch check on this
    # job's result now uses require_success_or_intentional_cancellation().
    concurrency:
      group: >-
        ${{
          (github.event_name == 'workflow_dispatch' || github.run_attempt != '1') &&
          format('{0}-ui-cargo-audit-{1}-{2}', github.workflow, github.ref, github.run_id) ||
          format('{0}-ui-cargo-audit-{1}', github.workflow, github.ref)
        }}
      cancel-in-progress: true
    env:
      BUILD_TOOLS_IMAGE: ${{ needs['validate-compose'].outputs.build_tools_image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Audit Rust dependencies (ui)
        run: |
          set -euo pipefail

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e CARGO_HOME=/tmp/cargo-home \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash -c 'set -euo pipefail
              audit_log="$(mktemp)"
              trap '"'"'rm -f "$audit_log"'"'"' EXIT
              if ! cargo audit --deny warnings --file services/ui/Cargo.lock >"$audit_log" 2>&1; then
                cat "$audit_log"
                exit 1
              fi
              cat "$audit_log"
              if grep -Eiq '"'"'(^|[[:space:]])warning:'"'"' "$audit_log"; then
                echo "::error::cargo-audit emitted warnings."
                exit 1
              fi'

  ci_scope_policy:
    # Central policy reconciliation for PR path filtering. Individual jobs may
    # skip for speed, but this job verifies that every required check really ran
    # for the files touched by the PR.
    #
    # #891 scope note: this job itself has its own job-level cancel-in-progress
    # group (below), same as build/container-scan/build-arm64 -- nothing else
    # in this workflow hard-asserts ci_scope_policy's own result via `needs:`,
    # only build/build-arm64's soft `if:` gate
    # (`needs.ci_scope_policy.result == 'success'`), which cleanly skips
    # rather than errors when this job shows cancelled.
    #
    # #915 gave rust_coverage/shellcheck/file-headers/line-endings/
    # ci_scope_policy their own groups first. This revision (#891 follow-up)
    # extends the same pattern to validate-compose, dns_test, ui_test,
    # dns_cargo_audit, and ui_cargo_audit -- the remaining named candidates
    # from #891's own issue body/comments -- and teaches this job's push-event
    # checks to tolerate the resulting legitimate supersession outcomes
    # instead of hard-failing on them. See the per-job comments on
    # validate-compose/dns_test/ui_test/dns_cargo_audit/ui_cargo_audit for the
    # concurrency-group side of this change.
    #
    # The hazard this addresses is PUSH-event parallelism, not the PR-metadata
    # storm. This workflow's top-level concurrency group (top of file)
    # already fully serializes pull_request-triggered runs for the same ref
    # (`{workflow}-{ref}`, cancel-in-progress: false): a burst of opened +
    # labeled + milestoned events for one PR queues each run behind the
    # previous one rather than running them concurrently, so two PR runs for
    # the same ref can never have an in-progress job for the same job-level
    # group at the same time -- confirmed live on #915, and re-confirmed live
    # for this revision's five newly-scoped jobs the same way. That
    # serialization is why the PR-event branch of the script below is left
    # untouched and stays strict (see below).
    #
    # push/tag events are different: the top-level group's key for those is
    # `{workflow}-publish-{run_id}` (unique per run, deliberately never
    # collides -- see that group's own comment), so rapid pushes to
    # master/v0.2.0 genuinely run fully in parallel with no top-level
    # throttle at all. THAT is where a job-level cancel-in-progress group on
    # dns_test/ui_test/dns_cargo_audit/ui_cargo_audit lets a newer push cancel
    # an older, still in-progress push's copy of that job mid-flight. Those
    # four jobs are deliberately NOT on the dev-channel publish path (nothing
    # in `build`'s `if:` needs them), so #979 left their cancel-on-push groups
    # in place: reclaiming a superseded push's copy saves scarce runners at no
    # freshness cost, and this job just has to tolerate the resulting
    # `cancelled` result.
    #
    # (#979 update) validate-compose used to be the sharpest case here --
    # cancelling IT forced dns_test/ui_test/watchdog_test/dns_cargo_audit/
    # ui_cargo_audit to `skipped` via their `needs['validate-compose'].result
    # == 'success'` guard. It is now pull_request-only for cancellation (it is
    # a hard publish-path gate; see its own comment), so on push it always
    # completes and that `skipped` cascade can no longer fire on push.
    #
    # Fix: on the push-event branch below, dns_test/ui_test/dns_cargo_audit/
    # ui_cargo_audit still use require_success_or_intentional_cancellation()
    # (success|skipped|cancelled) because they can still show a direct
    # `cancelled` from their own cancel-on-push groups. watchdog_test does NOT
    # get its own group, and with validate-compose no longer cancelling on
    # push it can no longer be `skipped` on push either, so on a push it now
    # only ever shows `success` (or a real failure); its
    # require_success_or_intentional_skip() helper stays as defensive tolerance
    # for the pull_request path, where the validate-compose skip-cascade still
    # applies.
    #
    # dns_rust_quality/ui_rust_quality are deliberately left on strict
    # require_success(): they are not in #891's enumerated candidate list
    # (PR #915 explicitly flagged them, and watchdog_test, as out of scope so
    # they would not be silently mistaken for "already considered and
    # rejected"), and they do not depend on validate-compose at all -- only on
    # detect-changes, which never runs on push -- so nothing in this change
    # gives them a legitimate way to show anything but `success` on a push
    # event. A `cancelled` there would mean a real anomaly (e.g. a manual
    # workflow cancellation), not a supersession, and should keep failing
    # loudly. Extending the pattern to this pair is a clean, separate,
    # mechanically identical follow-up if ever wanted -- not folded in here.
    #
    # detect-changes stays excluded from concurrency scoping for the same
    # reason #915 already found: it only runs
    # `if: github.event_name == 'pull_request'` (never on push, so the push
    # hazard above does not apply to it), and on pull_request it is already
    # serialization-protected by the top-level group. A group would be a
    # pure no-op there, so it is left out because it gains nothing, not
    # because it is unsafe. Its own require_success() check below (PR-branch
    # only) is therefore also left strict, unchanged.
    name: CI scope policy
    needs:
      - detect-changes
      - dns_rust_quality
      - ui_rust_quality
      - dns_test
      - ui_test
      - watchdog_test
      - dns_cargo_audit
      - ui_cargo_audit
    if: always()
    runs-on: [self-hosted, linux, lancache, lancache-light]
    # cancel-in-progress is pull_request-only -- see `build`'s group comment
    # for the full #979 rationale. build/build-arm64 require
    # `needs.ci_scope_policy.result == 'success'` unconditionally, so on push
    # this is a hard gate on the dev-channel publish path: cancelling it in a
    # merge cascade makes the build path skip and starves the channel. The
    # push-branch tolerance logic below already lets THIS job reach `success`
    # despite its upstream test jobs being superseded, so it stays a reliable
    # gate as long as it is not itself cancelled -- which is exactly what
    # cancel false on push guarantees. On a PR, build/build-arm64 cleanly skip
    # a cancelled ci_scope_policy, so cancelling a superseded run there is safe.
    concurrency:
      group: >-
        ${{
          (github.event_name == 'workflow_dispatch' || github.run_attempt != '1') &&
          format('{0}-ci-scope-policy-{1}-{2}', github.workflow, github.ref, github.run_id) ||
          format('{0}-ci-scope-policy-{1}', github.workflow, github.ref)
        }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      # This job never checked out the repo itself (#901): its only file read
      # (the grep below) relied entirely on whatever another job on the same
      # self-hosted runner happened to leave in the shared `_work` workspace
      # directory. Under real concurrent load (many PRs' runs sharing a small
      # runner pool) that workspace can hold a different, unrelated run's
      # checkout -- or nothing at all -- producing both a false "file not
      # found" failure and, worse, a silent false pass/fail against the wrong
      # commit's content. Every other job in this workflow already checks out
      # its own commit; this is the one job that didn't.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Enforce scoped CI gates
        env:
          EVENT_NAME: ${{ github.event_name }}
          DETECT_RESULT: ${{ needs['detect-changes'].result }}
          DNS_RUST_CHANGED: ${{ needs['detect-changes'].outputs.dns_rust }}
          UI_CHANGED: ${{ needs['detect-changes'].outputs.ui }}
          WATCHDOG_CHANGED: ${{ needs['detect-changes'].outputs.watchdog }}
          WORKFLOW_CHANGED: ${{ needs['detect-changes'].outputs.workflow }}
          DOCS_CHANGED: ${{ needs['detect-changes'].outputs.docs }}
          DOCS_ONLY: ${{ needs['detect-changes'].outputs.docs_only }}
          GOVERNANCE_CHANGED: ${{ needs['detect-changes'].outputs.governance }}
          SETUP_RUNTIME_CHANGED: ${{ needs['detect-changes'].outputs.setup_runtime }}
          DEPLOY_CHANGED: ${{ needs['detect-changes'].outputs.deploy }}
          RELEASE_CONTRACT_CHANGED: ${{ needs['detect-changes'].outputs.release_contract }}
          SCRIPTS_CHANGED: ${{ needs['detect-changes'].outputs.scripts }}
          DNS_RUST_QUALITY_RESULT: ${{ needs.dns_rust_quality.result }}
          UI_RUST_QUALITY_RESULT: ${{ needs.ui_rust_quality.result }}
          DNS_TEST_RESULT: ${{ needs.dns_test.result }}
          UI_TEST_RESULT: ${{ needs.ui_test.result }}
          WATCHDOG_TEST_RESULT: ${{ needs.watchdog_test.result }}
          DNS_CARGO_AUDIT_RESULT: ${{ needs.dns_cargo_audit.result }}
          UI_CARGO_AUDIT_RESULT: ${{ needs.ui_cargo_audit.result }}
        run: |
          set -euo pipefail

          # The "- name:" prefix and the [S] character class are both load-bearing:
          # this grep's own command text lives inside the very file it searches, so
          # a plain literal pattern always matches this line itself and the guard
          # could never fail, even with validate-compose's Buildx step removed or
          # renamed. [S] matches only a literal "S", while this line spells the
          # bracketed class, so the only possible hit is the real step definition.
          grep -n -- "- name: [S]et up Docker Buildx for manifest inspection" .github/workflows/build-push.yml >/dev/null || {
            echo "::error::validate-compose must set up Buildx before resolving digest-qualified build-tools images."
            exit 1
          }

          require_boolean() {
            local name="$1" value="$2"
            case "$value" in
              true|false)
                ;;
              *)
                echo "::error::detect-changes output '$name' must be true or false, got '${value:-<empty>}'."
                exit 1
                ;;
            esac
          }

          require_success() {
            local name="$1" value="$2"
            if [ "$value" != "success" ]; then
              echo "::error::$name must succeed for this change set, got '$value'."
              exit 1
            fi
          }

          require_success_or_intentional_skip() {
            local name="$1" value="$2"
            case "$value" in
              success|skipped)
                ;;
              *)
                echo "::error::$name may only be skipped by the PR path filter, got '$value'."
                exit 1
                ;;
            esac
          }

          # #891 follow-up: dns_test/ui_test/dns_cargo_audit/ui_cargo_audit
          # each now carry their own job-level cancel-in-progress group (see
          # their own job blocks), and validate-compose (a shared `needs:` of
          # all of them, plus watchdog_test) does too. On a push event this
          # means a newer push can legitimately leave an older, superseded
          # run showing either a direct `cancelled` (the job's own group lost
          # the race) or a `skipped` cascade (validate-compose was cancelled,
          # so this job's own `needs['validate-compose'].result == 'success'`
          # guard evaluated false). Both are a clean supersession outcome,
          # not a real failure, so this dedicated helper (mirroring the
          # existing require_success_or_intentional_skip() naming) tolerates
          # all three: success, skipped, or cancelled. It is intentionally
          # NOT used for dns_rust_quality/ui_rust_quality (no group, no
          # validate-compose dependency -- see the job-level comment above
          # for why those two stay on strict require_success()) or for
          # watchdog_test (no group of its own, so it can only ever show the
          # validate-compose skip cascade, never a direct cancelled --
          # require_success_or_intentional_skip() below is the precise tool
          # for that, not this one).
          require_success_or_intentional_cancellation() {
            local name="$1" value="$2"
            case "$value" in
              success|skipped|cancelled)
                ;;
              *)
                echo "::error::$name must succeed for this change set, or show a clean supersession outcome (skipped/cancelled) from a newer push superseding it, got '$value'."
                exit 1
                ;;
            esac
          }

          if [ "$EVENT_NAME" != "pull_request" ]; then
            require_success "rust-quality (dns/nats-subscriber)" "$DNS_RUST_QUALITY_RESULT"
            require_success "rust-quality (ui)" "$UI_RUST_QUALITY_RESULT"
            require_success_or_intentional_cancellation "test (dns/nats-subscriber)" "$DNS_TEST_RESULT"
            require_success_or_intentional_cancellation "test (ui)" "$UI_TEST_RESULT"
            require_success_or_intentional_skip "test (watchdog)" "$WATCHDOG_TEST_RESULT"
            require_success_or_intentional_cancellation "cargo-audit (dns/nats-subscriber)" "$DNS_CARGO_AUDIT_RESULT"
            require_success_or_intentional_cancellation "cargo-audit (ui)" "$UI_CARGO_AUDIT_RESULT"
            exit 0
          fi

          require_success "detect changed paths" "$DETECT_RESULT"

          for output in \
            DNS_RUST_CHANGED \
            UI_CHANGED \
            WATCHDOG_CHANGED \
            WORKFLOW_CHANGED \
            DOCS_CHANGED \
            DOCS_ONLY \
            GOVERNANCE_CHANGED \
            SETUP_RUNTIME_CHANGED \
            DEPLOY_CHANGED \
            RELEASE_CONTRACT_CHANGED \
            SCRIPTS_CHANGED
          do
            require_boolean "$output" "${!output}"
          done

          dns_rust_required=false
          ui_required=false
          watchdog_required=false
          if [ "$WORKFLOW_CHANGED" = "true" ]; then
            dns_rust_required=true
            ui_required=true
            watchdog_required=true
          fi
          if [ "$DNS_RUST_CHANGED" = "true" ]; then
            dns_rust_required=true
          fi
          if [ "$UI_CHANGED" = "true" ]; then
            ui_required=true
          fi
          if [ "$WATCHDOG_CHANGED" = "true" ]; then
            watchdog_required=true
          fi

          if [ "$dns_rust_required" = "true" ]; then
            require_success "rust-quality (dns/nats-subscriber)" "$DNS_RUST_QUALITY_RESULT"
            require_success "test (dns/nats-subscriber)" "$DNS_TEST_RESULT"
            require_success "cargo-audit (dns/nats-subscriber)" "$DNS_CARGO_AUDIT_RESULT"
          else
            require_success_or_intentional_skip "rust-quality (dns/nats-subscriber)" "$DNS_RUST_QUALITY_RESULT"
            require_success_or_intentional_skip "test (dns/nats-subscriber)" "$DNS_TEST_RESULT"
            require_success_or_intentional_skip "cargo-audit (dns/nats-subscriber)" "$DNS_CARGO_AUDIT_RESULT"
          fi

          if [ "$ui_required" = "true" ]; then
            require_success "rust-quality (ui)" "$UI_RUST_QUALITY_RESULT"
            require_success "test (ui)" "$UI_TEST_RESULT"
            require_success "cargo-audit (ui)" "$UI_CARGO_AUDIT_RESULT"
          else
            require_success_or_intentional_skip "rust-quality (ui)" "$UI_RUST_QUALITY_RESULT"
            require_success_or_intentional_skip "test (ui)" "$UI_TEST_RESULT"
            require_success_or_intentional_skip "cargo-audit (ui)" "$UI_CARGO_AUDIT_RESULT"
          fi

          if [ "$watchdog_required" = "true" ]; then
            require_success "test (watchdog)" "$WATCHDOG_TEST_RESULT"
          else
            require_success_or_intentional_skip "test (watchdog)" "$WATCHDOG_TEST_RESULT"
          fi

          if [ "$DOCS_ONLY" = "true" ]; then
            echo "::notice::Docs-only PR: heavy Rust and Docker checks may be skipped, but unconditional policy checks still ran."
          fi
          if [ "$GOVERNANCE_CHANGED" = "true" ]; then
            echo "::notice::Governance files changed; keep review focused on project rules, not only generated artifacts."
          fi
          if [ "$SETUP_RUNTIME_CHANGED" = "true" ] || [ "$DEPLOY_CHANGED" = "true" ] || [ "$RELEASE_CONTRACT_CHANGED" = "true" ]; then
            echo "::notice::Runtime/deploy/release contract files changed; validate-compose remains the lightweight project-wide guard."
          fi

  container-scan:
    # Full image vulnerability scans are intentionally limited to trusted refs.
    # They build every service image and routinely dominate PR runtime on
    # self-hosted runners; PRs still exercise Dockerfiles in the build job below.
    # The build job depends on this gate before it can push normal service
    # images. Build-tools receives an additional exact pushed-digest scan in the
    # build job because the multi-arch published image is produced there.
    #
    # This bare `if:` (implicit `&& success()`) is deliberately NOT hardened
    # with `!cancelled()` like promote/release/publish_coverage_badge, because
    # the implicit success() only walks this job's transitive needs graph --
    # here just `validate-compose`, a root job with no `if:`/`needs:` of its
    # own, so it can never be legitimately *skipped* (only success/failure/
    # cancelled). With no skippable upstream, the implicit-success() silent-skip
    # trap that bit publish_coverage_badge (#677) and promote (#532) cannot fire
    # here. INVARIANT: this holds ONLY while validate-compose stays a root job.
    # If validate-compose ever gains an `if:` or a `needs:` on something that
    # can skip, this bare condition would start silently skipping container-scan
    # (and, transitively, weakening the build gate) -- switch it to
    # `!cancelled() && needs['validate-compose'].result == 'success' && ...`
    # then, matching the established fix pattern.
    if: github.event_name != 'pull_request'
    needs: validate-compose
    # Job-level concurrency (#888): keyed per matrix row (service + platform)
    # and per ref. cancel-in-progress is pull_request-only -- see `build`'s
    # group comment for the full #979 rationale. On push, `build`'s `if:`
    # requires `needs['container-scan'].result == 'success'` (the non-PR
    # branch), so this scan is a hard gate on the dev-channel publish path:
    # cancelling it in a merge cascade makes `build` skip and publishes no dev
    # image for that commit, starving the channel. On a PR it is safe to
    # cancel a superseded scan -- it only reads/builds a local image to scan
    # (never pushes to GHCR, worst case a wasted Trivy run) and `build` cleanly
    # skips a cancelled scan there via its `needs` gate.
    #
    # `workflow_dispatch` runs and reruns (`github.run_attempt != '1'`) keep
    # their own run_id-suffixed key so a manual retrigger or rerun cannot be
    # confused with a genuinely superseded push; on push/tag the flag is false
    # anyway, so the plain service+platform+ref key never triggers a cancel.
    concurrency:
      group: >-
        ${{
          (github.event_name == 'workflow_dispatch' || github.run_attempt != '1') &&
          format('{0}-container-scan-{1}-{2}-{3}-{4}', github.workflow, matrix.service, matrix.platform_tag, github.ref, github.run_id) ||
          format('{0}-container-scan-{1}-{2}-{3}', github.workflow, matrix.service, matrix.platform_tag, github.ref)
        }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    # Each matrix row carries its own JSON-encoded runner selector so amd64
    # rows stay on the self-hosted pool (with LAN acceleration available) and
    # arm64 rows run natively on a GitHub-hosted arm64 runner -- QEMU on the
    # self-hosted pool would reintroduce the emulated-Rust-compile risk this
    # scan is meant to catch before build/build-arm64 push anything real.
    runs-on: ${{ fromJSON(matrix.runner) }}
    env:
      BUILD_TOOLS_IMAGE: ${{ needs['validate-compose'].outputs.build_tools_image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: proxy
            context: services/proxy
            # cdn-domains.txt lives in services/dns/, outside this image's own
            # build context — see services/proxy/Dockerfile's COPY --from
            # comment for why a named additional context is needed here.
            build_contexts: dns-domains=services/dns
            description: nginx-based lancache-ng caching proxy for standard and TLS-interception cache traffic.
            platform: linux/amd64
            platform_tag: amd64
            runner: '["self-hosted", "linux", "lancache", "lancache-heavy"]'
          - service: dns
            context: services/dns
            build_contexts: ""
            description: PowerDNS recursor, authoritative DNS, and NATS subscriber service for lancache-ng cache routing.
            rust: true
            platform: linux/amd64
            platform_tag: amd64
            runner: '["self-hosted", "linux", "lancache", "lancache-heavy"]'
          - service: watchdog
            context: services/watchdog
            build_contexts: ""
            description: lancache-ng watchdog helper for runtime health checks and recovery hooks.
            platform: linux/amd64
            platform_tag: amd64
            runner: '["self-hosted", "linux", "lancache", "lancache-heavy"]'
          - service: dhcp
            context: services/dhcp
            build_contexts: ""
            description: Kea DHCP, control-agent, and DHCP-DDNS service for lancache-ng managed networks.
            platform: linux/amd64
            platform_tag: amd64
            runner: '["self-hosted", "linux", "lancache", "lancache-heavy"]'
          - service: dhcp-proxy
            context: services/dhcp-proxy
            build_contexts: ""
            description: dnsmasq-based DHCP proxy and relay helper for lancache-ng deployments.
            platform: linux/amd64
            platform_tag: amd64
            runner: '["self-hosted", "linux", "lancache", "lancache-heavy"]'
          - service: ui
            context: services/ui
            build_contexts: ""
            description: lancache-ng Admin UI and control-plane service for cache, DNS, DHCP, and secondary management.
            rust: true
            platform: linux/amd64
            platform_tag: amd64
            runner: '["self-hosted", "linux", "lancache", "lancache-heavy"]'
          - service: build-tools
            context: tools/build-tools
            build_contexts: ""
            description: Prebuilt lancache-ng CI and developer validation toolchain image.
            platform: linux/amd64
            platform_tag: amd64
            runner: '["self-hosted", "linux", "lancache", "lancache-heavy"]'
          - service: proxy
            context: services/proxy
            build_contexts: dns-domains=services/dns
            description: nginx-based lancache-ng caching proxy for standard and TLS-interception cache traffic.
            platform: linux/arm64
            platform_tag: arm64
            runner: '"ubuntu-24.04-arm"'
          - service: dns
            context: services/dns
            build_contexts: ""
            description: PowerDNS recursor, authoritative DNS, and NATS subscriber service for lancache-ng cache routing.
            rust: true
            platform: linux/arm64
            platform_tag: arm64
            runner: '"ubuntu-24.04-arm"'
          - service: watchdog
            context: services/watchdog
            build_contexts: ""
            description: lancache-ng watchdog helper for runtime health checks and recovery hooks.
            platform: linux/arm64
            platform_tag: arm64
            runner: '"ubuntu-24.04-arm"'
          - service: dhcp
            context: services/dhcp
            build_contexts: ""
            description: Kea DHCP, control-agent, and DHCP-DDNS service for lancache-ng managed networks.
            platform: linux/arm64
            platform_tag: arm64
            runner: '"ubuntu-24.04-arm"'
          - service: dhcp-proxy
            context: services/dhcp-proxy
            build_contexts: ""
            description: dnsmasq-based DHCP proxy and relay helper for lancache-ng deployments.
            platform: linux/arm64
            platform_tag: arm64
            runner: '"ubuntu-24.04-arm"'
          - service: ui
            context: services/ui
            build_contexts: ""
            description: lancache-ng Admin UI and control-plane service for cache, DNS, DHCP, and secondary management.
            rust: true
            platform: linux/arm64
            platform_tag: arm64
            runner: '"ubuntu-24.04-arm"'
          - service: build-tools
            context: tools/build-tools
            build_contexts: ""
            description: Prebuilt lancache-ng CI and developer validation toolchain image.
            platform: linux/arm64
            platform_tag: arm64
            runner: '"ubuntu-24.04-arm"'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable build-tools publish scan
        id: build-tools-scan-changes
        if: matrix.service == 'build-tools'
        run: |
          set -euo pipefail

          should_scan=true
          echo "::notice::build-tools scan remains enabled on trusted refs so publish coverage includes the sha-* source image, for both the amd64 and arm64 matrix rows."
          echo "should-scan=$should_scan" >> "$GITHUB_OUTPUT"

      - name: Compute Docker build parallelism
        if: matrix.service != 'build-tools' || steps.build-tools-scan-changes.outputs.should-scan == 'true'
        id: docker-build-jobs
        run: |
          set -euo pipefail

          if [ -n "${CARGO_BUILD_JOBS:-}" ]; then
            case "$CARGO_BUILD_JOBS" in
              ''|*[!0-9]*)
                echo "::error::CARGO_BUILD_JOBS must be a positive integer."
                exit 1
                ;;
            esac
            if [ "$CARGO_BUILD_JOBS" -le 0 ]; then
              echo "::error::CARGO_BUILD_JOBS must be greater than zero."
              exit 1
            fi
            jobs="$CARGO_BUILD_JOBS"
            echo "::notice::Using CARGO_BUILD_JOBS=$jobs from repository variable for Docker builds."
          else
            detected_cores="$(nproc 2>/dev/null || getconf _NPROCESSORS_ONLN || echo 2)"
            jobs=$((detected_cores - 2))
            if [ "$jobs" -lt 4 ]; then
              jobs=4
            fi
            echo "::notice::Using CARGO_BUILD_JOBS=$jobs from $detected_cores detected cores for Docker builds."
          fi

          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

      - name: Prepare Rust acceleration secret files
        # Trusted Rust image builds may use Redis sccache, sccache-dist, and
        # distcc as CI infrastructure. Secrets are written to temporary files for
        # BuildKit and are never exposed to fork PRs or Dependabot runs.
        # Only the amd64 rows run on the self-hosted LAN pool that can reach
        # this acceleration infrastructure -- the arm64 rows run on a
        # GitHub-hosted runner and always scan an unaccelerated native build.
        if: >-
          ${{
            (
              matrix.service != 'build-tools' ||
              steps.build-tools-scan-changes.outputs.should-scan == 'true'
            ) &&
            matrix.rust == true &&
            matrix.platform_tag == 'amd64' &&
            github.actor != 'dependabot[bot]' &&
            github.event_name != 'pull_request'
          }}
        id: sccache-secret
        env:
          SCCACHE_REDIS_MODE: ${{ vars.SCCACHE_REDIS_MODE }}
          SCCACHE_REDIS_URL: ${{ secrets.SCCACHE_REDIS_URL }}
          SCCACHE_DIST_SCHEDULER_URL: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          SCCACHE_DIST_AUTH_TOKEN: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
          DISTCC_POTENTIAL_HOSTS: ${{ vars.DISTCC_POTENTIAL_HOSTS }}
        run: |
          set -euo pipefail

          mode="${SCCACHE_REDIS_MODE:-required}"
          secret_files=()

          toml_escape() {
            printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
          }

          case "$mode" in
            required|optional|off)
              ;;
            *)
              echo "::error::SCCACHE_REDIS_MODE must be one of: required, optional, off."
              exit 1
              ;;
          esac

          sccache_enabled=1
          redis_enabled=1
          if [ "$mode" = "off" ]; then
            sccache_enabled=0
            redis_enabled=0
            echo "Redis-backed sccache is disabled by SCCACHE_REDIS_MODE=off."
          fi

          if [ "$sccache_enabled" = "1" ] && [ -n "$SCCACHE_DIST_SCHEDULER_URL" ] && [ -z "$SCCACHE_DIST_AUTH_TOKEN" ]; then
            echo "::error::SCCACHE_DIST_AUTH_TOKEN is required when SCCACHE_DIST_SCHEDULER_URL is set."
            exit 1
          fi

          if [ "$sccache_enabled" = "1" ] && [ -z "$SCCACHE_DIST_SCHEDULER_URL" ] && [ -n "$SCCACHE_DIST_AUTH_TOKEN" ]; then
            echo "::error::SCCACHE_DIST_SCHEDULER_URL is required when SCCACHE_DIST_AUTH_TOKEN is set."
            exit 1
          fi

          if [ "$sccache_enabled" = "1" ] && [ -z "$SCCACHE_REDIS_URL" ]; then
            if [ "$mode" = "optional" ]; then
              echo "Skipping Redis-backed sccache because SCCACHE_REDIS_URL is empty and SCCACHE_REDIS_MODE=optional."
              redis_enabled=0
            else
              echo "::error::SCCACHE_REDIS_URL repository secret is required for trusted Rust image scans so sccache can use Redis."
              exit 1
            fi
          fi

          umask 077
          if [ "$redis_enabled" = "1" ]; then
            redis_file="${{ runner.temp }}/sccache-redis-url"
            printf '%s' "$SCCACHE_REDIS_URL" > "$redis_file"
            secret_files+=("sccache_redis_url=$redis_file")
            echo "redis-file=$redis_file" >> "$GITHUB_OUTPUT"
          fi

          if [ "$sccache_enabled" = "1" ] && [ -n "$SCCACHE_DIST_SCHEDULER_URL" ]; then
            dist_config_file="${{ runner.temp }}/sccache-dist-config"
            {
              printf '[dist]\n'
              printf 'scheduler_url = "%s"\n' "$(toml_escape "$SCCACHE_DIST_SCHEDULER_URL")"
              printf 'toolchains = []\n'
              printf 'toolchain_cache_size = 5368709120\n'
              printf '\n[dist.auth]\n'
              printf 'type = "token"\n'
              printf 'token = "%s"\n' "$(toml_escape "$SCCACHE_DIST_AUTH_TOKEN")"
            } > "$dist_config_file"
            secret_files+=("sccache_dist_config=$dist_config_file")
            echo "dist-config-file=$dist_config_file" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$DISTCC_POTENTIAL_HOSTS" ]; then
            if ! printf '%s\n' "$DISTCC_POTENTIAL_HOSTS" | grep -q ',cpp'; then
              echo "::error::DISTCC_POTENTIAL_HOSTS must include at least one pump-capable host with the ',cpp' option."
              exit 1
            fi

            distcc_hosts_file="${{ runner.temp }}/distcc-potential-hosts"
            printf '%s' "$DISTCC_POTENTIAL_HOSTS" > "$distcc_hosts_file"
            secret_files+=("distcc_potential_hosts=$distcc_hosts_file")
            echo "distcc-hosts-file=$distcc_hosts_file" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "secret-files<<SECRET_FILES"
            printf '%s\n' "${secret_files[@]}"
            echo "SECRET_FILES"
          } >> "$GITHUB_OUTPUT"

      - name: Select Rust acceleration network
        # BuildKit host networking is only enabled when secret-backed
        # acceleration needs access to private runner services. Normal builds
        # stay on the default isolated network.
        if: matrix.rust == true && matrix.platform_tag == 'amd64'
        env:
          SECRET_FILES: ${{ steps.sccache-secret.outputs.secret-files }}
        run: |
          set -euo pipefail

          rust_network=bridge
          buildx_network=default
          if [ -n "$SECRET_FILES" ]; then
            rust_network=host
            buildx_network=host
          fi
          printf 'RUST_ACCELERATION_NETWORK=%s\n' "$rust_network" >> "$GITHUB_ENV"
          printf 'RUST_BUILDX_NETWORK=%s\n' "$buildx_network" >> "$GITHUB_ENV"

      - name: Validate acceleration infrastructure outside BuildKit cache
        if: matrix.rust == true && matrix.platform_tag == 'amd64'
        uses: ./.github/actions/rust-acceleration-preflight
        with:
          service: ${{ matrix.service }}
          redis-file: ${{ steps.sccache-secret.outputs.redis-file }}
          dist-config-file: ${{ steps.sccache-secret.outputs.dist-config-file }}
          distcc-hosts-file: ${{ steps.sccache-secret.outputs.distcc-hosts-file }}
          build-tools-image: ${{ env.BUILD_TOOLS_IMAGE }}
          build-network: ${{ env.RUST_ACCELERATION_NETWORK }}
          platform: ${{ matrix.platform }}

      - name: Set up Docker Buildx for scan build (amd64)
        # A docker-container builder is required for --allow network.host to
        # actually take effect: that entitlement is enabled by default for
        # container-driver builders since buildx v0.13 (docker/buildx#2266),
        # but the plain `docker` driver (the daemon's own embedded BuildKit,
        # what a bare `docker build` uses with no builder set up) additionally
        # requires the daemon itself to be started with
        # --allow-insecure-entitlement network.host -- an infrastructure-level
        # flag this workflow can't set. Using an explicit container-driver
        # builder here avoids that dependency entirely.
        #
        # Split from the arm64 row below (issue #930): this self-hosted
        # amd64 row persists its local Buildx cache/image pulls across runs
        # and has never hit the arm64 row's Docker Hub anonymous-pull rate
        # limit, so it keeps the plain, unretried setup step.
        if: >-
          matrix.platform_tag == 'amd64' &&
          (matrix.service != 'build-tools' || steps.build-tools-scan-changes.outputs.should-scan == 'true')
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Set up Docker Buildx for scan build (arm64, retried)
        # Issue #930: this row runs on a GitHub-hosted arm64 runner, a fresh
        # VM every run with no local image cache, which has hit Docker Hub's
        # anonymous-pull rate limit (surfacing as "unauthorized:
        # authentication required") while bootstrapping
        # moby/buildkit:buildx-stable-1. Confirmed transient: a rerun with
        # zero code changes succeeded. Retried via
        # .github/actions/buildx-setup-retry instead of the plain action used
        # by the amd64 row above.
        if: >-
          matrix.platform_tag == 'arm64' &&
          (matrix.service != 'build-tools' || steps.build-tools-scan-changes.outputs.should-scan == 'true')
        uses: ./.github/actions/buildx-setup-retry

      - name: Build local scan image
        if: matrix.service != 'build-tools' || steps.build-tools-scan-changes.outputs.should-scan == 'true'
        env:
          CARGO_BUILD_JOBS: ${{ steps.docker-build-jobs.outputs.jobs }}
          SCCACHE_REDIS_FILE: ${{ steps.sccache-secret.outputs.redis-file }}
          SCCACHE_DIST_CONFIG_FILE: ${{ steps.sccache-secret.outputs.dist-config-file }}
          DISTCC_HOSTS_FILE: ${{ steps.sccache-secret.outputs.distcc-hosts-file }}
          MATRIX_BUILD_CONTEXTS: ${{ matrix.build_contexts }}
        run: |
          set -euo pipefail

          secret_args=()
          if [ -n "$SCCACHE_REDIS_FILE" ]; then
            secret_args+=(--secret "id=sccache_redis_url,src=$SCCACHE_REDIS_FILE")
          fi
          if [ -n "$SCCACHE_DIST_CONFIG_FILE" ]; then
            secret_args+=(--secret "id=sccache_dist_config,src=$SCCACHE_DIST_CONFIG_FILE")
          fi
          if [ -n "$DISTCC_HOSTS_FILE" ]; then
            secret_args+=(--secret "id=distcc_potential_hosts,src=$DISTCC_HOSTS_FILE")
          fi

          build_context_args=()
          if [ -n "${MATRIX_BUILD_CONTEXTS:-}" ]; then
            build_context_args+=(--build-context "$MATRIX_BUILD_CONTEXTS")
          fi

          scan_build_network="${RUST_BUILDX_NETWORK:-default}"
          if [ "$scan_build_network" = "bridge" ]; then
            scan_build_network=default
          fi
          allow_args=()
          if [ "$scan_build_network" = "host" ]; then
            allow_args+=(--allow network.host)
          fi

          docker buildx build \
            --load \
            --pull \
            --platform ${{ matrix.platform }} \
            --network "$scan_build_network" \
            "${allow_args[@]}" \
            --build-arg "BUILD_TOOLS_IMAGE=$BUILD_TOOLS_IMAGE" \
            --build-arg "CARGO_BUILD_JOBS=$CARGO_BUILD_JOBS" \
            "${secret_args[@]}" \
            "${build_context_args[@]}" \
            -t lancache-ng-scan:${{ matrix.service }}-${{ matrix.platform_tag }}-${{ github.run_id }} \
            ${{ matrix.context }}
      - name: Prepare local Trivy cache
        # Trivy's cache backend (BoltDB) only allows one process to hold a
        # given cache directory open at a time. This directory used to be
        # keyed only by service+platform, not by ref -- safe back when the
        # top-level "publish" concurrency group serialized whole pipeline
        # runs, but #892 narrowed cancellation to per-job groups keyed by
        # (service, platform, ref[, run_id]) -- see this job's own
        # `concurrency:` block above -- which made it genuinely possible for
        # two different trusted refs (e.g. push to `master` and push to
        # `v0.2.0`) to run this job for the *same* service+platform at the
        # same time. Two such runs used to race on this exact directory,
        # producing a cache-lock error or a corrupted/partially-written
        # cache in one of them (#904).
        #
        # INVARIANT: concurrency only guarantees mutual exclusion *within* a
        # group, so this directory's key must be at least as fine as the
        # concurrency-group key above, not just "finer than before". Two
        # runs landing in *different* groups (so they CAN run concurrently)
        # must never collapse onto the same cache-dir string. That means
        # mirroring the group key's full shape, not only its ref component:
        #   - Sanitizing `github.ref` (not `github.ref_name`): the group key
        #     uses the full ref, so a branch and a same-named tag (e.g.
        #     branch `v0.2.0` vs a future tag also literally named `v0.2.0`)
        #     are different groups and must get different cache dirs too --
        #     `ref_name` alone would collapse them.
        #   - Appending `run_id` in exactly the same condition the group key
        #     does (`workflow_dispatch` or `run_attempt != 1`): the group's
        #     own comment above explains why -- two dispatches of the same
        #     ref, or a rerun of an already-superseded run overlapping a
        #     fresh push, must not cancel each other, and per this same
        #     reasoning must not share a cache dir either.
        # An earlier revision of this fix keyed only on sanitized
        # `ref_name` with no run_id component -- strictly coarser than the
        # concurrency-group key above, so it left exactly this race open
        # for the dispatch/rerun case despite "closing" the ordinary-push
        # case. Caught in review before merge; corrected to mirror the
        # group key exactly.
        #
        # Folding the sanitized ref (and, where applicable, run_id) into the
        # path makes each concurrency-group instance own a directory no
        # other instance can ever write to, closing the race without
        # touching #892's scheduling behavior. Reuses the same sanitization
        # build-tools.yml already applies to its own per-ref mutable tag, so
        # this doesn't invent a second ref-to-filesystem-name convention.
        # Trade-off (see #904/PR body): a ref's first ordinary-push scan, or
        # a brand-new release tag, no longer benefits from another ref's
        # warm cache the way the single shared directory used to allow --
        # each ref gets its own directory on the self-hosted runner.
        # Retention (#912, investigated live on the runner hosts): a
        # populated cache dir is >99.9% redundant copies of the two global
        # Trivy DBs (~1.2 GB trivy.db + ~1.5 GB trivy-java.db apparent
        # size); the actually image-specific fanal cache is ~100 KB. Only
        # dirs a future run can reuse are worth keeping, so dirs that are
        # cold-by-design are marked `ephemeral=true` here and deleted again
        # by the "Remove ephemeral Trivy cache" step below the scan:
        #   - `workflow_dispatch` runs and reruns (`run_attempt != 1`) get
        #     their own isolated, run_id-suffixed directory (an intentional,
        #     matching consequence of the same isolation their concurrency
        #     group already has) -- no later run ever reads it back.
        #   - tag refs (`refs/tags/*`): release tags are immutable and
        #     pushed exactly once, so a tag's cache dir can never be reused
        #     by a later run either; without cleanup, one dir per release
        #     would accumulate per runner host forever. Tag refs take the
        #     run_id suffix too -- strictly finer than their concurrency
        #     group key (allowed by the invariant above) -- so the delete
        #     below can never touch a directory any other concurrency-group
        #     instance could be using.
        # What remains persistent is exactly the reusable population:
        # branch refs (`master`, `v[0-9]*`), which are bounded (one dir per
        # service+platform per active branch, reused on every push).
        id: trivy-cache
        if: matrix.service != 'build-tools' || steps.build-tools-scan-changes.outputs.should-scan == 'true'
        run: |
          set -euo pipefail
          sanitized_ref="$(printf '%s' "$GITHUB_REF" | tr '/:@' '---' | tr -cd 'A-Za-z0-9_.-')"
          if [ -z "$sanitized_ref" ]; then
            echo "::error::Could not derive a safe Trivy cache directory name from ref '$GITHUB_REF'."
            exit 1
          fi
          cache_dir="/var/tmp/lancache-ng-trivy-cache/${{ matrix.service }}-${{ matrix.platform_tag }}-${sanitized_ref}"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || [ "$GITHUB_RUN_ATTEMPT" != "1" ] \
            || [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            cache_dir="${cache_dir}-${GITHUB_RUN_ID}"
            echo "ephemeral=true" >> "$GITHUB_OUTPUT"
          else
            echo "ephemeral=false" >> "$GITHUB_OUTPUT"
          fi
          mkdir -p "$cache_dir"
          echo "dir=$cache_dir" >> "$GITHUB_OUTPUT"
      - name: Enforce Trivy cache generation retention
        # Persistent per-branch cache dirs (ephemeral=false above, e.g.
        # `proxy-amd64-refs-heads-v0.2.0`) are reused on every push and are
        # never touched by the ephemeral cleanup step below or by host-level
        # `systemd-tmpfiles` aging -- both only apply to dirs that go idle,
        # and these are touched on every push/schedule run, so they never
        # idle long enough (#928, same reasoning already established for the
        # ephemeral case in #925/#927). Left alone they persist and grow
        # without bound.
        #
        # Trivy's local cache is a pure re-downloadable cache of the public
        # vulnerability DB (never a source of truth), so a periodic wholesale
        # reset is safe: this stamps each persistent dir's last full-reset
        # time in a sentinel file and wipes+recreates the whole dir once that
        # generation exceeds TRIVY_CACHE_MAX_AGE_DAYS, forcing a full, fresh
        # DB re-download on this run for that cell.
        #
        # Deliberately NOT keyed off the directory's own mtime: every push
        # refreshes mtime on files the scan step touches, so an mtime-based
        # check would never fire for these continuously-reused dirs -- the
        # exact reason host-level tmpfiles aging cannot solve this either.
        # The sentinel file is only ever written by this step, so its age
        # tracks "time since last forced reset", not "time since last use".
        #
        # Runs before the scan (not after) so the run that crosses the age
        # threshold pays the one-time re-download cost itself, rather than
        # leaving the next run to discover an already-wiped, cold directory.
        #
        # Scoped to build-push.yml's container-scan job only: build-tools.yml
        # still writes its persistent Trivy cache dirs to unscoped fixed
        # paths as of this change (PR #927, scoping + ephemeral cleanup for
        # that workflow, is open but not yet merged) -- retention there is
        # deliberately deferred to a follow-up once #927 lands, so this step
        # isn't built against a cache-dir shape that's about to change under
        # it.
        if: ${{ steps.trivy-cache.outputs.ephemeral == 'false' }}
        env:
          TRIVY_CACHE_DIR: ${{ steps.trivy-cache.outputs.dir }}
          TRIVY_CACHE_MAX_AGE_DAYS: "14"
        run: |
          set -euo pipefail
          # Fail closed the same way "Remove ephemeral Trivy cache" below
          # does: a step-output-derived path must never be trusted blindly
          # before an `rm -rf`, even after a future refactor of the prepare
          # step's output wiring.
          case "$TRIVY_CACHE_DIR" in
            /var/tmp/lancache-ng-trivy-cache/?*) ;;
            *)
              echo "::error::Refusing to touch unexpected Trivy cache path '$TRIVY_CACHE_DIR'."
              exit 1
              ;;
          esac
          stamp="$TRIVY_CACHE_DIR/.generation-stamp"
          if [ -f "$stamp" ] && [ -z "$(find "$stamp" -mtime "+${TRIVY_CACHE_MAX_AGE_DAYS}" -print -quit)" ]; then
            echo "Trivy cache generation for $TRIVY_CACHE_DIR is within ${TRIVY_CACHE_MAX_AGE_DAYS}d, keeping it."
            exit 0
          fi
          echo "Resetting Trivy cache generation for $TRIVY_CACHE_DIR (stamp missing or older than ${TRIVY_CACHE_MAX_AGE_DAYS}d)."
          rm -rf -- "$TRIVY_CACHE_DIR"
          mkdir -p -- "$TRIVY_CACHE_DIR"
          touch -- "$stamp"
      - name: Scan image with Trivy
        if: matrix.service != 'build-tools' || steps.build-tools-scan-changes.outputs.should-scan == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: lancache-ng-scan:${{ matrix.service }}-${{ matrix.platform_tag }}-${{ github.run_id }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          skip-dirs: /usr/local/rustup/toolchains
          hide-progress: true
          cache: "false"
          cache-dir: ${{ steps.trivy-cache.outputs.dir }}
          timeout: 10m
          exit-code: "1"
      - name: Remove ephemeral Trivy cache
        # Ephemeral dirs (dispatch/rerun/tag -- see the prepare step's own
        # comment) are cold-by-design and never read by any later run, so
        # keeping them would only leak one ~1-2.5 GB directory per run onto
        # the runner host (#912). `always()` so a failed or cancelled scan
        # still cleans up; when the prepare step was skipped its output is
        # empty and this step skips too. The case guard fails closed rather
        # than trusting the interpolated path blindly: `rm -rf` on a
        # step-output-derived path must never be able to escape the
        # dedicated cache root, even after a future refactor of the prepare
        # step's output wiring.
        if: ${{ always() && steps.trivy-cache.outputs.ephemeral == 'true' }}
        env:
          TRIVY_CACHE_DIR: ${{ steps.trivy-cache.outputs.dir }}
        run: |
          set -euo pipefail
          case "$TRIVY_CACHE_DIR" in
            /var/tmp/lancache-ng-trivy-cache/?*)
              rm -rf -- "$TRIVY_CACHE_DIR"
              ;;
            *)
              echo "::error::Refusing to delete unexpected Trivy cache path '$TRIVY_CACHE_DIR'."
              exit 1
              ;;
          esac
      - name: Remove scan image
        if: >-
          ${{
            always() &&
            (
              matrix.service != 'build-tools' ||
              steps.build-tools-scan-changes.outputs.should-scan == 'true'
            )
          }}
        run: docker rmi lancache-ng-scan:${{ matrix.service }}-${{ matrix.platform_tag }}-${{ github.run_id }} || true

  build:
    # This job is the only place that publishes service sha-* images. It stays
    # on self-hosted runners because the heavy Rust/image path depends on the
    # shared build-tools image, sccache/distcc acceleration, and registry
    # credentials. It still waits for lightweight validation, policy checks,
    # and trusted-ref vulnerability scans before publishing. For build-tools,
    # it also scans the exact pushed digest before attestation/promotion can
    # proceed.
    needs:
      - shellcheck
      - validate-compose
      - container-scan
      - detect-changes
      - ci_scope_policy
      - file-headers
      - pr-template-check
      - pr-tracking-metadata-check
      - pr-title-convention-check
      - line-endings
    if: >-
      ${{
        always() &&
        needs.shellcheck.result == 'success' &&
        needs['validate-compose'].result == 'success' &&
        needs.ci_scope_policy.result == 'success' &&
        needs['line-endings'].result == 'success' &&
        (github.event_name == 'pull_request' || needs['container-scan'].result == 'success') &&
        (github.event_name != 'pull_request' || needs['file-headers'].result == 'success') &&
        (github.event_name != 'pull_request' || needs['pr-template-check'].result == 'success') &&
        (github.event_name != 'pull_request' || needs['pr-tracking-metadata-check'].result == 'success') &&
        (github.event_name != 'pull_request' || needs['pr-title-convention-check'].result == 'success')
      }}
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    timeout-minutes: 150
    # Job-level concurrency (#888, keyed per matrix service and per ref).
    # CANONICAL RATIONALE for this whole workflow's dev-channel publish path
    # -- container-scan/build-arm64 and the shellcheck/validate-compose/
    # line-endings/ci_scope_policy gates all point here for the full story.
    #
    # cancel-in-progress is scoped to pull_request events ONLY (issue #979).
    # On a PR, a newer push to the same branch supersedes the older commit,
    # so cancelling the older service build reclaims a scarce lancache-heavy
    # slot (otherwise pinned for the full ~150-minute timeout) with no
    # downside: a PR's own commits are never promoted to a channel, GHCR tag
    # writes are atomic (a cancelled build never completes its final manifest
    # PUT, so it leaves no corrupt or partially-visible sha-* tag), and
    # merge-manifests already requires `needs.build.result == 'success'`, so a
    # cancelled build cleanly stops the pipeline via that gate.
    #
    # On push/tag it must NOT cancel. This branch build is what publishes the
    # commit's sha-* images that promote turns into the dev/nightly channel. The
    # top-level group uses a run_id-scoped key for push (never collides -- see
    # top of file), so a rapid v0.2.0/master merge cascade runs every push's
    # build fully in parallel with no throttle. With cancel-in-progress:true
    # each new push tore down the previous push's in-progress build before it
    # finished; in a fast enough cascade NO build completed for 90+ minutes,
    # starving the dev channel and failing #808's freshness gate on unrelated
    # PRs that backfill an untouched service from `dev` (issue #979 -- a
    # recurrence of #777's starvation one layer below the promote job). With
    # cancel false on push the in-progress build always survives to
    # completion; the channel still advances toward HEAD because GitHub keeps
    # only the newest *pending* run per group and drops older pending ones
    # regardless of this flag (see promote's #897 comment), and #808 needs
    # `dev` built at-or-after a PR's base commit, not exactly at it. Release
    # (tag) builds are unaffected: a tag ref never collides, so there was
    # never a cancellation to suppress there.
    #
    # The group key still isolates workflow_dispatch and reruns
    # (`github.run_attempt != '1'`) with a run_id suffix so a PR rerun cannot
    # cancel the original PR run's build; on push/tag the flag is false anyway.
    concurrency:
      group: >-
        ${{
          (github.event_name == 'workflow_dispatch' || github.run_attempt != '1') &&
          format('{0}-build-{1}-{2}-{3}', github.workflow, matrix.service, github.ref, github.run_id) ||
          format('{0}-build-{1}-{2}', github.workflow, matrix.service, github.ref)
        }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    env:
      BUILD_TOOLS_IMAGE: ${{ needs['validate-compose'].outputs.build_tools_image }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: proxy
            context: services/proxy
            # cdn-domains.txt lives in services/dns/, outside this image's own
            # build context — see services/proxy/Dockerfile's COPY --from
            # comment for why a named additional context is needed here.
            build_contexts: dns-domains=services/dns
            description: nginx-based lancache-ng caching proxy for standard and TLS-interception cache traffic.
          - service: dns
            context: services/dns
            build_contexts: ""
            description: PowerDNS recursor, authoritative DNS, and NATS subscriber service for lancache-ng cache routing.
            rust: true
          - service: watchdog
            context: services/watchdog
            build_contexts: ""
            description: lancache-ng watchdog helper for runtime health checks and recovery hooks.
          - service: dhcp
            context: services/dhcp
            build_contexts: ""
            description: Kea DHCP, control-agent, and DHCP-DDNS service for lancache-ng managed networks.
          - service: dhcp-proxy
            context: services/dhcp-proxy
            build_contexts: ""
            description: dnsmasq-based DHCP proxy and relay helper for lancache-ng deployments.
          - service: ui
            context: services/ui
            build_contexts: ""
            description: lancache-ng Admin UI and control-plane service for cache, DNS, DHCP, and secondary management.
            rust: true
          - service: build-tools
            context: tools/build-tools
            build_contexts: ""
            description: Prebuilt lancache-ng CI and developer validation toolchain image.

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Determine whether this service needs building
        id: should-build
        env:
          MATRIX_SERVICE: ${{ matrix.service }}
          DETECT_CHANGES_RESULT: ${{ needs['detect-changes'].result }}
        run: |
          set -euo pipefail

          should_build=true
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            if [ "$DETECT_CHANGES_RESULT" != "success" ]; then
              echo "::error::Pull request build scoping requires detect-changes to succeed, got '$DETECT_CHANGES_RESULT'."
              exit 1
            fi
            case "$MATRIX_SERVICE" in
              proxy) should_build="${{ needs['detect-changes'].outputs.proxy }}" ;;
              dns) should_build="${{ needs['detect-changes'].outputs.dns_image }}" ;;
              watchdog) should_build="${{ needs['detect-changes'].outputs.watchdog }}" ;;
              dhcp) should_build="${{ needs['detect-changes'].outputs.dhcp }}" ;;
              dhcp-proxy) should_build="${{ needs['detect-changes'].outputs.dhcp_proxy }}" ;;
              ui) should_build="${{ needs['detect-changes'].outputs.ui }}" ;;
              build-tools) should_build="${{ needs['detect-changes'].outputs.build_tools }}" ;;
              *)
                echo "::error::Unknown matrix service '$MATRIX_SERVICE' has no path-scoping mapping."
                exit 1
                ;;
            esac
            if [ "${{ needs['detect-changes'].outputs.workflow }}" = "true" ] && [ "$MATRIX_SERVICE" != "build-tools" ]; then
              should_build=true
            fi
          elif [ "$MATRIX_SERVICE" = "build-tools" ]; then
            # Build-tools publishes the sha-* source image on every trusted ref
            # so the promotion job always has a source image to move.
            should_build=true
          fi

          case "$should_build" in
            true|false)
              ;;
            *)
              echo "::error::Build scope for $MATRIX_SERVICE must resolve to true or false, got '${should_build:-<empty>}'."
              exit 1
              ;;
          esac

          if [ "$should_build" = "true" ]; then
            echo "::notice::$MATRIX_SERVICE inputs changed (or this is not a pull request); image build remains enabled."
          else
            echo "::notice::$MATRIX_SERVICE inputs did not change in this pull request; skipping routine image rebuild."
          fi
          echo "should-build=$should_build" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.should-build.outputs.should-build == 'true'
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        # Pull requests now also log in: this same-repo-only project (no fork
        # PRs, confirmed in #626) pushes a PR-scoped staging tag below so
        # "validate full-setup image" can test the PR's own commits instead
        # of stale base-branch state. The fork check is a fail-safe in case
        # that assumption ever stops holding -- a fork PR's GITHUB_TOKEN is
        # read-only anyway, so login would fail loudly rather than silently.
        # Dependabot PRs get the same read-only-token treatment as fork PRs
        # (GitHub docs: Dependabot Actions runs never get a write-scoped
        # GITHUB_TOKEN, even for a same-repo PR) -- excluded explicitly so
        # this step (and the push below) is skipped cleanly instead of
        # attempting a login/push that GitHub would reject with a 403.
        if: >-
          ${{
            steps.should-build.outputs.should-build == 'true' &&
            (
              github.event_name != 'pull_request' ||
              (
                github.actor != 'dependabot[bot]' &&
                github.event.pull_request.head.repo.full_name == github.repository
              )
            )
          }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        # This job only ever publishes the linux/amd64 leg of each service
        # image, under a platform-suffixed tag. The merge-manifests job below
        # combines this tag with build-arm64's linux/arm64 tag into the real
        # sha-<commit> multi-platform tag that promote/release/setup.sh
        # actually consume -- see docs/self-hosted-actions-runner.md.
        if: steps.should-build.outputs.should-build == 'true'
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short,suffix=-amd64

      # Uses github.sha (the actual checked-out/built commit), NOT
      # docker/metadata-action's `type=sha` output above and NOT the PR
      # branch's own head commit. For a pull_request event, github.sha is
      # the synthetic merge commit -- head merged into the base branch's
      # tip AT THE TIME OF THIS EVENT -- and that's exactly the property
      # needed here: it changes whenever the actual built content changes,
      # even if the PR's own head commit doesn't (e.g. a "reopened" event
      # after the base branch moved while the PR was closed), and it stays
      # the same across a re-run of the identical event (GitHub reuses the
      # original event's github.sha for re-runs, not a freshly re-resolved
      # one). Tagging by the PR head SHA alone let two different events for
      # the same head, merged against two different base states, collide on
      # one tag -- and since this workflow's concurrency group does not
      # cancel in-progress PR runs, a slower/older run could overwrite a
      # newer run's tag with different image content after the fact. The
      # `pr-<N>-` prefix lets the GC workflow
      # (.github/workflows/gc-pr-staging-images.yml) find and reap this
      # once the PR closes. The `-amd64` suffix matches this job's own
      # per-arch tag convention (see "Extract metadata" above);
      # merge-manifests combines it with build-arm64's `-arm64` PR staging
      # tag into the real pr-<N>-sha-<short> multi-platform tag that
      # full-setup-validate actually consumes.
      - name: Compute PR staging tag
        id: pr-tag
        if: >-
          ${{
            github.event_name == 'pull_request' &&
            steps.should-build.outputs.should-build == 'true' &&
            github.actor != 'dependabot[bot]' &&
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BUILD_SHA: ${{ github.sha }}
          MATRIX_SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail

          short_sha="${BUILD_SHA::7}"
          tag="pr-${PR_NUMBER}-sha-${short_sha}-amd64"
          echo "::notice::This PR's linux/amd64 staging tag for $MATRIX_SERVICE is $tag."
          {
            printf 'tag=%s\n' "$tag"
            printf 'image=ghcr.io/%s/%s:%s\n' "${{ github.repository }}" "$MATRIX_SERVICE" "$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve build-tools base image digests
        id: build-tools-base-digests
        if: matrix.service == 'build-tools' && steps.should-build.outputs.should-build == 'true'
        run: |
          set -euo pipefail

          digest_for_image() {
            local image=$1 digest
            digest="$(docker buildx imagetools inspect "$image" --format '{{json .Manifest.Digest}}')"
            digest="${digest%\"}"
            digest="${digest#\"}"
            if [[ -z "$digest" || "$digest" = "null" ]]; then
              echo "::error::Could not read digest for $image."
              exit 1
            fi
            printf '%s\n' "$digest"
          }

          {
            printf 'rust=%s\n' "$(digest_for_image rust:latest)"
            printf 'golang=%s\n' "$(digest_for_image golang:latest)"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare local Buildx cache
        if: steps.should-build.outputs.should-build == 'true'
        id: buildx-cache
        env:
          BUILDX_CACHE_ROOT: /var/tmp/lancache-ng-buildx-cache
          BUILDX_CACHE_READ: ${{ runner.temp }}/lancache-ng-buildx-cache/${{ matrix.service }}-read
          BUILDX_CACHE_DEST: ${{ runner.temp }}/lancache-ng-buildx-cache/${{ matrix.service }}-new
        run: |
          set -euo pipefail

          if ! command -v flock >/dev/null 2>&1; then
            echo "::error::flock is required for safe local Buildx cache locking."
            exit 1
          fi

          cache_dir="$BUILDX_CACHE_ROOT/${{ matrix.service }}"
          lock_file="$BUILDX_CACHE_ROOT/${{ matrix.service }}.lock"

          mkdir -p "$BUILDX_CACHE_ROOT"
          rm -rf "$BUILDX_CACHE_READ" "$BUILDX_CACHE_DEST"
          mkdir -p "$BUILDX_CACHE_READ" "$(dirname "$BUILDX_CACHE_DEST")"

          (
            flock -x 9
            mkdir -p "$cache_dir"
            cp -a "$cache_dir/." "$BUILDX_CACHE_READ/"
          ) 9>"$lock_file"

          {
            echo "cache-from=$BUILDX_CACHE_READ"
            echo "cache-to=$BUILDX_CACHE_DEST"
          } >> "$GITHUB_OUTPUT"

      - name: Compute Docker build parallelism
        if: steps.should-build.outputs.should-build == 'true'
        id: docker-build-jobs
        run: |
          set -euo pipefail

          if [ -n "${CARGO_BUILD_JOBS:-}" ]; then
            case "$CARGO_BUILD_JOBS" in
              ''|*[!0-9]*)
                echo "::error::CARGO_BUILD_JOBS must be a positive integer."
                exit 1
                ;;
            esac
            if [ "$CARGO_BUILD_JOBS" -le 0 ]; then
              echo "::error::CARGO_BUILD_JOBS must be greater than zero."
              exit 1
            fi
            jobs="$CARGO_BUILD_JOBS"
            echo "::notice::Using CARGO_BUILD_JOBS=$jobs from repository variable for Docker builds."
          else
            detected_cores="$(nproc 2>/dev/null || getconf _NPROCESSORS_ONLN || echo 2)"
            jobs=$((detected_cores - 2))
            if [ "$jobs" -lt 4 ]; then
              jobs=4
            fi
            echo "::notice::Using CARGO_BUILD_JOBS=$jobs from $detected_cores detected cores for Docker builds."
          fi

          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

      - name: Prepare Rust acceleration secret files
        if: >-
          ${{
            (
              steps.should-build.outputs.should-build == 'true'
            ) &&
            matrix.rust == true &&
            github.actor != 'dependabot[bot]' &&
            github.event_name != 'pull_request'
          }}
        id: sccache-secret
        env:
          SCCACHE_REDIS_MODE: ${{ vars.SCCACHE_REDIS_MODE }}
          SCCACHE_REDIS_URL: ${{ secrets.SCCACHE_REDIS_URL }}
          SCCACHE_DIST_SCHEDULER_URL: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          SCCACHE_DIST_AUTH_TOKEN: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
          DISTCC_POTENTIAL_HOSTS: ${{ vars.DISTCC_POTENTIAL_HOSTS }}
        run: |
          set -euo pipefail

          mode="${SCCACHE_REDIS_MODE:-required}"
          secret_files=()

          toml_escape() {
            printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
          }

          case "$mode" in
            required|optional|off)
              ;;
            *)
              echo "::error::SCCACHE_REDIS_MODE must be one of: required, optional, off."
              exit 1
              ;;
          esac

          sccache_enabled=1
          redis_enabled=1
          if [ "$mode" = "off" ]; then
            sccache_enabled=0
            redis_enabled=0
            echo "Redis-backed sccache is disabled by SCCACHE_REDIS_MODE=off."
          fi

          if [ "$sccache_enabled" = "1" ] && [ -n "$SCCACHE_DIST_SCHEDULER_URL" ] && [ -z "$SCCACHE_DIST_AUTH_TOKEN" ]; then
            echo "::error::SCCACHE_DIST_AUTH_TOKEN is required when SCCACHE_DIST_SCHEDULER_URL is set."
            exit 1
          fi

          if [ "$sccache_enabled" = "1" ] && [ -z "$SCCACHE_DIST_SCHEDULER_URL" ] && [ -n "$SCCACHE_DIST_AUTH_TOKEN" ]; then
            echo "::error::SCCACHE_DIST_SCHEDULER_URL is required when SCCACHE_DIST_AUTH_TOKEN is set."
            exit 1
          fi

          if [ "$sccache_enabled" = "1" ] && [ -z "$SCCACHE_REDIS_URL" ]; then
            if [ "$mode" = "optional" ]; then
              echo "Skipping Redis-backed sccache because SCCACHE_REDIS_URL is empty and SCCACHE_REDIS_MODE=optional."
              redis_enabled=0
            else
              echo "::error::SCCACHE_REDIS_URL repository secret is required for trusted Rust image builds so sccache can use Redis."
              exit 1
            fi
          fi

          umask 077
          if [ "$redis_enabled" = "1" ]; then
            redis_file="${{ runner.temp }}/sccache-redis-url"
            printf '%s' "$SCCACHE_REDIS_URL" > "$redis_file"
            secret_files+=("sccache_redis_url=$redis_file")
            echo "redis-file=$redis_file" >> "$GITHUB_OUTPUT"
          fi

          # This job only ever builds linux/amd64 (see build-arm64 for the
          # native arm64 leg), so dist/distcc acceleration -- LAN-only
          # infrastructure tied to the self-hosted amd64 runner pool -- is
          # unconditionally applicable here.
          if [ "$sccache_enabled" = "1" ] && [ -n "$SCCACHE_DIST_SCHEDULER_URL" ]; then
            dist_config_file="${{ runner.temp }}/sccache-dist-config"
            {
              printf '[dist]\n'
              printf 'scheduler_url = "%s"\n' "$(toml_escape "$SCCACHE_DIST_SCHEDULER_URL")"
              printf 'toolchains = []\n'
              printf 'toolchain_cache_size = 5368709120\n'
              printf '\n[dist.auth]\n'
              printf 'type = "token"\n'
              printf 'token = "%s"\n' "$(toml_escape "$SCCACHE_DIST_AUTH_TOKEN")"
            } > "$dist_config_file"
            secret_files+=("sccache_dist_config=$dist_config_file")
            echo "dist-config-file=$dist_config_file" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$DISTCC_POTENTIAL_HOSTS" ]; then
            if ! printf '%s\n' "$DISTCC_POTENTIAL_HOSTS" | grep -q ',cpp'; then
              echo "::error::DISTCC_POTENTIAL_HOSTS must include at least one pump-capable host with the ',cpp' option."
              exit 1
            fi

            distcc_hosts_file="${{ runner.temp }}/distcc-potential-hosts"
            printf '%s' "$DISTCC_POTENTIAL_HOSTS" > "$distcc_hosts_file"
            secret_files+=("distcc_potential_hosts=$distcc_hosts_file")
            echo "distcc-hosts-file=$distcc_hosts_file" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "secret-files<<SECRET_FILES"
            printf '%s\n' "${secret_files[@]}"
            echo "SECRET_FILES"
          } >> "$GITHUB_OUTPUT"

      - name: Select Rust acceleration network
        if: matrix.rust == true
        env:
          SECRET_FILES: ${{ steps.sccache-secret.outputs.secret-files }}
        run: |
          set -euo pipefail

          # Default to bridge so GitHub-hosted or otherwise non-accelerated paths stay valid.
          # Secret-backed jobs switch to host only when the acceleration inputs exist.
          rust_network=bridge
          buildx_network=default
          if [ -n "$SECRET_FILES" ]; then
            rust_network=host
            buildx_network=host
          fi
          printf 'RUST_ACCELERATION_NETWORK=%s\n' "$rust_network" >> "$GITHUB_ENV"
          printf 'RUST_BUILDX_NETWORK=%s\n' "$buildx_network" >> "$GITHUB_ENV"

      - name: Validate acceleration infrastructure outside BuildKit cache
        if: matrix.rust == true
        uses: ./.github/actions/rust-acceleration-preflight
        with:
          service: ${{ matrix.service }}
          redis-file: ${{ steps.sccache-secret.outputs.redis-file }}
          dist-config-file: ${{ steps.sccache-secret.outputs.dist-config-file }}
          distcc-hosts-file: ${{ steps.sccache-secret.outputs.distcc-hosts-file }}
          build-tools-image: ${{ env.BUILD_TOOLS_IMAGE }}
          build-network: ${{ env.RUST_ACCELERATION_NETWORK }}
          platform: linux/amd64

      - name: Build and push
        # #822 ("Pattern D"): ghcr.io push-token issuance intermittently
        # fails with "403 Forbidden"/"denied: denied"/"401 Unauthorized" for
        # the slowest (Rust) builds in this matrix; a manual `gh run rerun`
        # (fresh login, some time elapsed) has fixed every occurrence so far.
        # This composite action is the shared retry+re-login policy every
        # GHCR-writing step in the project now uses (see
        # .github/actions/ghcr-build-push-retry and scripts/lib/ghcr-retry.sh
        # for why a `uses:` step like docker/build-push-action needs its own
        # wrapper instead of sourcing the shared shell function directly).
        id: build
        if: steps.should-build.outputs.should-build == 'true'
        timeout-minutes: 60
        uses: ./.github/actions/ghcr-build-push-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ matrix.context }}
          build-contexts: ${{ matrix.build_contexts }}
          secret-files: ${{ steps.sccache-secret.outputs.secret-files }}
          build-args: |
            BUILD_TOOLS_IMAGE=${{ env.BUILD_TOOLS_IMAGE }}
            CARGO_BUILD_JOBS=${{ steps.docker-build-jobs.outputs.jobs }}
          network: ${{ env.RUST_BUILDX_NETWORK }}
          allow: ${{ env.RUST_BUILDX_NETWORK == 'host' && 'network.host' || '' }}
          push: ${{ github.event_name != 'pull_request' || (github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository) }}
          tags: ${{ steps.pr-tag.outputs.image || steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.description=${{ matrix.description }}
            ${{ matrix.service == 'build-tools' && format('org.opencontainers.image.base.rust.digest={0}', steps.build-tools-base-digests.outputs.rust) || '' }}
            ${{ matrix.service == 'build-tools' && format('org.opencontainers.image.base.golang.digest={0}', steps.build-tools-base-digests.outputs.golang) || '' }}
          # No `annotations:` input here (issue #620). A genuinely
          # single-platform push with provenance disabled has no index for
          # buildx to attach an index-level description annotation to --
          # `docker buildx build --annotation index:...` on a real
          # single-platform push errors outright ("index annotations not
          # supported for single platform export"), confirmed live against
          # this project's own images. Forcing OCI mediatypes here (instead
          # of the legacy Docker manifest v2 schema) is still required
          # groundwork: `docker buildx imagetools create` downstream (in
          # merge-manifests) silently drops --annotation with no error at all
          # when combining Docker-format sources, because Docker's manifest
          # list schema has no annotations field -- also confirmed live.
          # merge-manifests is the first point where a genuine multi-platform
          # index exists, so that's where the description annotation is
          # actually attached; channel/stack promotions downstream of it
          # carbon-copy that annotation forward untouched.
          outputs: type=image,oci-mediatypes=true
          platforms: linux/amd64
          provenance: false
          cache-from: type=local,src=${{ steps.buildx-cache.outputs.cache-from }}
          cache-to: type=local,dest=${{ steps.buildx-cache.outputs.cache-to }},mode=max

      - name: Rotate local Buildx cache
        if: >-
          ${{
            (
              steps.should-build.outputs.should-build == 'true'
            ) &&
            always() &&
            steps.build.outcome == 'success'
          }}
        env:
          BUILDX_CACHE_ROOT: /var/tmp/lancache-ng-buildx-cache
          BUILDX_CACHE_DEST: ${{ steps.buildx-cache.outputs.cache-to }}
        run: |
          set -euo pipefail

          if [ ! -d "$BUILDX_CACHE_DEST" ]; then
            exit 0
          fi

          cache_dir="$BUILDX_CACHE_ROOT/${{ matrix.service }}"
          lock_file="$BUILDX_CACHE_ROOT/${{ matrix.service }}.lock"

          mkdir -p "$BUILDX_CACHE_ROOT"
          (
            flock -x 9
            rm -rf "$BUILDX_CACHE_ROOT/${{ matrix.service }}"
            mv "$BUILDX_CACHE_DEST" "$cache_dir"
          ) 9>"$lock_file"

      - name: Prepare pushed build-tools Trivy cache
        # Same shared-cache-directory race as container-scan's own Trivy step
        # above (#904): this job's own concurrency group (see top of `build`)
        # is keyed by service+ref[+run_id], so two different trusted refs (or
        # a dispatch/rerun overlapping a fresh push) building `build-tools`
        # can now run this step concurrently, and a static `build-tools-
        # pushed` directory would let them race on the same BoltDB cache
        # file. Mirrors that job's concurrency-group key exactly (sanitized
        # `github.ref`, plus a `run_id` suffix in the identical
        # workflow_dispatch/rerun condition the group uses) -- see
        # container-scan's equivalent step above for the full invariant this
        # has to satisfy (cache-dir key must be at least as fine as the
        # concurrency-group key, not merely finer than the old static path)
        # and the same ephemeral-dir classification and cleanup rationale
        # (#912): dispatch/rerun and tag-ref dirs are cold-by-design, never
        # reused by a later run, and are deleted again by the "Remove
        # ephemeral pushed build-tools Trivy cache" step below the scan.
        id: trivy-cache
        if: >-
          ${{
            github.event_name != 'pull_request' &&
            matrix.service == 'build-tools' &&
            steps.build.outcome == 'success'
          }}
        run: |
          set -euo pipefail
          sanitized_ref="$(printf '%s' "$GITHUB_REF" | tr '/:@' '---' | tr -cd 'A-Za-z0-9_.-')"
          if [ -z "$sanitized_ref" ]; then
            echo "::error::Could not derive a safe Trivy cache directory name from ref '$GITHUB_REF'."
            exit 1
          fi
          cache_dir="/var/tmp/lancache-ng-trivy-cache/build-tools-pushed-${sanitized_ref}"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || [ "$GITHUB_RUN_ATTEMPT" != "1" ] \
            || [ "${GITHUB_REF#refs/tags/}" != "$GITHUB_REF" ]; then
            cache_dir="${cache_dir}-${GITHUB_RUN_ID}"
            echo "ephemeral=true" >> "$GITHUB_OUTPUT"
          else
            echo "ephemeral=false" >> "$GITHUB_OUTPUT"
          fi
          mkdir -p "$cache_dir"
          echo "dir=$cache_dir" >> "$GITHUB_OUTPUT"

      - name: Enforce pushed build-tools Trivy cache generation retention
        # Same rationale, sentinel-file mechanism, and #927 build-tools.yml
        # deferral as container-scan's "Enforce Trivy cache generation
        # retention" step above -- see that step's comment for the full
        # reasoning. This is the `build-tools-pushed-<ref>` persistent dir's
        # equivalent: reused on every non-PR push/schedule run, never
        # touched by the ephemeral cleanup step below or by host-level
        # tmpfiles aging (#928).
        if: ${{ steps.trivy-cache.outputs.ephemeral == 'false' }}
        env:
          TRIVY_CACHE_DIR: ${{ steps.trivy-cache.outputs.dir }}
          TRIVY_CACHE_MAX_AGE_DAYS: "14"
        run: |
          set -euo pipefail
          case "$TRIVY_CACHE_DIR" in
            /var/tmp/lancache-ng-trivy-cache/?*) ;;
            *)
              echo "::error::Refusing to touch unexpected Trivy cache path '$TRIVY_CACHE_DIR'."
              exit 1
              ;;
          esac
          stamp="$TRIVY_CACHE_DIR/.generation-stamp"
          if [ -f "$stamp" ] && [ -z "$(find "$stamp" -mtime "+${TRIVY_CACHE_MAX_AGE_DAYS}" -print -quit)" ]; then
            echo "Trivy cache generation for $TRIVY_CACHE_DIR is within ${TRIVY_CACHE_MAX_AGE_DAYS}d, keeping it."
            exit 0
          fi
          echo "Resetting Trivy cache generation for $TRIVY_CACHE_DIR (stamp missing or older than ${TRIVY_CACHE_MAX_AGE_DAYS}d)."
          rm -rf -- "$TRIVY_CACHE_DIR"
          mkdir -p -- "$TRIVY_CACHE_DIR"
          touch -- "$stamp"

      - name: Scan pushed build-tools digest with Trivy
        # Build-tools influences every downstream validation job, so the exact
        # pushed digest is scanned before provenance and channel promotion.
        if: >-
          ${{
            github.event_name != 'pull_request' &&
            matrix.service == 'build-tools' &&
            steps.build.outcome == 'success'
          }}
        timeout-minutes: 20
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          skip-dirs: /usr/local/rustup/toolchains
          hide-progress: true
          cache: "false"
          cache-dir: ${{ steps.trivy-cache.outputs.dir }}
          timeout: 10m
          exit-code: "1"

      - name: Remove ephemeral pushed build-tools Trivy cache
        # Same rationale and fail-closed path guard as container-scan's
        # "Remove ephemeral Trivy cache" step above: ephemeral dirs
        # (dispatch/rerun/tag) are never read by any later run, so they are
        # deleted at job end instead of leaking ~1-2.5 GB per run onto the
        # runner host (#912). `always()` covers a failed/cancelled scan; a
        # skipped prepare step leaves the output empty, skipping this too.
        if: ${{ always() && steps.trivy-cache.outputs.ephemeral == 'true' }}
        env:
          TRIVY_CACHE_DIR: ${{ steps.trivy-cache.outputs.dir }}
        run: |
          set -euo pipefail
          case "$TRIVY_CACHE_DIR" in
            /var/tmp/lancache-ng-trivy-cache/?*)
              rm -rf -- "$TRIVY_CACHE_DIR"
              ;;
            *)
              echo "::error::Refusing to delete unexpected Trivy cache path '$TRIVY_CACHE_DIR'."
              exit 1
              ;;
          esac

      # No separate "Log in to GHCR for provenance attestation" step: the
      # ghcr-attest-retry composite action re-authenticates itself before
      # each retry (see that action), and its first attempt reuses the
      # session docker/login-action already created earlier in this job for
      # the "Build and push" step above.
      - name: Attest image build provenance
        if: >-
          ${{
            github.event_name != 'pull_request' &&
            (
              steps.should-build.outputs.should-build == 'true'
            )
          }}
        uses: ./.github/actions/ghcr-attest-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          subject-name: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          subject-digest: ${{ steps.build.outputs.digest }}

  build-arm64:
    # Native linux/arm64 leg of the same publish contract as build above.
    # Runs on a GitHub-hosted arm64 runner (free for this public repo, GA
    # since 2026-08-07) instead of QEMU on the self-hosted amd64 pool, so
    # ui/dns compile Rust natively rather than emulated. This runner is
    # outside the self-hosted LAN and cannot reach Redis-backed sccache,
    # sccache-dist, or distcc -- see docs/self-hosted-actions-runner.md.
    # merge-manifests below combines this job's per-service linux/arm64 tag
    # with build's linux/amd64 tag into the real sha-<commit> multi-platform
    # tag; this job never writes that tag directly.
    needs:
      - shellcheck
      - validate-compose
      - container-scan
      - detect-changes
      - ci_scope_policy
      - file-headers
      - pr-template-check
      - pr-tracking-metadata-check
      - pr-title-convention-check
      - line-endings
    if: >-
      ${{
        always() &&
        needs.shellcheck.result == 'success' &&
        needs['validate-compose'].result == 'success' &&
        needs.ci_scope_policy.result == 'success' &&
        needs['line-endings'].result == 'success' &&
        (github.event_name == 'pull_request' || needs['container-scan'].result == 'success') &&
        (github.event_name != 'pull_request' || needs['file-headers'].result == 'success') &&
        (github.event_name != 'pull_request' || needs['pr-template-check'].result == 'success') &&
        (github.event_name != 'pull_request' || needs['pr-tracking-metadata-check'].result == 'success') &&
        (github.event_name != 'pull_request' || needs['pr-title-convention-check'].result == 'success')
      }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    # Job-level concurrency, mirroring `build` (the amd64 leg) exactly, and
    # for the same reasons -- see `build`'s group comment for the full #979
    # rationale. cancel-in-progress is pull_request-only: merge-manifests
    # needs this native arm64 leg's success, so on push it is on the
    # dev-channel publish path and must survive to completion (cancelling it
    # in a merge cascade starves `dev` exactly like cancelling `build`). On a
    # PR, a superseded commit's arm64 leg is wasted work merge-manifests can
    # never use, so cancelling it there reclaims arm64 runner capacity. Same
    # `workflow_dispatch`/rerun run_id isolation as `build`'s group.
    concurrency:
      group: >-
        ${{
          (github.event_name == 'workflow_dispatch' || github.run_attempt != '1') &&
          format('{0}-build-arm64-{1}-{2}-{3}', github.workflow, matrix.service, github.ref, github.run_id) ||
          format('{0}-build-arm64-{1}-{2}', github.workflow, matrix.service, github.ref)
        }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    env:
      BUILD_TOOLS_IMAGE: ${{ needs['validate-compose'].outputs.build_tools_image }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: proxy
            context: services/proxy
            build_contexts: dns-domains=services/dns
            description: nginx-based lancache-ng caching proxy for standard and TLS-interception cache traffic.
          - service: dns
            context: services/dns
            build_contexts: ""
            description: PowerDNS recursor, authoritative DNS, and NATS subscriber service for lancache-ng cache routing.
            rust: true
          - service: watchdog
            context: services/watchdog
            build_contexts: ""
            description: lancache-ng watchdog helper for runtime health checks and recovery hooks.
          - service: dhcp
            context: services/dhcp
            build_contexts: ""
            description: Kea DHCP, control-agent, and DHCP-DDNS service for lancache-ng managed networks.
          - service: dhcp-proxy
            context: services/dhcp-proxy
            build_contexts: ""
            description: dnsmasq-based DHCP proxy and relay helper for lancache-ng deployments.
          - service: ui
            context: services/ui
            build_contexts: ""
            description: lancache-ng Admin UI and control-plane service for cache, DNS, DHCP, and secondary management.
            rust: true
          - service: build-tools
            context: tools/build-tools
            build_contexts: ""
            description: Prebuilt lancache-ng CI and developer validation toolchain image.

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Determine whether this service needs building
        id: should-build
        env:
          MATRIX_SERVICE: ${{ matrix.service }}
          DETECT_CHANGES_RESULT: ${{ needs['detect-changes'].result }}
        run: |
          set -euo pipefail

          should_build=true
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            if [ "$DETECT_CHANGES_RESULT" != "success" ]; then
              echo "::error::Pull request build scoping requires detect-changes to succeed, got '$DETECT_CHANGES_RESULT'."
              exit 1
            fi
            case "$MATRIX_SERVICE" in
              proxy) should_build="${{ needs['detect-changes'].outputs.proxy }}" ;;
              dns) should_build="${{ needs['detect-changes'].outputs.dns_image }}" ;;
              watchdog) should_build="${{ needs['detect-changes'].outputs.watchdog }}" ;;
              dhcp) should_build="${{ needs['detect-changes'].outputs.dhcp }}" ;;
              dhcp-proxy) should_build="${{ needs['detect-changes'].outputs.dhcp_proxy }}" ;;
              ui) should_build="${{ needs['detect-changes'].outputs.ui }}" ;;
              build-tools) should_build="${{ needs['detect-changes'].outputs.build_tools }}" ;;
              *)
                echo "::error::Unknown matrix service '$MATRIX_SERVICE' has no path-scoping mapping."
                exit 1
                ;;
            esac
            if [ "${{ needs['detect-changes'].outputs.workflow }}" = "true" ] && [ "$MATRIX_SERVICE" != "build-tools" ]; then
              should_build=true
            fi
          elif [ "$MATRIX_SERVICE" = "build-tools" ]; then
            should_build=true
          fi

          case "$should_build" in
            true|false)
              ;;
            *)
              echo "::error::Build scope for $MATRIX_SERVICE must resolve to true or false, got '${should_build:-<empty>}'."
              exit 1
              ;;
          esac

          if [ "$should_build" = "true" ]; then
            echo "::notice::$MATRIX_SERVICE inputs changed (or this is not a pull request); image build remains enabled."
          else
            echo "::notice::$MATRIX_SERVICE inputs did not change in this pull request; skipping routine image rebuild."
          fi
          echo "should-build=$should_build" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        # Issue #930: retried via .github/actions/buildx-setup-retry -- this
        # GitHub-hosted arm64 runner is a fresh VM every run and has hit
        # Docker Hub's anonymous-pull rate limit (surfacing as
        # "unauthorized: authentication required") while bootstrapping
        # moby/buildkit:buildx-stable-1. Confirmed transient: a rerun with
        # zero code changes succeeded. The self-hosted amd64 `build` job's
        # equivalent step keeps the plain, unretried action -- it persists
        # its local Buildx cache/image pulls across runs and has never shown
        # this symptom.
        if: steps.should-build.outputs.should-build == 'true'
        id: buildx
        uses: ./.github/actions/buildx-setup-retry

      - name: Log in to GHCR
        # Same fork-safety and Dependabot-safety reasoning as build's own
        # "Log in to GHCR" step.
        if: >-
          ${{
            steps.should-build.outputs.should-build == 'true' &&
            (
              github.event_name != 'pull_request' ||
              (
                github.actor != 'dependabot[bot]' &&
                github.event.pull_request.head.repo.full_name == github.repository
              )
            )
          }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        # Suffixed the same way as build's linux/amd64 tag, just for the
        # arm64 leg -- see the comment on build's own "Extract metadata" step.
        if: steps.should-build.outputs.should-build == 'true'
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short,suffix=-arm64

      # Mirrors build's own "Compute PR staging tag" step, just for the
      # arm64 leg -- see that step's comment for the full rationale.
      - name: Compute PR staging tag
        id: pr-tag
        if: >-
          ${{
            github.event_name == 'pull_request' &&
            steps.should-build.outputs.should-build == 'true' &&
            github.actor != 'dependabot[bot]' &&
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BUILD_SHA: ${{ github.sha }}
          MATRIX_SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail

          short_sha="${BUILD_SHA::7}"
          tag="pr-${PR_NUMBER}-sha-${short_sha}-arm64"
          echo "::notice::This PR's linux/arm64 staging tag for $MATRIX_SERVICE is $tag."
          {
            printf 'tag=%s\n' "$tag"
            printf 'image=ghcr.io/%s/%s:%s\n' "${{ github.repository }}" "$MATRIX_SERVICE" "$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve build-tools base image digests
        id: build-tools-base-digests
        if: matrix.service == 'build-tools' && steps.should-build.outputs.should-build == 'true'
        run: |
          set -euo pipefail

          digest_for_image() {
            local image=$1 digest
            digest="$(docker buildx imagetools inspect "$image" --format '{{json .Manifest.Digest}}')"
            digest="${digest%\"}"
            digest="${digest#\"}"
            if [[ -z "$digest" || "$digest" = "null" ]]; then
              echo "::error::Could not read digest for $image."
              exit 1
            fi
            printf '%s\n' "$digest"
          }

          {
            printf 'rust=%s\n' "$(digest_for_image rust:latest)"
            printf 'golang=%s\n' "$(digest_for_image golang:latest)"
          } >> "$GITHUB_OUTPUT"

      - name: Compute Docker build parallelism
        if: steps.should-build.outputs.should-build == 'true'
        id: docker-build-jobs
        run: |
          set -euo pipefail

          if [ -n "${CARGO_BUILD_JOBS:-}" ]; then
            case "$CARGO_BUILD_JOBS" in
              ''|*[!0-9]*)
                echo "::error::CARGO_BUILD_JOBS must be a positive integer."
                exit 1
                ;;
            esac
            if [ "$CARGO_BUILD_JOBS" -le 0 ]; then
              echo "::error::CARGO_BUILD_JOBS must be greater than zero."
              exit 1
            fi
            jobs="$CARGO_BUILD_JOBS"
            echo "::notice::Using CARGO_BUILD_JOBS=$jobs from repository variable for Docker builds."
          else
            detected_cores="$(nproc 2>/dev/null || getconf _NPROCESSORS_ONLN || echo 2)"
            jobs=$((detected_cores - 2))
            if [ "$jobs" -lt 4 ]; then
              jobs=4
            fi
            echo "::notice::Using CARGO_BUILD_JOBS=$jobs from $detected_cores detected cores for Docker builds."
          fi

          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

      - name: Build and push
        # No secret-files/network/allow here: this runner cannot reach the
        # LAN-only Redis/sccache-dist/distcc acceleration infrastructure, so
        # this always builds as a plain, uncached (but native) cargo build.
        # Uses the GitHub Actions cache backend (type=gha) instead of the
        # self-hosted local Buildx cache, since this runner is ephemeral and
        # has no persistent /var/tmp to reuse across runs.
        #
        # #822: same shared GHCR retry+re-login policy as build's own
        # equivalent step -- see .github/actions/ghcr-build-push-retry.
        id: build
        if: steps.should-build.outputs.should-build == 'true'
        timeout-minutes: 90
        uses: ./.github/actions/ghcr-build-push-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ matrix.context }}
          build-contexts: ${{ matrix.build_contexts }}
          build-args: |
            BUILD_TOOLS_IMAGE=${{ env.BUILD_TOOLS_IMAGE }}
            CARGO_BUILD_JOBS=${{ steps.docker-build-jobs.outputs.jobs }}
          push: ${{ github.event_name != 'pull_request' || (github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository) }}
          tags: ${{ steps.pr-tag.outputs.image || steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.description=${{ matrix.description }}
            ${{ matrix.service == 'build-tools' && format('org.opencontainers.image.base.rust.digest={0}', steps.build-tools-base-digests.outputs.rust) || '' }}
            ${{ matrix.service == 'build-tools' && format('org.opencontainers.image.base.golang.digest={0}', steps.build-tools-base-digests.outputs.golang) || '' }}
          # See build's equivalent step for why there is no `annotations:`
          # input here and why `outputs: type=image,oci-mediatypes=true` is
          # still required groundwork for issue #620.
          outputs: type=image,oci-mediatypes=true
          platforms: linux/arm64
          provenance: false
          cache-from: type=gha,scope=${{ matrix.service }}-arm64
          cache-to: type=gha,scope=${{ matrix.service }}-arm64,mode=max

      - name: Scan pushed build-tools digest with Trivy
        # Same exact-pushed-digest scan build performs for its linux/amd64
        # build-tools image, mirrored here for the linux/arm64 digest.
        if: >-
          ${{
            github.event_name != 'pull_request' &&
            matrix.service == 'build-tools' &&
            steps.build.outcome == 'success'
          }}
        timeout-minutes: 20
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          skip-dirs: /usr/local/rustup/toolchains
          hide-progress: true
          cache: "false"
          timeout: 10m
          exit-code: "1"

      # No separate "Log in to GHCR for provenance attestation" step: same
      # reasoning as build's equivalent step (ghcr-attest-retry re-logs-in
      # itself on retry, and the first attempt reuses the session from this
      # job's own earlier "Log in to GHCR" step before "Build and push").
      - name: Attest image build provenance
        if: >-
          ${{
            github.event_name != 'pull_request' &&
            (
              steps.should-build.outputs.should-build == 'true'
            )
          }}
        uses: ./.github/actions/ghcr-attest-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          subject-name: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          subject-digest: ${{ steps.build.outputs.digest }}

  merge-manifests:
    # Combines build's linux/amd64 per-service tag with build-arm64's
    # linux/arm64 per-service tag into the real sha-<commit> multi-platform
    # tag that promote/release/setup.sh consume. Uses imagetools create --
    # the same tool promote already uses to move channel tags -- so no image
    # is rebuilt here, only a manifest list assembled from two already-pushed
    # digests.
    #
    # Also runs on pull_request events now (see #626): a same-repo PR pushes
    # its own pr-<N>-sha-<short>-{amd64,arm64} legs in build/build-arm64, and
    # this job merges those into the real pr-<N>-sha-<short> tag that
    # full-setup-validate consumes to test the PR's own commits. The
    # existing sha-<short> merge below stays gated to non-PR events only --
    # that tag's *inputs* are never pushed on a PR (push: stays false there
    # for the plain, unprefixed sha-* tag), so running it on a PR would just
    # loop through seven harmless "no linux/amd64 image" skips for no
    # reason.
    name: merge multi-platform manifests
    needs: [build, build-arm64]
    if: "!cancelled() && needs.build.result == 'success' && needs['build-arm64'].result == 'success'"
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    permissions:
      contents: read
      packages: write
      # The manifest lists created below (both the trusted sha-<commit> tag
      # and the PR staging tag) are the actual multi-platform references that
      # promote/release/setup.sh/full-setup-validate resolve and pull -- not
      # the platform-suffixed -amd64/-arm64 legs build/build-arm64 already
      # attest. Those per-arch attestations say nothing about the merged
      # digest itself, so this job needs the same attestation permissions
      # build/build-arm64/promote already carry.
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform manifests
        id: create-trusted-manifests
        if: github.event_name != 'pull_request'
        env:
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          REQUIRED_PLATFORMS: ${{ env.RELEASE_PLATFORMS }}
          GHCR_RETRY_USERNAME: ${{ github.actor }}
          GHCR_RETRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # shellcheck source=scripts/lib/ghcr-retry.sh
          source "$GITHUB_WORKSPACE/scripts/lib/ghcr-retry.sh"

          services=(proxy dns watchdog dhcp dhcp-proxy ui build-tools)
          short_sha="${COMMIT_SHA::7}"
          source_tag="sha-${short_sha}"

          # Same wording as this same file's build/build-arm64 matrix.description
          # entries -- kept in sync manually, not sourced from one shared place,
          # because merge-manifests has no matrix of its own to read
          # matrix.description from directly. This is where the OCI
          # org.opencontainers.image.description annotation is actually set
          # (issue #620): per-platform images upstream stay unannotated on
          # purpose (see build's "Build and push" step comment), and every
          # `imagetools create` downstream of this one (promote's channel and
          # stack-pointer moves) carbon-copies this index annotation forward
          # untouched rather than re-declaring it, confirmed live to preserve
          # both the annotation and the exact source digest unchanged.
          declare -A service_descriptions=(
            [proxy]="nginx-based lancache-ng caching proxy for standard and TLS-interception cache traffic."
            [dns]="PowerDNS recursor, authoritative DNS, and NATS subscriber service for lancache-ng cache routing."
            [watchdog]="lancache-ng watchdog helper for runtime health checks and recovery hooks."
            [dhcp]="Kea DHCP, control-agent, and DHCP-DDNS service for lancache-ng managed networks."
            [dhcp-proxy]="dnsmasq-based DHCP proxy and relay helper for lancache-ng deployments."
            [ui]="lancache-ng Admin UI and control-plane service for cache, DNS, DHCP, and secondary management."
            [build-tools]="Prebuilt lancache-ng CI and developer validation toolchain image."
          )

          # Duplicated rather than factored into a shared script/action:
          # GitHub Actions workflow YAML has no import mechanism for shell
          # functions across job steps, and this file's own convention (see
          # build/build-tools-base-digests and promote's copies of this same
          # helper) is a local copy per job over introducing a new composite
          # action just for one function. Same quote-stripping as those.
          #
          # Wrapped in ghcr_retry (#822): this reads the digest of a manifest
          # this same step just created a few lines below, so a transient
          # GHCR 401/read failure here is a real retry candidate, not an
          # "expected absent" probe -- unlike the amd64/arm64 existence
          # checks further down, which intentionally stay unwrapped (see
          # their own comment).
          digest_for_image() {
            local image=$1
            local digest

            if ! digest="$(ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- docker buildx imagetools inspect "$image" --format '{{json .Manifest.Digest}}' 2>/dev/null)"; then
              return 1
            fi
            digest="${digest%\"}"
            digest="${digest#\"}"
            [[ -n "$digest" && "$digest" != "null" ]]
            printf '%s\n' "$digest"
          }

          for service in "${services[@]}"; do
            amd64_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}-amd64"
            arm64_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}-arm64"
            target_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}"

            # Deliberately NOT wrapped in ghcr_retry: an absent per-arch
            # staging tag here almost always means "this service's build was
            # legitimately skipped" (unchanged on a PR, or a fork/Dependabot
            # PR with no push permission), not a transient registry error.
            # Retrying 3x with a 30s backoff would turn every expected skip
            # into a ~90s stall per service, and worse, could misclassify a
            # genuine transient 401 as "not built" and silently skip merging
            # a service that actually was pushed -- the retry policy exists
            # to protect real registry-write operations below, not this
            # expected-failure control flow.
            if ! docker buildx imagetools inspect "$amd64_image" >/dev/null 2>&1; then
              echo "::notice::Skipping $service: no linux/amd64 image was published for this commit (likely unchanged on a pull request)."
              continue
            fi
            if ! docker buildx imagetools inspect "$arm64_image" >/dev/null 2>&1; then
              echo "::error::$service has a linux/amd64 image but no linux/arm64 image ($arm64_image); refusing to publish a single-platform tag under the multi-platform contract."
              exit 1
            fi

            ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- \
              docker buildx imagetools create -t "$target_image" "$amd64_image" "$arm64_image" \
              --annotation "index:org.opencontainers.image.description=${service_descriptions[$service]}"
            GHCR_RETRY_USERNAME="$GHCR_RETRY_USERNAME" GHCR_RETRY_PASSWORD="$GHCR_RETRY_PASSWORD" \
              bash scripts/require-image-platforms.sh "$target_image" "$REQUIRED_PLATFORMS"

            # Output key uses underscores (dhcp-proxy/build-tools contain
            # hyphens, which the expression syntax in the attest steps below
            # would otherwise parse as subtraction) so those steps can
            # reference steps.create-trusted-manifests.outputs.<service>_digest.
            merged_digest="$(digest_for_image "$target_image")"
            printf '%s_digest=%s\n' "${service//-/_}" "$merged_digest" >> "$GITHUB_OUTPUT"
          done

      # Same merge, for the PR-scoped staging tag instead of the trusted-ref
      # sha-<short> tag. Only same-repo PRs ever push the two per-arch inputs
      # (build/build-arm64's own fork check), so this naturally no-ops for a
      # fork PR: neither leg exists, every service is skipped, nothing is
      # published. A service this PR did not touch also has no inputs here
      # (detect-changes scoped build/build-arm64 to skip it) -- that is
      # expected and not an error; full-setup-validate's own backfill step
      # fills the gap for full-setup services from the base-ref channel.
      - name: Create PR staging multi-platform manifest
        id: create-pr-staging-manifests
        if: github.event_name == 'pull_request'
        env:
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Must match build/build-arm64's "Compute PR staging tag" exactly
          # -- see that step's comment for why this is github.sha (the
          # actual built merge commit), not the PR head SHA.
          BUILD_SHA: ${{ github.sha }}
          REQUIRED_PLATFORMS: ${{ env.RELEASE_PLATFORMS }}
          GHCR_RETRY_USERNAME: ${{ github.actor }}
          GHCR_RETRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # shellcheck source=scripts/lib/ghcr-retry.sh
          source "$GITHUB_WORKSPACE/scripts/lib/ghcr-retry.sh"

          services=(proxy dns watchdog dhcp dhcp-proxy ui build-tools)
          short_sha="${BUILD_SHA::7}"
          source_tag="pr-${PR_NUMBER}-sha-${short_sha}"

          # Same helper as the trusted-ref step above (and promote's own
          # copy) -- kept duplicated per step/job rather than shared, which
          # is the existing convention in this file. Same ghcr_retry
          # reasoning as that step's copy: this reads a manifest just
          # created below, not an expected-absence probe.
          digest_for_image() {
            local image=$1
            local digest

            if ! digest="$(ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- docker buildx imagetools inspect "$image" --format '{{json .Manifest.Digest}}' 2>/dev/null)"; then
              return 1
            fi
            digest="${digest%\"}"
            digest="${digest#\"}"
            [[ -n "$digest" && "$digest" != "null" ]]
            printf '%s\n' "$digest"
          }

          for service in "${services[@]}"; do
            amd64_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}-amd64"
            arm64_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}-arm64"
            target_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}"

            # Same "do not retry an expected-absence probe" reasoning as the
            # trusted-ref step above.
            if ! docker buildx imagetools inspect "$amd64_image" >/dev/null 2>&1; then
              echo "::notice::Skipping $service: no linux/amd64 PR staging image (not touched by this PR, or a fork PR)."
              continue
            fi
            if ! docker buildx imagetools inspect "$arm64_image" >/dev/null 2>&1; then
              echo "::error::$service has a linux/amd64 PR staging image but no linux/arm64 one ($arm64_image); build and build-arm64 disagreed on whether this service needed building."
              exit 1
            fi

            ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- \
              docker buildx imagetools create -t "$target_image" "$amd64_image" "$arm64_image"
            GHCR_RETRY_USERNAME="$GHCR_RETRY_USERNAME" GHCR_RETRY_PASSWORD="$GHCR_RETRY_PASSWORD" \
              bash scripts/require-image-platforms.sh "$target_image" "$REQUIRED_PLATFORMS"

            # Same underscore-key reasoning as the trusted-ref step above.
            # This PR staging manifest is the exact tag full-setup-validate
            # pulls and runs for this PR's commits, not a throwaway build
            # artifact, so it gets the same provenance attestation.
            merged_digest="$(digest_for_image "$target_image")"
            printf '%s_digest=%s\n' "${service//-/_}" "$merged_digest" >> "$GITHUB_OUTPUT"
          done

      # actions/attest is a standalone action step, so it cannot run inside
      # the bash loops above -- one explicit step per service is required,
      # same as promote's single "Attest stack pointer provenance" step just
      # repeated for each of the seven merged multi-platform manifests. Each
      # step is gated only on its own digest output being non-empty: the
      # "Create ..." step above already skips (via `continue`, not a step
      # failure) any service with no per-arch inputs for this event, which
      # leaves that service's *_digest output unset here -- nothing else
      # needs checking, so this is a plain non-empty guard, not a job-level
      # always()/!cancelled() status check (this job's own if:/needs: are
      # unchanged).
      - name: Attest proxy merged manifest provenance
        if: steps.create-trusted-manifests.outputs.proxy_digest != ''
        uses: ./.github/actions/ghcr-attest-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          subject-name: ghcr.io/${{ github.repository }}/proxy
          subject-digest: ${{ steps.create-trusted-manifests.outputs.proxy_digest }}

      - name: Attest dns merged manifest provenance
        if: steps.create-trusted-manifests.outputs.dns_digest != ''
        uses: ./.github/actions/ghcr-attest-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          subject-name: ghcr.io/${{ github.repository }}/dns
          subject-digest: ${{ steps.create-trusted-manifests.outputs.dns_digest }}

      - name: Attest watchdog merged manifest provenance
        if: steps.create-trusted-manifests.outputs.watchdog_digest != ''
        uses: ./.github/actions/ghcr-attest-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          subject-name: ghcr.io/${{ github.repository }}/watchdog
          subject-digest: ${{ steps.create-trusted-manifests.outputs.watchdog_digest }}

      - name: Attest dhcp merged manifest provenance
        if: steps.create-trusted-manifests.outputs.dhcp_digest != ''
        uses: ./.github/actions/ghcr-attest-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          subject-name: ghcr.io/${{ github.repository }}/dhcp
          subject-digest: ${{ steps.create-trusted-manifests.outputs.dhcp_digest }}

      - name: Attest dhcp-proxy merged manifest provenance
        if: steps.create-trusted-manifests.outputs.dhcp_proxy_digest != ''
        uses: ./.github/actions/ghcr-attest-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          subject-name: ghcr.io/${{ github.repository }}/dhcp-proxy
          subject-digest: ${{ steps.create-trusted-manifests.outputs.dhcp_proxy_digest }}

      - name: Attest ui merged manifest provenance
        if: steps.create-trusted-manifests.outputs.ui_digest != ''
        uses: ./.github/actions/ghcr-attest-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          subject-name: ghcr.io/${{ github.repository }}/ui
          subject-digest: ${{ steps.create-trusted-manifests.outputs.ui_digest }}

      - name: Attest build-tools merged manifest provenance
        if: steps.create-trusted-manifests.outputs.build_tools_digest != ''
        uses: ./.github/actions/ghcr-attest-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          subject-name: ghcr.io/${{ github.repository }}/build-tools
          subject-digest: ${{ steps.create-trusted-manifests.outputs.build_tools_digest }}

      # Fork PRs self-skip here without any extra guard needed: build/build-arm64
      # never push a fork PR's per-arch legs, so create-pr-staging-manifests'
      # own loop above never emits these *_digest outputs for a fork PR, and
      # every one of these seven steps is gated off by its own `if:` as a result.
      - name: Attest proxy PR staging manifest provenance
        if: steps.create-pr-staging-manifests.outputs.proxy_digest != ''
        uses: ./.github/actions/ghcr-attest-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          subject-name: ghcr.io/${{ github.repository }}/proxy
          subject-digest: ${{ steps.create-pr-staging-manifests.outputs.proxy_digest }}

      - name: Attest dns PR staging manifest provenance
        if: steps.create-pr-staging-manifests.outputs.dns_digest != ''
        uses: ./.github/actions/ghcr-attest-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          subject-name: ghcr.io/${{ github.repository }}/dns
          subject-digest: ${{ steps.create-pr-staging-manifests.outputs.dns_digest }}

      - name: Attest watchdog PR staging manifest provenance
        if: steps.create-pr-staging-manifests.outputs.watchdog_digest != ''
        uses: ./.github/actions/ghcr-attest-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          subject-name: ghcr.io/${{ github.repository }}/watchdog
          subject-digest: ${{ steps.create-pr-staging-manifests.outputs.watchdog_digest }}

      - name: Attest dhcp PR staging manifest provenance
        if: steps.create-pr-staging-manifests.outputs.dhcp_digest != ''
        uses: ./.github/actions/ghcr-attest-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          subject-name: ghcr.io/${{ github.repository }}/dhcp
          subject-digest: ${{ steps.create-pr-staging-manifests.outputs.dhcp_digest }}

      - name: Attest dhcp-proxy PR staging manifest provenance
        if: steps.create-pr-staging-manifests.outputs.dhcp_proxy_digest != ''
        uses: ./.github/actions/ghcr-attest-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          subject-name: ghcr.io/${{ github.repository }}/dhcp-proxy
          subject-digest: ${{ steps.create-pr-staging-manifests.outputs.dhcp_proxy_digest }}

      - name: Attest ui PR staging manifest provenance
        if: steps.create-pr-staging-manifests.outputs.ui_digest != ''
        uses: ./.github/actions/ghcr-attest-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          subject-name: ghcr.io/${{ github.repository }}/ui
          subject-digest: ${{ steps.create-pr-staging-manifests.outputs.ui_digest }}

      - name: Attest build-tools PR staging manifest provenance
        if: steps.create-pr-staging-manifests.outputs.build_tools_digest != ''
        uses: ./.github/actions/ghcr-attest-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          subject-name: ghcr.io/${{ github.repository }}/build-tools
          subject-digest: ${{ steps.create-pr-staging-manifests.outputs.build_tools_digest }}

  promote:
    # Promotion is intentionally separate from image build. It moves coherent
    # channel tags only after all sha-* source images for the same commit exist.
    #
    # The `if:` below must stay in an explicit `<status-fn>() && needs.X.result
    # == 'success'` form, not a bare `github.event_name != 'pull_request'`. A
    # bare condition with no status-check function gets an implicit
    # `&& success()` appended by GitHub Actions, and `success()` walks the
    # WHOLE transitive needs graph (promote -> merge-manifests -> build,
    # build-arm64 -> detect-changes, file-headers, pr-template-check, ...),
    # not just this job's own direct `needs: merge-manifests`.
    # detect-changes/file-headers/pr-template-check are intentionally
    # `if: github.event_name == 'pull_request'` (they skip on every push),
    # but `success()` treats a skipped job the same as a failed one -- so on
    # every real push to master or a vX.Y.Z branch, the implicit success()
    # check silently evaluated false and this job never ran, even though
    # `build` itself completed successfully (confirmed directly: run
    # 28958519247 on v0.2.0, all 7 build matrix legs succeeded, promote still
    # skipped). This is why dev/nightly were never actually promoted despite the
    # channel-resolution logic in this job being correct (see issue #532).
    #
    # Use `!cancelled()`, not `always()`, as the status function: `always()`
    # would also make this job proceed to move public tags even if a
    # maintainer cancels the run after build succeeds -- `!cancelled()`
    # suppresses the same implicit-success()-over-skipped-deps problem while
    # still correctly stopping the job if the run is actually cancelled.
    name: promote stack image channels
    needs: merge-manifests
    if: "!cancelled() && needs['merge-manifests'].result == 'success' && github.event_name != 'pull_request'"
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    # Promote only repoints already-built, already-pushed sha-* images at
    # mutable channel tags -- it is idempotent and fast, unlike the rest of
    # this workflow (build/test/scan/build-images), which is slow and where
    # cancelling stale in-flight work for a superseded commit is desirable.
    # Originally added (#793) because promote used to share the top-level
    # "Build & Push-publish" concurrency group with the slow build/test/scan
    # pipeline: a rapid burst of pushes could drop promote's entire run
    # while it was still queued, before it ever started (#777). Giving
    # promote its own group here stops it from competing for that same
    # single pending slot.
    #
    # CORRECTION (#888): this job-level group does NOT, by itself, protect
    # promote from being killed *mid-execution* if the top-level group's own
    # cancel-in-progress were ever true and cancelled the whole run out from
    # under it -- a job-level concurrency group only serializes THIS job
    # against OTHER users of this exact same group name (currently just
    # backfill-stack-latest.yml, so a manual `latest` backfill and an
    # automatic channel promotion can't race each other's tag moves); it is
    # not a shield against the enclosing workflow run's own cancellation.
    # Confirmed against GitHub's docs: workflow-level cancel-in-progress:true
    # tears down the entire previous run, including jobs already in
    # progress, regardless of any job-level group they also happen to
    # belong to. This is why the top-level group (see top of file) uses a
    # run_id-suffixed key for push/tag events instead of being flipped to
    # cancel-in-progress:true -- that keeps promote safe by construction
    # rather than by this group's cancel-in-progress setting, which stays
    # false here for the backfill-serialization reason above, not as a
    # second line of defense against the top-level group.
    # backfill-stack-latest.yml deliberately joined this exact same group
    # name (not "Build & Push-publish") so the two tag-moving workflows
    # still serialized against each other.
    #
    # REMOVED (#897): this job-level `concurrency:` group is exactly what let
    # a *newer* pending `promote` run silently CANCEL an *older* one that was
    # still queued, before the older run's very first step had executed.
    # GitHub Actions' concurrency-group primitive holds at most one PENDING
    # request per group; a job that is merely queued (not yet running) is not
    # protected by anything this job's own steps could do, because those
    # steps never get to run for the cancelled instance. #892 (narrowing
    # cancellation to `build`/`container-scan` instead of the whole run) made
    # this practically reachable: multiple tag pushes/dispatches can now
    # build in parallel and reach this point at nearly the same time. Real
    # mutual exclusion (still GLOBAL, not per-ref -- re-scoping per-ref would
    # reintroduce #777, a promotion racing backfill-stack-latest.yml's own
    # tag move for a *different* ref) now comes from
    # scripts/lib/promote-lock.sh's "Acquire the cross-workflow promote lock"
    # step below instead: every `promote`/`backfill-latest` run is now
    # admitted immediately (no GitHub-side queueing to be dropped from) and
    # self-serializes via a git-ref-backed lock that is atomic on GitHub's
    # remote regardless of which self-hosted host picks up the job (checked
    # for real via `gh api .../actions/runners`: `lancache-heavy` spans
    # several distinct physical hosts, so a host-local flock -- this
    # project's usual mutex idiom, see scripts/lib/reserve-validation-subnet.sh --
    # would not have provided real exclusion here). backfill-stack-latest.yml
    # was updated to use the exact same lock so the #777 property (no
    # promote-vs-backfill tag-move race) still holds.
    permissions:
      # Widened from `contents: read` (#897): the promote-lock mechanism
      # above needs to push/delete a dedicated, non-branch/non-tag ref
      # (refs/promote-lock/global) on this repo to implement its
      # compare-and-swap acquire/release. This does not grant any ability to
      # write to master/v0.2.0/tags -- branch protection rulesets only match
      # refs/heads/* ref-name conditions, and this lock ref lives outside
      # both refs/heads/* and refs/tags/* entirely.
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      # fetch-depth: 0 is required by the version-bump step below: `git
      # describe --tags` and the classify-image-impact.sh merge-base diff both
      # need full tag/commit history, which a default shallow checkout does
      # not have.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Real, cross-host mutual exclusion for the tag-moving work below
      # (issue #897 -- see this job's own `permissions:`/removed
      # `concurrency:` comments for the full reasoning). Runs immediately
      # after checkout, before any image work starts, so a run that cannot
      # get the lock never touches GHCR at all. Fails closed: if every
      # attempt is exhausted, promote_lock_acquire_with_retry prints
      # ::error:: and returns 1, which -- under `set -euo pipefail` --
      # stops this step (and therefore the job) before any tag is moved.
      - name: Acquire the cross-workflow promote lock
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          RUNNER_NAME: ${{ runner.name }}
        run: |
          set -euo pipefail

          # shellcheck source=scripts/lib/promote-lock.sh
          source "$GITHUB_WORKSPACE/scripts/lib/promote-lock.sh"

          holder_note="$(promote_lock_holder_note "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" "$RUNNER_NAME")"
          echo "Acquiring $PROMOTE_LOCK_REF as: $holder_note"

          # Budget: up to 40 attempts, 15s backoff on a held-but-not-stale
          # lock (~10 minutes total) -- generous relative to promote's own
          # typical runtime (a handful of digest lookups and tag moves, not
          # a rebuild), so a realistic queue of a few waiting promotions
          # drains well within budget. stale_after=900s (15 minutes) is
          # comfortably longer than any legitimate promote/backfill run, so
          # a crashed or killed holder's abandoned lock is recovered
          # reasonably promptly without risking a takeover of a run that is
          # still legitimately working.
          promote_lock_acquire_with_retry origin "$holder_note" 40 15 900

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote coherent stack tags
        id: promote-stack
        env:
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          REQUIRED_PLATFORMS: ${{ env.RELEASE_PLATFORMS }}
          REQUESTED_CHANNEL: ${{ inputs.channel }}
          GHCR_RETRY_USERNAME: ${{ github.actor }}
          GHCR_RETRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # shellcheck source=scripts/lib/ghcr-retry.sh
          source "$GITHUB_WORKSPACE/scripts/lib/ghcr-retry.sh"

          services=(proxy dns watchdog dhcp dhcp-proxy ui build-tools)
          short_sha="${COMMIT_SHA::7}"
          source_tag="sha-${short_sha}"
          stack_pointer_image="ghcr.io/${REPOSITORY}/stack:${source_tag}"
          channel_tags=()
          pointer_context=""
          declare -A previous_refs=()
          promoted_targets=()

          # Wrapped in ghcr_retry (#822): unlike merge-manifests' amd64/arm64
          # existence probes, absence is never the expected outcome for any
          # caller of this helper in this job -- the "previous digest before
          # overwrite" callers below already tolerate absence via `|| true`
          # regardless of whether that absence is real (first-ever promotion
          # of a channel tag) or a transient read failure, and a retry only
          # improves the odds of capturing the real previous digest that
          # rollback_promotions needs.
          digest_for_image() {
            local image=$1
            local digest

            if ! digest="$(ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- docker buildx imagetools inspect "$image" --format '{{json .Manifest.Digest}}' 2>/dev/null)"; then
              return 1
            fi
            digest="${digest%\"}"
            digest="${digest#\"}"
            [[ -n "$digest" && "$digest" != "null" ]]
            printf '%s\n' "$digest"
          }

          rollback_promotions() {
            local status=$?
            local target_image previous_digest

            if [[ -n "$pointer_context" ]]; then
              rm -rf "$pointer_context"
            fi

            if [[ "$status" = "0" || "${#promoted_targets[@]}" = "0" ]]; then
              exit "$status"
            fi

            echo "::error::Promotion failed after public tags were moved; attempting best-effort rollback."
            for target_image in "${promoted_targets[@]}"; do
              previous_digest="${previous_refs[$target_image]:-}"
              if [[ -n "$previous_digest" ]]; then
                ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- \
                  docker buildx imagetools create --prefer-index=false -t "$target_image" "${target_image%:*}@${previous_digest}" \
                  || echo "::error::Could not restore previous digest for $target_image."
              else
                echo "::error::No previous digest existed for $target_image; manual GHCR inspection is required."
              fi
            done
            exit "$status"
          }
          trap rollback_promotions EXIT

          # Debounce/coalesce (#777): mutable channel tags (dev/nightly) are
          # branch-driven, and giving promote its own concurrency group above
          # only stops it competing for the SAME slot as the rest of this
          # workflow -- it does not stop several of these runs from queuing
          # up back-to-back across a burst of merges, each pointing at a
          # moment-in-time commit that a later one will immediately
          # supersede. Before actually moving any tag, re-resolve the ref's
          # current tip directly from the remote and bail out as a no-op if
          # a newer commit already landed: that later commit's own promote
          # run (already queued or about to be) will move the tag correctly,
          # so this run briefly (and pointlessly) setting dev/nightly to an
          # already-stale commit would only add churn, not value. This only
          # applies to branch refs -- a release/rc tag push targets one
          # fixed, immutable ref that cannot "move out from under" this run,
          # so vX.Y.Z/latest promotion is never skipped by this check.
          if [[ "$GITHUB_REF" == refs/heads/* ]]; then
            current_tip="$(git ls-remote origin "$GITHUB_REF" | cut -f1)"
            if [[ -z "$current_tip" ]]; then
              echo "::error::Could not resolve the current tip of ${GITHUB_REF} via git ls-remote; refusing to promote blind."
              exit 1
            fi
            if [[ "$current_tip" != "$COMMIT_SHA" ]]; then
              echo "::notice::${GITHUB_REF} has already moved to ${current_tip} since this run was triggered for ${COMMIT_SHA}; skipping channel promotion so the run already targeting the current tip can supersede it."
              exit 0
            fi
          fi

          if [[ "$GITHUB_REF" = "refs/heads/master" ]]; then
            channel_tags+=(nightly)
          elif [[ "$GITHUB_REF" = refs/heads/v[0-9]* ]]; then
            # Any version-numbered integration branch (v0.2.0, v0.3.0, v0.2.x,
            # ...), not just whichever one happens to be active right now.
            channel_tags+=(dev)
          elif [[ "$GITHUB_REF" = refs/tags/v* ]]; then
            channel_tags+=("$GITHUB_REF_NAME")
            if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
              :
            elif [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              bash scripts/check-stable-external-images.sh
              channel_tags+=(latest)
            else
              echo "::error::Unsupported release tag '${GITHUB_REF_NAME}'. Use vX.Y.Z or vX.Y.Z-rc.N."
              exit 1
            fi
          fi

          # workflow_dispatch can additionally request one channel move from
          # whatever ref it's dispatched against, independent of the
          # automatic branch/tag rule above -- e.g. spot-check a feature
          # branch as "dev" without merging it into v0.2.0 first. "none"
          # (the default) adds nothing.
          if [[ -n "$REQUESTED_CHANNEL" && "$REQUESTED_CHANNEL" != "none" ]]; then
            already_requested=false
            for existing_channel in "${channel_tags[@]}"; do
              [[ "$existing_channel" = "$REQUESTED_CHANNEL" ]] && already_requested=true
            done
            if [[ "$already_requested" = false ]]; then
              channel_tags+=("$REQUESTED_CHANNEL")
            fi
          fi

          if (( ${#channel_tags[@]} == 0 )); then
            echo "::notice::No public channel tags are configured for $GITHUB_REF."
            exit 0
          fi

          # Wrapped in ghcr_retry: unlike merge-manifests' per-arch checks,
          # a missing source image here is always treated as an error, never
          # an expected skip -- retrying protects against a transient read
          # failure being reported as a genuinely missing image.
          missing=0
          for service in "${services[@]}"; do
            source_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}"
            if ! ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- docker buildx imagetools inspect "$source_image" >/dev/null; then
              echo "::error::Cannot promote because required source image is missing: $source_image"
              missing=1
            fi
          done
          if [[ "$missing" = "1" ]]; then
            exit 1
          fi

          for service in "${services[@]}"; do
            GHCR_RETRY_USERNAME="$GHCR_RETRY_USERNAME" GHCR_RETRY_PASSWORD="$GHCR_RETRY_PASSWORD" \
              bash scripts/require-image-platforms.sh "ghcr.io/${REPOSITORY}/${service}:${source_tag}" "$REQUIRED_PLATFORMS"
          done

          pointer_context="$(mktemp -d)"
          {
            printf 'LANCACHE_IMAGE_TAG=%s\n' "$source_tag"
            printf 'LANCACHE_IMAGE_COMMIT=%s\n' "$COMMIT_SHA"
            printf 'LANCACHE_IMAGE_SERVICES=%s\n' "${services[*]}"
          } > "$pointer_context/stack.env"
          # One variable feeds both the per-platform config LABEL below (an
          # unquoted heredoc so it can expand) and the index-level OCI
          # annotation on the buildx build call right after, so the two never
          # drift out of sync with each other.
          stack_pointer_description="Resolves a mutable lancache-ng stack channel to one immutable sha-* service image set."
          cat > "$pointer_context/Dockerfile" <<DOCKERFILE
          FROM busybox:stable-musl@sha256:3c6ae8008e2c2eedd141725c30b20d9c36b026eb796688f88205845ef17aa213
          LABEL org.opencontainers.image.title="lancache-ng stack channel pointer"
          LABEL org.opencontainers.image.description="${stack_pointer_description}"
          COPY stack.env /stack.env
          CMD ["true"]
          DOCKERFILE
          # This build is always genuinely multi-platform ($RELEASE_PLATFORMS
          # is always 2+ platforms), so unlike the per-platform service
          # builds above, an index already exists here for --annotation to
          # attach to -- confirmed live while fixing issue #620. This step
          # does not disable provenance, so it already defaults to OCI
          # mediatypes without needing an explicit `outputs:` override.
          ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- \
            docker buildx build \
            --platform "$RELEASE_PLATFORMS" \
            --push \
            -t "$stack_pointer_image" \
            --annotation "index:org.opencontainers.image.description=${stack_pointer_description}" \
            "$pointer_context"
          ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- docker buildx imagetools inspect "$stack_pointer_image" >/dev/null
          GHCR_RETRY_USERNAME="$GHCR_RETRY_USERNAME" GHCR_RETRY_PASSWORD="$GHCR_RETRY_PASSWORD" \
            bash scripts/require-image-platforms.sh "$stack_pointer_image" "$REQUIRED_PLATFORMS"
          stack_pointer_digest="$(digest_for_image "$stack_pointer_image")"
          {
            printf 'stack-pointer-subject=ghcr.io/%s/stack\n' "$REPOSITORY"
            printf 'stack-pointer-digest=%s\n' "$stack_pointer_digest"
          } >> "$GITHUB_OUTPUT"

          # Neither loop below passes --annotation. $source_image already
          # carries the org.opencontainers.image.description index annotation
          # from merge-manifests above (and $stack_pointer_image from its own
          # build a few lines up), and a plain --prefer-index=false carbon
          # copy of an already-annotated OCI index preserves that annotation
          # AND produces a byte-identical digest to the source -- confirmed
          # live while fixing issue #620. Adding --annotation again here would
          # only risk re-serializing the manifest with a different digest,
          # which would break the release job's invariant that a channel/
          # release tag resolves to the exact same digest as its source
          # sha-* tag.
          for service in "${services[@]}"; do
            source_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}"
            for channel_tag in "${channel_tags[@]}"; do
              target_image="ghcr.io/${REPOSITORY}/${service}:${channel_tag}"
              previous_refs["$target_image"]="$(digest_for_image "$target_image" || true)"
              ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- \
                docker buildx imagetools create --prefer-index=false -t "$target_image" "$source_image"
              promoted_targets+=("$target_image")
            done
          done

          for channel_tag in "${channel_tags[@]}"; do
            target_image="ghcr.io/${REPOSITORY}/stack:${channel_tag}"
            previous_refs["$target_image"]="$(digest_for_image "$target_image" || true)"
            ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- \
              docker buildx imagetools create --prefer-index=false -t "$target_image" "$stack_pointer_image"
            promoted_targets+=("$target_image")
          done

          for service in "${services[@]}"; do
            for channel_tag in "${channel_tags[@]}"; do
              ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- \
                docker buildx imagetools inspect "ghcr.io/${REPOSITORY}/${service}:${channel_tag}" >/dev/null
            done
          done

          for channel_tag in "${channel_tags[@]}"; do
            ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- \
              docker buildx imagetools inspect "ghcr.io/${REPOSITORY}/stack:${channel_tag}" >/dev/null
          done

      # Automated SemVer patch (Z) tagging (#819). Gated to the release-
      # bearing branch (master) only -- on any other ref (including this
      # workflow's current v0.2.0 host branch) this step is a deliberate
      # no-op until master itself starts receiving pushes, which is the
      # still-undesigned "v0.2.0 -> master" promotion event tracked in #825.
      # Minor/major bumps stay a manual maintainer tag push; only Z is ever
      # computed here (see scripts/compute-next-release-tag.sh).
      #
      # `if:` is written as `success() && ...`, not a bare `github.ref == ...`
      # condition, for the same reason the job-level `if:` above carries its
      # own long comment: a step's own `if:` REPLACES (does not extend) the
      # implicit `success()` GitHub Actions would otherwise apply, so leaving
      # `success()` out here would let this step run even after the
      # "Promote coherent stack tags" step above it failed.
      - name: Cut an automated patch release tag for image-affecting master changes
        if: ${{ success() && github.ref == 'refs/heads/master' }}
        env:
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          PROJECT_AUTOMATION_PAT: ${{ secrets.PROJECT_AUTOMATION_PAT }}
        run: |
          set -euo pipefail

          # This is core release machinery on the release-bearing branch, not
          # optional convenience automation, so a missing PAT fails closed
          # rather than silently skipping the release (AGENTS.md: do not hide
          # required-command failures).
          : "${PROJECT_AUTOMATION_PAT:?PROJECT_AUTOMATION_PAT is required to push an automated release tag (GITHUB_TOKEN-authored tag pushes do not re-trigger this workflow, a documented GitHub anti-recursion behavior, so the tag-triggered release job would never run).}"

          # A missing bootstrap tag is an expected, one-time prerequisite gap
          # (see #819 Point 4), not a broken-release-machinery state -- the
          # channel-tag promotion in the step above this one has already
          # succeeded by the time this runs. Failing the whole job here would
          # misreport "bootstrap not done yet" as "promotion is broken," so
          # this is a skip (::notice:: + exit 0), not a hard failure. Once the
          # maintainer cuts the first vX.Y.Z tag, this same push (or the next
          # one) picks it up automatically.
          base_tag="$(git describe --tags --match 'v[0-9]*.[0-9]*.[0-9]*' --abbrev=0 2>/dev/null || true)"
          if [[ -z "$base_tag" ]]; then
            echo "::notice::No vX.Y.Z release tag exists yet on this history; skipping automated patch tagging until the first release tag is bootstrapped (see #819 Point 4)."
            exit 0
          fi
          # Qualified as refs/tags/ explicitly (#1054): this repo has both a
          # branch and a tag named identically for a version like v0.2.0 (the
          # long-lived integration branch vs. the release cut from it), so a
          # bare ref lookup here is genuinely ambiguous, not just
          # theoretically so -- confirmed live via a "refname ... is
          # ambiguous" warning on this exact line.
          base_commit="$(git rev-list -n1 "refs/tags/$base_tag")"

          # Reuse the SAME classifier detect-changes and the earlier channel
          # promotion above both rely on (#819 Point 1: do not invent a
          # parallel classifier). Diffing from the last release's own commit
          # (not just "the previous push") means a burst of N merges landing
          # on master between two promote runs still yields exactly ONE
          # bump reflecting the whole burst, not N.
          image_impact="$(bash scripts/classify-image-impact.sh "$base_commit" "$COMMIT_SHA" | grep -x 'IMAGE_IMPACT=true' || true)"
          if [[ -z "$image_impact" ]]; then
            echo "::notice::No image-affecting change between ${base_tag} (${base_commit}) and ${COMMIT_SHA}; no patch release cut."
            exit 0
          fi

          next_tag="$(bash scripts/compute-next-release-tag.sh "$base_tag")"

          # Cheap end-of-run re-check, independent of and in addition to the
          # debounce check the "Promote coherent stack tags" step already
          # performed earlier in this same job: re-resolve master's tip again
          # immediately before pushing the version tag itself. Two releases
          # landing back-to-back within the few seconds between that earlier
          # check and this one is a low-probability ("lottery odds") window,
          # but it is a single, near-free git ls-remote call, so there is no
          # reason not to close it -- this run must never tag a commit that a
          # later push has already superseded.
          current_tip="$(git ls-remote origin refs/heads/master | cut -f1)"
          if [[ -z "$current_tip" ]]; then
            echo "::error::Could not resolve the current tip of refs/heads/master via git ls-remote; refusing to cut a release tag blind."
            exit 1
          fi
          if [[ "$current_tip" != "$COMMIT_SHA" ]]; then
            echo "::notice::refs/heads/master has already moved to ${current_tip} since this run was triggered for ${COMMIT_SHA}; skipping the version-tag cut so the run already targeting the current tip can supersede it."
            exit 0
          fi

          # Idempotency: if this exact tag somehow already exists remotely
          # (a re-run, or a previous attempt that pushed the tag but failed a
          # later step), do not fail or push a duplicate -- another run
          # already covered this commit's release.
          if [[ -n "$(git ls-remote --tags origin "refs/tags/${next_tag}" 2>/dev/null)" ]]; then
            echo "::notice::${next_tag} already exists on origin; nothing to do."
            exit 0
          fi

          # An annotated tag (-a) requires a committer identity, which this
          # self-hosted runner has no default for (#1054: confirmed live,
          # "Committer identity unknown" / "empty ident name"). Same bot
          # identity this file already uses for its other automated commit
          # (the publish_coverage_badge job).
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$next_tag" "$COMMIT_SHA" -m "Automated patch release ${next_tag}"
          # PROJECT_AUTOMATION_PAT (not secrets.GITHUB_TOKEN) authors this
          # push so the tag push actually re-triggers build-push.yml on
          # refs/tags/v* -- GITHUB_TOKEN-authored pushes are deliberately not
          # re-triggered by GitHub (anti-recursion), which would otherwise
          # leave this tag published but its own release job never run.
          #
          # The token is passed as an HTTP Basic-Auth header, not embedded in
          # the remote URL: an embedded `https://x-access-token:TOKEN@...`
          # URL is a plain-argv secret (visible to anything reading this
          # process's argv/`ps` output for its lifetime) and, worse, git
          # itself echoes the full URL -- credentials included -- into its
          # own error/verbose output on a failed push (e.g. an auth or
          # "repository not found" error), which would leak the PAT straight
          # into this step's own log.
          #
          # The header value is set via GIT_CONFIG_COUNT/KEY_0/VALUE_0
          # (supported since Git 2.31), not `-c http.extraheader=...`: a `-c`
          # value is still a plain-argv secret for this invocation's
          # lifetime (visible via `ps`/`/proc/<pid>/cmdline`), it just avoids
          # the URL-embedding and log-echo problems above. An environment
          # variable is not readable via `ps` at all (only via
          # `/proc/<pid>/environ`, which the standard Linux permission model
          # restricts to the same user or root), so this closes that
          # remaining exposure. The key is scoped to this exact push URL
          # (`http.<url>.extraheader`, not a bare `http.extraheader`) so it
          # cannot leak into unrelated git operations in this same shell,
          # and -- like the `-c` form it replaces -- this is set only for
          # this one command's environment, never written to `.git/config`.
          push_url="https://github.com/${REPOSITORY}.git"
          GIT_CONFIG_COUNT=1 \
          GIT_CONFIG_KEY_0="http.${push_url}.extraheader" \
          GIT_CONFIG_VALUE_0="AUTHORIZATION: basic $(printf '%s' "x-access-token:${PROJECT_AUTOMATION_PAT}" | base64 -w0)" \
            git push "$push_url" "refs/tags/${next_tag}"
          echo "::notice::Cut ${next_tag} from ${COMMIT_SHA}. The tag-triggered run of this workflow will move 'latest' and publish the GitHub release."

      - name: Attest stack pointer provenance
        if: ${{ steps.promote-stack.outputs.stack-pointer-digest != '' }}
        uses: ./.github/actions/ghcr-attest-retry
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          subject-name: ${{ steps.promote-stack.outputs.stack-pointer-subject }}
          subject-digest: ${{ steps.promote-stack.outputs.stack-pointer-digest }}

      # `if: always()` (issue #897): the lock must be released whether the
      # steps above succeeded or failed, otherwise a real promotion failure
      # would ALSO wedge every other queued promote/backfill run behind this
      # job's own stale_after timeout for no reason. Safe to run even if the
      # acquire step itself never succeeded (promote_lock_release is a
      # verified-ownership no-op when this job never held the lock).
      - name: Release the cross-workflow promote lock
        if: always()
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          RUNNER_NAME: ${{ runner.name }}
        run: |
          set -euo pipefail

          # shellcheck source=scripts/lib/promote-lock.sh
          source "$GITHUB_WORKSPACE/scripts/lib/promote-lock.sh"

          holder_note="$(promote_lock_holder_note "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" "$RUNNER_NAME")"
          # `|| true` here is the documented, narrow exception AG-VAL-004
          # allows: promote_lock_release already prints its own ::warning::
          # for every non-fatal outcome (already released, no longer ours,
          # or a failed delete push), and this whole design's stale_after
          # takeover exists specifically so a genuinely failed/skipped
          # release here is recovered by the next waiter rather than
          # wedging the lock forever -- release is best-effort cleanup, not
          # a correctness-critical step, so it must never flip an otherwise
          # successful promotion to a failed job status.
          promote_lock_release origin "$holder_note" || true

  release:
    # Release source archives must match the same commit that produced the
    # images. This keeps source, image tags, and attestations traceable together.
    #
    # Same reasoning as promote's `if:` above: use an explicit
    # needs.promote.result check under a status function rather than a bare
    # condition, so this job isn't silently skipped by the implicit success()
    # walking back through promote's own transitively-skipped dependencies
    # (detect-changes, file-headers, pr-template-check on non-PR events).
    # `!cancelled()`, not `always()`, so a maintainer cancelling the run can
    # still stop this from publishing a release source archive.
    name: publish release source
    needs: promote
    if: "!cancelled() && needs.promote.result == 'success' && startsWith(github.ref, 'refs/tags/v')"
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    # Job-level concurrency, keyed per tag ref: this job's GET-then-create-or-
    # PATCH logic against the GitHub Releases API is only safe if at most one
    # instance runs per tag at a time (two concurrent instances for the same
    # tag could both GET "no release yet" and then race two separate POSTs,
    # or one could PATCH over the other's body-preservation read). Before
    # this workflow's top-level group became run_id-suffixed for tag pushes
    # (see top of file), that whole-run serialization made two `release`
    # runs for the same tag effectively impossible; it no longer does, so
    # this job needs its own guarantee. Scoped by ref (not global like
    # `promote`'s group) because release publishing for different tags is
    # genuinely independent -- there is no shared mutable resource across
    # tags the way `promote`'s channel-tag moves have. cancel-in-progress
    # stays false: queue a second attempt for the same tag (e.g. a manual
    # rerun) rather than cancel the first mid-write.
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release image platform coverage
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
          SERVICES: proxy dns watchdog dhcp dhcp-proxy ui build-tools stack
          REQUIRED_PLATFORMS: ${{ env.RELEASE_PLATFORMS }}
          GHCR_RETRY_USERNAME: ${{ github.actor }}
          GHCR_RETRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          read -r -a services <<< "$SERVICES"
          for service in "${services[@]}"; do
            image="ghcr.io/${REPOSITORY}/${service}:${TAG_NAME}"
            bash scripts/require-image-platforms.sh "$image" "$REQUIRED_PLATFORMS"
          done

      # Patches (rather than overwrites) an existing release body: the
      # image_notes_start/end HTML-comment markers bound exactly the
      # auto-generated section, so any text a maintainer added by hand
      # outside those markers survives a re-run of this job (e.g. a manual
      # `workflow_dispatch` re-promotion of the same tag, or a rerun after a
      # transient failure). A brand-new release has no existing body to
      # preserve, so its notes are just the auto-generated section verbatim.
      # The prerelease-state check further down exists because GitHub's
      # PATCH endpoint for releases would otherwise happily flip a release's
      # prerelease flag to match whatever this run computes -- silently
      # promoting/demoting a release that a maintainer may have already
      # published deliberately.
      - name: Create or update GitHub release for built images
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          GHCR_RETRY_USERNAME: ${{ github.actor }}
          GHCR_RETRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # shellcheck source=scripts/lib/ghcr-retry.sh
          source "$GITHUB_WORKSPACE/scripts/lib/ghcr-retry.sh"

          services=(proxy dns watchdog dhcp dhcp-proxy ui build-tools)
          short_sha="${COMMIT_SHA::7}"
          source_tag="sha-${short_sha}"
          expected_prerelease=false
          if [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            expected_prerelease=true
            echo "::notice::Tag $TAG_NAME is a release candidate and will be published as a prerelease."
          elif [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            expected_prerelease=false
          else
            echo "::error::Unsupported release tag '$TAG_NAME'. Use vX.Y.Z or vX.Y.Z-rc.N."
            exit 1
          fi

          digest_for_image() {
            local image=$1
            local digest

            digest="$(ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- docker buildx imagetools inspect "$image" --format '{{json .Manifest.Digest}}')"
            digest="${digest%\"}"
            digest="${digest#\"}"
            if [[ -z "$digest" || "$digest" = "null" ]]; then
              echo "::error::Could not read digest for $image."
              exit 1
            fi
            printf '%s\n' "$digest"
          }

          build_tools_image="ghcr.io/${REPOSITORY}/build-tools:${TAG_NAME}"
          stack_pointer_image="ghcr.io/${REPOSITORY}/stack:${TAG_NAME}"
          ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- docker buildx imagetools inspect "$build_tools_image" >/dev/null
          ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- docker buildx imagetools inspect "$stack_pointer_image" >/dev/null
          ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- docker pull "$build_tools_image" >/dev/null
          rust_base_digest="$(docker image inspect "$build_tools_image" --format '{{ index .Config.Labels "org.opencontainers.image.base.rust.digest" }}')"
          golang_base_digest="$(docker image inspect "$build_tools_image" --format '{{ index .Config.Labels "org.opencontainers.image.base.golang.digest" }}')"
          if [[ ! "$rust_base_digest" =~ ^sha256:[0-9a-f]{64}$ || ! "$golang_base_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::build-tools image is missing build-time base digest labels."
            exit 1
          fi

          image_notes_start='<!-- lancache-ng-image-tags:start -->'
          image_notes_end='<!-- lancache-ng-image-tags:end -->'
          notes_file="$(mktemp)"
          {
            printf '%s\n' "$image_notes_start"
            printf 'This release source is the exact commit used by CI to build and publish the service images for %s.\n\n' "$TAG_NAME"
            printf 'Commit: %s\n\n' "$COMMIT_SHA"
            printf 'Published image tags and digests:\n\n'
            for service in "${services[@]}"; do
              tag_image="ghcr.io/${REPOSITORY}/${service}:${TAG_NAME}"
              sha_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}"
              tag_digest="$(digest_for_image "$tag_image")"
              sha_digest="$(digest_for_image "$sha_image")"
              if [[ "$tag_digest" != "$sha_digest" ]]; then
                echo "::error::Release tag digest for $tag_image does not match $sha_image."
                exit 1
              fi
              printf -- '- %s -> %s\n' "$tag_image" "$tag_digest"
            done
            printf '\nMatching immutable SHA image tags:\n\n'
            for service in "${services[@]}"; do
              sha_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}"
              sha_digest="$(digest_for_image "$sha_image")"
              printf -- '- %s -> %s\n' "$sha_image" "$sha_digest"
            done
            printf '\nStack channel pointer:\n\n'
            printf -- '- %s -> %s\n' "$stack_pointer_image" "$(digest_for_image "$stack_pointer_image")"
            printf -- '- ghcr.io/%s/stack:%s -> %s\n' "$REPOSITORY" "$source_tag" "$(digest_for_image "ghcr.io/${REPOSITORY}/stack:${source_tag}")"
            printf '\nResolved build-tools base image digests:\n\n'
            printf -- '- rust:latest -> %s\n' "$rust_base_digest"
            printf -- '- golang:latest -> %s\n' "$golang_base_digest"
            printf '\nProvenance and SBOM status:\n\n'
            printf -- '- Provenance attestations are pushed to GHCR for every first-party service image digest and the stack channel-pointer digest.\n'
            printf -- '- SBOM artifacts are not generated by this workflow yet; release notes must not claim SBOM coverage until an SBOM-producing job is added.\n'
            printf '%s\n' "$image_notes_end"
          } > "$notes_file"

          docker run --rm \
            -e GITHUB_TOKEN \
            -e REPOSITORY \
            -e TAG_NAME \
            -e COMMIT_SHA \
            -e EXPECTED_PRERELEASE="$expected_prerelease" \
            -v "$notes_file:/tmp/lancache-release-notes.md:ro" \
            "$build_tools_image" \
            bash -s <<'UPDATE_RELEASE'
          set -euo pipefail

          api_url="https://api.github.com/repos/${REPOSITORY}"
          auth_header="Authorization: Bearer ${GITHUB_TOKEN}"
          accept_header="Accept: application/vnd.github+json"
          version_header="X-GitHub-Api-Version: 2022-11-28"
          image_notes_start='<!-- lancache-ng-image-tags:start -->'
          image_notes_end='<!-- lancache-ng-image-tags:end -->'
          expected_prerelease="$EXPECTED_PRERELEASE"

          response_file="$(mktemp)"
          status="$(curl -sS -o "$response_file" -w '%{http_code}' \
            -H "$auth_header" \
            -H "$accept_header" \
            -H "$version_header" \
            "$api_url/releases/tags/$TAG_NAME")"

          if [ "$status" = "200" ]; then
            release_id="$(jq -r '.id' "$response_file")"
            existing_prerelease="$(jq -r '.prerelease' "$response_file")"
            if [ "$existing_prerelease" != "$expected_prerelease" ]; then
              echo "Existing GitHub release prerelease state does not match tag policy for $TAG_NAME." >&2
              echo "Expected prerelease=$expected_prerelease, found prerelease=$existing_prerelease." >&2
              exit 1
            fi
            existing_body="$(jq -r '.body // ""' "$response_file")"
            # shellcheck disable=SC2016
            updated_body="$(jq -nr \
              --arg body "$existing_body" \
              --arg notes "$(cat /tmp/lancache-release-notes.md)" \
              --arg start "$image_notes_start" \
              --arg end "$image_notes_end" \
              '
              if ($body | contains($start)) and ($body | contains($end)) then
                ($body | split($start)[0]) as $prefix
                | ($body | split($end)[1:] | join($end)) as $suffix
                | $prefix + $notes + $suffix
              elif ($body | length) > 0 then
                $body + "\n\n" + $notes
              else
                $notes
              end
              ')"
            jq -n \
              --arg body "$updated_body" \
              '{body:$body}' \
              > "$response_file.patch"
            curl -fsS -X PATCH \
              -H "$auth_header" \
              -H "$accept_header" \
              -H "$version_header" \
              -d @"$response_file.patch" \
              "$api_url/releases/$release_id" >/dev/null
          elif [ "$status" = "404" ]; then
            # shellcheck disable=SC2016
            jq -n \
              --arg tag_name "$TAG_NAME" \
              --arg target_commitish "$COMMIT_SHA" \
              --arg name "$TAG_NAME" \
              --arg body "$(cat /tmp/lancache-release-notes.md)" \
              --argjson prerelease "$expected_prerelease" \
              '{tag_name:$tag_name, target_commitish:$target_commitish, name:$name, body:$body, draft:false, prerelease:$prerelease}' \
              > "$response_file.create"
            curl -fsS -X POST \
              -H "$auth_header" \
              -H "$accept_header" \
              -H "$version_header" \
              -d @"$response_file.create" \
              "$api_url/releases" >/dev/null
          else
            cat "$response_file"
            echo "Failed to inspect GitHub release for $TAG_NAME; HTTP status $status" >&2
            exit 1
          fi
          UPDATE_RELEASE
