  dns_test:
    # DNS unit tests are separate from quality checks so failures identify
    # whether the regression is lint/format level or behavioral.
    name: test (dns/nats-subscriber)
    needs: [validate-compose, dns_rust_quality, detect-changes]
    if: >-
      ${{
        always() &&
        needs['validate-compose'].result == 'success' &&
        (needs.dns_rust_quality.result == 'success' || needs.dns_rust_quality.result == 'skipped') &&
        (
          github.event_name != 'pull_request' ||
          needs['detect-changes'].outputs.dns_rust == 'true' ||
          needs['detect-changes'].outputs.workflow == 'true'
        )
      }}
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    # Job-level concurrency (#891 follow-up, extending #888/#892/#915's
    # proven pattern): dns_test is on the scarce self-hosted lancache-heavy
    # pool, so reclaiming a superseded commit's run matters for real
    # capacity. Safe to cancel mid-flight: it is one of ci_scope_policy's
    # `needs`, but that job's push-branch check on this job's result now
    # uses require_success_or_intentional_cancellation() (tolerates
    # success/skipped/cancelled) specifically because of this group -- see
    # ci_scope_policy's own comment for the full reasoning. Its only other
    # consumer, rust_coverage, already gates with
    # `needs.dns_test.result == 'success' || needs.dns_test.result == 'skipped'`,
    # which cleanly skips coverage rather than erroring; a cancelled result
    # makes that gate false the same way a skipped one does.
    concurrency:
      group: >-
        ${{
          (github.event_name == 'workflow_dispatch' || github.run_attempt != '1') &&
          format('{0}-dns-test-{1}-{2}', github.workflow, github.ref, github.run_id) ||
          format('{0}-dns-test-{1}', github.workflow, github.ref)
        }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/dns-nats-subscriber'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/dns-nats-subscriber'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: stable
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.actor != 'dependabot[bot]' &&
            (
              github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository
            )
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
          dist-scheduler-url: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          dist-auth-token: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
      - name: test (dns/nats-subscriber)
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo test --locked --manifest-path services/dns/nats-subscriber/Cargo.toml

  ui_test:
    # UI tests run only when the UI or workflow contract changes. This keeps
    # docs/setup-only PRs from paying for unrelated Rust test work.
    name: test (ui)
    needs: [validate-compose, ui_rust_quality, detect-changes]
    if: >-
