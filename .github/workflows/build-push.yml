              && grep -F 'command -v "$tool" >/dev/null' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must fail closed if the shared build-tools image is missing a required tool."; exit 1; }
            grep -F 'lancache-rustc-wrapper' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must keep the sccache wrapper in place for Rust compiler invocations."; exit 1; }
            grep -F -- "--mount=type=secret,id=sccache_dist_config" "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must consume sccache-dist config through a BuildKit secret."; exit 1; }
            grep -F -- "--mount=type=secret,id=distcc_potential_hosts" "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must consume distcc hosts through a BuildKit secret."; exit 1; }
            grep -F 'sccache --dist-status' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must smoke-check sccache-dist when configured."; exit 1; }
            grep -F 'resolve_distcc_wrapper_dir()' "$dockerfile" >/dev/null \
              && grep -F 'for wrapper in cc gcc c++ g++; do' "$dockerfile" >/dev/null \
              && grep -F '"/usr/local/lib/distcc/$wrapper"' "$dockerfile" >/dev/null \
              && grep -F '/usr/local/lib/distcc /usr/lib/distcc' "$dockerfile" >/dev/null \
              && grep -F 'PATH="$distcc_wrapper_dir:$PATH" CC=cc GCC=gcc CXX=c++ GXX=g++' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must discover the distcc wrapper directory and route cc/gcc/c++/g++ through it."; exit 1; }
            grep -F 'original_path="$PATH"' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must save the original PATH before enabling distcc."; exit 1; }
            grep -F 'PATH="$original_path"' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must restore the original PATH before local compiler fallback."; exit 1; }
            grep -F 'PATH="$distcc_wrapper_dir:$PATH";' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must re-prepend the wrapper directory after distcc-pump startup."; exit 1; }
            grep -F 'lancache-rustc-wrapper' "$dockerfile" >/dev/null \
              && grep -F 'distcc|*/distcc) exec "$@" ;;' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must keep distcc out of the sccache Rust wrapper path."; exit 1; }
            grep -F 'lancache-distcc-wrapper' "$dockerfile" >/dev/null \
              && grep -F 'DISTCC_HOSTS_NO_PUMP' "$dockerfile" >/dev/null \
              || {
                if [ "$dockerfile" = "services/dns/Dockerfile" ]; then
                  :;
                else
                  echo "::error::$dockerfile must define a non-pump distcc host list for generated-header bypass."; exit 1;
                fi
              }
            if [ "$dockerfile" = "services/ui/Dockerfile" ]; then
              grep -F 'distcc_hosts_without_pump="${distcc_hosts_without_pump:-$distcc_hosts}"' "$dockerfile" >/dev/null \
                || { echo "::error::$dockerfile must fall back to stripped distcc hosts when no plain hosts are configured."; exit 1; }
              if grep -F 'DISTCC_HOSTS_NO_PUMP="${DISTCC_HOSTS:-$DISTCC_HOSTS_NO_PUMP}";' "$dockerfile" >/dev/null; then
                echo "::error::$dockerfile must not reassign DISTCC_HOSTS_NO_PUMP from the pump-published host list -- that list's ,cpp/,lzo suffix is only meaningful to a running include server, and lancache-distcc-wrapper's whole reason for using DISTCC_HOSTS_NO_PUMP is compiling WITHOUT one (confirmed live: this exact reassignment leaked the pump suffix into non-pump compiles, see #613)."
                exit 1
              fi
              grep -F 'export DISTCC_POTENTIAL_HOSTS="$distcc_pump_hosts";' "$dockerfile" >/dev/null \
                && grep -F 'distcc-pump --startup' "$dockerfile" >/dev/null \
                || { echo "::error::$dockerfile must start distcc-pump with pump-capable hosts only."; exit 1; }
              grep -F 'distcc-pump --startup' "$dockerfile" >/dev/null \
                || { echo "::error::$dockerfile must use distcc-pump for compatible generated-header bypass cases."; exit 1; }
              grep -F 'matches_aws_lc_generated_path' "$dockerfile" >/dev/null \
                || { echo "::error::$dockerfile must document aws-lc-sys generated-header bypass patterns in wrapper logic."; exit 1; }
            else
              grep -F 'DISTCC_POTENTIAL_HOSTS="$(cat /run/secrets/distcc_potential_hosts)"' "$dockerfile" >/dev/null \
                || { echo "::error::$dockerfile must keep distcc-pump host discovery local to the builder."; exit 1; }
              grep -F 'distcc-pump --startup' "$dockerfile" >/dev/null \
                || { echo "::error::$dockerfile must use distcc-pump unless the builder is documented as incompatible with generated C headers."; exit 1; }
            fi
            grep -F 'echo "[INFO] trying distcc path."' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must log when the distcc path is actually attempted."; exit 1; }
            grep -F 'DISTCC_FALLBACK=0' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must disable distcc internal local fallback so project fallback logic can decide explicitly."; exit 1; }
            grep -F 'run_cargo_build()' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must retry once with the normal local compiler when the distcc path is unavailable."; exit 1; }
            if grep -F 'python3 -Werror::SyntaxWarning -m py_compile "$distcc_pump_parser"' "$dockerfile" >/dev/null; then
              echo "::error::$dockerfile must not patch distcc-pump locally now that the shared build-tools image provides it."
              exit 1
            fi
            grep -F 'cargo build -j "$cargo_jobs"' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must use the resolved cargo job count."; exit 1; }
          done

          if awk '
            /^# .*Installing systemd watchdog/ { in_install=1; pull_seen=0 }
            /^# .*Post-start info/ { in_install=0 }
            in_install && /docker[[:space:]]+compose([[:space:]]+--env-file[[:space:]]+[^[:space:]]+)?[[:space:]]+pull/ { pull_seen=1 }
            in_install && /^[[:space:]]*(systemctl[[:space:]]+(enable|start)[[:space:]]+(lancache\.service|lancache-converge\.timer)|docker[[:space:]]+compose([[:space:]]+--env-file[[:space:]]+[^[:space:]]+)?[[:space:]]+up[[:space:]]+-d)/ && !pull_seen { print FILENAME ":" FNR ":" $0; found=1 }
            END { exit found ? 0 : 1 }
          ' setup.sh; then
            echo "::error::setup.sh must not start or enable lancache services before image pull succeeds."
            exit 1
          fi

          grep -F 'lancache_image_registry=$(resolve_lancache_image_registry "$env_file")' setup.sh >/dev/null \
            || { echo "::error::Update migration must resolve LANCACHE_IMAGE_REGISTRY from existing config instead of hard-coding it."; exit 1; }
          grep -F 'lancache_image_prefix=$(resolve_lancache_image_prefix "$env_file")' setup.sh >/dev/null \
            || { echo "::error::Update migration must resolve LANCACHE_IMAGE_PREFIX from existing config instead of hard-coding it."; exit 1; }
          grep -F 'lancache_image_channel=$(resolve_lancache_image_channel "$env_file")' setup.sh >/dev/null \
            || { echo "::error::Update migration must resolve LANCACHE_IMAGE_CHANNEL from existing config instead of hard-coding it."; exit 1; }
          grep -F 'lancache_image_tag=$(resolve_lancache_image_tag "$env_file")' setup.sh >/dev/null \
            || { echo "::error::Update migration must refresh LANCACHE_IMAGE_TAG with resolve_lancache_image_tag."; exit 1; }
          grep -F 'LANCACHE_IMAGE_CHANNEL=pinned requires LANCACHE_IMAGE_TAG to be set to an immutable sha-* or vX.Y.Z tag.' setup.sh >/dev/null \
            || { echo "::error::Pinned image channel must fail closed when LANCACHE_IMAGE_TAG is missing."; exit 1; }
          grep -F 'resolve_lancache_stack_channel_tag()' setup.sh >/dev/null \
            || { echo "::error::setup.sh must resolve mutable image channels through the stack pointer image."; exit 1; }
          grep -F 'docker cp "${container_id}:/stack.env" -' setup.sh >/dev/null \
            || { echo "::error::setup.sh must read stack.env from the stack pointer image."; exit 1; }
          grep -F 'pub image_tag: String' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must expose image_tag."; exit 1; }
          grep -F 'pub image_registry: String' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must expose image_registry."; exit 1; }
          grep -F 'pub image_prefix: String' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must expose image_prefix."; exit 1; }
          grep -F 'pub image_channel: String' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must expose image_channel."; exit 1; }
          grep -F 'image_tag: state.config.lancache_image_tag.clone()' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must use the primary LANCACHE_IMAGE_TAG."; exit 1; }
          grep -F 'image_registry: state.config.lancache_image_registry.clone()' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must use the primary LANCACHE_IMAGE_REGISTRY."; exit 1; }
          grep -F 'image_prefix: state.config.lancache_image_prefix.clone()' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must use the primary LANCACHE_IMAGE_PREFIX."; exit 1; }
          grep -F 'image_channel: state.config.lancache_image_channel.clone()' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must use the primary LANCACHE_IMAGE_CHANNEL."; exit 1; }
          grep -F "LANCACHE_IMAGE_REGISTRY=\${LANCACHE_IMAGE_REGISTRY:-ghcr.io}" deploy/quickstart/docker-compose.yml >/dev/null \
            && grep -F "LANCACHE_IMAGE_REGISTRY=\${LANCACHE_IMAGE_REGISTRY:-ghcr.io}" deploy/prod/docker-compose.yml >/dev/null \
            || { echo "::error::UI must receive LANCACHE_IMAGE_REGISTRY."; exit 1; }
          grep -F "LANCACHE_IMAGE_PREFIX=\${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}" deploy/quickstart/docker-compose.yml >/dev/null \
            && grep -F "LANCACHE_IMAGE_PREFIX=\${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}" deploy/prod/docker-compose.yml >/dev/null \
            || { echo "::error::UI must receive LANCACHE_IMAGE_PREFIX."; exit 1; }
          grep -F "LANCACHE_IMAGE_CHANNEL=\${LANCACHE_IMAGE_CHANNEL:-}" deploy/quickstart/docker-compose.yml >/dev/null \
            && grep -F "LANCACHE_IMAGE_CHANNEL=\${LANCACHE_IMAGE_CHANNEL:-}" deploy/prod/docker-compose.yml >/dev/null \
            || { echo "::error::UI must receive LANCACHE_IMAGE_CHANNEL."; exit 1; }
          grep -F "response_image_tag=\$(echo \"\$response\"" setup.sh >/dev/null \
            || { echo "::error::setup.sh secondary must parse the primary image_tag."; exit 1; }
          grep -F "response_image_registry=\$(echo \"\$response\"" setup.sh >/dev/null \
            || { echo "::error::setup.sh secondary must parse the primary image_registry."; exit 1; }
          grep -F "response_image_prefix=\$(echo \"\$response\"" setup.sh >/dev/null \
            || { echo "::error::setup.sh secondary must parse the primary image_prefix."; exit 1; }
          grep -F "response_image_channel=\$(echo \"\$response\"" setup.sh >/dev/null \
            || { echo "::error::setup.sh secondary must parse the primary image_channel."; exit 1; }
          grep -F "LANCACHE_IMAGE_TAG=\${LANCACHE_IMAGE_TAG:-latest}" deploy/quickstart/docker-compose.yml >/dev/null \
            || { echo "::error::Quickstart UI must receive LANCACHE_IMAGE_TAG."; exit 1; }
          grep -F "LANCACHE_IMAGE_TAG=\${LANCACHE_IMAGE_TAG:-latest}" deploy/prod/docker-compose.yml >/dev/null \
            || { echo "::error::Prod UI must receive LANCACHE_IMAGE_TAG."; exit 1; }
          grep -F 'LANCACHE_IMAGE_REGISTRY=${LANCACHE_IMAGE_REGISTRY}' setup.sh >/dev/null \
            || { echo "::error::setup.sh must write LANCACHE_IMAGE_REGISTRY."; exit 1; }
          grep -F 'LANCACHE_IMAGE_PREFIX=${LANCACHE_IMAGE_PREFIX}' setup.sh >/dev/null \
            || { echo "::error::setup.sh must write LANCACHE_IMAGE_PREFIX."; exit 1; }
          grep -F 'LANCACHE_IMAGE_CHANNEL=${lancache_image_channel}' setup.sh >/dev/null \
            || { echo "::error::setup.sh secondary must write LANCACHE_IMAGE_CHANNEL."; exit 1; }
          grep -F 'derive_release_archive_image_tag()' setup.sh >/dev/null \
            || { echo "::error::setup.sh must preserve release archive image tags before defaulting to latest."; exit 1; }
          grep -F 'channel="${channel:-latest}"' setup.sh >/dev/null \
            || { echo "::error::setup.sh must keep latest as the normal stable default; nightly must be explicit."; exit 1; }
          grep -F 'LANCACHE_IMAGE_CHANNEL=latest' README.md >/dev/null \
            || { echo "::error::README must document latest as the normal install default."; exit 1; }
          grep -F 'nightly installs must explicitly set `LANCACHE_IMAGE_CHANNEL=nightly`' docs/release-versioning.md >/dev/null \
            || { echo "::error::Release docs must keep nightly opt-in, not default."; exit 1; }
          grep -F 'docker build --pull -t "$fallback_image" "$build_tools_context" >&2' scripts/select-build-tools-image.sh >/dev/null \
            || { echo "::error::build-tools selector must keep Docker build output out of stdout."; exit 1; }
          bash scripts/validate-stack-images.sh
          VALIDATE_COMPOSE

      - name: Check naming consistency (docs/naming-conventions.md)
        run: |
          set -euo pipefail

          docker run --rm -i \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-naming-consistency.sh

      - name: Check workflow service lists stay in sync (issue #822)
        # Guards against a service silently dropping out of manifest merge,
        # channel promotion, release, PR-staging-tag garbage collection, or
        # latest-channel backfill when a new one is added to the build matrix
        # but one of the several hardcoded `services=(...)`/
        # `full_setup_services=(...)` copies is missed. With no arguments,
        # the script checks build-push.yml's own 4 copies (this file) PLUS
        # gc-pr-staging-images.yml, backfill-stack-latest.yml, and
        # scripts/ensure-pr-staging-images.sh -- all real files found to
        # duplicate this same #822 recurrence shape. Runs in the build-tools
        # container because it needs GNU grep -P, same as the
        # naming-consistency guard above.
        run: |
          set -euo pipefail

          docker run --rm -i \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-workflow-service-lists.sh

      - name: Check config-writer idempotence test coverage (#640)
        run: |
          set -euo pipefail

          docker run --rm -i \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-idempotence-test-coverage.sh

      - name: Check bats path-filter coverage (build-tools.yml vs. real bats dependencies, issue #879)
        # Guards against the exact recurrence shape #873/#880 fixed once as a
        # one-off manual trace but explicitly did not build a durable guard
        # for (see #880's PR body: "tracked separately as follow-up #879"):
        # a PR adding a new tests/bats/*.bats suite, or extending an existing
        # one to source/read a new repo file, without also adding that path
        # to build-tools.yml's on.push.paths/on.pull_request.paths -- the
        # bats suite's regression coverage would then exist on paper but
        # silently never run for the exact changes most likely to need it.
        # Runs in the build-tools container because it needs the same real
        # bash/grep/awk semantics (word-boundary-safe path extraction, GNU
        # sed -E) the other check-*.sh guards above already require.
        run: |
          set -euo pipefail

          docker run --rm -i \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-bats-path-filter-coverage.sh

      - name: Check logging matrix (docs/architecture-ng.md, issue #633)
        # check-logging-matrix.sh itself shells out to `docker compose ...
        # config --services` per Compose file, which -- same as the "Validate
        # compose files" step above -- needs every required variable set to
        # something so interpolation doesn't fail before the service list can
        # even be read. Reuses that step's exact dummy values; kept as a
        # second `env:` block (not merged into that step) so this stays a
        # separately attributable, independently rerunnable CI check.
        env:
          CACHE_INACTIVE: 365d
          CACHE_MAX_SIZE: 10g
          CACHE_MEM_MB: "256"
          CACHE_SLICE_SIZE: 1m
          CACHE_VALID_ANY: 1h
          CACHE_VALID_HIT: 30d
          DDNS_TSIG_KEY: ci-ddns-tsig-key
          IP_SSL: 127.0.0.2
          IP_STANDARD: 127.0.0.1
          LISTEN_IP: 127.0.0.3
          ALLOW_INSECURE_UI: "true"
          KEA_CTRL_TOKEN: ci-kea-token
          NATS_CONSUMER: ci-secondary
          NATS_DNS_REPLICA_PASSWORD: ci-nats-dns-replica-password
          NATS_DNS_REPLICA_USER: ci-nats-dns-replica
          NATS_DNS_WRITER_PASSWORD: ci-nats-dns-writer-password
          NATS_DNS_WRITER_USER: ci-nats-dns-writer
          NATS_CALLOUT_PASSWORD: ci-nats-callout-password
          NATS_CALLOUT_USER: ci-nats-callout
          NATS_PASSWORD: ci-nats-password
          NATS_UI_PASSWORD: ci-nats-ui-password
          NATS_UI_USER: ci-nats-ui
          NATS_USER: ci-nats-user
          NATS_TOKEN: ci-nats-token
          NATS_URL: nats://127.0.0.1:4222
          NGINX_UPSTREAM_RESOLVER: 1.1.1.1
          PDNS_API_KEY: ci-pdns-api-key
          PROXY_IP: 127.0.0.1
          SECONDARY_REGISTRATION_TOKEN: ci-secondary-registration-token
          SSL_CACHE_MAX_GB: "10"
          STANDARD_CACHE_MAX_GB: "10"
        run: |
          set -euo pipefail

          docker run --rm -i \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            --env HOME=/tmp \
            --env DOCKER_CONFIG=/tmp/.docker \
            --env CACHE_INACTIVE \
            --env CACHE_MAX_SIZE \
            --env CACHE_MEM_MB \
            --env CACHE_SLICE_SIZE \
            --env CACHE_VALID_ANY \
            --env CACHE_VALID_HIT \
            --env DDNS_TSIG_KEY \
            --env IP_SSL \
            --env IP_STANDARD \
            --env LISTEN_IP \
            --env ALLOW_INSECURE_UI \
            --env KEA_CTRL_TOKEN \
            --env NATS_CONSUMER \
            --env NATS_DNS_REPLICA_PASSWORD \
            --env NATS_DNS_REPLICA_USER \
            --env NATS_DNS_WRITER_PASSWORD \
            --env NATS_DNS_WRITER_USER \
            --env NATS_CALLOUT_PASSWORD \
            --env NATS_CALLOUT_USER \
            --env NATS_PASSWORD \
            --env NATS_UI_PASSWORD \
            --env NATS_UI_USER \
            --env NATS_USER \
            --env NATS_TOKEN \
            --env NATS_URL \
            --env NGINX_UPSTREAM_RESOLVER \
            --env PDNS_API_KEY \
            --env PROXY_IP \
            --env SECONDARY_REGISTRATION_TOKEN \
            --env SSL_CACHE_MAX_GB \
            --env STANDARD_CACHE_MAX_GB \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-logging-matrix.sh

      - name: Remove fallback compose validation image
        if: always()
        run: |
          set -euo pipefail

          case "${BUILD_TOOLS_IMAGE:-}" in
            lancache-ng-build-tools-validation:*)
              docker rmi "$BUILD_TOOLS_IMAGE"
              ;;
          esac

  # A fixed validation subnet collided repeatedly across different,
  # concurrent workflow runs sharing one of the 3 physical self-hosted
  # runner hosts (#623) -- `needs:` only serializes jobs *within* one run.
  # Deriving the subnet from this run's own id/attempt gives every run its
  # own subnet, so two runs on the same host (almost) never collide.
  #
  # Deliberately unconditional (no `needs`/`if` gating on detect-changes):
  # `detect-changes` itself only runs `if: github.event_name ==
  # 'pull_request'`, so on a push event it's skipped -- and a job that
  # `needs` a skipped job is itself skipped by default (no `always()`
  # here). full-setup-validate below *does* use `always()` to tolerate its
  # own skipped/failed `needs`, which means gating this job the same way
  # would make it skip on every push while full-setup-validate still ran,
  # silently falling back to the old fixed subnet on every master merge --
  # exactly the bug this fixes. Running unconditionally costs a few
  # seconds on the rare PR that doesn't touch deploy/ or the CI contract,
  # which is far cheaper than that.
  compute-validation-network:
    name: derive per-run validation subnet
    runs-on: [self-hosted, linux, lancache, lancache-light]
    outputs:
      subnet: ${{ steps.derive.outputs.subnet }}
      gateway: ${{ steps.derive.outputs.gateway }}
      proxy_ip: ${{ steps.derive.outputs.proxy_ip }}
      proxy_ssl_ip: ${{ steps.derive.outputs.proxy_ssl_ip }}
      dns_standard_ip: ${{ steps.derive.outputs.dns_standard_ip }}
      dns_ssl_ip: ${{ steps.derive.outputs.dns_ssl_ip }}
      watchdog_ip: ${{ steps.derive.outputs.watchdog_ip }}
      netdata_ip: ${{ steps.derive.outputs.netdata_ip }}
      nats_ip: ${{ steps.derive.outputs.nats_ip }}
      ui_ip: ${{ steps.derive.outputs.ui_ip }}
      project_name: ${{ steps.derive.outputs.project_name }}
      ui_port: ${{ steps.derive.outputs.ui_port }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Derive validation network
        id: derive
        uses: ./.github/actions/derive-validation-network

  full-setup-validate:
    name: validate full-setup image
    # On a pull_request event, `promote` never runs at all (see its own `if:`
    # condition) -- there is no channel image for THIS PR to wait for.
    # Instead this job now waits directly for `merge-manifests`, because (see
    # #626) that job is where a same-repo PR's per-arch staging legs
    # (pr-<N>-sha-<short>-{amd64,arm64}, pushed by build/build-arm64) get
    # combined into the real pr-<N>-sha-<short> multi-platform tag this job
    # actually pulls. This job MUST NOT start before merge-manifests
    # finishes: build/build-arm64 wait on shellcheck, validate-compose,
    # ci_scope_policy, file-headers, pr-template-check, line-endings, and
    # then compile Rust, so they (and merge-manifests after them) are much
    # slower than the lightweight `detect-changes` job this used to depend on
    # alone -- depending on only `detect-changes` let this job race ahead and
    # find no staging tags yet, silently falling back to stale base-channel
    # content for every service and reproducing the exact bug #626 fixes. On
    # push events (master/vX.Y.Z), this job still waits for `promote` so it
    # validates the freshly-promoted channel state of the commit it's
    # actually running for, instead of racing ahead of it or checking a
    # stale channel tag left over from a previous push.
    needs: [detect-changes, merge-manifests, promote, compute-validation-network]
    if: >-
      ${{
        always() &&
        (
          (github.event_name == 'pull_request' && needs['merge-manifests'].result == 'success') ||
          (github.event_name != 'pull_request' && needs.promote.result == 'success')
        ) &&
        (
          github.event_name != 'pull_request' ||
          needs['detect-changes'].outputs.deploy == 'true' ||
          needs['detect-changes'].outputs.workflow == 'true'
        )
      }}
    runs-on: [self-hosted, linux, lancache, lancache-light]
    permissions:
      contents: read
      packages: write
    # None of VALIDATION_SUBNET/GATEWAY/*_IP, COMPOSE_PROJECT_NAME, or
    # VALIDATION_UI_PORT are set here from compute-validation-network's
    # outputs (unlike LANCACHE_IMAGE_REGISTRY/PREFIX/TAG below, which stay
    # per-step since they don't participate in this at all). This job used to
    # set all of them here as fixed job-level env, then run the SAME
    # check-then-create pattern .github/workflows/full-setup-validate.yml
    # itself had before issue #703's linked run confirmed it for real: two
    # different, genuinely concurrent runs on the same self-hosted host can
    # derive the identical slot from compute-validation-network's hash-only
    # derivation, both pass the old `docker network ls`-based pre-flight
    # check (it only catches a leftover network from a PREVIOUS run, not
    # another run mid-way through its own check-then-create window), and then
    # race the kernel to create the bridge, with only one winning. This job
    # is the actual production build/push/promote pipeline (runs on every
    # push and qualifying PR), so it hits this race under real concurrency
    # more often than full-setup-validate.yml (workflow_dispatch-only) does.
    #
    # This job now uses the exact same host-local flock reservation
    # (scripts/lib/reserve-validation-subnet.sh) and retry-on-collision loop
    # full-setup-validate.yml's own "Reserve a validation subnet and start
    # the stack" step uses -- see that step's comment for the full mechanism.
    # A job-level `env:` entry is re-applied on top of every step's
    # accumulated $GITHUB_ENV state, so a fixed entry here would always win
    # in every later step, silently overriding whatever a retry inside that
    # step writes via $GITHUB_ENV -- exactly why none of these are set here.
    steps:
      # #808: fetch-depth: 0 (not the default shallow depth-1 clone) so the
      # "Ensure PR staging tags exist for full-setup services" step below can
      # prove real git ancestry (`git merge-base --is-ancestor`) between this
      # PR's base.sha and a base-channel image's build-commit label. Same
      # requirement, and same fix, as the `detect-changes` job's own
      # fetch-depth: 0 checkout (needed for its own merge-base-based diff).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # `latest` is contractually a stable-release-only channel (see
      # docs/release-versioning.md) -- it is never moved by a v0.2.0 (or any
      # other pre-release integration branch) push, so it always reflects the
      # last real release, not this branch's current code. Validating a
      # pre-release branch against `latest` therefore checks the wrong image
      # and fails for reasons unrelated to the branch under test. Mirror the
      # same ref-to-channel mapping the `promote` job uses so this job
      # validates the channel this branch actually publishes to.
      #
      # On a pull_request event this now resolves to the PR's OWN staging tag
      # (see #626) instead of the base-ref channel, so this job actually
      # tests the PR's own commits rather than whatever the base branch last
      # published -- UNLESS this is a Dependabot PR or (should that ever
      # start existing) a fork PR: those get a read-only GITHUB_TOKEN from
      # GitHub (same restriction, confirmed for Dependabot in GitHub's own
      # docs), so build/build-arm64 never push anything for them (see their
      # own "Log in to GHCR" steps) and there is no PR staging tag to
      # validate against at all. pr-staging-available captures that so every
      # later step can gate off one flag instead of re-deriving it.
      # base_channel_tag is always computed: it's the resolved tag itself
      # when staging isn't available, and the fallback source for any
      # full-setup service an eligible PR did not touch either way.
      - name: Determine validation image channel
        id: channel
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # github.sha, NOT github.event.pull_request.head.sha: for a
          # pull_request event this is the synthetic merge commit actually
          # checked out and built (head merged into the base branch's tip
          # AT THE TIME OF THIS EVENT), and -- critically -- it changes
          # whenever that merge result changes even if the PR's own head
          # commit does not (e.g. a "reopened" event after the base branch
          # moved while the PR was closed). Keying the tag on the PR head
          # SHA alone let two events for the identical head, merged against
          # two different base states, collide on one tag and let whichever
          # push landed last silently overwrite the other's image content.
          BUILD_SHA: ${{ github.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ACTOR: ${{ github.actor }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Calls scripts/lib/validation-image-tag.sh's own functions
          # instead of reimplementing the same channel/pr-staging-available/
          # tag decisions inline a second time (issue #822 pattern audit,
          # 2026-07-17: that file's own header used to document this job as
          # "deliberately left untouched... keep the two in sync by hand",
          # which is exactly the no-guard-against-drift shape #822 exists to
          # catch). This job already sources other scripts/lib/*.sh files
          # from $GITHUB_WORKSPACE below (ghcr-retry.sh,
          # staging-image-freshness.sh), so this is not a new pattern for it.
          # shellcheck source=scripts/lib/validation-image-tag.sh
          source "$GITHUB_WORKSPACE/scripts/lib/validation-image-tag.sh"

          base_channel_tag="$(vit_base_channel_tag "$BASE_REF")"
          echo "base-channel-tag=$base_channel_tag" >> "$GITHUB_OUTPUT"

          pr_staging_available="$(vit_pr_staging_available "$EVENT_NAME" "$ACTOR" "$HEAD_REPO" "$REPOSITORY")"
          echo "pr-staging-available=$pr_staging_available" >> "$GITHUB_OUTPUT"

          # vit_resolve_tag's workflow_dispatch branch never applies here --
          # this job only ever runs from push/pull_request -- so the empty
          # dispatch_tag argument is never read.
          tag="$(vit_resolve_tag "$EVENT_NAME" "$BASE_REF" "$PR_NUMBER" "$BUILD_SHA" "$ACTOR" "$HEAD_REPO" "$REPOSITORY" "")"

          if [[ "$pr_staging_available" == "true" ]]; then
            echo "Validating against this PR's own staging tag '$tag' (built commit $BUILD_SHA, PR head $PR_HEAD_SHA; base-channel fallback for untouched services: '$base_channel_tag')."
          else
            if [[ "$EVENT_NAME" == "pull_request" ]]; then
              echo "::notice::$ACTOR's pull_request runs get a read-only GITHUB_TOKEN (Dependabot, or a fork PR), so build/build-arm64 could not push a PR staging tag. Validating against the '$tag' base channel instead -- the same behavior this job always had before #626."
            fi
            echo "Validating against the '$tag' channel (base ref: $BASE_REF)."
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # deploy/full-setup/docker-compose.yml uses one LANCACHE_IMAGE_TAG for
      # every service, and the "Run client simulation" step below pulls
      # build-tools at that same tag -- but build/build-arm64 only push the
      # PR staging tag for services detect-changes says this PR actually
      # touched (real, deliberate additional push cost -- see #626 -- not
      # "rebuild everything per PR for free"). Any of those services this PR
      # did NOT touch has no image at the staging tag yet, so back-fill it
      # with a cheap registry-side copy from the base-ref channel image (the
      # correct thing to validate for an untouched service anyway). This
      # mirrors the `promote`/`merge-manifests` jobs' own
      # `docker buildx imagetools create` pattern for moving/combining tags
      # without re-pulling image layers.
      #
      # Gated on pr-staging-available, not a bare `github.event_name ==
      # 'pull_request'`: a Dependabot/fork PR has no PR staging tag for ANY
      # service (build/build-arm64 skip pushing entirely for them), so
      # steps.channel.outputs.tag already equals base_channel_tag above --
      # there is nothing to back-fill, and attempting to log in/push here
      # with that PR's read-only GITHUB_TOKEN would just fail instead of
      # skipping cleanly.
      - name: Set up Docker Buildx
        if: steps.channel.outputs.pr-staging-available == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        if: steps.channel.outputs.pr-staging-available == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # A service detect-changes says THIS PR touched (or any service other
      # than build-tools, if the PR changed a workflow/CI-contract file --
      # mirrors build/build-arm64's own should-build override exactly) must
      # already have a staging image by the time this runs: full-setup-
      # validate now waits for merge-manifests (see this job's own `needs:`
      # comment above) specifically so that's true. If it's missing anyway --
      # build/build-arm64 actually failed to push it, or imagetools inspect
      # hit a transient registry error -- silently copying base-channel
      # content into that service's pr-<N>-sha-<short> tag would make this
      # job green while testing exactly the stale image #626 exists to stop
      # testing, just now hidden behind a tag name that LOOKS PR-specific.
      # Fail loudly instead; only a genuinely untouched service gets the
      # base-channel back-fill.
      - name: Ensure PR staging tags exist for full-setup services
        if: steps.channel.outputs.pr-staging-available == 'true'
        env:
          REPOSITORY: ${{ github.repository }}
          PR_TAG: ${{ steps.channel.outputs.tag }}
          BASE_CHANNEL_TAG: ${{ steps.channel.outputs.base-channel-tag }}
          # #808: this PR's own base commit, needed to prove a base-channel
          # image was actually built from a commit at or after it before
          # backfilling an untouched service from that channel. Always
          # present here: this step only runs when pr-staging-available is
          # true, which requires a pull_request event (see "Determine
          # validation image channel" above).
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          WORKFLOW_CHANGED: ${{ needs['detect-changes'].outputs.workflow }}
          PROXY_TOUCHED: ${{ needs['detect-changes'].outputs.proxy }}
          DNS_TOUCHED: ${{ needs['detect-changes'].outputs.dns_image }}
          WATCHDOG_TOUCHED: ${{ needs['detect-changes'].outputs.watchdog }}
          UI_TOUCHED: ${{ needs['detect-changes'].outputs.ui }}
          BUILD_TOOLS_TOUCHED: ${{ needs['detect-changes'].outputs.build_tools }}
          GHCR_RETRY_USERNAME: ${{ github.actor }}
          GHCR_RETRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # shellcheck source=scripts/lib/ghcr-retry.sh
          source "$GITHUB_WORKSPACE/scripts/lib/ghcr-retry.sh"
          # shellcheck source=scripts/lib/staging-image-freshness.sh
          source "$GITHUB_WORKSPACE/scripts/lib/staging-image-freshness.sh"
          # shellcheck source=scripts/lib/validation-image-tag.sh
          source "$GITHUB_WORKSPACE/scripts/lib/validation-image-tag.sh"

          : "${BASE_SHA:?BASE_SHA (github.event.pull_request.base.sha) is required}"

          # Calls vit_service_should_have_staging_tag directly instead of
          # reimplementing the same "workflow/CI-contract change forces
          # every service except build-tools to be treated as touched"
          # override inline a second time (issue #822 pattern audit,
          # 2026-07-17) -- see this step's earlier "Determine validation
          # image channel"-sourced functions for the matching fix to the
          # other two decisions this job used to duplicate.
          service_should_have_staging_tag() {
            vit_service_should_have_staging_tag "$1" "$2" "$WORKFLOW_CHANGED"
          }

          declare -A touched_map=(
            [proxy]="$PROXY_TOUCHED"
            [dns]="$DNS_TOUCHED"
            [watchdog]="$WATCHDOG_TOUCHED"
            [ui]="$UI_TOUCHED"
            [build-tools]="$BUILD_TOOLS_TOUCHED"
          )

          # The services deploy/full-setup/docker-compose.yml references,
          # plus build-tools (used by the client-simulation step further
          # down, not by the compose file itself). dhcp and dhcp-proxy are
          # part of neither and are intentionally excluded.
          #
          # Decide touched-or-not FIRST, before looking at whether a pr_image
          # already exists. A prior run of this exact PR head (a manual
          # re-run, or this job simply running twice for the same commit) may
          # already have back-filled an untouched service's pr-<N>-sha-<short>
          # tag from whatever the base channel pointed at THEN. If the base
          # channel (nightly/dev) has since moved -- another PR merged in the
          # meantime -- an existence check alone would see the stale alias,
          # assume it's still correct, and `continue` without refreshing it:
          # this job would then validate a deploy/workflow-only PR that
          # doesn't touch that service against an old, no-longer-current
          # base image, silently. So an untouched service is unconditionally
          # (re)pointed at whatever the base channel resolves to RIGHT NOW --
          # `imagetools create` is a cheap registry-side manifest write, not
          # a rebuild, so refreshing it even when nothing actually changed
          # costs nothing worth optimizing away.
          full_setup_services=(proxy dns watchdog ui build-tools)
          for service in "${full_setup_services[@]}"; do
            pr_image="ghcr.io/${REPOSITORY}/${service}:${PR_TAG}"
            should_exist="$(service_should_have_staging_tag "$service" "${touched_map[$service]}")"

            if [[ "$should_exist" == "true" ]]; then
              # Wrapped in ghcr_retry: unlike merge-manifests' per-arch
              # probes, a missing tag here is always a real error (this job
              # runs after merge-manifests, so a touched service's PR staging
              # tag is expected to already exist) -- retrying protects
              # against a transient 401 being misreported as "never pushed".
              if ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- docker buildx imagetools inspect "$pr_image" >/dev/null 2>&1; then
                echo "::notice::$service already has a staging image at $PR_TAG (this PR touched it)."
                continue
              fi
              echo "::error::$service's PR staging tag ($pr_image) is missing even though detect-changes says this PR touched it (or a workflow/CI-contract file changed). Refusing to fall back to base-channel content for a touched service -- that would silently reintroduce #626's bug behind a tag name that looks PR-specific. Check whether build/build-arm64 actually pushed $service successfully for this commit."
              exit 1
            fi

            base_image="ghcr.io/${REPOSITORY}/${service}:${BASE_CHANNEL_TAG}"
            echo "::notice::$service is untouched by this PR; verifying $BASE_CHANNEL_TAG ($base_image) was built from a commit at or after this PR's base commit ($BASE_SHA) before backfilling..."
            # #808: never back-fill from a base-channel image without first
            # proving it was actually built from base.sha or later -- see
            # scripts/lib/staging-image-freshness.sh for the mechanism and
            # the "validate full-setup image" job's own checkout step
            # (fetch-depth: 0) for why full git history is available here.
            # 900/5400/15 (normal budget / hard ceiling / poll interval, in
            # seconds) intentionally match scripts/ensure-pr-staging-images.sh's
            # own BASE_FRESHNESS_POLL_* defaults exactly -- keep in sync by
            # hand if those defaults ever change, same as the rest of this
            # step's touched-vs-untouched logic already must be.
            if ! sif_wait_for_fresh_base_image "$base_image" "$BASE_SHA" "$service" 900 5400 15 >/dev/null; then
              echo "::error::Refusing to back-fill $service's PR staging tag from $base_image -- its base commit could not be confirmed fresh enough (see the error above). This is the #808 fix: silently validating a stale base-channel image is exactly the bug that let PRs #911/#914 chase a phantom regression that was actually a CI plumbing race."
              exit 1
            fi
            echo "::notice::(re)pointing $PR_TAG at the current $BASE_CHANNEL_TAG channel ($base_image)."
            ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- \
              docker buildx imagetools create --prefer-index=false -t "$pr_image" "$base_image"
          done

      - name: Build full-setup validation image
        env:
          IMAGE_TAG: ${{ steps.channel.outputs.tag }}
        run: |
          set -euo pipefail

          docker build \
            --build-arg LANCACHE_IMAGE_REGISTRY=ghcr.io \
            --build-arg LANCACHE_IMAGE_PREFIX=wiki-mod/lancache-ng \
            --build-arg LANCACHE_IMAGE_TAG="$IMAGE_TAG" \
            -t lancache-ng-full-setup:validation \
            deploy/full-setup

      - name: Validate compose configuration
        env:
          LANCACHE_IMAGE_REGISTRY: ghcr.io
          LANCACHE_IMAGE_PREFIX: wiki-mod/lancache-ng
          LANCACHE_IMAGE_TAG: ${{ steps.channel.outputs.tag }}
        run: |
          set -euo pipefail

          docker run --rm \
            -v "$PWD/deploy/full-setup:/validation:ro" \
            -w /validation \
            --env LANCACHE_IMAGE_REGISTRY \
            --env LANCACHE_IMAGE_PREFIX \
            --env LANCACHE_IMAGE_TAG \
            docker:latest \
            docker compose -f docker-compose.yml config >/dev/null

      # VALIDATION_SUBNET (and the matching VALIDATION_*_IP /
      # VALIDATION_GATEWAY vars, see docker-compose.yml) starts from the
      # candidate compute-validation-network derived per-run (#623), but that
      # job's own hash derivation alone has an unlocked check-then-create
      # race between two different, genuinely concurrent workflow runs on the
      # same self-hosted host (#703): two runs could derive the same slot,
      # both pass a `docker network ls`-based pre-flight check (only catches
      # a leftover Docker network, not another run mid-way through its own
      # check-then-create window), and then race the kernel to actually
      # create the bridge, with only one winning.
      #
      # This step closes that gap with the same host-local `flock` idiom this
      # project already uses for another shared-per-host resource
      # (build-tools.yml's own Buildx cache lock), via
      # scripts/lib/reserve-validation-subnet.sh -- the exact same helper and
      # retry-on-collision loop full-setup-validate.yml's own "Reserve a
      # validation subnet and start the stack" step uses (see that step's own
      # comment for the full mechanism and rationale, including why
      # COMPOSE_PROJECT_NAME/VALIDATION_UI_PORT are rederived here too, not
      # just the subnet). Static config validation above only checks
      # YAML/Compose structure -- a successful `docker compose up` here does
      # not yet mean the stack is healthy (see the "Wait for the stack to
      # stabilize" step below: #450/#485, dnsmasq trying to bind an
      # already-used port).
      - name: Reserve a validation subnet and start the stack (locked, retries on collision)
        id: reserve-and-start
        working-directory: deploy/full-setup
        env:
          LANCACHE_IMAGE_REGISTRY: ghcr.io
          LANCACHE_IMAGE_PREFIX: wiki-mod/lancache-ng
          LANCACHE_IMAGE_TAG: ${{ steps.channel.outputs.tag }}
          GHCR_RETRY_USERNAME: ${{ github.actor }}
          GHCR_RETRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          : "${GITHUB_RUN_ID:?GITHUB_RUN_ID is required}"
          : "${GITHUB_RUN_ATTEMPT:?GITHUB_RUN_ATTEMPT is required}"

          if ! command -v flock >/dev/null 2>&1; then
            echo "::error::flock is required for safe validation-subnet locking."
            exit 1
          fi

          # shellcheck source=scripts/lib/reserve-validation-subnet.sh
          source "$GITHUB_WORKSPACE/scripts/lib/reserve-validation-subnet.sh"
          # shellcheck source=scripts/lib/ghcr-retry.sh
          source "$GITHUB_WORKSPACE/scripts/lib/ghcr-retry.sh"

          lock_root="/tmp/lancache-validation-locks"
          max_attempts=10

          # #832 inventory finding: this step used to carry its OWN separate,
          # inline copy of the conflict-check python block (a bare
          # `name.startswith(own_prefix)` match) instead of calling
          # validation_subnet_conflicts (sourced above from
          # reserve-validation-subnet.sh) like every other caller already
          # does -- despite that shared function's own docstring claiming
          # issue #820 had consolidated every copy. A bare startswith is
          # exactly the footgun validation_subnet_conflicts's own_prefix
          # argument guards against (e.g. project "lancache-ng-validation-22"
          # would wrongly swallow "lancache-ng-validation-220..." as "ours").
          # Removed in favor of calling the shared, already-fixed function
          # directly below, closing this divergence for good instead of
          # patching the duplicate in place.

          ghcr_retry ghcr.io "$GHCR_RETRY_USERNAME" "$GHCR_RETRY_PASSWORD" -- docker compose pull --quiet

          reserved_slot=""
          holder_pid=""
          next_attempt=1

          while [[ -z "$reserved_slot" && "$next_attempt" -le "$max_attempts" ]]; do
            reservation="$(validation_subnet_reserve_slot "$lock_root" "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" "$next_attempt" "$max_attempts")" || {
              echo "::error::Could not lock a free validation subnet slot after $max_attempts attempts."
              exit 1
            }
            attempt="$(printf '%s\n' "$reservation" | sed -n 's/^attempt=//p')"
            slot="$(printf '%s\n' "$reservation" | sed -n 's/^slot=//p')"
            candidate_pid="$(printf '%s\n' "$reservation" | sed -n 's/^holder_pid=//p')"

            # Rederive the COMPLETE VALIDATION_* set from THIS attempt's own
            # candidate slot via the single shared validation_subnet_export_env
            # (reserve-validation-subnet.sh) -- the SAME function every other
            # reservation site in this project now calls (see
            # full-setup-validate.yml/full-setup-deep-validate.yml's own
            # "Reserve a validation subnet and start the stack" steps), instead
            # of this step's own former hand-written copy. Matters both for
            # validation_subnet_conflicts's own_prefix check right below and
            # for avoiding a compose-project/UI-port collision between two
            # concurrent runs that started from the same initial slot but
            # diverged on a retry.
            validation_subnet_export_env "$slot"

            # Persist THIS ATTEMPT's identifiers to $GITHUB_ENV right away,
            # every time through the loop -- not only once after the whole
            # retry loop succeeds below. Issue #932 (CI run 29569378100, job
            # 87852874801) confirmed a real production case where `docker
            # compose up -d` a few lines down failed for a reason classified
            # as non-retryable (Docker's own "has active endpoints" race
            # while recreating a leftover network from a stale prior run that
            # reused this same slot number -- see validation_network_teardown
            # in reserve-validation-subnet.sh) and the step exited via `exit
            # 1` below. The write that used to sit only after this whole loop
            # never ran on that path, so COMPOSE_PROJECT_NAME was still unset
            # in $GITHUB_ENV when the "Tear down full-setup validation stack"
            # step ran (it DOES have `if: always()` and DID run) -- its own
            # fail-closed `[[ -n "${COMPOSE_PROJECT_NAME:-}" ]]` guard, meant
            # only for the case where no slot was ever derived at all, saw it
            # empty and silently skipped `validation_project_networks_teardown`,
            # leaving that attempt's network behind to poison a later run
            # that reuses the same slot. $GITHUB_ENV takes the last value
            # written for a repeated key, so writing here on every attempt
            # keeps this a no-op correctness fix for the common, successful
            # case (the final attempt's write is simply the last one and
            # still lands before the "up" call) while covering every failure
            # exit out of this step (a non-retryable `docker compose up`
            # failure, or exhausting every retry) with the last attempted
            # slot's real project name, subnet, and lock-holder PID instead
            # of nothing at all.
            {
              echo "COMPOSE_PROJECT_NAME=$COMPOSE_PROJECT_NAME"
              echo "VALIDATION_UI_PORT=$VALIDATION_UI_PORT"
              echo "VALIDATION_LOCK_HOLDER_PID=$candidate_pid"
              echo "VALIDATION_SUBNET=$VALIDATION_SUBNET"
              echo "VALIDATION_GATEWAY=$VALIDATION_GATEWAY"
              echo "VALIDATION_PROXY_IP=$VALIDATION_PROXY_IP"
              echo "VALIDATION_DNS_STANDARD_IP=$VALIDATION_DNS_STANDARD_IP"
              echo "VALIDATION_PROXY_SSL_IP=$VALIDATION_PROXY_SSL_IP"
              echo "VALIDATION_DNS_SSL_IP=$VALIDATION_DNS_SSL_IP"
              echo "VALIDATION_WATCHDOG_IP=$VALIDATION_WATCHDOG_IP"
              echo "VALIDATION_NETDATA_IP=$VALIDATION_NETDATA_IP"
              echo "VALIDATION_NATS_IP=$VALIDATION_NATS_IP"
              echo "VALIDATION_UI_IP=$VALIDATION_UI_IP"
              echo "VALIDATION_STANDARD_SHIM_IP=$VALIDATION_STANDARD_SHIM_IP"
            } >> "$GITHUB_ENV"

            conflict="$(validation_subnet_conflicts "$VALIDATION_SUBNET" "$COMPOSE_PROJECT_NAME")"
            if [[ -n "$conflict" ]]; then
              echo "Slot $slot's subnet $VALIDATION_SUBNET overlaps existing host/Docker state ($conflict); releasing and trying the next candidate."
              validation_subnet_release "$candidate_pid"
              next_attempt=$((attempt + 1))
              continue
            fi

            echo "Attempting to start the validation stack on locked, pre-checked subnet $VALIDATION_SUBNET (attempt $attempt)."
            if up_output="$(docker compose up -d 2>&1)"; then
              echo "$up_output"
              reserved_slot="$slot"
              holder_pid="$candidate_pid"
              break
            fi

            echo "$up_output"
            validation_subnet_release "$candidate_pid"

            if ! validation_subnet_output_is_collision "$up_output"; then
              echo "::error::docker compose up failed for a reason unrelated to a subnet collision; not retrying."
              exit 1
            fi

            echo "docker compose up failed with a network-overlap error on attempt $attempt, retrying with a different subnet."
            next_attempt=$((attempt + 1))
          done

          if [[ -z "$reserved_slot" ]]; then
            echo "::error::Could not reserve a free validation subnet and start the stack after $max_attempts attempts."
            exit 1
          fi

          echo "Validation stack is up on subnet $VALIDATION_SUBNET (lock held by PID $holder_pid)."

      - name: Wait for the stack to stabilize and check container health
        working-directory: deploy/full-setup
        run: |
          set -euo pipefail

          # Services with an explicit healthcheck report a real "healthy"
          # status; docker-socket-proxy has none, so it's only checked for
          # "running" plus a restart-count ceiling (catches a crash loop
          # without needing a healthcheck definition for every service).
          services_with_healthcheck="proxy dns-standard dns-ssl watchdog nats ui netdata"
          all_services="docker-socket-proxy $services_with_healthcheck"

          deadline=$((SECONDS + 90))
          while (( SECONDS < deadline )); do
            all_ready=1
            for service in $services_with_healthcheck; do
              cid="$(docker compose ps -q "$service")"
              status="$(docker inspect --format '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "unknown")"
              if [[ "$status" != "healthy" ]]; then
                all_ready=0
              fi
            done
            if [[ "$all_ready" -eq 1 ]]; then
              break
            fi
            sleep 5
          done

          echo "::group::Final container status"
          docker compose ps
          echo "::endgroup::"

          failed=0
          for service in $all_services; do
            cid="$(docker compose ps -q "$service")"
            if [[ -z "$cid" ]]; then
              echo "::error::$service has no running container"
              failed=1
              continue
            fi

            restart_count="$(docker inspect --format '{{.RestartCount}}' "$cid")"
            container_status="$(docker inspect --format '{{.State.Status}}' "$cid")"

            if [[ "$container_status" != "running" ]]; then
              echo "::error::$service is not running (state: $container_status)"
              failed=1
            elif (( restart_count > 1 )); then
              echo "::error::$service has restarted $restart_count times (crash-loop suspected)"
              failed=1
            fi

            if [[ " $services_with_healthcheck " == *" $service "* ]]; then
              health="$(docker inspect --format '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "unknown")"
              if [[ "$health" != "healthy" ]]; then
                echo "::error::$service did not become healthy (status: $health)"
                failed=1
              fi
            fi
          done

          if [[ "$failed" -eq 1 ]]; then
            echo "::group::Logs from all services (failure diagnostics)"
            docker compose logs --no-color
            echo "::endgroup::"
            exit 1
          fi

          echo "Full-setup stack is stable: all services running and healthy."

      # Unlike the failure-only log dump above, this always runs -- #626's
      # whole point is that a *green* run here must be verifiable as having
      # actually tested this commit's own code (not stale base-branch
      # content), and that's only checkable if the logs are visible
      # regardless of outcome.
      - name: Show full-setup service logs
        if: always()
        working-directory: deploy/full-setup
        run: |
          set -euo pipefail
          echo "::group::Logs from all services"
          docker compose logs --no-color || true
          echo "::endgroup::"

      - name: Run client simulation against the full-setup stack
        env:
          FULL_SETUP_CLIENT_TOOLS_IMAGE: ghcr.io/${{ github.repository }}/build-tools:${{ steps.channel.outputs.tag }}
        run: |
          set -euo pipefail
          scripts/full-setup-client-simulation.sh

      - name: Tear down full-setup validation stack
        if: always()
        working-directory: deploy/full-setup
        run: |
          set -euo pipefail
          docker compose down --volumes --remove-orphans || true

          # `down` above can lose Docker's own "has active endpoints" race
          # (a container-removal API call can return before its network
          # endpoint is actually unwired -- confirmed for real in CI, see
          # validation_project_networks_teardown's own comment in
          # reserve-validation-subnet.sh) and silently leave this project's
          # network(s) non-empty, poisoning them for whichever run reserves
          # this slot next. Wait for and force a real removal instead of
          # trusting `down`'s own exit code.
          # shellcheck source=scripts/lib/reserve-validation-subnet.sh
          source "$GITHUB_WORKSPACE/scripts/lib/reserve-validation-subnet.sh"
          # This step runs unconditionally (`if: always()`), including when
          # the "Reserve a validation subnet and start the stack" step above
          # failed before ever setting COMPOSE_PROJECT_NAME -- under
          # `set -u`, a bare "$COMPOSE_PROJECT_NAME" would abort this whole
          # step with "unbound variable" in exactly that case (confirmed in
          # CI). The safe-default form skips teardown when there is nothing
          # to tear down instead.
          if [[ -n "${COMPOSE_PROJECT_NAME:-}" ]]; then
            validation_project_networks_teardown "$COMPOSE_PROJECT_NAME" || true
          fi

          # Release the host-local subnet lock the "Reserve a validation
          # subnet and start the stack" step above acquired (see that step's
          # own comment), so the slot becomes available to the next run
          # immediately rather than waiting for this whole job's process tree
          # to exit. $VALIDATION_LOCK_HOLDER_PID is only set once that step
          # actually reserved a lock -- if it failed before reaching that
          # point (e.g. every candidate in range was already locked or in
          # use), there is nothing to release.
          if [[ -n "${VALIDATION_LOCK_HOLDER_PID:-}" ]]; then
            kill "$VALIDATION_LOCK_HOLDER_PID" 2>/dev/null || true
          fi

      - name: Clean up image
        if: always()
        run: |
          docker rmi lancache-ng-full-setup:validation || true

  dns_rust_quality:
    # DNS Rust quality is scoped by detect-changes for PR speed, but workflow
    # changes still force it because the CI contract itself may have changed.
    name: rust-quality (dns/nats-subscriber)
    needs: detect-changes
    if: >-
      ${{
        always() &&
        (
          github.event_name != 'pull_request' ||
          needs['detect-changes'].outputs.dns_rust == 'true' ||
          needs['detect-changes'].outputs.workflow == 'true'
        )
      }}
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/dns-nats-subscriber'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/dns-nats-subscriber'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.actor != 'dependabot[bot]' &&
            (
              github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository
            )
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
          dist-scheduler-url: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          dist-auth-token: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
      - name: cargo fmt --check (dns/nats-subscriber)
        run: cargo fmt --manifest-path services/dns/nats-subscriber/Cargo.toml -- --check
      - name: cargo check with warnings denied (dns/nats-subscriber)
        uses: ./.github/actions/cargo-with-sccache-fallback
        env:
          RUSTFLAGS: "-D warnings"
        with:
          command: cargo check --locked --all-targets --manifest-path services/dns/nats-subscriber/Cargo.toml
      - name: cargo clippy with warnings denied (dns/nats-subscriber)
        timeout-minutes: 35
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo clippy --locked --all-targets --manifest-path services/dns/nats-subscriber/Cargo.toml -- -D warnings

  ui_rust_quality:
    # UI Rust quality mirrors the DNS job but stays independent so both crates
