name: Build & Push

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  validate-compose:
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose files
        run: |
          docker compose -f deploy/quickstart/docker-compose.yml --profile ssl config --quiet
          docker compose -f deploy/dev/docker-compose.yml config --quiet
          docker compose -f deploy/prod/docker-compose.yml config --quiet

  test:
    needs: validate-compose
    runs-on: [self-hosted, linux, lancache]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: dns/nats-subscriber
            path: services/dns/nats-subscriber
          - service: ui
            path: services/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ matrix.path }}/target
          key: ${{ runner.os }}-cargo-${{ matrix.service }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.path)) }}
      - name: cargo test (${{ matrix.service }})
        run: cargo test --manifest-path ${{ matrix.path }}/Cargo.toml

  build:
    needs: [validate-compose, test]
    runs-on: [self-hosted, linux, lancache]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: proxy
            context: services/proxy
          - service: proxy-standard
            context: services/proxy-standard
          - service: dns
            context: services/dns
          - service: watchdog
            context: services/watchdog
          - service: ui
            context: services/ui

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
