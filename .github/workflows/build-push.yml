name: Build & Push

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: find . -name "*.sh" -not -path "./.git/*" -not -path "*/target/*" | xargs shellcheck --severity=warning

  validate-compose:
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate compose files
        run: |
          docker compose -f deploy/quickstart/docker-compose.yml --profile ssl config --quiet
          docker compose -f deploy/dev/docker-compose.yml config --quiet
          docker compose -f deploy/prod/docker-compose.yml config --quiet

  test:
    needs: validate-compose
    runs-on: [self-hosted, linux, lancache]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: dns/nats-subscriber
            path: services/dns/nats-subscriber
            test_command: cargo test --locked --manifest-path services/dns/nats-subscriber/Cargo.toml
          - service: ui
            path: services/ui
            test_command: cargo test --locked --manifest-path services/ui/Cargo.toml
          - service: watchdog
            path: services/watchdog
            test_command: |
              bash -n services/watchdog/watchdog.sh
              test -x services/watchdog/watchdog.sh
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        if: matrix.service != 'watchdog'
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ matrix.path }}/target
          key: ${{ runner.os }}-cargo-${{ matrix.service }}-${{ hashFiles(format('{0}/Cargo.lock', matrix.path)) }}
      - name: Install Rust toolchain
        if: matrix.service != 'watchdog'
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - name: test (${{ matrix.service }})
        env:
          RUSTC_WRAPPER: ""
        run: ${{ matrix.test_command }}

  build:
    needs: [validate-compose, test]
    runs-on: [self-hosted, linux, lancache]
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: proxy
            context: services/proxy
          - service: dns
            context: services/dns
          - service: watchdog
            context: services/watchdog
          - service: dhcp
            context: services/dhcp
          - service: dhcp-proxy
            context: services/dhcp-proxy
          - service: ui
            context: services/ui

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        timeout-minutes: 60
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
