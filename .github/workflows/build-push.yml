            grep -F 'FROM ${BUILD_TOOLS_IMAGE}' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must use the shared build-tools image in the Rust builder stage."; exit 1; }
            if grep -F 'cargo install sccache' "$dockerfile" >/dev/null || grep -F 'apt-get download "distcc-pump=' "$dockerfile" >/dev/null; then
              echo "::error::$dockerfile must not bootstrap Rust builder tools locally anymore."
              exit 1
            fi
            grep -F 'for tool in cargo rustc rustup rustfmt clippy-driver sccache distcc distcc-pump python3 pkg-config; do' "$dockerfile" >/dev/null \
              && grep -F 'command -v "$tool" >/dev/null' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must fail closed if the shared build-tools image is missing a required tool."; exit 1; }
            grep -F 'lancache-rustc-wrapper' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must keep the sccache wrapper in place for Rust compiler invocations."; exit 1; }
            grep -F -- "--mount=type=secret,id=sccache_dist_config" "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must consume sccache-dist config through a BuildKit secret."; exit 1; }
            grep -F -- "--mount=type=secret,id=distcc_potential_hosts" "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must consume distcc hosts through a BuildKit secret."; exit 1; }
            grep -F 'sccache --dist-status' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must smoke-check sccache-dist when configured."; exit 1; }
            grep -F 'resolve_distcc_wrapper_dir()' "$dockerfile" >/dev/null \
              && grep -F 'for wrapper in cc gcc c++ g++; do' "$dockerfile" >/dev/null \
              && grep -F '"/usr/local/lib/distcc/$wrapper"' "$dockerfile" >/dev/null \
              && grep -F '/usr/local/lib/distcc /usr/lib/distcc' "$dockerfile" >/dev/null \
              && grep -F 'PATH="$distcc_wrapper_dir:$PATH" CC=cc GCC=gcc CXX=c++ GXX=g++' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must discover the distcc wrapper directory and route cc/gcc/c++/g++ through it."; exit 1; }
            grep -F 'original_path="$PATH"' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must save the original PATH before enabling distcc."; exit 1; }
            grep -F 'PATH="$original_path"' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must restore the original PATH before local compiler fallback."; exit 1; }
            grep -F 'PATH="$distcc_wrapper_dir:$PATH";' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must re-prepend the wrapper directory after distcc-pump startup."; exit 1; }
            grep -F 'lancache-rustc-wrapper' "$dockerfile" >/dev/null \
              && grep -F 'distcc|*/distcc) exec "$@" ;;' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must keep distcc out of the sccache Rust wrapper path."; exit 1; }
            grep -F 'lancache-distcc-wrapper' "$dockerfile" >/dev/null \
              && grep -F 'DISTCC_HOSTS_NO_PUMP' "$dockerfile" >/dev/null \
              || {
                if [ "$dockerfile" = "services/dns/Dockerfile" ]; then
                  :;
                else
                  echo "::error::$dockerfile must define a non-pump distcc host list for generated-header bypass."; exit 1;
                fi
              }
            if [ "$dockerfile" = "services/ui/Dockerfile" ]; then
              grep -F 'distcc_hosts_without_pump="${distcc_hosts_without_pump:-$distcc_hosts}"' "$dockerfile" >/dev/null \
                || { echo "::error::$dockerfile must fall back to stripped distcc hosts when no plain hosts are configured."; exit 1; }
              if grep -F 'DISTCC_HOSTS_NO_PUMP="${DISTCC_HOSTS:-$DISTCC_HOSTS_NO_PUMP}";' "$dockerfile" >/dev/null; then
                echo "::error::$dockerfile must not reassign DISTCC_HOSTS_NO_PUMP from the pump-published host list -- that list's ,cpp/,lzo suffix is only meaningful to a running include server, and lancache-distcc-wrapper's whole reason for using DISTCC_HOSTS_NO_PUMP is compiling WITHOUT one (confirmed live: this exact reassignment leaked the pump suffix into non-pump compiles, see #613)."
                exit 1
              fi
              grep -F 'export DISTCC_POTENTIAL_HOSTS="$distcc_pump_hosts";' "$dockerfile" >/dev/null \
                && grep -F 'distcc-pump --startup' "$dockerfile" >/dev/null \
                || { echo "::error::$dockerfile must start distcc-pump with pump-capable hosts only."; exit 1; }
              grep -F 'distcc-pump --startup' "$dockerfile" >/dev/null \
                || { echo "::error::$dockerfile must use distcc-pump for compatible generated-header bypass cases."; exit 1; }
              grep -F 'matches_aws_lc_generated_path' "$dockerfile" >/dev/null \
                || { echo "::error::$dockerfile must document aws-lc-sys generated-header bypass patterns in wrapper logic."; exit 1; }
            else
              grep -F 'DISTCC_POTENTIAL_HOSTS="$(cat /run/secrets/distcc_potential_hosts)"' "$dockerfile" >/dev/null \
                || { echo "::error::$dockerfile must keep distcc-pump host discovery local to the builder."; exit 1; }
              grep -F 'distcc-pump --startup' "$dockerfile" >/dev/null \
                || { echo "::error::$dockerfile must use distcc-pump unless the builder is documented as incompatible with generated C headers."; exit 1; }
            fi
            grep -F 'echo "[INFO] trying distcc path."' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must log when the distcc path is actually attempted."; exit 1; }
            grep -F 'DISTCC_FALLBACK=0' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must disable distcc internal local fallback so project fallback logic can decide explicitly."; exit 1; }
            grep -F 'run_cargo_build()' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must retry once with the normal local compiler when the distcc path is unavailable."; exit 1; }
            if grep -F 'python3 -Werror::SyntaxWarning -m py_compile "$distcc_pump_parser"' "$dockerfile" >/dev/null; then
              echo "::error::$dockerfile must not patch distcc-pump locally now that the shared build-tools image provides it."
              exit 1
            fi
            grep -F 'cargo build -j "$cargo_jobs"' "$dockerfile" >/dev/null \
              || { echo "::error::$dockerfile must use the resolved cargo job count."; exit 1; }
          done

          if awk '
            /^# .*Installing systemd watchdog/ { in_install=1; pull_seen=0 }
            /^# .*Post-start info/ { in_install=0 }
            in_install && /docker[[:space:]]+compose([[:space:]]+--env-file[[:space:]]+[^[:space:]]+)?[[:space:]]+pull/ { pull_seen=1 }
            in_install && /^[[:space:]]*(systemctl[[:space:]]+(enable|start)[[:space:]]+(lancache\.service|lancache-converge\.timer)|docker[[:space:]]+compose([[:space:]]+--env-file[[:space:]]+[^[:space:]]+)?[[:space:]]+up[[:space:]]+-d)/ && !pull_seen { print FILENAME ":" FNR ":" $0; found=1 }
            END { exit found ? 0 : 1 }
          ' setup.sh; then
            echo "::error::setup.sh must not start or enable lancache services before image pull succeeds."
            exit 1
          fi

          grep -F "set_env_key_if_empty_or_missing LANCACHE_IMAGE_REGISTRY \"\$(resolve_lancache_image_registry \"\$env_file\")\" \"\$env_file\"" setup.sh >/dev/null \
            || { echo "::error::Update migration must resolve LANCACHE_IMAGE_REGISTRY from existing config instead of hard-coding it."; exit 1; }
          grep -F "set_env_key_if_empty_or_missing LANCACHE_IMAGE_PREFIX \"\$(resolve_lancache_image_prefix \"\$env_file\")\" \"\$env_file\"" setup.sh >/dev/null \
            || { echo "::error::Update migration must resolve LANCACHE_IMAGE_PREFIX from existing config instead of hard-coding it."; exit 1; }
          grep -F "set_env_key_if_empty_or_missing LANCACHE_IMAGE_CHANNEL \"\$(resolve_lancache_image_channel \"\$env_file\")\" \"\$env_file\"" setup.sh >/dev/null \
            || { echo "::error::Update migration must resolve LANCACHE_IMAGE_CHANNEL from existing config instead of hard-coding it."; exit 1; }
          grep -F "set_env_key LANCACHE_IMAGE_TAG \"\$(resolve_lancache_image_tag \"\$env_file\")\" \"\$env_file\"" setup.sh >/dev/null \
            || { echo "::error::Update migration must refresh LANCACHE_IMAGE_TAG with resolve_lancache_image_tag."; exit 1; }
          grep -F 'LANCACHE_IMAGE_CHANNEL=pinned requires LANCACHE_IMAGE_TAG to be set to an immutable sha-* or vX.Y.Z tag.' setup.sh >/dev/null \
            || { echo "::error::Pinned image channel must fail closed when LANCACHE_IMAGE_TAG is missing."; exit 1; }
          grep -F 'resolve_lancache_stack_channel_tag()' setup.sh >/dev/null \
            || { echo "::error::setup.sh must resolve mutable image channels through the stack pointer image."; exit 1; }
          grep -F 'docker cp "${container_id}:/stack.env" -' setup.sh >/dev/null \
            || { echo "::error::setup.sh must read stack.env from the stack pointer image."; exit 1; }
          grep -F 'pub image_tag: String' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must expose image_tag."; exit 1; }
          grep -F 'pub image_registry: String' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must expose image_registry."; exit 1; }
          grep -F 'pub image_prefix: String' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must expose image_prefix."; exit 1; }
          grep -F 'pub image_channel: String' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must expose image_channel."; exit 1; }
          grep -F 'image_tag: state.config.lancache_image_tag.clone()' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must use the primary LANCACHE_IMAGE_TAG."; exit 1; }
          grep -F 'image_registry: state.config.lancache_image_registry.clone()' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must use the primary LANCACHE_IMAGE_REGISTRY."; exit 1; }
          grep -F 'image_prefix: state.config.lancache_image_prefix.clone()' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must use the primary LANCACHE_IMAGE_PREFIX."; exit 1; }
          grep -F 'image_channel: state.config.lancache_image_channel.clone()' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must use the primary LANCACHE_IMAGE_CHANNEL."; exit 1; }
          grep -F "LANCACHE_IMAGE_REGISTRY=\${LANCACHE_IMAGE_REGISTRY:-ghcr.io}" deploy/quickstart/docker-compose.yml >/dev/null \
            && grep -F "LANCACHE_IMAGE_REGISTRY=\${LANCACHE_IMAGE_REGISTRY:-ghcr.io}" deploy/prod/docker-compose.yml >/dev/null \
            || { echo "::error::UI must receive LANCACHE_IMAGE_REGISTRY."; exit 1; }
          grep -F "LANCACHE_IMAGE_PREFIX=\${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}" deploy/quickstart/docker-compose.yml >/dev/null \
            && grep -F "LANCACHE_IMAGE_PREFIX=\${LANCACHE_IMAGE_PREFIX:-wiki-mod/lancache-ng}" deploy/prod/docker-compose.yml >/dev/null \
            || { echo "::error::UI must receive LANCACHE_IMAGE_PREFIX."; exit 1; }
          grep -F "LANCACHE_IMAGE_CHANNEL=\${LANCACHE_IMAGE_CHANNEL:-}" deploy/quickstart/docker-compose.yml >/dev/null \
            && grep -F "LANCACHE_IMAGE_CHANNEL=\${LANCACHE_IMAGE_CHANNEL:-}" deploy/prod/docker-compose.yml >/dev/null \
            || { echo "::error::UI must receive LANCACHE_IMAGE_CHANNEL."; exit 1; }
          grep -F "response_image_tag=\$(echo \"\$response\"" setup.sh >/dev/null \
            || { echo "::error::setup.sh secondary must parse the primary image_tag."; exit 1; }
          grep -F "response_image_registry=\$(echo \"\$response\"" setup.sh >/dev/null \
            || { echo "::error::setup.sh secondary must parse the primary image_registry."; exit 1; }
          grep -F "response_image_prefix=\$(echo \"\$response\"" setup.sh >/dev/null \
            || { echo "::error::setup.sh secondary must parse the primary image_prefix."; exit 1; }
          grep -F "response_image_channel=\$(echo \"\$response\"" setup.sh >/dev/null \
            || { echo "::error::setup.sh secondary must parse the primary image_channel."; exit 1; }
          grep -F "LANCACHE_IMAGE_TAG=\${LANCACHE_IMAGE_TAG:-latest}" deploy/quickstart/docker-compose.yml >/dev/null \
            || { echo "::error::Quickstart UI must receive LANCACHE_IMAGE_TAG."; exit 1; }
          grep -F "LANCACHE_IMAGE_TAG=\${LANCACHE_IMAGE_TAG:-latest}" deploy/prod/docker-compose.yml >/dev/null \
            || { echo "::error::Prod UI must receive LANCACHE_IMAGE_TAG."; exit 1; }
          grep -F 'LANCACHE_IMAGE_REGISTRY=${LANCACHE_IMAGE_REGISTRY}' setup.sh >/dev/null \
            || { echo "::error::setup.sh must write LANCACHE_IMAGE_REGISTRY."; exit 1; }
          grep -F 'LANCACHE_IMAGE_PREFIX=${LANCACHE_IMAGE_PREFIX}' setup.sh >/dev/null \
            || { echo "::error::setup.sh must write LANCACHE_IMAGE_PREFIX."; exit 1; }
          grep -F 'LANCACHE_IMAGE_CHANNEL=${lancache_image_channel}' setup.sh >/dev/null \
            || { echo "::error::setup.sh secondary must write LANCACHE_IMAGE_CHANNEL."; exit 1; }
          grep -F 'derive_release_archive_image_tag()' setup.sh >/dev/null \
            || { echo "::error::setup.sh must preserve release archive image tags before defaulting to latest."; exit 1; }
          grep -F 'channel="${channel:-latest}"' setup.sh >/dev/null \
            || { echo "::error::setup.sh must keep latest as the normal stable default; edge must be explicit."; exit 1; }
          grep -F 'LANCACHE_IMAGE_CHANNEL=latest' README.md >/dev/null \
            || { echo "::error::README must document latest as the normal install default."; exit 1; }
          grep -F 'edge installs must explicitly set `LANCACHE_IMAGE_CHANNEL=edge`' docs/release-versioning.md >/dev/null \
            || { echo "::error::Release docs must keep edge opt-in, not default."; exit 1; }
          grep -F 'docker build --pull -t "$fallback_image" "$build_tools_context" >&2' scripts/select-build-tools-image.sh >/dev/null \
            || { echo "::error::build-tools selector must keep Docker build output out of stdout."; exit 1; }
          bash scripts/validate-stack-images.sh
          VALIDATE_COMPOSE

      - name: Check naming consistency (docs/naming-conventions.md)
        run: |
          set -euo pipefail

          docker run --rm -i \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash scripts/check-naming-consistency.sh

      - name: Remove fallback compose validation image
        if: always()
        run: |
          set -euo pipefail

          case "${BUILD_TOOLS_IMAGE:-}" in
            lancache-ng-build-tools-validation:*)
              docker rmi "$BUILD_TOOLS_IMAGE"
              ;;
          esac

  # A fixed validation subnet collided repeatedly across different,
  # concurrent workflow runs sharing one of the 3 physical self-hosted
  # runner hosts (#623) -- `needs:` only serializes jobs *within* one run.
  # Deriving the subnet from this run's own id/attempt gives every run its
  # own subnet, so two runs on the same host (almost) never collide.
  #
  # Deliberately unconditional (no `needs`/`if` gating on detect-changes):
  # `detect-changes` itself only runs `if: github.event_name ==
  # 'pull_request'`, so on a push event it's skipped -- and a job that
  # `needs` a skipped job is itself skipped by default (no `always()`
  # here). full-setup-validate below *does* use `always()` to tolerate its
  # own skipped/failed `needs`, which means gating this job the same way
  # would make it skip on every push while full-setup-validate still ran,
  # silently falling back to the old fixed subnet on every master merge --
  # exactly the bug this fixes. Running unconditionally costs a few
  # seconds on the rare PR that doesn't touch deploy/ or the CI contract,
  # which is far cheaper than that.
  compute-validation-network:
    name: derive per-run validation subnet
    runs-on: [self-hosted, linux, lancache, lancache-light]
    outputs:
      subnet: ${{ steps.derive.outputs.subnet }}
      gateway: ${{ steps.derive.outputs.gateway }}
      proxy_ip: ${{ steps.derive.outputs.proxy_ip }}
      proxy_ssl_ip: ${{ steps.derive.outputs.proxy_ssl_ip }}
      dns_standard_ip: ${{ steps.derive.outputs.dns_standard_ip }}
      dns_ssl_ip: ${{ steps.derive.outputs.dns_ssl_ip }}
      watchdog_ip: ${{ steps.derive.outputs.watchdog_ip }}
      netdata_ip: ${{ steps.derive.outputs.netdata_ip }}
      nats_ip: ${{ steps.derive.outputs.nats_ip }}
      ui_ip: ${{ steps.derive.outputs.ui_ip }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Derive validation network
        id: derive
        uses: ./.github/actions/derive-validation-network

  full-setup-validate:
    name: validate full-setup image
    # On a pull_request event, `promote` never runs at all (see its own `if:`
    # condition) -- there is no channel image for THIS PR to wait for.
    # Instead this job now waits directly for `merge-manifests`, because (see
    # #626) that job is where a same-repo PR's per-arch staging legs
    # (pr-<N>-sha-<short>-{amd64,arm64}, pushed by build/build-arm64) get
    # combined into the real pr-<N>-sha-<short> multi-platform tag this job
    # actually pulls. This job MUST NOT start before merge-manifests
    # finishes: build/build-arm64 wait on shellcheck, validate-compose,
    # ci_scope_policy, file-headers, pr-template-check, line-endings, and
    # then compile Rust, so they (and merge-manifests after them) are much
    # slower than the lightweight `detect-changes` job this used to depend on
    # alone -- depending on only `detect-changes` let this job race ahead and
    # find no staging tags yet, silently falling back to stale base-channel
    # content for every service and reproducing the exact bug #626 fixes. On
    # push events (master/vX.Y.Z), this job still waits for `promote` so it
    # validates the freshly-promoted channel state of the commit it's
    # actually running for, instead of racing ahead of it or checking a
    # stale channel tag left over from a previous push.
    needs: [detect-changes, merge-manifests, promote, compute-validation-network]
    if: >-
      ${{
        always() &&
        (
          (github.event_name == 'pull_request' && needs['merge-manifests'].result == 'success') ||
          (github.event_name != 'pull_request' && needs.promote.result == 'success')
        ) &&
        (
          github.event_name != 'pull_request' ||
          needs['detect-changes'].outputs.deploy == 'true' ||
          needs['detect-changes'].outputs.workflow == 'true'
        )
      }}
    runs-on: [self-hosted, linux, lancache, lancache-light]
    permissions:
      contents: read
      packages: write
    env:
      VALIDATION_SUBNET: ${{ needs.compute-validation-network.outputs.subnet }}
      VALIDATION_GATEWAY: ${{ needs.compute-validation-network.outputs.gateway }}
      VALIDATION_PROXY_IP: ${{ needs.compute-validation-network.outputs.proxy_ip }}
      VALIDATION_PROXY_SSL_IP: ${{ needs.compute-validation-network.outputs.proxy_ssl_ip }}
      VALIDATION_DNS_STANDARD_IP: ${{ needs.compute-validation-network.outputs.dns_standard_ip }}
      VALIDATION_DNS_SSL_IP: ${{ needs.compute-validation-network.outputs.dns_ssl_ip }}
      VALIDATION_WATCHDOG_IP: ${{ needs.compute-validation-network.outputs.watchdog_ip }}
      VALIDATION_NETDATA_IP: ${{ needs.compute-validation-network.outputs.netdata_ip }}
      VALIDATION_NATS_IP: ${{ needs.compute-validation-network.outputs.nats_ip }}
      VALIDATION_UI_IP: ${{ needs.compute-validation-network.outputs.ui_ip }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # `latest` is contractually a stable-release-only channel (see
      # docs/release-versioning.md) -- it is never moved by a v0.2.0 (or any
      # other pre-release integration branch) push, so it always reflects the
      # last real release, not this branch's current code. Validating a
      # pre-release branch against `latest` therefore checks the wrong image
      # and fails for reasons unrelated to the branch under test. Mirror the
      # same ref-to-channel mapping the `promote` job uses so this job
      # validates the channel this branch actually publishes to.
      #
      # On a pull_request event this now resolves to the PR's OWN staging tag
      # (see #626) instead of the base-ref channel, so this job actually
      # tests the PR's own commits rather than whatever the base branch last
      # published -- UNLESS this is a Dependabot PR or (should that ever
      # start existing) a fork PR: those get a read-only GITHUB_TOKEN from
      # GitHub (same restriction, confirmed for Dependabot in GitHub's own
      # docs), so build/build-arm64 never push anything for them (see their
      # own "Log in to GHCR" steps) and there is no PR staging tag to
      # validate against at all. pr-staging-available captures that so every
      # later step can gate off one flag instead of re-deriving it.
      # base_channel_tag is always computed: it's the resolved tag itself
      # when staging isn't available, and the fallback source for any
      # full-setup service an eligible PR did not touch either way.
      - name: Determine validation image channel
        id: channel
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # github.sha, NOT github.event.pull_request.head.sha: for a
          # pull_request event this is the synthetic merge commit actually
          # checked out and built (head merged into the base branch's tip
          # AT THE TIME OF THIS EVENT), and -- critically -- it changes
          # whenever that merge result changes even if the PR's own head
          # commit does not (e.g. a "reopened" event after the base branch
          # moved while the PR was closed). Keying the tag on the PR head
          # SHA alone let two events for the identical head, merged against
          # two different base states, collide on one tag and let whichever
          # push landed last silently overwrite the other's image content.
          BUILD_SHA: ${{ github.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ACTOR: ${{ github.actor }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ "$BASE_REF" == "master" ]]; then
            base_channel_tag=edge
          elif [[ "$BASE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            base_channel_tag=dev
          else
            base_channel_tag=latest
          fi
          echo "base-channel-tag=$base_channel_tag" >> "$GITHUB_OUTPUT"

          pr_staging_available=false
          if [[ "$EVENT_NAME" == "pull_request" && "$ACTOR" != "dependabot[bot]" && "$HEAD_REPO" == "$REPOSITORY" ]]; then
            pr_staging_available=true
          fi
          echo "pr-staging-available=$pr_staging_available" >> "$GITHUB_OUTPUT"

          if [[ "$pr_staging_available" == "true" ]]; then
            short_sha="${BUILD_SHA::7}"
            tag="pr-${PR_NUMBER}-sha-${short_sha}"
            echo "Validating against this PR's own staging tag '$tag' (built commit $BUILD_SHA, PR head $PR_HEAD_SHA; base-channel fallback for untouched services: '$base_channel_tag')."
          else
            tag="$base_channel_tag"
            if [[ "$EVENT_NAME" == "pull_request" ]]; then
              echo "::notice::$ACTOR's pull_request runs get a read-only GITHUB_TOKEN (Dependabot, or a fork PR), so build/build-arm64 could not push a PR staging tag. Validating against the '$tag' base channel instead -- the same behavior this job always had before #626."
            fi
            echo "Validating against the '$tag' channel (base ref: $BASE_REF)."
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # deploy/full-setup/docker-compose.yml uses one LANCACHE_IMAGE_TAG for
      # every service, and the "Run client simulation" step below pulls
      # build-tools at that same tag -- but build/build-arm64 only push the
      # PR staging tag for services detect-changes says this PR actually
      # touched (real, deliberate additional push cost -- see #626 -- not
      # "rebuild everything per PR for free"). Any of those services this PR
      # did NOT touch has no image at the staging tag yet, so back-fill it
      # with a cheap registry-side copy from the base-ref channel image (the
      # correct thing to validate for an untouched service anyway). This
      # mirrors the `promote`/`merge-manifests` jobs' own
      # `docker buildx imagetools create` pattern for moving/combining tags
      # without re-pulling image layers.
      #
      # Gated on pr-staging-available, not a bare `github.event_name ==
      # 'pull_request'`: a Dependabot/fork PR has no PR staging tag for ANY
      # service (build/build-arm64 skip pushing entirely for them), so
      # steps.channel.outputs.tag already equals base_channel_tag above --
      # there is nothing to back-fill, and attempting to log in/push here
      # with that PR's read-only GITHUB_TOKEN would just fail instead of
      # skipping cleanly.
      - name: Set up Docker Buildx
        if: steps.channel.outputs.pr-staging-available == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        if: steps.channel.outputs.pr-staging-available == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # A service detect-changes says THIS PR touched (or any service other
      # than build-tools, if the PR changed a workflow/CI-contract file --
      # mirrors build/build-arm64's own should-build override exactly) must
      # already have a staging image by the time this runs: full-setup-
      # validate now waits for merge-manifests (see this job's own `needs:`
      # comment above) specifically so that's true. If it's missing anyway --
      # build/build-arm64 actually failed to push it, or imagetools inspect
      # hit a transient registry error -- silently copying base-channel
      # content into that service's pr-<N>-sha-<short> tag would make this
      # job green while testing exactly the stale image #626 exists to stop
      # testing, just now hidden behind a tag name that LOOKS PR-specific.
      # Fail loudly instead; only a genuinely untouched service gets the
      # base-channel back-fill.
      - name: Ensure PR staging tags exist for full-setup services
        if: steps.channel.outputs.pr-staging-available == 'true'
        env:
          REPOSITORY: ${{ github.repository }}
          PR_TAG: ${{ steps.channel.outputs.tag }}
          BASE_CHANNEL_TAG: ${{ steps.channel.outputs.base-channel-tag }}
          WORKFLOW_CHANGED: ${{ needs['detect-changes'].outputs.workflow }}
          PROXY_TOUCHED: ${{ needs['detect-changes'].outputs.proxy }}
          DNS_TOUCHED: ${{ needs['detect-changes'].outputs.dns_image }}
          WATCHDOG_TOUCHED: ${{ needs['detect-changes'].outputs.watchdog }}
          UI_TOUCHED: ${{ needs['detect-changes'].outputs.ui }}
          BUILD_TOOLS_TOUCHED: ${{ needs['detect-changes'].outputs.build_tools }}
        run: |
          set -euo pipefail

          # Mirrors build/build-arm64's "Determine whether this service
          # needs building" should-build override exactly: a workflow/CI-
          # contract change forces every service except build-tools to be
          # treated as touched, because build-tools' own detect-changes
          # scoping (tools/build-tools/** only) is intentionally narrower.
          service_should_have_staging_tag() {
            local service="$1" touched="$2"
            if [[ "$WORKFLOW_CHANGED" == "true" && "$service" != "build-tools" ]]; then
              echo true
            else
              echo "$touched"
            fi
          }

          declare -A touched_map=(
            [proxy]="$PROXY_TOUCHED"
            [dns]="$DNS_TOUCHED"
            [watchdog]="$WATCHDOG_TOUCHED"
            [ui]="$UI_TOUCHED"
            [build-tools]="$BUILD_TOOLS_TOUCHED"
          )

          # The services deploy/full-setup/docker-compose.yml references,
          # plus build-tools (used by the client-simulation step further
          # down, not by the compose file itself). dhcp and dhcp-proxy are
          # part of neither and are intentionally excluded.
          #
          # Decide touched-or-not FIRST, before looking at whether a pr_image
          # already exists. A prior run of this exact PR head (a manual
          # re-run, or this job simply running twice for the same commit) may
          # already have back-filled an untouched service's pr-<N>-sha-<short>
          # tag from whatever the base channel pointed at THEN. If the base
          # channel (edge/dev) has since moved -- another PR merged in the
          # meantime -- an existence check alone would see the stale alias,
          # assume it's still correct, and `continue` without refreshing it:
          # this job would then validate a deploy/workflow-only PR that
          # doesn't touch that service against an old, no-longer-current
          # base image, silently. So an untouched service is unconditionally
          # (re)pointed at whatever the base channel resolves to RIGHT NOW --
          # `imagetools create` is a cheap registry-side manifest write, not
          # a rebuild, so refreshing it even when nothing actually changed
          # costs nothing worth optimizing away.
          full_setup_services=(proxy dns watchdog ui build-tools)
          for service in "${full_setup_services[@]}"; do
            pr_image="ghcr.io/${REPOSITORY}/${service}:${PR_TAG}"
            should_exist="$(service_should_have_staging_tag "$service" "${touched_map[$service]}")"

            if [[ "$should_exist" == "true" ]]; then
              if docker buildx imagetools inspect "$pr_image" >/dev/null 2>&1; then
                echo "::notice::$service already has a staging image at $PR_TAG (this PR touched it)."
                continue
              fi
              echo "::error::$service's PR staging tag ($pr_image) is missing even though detect-changes says this PR touched it (or a workflow/CI-contract file changed). Refusing to fall back to base-channel content for a touched service -- that would silently reintroduce #626's bug behind a tag name that looks PR-specific. Check whether build/build-arm64 actually pushed $service successfully for this commit."
              exit 1
            fi

            base_image="ghcr.io/${REPOSITORY}/${service}:${BASE_CHANNEL_TAG}"
            echo "::notice::$service is untouched by this PR; (re)pointing $PR_TAG at the current $BASE_CHANNEL_TAG channel ($base_image)."
            docker buildx imagetools create --prefer-index=false -t "$pr_image" "$base_image"
          done

      - name: Build full-setup validation image
        env:
          IMAGE_TAG: ${{ steps.channel.outputs.tag }}
        run: |
          set -euo pipefail

          docker build \
            --build-arg LANCACHE_IMAGE_REGISTRY=ghcr.io \
            --build-arg LANCACHE_IMAGE_PREFIX=wiki-mod/lancache-ng \
            --build-arg LANCACHE_IMAGE_TAG="$IMAGE_TAG" \
            -t lancache-ng-full-setup:validation \
            deploy/full-setup

      - name: Validate compose configuration
        env:
          LANCACHE_IMAGE_REGISTRY: ghcr.io
          LANCACHE_IMAGE_PREFIX: wiki-mod/lancache-ng
          LANCACHE_IMAGE_TAG: ${{ steps.channel.outputs.tag }}
        run: |
          set -euo pipefail

          docker run --rm \
            -v "$PWD/deploy/full-setup:/validation:ro" \
            -w /validation \
            --env LANCACHE_IMAGE_REGISTRY \
            --env LANCACHE_IMAGE_PREFIX \
            --env LANCACHE_IMAGE_TAG \
            docker:latest \
            docker compose -f docker-compose.yml config >/dev/null

      # VALIDATION_SUBNET (and the matching VALIDATION_*_IP /
      # VALIDATION_GATEWAY vars, see docker-compose.yml) is now derived
      # per-run by the compute-validation-network job above (#623), so a
      # collision between two different concurrent runs should be rare.
      # This check remains as defense-in-depth for a genuine leftover
      # network (e.g. a bridge left behind by a crashed prior run that
      # never reached the teardown step): a raw `docker compose up` failure
      # in that case is a cryptic "failed to set up container networking:
      # Address already in use" with no indication of which network is
      # actually at fault.
      - name: Check for a validation subnet collision
        run: |
          set -euo pipefail
          target_subnet="${VALIDATION_SUBNET:-172.30.99.0/24}"
          conflict="$(python3 - "$target_subnet" <<'PYEOF'
          import ipaddress, subprocess, sys
          target = ipaddress.ip_network(sys.argv[1])
          # A leftover network from our own project (e.g. an aborted prior run
          # that never reached the teardown step) is not a real collision --
          # docker compose reuses/recreates it by name. Only flag networks
          # that aren't ours.
          own_prefix = "lancache-ng-validation"

          # Docker-managed networks only cover Docker's own view. A route or
          # interface address already on the host (another NIC, a VPN, a
          # leftover bridge from something outside Docker entirely) doesn't
          # show up in `docker network ls` at all, but the kernel still
          # refuses to create an overlapping bridge for it -- confirmed for
          # real: this exact check found zero Docker-network conflicts while
          # `docker compose up` still failed with "Address already in use".
          ids = subprocess.run(["docker", "network", "ls", "-q"], capture_output=True, text=True, check=True).stdout.split()
          for network_id in ids:
              fmt = "{{.Name}}|{{range .IPAM.Config}}{{.Subnet}} {{end}}"
              line = subprocess.run(["docker", "network", "inspect", network_id, "--format", fmt], capture_output=True, text=True, check=True).stdout.strip()
              name, _, subnets_str = line.partition("|")
              if name.startswith(own_prefix):
                  continue
              for subnet_str in subnets_str.split():
                  try:
                      existing = ipaddress.ip_network(subnet_str)
                  except ValueError:
                      continue
                  if target.overlaps(existing):
                      print(f"docker network {name} ({subnet_str})")

          route_output = subprocess.run(["ip", "-4", "-o", "addr", "show"], capture_output=True, text=True, check=True).stdout
          for line in route_output.splitlines():
              parts = line.split()
              try:
                  inet_index = parts.index("inet")
                  iface = parts[1]
                  cidr = parts[inet_index + 1]
              except (ValueError, IndexError):
                  continue
              try:
                  existing = ipaddress.ip_interface(cidr).network
              except ValueError:
                  continue
              if target.overlaps(existing):
                  print(f"host interface {iface} ({cidr})")
          PYEOF
          )"
          if [[ -n "$conflict" ]]; then
            echo "::error::Validation subnet $target_subnet overlaps existing network state on this runner: $conflict. Set VALIDATION_SUBNET (and the matching VALIDATION_*_IP / VALIDATION_GATEWAY env vars) to a free range and re-run."
            exit 1
          fi
          echo "Validation subnet $target_subnet is free."

      # Static config validation above only checks YAML/Compose structure. It
      # cannot catch a service that starts but immediately crash-loops (the
      # motivating case: #450/#485, dnsmasq trying to bind an already-used
      # port). This step actually starts the stack with real published images
      # and fails if any service is unhealthy or restarting once past its
      # own healthcheck's start_period.
      - name: Start full-setup validation stack
        working-directory: deploy/full-setup
        env:
          LANCACHE_IMAGE_REGISTRY: ghcr.io
          LANCACHE_IMAGE_PREFIX: wiki-mod/lancache-ng
          LANCACHE_IMAGE_TAG: ${{ steps.channel.outputs.tag }}
        run: |
          set -euo pipefail
          docker compose pull --quiet
          docker compose up -d

      - name: Wait for the stack to stabilize and check container health
        working-directory: deploy/full-setup
        run: |
          set -euo pipefail

          # Services with an explicit healthcheck report a real "healthy"
          # status; docker-socket-proxy has none, so it's only checked for
          # "running" plus a restart-count ceiling (catches a crash loop
          # without needing a healthcheck definition for every service).
          services_with_healthcheck="proxy dns-standard dns-ssl watchdog nats ui netdata"
          all_services="docker-socket-proxy $services_with_healthcheck"

          deadline=$((SECONDS + 90))
          while (( SECONDS < deadline )); do
            all_ready=1
            for service in $services_with_healthcheck; do
              cid="$(docker compose ps -q "$service")"
              status="$(docker inspect --format '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "unknown")"
              if [[ "$status" != "healthy" ]]; then
                all_ready=0
              fi
            done
            if [[ "$all_ready" -eq 1 ]]; then
              break
            fi
            sleep 5
          done

          echo "::group::Final container status"
          docker compose ps
          echo "::endgroup::"

          failed=0
          for service in $all_services; do
            cid="$(docker compose ps -q "$service")"
            if [[ -z "$cid" ]]; then
              echo "::error::$service has no running container"
              failed=1
              continue
            fi

            restart_count="$(docker inspect --format '{{.RestartCount}}' "$cid")"
            container_status="$(docker inspect --format '{{.State.Status}}' "$cid")"

            if [[ "$container_status" != "running" ]]; then
              echo "::error::$service is not running (state: $container_status)"
              failed=1
            elif (( restart_count > 1 )); then
              echo "::error::$service has restarted $restart_count times (crash-loop suspected)"
              failed=1
            fi

            if [[ " $services_with_healthcheck " == *" $service "* ]]; then
              health="$(docker inspect --format '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "unknown")"
              if [[ "$health" != "healthy" ]]; then
                echo "::error::$service did not become healthy (status: $health)"
                failed=1
              fi
            fi
          done

          if [[ "$failed" -eq 1 ]]; then
            echo "::group::Logs from all services (failure diagnostics)"
            docker compose logs --no-color
            echo "::endgroup::"
            exit 1
          fi

          echo "Full-setup stack is stable: all services running and healthy."

      # Unlike the failure-only log dump above, this always runs -- #626's
      # whole point is that a *green* run here must be verifiable as having
      # actually tested this commit's own code (not stale base-branch
      # content), and that's only checkable if the logs are visible
      # regardless of outcome.
      - name: Show full-setup service logs
        if: always()
        working-directory: deploy/full-setup
        run: |
          set -euo pipefail
          echo "::group::Logs from all services"
          docker compose logs --no-color || true
          echo "::endgroup::"

      - name: Run client simulation against the full-setup stack
        env:
          FULL_SETUP_CLIENT_TOOLS_IMAGE: ghcr.io/${{ github.repository }}/build-tools:${{ steps.channel.outputs.tag }}
        run: |
          set -euo pipefail
          scripts/full-setup-client-simulation.sh

      - name: Tear down full-setup validation stack
        if: always()
        working-directory: deploy/full-setup
        run: |
          set -euo pipefail
          docker compose down --volumes --remove-orphans || true

      - name: Clean up image
        if: always()
        run: |
          docker rmi lancache-ng-full-setup:validation || true

  dns_rust_quality:
    # DNS Rust quality is scoped by detect-changes for PR speed, but workflow
    # changes still force it because the CI contract itself may have changed.
    name: rust-quality (dns/nats-subscriber)
    needs: detect-changes
    if: >-
      ${{
        always() &&
        (
          github.event_name != 'pull_request' ||
          needs['detect-changes'].outputs.dns_rust == 'true' ||
          needs['detect-changes'].outputs.workflow == 'true'
        )
      }}
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/dns-nats-subscriber'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/dns-nats-subscriber'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.actor != 'dependabot[bot]' &&
            (
              github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository
            )
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
          dist-scheduler-url: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          dist-auth-token: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
      - name: cargo fmt --check (dns/nats-subscriber)
        run: cargo fmt --manifest-path services/dns/nats-subscriber/Cargo.toml -- --check
      - name: cargo check with warnings denied (dns/nats-subscriber)
        uses: ./.github/actions/cargo-with-sccache-fallback
        env:
          RUSTFLAGS: "-D warnings"
        with:
          command: cargo check --locked --all-targets --manifest-path services/dns/nats-subscriber/Cargo.toml
      - name: cargo clippy with warnings denied (dns/nats-subscriber)
        timeout-minutes: 35
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo clippy --locked --all-targets --manifest-path services/dns/nats-subscriber/Cargo.toml -- -D warnings

  ui_rust_quality:
    # UI Rust quality mirrors the DNS job but stays independent so both crates
    # can run in parallel on suitable runners.
    name: rust-quality (ui)
    needs: detect-changes
    if: >-
      ${{
        always() &&
        (
          github.event_name != 'pull_request' ||
          needs['detect-changes'].outputs.ui == 'true' ||
          needs['detect-changes'].outputs.workflow == 'true'
        )
      }}
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/ui'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/ui'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.actor != 'dependabot[bot]' &&
            (
              github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository
            )
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
          dist-scheduler-url: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          dist-auth-token: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
      - name: cargo fmt --check (ui)
        run: cargo fmt --manifest-path services/ui/Cargo.toml -- --check
      - name: cargo check with warnings denied (ui)
        uses: ./.github/actions/cargo-with-sccache-fallback
        env:
          RUSTFLAGS: "-D warnings"
        with:
          command: cargo check --locked --all-targets --manifest-path services/ui/Cargo.toml
      - name: cargo clippy with warnings denied (ui)
        timeout-minutes: 35
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo clippy --locked --all-targets --manifest-path services/ui/Cargo.toml -- -D warnings

  dns_test:
    # DNS unit tests are separate from quality checks so failures identify
    # whether the regression is lint/format level or behavioral.
    name: test (dns/nats-subscriber)
    needs: [validate-compose, dns_rust_quality, detect-changes]
    if: >-
      ${{
        always() &&
        needs['validate-compose'].result == 'success' &&
        (needs.dns_rust_quality.result == 'success' || needs.dns_rust_quality.result == 'skipped') &&
        (
          github.event_name != 'pull_request' ||
          needs['detect-changes'].outputs.dns_rust == 'true' ||
          needs['detect-changes'].outputs.workflow == 'true'
        )
      }}
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/dns-nats-subscriber'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/dns-nats-subscriber'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.actor != 'dependabot[bot]' &&
            (
              github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository
            )
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
          dist-scheduler-url: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          dist-auth-token: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
      - name: test (dns/nats-subscriber)
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo test --locked --manifest-path services/dns/nats-subscriber/Cargo.toml

  ui_test:
    # UI tests run only when the UI or workflow contract changes. This keeps
    # docs/setup-only PRs from paying for unrelated Rust test work.
    name: test (ui)
    needs: [validate-compose, ui_rust_quality, detect-changes]
    if: >-
      ${{
        always() &&
        needs['validate-compose'].result == 'success' &&
        (needs.ui_rust_quality.result == 'success' || needs.ui_rust_quality.result == 'skipped') &&
        (
          github.event_name != 'pull_request' ||
          needs['detect-changes'].outputs.ui == 'true' ||
          needs['detect-changes'].outputs.workflow == 'true'
        )
      }}
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/ui'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/ui'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.actor != 'dependabot[bot]' &&
            (
              github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository
            )
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
          dist-scheduler-url: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          dist-auth-token: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
      - name: test (ui)
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo test --locked --manifest-path services/ui/Cargo.toml

  rust_coverage:
    name: coverage (Rust)
    needs: [validate-compose, dns_test, ui_test, detect-changes]
    if: >-
      ${{
        always() &&
        needs['validate-compose'].result == 'success' &&
        (needs.dns_test.result == 'success' || needs.dns_test.result == 'skipped') &&
        (needs.ui_test.result == 'success' || needs.ui_test.result == 'skipped') &&
        (
          github.event_name != 'pull_request' ||
          needs['detect-changes'].outputs.dns_rust == 'true' ||
          needs['detect-changes'].outputs.ui == 'true' ||
          needs['detect-changes'].outputs.workflow == 'true'
        )
      }}
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # This job resolves its own build-tools image rather than reusing
      # validate-compose's exported build_tools_image output. That output is
      # deliberately locked to the published, digest-qualified image (never a
      # branch-local fallback) because dns_cargo_audit/ui_cargo_audit need a
      # reproducible, previously-audited image. Coverage measurement has no
      # such reproducibility requirement, so it can accept a branch-local
      # rebuild when a PR's own Dockerfile change (like adding tarpaulin)
      # hasn't been published to ghcr.io yet.
      - name: Resolve build-tools image (with tarpaulin required)
        env:
          EXTRA_REQUIRED_TOOLS: "cargo-tarpaulin bc"
          GITHUB_EVENT_PULL_REQUEST_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail
          image="$(bash scripts/select-build-tools-image.sh)"
          printf 'BUILD_TOOLS_IMAGE=%s\n' "$image" >> "$GITHUB_ENV"
      # Coverage output must land on a writable host path: the repo checkout
      # itself is bind-mounted read-only into the build-tools container below,
      # matching the dns_cargo_audit/ui_cargo_audit pattern.
      - name: Prepare writable coverage output directories
        run: |
          set -euo pipefail
          mkdir -p coverage-dns coverage-ui
      - name: Run coverage (dns/nats-subscriber)
        run: |
          set -euo pipefail

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e CARGO_HOME=/tmp/cargo-home \
            -e CARGO_TARGET_DIR=/tmp/target-dns \
            -v "$PWD:/work" \
            -v "$PWD/coverage-dns:/coverage-dns" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash -c 'set -euo pipefail
              cargo tarpaulin \
                --engine llvm \
                --manifest-path services/dns/nats-subscriber/Cargo.toml \
                --locked \
                --timeout 300 \
                --out json \
                --output-dir /coverage-dns'
      - name: Run coverage (ui)
        run: |
          set -euo pipefail

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e CARGO_HOME=/tmp/cargo-home \
            -e CARGO_TARGET_DIR=/tmp/target-ui \
            -v "$PWD:/work" \
            -v "$PWD/coverage-ui:/coverage-ui" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash -c 'set -euo pipefail
              cargo tarpaulin \
                --engine llvm \
                --manifest-path services/ui/Cargo.toml \
                --locked \
                --timeout 300 \
                --out json \
                --output-dir /coverage-ui'
      - name: Merge coverage reports and check threshold
        id: coverage
        run: |
          set -euo pipefail

          mkdir -p coverage-badge
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "$PWD:/work:ro" \
            -v "$PWD/coverage-badge:/coverage-badge" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash -c 'set -euo pipefail

              # Extract coverage percentages from JSON reports inside the
              # selected build-tools image, not from incidental host binaries.
              dns_coverage=$(jq -r ".coverage" coverage-dns/tarpaulin-report.json 2>/dev/null || echo "0")
              ui_coverage=$(jq -r ".coverage" coverage-ui/tarpaulin-report.json 2>/dev/null || echo "0")

              echo "DNS coverage: ${dns_coverage}%"
              echo "UI coverage: ${ui_coverage}%"

              # Per-crate thresholds, not a shared minimum: the two crates'"'"' real
              # coverage differs by an order of magnitude (measured on CI:
              # ui ~38.6%, nats-subscriber ~0%, since nats-subscriber'"'"'s 4 tests
              # only cover its data model, not its subscribe/forward logic --
              # tracked in #504). A single shared "minimum" threshold would
              # either block ui'"'"'s real coverage from ever mattering (if set low
              # enough for nats-subscriber to pass) or permanently fail
              # nats-subscriber (if set for ui'"'"'s level). Each crate'"'"'s threshold
              # is raised independently as that crate gains real tests.
              ui_threshold=35
              dns_threshold=0

              echo "UI threshold: ${ui_threshold}%"
              echo "DNS threshold: ${dns_threshold}% (tracked gap: #504)"

              failed=0
              if (( $(echo "$ui_coverage < $ui_threshold" | bc -l) )); then
                echo "::error::UI coverage ${ui_coverage}% is below threshold of ${ui_threshold}%"
                failed=1
              fi
              if (( $(echo "$dns_coverage < $dns_threshold" | bc -l) )); then
                echo "::error::DNS coverage ${dns_coverage}% is below threshold of ${dns_threshold}%"
                failed=1
              fi

              if [[ "$failed" -eq 1 ]]; then
                exit 1
              fi

              # Badge generation reuses this same containerized jq instead of
              # assuming a host-installed jq, matching why the coverage
              # extraction above already runs in here (issue #566).
              ui_coverage_display="$(printf "%.2f" "$ui_coverage")"
              dns_coverage_display="$(printf "%.2f" "$dns_coverage")"
              badge_message="ui ${ui_coverage_display}% / dns ${dns_coverage_display}%"
              badge_color=yellow
              if awk -v ui="$ui_coverage" -v dns="$dns_coverage" "BEGIN { exit !(ui >= 80 && dns >= 80) }"; then
                badge_color=brightgreen
              fi

              jq -n \
                --arg message "$badge_message" \
                --arg color "$badge_color" \
                "{schemaVersion: 1, label: \"rust coverage\", message: \$message, color: \$color}" \
                > /coverage-badge/rust.json

              {
                printf "ui=%s\n" "$ui_coverage_display"
                printf "dns=%s\n" "$dns_coverage_display"
                printf "message=%s\n" "$badge_message"
              } > /coverage-badge/output.env

              echo "Coverage check passed"'

          cat coverage-badge/output.env >> "$GITHUB_OUTPUT"
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: rust-coverage-reports
          path: |
            coverage-dns/tarpaulin-report.json
            coverage-ui/tarpaulin-report.json
          retention-days: 30
      - name: Publish Rust coverage badge endpoint
        # BADGE_FILE is scoped per source branch (not one shared coverage/rust.json)
        # so pushes to master and to the active vX.Y.Z integration branch don't
        # overwrite each other's badge data -- the workflow-level concurrency
        # group only serializes writes, it doesn't stop two different branches
        # from racing to own the same file.
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
        env:
          BADGE_BRANCH: badges
          BADGE_FILE: coverage/rust-${{ github.ref_name }}.json
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          : "${GITHUB_TOKEN:?GITHUB_TOKEN is required to publish the coverage badge endpoint}"
          : "${BADGE_BRANCH:?BADGE_BRANCH is required}"
          : "${BADGE_FILE:?BADGE_FILE is required}"

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT
          cp coverage-badge/rust.json "$tmp_dir/rust.json"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "$BADGE_BRANCH" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$BADGE_BRANCH"; then
            git switch --create "$BADGE_BRANCH" "origin/$BADGE_BRANCH"
          else
            git switch --orphan "$BADGE_BRANCH"
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p "$(dirname "$BADGE_FILE")"
          cp "$tmp_dir/rust.json" "$BADGE_FILE"
          git add "$BADGE_FILE"

          if git diff --cached --quiet; then
            echo "::notice::Rust coverage badge endpoint already up to date."
            exit 0
          fi

          git commit -m "chore: update rust coverage badge"
          git push origin "$BADGE_BRANCH"

  watchdog_test:
    # Watchdog has its own small shell runtime and therefore its own scoped
    # syntax/executable gate instead of being folded into larger Rust jobs.
    name: test (watchdog)
    needs: [validate-compose, detect-changes]
    if: >-
      ${{
        always() &&
        needs['validate-compose'].result == 'success' &&
        (
          github.event_name != 'pull_request' ||
          needs['detect-changes'].outputs.watchdog == 'true' ||
          needs['detect-changes'].outputs.workflow == 'true'
        )
      }}
    runs-on: [self-hosted, linux, lancache, lancache-light]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: test (watchdog)
        run: |
          bash -n services/watchdog/watchdog.sh
          test -x services/watchdog/watchdog.sh

  dns_cargo_audit:
    # Dependency audits remain crate-specific. They are skipped only when path
    # filtering proves the crate and workflow contract did not change.
    name: cargo-audit (dns/nats-subscriber)
    needs: [validate-compose, detect-changes]
    if: >-
      ${{
        always() &&
        needs['validate-compose'].result == 'success' &&
        (
          github.event_name != 'pull_request' ||
          needs['detect-changes'].outputs.dns_rust == 'true' ||
          needs['detect-changes'].outputs.workflow == 'true'
        )
      }}
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    env:
      BUILD_TOOLS_IMAGE: ${{ needs['validate-compose'].outputs.build_tools_image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Audit Rust dependencies (dns/nats-subscriber)
        run: |
          set -euo pipefail

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e CARGO_HOME=/tmp/cargo-home \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash -c 'set -euo pipefail
              audit_log="$(mktemp)"
              trap '"'"'rm -f "$audit_log"'"'"' EXIT
              if ! cargo audit --deny warnings --file services/dns/nats-subscriber/Cargo.lock >"$audit_log" 2>&1; then
                cat "$audit_log"
                exit 1
              fi
              cat "$audit_log"
              if grep -Eiq '"'"'(^|[[:space:]])warning:'"'"' "$audit_log"; then
                echo "::error::cargo-audit emitted warnings."
                exit 1
              fi'

  ui_cargo_audit:
    # UI dependency audit mirrors the DNS audit and stays parallel to avoid
    # serializing independent Rust checks.
    name: cargo-audit (ui)
    needs: [validate-compose, detect-changes]
    if: >-
      ${{
        always() &&
        needs['validate-compose'].result == 'success' &&
        (
          github.event_name != 'pull_request' ||
          needs['detect-changes'].outputs.ui == 'true' ||
          needs['detect-changes'].outputs.workflow == 'true'
        )
      }}
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    env:
      BUILD_TOOLS_IMAGE: ${{ needs['validate-compose'].outputs.build_tools_image }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Audit Rust dependencies (ui)
        run: |
          set -euo pipefail

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e CARGO_HOME=/tmp/cargo-home \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash -c 'set -euo pipefail
              audit_log="$(mktemp)"
              trap '"'"'rm -f "$audit_log"'"'"' EXIT
              if ! cargo audit --deny warnings --file services/ui/Cargo.lock >"$audit_log" 2>&1; then
                cat "$audit_log"
                exit 1
              fi
              cat "$audit_log"
              if grep -Eiq '"'"'(^|[[:space:]])warning:'"'"' "$audit_log"; then
                echo "::error::cargo-audit emitted warnings."
                exit 1
              fi'

  ci_scope_policy:
    # Central policy reconciliation for PR path filtering. Individual jobs may
    # skip for speed, but this job verifies that every required check really ran
    # for the files touched by the PR.
    name: CI scope policy
    needs:
      - detect-changes
      - dns_rust_quality
      - ui_rust_quality
      - dns_test
      - ui_test
      - watchdog_test
      - dns_cargo_audit
      - ui_cargo_audit
    if: always()
    runs-on: [self-hosted, linux, lancache, lancache-light]
    steps:
      - name: Enforce scoped CI gates
        env:
          EVENT_NAME: ${{ github.event_name }}
          DETECT_RESULT: ${{ needs['detect-changes'].result }}
          DNS_RUST_CHANGED: ${{ needs['detect-changes'].outputs.dns_rust }}
          UI_CHANGED: ${{ needs['detect-changes'].outputs.ui }}
          WATCHDOG_CHANGED: ${{ needs['detect-changes'].outputs.watchdog }}
          WORKFLOW_CHANGED: ${{ needs['detect-changes'].outputs.workflow }}
          DOCS_CHANGED: ${{ needs['detect-changes'].outputs.docs }}
          DOCS_ONLY: ${{ needs['detect-changes'].outputs.docs_only }}
          GOVERNANCE_CHANGED: ${{ needs['detect-changes'].outputs.governance }}
          SETUP_RUNTIME_CHANGED: ${{ needs['detect-changes'].outputs.setup_runtime }}
          DEPLOY_CHANGED: ${{ needs['detect-changes'].outputs.deploy }}
          RELEASE_CONTRACT_CHANGED: ${{ needs['detect-changes'].outputs.release_contract }}
          SCRIPTS_CHANGED: ${{ needs['detect-changes'].outputs.scripts }}
          DNS_RUST_QUALITY_RESULT: ${{ needs.dns_rust_quality.result }}
          UI_RUST_QUALITY_RESULT: ${{ needs.ui_rust_quality.result }}
          DNS_TEST_RESULT: ${{ needs.dns_test.result }}
          UI_TEST_RESULT: ${{ needs.ui_test.result }}
          WATCHDOG_TEST_RESULT: ${{ needs.watchdog_test.result }}
          DNS_CARGO_AUDIT_RESULT: ${{ needs.dns_cargo_audit.result }}
          UI_CARGO_AUDIT_RESULT: ${{ needs.ui_cargo_audit.result }}
        run: |
          set -euo pipefail

          grep -n "Set up Docker Buildx for manifest inspection" .github/workflows/build-push.yml >/dev/null || {
            echo "::error::validate-compose must set up Buildx before resolving digest-qualified build-tools images."
            exit 1
          }

          require_boolean() {
            local name="$1" value="$2"
            case "$value" in
              true|false)
                ;;
              *)
                echo "::error::detect-changes output '$name' must be true or false, got '${value:-<empty>}'."
                exit 1
                ;;
            esac
          }

          require_success() {
            local name="$1" value="$2"
            if [ "$value" != "success" ]; then
              echo "::error::$name must succeed for this change set, got '$value'."
              exit 1
            fi
          }

          require_success_or_intentional_skip() {
            local name="$1" value="$2"
            case "$value" in
              success|skipped)
                ;;
              *)
                echo "::error::$name may only be skipped by the PR path filter, got '$value'."
                exit 1
                ;;
            esac
          }

          if [ "$EVENT_NAME" != "pull_request" ]; then
            require_success "rust-quality (dns/nats-subscriber)" "$DNS_RUST_QUALITY_RESULT"
            require_success "rust-quality (ui)" "$UI_RUST_QUALITY_RESULT"
            require_success "test (dns/nats-subscriber)" "$DNS_TEST_RESULT"
            require_success "test (ui)" "$UI_TEST_RESULT"
            require_success "test (watchdog)" "$WATCHDOG_TEST_RESULT"
            require_success "cargo-audit (dns/nats-subscriber)" "$DNS_CARGO_AUDIT_RESULT"
            require_success "cargo-audit (ui)" "$UI_CARGO_AUDIT_RESULT"
            exit 0
          fi

          require_success "detect changed paths" "$DETECT_RESULT"

          for output in \
            DNS_RUST_CHANGED \
            UI_CHANGED \
            WATCHDOG_CHANGED \
            WORKFLOW_CHANGED \
            DOCS_CHANGED \
            DOCS_ONLY \
            GOVERNANCE_CHANGED \
            SETUP_RUNTIME_CHANGED \
            DEPLOY_CHANGED \
            RELEASE_CONTRACT_CHANGED \
            SCRIPTS_CHANGED
          do
            require_boolean "$output" "${!output}"
          done

          dns_rust_required=false
          ui_required=false
          watchdog_required=false
          if [ "$WORKFLOW_CHANGED" = "true" ]; then
            dns_rust_required=true
            ui_required=true
            watchdog_required=true
          fi
          if [ "$DNS_RUST_CHANGED" = "true" ]; then
            dns_rust_required=true
          fi
          if [ "$UI_CHANGED" = "true" ]; then
            ui_required=true
          fi
          if [ "$WATCHDOG_CHANGED" = "true" ]; then
            watchdog_required=true
          fi

          if [ "$dns_rust_required" = "true" ]; then
            require_success "rust-quality (dns/nats-subscriber)" "$DNS_RUST_QUALITY_RESULT"
            require_success "test (dns/nats-subscriber)" "$DNS_TEST_RESULT"
            require_success "cargo-audit (dns/nats-subscriber)" "$DNS_CARGO_AUDIT_RESULT"
          else
            require_success_or_intentional_skip "rust-quality (dns/nats-subscriber)" "$DNS_RUST_QUALITY_RESULT"
            require_success_or_intentional_skip "test (dns/nats-subscriber)" "$DNS_TEST_RESULT"
            require_success_or_intentional_skip "cargo-audit (dns/nats-subscriber)" "$DNS_CARGO_AUDIT_RESULT"
          fi

          if [ "$ui_required" = "true" ]; then
            require_success "rust-quality (ui)" "$UI_RUST_QUALITY_RESULT"
            require_success "test (ui)" "$UI_TEST_RESULT"
            require_success "cargo-audit (ui)" "$UI_CARGO_AUDIT_RESULT"
          else
            require_success_or_intentional_skip "rust-quality (ui)" "$UI_RUST_QUALITY_RESULT"
            require_success_or_intentional_skip "test (ui)" "$UI_TEST_RESULT"
            require_success_or_intentional_skip "cargo-audit (ui)" "$UI_CARGO_AUDIT_RESULT"
          fi

          if [ "$watchdog_required" = "true" ]; then
            require_success "test (watchdog)" "$WATCHDOG_TEST_RESULT"
          else
            require_success_or_intentional_skip "test (watchdog)" "$WATCHDOG_TEST_RESULT"
          fi

          if [ "$DOCS_ONLY" = "true" ]; then
            echo "::notice::Docs-only PR: heavy Rust and Docker checks may be skipped, but unconditional policy checks still ran."
          fi
          if [ "$GOVERNANCE_CHANGED" = "true" ]; then
            echo "::notice::Governance files changed; keep review focused on project rules, not only generated artifacts."
          fi
          if [ "$SETUP_RUNTIME_CHANGED" = "true" ] || [ "$DEPLOY_CHANGED" = "true" ] || [ "$RELEASE_CONTRACT_CHANGED" = "true" ]; then
            echo "::notice::Runtime/deploy/release contract files changed; validate-compose remains the lightweight project-wide guard."
          fi

  container-scan:
    # Full image vulnerability scans are intentionally limited to trusted refs.
    # They build every service image and routinely dominate PR runtime on
    # self-hosted runners; PRs still exercise Dockerfiles in the build job below.
    # The build job depends on this gate before it can push normal service
    # images. Build-tools receives an additional exact pushed-digest scan in the
    # build job because the multi-arch published image is produced there.
    if: github.event_name != 'pull_request'
    needs: validate-compose
    # Each matrix row carries its own JSON-encoded runner selector so amd64
    # rows stay on the self-hosted pool (with LAN acceleration available) and
    # arm64 rows run natively on a GitHub-hosted arm64 runner -- QEMU on the
    # self-hosted pool would reintroduce the emulated-Rust-compile risk this
    # scan is meant to catch before build/build-arm64 push anything real.
    runs-on: ${{ fromJSON(matrix.runner) }}
    env:
      BUILD_TOOLS_IMAGE: ${{ needs['validate-compose'].outputs.build_tools_image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: proxy
            context: services/proxy
            # cdn-domains.txt lives in services/dns/, outside this image's own
            # build context — see services/proxy/Dockerfile's COPY --from
            # comment for why a named additional context is needed here.
            build_contexts: dns-domains=services/dns
            description: nginx-based lancache-ng caching proxy for standard and TLS-interception cache traffic.
            platform: linux/amd64
            platform_tag: amd64
            runner: '["self-hosted", "linux", "lancache", "lancache-heavy"]'
          - service: dns
            context: services/dns
            build_contexts: ""
            description: PowerDNS recursor, authoritative DNS, and NATS subscriber service for lancache-ng cache routing.
            rust: true
            platform: linux/amd64
            platform_tag: amd64
            runner: '["self-hosted", "linux", "lancache", "lancache-heavy"]'
          - service: watchdog
            context: services/watchdog
            build_contexts: ""
            description: lancache-ng watchdog helper for runtime health checks and recovery hooks.
            platform: linux/amd64
            platform_tag: amd64
            runner: '["self-hosted", "linux", "lancache", "lancache-heavy"]'
          - service: dhcp
            context: services/dhcp
            build_contexts: ""
            description: Kea DHCP, control-agent, and DHCP-DDNS service for lancache-ng managed networks.
            platform: linux/amd64
            platform_tag: amd64
            runner: '["self-hosted", "linux", "lancache", "lancache-heavy"]'
          - service: dhcp-proxy
            context: services/dhcp-proxy
            build_contexts: ""
            description: dnsmasq-based DHCP proxy and relay helper for lancache-ng deployments.
            platform: linux/amd64
            platform_tag: amd64
            runner: '["self-hosted", "linux", "lancache", "lancache-heavy"]'
          - service: ui
            context: services/ui
            build_contexts: ""
            description: lancache-ng Admin UI and control-plane service for cache, DNS, DHCP, and secondary management.
            rust: true
            platform: linux/amd64
            platform_tag: amd64
            runner: '["self-hosted", "linux", "lancache", "lancache-heavy"]'
          - service: build-tools
            context: tools/build-tools
            build_contexts: ""
            description: Prebuilt lancache-ng CI and developer validation toolchain image.
            platform: linux/amd64
            platform_tag: amd64
            runner: '["self-hosted", "linux", "lancache", "lancache-heavy"]'
          - service: proxy
            context: services/proxy
            build_contexts: dns-domains=services/dns
            description: nginx-based lancache-ng caching proxy for standard and TLS-interception cache traffic.
            platform: linux/arm64
            platform_tag: arm64
            runner: '"ubuntu-24.04-arm"'
          - service: dns
            context: services/dns
            build_contexts: ""
            description: PowerDNS recursor, authoritative DNS, and NATS subscriber service for lancache-ng cache routing.
            rust: true
            platform: linux/arm64
            platform_tag: arm64
            runner: '"ubuntu-24.04-arm"'
          - service: watchdog
            context: services/watchdog
            build_contexts: ""
            description: lancache-ng watchdog helper for runtime health checks and recovery hooks.
            platform: linux/arm64
            platform_tag: arm64
            runner: '"ubuntu-24.04-arm"'
          - service: dhcp
            context: services/dhcp
            build_contexts: ""
            description: Kea DHCP, control-agent, and DHCP-DDNS service for lancache-ng managed networks.
            platform: linux/arm64
            platform_tag: arm64
            runner: '"ubuntu-24.04-arm"'
          - service: dhcp-proxy
            context: services/dhcp-proxy
            build_contexts: ""
            description: dnsmasq-based DHCP proxy and relay helper for lancache-ng deployments.
            platform: linux/arm64
            platform_tag: arm64
            runner: '"ubuntu-24.04-arm"'
          - service: ui
            context: services/ui
            build_contexts: ""
            description: lancache-ng Admin UI and control-plane service for cache, DNS, DHCP, and secondary management.
            rust: true
            platform: linux/arm64
            platform_tag: arm64
            runner: '"ubuntu-24.04-arm"'
          - service: build-tools
            context: tools/build-tools
            build_contexts: ""
            description: Prebuilt lancache-ng CI and developer validation toolchain image.
            platform: linux/arm64
            platform_tag: arm64
            runner: '"ubuntu-24.04-arm"'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable build-tools publish scan
        id: build-tools-scan-changes
        if: matrix.service == 'build-tools'
        run: |
          set -euo pipefail

          should_scan=true
          echo "::notice::build-tools scan remains enabled on trusted refs so publish coverage includes the sha-* source image, for both the amd64 and arm64 matrix rows."
          echo "should-scan=$should_scan" >> "$GITHUB_OUTPUT"

      - name: Compute Docker build parallelism
        if: matrix.service != 'build-tools' || steps.build-tools-scan-changes.outputs.should-scan == 'true'
        id: docker-build-jobs
        run: |
          set -euo pipefail

          if [ -n "${CARGO_BUILD_JOBS:-}" ]; then
            case "$CARGO_BUILD_JOBS" in
              ''|*[!0-9]*)
                echo "::error::CARGO_BUILD_JOBS must be a positive integer."
                exit 1
                ;;
            esac
            if [ "$CARGO_BUILD_JOBS" -le 0 ]; then
              echo "::error::CARGO_BUILD_JOBS must be greater than zero."
              exit 1
            fi
            jobs="$CARGO_BUILD_JOBS"
            echo "::notice::Using CARGO_BUILD_JOBS=$jobs from repository variable for Docker builds."
          else
            detected_cores="$(nproc 2>/dev/null || getconf _NPROCESSORS_ONLN || echo 2)"
            jobs=$((detected_cores - 2))
            if [ "$jobs" -lt 4 ]; then
              jobs=4
            fi
            echo "::notice::Using CARGO_BUILD_JOBS=$jobs from $detected_cores detected cores for Docker builds."
          fi

          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

      - name: Prepare Rust acceleration secret files
        # Trusted Rust image builds may use Redis sccache, sccache-dist, and
        # distcc as CI infrastructure. Secrets are written to temporary files for
        # BuildKit and are never exposed to fork PRs or Dependabot runs.
        # Only the amd64 rows run on the self-hosted LAN pool that can reach
        # this acceleration infrastructure -- the arm64 rows run on a
        # GitHub-hosted runner and always scan an unaccelerated native build.
        if: >-
          ${{
            (
              matrix.service != 'build-tools' ||
              steps.build-tools-scan-changes.outputs.should-scan == 'true'
            ) &&
            matrix.rust == true &&
            matrix.platform_tag == 'amd64' &&
            github.actor != 'dependabot[bot]' &&
            github.event_name != 'pull_request'
          }}
        id: sccache-secret
        env:
          SCCACHE_REDIS_MODE: ${{ vars.SCCACHE_REDIS_MODE }}
          SCCACHE_REDIS_URL: ${{ secrets.SCCACHE_REDIS_URL }}
          SCCACHE_DIST_SCHEDULER_URL: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          SCCACHE_DIST_AUTH_TOKEN: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
          DISTCC_POTENTIAL_HOSTS: ${{ vars.DISTCC_POTENTIAL_HOSTS }}
        run: |
          set -euo pipefail

          mode="${SCCACHE_REDIS_MODE:-required}"
          secret_files=()

          toml_escape() {
            printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
          }

          case "$mode" in
            required|optional|off)
              ;;
            *)
              echo "::error::SCCACHE_REDIS_MODE must be one of: required, optional, off."
              exit 1
              ;;
          esac

          sccache_enabled=1
          redis_enabled=1
          if [ "$mode" = "off" ]; then
            sccache_enabled=0
            redis_enabled=0
            echo "Redis-backed sccache is disabled by SCCACHE_REDIS_MODE=off."
          fi

          if [ "$sccache_enabled" = "1" ] && [ -n "$SCCACHE_DIST_SCHEDULER_URL" ] && [ -z "$SCCACHE_DIST_AUTH_TOKEN" ]; then
            echo "::error::SCCACHE_DIST_AUTH_TOKEN is required when SCCACHE_DIST_SCHEDULER_URL is set."
            exit 1
          fi

          if [ "$sccache_enabled" = "1" ] && [ -z "$SCCACHE_DIST_SCHEDULER_URL" ] && [ -n "$SCCACHE_DIST_AUTH_TOKEN" ]; then
            echo "::error::SCCACHE_DIST_SCHEDULER_URL is required when SCCACHE_DIST_AUTH_TOKEN is set."
            exit 1
          fi

          if [ "$sccache_enabled" = "1" ] && [ -z "$SCCACHE_REDIS_URL" ]; then
            if [ "$mode" = "optional" ]; then
              echo "Skipping Redis-backed sccache because SCCACHE_REDIS_URL is empty and SCCACHE_REDIS_MODE=optional."
              redis_enabled=0
            else
              echo "::error::SCCACHE_REDIS_URL repository secret is required for trusted Rust image scans so sccache can use Redis."
              exit 1
            fi
          fi

          umask 077
          if [ "$redis_enabled" = "1" ]; then
            redis_file="${{ runner.temp }}/sccache-redis-url"
            printf '%s' "$SCCACHE_REDIS_URL" > "$redis_file"
            secret_files+=("sccache_redis_url=$redis_file")
            echo "redis-file=$redis_file" >> "$GITHUB_OUTPUT"
          fi

          if [ "$sccache_enabled" = "1" ] && [ -n "$SCCACHE_DIST_SCHEDULER_URL" ]; then
            dist_config_file="${{ runner.temp }}/sccache-dist-config"
            {
              printf '[dist]\n'
              printf 'scheduler_url = "%s"\n' "$(toml_escape "$SCCACHE_DIST_SCHEDULER_URL")"
              printf 'toolchains = []\n'
              printf 'toolchain_cache_size = 5368709120\n'
              printf '\n[dist.auth]\n'
              printf 'type = "token"\n'
              printf 'token = "%s"\n' "$(toml_escape "$SCCACHE_DIST_AUTH_TOKEN")"
            } > "$dist_config_file"
            secret_files+=("sccache_dist_config=$dist_config_file")
            echo "dist-config-file=$dist_config_file" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$DISTCC_POTENTIAL_HOSTS" ]; then
            if ! printf '%s\n' "$DISTCC_POTENTIAL_HOSTS" | grep -q ',cpp'; then
              echo "::error::DISTCC_POTENTIAL_HOSTS must include at least one pump-capable host with the ',cpp' option."
              exit 1
            fi

            distcc_hosts_file="${{ runner.temp }}/distcc-potential-hosts"
            printf '%s' "$DISTCC_POTENTIAL_HOSTS" > "$distcc_hosts_file"
            secret_files+=("distcc_potential_hosts=$distcc_hosts_file")
            echo "distcc-hosts-file=$distcc_hosts_file" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "secret-files<<SECRET_FILES"
            printf '%s\n' "${secret_files[@]}"
            echo "SECRET_FILES"
          } >> "$GITHUB_OUTPUT"

      - name: Select Rust acceleration network
        # BuildKit host networking is only enabled when secret-backed
        # acceleration needs access to private runner services. Normal builds
        # stay on the default isolated network.
        if: matrix.rust == true && matrix.platform_tag == 'amd64'
        env:
          SECRET_FILES: ${{ steps.sccache-secret.outputs.secret-files }}
        run: |
          set -euo pipefail

          rust_network=bridge
          buildx_network=default
          if [ -n "$SECRET_FILES" ]; then
            rust_network=host
            buildx_network=host
          fi
          printf 'RUST_ACCELERATION_NETWORK=%s\n' "$rust_network" >> "$GITHUB_ENV"
          printf 'RUST_BUILDX_NETWORK=%s\n' "$buildx_network" >> "$GITHUB_ENV"

      - name: Validate acceleration infrastructure outside BuildKit cache
        if: matrix.rust == true && matrix.platform_tag == 'amd64'
        uses: ./.github/actions/rust-acceleration-preflight
        with:
          service: ${{ matrix.service }}
          redis-file: ${{ steps.sccache-secret.outputs.redis-file }}
          dist-config-file: ${{ steps.sccache-secret.outputs.dist-config-file }}
          distcc-hosts-file: ${{ steps.sccache-secret.outputs.distcc-hosts-file }}
          build-tools-image: ${{ env.BUILD_TOOLS_IMAGE }}
          build-network: ${{ env.RUST_ACCELERATION_NETWORK }}
          platform: ${{ matrix.platform }}

      - name: Set up Docker Buildx for scan build
        # A docker-container builder is required for --allow network.host to
        # actually take effect: that entitlement is enabled by default for
        # container-driver builders since buildx v0.13 (docker/buildx#2266),
        # but the plain `docker` driver (the daemon's own embedded BuildKit,
        # what a bare `docker build` uses with no builder set up) additionally
        # requires the daemon itself to be started with
        # --allow-insecure-entitlement network.host -- an infrastructure-level
        # flag this workflow can't set. Using an explicit container-driver
        # builder here avoids that dependency entirely.
        if: matrix.service != 'build-tools' || steps.build-tools-scan-changes.outputs.should-scan == 'true'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build local scan image
        if: matrix.service != 'build-tools' || steps.build-tools-scan-changes.outputs.should-scan == 'true'
        env:
          CARGO_BUILD_JOBS: ${{ steps.docker-build-jobs.outputs.jobs }}
          SCCACHE_REDIS_FILE: ${{ steps.sccache-secret.outputs.redis-file }}
          SCCACHE_DIST_CONFIG_FILE: ${{ steps.sccache-secret.outputs.dist-config-file }}
          DISTCC_HOSTS_FILE: ${{ steps.sccache-secret.outputs.distcc-hosts-file }}
          MATRIX_BUILD_CONTEXTS: ${{ matrix.build_contexts }}
        run: |
          set -euo pipefail

          secret_args=()
          if [ -n "$SCCACHE_REDIS_FILE" ]; then
            secret_args+=(--secret "id=sccache_redis_url,src=$SCCACHE_REDIS_FILE")
          fi
          if [ -n "$SCCACHE_DIST_CONFIG_FILE" ]; then
            secret_args+=(--secret "id=sccache_dist_config,src=$SCCACHE_DIST_CONFIG_FILE")
          fi
          if [ -n "$DISTCC_HOSTS_FILE" ]; then
            secret_args+=(--secret "id=distcc_potential_hosts,src=$DISTCC_HOSTS_FILE")
          fi

          build_context_args=()
          if [ -n "${MATRIX_BUILD_CONTEXTS:-}" ]; then
            build_context_args+=(--build-context "$MATRIX_BUILD_CONTEXTS")
          fi

          scan_build_network="${RUST_BUILDX_NETWORK:-default}"
          if [ "$scan_build_network" = "bridge" ]; then
            scan_build_network=default
          fi
          allow_args=()
          if [ "$scan_build_network" = "host" ]; then
            allow_args+=(--allow network.host)
          fi

          docker buildx build \
            --load \
            --pull \
            --platform ${{ matrix.platform }} \
            --network "$scan_build_network" \
            "${allow_args[@]}" \
            --build-arg "BUILD_TOOLS_IMAGE=$BUILD_TOOLS_IMAGE" \
            --build-arg "CARGO_BUILD_JOBS=$CARGO_BUILD_JOBS" \
            "${secret_args[@]}" \
            "${build_context_args[@]}" \
            -t lancache-ng-scan:${{ matrix.service }}-${{ matrix.platform_tag }}-${{ github.run_id }} \
            ${{ matrix.context }}
      - name: Prepare local Trivy cache
        if: matrix.service != 'build-tools' || steps.build-tools-scan-changes.outputs.should-scan == 'true'
        run: |
          set -euo pipefail
          mkdir -p "/var/tmp/lancache-ng-trivy-cache/${{ matrix.service }}"
      - name: Scan image with Trivy
        if: matrix.service != 'build-tools' || steps.build-tools-scan-changes.outputs.should-scan == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: lancache-ng-scan:${{ matrix.service }}-${{ matrix.platform_tag }}-${{ github.run_id }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          skip-dirs: /usr/local/rustup/toolchains
          hide-progress: true
          cache: "false"
          cache-dir: /var/tmp/lancache-ng-trivy-cache/${{ matrix.service }}-${{ matrix.platform_tag }}
          timeout: 10m
          exit-code: "1"
      - name: Remove scan image
        if: >-
          ${{
            always() &&
            (
              matrix.service != 'build-tools' ||
              steps.build-tools-scan-changes.outputs.should-scan == 'true'
            )
          }}
        run: docker rmi lancache-ng-scan:${{ matrix.service }}-${{ matrix.platform_tag }}-${{ github.run_id }} || true

  build:
    # This job is the only place that publishes service sha-* images. It stays
    # on self-hosted runners because the heavy Rust/image path depends on the
    # shared build-tools image, sccache/distcc acceleration, and registry
    # credentials. It still waits for lightweight validation, policy checks,
    # and trusted-ref vulnerability scans before publishing. For build-tools,
    # it also scans the exact pushed digest before attestation/promotion can
    # proceed.
    needs:
      - shellcheck
      - validate-compose
      - container-scan
      - detect-changes
      - ci_scope_policy
      - file-headers
      - pr-template-check
      - line-endings
    if: >-
      ${{
        always() &&
        needs.shellcheck.result == 'success' &&
        needs['validate-compose'].result == 'success' &&
        needs.ci_scope_policy.result == 'success' &&
        needs['line-endings'].result == 'success' &&
        (github.event_name == 'pull_request' || needs['container-scan'].result == 'success') &&
        (github.event_name != 'pull_request' || needs['file-headers'].result == 'success') &&
        (github.event_name != 'pull_request' || needs['pr-template-check'].result == 'success')
      }}
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    timeout-minutes: 150
    env:
      BUILD_TOOLS_IMAGE: ${{ needs['validate-compose'].outputs.build_tools_image }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: proxy
            context: services/proxy
            # cdn-domains.txt lives in services/dns/, outside this image's own
            # build context — see services/proxy/Dockerfile's COPY --from
            # comment for why a named additional context is needed here.
            build_contexts: dns-domains=services/dns
            description: nginx-based lancache-ng caching proxy for standard and TLS-interception cache traffic.
          - service: dns
            context: services/dns
            build_contexts: ""
            description: PowerDNS recursor, authoritative DNS, and NATS subscriber service for lancache-ng cache routing.
            rust: true
          - service: watchdog
            context: services/watchdog
            build_contexts: ""
            description: lancache-ng watchdog helper for runtime health checks and recovery hooks.
          - service: dhcp
            context: services/dhcp
            build_contexts: ""
            description: Kea DHCP, control-agent, and DHCP-DDNS service for lancache-ng managed networks.
          - service: dhcp-proxy
            context: services/dhcp-proxy
            build_contexts: ""
            description: dnsmasq-based DHCP proxy and relay helper for lancache-ng deployments.
          - service: ui
            context: services/ui
            build_contexts: ""
            description: lancache-ng Admin UI and control-plane service for cache, DNS, DHCP, and secondary management.
            rust: true
          - service: build-tools
            context: tools/build-tools
            build_contexts: ""
            description: Prebuilt lancache-ng CI and developer validation toolchain image.

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Determine whether this service needs building
        id: should-build
        env:
          MATRIX_SERVICE: ${{ matrix.service }}
          DETECT_CHANGES_RESULT: ${{ needs['detect-changes'].result }}
        run: |
          set -euo pipefail

          should_build=true
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            if [ "$DETECT_CHANGES_RESULT" != "success" ]; then
              echo "::error::Pull request build scoping requires detect-changes to succeed, got '$DETECT_CHANGES_RESULT'."
              exit 1
            fi
            case "$MATRIX_SERVICE" in
              proxy) should_build="${{ needs['detect-changes'].outputs.proxy }}" ;;
              dns) should_build="${{ needs['detect-changes'].outputs.dns_image }}" ;;
              watchdog) should_build="${{ needs['detect-changes'].outputs.watchdog }}" ;;
              dhcp) should_build="${{ needs['detect-changes'].outputs.dhcp }}" ;;
              dhcp-proxy) should_build="${{ needs['detect-changes'].outputs.dhcp_proxy }}" ;;
              ui) should_build="${{ needs['detect-changes'].outputs.ui }}" ;;
              build-tools) should_build="${{ needs['detect-changes'].outputs.build_tools }}" ;;
              *)
                echo "::error::Unknown matrix service '$MATRIX_SERVICE' has no path-scoping mapping."
                exit 1
                ;;
            esac
            if [ "${{ needs['detect-changes'].outputs.workflow }}" = "true" ] && [ "$MATRIX_SERVICE" != "build-tools" ]; then
              should_build=true
            fi
          elif [ "$MATRIX_SERVICE" = "build-tools" ]; then
            # Build-tools publishes the sha-* source image on every trusted ref
            # so the promotion job always has a source image to move.
            should_build=true
          fi

          case "$should_build" in
            true|false)
              ;;
            *)
              echo "::error::Build scope for $MATRIX_SERVICE must resolve to true or false, got '${should_build:-<empty>}'."
              exit 1
              ;;
          esac

          if [ "$should_build" = "true" ]; then
            echo "::notice::$MATRIX_SERVICE inputs changed (or this is not a pull request); image build remains enabled."
          else
            echo "::notice::$MATRIX_SERVICE inputs did not change in this pull request; skipping routine image rebuild."
          fi
          echo "should-build=$should_build" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.should-build.outputs.should-build == 'true'
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        # Pull requests now also log in: this same-repo-only project (no fork
        # PRs, confirmed in #626) pushes a PR-scoped staging tag below so
        # "validate full-setup image" can test the PR's own commits instead
        # of stale base-branch state. The fork check is a fail-safe in case
        # that assumption ever stops holding -- a fork PR's GITHUB_TOKEN is
        # read-only anyway, so login would fail loudly rather than silently.
        # Dependabot PRs get the same read-only-token treatment as fork PRs
        # (GitHub docs: Dependabot Actions runs never get a write-scoped
        # GITHUB_TOKEN, even for a same-repo PR) -- excluded explicitly so
        # this step (and the push below) is skipped cleanly instead of
        # attempting a login/push that GitHub would reject with a 403.
        if: >-
          ${{
            steps.should-build.outputs.should-build == 'true' &&
            (
              github.event_name != 'pull_request' ||
              (
                github.actor != 'dependabot[bot]' &&
                github.event.pull_request.head.repo.full_name == github.repository
              )
            )
          }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        # This job only ever publishes the linux/amd64 leg of each service
        # image, under a platform-suffixed tag. The merge-manifests job below
        # combines this tag with build-arm64's linux/arm64 tag into the real
        # sha-<commit> multi-platform tag that promote/release/setup.sh
        # actually consume -- see docs/self-hosted-actions-runner.md.
        if: steps.should-build.outputs.should-build == 'true'
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short,suffix=-amd64

      # Uses github.sha (the actual checked-out/built commit), NOT
      # docker/metadata-action's `type=sha` output above and NOT the PR
      # branch's own head commit. For a pull_request event, github.sha is
      # the synthetic merge commit -- head merged into the base branch's
      # tip AT THE TIME OF THIS EVENT -- and that's exactly the property
      # needed here: it changes whenever the actual built content changes,
      # even if the PR's own head commit doesn't (e.g. a "reopened" event
      # after the base branch moved while the PR was closed), and it stays
      # the same across a re-run of the identical event (GitHub reuses the
      # original event's github.sha for re-runs, not a freshly re-resolved
      # one). Tagging by the PR head SHA alone let two different events for
      # the same head, merged against two different base states, collide on
      # one tag -- and since this workflow's concurrency group does not
      # cancel in-progress PR runs, a slower/older run could overwrite a
      # newer run's tag with different image content after the fact. The
      # `pr-<N>-` prefix lets the GC workflow
      # (.github/workflows/gc-pr-staging-images.yml) find and reap this
      # once the PR closes. The `-amd64` suffix matches this job's own
      # per-arch tag convention (see "Extract metadata" above);
      # merge-manifests combines it with build-arm64's `-arm64` PR staging
      # tag into the real pr-<N>-sha-<short> multi-platform tag that
      # full-setup-validate actually consumes.
      - name: Compute PR staging tag
        id: pr-tag
        if: >-
          ${{
            github.event_name == 'pull_request' &&
            steps.should-build.outputs.should-build == 'true' &&
            github.actor != 'dependabot[bot]' &&
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BUILD_SHA: ${{ github.sha }}
          MATRIX_SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail

          short_sha="${BUILD_SHA::7}"
          tag="pr-${PR_NUMBER}-sha-${short_sha}-amd64"
          echo "::notice::This PR's linux/amd64 staging tag for $MATRIX_SERVICE is $tag."
          {
            printf 'tag=%s\n' "$tag"
            printf 'image=ghcr.io/%s/%s:%s\n' "${{ github.repository }}" "$MATRIX_SERVICE" "$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve build-tools base image digests
        id: build-tools-base-digests
        if: matrix.service == 'build-tools' && steps.should-build.outputs.should-build == 'true'
        run: |
          set -euo pipefail

          digest_for_image() {
            local image=$1 digest
            digest="$(docker buildx imagetools inspect "$image" --format '{{json .Manifest.Digest}}')"
            digest="${digest%\"}"
            digest="${digest#\"}"
            if [[ -z "$digest" || "$digest" = "null" ]]; then
              echo "::error::Could not read digest for $image."
              exit 1
            fi
            printf '%s\n' "$digest"
          }

          {
            printf 'rust=%s\n' "$(digest_for_image rust:latest)"
            printf 'golang=%s\n' "$(digest_for_image golang:latest)"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare local Buildx cache
        if: steps.should-build.outputs.should-build == 'true'
        id: buildx-cache
        env:
          BUILDX_CACHE_ROOT: /var/tmp/lancache-ng-buildx-cache
          BUILDX_CACHE_READ: ${{ runner.temp }}/lancache-ng-buildx-cache/${{ matrix.service }}-read
          BUILDX_CACHE_DEST: ${{ runner.temp }}/lancache-ng-buildx-cache/${{ matrix.service }}-new
        run: |
          set -euo pipefail

          if ! command -v flock >/dev/null 2>&1; then
            echo "::error::flock is required for safe local Buildx cache locking."
            exit 1
          fi

          cache_dir="$BUILDX_CACHE_ROOT/${{ matrix.service }}"
          lock_file="$BUILDX_CACHE_ROOT/${{ matrix.service }}.lock"

          mkdir -p "$BUILDX_CACHE_ROOT"
          rm -rf "$BUILDX_CACHE_READ" "$BUILDX_CACHE_DEST"
          mkdir -p "$BUILDX_CACHE_READ" "$(dirname "$BUILDX_CACHE_DEST")"

          (
            flock -x 9
            mkdir -p "$cache_dir"
            cp -a "$cache_dir/." "$BUILDX_CACHE_READ/"
          ) 9>"$lock_file"

          {
            echo "cache-from=$BUILDX_CACHE_READ"
            echo "cache-to=$BUILDX_CACHE_DEST"
          } >> "$GITHUB_OUTPUT"

      - name: Compute Docker build parallelism
        if: steps.should-build.outputs.should-build == 'true'
        id: docker-build-jobs
        run: |
          set -euo pipefail

          if [ -n "${CARGO_BUILD_JOBS:-}" ]; then
            case "$CARGO_BUILD_JOBS" in
              ''|*[!0-9]*)
                echo "::error::CARGO_BUILD_JOBS must be a positive integer."
                exit 1
                ;;
            esac
            if [ "$CARGO_BUILD_JOBS" -le 0 ]; then
              echo "::error::CARGO_BUILD_JOBS must be greater than zero."
              exit 1
            fi
            jobs="$CARGO_BUILD_JOBS"
            echo "::notice::Using CARGO_BUILD_JOBS=$jobs from repository variable for Docker builds."
          else
            detected_cores="$(nproc 2>/dev/null || getconf _NPROCESSORS_ONLN || echo 2)"
            jobs=$((detected_cores - 2))
            if [ "$jobs" -lt 4 ]; then
              jobs=4
            fi
            echo "::notice::Using CARGO_BUILD_JOBS=$jobs from $detected_cores detected cores for Docker builds."
          fi

          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

      - name: Prepare Rust acceleration secret files
        if: >-
          ${{
            (
              steps.should-build.outputs.should-build == 'true'
            ) &&
            matrix.rust == true &&
            github.actor != 'dependabot[bot]' &&
            github.event_name != 'pull_request'
          }}
        id: sccache-secret
        env:
          SCCACHE_REDIS_MODE: ${{ vars.SCCACHE_REDIS_MODE }}
          SCCACHE_REDIS_URL: ${{ secrets.SCCACHE_REDIS_URL }}
          SCCACHE_DIST_SCHEDULER_URL: ${{ vars.SCCACHE_DIST_SCHEDULER_URL }}
          SCCACHE_DIST_AUTH_TOKEN: ${{ secrets.SCCACHE_DIST_AUTH_TOKEN }}
          DISTCC_POTENTIAL_HOSTS: ${{ vars.DISTCC_POTENTIAL_HOSTS }}
        run: |
          set -euo pipefail

          mode="${SCCACHE_REDIS_MODE:-required}"
          secret_files=()

          toml_escape() {
            printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
          }

          case "$mode" in
            required|optional|off)
              ;;
            *)
              echo "::error::SCCACHE_REDIS_MODE must be one of: required, optional, off."
              exit 1
              ;;
          esac

          sccache_enabled=1
          redis_enabled=1
          if [ "$mode" = "off" ]; then
            sccache_enabled=0
            redis_enabled=0
            echo "Redis-backed sccache is disabled by SCCACHE_REDIS_MODE=off."
          fi

          if [ "$sccache_enabled" = "1" ] && [ -n "$SCCACHE_DIST_SCHEDULER_URL" ] && [ -z "$SCCACHE_DIST_AUTH_TOKEN" ]; then
            echo "::error::SCCACHE_DIST_AUTH_TOKEN is required when SCCACHE_DIST_SCHEDULER_URL is set."
            exit 1
          fi

          if [ "$sccache_enabled" = "1" ] && [ -z "$SCCACHE_DIST_SCHEDULER_URL" ] && [ -n "$SCCACHE_DIST_AUTH_TOKEN" ]; then
            echo "::error::SCCACHE_DIST_SCHEDULER_URL is required when SCCACHE_DIST_AUTH_TOKEN is set."
            exit 1
          fi

          if [ "$sccache_enabled" = "1" ] && [ -z "$SCCACHE_REDIS_URL" ]; then
            if [ "$mode" = "optional" ]; then
              echo "Skipping Redis-backed sccache because SCCACHE_REDIS_URL is empty and SCCACHE_REDIS_MODE=optional."
              redis_enabled=0
            else
              echo "::error::SCCACHE_REDIS_URL repository secret is required for trusted Rust image builds so sccache can use Redis."
              exit 1
            fi
          fi

          umask 077
          if [ "$redis_enabled" = "1" ]; then
            redis_file="${{ runner.temp }}/sccache-redis-url"
            printf '%s' "$SCCACHE_REDIS_URL" > "$redis_file"
            secret_files+=("sccache_redis_url=$redis_file")
            echo "redis-file=$redis_file" >> "$GITHUB_OUTPUT"
          fi

          # This job only ever builds linux/amd64 (see build-arm64 for the
          # native arm64 leg), so dist/distcc acceleration -- LAN-only
          # infrastructure tied to the self-hosted amd64 runner pool -- is
          # unconditionally applicable here.
          if [ "$sccache_enabled" = "1" ] && [ -n "$SCCACHE_DIST_SCHEDULER_URL" ]; then
            dist_config_file="${{ runner.temp }}/sccache-dist-config"
            {
              printf '[dist]\n'
              printf 'scheduler_url = "%s"\n' "$(toml_escape "$SCCACHE_DIST_SCHEDULER_URL")"
              printf 'toolchains = []\n'
              printf 'toolchain_cache_size = 5368709120\n'
              printf '\n[dist.auth]\n'
              printf 'type = "token"\n'
              printf 'token = "%s"\n' "$(toml_escape "$SCCACHE_DIST_AUTH_TOKEN")"
            } > "$dist_config_file"
            secret_files+=("sccache_dist_config=$dist_config_file")
            echo "dist-config-file=$dist_config_file" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$DISTCC_POTENTIAL_HOSTS" ]; then
            if ! printf '%s\n' "$DISTCC_POTENTIAL_HOSTS" | grep -q ',cpp'; then
              echo "::error::DISTCC_POTENTIAL_HOSTS must include at least one pump-capable host with the ',cpp' option."
              exit 1
            fi

            distcc_hosts_file="${{ runner.temp }}/distcc-potential-hosts"
            printf '%s' "$DISTCC_POTENTIAL_HOSTS" > "$distcc_hosts_file"
            secret_files+=("distcc_potential_hosts=$distcc_hosts_file")
            echo "distcc-hosts-file=$distcc_hosts_file" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "secret-files<<SECRET_FILES"
            printf '%s\n' "${secret_files[@]}"
            echo "SECRET_FILES"
          } >> "$GITHUB_OUTPUT"

      - name: Select Rust acceleration network
        if: matrix.rust == true
        env:
          SECRET_FILES: ${{ steps.sccache-secret.outputs.secret-files }}
        run: |
          set -euo pipefail

          # Default to bridge so GitHub-hosted or otherwise non-accelerated paths stay valid.
          # Secret-backed jobs switch to host only when the acceleration inputs exist.
          rust_network=bridge
          buildx_network=default
          if [ -n "$SECRET_FILES" ]; then
            rust_network=host
            buildx_network=host
          fi
          printf 'RUST_ACCELERATION_NETWORK=%s\n' "$rust_network" >> "$GITHUB_ENV"
          printf 'RUST_BUILDX_NETWORK=%s\n' "$buildx_network" >> "$GITHUB_ENV"

      - name: Validate acceleration infrastructure outside BuildKit cache
        if: matrix.rust == true
        uses: ./.github/actions/rust-acceleration-preflight
        with:
          service: ${{ matrix.service }}
          redis-file: ${{ steps.sccache-secret.outputs.redis-file }}
          dist-config-file: ${{ steps.sccache-secret.outputs.dist-config-file }}
          distcc-hosts-file: ${{ steps.sccache-secret.outputs.distcc-hosts-file }}
          build-tools-image: ${{ env.BUILD_TOOLS_IMAGE }}
          build-network: ${{ env.RUST_ACCELERATION_NETWORK }}
          platform: linux/amd64

      - name: Build and push
        # First build attempt uses the configured acceleration path. It is
        # allowed to fail so the retry path can prove the Dockerfile fallback
        # instead of leaving a transient acceleration outage as the final state.
        id: build
        if: steps.should-build.outputs.should-build == 'true'
        timeout-minutes: 60
        continue-on-error: true
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ matrix.context }}
          build-contexts: ${{ matrix.build_contexts }}
          secret-files: ${{ steps.sccache-secret.outputs.secret-files }}
          build-args: |
            BUILD_TOOLS_IMAGE=${{ env.BUILD_TOOLS_IMAGE }}
            CARGO_BUILD_JOBS=${{ steps.docker-build-jobs.outputs.jobs }}
          network: ${{ env.RUST_BUILDX_NETWORK }}
          allow: ${{ env.RUST_BUILDX_NETWORK == 'host' && 'network.host' || '' }}
          push: ${{ github.event_name != 'pull_request' || (github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository) }}
          tags: ${{ steps.pr-tag.outputs.image || steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.description=${{ matrix.description }}
            ${{ matrix.service == 'build-tools' && format('org.opencontainers.image.base.rust.digest={0}', steps.build-tools-base-digests.outputs.rust) || '' }}
            ${{ matrix.service == 'build-tools' && format('org.opencontainers.image.base.golang.digest={0}', steps.build-tools-base-digests.outputs.golang) || '' }}
          # No `annotations:` input here (issue #620). A genuinely
          # single-platform push with provenance disabled has no index for
          # buildx to attach an index-level description annotation to --
          # `docker buildx build --annotation index:...` on a real
          # single-platform push errors outright ("index annotations not
          # supported for single platform export"), confirmed live against
          # this project's own images. Forcing OCI mediatypes here (instead
          # of the legacy Docker manifest v2 schema) is still required
          # groundwork: `docker buildx imagetools create` downstream (in
          # merge-manifests) silently drops --annotation with no error at all
          # when combining Docker-format sources, because Docker's manifest
          # list schema has no annotations field -- also confirmed live.
          # merge-manifests is the first point where a genuine multi-platform
          # index exists, so that's where the description annotation is
          # actually attached; channel/stack promotions downstream of it
          # carbon-copy that annotation forward untouched.
          outputs: type=image,oci-mediatypes=true
          platforms: linux/amd64
          provenance: false
          cache-from: type=local,src=${{ steps.buildx-cache.outputs.cache-from }}
          cache-to: type=local,dest=${{ steps.buildx-cache.outputs.cache-to }},mode=max

      - name: Wait before retrying the push
        # The first attempt and the retry below share the same "Log in to
        # GHCR" session from earlier in this job. Observed pattern: ghcr.io
        # push-token issuance intermittently fails with "403 Forbidden" or
        # "denied: denied" for the two slowest (Rust) builds in this matrix;
        # a manual `gh run rerun` (a brand-new job, fresh login, some time
        # elapsed) has fixed every occurrence so far. This sleep gives a
        # transient condition the same chance to clear before the in-job
        # retry, instead of retrying instantly against whatever just failed.
        if: >-
          ${{
            (
              github.event_name != 'pull_request' ||
              (
                github.actor != 'dependabot[bot]' &&
                github.event.pull_request.head.repo.full_name == github.repository
              )
            ) &&
            (
              steps.should-build.outputs.should-build == 'true'
            ) &&
            steps.build.outcome == 'failure'
          }}
        run: sleep 30

      - name: Re-authenticate to GHCR before retry
        # Get a fresh push token rather than reusing the session from the
        # "Log in to GHCR" step above, in case that session (not just the
        # image build) was what the first attempt's auth failure was tied to.
        if: >-
          ${{
            (
              github.event_name != 'pull_request' ||
              (
                github.actor != 'dependabot[bot]' &&
                github.event.pull_request.head.repo.full_name == github.repository
              )
            ) &&
            (
              steps.should-build.outputs.should-build == 'true'
            ) &&
            steps.build.outcome == 'failure'
          }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retry Build and push
        # Retry once with the same declared image inputs. Dockerfile-level
        # fallback disables broken acceleration while preserving the normal
        # build and publish contract.
        id: retry-build
        if: >-
          ${{
            (
              steps.should-build.outputs.should-build == 'true'
            ) &&
            steps.build.outcome == 'failure'
          }}
        timeout-minutes: 60
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ matrix.context }}
          build-contexts: ${{ matrix.build_contexts }}
          secret-files: ${{ steps.sccache-secret.outputs.secret-files }}
          build-args: |
            BUILD_TOOLS_IMAGE=${{ env.BUILD_TOOLS_IMAGE }}
            CARGO_BUILD_JOBS=${{ steps.docker-build-jobs.outputs.jobs }}
          network: ${{ env.RUST_BUILDX_NETWORK }}
          allow: ${{ env.RUST_BUILDX_NETWORK == 'host' && 'network.host' || '' }}
          push: ${{ github.event_name != 'pull_request' || (github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository) }}
          tags: ${{ steps.pr-tag.outputs.image || steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.description=${{ matrix.description }}
            ${{ matrix.service == 'build-tools' && format('org.opencontainers.image.base.rust.digest={0}', steps.build-tools-base-digests.outputs.rust) || '' }}
            ${{ matrix.service == 'build-tools' && format('org.opencontainers.image.base.golang.digest={0}', steps.build-tools-base-digests.outputs.golang) || '' }}
          # No `annotations:` input here (issue #620). A genuinely
          # single-platform push with provenance disabled has no index for
          # buildx to attach an index-level description annotation to --
          # `docker buildx build --annotation index:...` on a real
          # single-platform push errors outright ("index annotations not
          # supported for single platform export"), confirmed live against
          # this project's own images. Forcing OCI mediatypes here (instead
          # of the legacy Docker manifest v2 schema) is still required
          # groundwork: `docker buildx imagetools create` downstream (in
          # merge-manifests) silently drops --annotation with no error at all
          # when combining Docker-format sources, because Docker's manifest
          # list schema has no annotations field -- also confirmed live.
          # merge-manifests is the first point where a genuine multi-platform
          # index exists, so that's where the description annotation is
          # actually attached; channel/stack promotions downstream of it
          # carbon-copy that annotation forward untouched.
          outputs: type=image,oci-mediatypes=true
          platforms: linux/amd64
          provenance: false
          cache-from: type=local,src=${{ steps.buildx-cache.outputs.cache-from }}
          cache-to: type=local,dest=${{ steps.buildx-cache.outputs.cache-to }},mode=max

      - name: Rotate local Buildx cache
        if: >-
          ${{
            (
              steps.should-build.outputs.should-build == 'true'
            ) &&
            always() &&
            (
              steps.build.outcome == 'success' ||
              steps.retry-build.outcome == 'success'
            )
          }}
        env:
          BUILDX_CACHE_ROOT: /var/tmp/lancache-ng-buildx-cache
          BUILDX_CACHE_DEST: ${{ steps.buildx-cache.outputs.cache-to }}
        run: |
          set -euo pipefail

          if [ ! -d "$BUILDX_CACHE_DEST" ]; then
            exit 0
          fi

          cache_dir="$BUILDX_CACHE_ROOT/${{ matrix.service }}"
          lock_file="$BUILDX_CACHE_ROOT/${{ matrix.service }}.lock"

          mkdir -p "$BUILDX_CACHE_ROOT"
          (
            flock -x 9
            rm -rf "$BUILDX_CACHE_ROOT/${{ matrix.service }}"
            mv "$BUILDX_CACHE_DEST" "$cache_dir"
          ) 9>"$lock_file"

      - name: Prepare pushed build-tools Trivy cache
        if: >-
          ${{
            github.event_name != 'pull_request' &&
            matrix.service == 'build-tools' &&
            (
              steps.build.outcome == 'success' ||
              steps.retry-build.outcome == 'success'
            )
          }}
        run: |
          set -euo pipefail
          mkdir -p /var/tmp/lancache-ng-trivy-cache/build-tools-pushed

      - name: Scan pushed build-tools digest with Trivy
        # Build-tools influences every downstream validation job, so the exact
        # pushed digest is scanned before provenance and channel promotion.
        if: >-
          ${{
            github.event_name != 'pull_request' &&
            matrix.service == 'build-tools' &&
            (
              steps.build.outcome == 'success' ||
              steps.retry-build.outcome == 'success'
            )
          }}
        timeout-minutes: 20
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.service }}@${{ steps.retry-build.outputs.digest || steps.build.outputs.digest }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          skip-dirs: /usr/local/rustup/toolchains
          hide-progress: true
          cache: "false"
          cache-dir: /var/tmp/lancache-ng-trivy-cache/build-tools-pushed
          timeout: 10m
          exit-code: "1"

      - name: Log in to GHCR for provenance attestation
        if: >-
          ${{
            github.event_name != 'pull_request' &&
            (
              steps.should-build.outputs.should-build == 'true'
            )
          }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest image build provenance
        if: >-
          ${{
            github.event_name != 'pull_request' &&
            (
              steps.should-build.outputs.should-build == 'true'
            )
          }}
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          subject-digest: ${{ steps.retry-build.outputs.digest || steps.build.outputs.digest }}
          push-to-registry: true

  build-arm64:
    # Native linux/arm64 leg of the same publish contract as build above.
    # Runs on a GitHub-hosted arm64 runner (free for this public repo, GA
    # since 2026-08-07) instead of QEMU on the self-hosted amd64 pool, so
    # ui/dns compile Rust natively rather than emulated. This runner is
    # outside the self-hosted LAN and cannot reach Redis-backed sccache,
    # sccache-dist, or distcc -- see docs/self-hosted-actions-runner.md.
    # merge-manifests below combines this job's per-service linux/arm64 tag
    # with build's linux/amd64 tag into the real sha-<commit> multi-platform
    # tag; this job never writes that tag directly.
    needs:
      - shellcheck
      - validate-compose
      - container-scan
      - detect-changes
      - ci_scope_policy
      - file-headers
      - pr-template-check
      - line-endings
    if: >-
      ${{
        always() &&
        needs.shellcheck.result == 'success' &&
        needs['validate-compose'].result == 'success' &&
        needs.ci_scope_policy.result == 'success' &&
        needs['line-endings'].result == 'success' &&
        (github.event_name == 'pull_request' || needs['container-scan'].result == 'success') &&
        (github.event_name != 'pull_request' || needs['file-headers'].result == 'success') &&
        (github.event_name != 'pull_request' || needs['pr-template-check'].result == 'success')
      }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    env:
      BUILD_TOOLS_IMAGE: ${{ needs['validate-compose'].outputs.build_tools_image }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: proxy
            context: services/proxy
            build_contexts: dns-domains=services/dns
            description: nginx-based lancache-ng caching proxy for standard and TLS-interception cache traffic.
          - service: dns
            context: services/dns
            build_contexts: ""
            description: PowerDNS recursor, authoritative DNS, and NATS subscriber service for lancache-ng cache routing.
            rust: true
          - service: watchdog
            context: services/watchdog
            build_contexts: ""
            description: lancache-ng watchdog helper for runtime health checks and recovery hooks.
          - service: dhcp
            context: services/dhcp
            build_contexts: ""
            description: Kea DHCP, control-agent, and DHCP-DDNS service for lancache-ng managed networks.
          - service: dhcp-proxy
            context: services/dhcp-proxy
            build_contexts: ""
            description: dnsmasq-based DHCP proxy and relay helper for lancache-ng deployments.
          - service: ui
            context: services/ui
            build_contexts: ""
            description: lancache-ng Admin UI and control-plane service for cache, DNS, DHCP, and secondary management.
            rust: true
          - service: build-tools
            context: tools/build-tools
            build_contexts: ""
            description: Prebuilt lancache-ng CI and developer validation toolchain image.

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Determine whether this service needs building
        id: should-build
        env:
          MATRIX_SERVICE: ${{ matrix.service }}
          DETECT_CHANGES_RESULT: ${{ needs['detect-changes'].result }}
        run: |
          set -euo pipefail

          should_build=true
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            if [ "$DETECT_CHANGES_RESULT" != "success" ]; then
              echo "::error::Pull request build scoping requires detect-changes to succeed, got '$DETECT_CHANGES_RESULT'."
              exit 1
            fi
            case "$MATRIX_SERVICE" in
              proxy) should_build="${{ needs['detect-changes'].outputs.proxy }}" ;;
              dns) should_build="${{ needs['detect-changes'].outputs.dns_image }}" ;;
              watchdog) should_build="${{ needs['detect-changes'].outputs.watchdog }}" ;;
              dhcp) should_build="${{ needs['detect-changes'].outputs.dhcp }}" ;;
              dhcp-proxy) should_build="${{ needs['detect-changes'].outputs.dhcp_proxy }}" ;;
              ui) should_build="${{ needs['detect-changes'].outputs.ui }}" ;;
              build-tools) should_build="${{ needs['detect-changes'].outputs.build_tools }}" ;;
              *)
                echo "::error::Unknown matrix service '$MATRIX_SERVICE' has no path-scoping mapping."
                exit 1
                ;;
            esac
            if [ "${{ needs['detect-changes'].outputs.workflow }}" = "true" ] && [ "$MATRIX_SERVICE" != "build-tools" ]; then
              should_build=true
            fi
          elif [ "$MATRIX_SERVICE" = "build-tools" ]; then
            should_build=true
          fi

          case "$should_build" in
            true|false)
              ;;
            *)
              echo "::error::Build scope for $MATRIX_SERVICE must resolve to true or false, got '${should_build:-<empty>}'."
              exit 1
              ;;
          esac

          if [ "$should_build" = "true" ]; then
            echo "::notice::$MATRIX_SERVICE inputs changed (or this is not a pull request); image build remains enabled."
          else
            echo "::notice::$MATRIX_SERVICE inputs did not change in this pull request; skipping routine image rebuild."
          fi
          echo "should-build=$should_build" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.should-build.outputs.should-build == 'true'
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        # Same fork-safety and Dependabot-safety reasoning as build's own
        # "Log in to GHCR" step.
        if: >-
          ${{
            steps.should-build.outputs.should-build == 'true' &&
            (
              github.event_name != 'pull_request' ||
              (
                github.actor != 'dependabot[bot]' &&
                github.event.pull_request.head.repo.full_name == github.repository
              )
            )
          }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        # Suffixed the same way as build's linux/amd64 tag, just for the
        # arm64 leg -- see the comment on build's own "Extract metadata" step.
        if: steps.should-build.outputs.should-build == 'true'
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short,suffix=-arm64

      # Mirrors build's own "Compute PR staging tag" step, just for the
      # arm64 leg -- see that step's comment for the full rationale.
      - name: Compute PR staging tag
        id: pr-tag
        if: >-
          ${{
            github.event_name == 'pull_request' &&
            steps.should-build.outputs.should-build == 'true' &&
            github.actor != 'dependabot[bot]' &&
            github.event.pull_request.head.repo.full_name == github.repository
          }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BUILD_SHA: ${{ github.sha }}
          MATRIX_SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail

          short_sha="${BUILD_SHA::7}"
          tag="pr-${PR_NUMBER}-sha-${short_sha}-arm64"
          echo "::notice::This PR's linux/arm64 staging tag for $MATRIX_SERVICE is $tag."
          {
            printf 'tag=%s\n' "$tag"
            printf 'image=ghcr.io/%s/%s:%s\n' "${{ github.repository }}" "$MATRIX_SERVICE" "$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve build-tools base image digests
        id: build-tools-base-digests
        if: matrix.service == 'build-tools' && steps.should-build.outputs.should-build == 'true'
        run: |
          set -euo pipefail

          digest_for_image() {
            local image=$1 digest
            digest="$(docker buildx imagetools inspect "$image" --format '{{json .Manifest.Digest}}')"
            digest="${digest%\"}"
            digest="${digest#\"}"
            if [[ -z "$digest" || "$digest" = "null" ]]; then
              echo "::error::Could not read digest for $image."
              exit 1
            fi
            printf '%s\n' "$digest"
          }

          {
            printf 'rust=%s\n' "$(digest_for_image rust:latest)"
            printf 'golang=%s\n' "$(digest_for_image golang:latest)"
          } >> "$GITHUB_OUTPUT"

      - name: Compute Docker build parallelism
        if: steps.should-build.outputs.should-build == 'true'
        id: docker-build-jobs
        run: |
          set -euo pipefail

          if [ -n "${CARGO_BUILD_JOBS:-}" ]; then
            case "$CARGO_BUILD_JOBS" in
              ''|*[!0-9]*)
                echo "::error::CARGO_BUILD_JOBS must be a positive integer."
                exit 1
                ;;
            esac
            if [ "$CARGO_BUILD_JOBS" -le 0 ]; then
              echo "::error::CARGO_BUILD_JOBS must be greater than zero."
              exit 1
            fi
            jobs="$CARGO_BUILD_JOBS"
            echo "::notice::Using CARGO_BUILD_JOBS=$jobs from repository variable for Docker builds."
          else
            detected_cores="$(nproc 2>/dev/null || getconf _NPROCESSORS_ONLN || echo 2)"
            jobs=$((detected_cores - 2))
            if [ "$jobs" -lt 4 ]; then
              jobs=4
            fi
            echo "::notice::Using CARGO_BUILD_JOBS=$jobs from $detected_cores detected cores for Docker builds."
          fi

          echo "jobs=$jobs" >> "$GITHUB_OUTPUT"

      - name: Build and push
        # No secret-files/network/allow here: this runner cannot reach the
        # LAN-only Redis/sccache-dist/distcc acceleration infrastructure, so
        # this always builds as a plain, uncached (but native) cargo build.
        # Uses the GitHub Actions cache backend (type=gha) instead of the
        # self-hosted local Buildx cache, since this runner is ephemeral and
        # has no persistent /var/tmp to reuse across runs.
        id: build
        if: steps.should-build.outputs.should-build == 'true'
        timeout-minutes: 90
        continue-on-error: true
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ matrix.context }}
          build-contexts: ${{ matrix.build_contexts }}
          build-args: |
            BUILD_TOOLS_IMAGE=${{ env.BUILD_TOOLS_IMAGE }}
            CARGO_BUILD_JOBS=${{ steps.docker-build-jobs.outputs.jobs }}
          push: ${{ github.event_name != 'pull_request' || (github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository) }}
          tags: ${{ steps.pr-tag.outputs.image || steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.description=${{ matrix.description }}
            ${{ matrix.service == 'build-tools' && format('org.opencontainers.image.base.rust.digest={0}', steps.build-tools-base-digests.outputs.rust) || '' }}
            ${{ matrix.service == 'build-tools' && format('org.opencontainers.image.base.golang.digest={0}', steps.build-tools-base-digests.outputs.golang) || '' }}
          # See build's equivalent step for why there is no `annotations:`
          # input here and why `outputs: type=image,oci-mediatypes=true` is
          # still required groundwork for issue #620.
          outputs: type=image,oci-mediatypes=true
          platforms: linux/arm64
          provenance: false
          cache-from: type=gha,scope=${{ matrix.service }}-arm64
          cache-to: type=gha,scope=${{ matrix.service }}-arm64,mode=max

      - name: Wait before retrying the push
        # Same transient ghcr.io push-token pattern documented on build's
        # equivalent step.
        if: >-
          ${{
            (
              github.event_name != 'pull_request' ||
              (
                github.actor != 'dependabot[bot]' &&
                github.event.pull_request.head.repo.full_name == github.repository
              )
            ) &&
            (
              steps.should-build.outputs.should-build == 'true'
            ) &&
            steps.build.outcome == 'failure'
          }}
        run: sleep 30

      - name: Re-authenticate to GHCR before retry
        if: >-
          ${{
            (
              github.event_name != 'pull_request' ||
              (
                github.actor != 'dependabot[bot]' &&
                github.event.pull_request.head.repo.full_name == github.repository
              )
            ) &&
            (
              steps.should-build.outputs.should-build == 'true'
            ) &&
            steps.build.outcome == 'failure'
          }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retry Build and push
        id: retry-build
        if: >-
          ${{
            (
              steps.should-build.outputs.should-build == 'true'
            ) &&
            steps.build.outcome == 'failure'
          }}
        timeout-minutes: 90
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ matrix.context }}
          build-contexts: ${{ matrix.build_contexts }}
          build-args: |
            BUILD_TOOLS_IMAGE=${{ env.BUILD_TOOLS_IMAGE }}
            CARGO_BUILD_JOBS=${{ steps.docker-build-jobs.outputs.jobs }}
          push: ${{ github.event_name != 'pull_request' || (github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository) }}
          tags: ${{ steps.pr-tag.outputs.image || steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.description=${{ matrix.description }}
            ${{ matrix.service == 'build-tools' && format('org.opencontainers.image.base.rust.digest={0}', steps.build-tools-base-digests.outputs.rust) || '' }}
            ${{ matrix.service == 'build-tools' && format('org.opencontainers.image.base.golang.digest={0}', steps.build-tools-base-digests.outputs.golang) || '' }}
          # See build's equivalent step for why there is no `annotations:`
          # input here and why `outputs: type=image,oci-mediatypes=true` is
          # still required groundwork for issue #620.
          outputs: type=image,oci-mediatypes=true
          platforms: linux/arm64
          provenance: false
          cache-from: type=gha,scope=${{ matrix.service }}-arm64
          cache-to: type=gha,scope=${{ matrix.service }}-arm64,mode=max

      - name: Scan pushed build-tools digest with Trivy
        # Same exact-pushed-digest scan build performs for its linux/amd64
        # build-tools image, mirrored here for the linux/arm64 digest.
        if: >-
          ${{
            github.event_name != 'pull_request' &&
            matrix.service == 'build-tools' &&
            (
              steps.build.outcome == 'success' ||
              steps.retry-build.outcome == 'success'
            )
          }}
        timeout-minutes: 20
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.service }}@${{ steps.retry-build.outputs.digest || steps.build.outputs.digest }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          skip-dirs: /usr/local/rustup/toolchains
          hide-progress: true
          cache: "false"
          timeout: 10m
          exit-code: "1"

      - name: Log in to GHCR for provenance attestation
        if: >-
          ${{
            github.event_name != 'pull_request' &&
            (
              steps.should-build.outputs.should-build == 'true'
            )
          }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest image build provenance
        if: >-
          ${{
            github.event_name != 'pull_request' &&
            (
              steps.should-build.outputs.should-build == 'true'
            )
          }}
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          subject-digest: ${{ steps.retry-build.outputs.digest || steps.build.outputs.digest }}
          push-to-registry: true

  merge-manifests:
    # Combines build's linux/amd64 per-service tag with build-arm64's
    # linux/arm64 per-service tag into the real sha-<commit> multi-platform
    # tag that promote/release/setup.sh consume. Uses imagetools create --
    # the same tool promote already uses to move channel tags -- so no image
    # is rebuilt here, only a manifest list assembled from two already-pushed
    # digests.
    #
    # Also runs on pull_request events now (see #626): a same-repo PR pushes
    # its own pr-<N>-sha-<short>-{amd64,arm64} legs in build/build-arm64, and
    # this job merges those into the real pr-<N>-sha-<short> tag that
    # full-setup-validate consumes to test the PR's own commits. The
    # existing sha-<short> merge below stays gated to non-PR events only --
    # that tag's *inputs* are never pushed on a PR (push: stays false there
    # for the plain, unprefixed sha-* tag), so running it on a PR would just
    # loop through seven harmless "no linux/amd64 image" skips for no
    # reason.
    name: merge multi-platform manifests
    needs: [build, build-arm64]
    if: "!cancelled() && needs.build.result == 'success' && needs['build-arm64'].result == 'success'"
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-platform manifests
        if: github.event_name != 'pull_request'
        env:
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          REQUIRED_PLATFORMS: ${{ env.RELEASE_PLATFORMS }}
        run: |
          set -euo pipefail

          services=(proxy dns watchdog dhcp dhcp-proxy ui build-tools)
          short_sha="${COMMIT_SHA::7}"
          source_tag="sha-${short_sha}"

          # Same wording as this same file's build/build-arm64 matrix.description
          # entries -- kept in sync manually, not sourced from one shared place,
          # because merge-manifests has no matrix of its own to read
          # matrix.description from directly. This is where the OCI
          # org.opencontainers.image.description annotation is actually set
          # (issue #620): per-platform images upstream stay unannotated on
          # purpose (see build's "Build and push" step comment), and every
          # `imagetools create` downstream of this one (promote's channel and
          # stack-pointer moves) carbon-copies this index annotation forward
          # untouched rather than re-declaring it, confirmed live to preserve
          # both the annotation and the exact source digest unchanged.
          declare -A service_descriptions=(
            [proxy]="nginx-based lancache-ng caching proxy for standard and TLS-interception cache traffic."
            [dns]="PowerDNS recursor, authoritative DNS, and NATS subscriber service for lancache-ng cache routing."
            [watchdog]="lancache-ng watchdog helper for runtime health checks and recovery hooks."
            [dhcp]="Kea DHCP, control-agent, and DHCP-DDNS service for lancache-ng managed networks."
            [dhcp-proxy]="dnsmasq-based DHCP proxy and relay helper for lancache-ng deployments."
            [ui]="lancache-ng Admin UI and control-plane service for cache, DNS, DHCP, and secondary management."
            [build-tools]="Prebuilt lancache-ng CI and developer validation toolchain image."
          )

          for service in "${services[@]}"; do
            amd64_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}-amd64"
            arm64_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}-arm64"
            target_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}"

            if ! docker buildx imagetools inspect "$amd64_image" >/dev/null 2>&1; then
              echo "::notice::Skipping $service: no linux/amd64 image was published for this commit (likely unchanged on a pull request)."
              continue
            fi
            if ! docker buildx imagetools inspect "$arm64_image" >/dev/null 2>&1; then
              echo "::error::$service has a linux/amd64 image but no linux/arm64 image ($arm64_image); refusing to publish a single-platform tag under the multi-platform contract."
              exit 1
            fi

            docker buildx imagetools create -t "$target_image" "$amd64_image" "$arm64_image" \
              --annotation "index:org.opencontainers.image.description=${service_descriptions[$service]}"
            bash scripts/require-image-platforms.sh "$target_image" "$REQUIRED_PLATFORMS"
          done

      # Same merge, for the PR-scoped staging tag instead of the trusted-ref
      # sha-<short> tag. Only same-repo PRs ever push the two per-arch inputs
      # (build/build-arm64's own fork check), so this naturally no-ops for a
      # fork PR: neither leg exists, every service is skipped, nothing is
      # published. A service this PR did not touch also has no inputs here
      # (detect-changes scoped build/build-arm64 to skip it) -- that is
      # expected and not an error; full-setup-validate's own backfill step
      # fills the gap for full-setup services from the base-ref channel.
      - name: Create PR staging multi-platform manifest
        if: github.event_name == 'pull_request'
        env:
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Must match build/build-arm64's "Compute PR staging tag" exactly
          # -- see that step's comment for why this is github.sha (the
          # actual built merge commit), not the PR head SHA.
          BUILD_SHA: ${{ github.sha }}
          REQUIRED_PLATFORMS: ${{ env.RELEASE_PLATFORMS }}
        run: |
          set -euo pipefail

          services=(proxy dns watchdog dhcp dhcp-proxy ui build-tools)
          short_sha="${BUILD_SHA::7}"
          source_tag="pr-${PR_NUMBER}-sha-${short_sha}"

          for service in "${services[@]}"; do
            amd64_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}-amd64"
            arm64_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}-arm64"
            target_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}"

            if ! docker buildx imagetools inspect "$amd64_image" >/dev/null 2>&1; then
              echo "::notice::Skipping $service: no linux/amd64 PR staging image (not touched by this PR, or a fork PR)."
              continue
            fi
            if ! docker buildx imagetools inspect "$arm64_image" >/dev/null 2>&1; then
              echo "::error::$service has a linux/amd64 PR staging image but no linux/arm64 one ($arm64_image); build and build-arm64 disagreed on whether this service needed building."
              exit 1
            fi

            docker buildx imagetools create -t "$target_image" "$amd64_image" "$arm64_image"
            bash scripts/require-image-platforms.sh "$target_image" "$REQUIRED_PLATFORMS"
          done

  promote:
    # Promotion is intentionally separate from image build. It moves coherent
    # channel tags only after all sha-* source images for the same commit exist.
    #
    # The `if:` below must stay in an explicit `<status-fn>() && needs.X.result
    # == 'success'` form, not a bare `github.event_name != 'pull_request'`. A
    # bare condition with no status-check function gets an implicit
    # `&& success()` appended by GitHub Actions, and `success()` walks the
    # WHOLE transitive needs graph (promote -> merge-manifests -> build,
    # build-arm64 -> detect-changes, file-headers, pr-template-check, ...),
    # not just this job's own direct `needs: merge-manifests`.
    # detect-changes/file-headers/pr-template-check are intentionally
    # `if: github.event_name == 'pull_request'` (they skip on every push),
    # but `success()` treats a skipped job the same as a failed one -- so on
    # every real push to master or a vX.Y.Z branch, the implicit success()
    # check silently evaluated false and this job never ran, even though
    # `build` itself completed successfully (confirmed directly: run
    # 28958519247 on v0.2.0, all 7 build matrix legs succeeded, promote still
    # skipped). This is why dev/edge were never actually promoted despite the
    # channel-resolution logic in this job being correct (see issue #532).
    #
    # Use `!cancelled()`, not `always()`, as the status function: `always()`
    # would also make this job proceed to move public tags even if a
    # maintainer cancels the run after build succeeds -- `!cancelled()`
    # suppresses the same implicit-success()-over-skipped-deps problem while
    # still correctly stopping the job if the run is actually cancelled.
    name: promote stack image channels
    needs: merge-manifests
    if: "!cancelled() && needs['merge-manifests'].result == 'success' && github.event_name != 'pull_request'"
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote coherent stack tags
        id: promote-stack
        env:
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          REQUIRED_PLATFORMS: ${{ env.RELEASE_PLATFORMS }}
          REQUESTED_CHANNEL: ${{ inputs.channel }}
        run: |
          set -euo pipefail

          services=(proxy dns watchdog dhcp dhcp-proxy ui build-tools)
          short_sha="${COMMIT_SHA::7}"
          source_tag="sha-${short_sha}"
          stack_pointer_image="ghcr.io/${REPOSITORY}/stack:${source_tag}"
          channel_tags=()
          pointer_context=""
          declare -A previous_refs=()
          promoted_targets=()

          digest_for_image() {
            local image=$1
            local digest

            if ! digest="$(docker buildx imagetools inspect "$image" --format '{{json .Manifest.Digest}}' 2>/dev/null)"; then
              return 1
            fi
            digest="${digest%\"}"
            digest="${digest#\"}"
            [[ -n "$digest" && "$digest" != "null" ]]
            printf '%s\n' "$digest"
          }

          rollback_promotions() {
            local status=$?
            local target_image previous_digest

            if [[ -n "$pointer_context" ]]; then
              rm -rf "$pointer_context"
            fi

            if [[ "$status" = "0" || "${#promoted_targets[@]}" = "0" ]]; then
              exit "$status"
            fi

            echo "::error::Promotion failed after public tags were moved; attempting best-effort rollback."
            for target_image in "${promoted_targets[@]}"; do
              previous_digest="${previous_refs[$target_image]:-}"
              if [[ -n "$previous_digest" ]]; then
                docker buildx imagetools create --prefer-index=false -t "$target_image" "${target_image%:*}@${previous_digest}" \
                  || echo "::error::Could not restore previous digest for $target_image."
              else
                echo "::error::No previous digest existed for $target_image; manual GHCR inspection is required."
              fi
            done
            exit "$status"
          }
          trap rollback_promotions EXIT

          if [[ "$GITHUB_REF" = "refs/heads/master" ]]; then
            channel_tags+=(edge)
          elif [[ "$GITHUB_REF" = refs/heads/v[0-9]* ]]; then
            # Any version-numbered integration branch (v0.2.0, v0.3.0, v0.2.x,
            # ...), not just whichever one happens to be active right now.
            channel_tags+=(dev)
          elif [[ "$GITHUB_REF" = refs/tags/v* ]]; then
            channel_tags+=("$GITHUB_REF_NAME")
            if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
              :
            elif [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              bash scripts/check-stable-external-images.sh
              channel_tags+=(latest)
            else
              echo "::error::Unsupported release tag '${GITHUB_REF_NAME}'. Use vX.Y.Z or vX.Y.Z-rc.N."
              exit 1
            fi
          fi

          # workflow_dispatch can additionally request one channel move from
          # whatever ref it's dispatched against, independent of the
          # automatic branch/tag rule above -- e.g. spot-check a feature
          # branch as "dev" without merging it into v0.2.0 first. "none"
          # (the default) adds nothing.
          if [[ -n "$REQUESTED_CHANNEL" && "$REQUESTED_CHANNEL" != "none" ]]; then
            already_requested=false
            for existing_channel in "${channel_tags[@]}"; do
              [[ "$existing_channel" = "$REQUESTED_CHANNEL" ]] && already_requested=true
            done
            if [[ "$already_requested" = false ]]; then
              channel_tags+=("$REQUESTED_CHANNEL")
            fi
          fi

          if (( ${#channel_tags[@]} == 0 )); then
            echo "::notice::No public channel tags are configured for $GITHUB_REF."
            exit 0
          fi

          missing=0
          for service in "${services[@]}"; do
            source_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}"
            if ! docker buildx imagetools inspect "$source_image" >/dev/null; then
              echo "::error::Cannot promote because required source image is missing: $source_image"
              missing=1
            fi
          done
          if [[ "$missing" = "1" ]]; then
            exit 1
          fi

          for service in "${services[@]}"; do
            bash scripts/require-image-platforms.sh "ghcr.io/${REPOSITORY}/${service}:${source_tag}" "$REQUIRED_PLATFORMS"
          done

          pointer_context="$(mktemp -d)"
          {
            printf 'LANCACHE_IMAGE_TAG=%s\n' "$source_tag"
            printf 'LANCACHE_IMAGE_COMMIT=%s\n' "$COMMIT_SHA"
            printf 'LANCACHE_IMAGE_SERVICES=%s\n' "${services[*]}"
          } > "$pointer_context/stack.env"
          # One variable feeds both the per-platform config LABEL below (an
          # unquoted heredoc so it can expand) and the index-level OCI
          # annotation on the buildx build call right after, so the two never
          # drift out of sync with each other.
          stack_pointer_description="Resolves a mutable lancache-ng stack channel to one immutable sha-* service image set."
          cat > "$pointer_context/Dockerfile" <<DOCKERFILE
          FROM busybox:stable-musl@sha256:3c6ae8008e2c2eedd141725c30b20d9c36b026eb796688f88205845ef17aa213
          LABEL org.opencontainers.image.title="lancache-ng stack channel pointer"
          LABEL org.opencontainers.image.description="${stack_pointer_description}"
          COPY stack.env /stack.env
          CMD ["true"]
          DOCKERFILE
          # This build is always genuinely multi-platform ($RELEASE_PLATFORMS
          # is always 2+ platforms), so unlike the per-platform service
          # builds above, an index already exists here for --annotation to
          # attach to -- confirmed live while fixing issue #620. This step
          # does not disable provenance, so it already defaults to OCI
          # mediatypes without needing an explicit `outputs:` override.
          docker buildx build \
            --platform "$RELEASE_PLATFORMS" \
            --push \
            -t "$stack_pointer_image" \
            --annotation "index:org.opencontainers.image.description=${stack_pointer_description}" \
            "$pointer_context"
          docker buildx imagetools inspect "$stack_pointer_image" >/dev/null
          bash scripts/require-image-platforms.sh "$stack_pointer_image" "$REQUIRED_PLATFORMS"
          stack_pointer_digest="$(digest_for_image "$stack_pointer_image")"
          {
            printf 'stack-pointer-subject=ghcr.io/%s/stack\n' "$REPOSITORY"
            printf 'stack-pointer-digest=%s\n' "$stack_pointer_digest"
          } >> "$GITHUB_OUTPUT"

          # Neither loop below passes --annotation. $source_image already
          # carries the org.opencontainers.image.description index annotation
          # from merge-manifests above (and $stack_pointer_image from its own
          # build a few lines up), and a plain --prefer-index=false carbon
          # copy of an already-annotated OCI index preserves that annotation
          # AND produces a byte-identical digest to the source -- confirmed
          # live while fixing issue #620. Adding --annotation again here would
          # only risk re-serializing the manifest with a different digest,
          # which would break the release job's invariant that a channel/
          # release tag resolves to the exact same digest as its source
          # sha-* tag.
          for service in "${services[@]}"; do
            source_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}"
            for channel_tag in "${channel_tags[@]}"; do
              target_image="ghcr.io/${REPOSITORY}/${service}:${channel_tag}"
              previous_refs["$target_image"]="$(digest_for_image "$target_image" || true)"
              docker buildx imagetools create --prefer-index=false -t "$target_image" "$source_image"
              promoted_targets+=("$target_image")
            done
          done

          for channel_tag in "${channel_tags[@]}"; do
            target_image="ghcr.io/${REPOSITORY}/stack:${channel_tag}"
            previous_refs["$target_image"]="$(digest_for_image "$target_image" || true)"
            docker buildx imagetools create --prefer-index=false -t "$target_image" "$stack_pointer_image"
            promoted_targets+=("$target_image")
          done

          for service in "${services[@]}"; do
            for channel_tag in "${channel_tags[@]}"; do
              docker buildx imagetools inspect "ghcr.io/${REPOSITORY}/${service}:${channel_tag}" >/dev/null
            done
          done

          for channel_tag in "${channel_tags[@]}"; do
            docker buildx imagetools inspect "ghcr.io/${REPOSITORY}/stack:${channel_tag}" >/dev/null
          done

      - name: Attest stack pointer provenance
        if: ${{ steps.promote-stack.outputs.stack-pointer-digest != '' }}
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ steps.promote-stack.outputs.stack-pointer-subject }}
          subject-digest: ${{ steps.promote-stack.outputs.stack-pointer-digest }}
          push-to-registry: true

  release:
    # Release source archives must match the same commit that produced the
    # images. This keeps source, image tags, and attestations traceable together.
    #
    # Same reasoning as promote's `if:` above: use an explicit
    # needs.promote.result check under a status function rather than a bare
    # condition, so this job isn't silently skipped by the implicit success()
    # walking back through promote's own transitively-skipped dependencies
    # (detect-changes, file-headers, pr-template-check on non-PR events).
    # `!cancelled()`, not `always()`, so a maintainer cancelling the run can
    # still stop this from publishing a release source archive.
    name: publish release source
    needs: promote
    if: "!cancelled() && needs.promote.result == 'success' && startsWith(github.ref, 'refs/tags/v')"
    runs-on: [self-hosted, linux, lancache, lancache-heavy]
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release image platform coverage
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
          SERVICES: proxy dns watchdog dhcp dhcp-proxy ui build-tools stack
          REQUIRED_PLATFORMS: ${{ env.RELEASE_PLATFORMS }}
        run: |
          set -euo pipefail

          read -r -a services <<< "$SERVICES"
          for service in "${services[@]}"; do
            image="ghcr.io/${REPOSITORY}/${service}:${TAG_NAME}"
            bash scripts/require-image-platforms.sh "$image" "$REQUIRED_PLATFORMS"
          done

      - name: Create or update GitHub release for built images
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          services=(proxy dns watchdog dhcp dhcp-proxy ui build-tools)
          short_sha="${COMMIT_SHA::7}"
          source_tag="sha-${short_sha}"
          expected_prerelease=false
          if [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            expected_prerelease=true
            echo "::notice::Tag $TAG_NAME is a release candidate and will be published as a prerelease."
          elif [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            expected_prerelease=false
          else
            echo "::error::Unsupported release tag '$TAG_NAME'. Use vX.Y.Z or vX.Y.Z-rc.N."
            exit 1
          fi

          digest_for_image() {
            local image=$1
            local digest

            digest="$(docker buildx imagetools inspect "$image" --format '{{json .Manifest.Digest}}')"
            digest="${digest%\"}"
            digest="${digest#\"}"
            if [[ -z "$digest" || "$digest" = "null" ]]; then
              echo "::error::Could not read digest for $image."
              exit 1
            fi
            printf '%s\n' "$digest"
          }

          build_tools_image="ghcr.io/${REPOSITORY}/build-tools:${TAG_NAME}"
          stack_pointer_image="ghcr.io/${REPOSITORY}/stack:${TAG_NAME}"
          docker buildx imagetools inspect "$build_tools_image" >/dev/null
          docker buildx imagetools inspect "$stack_pointer_image" >/dev/null
          docker pull "$build_tools_image" >/dev/null
          rust_base_digest="$(docker image inspect "$build_tools_image" --format '{{ index .Config.Labels "org.opencontainers.image.base.rust.digest" }}')"
          golang_base_digest="$(docker image inspect "$build_tools_image" --format '{{ index .Config.Labels "org.opencontainers.image.base.golang.digest" }}')"
          if [[ ! "$rust_base_digest" =~ ^sha256:[0-9a-f]{64}$ || ! "$golang_base_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::build-tools image is missing build-time base digest labels."
            exit 1
          fi

          image_notes_start='<!-- lancache-ng-image-tags:start -->'
          image_notes_end='<!-- lancache-ng-image-tags:end -->'
          notes_file="$(mktemp)"
          {
            printf '%s\n' "$image_notes_start"
            printf 'This release source is the exact commit used by CI to build and publish the service images for %s.\n\n' "$TAG_NAME"
            printf 'Commit: %s\n\n' "$COMMIT_SHA"
            printf 'Published image tags and digests:\n\n'
            for service in "${services[@]}"; do
              tag_image="ghcr.io/${REPOSITORY}/${service}:${TAG_NAME}"
              sha_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}"
              tag_digest="$(digest_for_image "$tag_image")"
              sha_digest="$(digest_for_image "$sha_image")"
              if [[ "$tag_digest" != "$sha_digest" ]]; then
                echo "::error::Release tag digest for $tag_image does not match $sha_image."
                exit 1
              fi
              printf -- '- %s -> %s\n' "$tag_image" "$tag_digest"
            done
            printf '\nMatching immutable SHA image tags:\n\n'
            for service in "${services[@]}"; do
              sha_image="ghcr.io/${REPOSITORY}/${service}:${source_tag}"
              sha_digest="$(digest_for_image "$sha_image")"
              printf -- '- %s -> %s\n' "$sha_image" "$sha_digest"
            done
            printf '\nStack channel pointer:\n\n'
            printf -- '- %s -> %s\n' "$stack_pointer_image" "$(digest_for_image "$stack_pointer_image")"
            printf -- '- ghcr.io/%s/stack:%s -> %s\n' "$REPOSITORY" "$source_tag" "$(digest_for_image "ghcr.io/${REPOSITORY}/stack:${source_tag}")"
            printf '\nResolved build-tools base image digests:\n\n'
            printf -- '- rust:latest -> %s\n' "$rust_base_digest"
            printf -- '- golang:latest -> %s\n' "$golang_base_digest"
            printf '\nProvenance and SBOM status:\n\n'
            printf -- '- Provenance attestations are pushed to GHCR for every first-party service image digest and the stack channel-pointer digest.\n'
            printf -- '- SBOM artifacts are not generated by this workflow yet; release notes must not claim SBOM coverage until an SBOM-producing job is added.\n'
            printf '%s\n' "$image_notes_end"
          } > "$notes_file"

          docker run --rm \
            -e GITHUB_TOKEN \
            -e REPOSITORY \
            -e TAG_NAME \
            -e COMMIT_SHA \
            -e EXPECTED_PRERELEASE="$expected_prerelease" \
            -v "$notes_file:/tmp/lancache-release-notes.md:ro" \
            "$build_tools_image" \
            bash -s <<'UPDATE_RELEASE'
          set -euo pipefail

          api_url="https://api.github.com/repos/${REPOSITORY}"
          auth_header="Authorization: Bearer ${GITHUB_TOKEN}"
          accept_header="Accept: application/vnd.github+json"
          version_header="X-GitHub-Api-Version: 2022-11-28"
          image_notes_start='<!-- lancache-ng-image-tags:start -->'
          image_notes_end='<!-- lancache-ng-image-tags:end -->'
          expected_prerelease="$EXPECTED_PRERELEASE"

          response_file="$(mktemp)"
          status="$(curl -sS -o "$response_file" -w '%{http_code}' \
            -H "$auth_header" \
            -H "$accept_header" \
            -H "$version_header" \
            "$api_url/releases/tags/$TAG_NAME")"

          if [ "$status" = "200" ]; then
            release_id="$(jq -r '.id' "$response_file")"
            existing_prerelease="$(jq -r '.prerelease' "$response_file")"
            if [ "$existing_prerelease" != "$expected_prerelease" ]; then
              echo "Existing GitHub release prerelease state does not match tag policy for $TAG_NAME." >&2
              echo "Expected prerelease=$expected_prerelease, found prerelease=$existing_prerelease." >&2
              exit 1
            fi
            existing_body="$(jq -r '.body // ""' "$response_file")"
            # shellcheck disable=SC2016
            updated_body="$(jq -nr \
              --arg body "$existing_body" \
              --arg notes "$(cat /tmp/lancache-release-notes.md)" \
              --arg start "$image_notes_start" \
              --arg end "$image_notes_end" \
              '
              if ($body | contains($start)) and ($body | contains($end)) then
                ($body | split($start)[0]) as $prefix
                | ($body | split($end)[1:] | join($end)) as $suffix
                | $prefix + $notes + $suffix
              elif ($body | length) > 0 then
                $body + "\n\n" + $notes
              else
                $notes
              end
              ')"
            jq -n \
              --arg body "$updated_body" \
              '{body:$body}' \
              > "$response_file.patch"
            curl -fsS -X PATCH \
              -H "$auth_header" \
              -H "$accept_header" \
              -H "$version_header" \
              -d @"$response_file.patch" \
              "$api_url/releases/$release_id" >/dev/null
          elif [ "$status" = "404" ]; then
            # shellcheck disable=SC2016
            jq -n \
              --arg tag_name "$TAG_NAME" \
              --arg target_commitish "$COMMIT_SHA" \
              --arg name "$TAG_NAME" \
              --arg body "$(cat /tmp/lancache-release-notes.md)" \
              --argjson prerelease "$expected_prerelease" \
              '{tag_name:$tag_name, target_commitish:$target_commitish, name:$name, body:$body, draft:false, prerelease:$prerelease}' \
              > "$response_file.create"
            curl -fsS -X POST \
              -H "$auth_header" \
              -H "$accept_header" \
              -H "$version_header" \
              -d @"$response_file.create" \
              "$api_url/releases" >/dev/null
          else
            cat "$response_file"
            echo "Failed to inspect GitHub release for $TAG_NAME; HTTP status $status" >&2
            exit 1
          fi
          UPDATE_RELEASE
