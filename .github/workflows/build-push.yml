name: Build & Push

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run ShellCheck
        run: |
          set -euo pipefail
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            ghcr.io/wiki-mod/lancache-ng/build-tools:latest \
            sh -lc 'find . -name "*.sh" -not -path "./.git/*" -not -path "*/target/*" -print0 | xargs -0 --no-run-if-empty shellcheck --severity=warning'

  validate-compose:
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select compose validation image
        env:
          TRUSTED_BUILD_TOOLS_FALLBACK: >-
            ${{
              github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository
            }}
        run: |
          set -euo pipefail

          published_image="ghcr.io/wiki-mod/lancache-ng/build-tools:latest"
          if published_check_output="$(docker run --rm "$published_image" bash -lc 'set -euo pipefail; command -v docker >/dev/null; docker compose version >/dev/null' 2>&1)"; then
            printf 'BUILD_TOOLS_IMAGE=%s\n' "$published_image" >> "$GITHUB_ENV"
            exit 0
          fi

          printf '%s\n' "$published_check_output"
          if [ "$TRUSTED_BUILD_TOOLS_FALLBACK" != "true" ]; then
            echo "::error::Published build-tools image is not usable and branch-local fallback builds are disabled for untrusted pull requests."
            exit 1
          fi

          fallback_image="lancache-ng-build-tools-validation:${GITHUB_SHA}"
          echo "::notice::Published build-tools image does not contain Docker CLI/Compose yet; building a branch-local validation image."
          docker build --pull -t "$fallback_image" tools/build-tools
          docker run --rm "$fallback_image" bash -lc 'set -euo pipefail; docker --version; docker compose version'
          printf 'BUILD_TOOLS_IMAGE=%s\n' "$fallback_image" >> "$GITHUB_ENV"

      - name: Validate prebuilt production install path
        run: |
          set -euo pipefail

          docker run --rm -i \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash -s <<'VALIDATE_PREBUILT'
          set -euo pipefail

          if grep -RInE '^[[:space:]]+build:' deploy/prod deploy/quickstart; then
            echo "::error::Production and quickstart compose files must use prebuilt images only."
            exit 1
          fi

          if grep -RIn -- '--build' README.md deploy/prod deploy/quickstart setup.sh; then
            echo "::error::User-facing production install paths must not instruct users to build images locally."
            exit 1
          fi
          VALIDATE_PREBUILT

      - name: Validate compose files
        env:
          CACHE_DIR_STANDARD: /tmp/lancache-standard
          CACHE_INACTIVE: 365d
          CACHE_MAX_SIZE: 10g
          CACHE_MEM_MB: "256"
          CACHE_SLICE_SIZE: 1m
          CACHE_VALID_ANY: 1h
          CACHE_VALID_HIT: 30d
          DDNS_TSIG_KEY: ci-ddns-tsig-key
          IP_SSL: 127.0.0.2
          IP_STANDARD: 127.0.0.1
          ALLOW_INSECURE_UI: "true"
          KEA_CTRL_TOKEN: ci-kea-token
          NATS_CONSUMER: ci-secondary
          NATS_DNS_READER_PASSWORD: ci-nats-dns-reader-password
          NATS_DNS_READER_USER: ci-nats-dns-reader
          NATS_DNS_WRITER_PASSWORD: ci-nats-dns-writer-password
          NATS_DNS_WRITER_USER: ci-nats-dns-writer
          NATS_PASSWORD: ci-nats-password
          NATS_UI_PASSWORD: ci-nats-ui-password
          NATS_UI_USER: ci-nats-ui
          NATS_USER: ci-nats-user
          NATS_TOKEN: ci-nats-token
          NATS_URL: nats://127.0.0.1:4222
          NGINX_UPSTREAM_RESOLVER: 1.1.1.1
          PDNS_API_KEY: ci-pdns-api-key
          PROXY_IP: 127.0.0.1
          SECONDARY_REGISTRATION_TOKEN: ci-secondary-registration-token
          SSL_CACHE_MAX_GB: "10"
          STANDARD_CACHE_MAX_GB: "10"
        run: |
          set -euo pipefail

          docker run --rm -i \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/work:ro" \
            -w /work \
            --env CACHE_DIR_STANDARD \
            --env CACHE_INACTIVE \
            --env CACHE_MAX_SIZE \
            --env CACHE_MEM_MB \
            --env CACHE_SLICE_SIZE \
            --env CACHE_VALID_ANY \
            --env CACHE_VALID_HIT \
            --env DDNS_TSIG_KEY \
            --env IP_SSL \
            --env IP_STANDARD \
            --env ALLOW_INSECURE_UI \
            --env KEA_CTRL_TOKEN \
            --env NATS_CONSUMER \
            --env NATS_DNS_READER_PASSWORD \
            --env NATS_DNS_READER_USER \
            --env NATS_DNS_WRITER_PASSWORD \
            --env NATS_DNS_WRITER_USER \
            --env NATS_PASSWORD \
            --env NATS_UI_PASSWORD \
            --env NATS_UI_USER \
            --env NATS_USER \
            --env NATS_TOKEN \
            --env NATS_URL \
            --env NGINX_UPSTREAM_RESOLVER \
            --env PDNS_API_KEY \
            --env PROXY_IP \
            --env SECONDARY_REGISTRATION_TOKEN \
            --env SSL_CACHE_MAX_GB \
            --env STANDARD_CACHE_MAX_GB \
            "${BUILD_TOOLS_IMAGE:?BUILD_TOOLS_IMAGE is required}" \
            bash -s <<'VALIDATE_COMPOSE'
          set -euo pipefail

          validate_compose() {
            local output

            if ! output="$(docker compose "$@" config --quiet 2>&1)"; then
              printf '%s\n' "$output"
              return 1
            fi

            if printf '%s\n' "$output" | grep -Eqi '(^|[[:space:]])(warn|warning|level=warning)'; then
              printf 'docker compose emitted warnings; treating warnings as errors:\n%s\n' "$output"
              return 1
            fi

            if [ -n "$output" ]; then
              printf '%s\n' "$output"
            fi
          }

          validate_compose -f deploy/quickstart/docker-compose.yml --profile ssl
          validate_compose -f deploy/dev/docker-compose.yml
          validate_compose -f deploy/prod/docker-compose.yml
          validate_compose -f deploy/secondary/docker-compose.yml
          validate_compose --env-file deploy/quickstart/.env -f deploy/quickstart/docker-compose.yml --profile ssl

          missing_required=0
          while IFS= read -r key; do
            if ! grep -Eq "^${key}=[^[:space:]]+" deploy/quickstart/.env; then
              echo "::error::deploy/quickstart/.env must define non-empty ${key} because quickstart compose marks it required."
              missing_required=1
            fi
          done < <(
            grep -oE '\$\{[A-Za-z0-9_]+:\?[^}]+\}' deploy/quickstart/docker-compose.yml \
              | sed -E 's/^\$\{([^:]+):.*/\1/' \
              | sort -u
          )
          if [[ "$missing_required" = "1" ]]; then
            exit 1
          fi

          if grep -RInE '^(NATS_LOCAL_TOKEN|NATS_TOKEN)=' deploy/quickstart/.env deploy/prod/.env 2>/dev/null; then
            echo "::error::Quickstart/prod env templates must not use deprecated NATS token keys; use role credentials instead."
            exit 1
          fi

          setup_required_keys=(
            DDNS_TSIG_KEY
            KEA_CTRL_TOKEN
            LANCACHE_IMAGE_TAG
            NATS_DNS_READER_PASSWORD
            NATS_DNS_READER_USER
            NATS_DNS_WRITER_PASSWORD
            NATS_DNS_WRITER_USER
            NATS_UI_PASSWORD
            NATS_UI_USER
            PDNS_API_KEY
            SECONDARY_REGISTRATION_TOKEN
          )
          for key in "${setup_required_keys[@]}"; do
            grep -F "$key" setup.sh >/dev/null \
              || { echo "::error::setup.sh must generate or migrate required runtime key ${key}."; exit 1; }
          done

          if awk '
            /^  release:/ { in_release=1; next }
            in_release && /^  [[:alnum:]_-]+:/ { in_release=0 }
            in_release && /build-tools:latest/ { print FILENAME ":" FNR ":" $0; found=1 }
            END { exit found ? 0 : 1 }
          ' .github/workflows/build-push.yml; then
            echo "::error::Release jobs with write permissions must use the tag-scoped build-tools image, not mutable latest."
            exit 1
          fi

          if awk '
            /if \[ "\$status" = "200" \]/ { in_patch=1 }
            /elif \[ "\$status" = "404" \]/ { in_patch=0 }
            in_patch && /(draft[[:space:]]*:[[:space:]]*false|prerelease[[:space:]]*:[[:space:]]*false)/ { print FILENAME ":" FNR ":" $0; found=1 }
            END { exit found ? 0 : 1 }
          ' .github/workflows/build-push.yml; then
            echo "::error::Existing release PATCH must preserve draft/prerelease state."
            exit 1
          fi

          if awk '
            /This script must be run as root/ { after_root=1 }
            after_root && /assert_prebuilt_image_platform_supported/ { guard_seen=1 }
            after_root && !guard_seen && /(install_docker|systemctl enable --now docker)/ { print FILENAME ":" FNR ":" $0; found=1 }
            END { exit found ? 0 : 1 }
          ' setup.sh; then
            echo "::error::Prebuilt platform guard must run before Docker install or daemon startup."
            exit 1
          fi

          if awk '
            /^cmd_update\(\) \{/ { in_update=1; pause_seen=0; next }
            /^# .*debug subcommand/ { in_update=0 }
            in_update && /pause_lancache_convergence_for_update/ { pause_seen=1 }
            in_update && !pause_seen && /(cmd_backup|git -C|cp "\$install_dir\/deploy\/quickstart\/docker-compose\.yml"|migrate_env_for_update|validate_compose_config|docker compose pull|docker compose up)/ { print FILENAME ":" FNR ":" $0; found=1 }
            END { exit found ? 0 : 1 }
          ' setup.sh; then
            echo "::error::setup.sh update must pause the convergence timer before mutating local install state."
            exit 1
          fi
          grep -F 'systemctl stop lancache-converge.service' setup.sh >/dev/null \
            || { echo "::error::setup.sh update must stop any active convergence service before mutating local install state."; exit 1; }
          if ! awk '
            /if ! \( cmd_backup --config "\$install_dir" \); then/ { in_backup_failure=1; next }
            in_backup_failure && /resume_lancache_convergence_after_update true/ { resume_seen=1 }
            in_backup_failure && /die "Pre-update rollback backup failed/ { die_seen=1; in_backup_failure=0 }
            END { exit resume_seen && die_seen ? 0 : 1 }
          ' setup.sh; then
            echo "::error::setup.sh update must restore the convergence timer when the rollback backup fails before update mutations."
            exit 1
          fi
          if awk '
            /^cmd_update_ip\(\) \{/ { in_update_ip=1; guard_seen=0; next }
            /^# .*backup subcommand/ { in_update_ip=0 }
            in_update_ip && /assert_prebuilt_image_platform_supported/ { guard_seen=1 }
            in_update_ip && !guard_seen && /(sed -i|docker compose -f)/ { print FILENAME ":" FNR ":" $0; found=1 }
            END { exit found ? 0 : 1 }
          ' setup.sh; then
            echo "::error::setup.sh update-ip must check prebuilt platform support before mutating local configuration."
            exit 1
          fi
          if awk '
            /^  shellcheck:/ { in_shellcheck=1; next }
            /^  [[:alnum:]_-]+:/ { in_shellcheck=0 }
            in_shellcheck && /^[[:space:]]+container:/ { print FILENAME ":" FNR ":" $0; found=1 }
            END { exit found ? 0 : 1 }
          ' .github/workflows/build-push.yml; then
            echo "::error::shellcheck job must not checkout inside a root-running job container."
            exit 1
          fi
          grep -F -- "--user \"\$(id -u):\$(id -g)\"" .github/workflows/build-push.yml >/dev/null \
            || { echo "::error::shellcheck container must run with the runner UID/GID."; exit 1; }
          grep -F -- "-v \"\$PWD:/work:ro\"" .github/workflows/build-push.yml >/dev/null \
            || { echo "::error::shellcheck container must mount the workspace read-only."; exit 1; }

          if awk '
            /^# .*Installing systemd watchdog/ { in_install=1; pull_seen=0 }
            /^# .*Post-start info/ { in_install=0 }
            in_install && /docker compose pull/ { pull_seen=1 }
            in_install && /^[[:space:]]*(systemctl[[:space:]]+(enable|start)[[:space:]]+(lancache\.service|lancache-converge\.timer)|docker[[:space:]]+compose[[:space:]]+up[[:space:]]+-d)/ && !pull_seen { print FILENAME ":" FNR ":" $0; found=1 }
            END { exit found ? 0 : 1 }
          ' setup.sh; then
            echo "::error::setup.sh must not start or enable lancache services before image pull succeeds."
            exit 1
          fi

          grep -F "append_env_key_if_missing LANCACHE_IMAGE_TAG \"\$(resolve_lancache_image_tag \"\$env_file\")\" \"\$env_file\"" setup.sh >/dev/null \
            || { echo "::error::Update migration must derive LANCACHE_IMAGE_TAG with resolve_lancache_image_tag."; exit 1; }
          grep -F 'pub image_tag: String' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must expose image_tag."; exit 1; }
          grep -F 'image_tag: state.config.lancache_image_tag.clone()' services/ui/src/routes/secondaries.rs >/dev/null \
            || { echo "::error::Secondary registration response must use the primary LANCACHE_IMAGE_TAG."; exit 1; }
          grep -F "response_image_tag=\$(echo \"\$response\"" setup.sh >/dev/null \
            || { echo "::error::setup.sh secondary must parse the primary image_tag."; exit 1; }
          grep -F "LANCACHE_IMAGE_TAG=\${LANCACHE_IMAGE_TAG:-latest}" deploy/quickstart/docker-compose.yml >/dev/null \
            || { echo "::error::Quickstart UI must receive LANCACHE_IMAGE_TAG."; exit 1; }
          grep -F "LANCACHE_IMAGE_TAG=\${LANCACHE_IMAGE_TAG:-latest}" deploy/prod/docker-compose.yml >/dev/null \
            || { echo "::error::Prod UI must receive LANCACHE_IMAGE_TAG."; exit 1; }
          VALIDATE_COMPOSE

      - name: Remove fallback compose validation image
        if: always()
        run: |
          set -euo pipefail

          case "${BUILD_TOOLS_IMAGE:-}" in
            lancache-ng-build-tools-validation:*)
              docker rmi "$BUILD_TOOLS_IMAGE"
              ;;
          esac

  dns_rust_quality:
    name: rust-quality (dns/nats-subscriber)
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/dns-nats-subscriber'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/dns-nats-subscriber'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.actor != 'dependabot[bot]' &&
            (
              github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository
            )
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
      - name: cargo fmt --check (dns/nats-subscriber)
        run: cargo fmt --manifest-path services/dns/nats-subscriber/Cargo.toml -- --check
      - name: cargo check with warnings denied (dns/nats-subscriber)
        uses: ./.github/actions/cargo-with-sccache-fallback
        env:
          RUSTFLAGS: "-D warnings"
        with:
          command: cargo check --locked --all-targets --manifest-path services/dns/nats-subscriber/Cargo.toml
      - name: cargo clippy with warnings denied (dns/nats-subscriber)
        timeout-minutes: 15
        env:
          RUSTC_WRAPPER: ""
        run: cargo clippy --locked --all-targets --manifest-path services/dns/nats-subscriber/Cargo.toml -- -D warnings

  ui_rust_quality:
    name: rust-quality (ui)
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/ui'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/ui'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.actor != 'dependabot[bot]' &&
            (
              github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository
            )
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
      - name: cargo fmt --check (ui)
        run: cargo fmt --manifest-path services/ui/Cargo.toml -- --check
      - name: cargo check with warnings denied (ui)
        uses: ./.github/actions/cargo-with-sccache-fallback
        env:
          RUSTFLAGS: "-D warnings"
        with:
          command: cargo check --locked --all-targets --manifest-path services/ui/Cargo.toml
      - name: cargo clippy with warnings denied (ui)
        timeout-minutes: 15
        env:
          RUSTC_WRAPPER: ""
        run: cargo clippy --locked --all-targets --manifest-path services/ui/Cargo.toml -- -D warnings

  dns_test:
    name: test (dns/nats-subscriber)
    needs: [validate-compose, dns_rust_quality]
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/dns-nats-subscriber'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/dns-nats-subscriber'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.actor != 'dependabot[bot]' &&
            (
              github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository
            )
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
      - name: test (dns/nats-subscriber)
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo test --locked --manifest-path services/dns/nats-subscriber/Cargo.toml

  ui_test:
    name: test (ui)
    needs: [validate-compose, ui_rust_quality]
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/ui'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/ui'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.actor != 'dependabot[bot]' &&
            (
              github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository
            )
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
      - name: test (ui)
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo test --locked --manifest-path services/ui/Cargo.toml

  watchdog_test:
    name: test (watchdog)
    needs: validate-compose
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: test (watchdog)
        run: |
          bash -n services/watchdog/watchdog.sh
          test -x services/watchdog/watchdog.sh

  dns_cargo_audit:
    name: cargo-audit (dns/nats-subscriber)
    needs: validate-compose
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/dns-nats-subscriber'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/dns-nats-subscriber'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.actor != 'dependabot[bot]' &&
            (
              github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository
            )
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: cache-cargo-audit
        with:
          path: |
            ${{ runner.temp }}/cargo-home/dns-nats-subscriber/bin/cargo-audit
            ${{ runner.temp }}/cargo-home/dns-nats-subscriber/.crates.toml
            ${{ runner.temp }}/cargo-home/dns-nats-subscriber/.crates2.json
          key: ${{ runner.os }}-cargo-audit-0.21-dns-nats-subscriber
      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo install cargo-audit --version ">=0.21" --locked
      - name: Audit Rust dependencies (dns/nats-subscriber)
        run: cargo audit --deny warnings --file services/dns/nats-subscriber/Cargo.lock

  ui_cargo_audit:
    name: cargo-audit (ui)
    needs: validate-compose
    runs-on: [self-hosted, linux, lancache]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Isolate Rust toolchain paths
        run: |
          {
            echo 'CARGO_HOME=${{ runner.temp }}/cargo-home/ui'
            echo 'RUSTUP_HOME=${{ runner.temp }}/rustup-home/ui'
          } >> "$GITHUB_ENV"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - name: Configure Redis-backed sccache
        if: >-
          ${{
            github.actor != 'dependabot[bot]' &&
            (
              github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository
            )
          }}
        uses: ./.github/actions/configure-rust-sccache
        with:
          mode: ${{ vars.SCCACHE_REDIS_MODE }}
          redis-url: ${{ secrets.SCCACHE_REDIS_URL }}
          key-prefix: lancache-ci-${{ github.job }}
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: cache-cargo-audit
        with:
          path: |
            ${{ runner.temp }}/cargo-home/ui/bin/cargo-audit
            ${{ runner.temp }}/cargo-home/ui/.crates.toml
            ${{ runner.temp }}/cargo-home/ui/.crates2.json
          key: ${{ runner.os }}-cargo-audit-0.21-ui
      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        uses: ./.github/actions/cargo-with-sccache-fallback
        with:
          command: cargo install cargo-audit --version ">=0.21" --locked
      - name: Audit Rust dependencies (ui)
        run: cargo audit --deny warnings --file services/ui/Cargo.lock

  container-scan:
    # Full image vulnerability scans are intentionally limited to trusted refs.
    # They build every service image and routinely dominate PR runtime on
    # self-hosted runners; PRs still exercise Dockerfiles in the build job below.
    if: github.event_name != 'pull_request'
    needs: validate-compose
    runs-on: [self-hosted, linux, lancache]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: proxy
            context: services/proxy
          - service: dns
            context: services/dns
            rust: true
          - service: watchdog
            context: services/watchdog
          - service: dhcp
            context: services/dhcp
          - service: dhcp-proxy
            context: services/dhcp-proxy
          - service: ui
            context: services/ui
            rust: true
          - service: build-tools
            context: tools/build-tools
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prepare sccache Redis secret file
        if: matrix.rust == true && github.actor != 'dependabot[bot]'
        id: sccache-secret
        env:
          SCCACHE_REDIS_MODE: ${{ vars.SCCACHE_REDIS_MODE }}
          SCCACHE_REDIS_URL: ${{ secrets.SCCACHE_REDIS_URL }}
        run: |
          set -euo pipefail

          mode="${SCCACHE_REDIS_MODE:-required}"

          case "$mode" in
            required|optional|off)
              ;;
            *)
              echo "::error::SCCACHE_REDIS_MODE must be one of: required, optional, off."
              exit 1
              ;;
          esac

          if [ "$mode" = "off" ]; then
            echo "Redis-backed sccache is disabled by SCCACHE_REDIS_MODE=off."
            exit 0
          fi

          if [ -z "$SCCACHE_REDIS_URL" ]; then
            if [ "$mode" = "optional" ]; then
              echo "Skipping Redis-backed sccache because SCCACHE_REDIS_URL is empty and SCCACHE_REDIS_MODE=optional."
              exit 0
            fi

            echo "::error::SCCACHE_REDIS_URL repository secret is required for trusted Rust image scans so sccache can use Redis."
            exit 1
          fi

          umask 077
          printf '%s' "$SCCACHE_REDIS_URL" > "${{ runner.temp }}/sccache-redis-url"
          echo "file=${{ runner.temp }}/sccache-redis-url" >> "$GITHUB_OUTPUT"

      - name: Build local scan image
        env:
          SCCACHE_SECRET_FILE: ${{ steps.sccache-secret.outputs.file }}
        run: |
          set -euo pipefail

          secret_args=()
          if [ -n "$SCCACHE_SECRET_FILE" ]; then
            secret_args+=(--secret "id=sccache_redis_url,src=$SCCACHE_SECRET_FILE")
          fi

          DOCKER_BUILDKIT=1 docker build \
            --pull \
            --platform linux/amd64 \
            "${secret_args[@]}" \
            -t lancache-ng-scan:${{ matrix.service }}-${{ github.run_id }} \
            ${{ matrix.context }}
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: lancache-ng-scan:${{ matrix.service }}-${{ github.run_id }}
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore.yaml
          exit-code: "1"
      - name: Remove scan image
        if: always()
        run: docker rmi lancache-ng-scan:${{ matrix.service }}-${{ github.run_id }} || true

  build:
    needs:
      - shellcheck
      - validate-compose
      - dns_test
      - ui_test
      - watchdog_test
      - dns_cargo_audit
      - ui_cargo_audit
      - container-scan
    if: >-
      ${{
        always() &&
        needs.shellcheck.result == 'success' &&
        needs['validate-compose'].result == 'success' &&
        needs.dns_test.result == 'success' &&
        needs.ui_test.result == 'success' &&
        needs.watchdog_test.result == 'success' &&
        needs.dns_cargo_audit.result == 'success' &&
        needs.ui_cargo_audit.result == 'success' &&
        (github.event_name == 'pull_request' || needs['container-scan'].result == 'success')
      }}
    runs-on: [self-hosted, linux, lancache]
    timeout-minutes: 150
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: proxy
            context: services/proxy
          - service: dns
            context: services/dns
            rust: true
          - service: watchdog
            context: services/watchdog
          - service: dhcp
            context: services/dhcp
          - service: dhcp-proxy
            context: services/dhcp-proxy
          - service: ui
            context: services/ui
            rust: true
          - service: build-tools
            context: tools/build-tools

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Prepare local Buildx cache
        id: buildx-cache
        env:
          BUILDX_CACHE_ROOT: /var/tmp/lancache-ng-buildx-cache
          BUILDX_CACHE_READ: ${{ runner.temp }}/lancache-ng-buildx-cache/${{ matrix.service }}-read
          BUILDX_CACHE_DEST: ${{ runner.temp }}/lancache-ng-buildx-cache/${{ matrix.service }}-new
        run: |
          set -euo pipefail

          if ! command -v flock >/dev/null 2>&1; then
            echo "::error::flock is required for safe local Buildx cache locking."
            exit 1
          fi

          cache_dir="$BUILDX_CACHE_ROOT/${{ matrix.service }}"
          lock_file="$BUILDX_CACHE_ROOT/${{ matrix.service }}.lock"

          mkdir -p "$BUILDX_CACHE_ROOT"
          rm -rf "$BUILDX_CACHE_READ" "$BUILDX_CACHE_DEST"
          mkdir -p "$BUILDX_CACHE_READ" "$(dirname "$BUILDX_CACHE_DEST")"

          (
            flock -x 9
            mkdir -p "$cache_dir"
            cp -a "$cache_dir/." "$BUILDX_CACHE_READ/"
          ) 9>"$lock_file"

          {
            echo "cache-from=$BUILDX_CACHE_READ"
            echo "cache-to=$BUILDX_CACHE_DEST"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare sccache Redis secret file
        if: >-
          ${{
            matrix.rust == true &&
            github.actor != 'dependabot[bot]' &&
            (
              github.event_name != 'pull_request' ||
              github.event.pull_request.head.repo.full_name == github.repository
            )
          }}
        id: sccache-secret
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPOSITORY: ${{ github.repository }}
          SCCACHE_REDIS_MODE: ${{ vars.SCCACHE_REDIS_MODE }}
          SCCACHE_REDIS_URL: ${{ secrets.SCCACHE_REDIS_URL }}
        run: |
          set -euo pipefail

          mode="${SCCACHE_REDIS_MODE:-required}"

          case "$mode" in
            required|optional|off)
              ;;
            *)
              echo "::error::SCCACHE_REDIS_MODE must be one of: required, optional, off."
              exit 1
              ;;
          esac

          if [ "$mode" = "off" ]; then
            echo "Redis-backed sccache is disabled by SCCACHE_REDIS_MODE=off."
            exit 0
          fi

          if [ "$EVENT_NAME" = "pull_request" ] && [ "$HEAD_REPOSITORY" != "$BASE_REPOSITORY" ]; then
            echo "Skipping Redis-backed sccache for an untrusted fork pull request."
            exit 0
          fi

          if [ -z "$SCCACHE_REDIS_URL" ]; then
            if [ "$mode" = "optional" ]; then
              echo "Skipping Redis-backed sccache because SCCACHE_REDIS_URL is empty and SCCACHE_REDIS_MODE=optional."
              exit 0
            fi

            echo "::error::SCCACHE_REDIS_URL repository secret is required for trusted Rust image builds so sccache can use Redis."
            exit 1
          fi

          umask 077
          printf '%s' "$SCCACHE_REDIS_URL" > "${{ runner.temp }}/sccache-redis-url"
          echo "secret-files=sccache_redis_url=${{ runner.temp }}/sccache-redis-url" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        timeout-minutes: 60
        continue-on-error: true
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ matrix.context }}
          secret-files: ${{ steps.sccache-secret.outputs.secret-files }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: false
          cache-from: type=local,src=${{ steps.buildx-cache.outputs.cache-from }}
          cache-to: type=local,dest=${{ steps.buildx-cache.outputs.cache-to }},mode=max

      - name: Retry Build and push
        id: retry-build
        if: steps.build.outcome == 'failure'
        timeout-minutes: 60
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ matrix.context }}
          secret-files: ${{ steps.sccache-secret.outputs.secret-files }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: false
          cache-from: type=local,src=${{ steps.buildx-cache.outputs.cache-from }}
          cache-to: type=local,dest=${{ steps.buildx-cache.outputs.cache-to }},mode=max

      - name: Rotate local Buildx cache
        if: >-
          ${{
            always() &&
            (
              steps.build.outcome == 'success' ||
              steps.retry-build.outcome == 'success'
            )
          }}
        env:
          BUILDX_CACHE_ROOT: /var/tmp/lancache-ng-buildx-cache
          BUILDX_CACHE_DEST: ${{ steps.buildx-cache.outputs.cache-to }}
        run: |
          set -euo pipefail

          if [ ! -d "$BUILDX_CACHE_DEST" ]; then
            exit 0
          fi

          cache_dir="$BUILDX_CACHE_ROOT/${{ matrix.service }}"
          lock_file="$BUILDX_CACHE_ROOT/${{ matrix.service }}.lock"

          mkdir -p "$BUILDX_CACHE_ROOT"
          (
            flock -x 9
            rm -rf "$BUILDX_CACHE_ROOT/${{ matrix.service }}"
            mv "$BUILDX_CACHE_DEST" "$cache_dir"
          ) 9>"$lock_file"

      - name: Log in to GHCR for provenance attestation
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest image build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          subject-digest: ${{ steps.retry-build.outputs.digest || steps.build.outputs.digest }}
          push-to-registry: true

  release:
    name: publish release source
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, linux, lancache]
    container:
      image: ghcr.io/${{ github.repository }}/build-tools:${{ github.ref_name }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      packages: read
    steps:
      - name: Create or update GitHub release for built images
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          short_sha="${COMMIT_SHA::7}"
          image_notes_start='<!-- lancache-ng-image-tags:start -->'
          image_notes_end='<!-- lancache-ng-image-tags:end -->'
          notes_file="$(mktemp)"
          {
            printf '%s\n' "$image_notes_start"
            printf 'This release source is the exact commit used by CI to build and publish the service images for %s.\n\n' "$TAG_NAME"
            printf 'Commit: %s\n\n' "$COMMIT_SHA"
            printf 'Published image tags:\n\n'
            printf -- '- ghcr.io/%s/proxy:%s\n' "$REPOSITORY" "$TAG_NAME"
            printf -- '- ghcr.io/%s/dns:%s\n' "$REPOSITORY" "$TAG_NAME"
            printf -- '- ghcr.io/%s/watchdog:%s\n' "$REPOSITORY" "$TAG_NAME"
            printf -- '- ghcr.io/%s/dhcp:%s\n' "$REPOSITORY" "$TAG_NAME"
            printf -- '- ghcr.io/%s/dhcp-proxy:%s\n' "$REPOSITORY" "$TAG_NAME"
            printf -- '- ghcr.io/%s/ui:%s\n' "$REPOSITORY" "$TAG_NAME"
            printf -- '- ghcr.io/%s/build-tools:%s\n\n' "$REPOSITORY" "$TAG_NAME"
            printf 'Matching SHA image tags:\n\n'
            printf -- '- ghcr.io/%s/proxy:sha-%s\n' "$REPOSITORY" "$short_sha"
            printf -- '- ghcr.io/%s/dns:sha-%s\n' "$REPOSITORY" "$short_sha"
            printf -- '- ghcr.io/%s/watchdog:sha-%s\n' "$REPOSITORY" "$short_sha"
            printf -- '- ghcr.io/%s/dhcp:sha-%s\n' "$REPOSITORY" "$short_sha"
            printf -- '- ghcr.io/%s/dhcp-proxy:sha-%s\n' "$REPOSITORY" "$short_sha"
            printf -- '- ghcr.io/%s/ui:sha-%s\n' "$REPOSITORY" "$short_sha"
            printf -- '- ghcr.io/%s/build-tools:sha-%s\n' "$REPOSITORY" "$short_sha"
            printf '%s\n' "$image_notes_end"
          } > "$notes_file"

          api_url="https://api.github.com/repos/${REPOSITORY}"
          auth_header="Authorization: Bearer ${GITHUB_TOKEN}"
          accept_header="Accept: application/vnd.github+json"
          version_header="X-GitHub-Api-Version: 2022-11-28"

          response_file="$(mktemp)"
          status="$(curl -sS -o "$response_file" -w '%{http_code}' \
            -H "$auth_header" \
            -H "$accept_header" \
            -H "$version_header" \
            "$api_url/releases/tags/$TAG_NAME")"

          if [ "$status" = "200" ]; then
            release_id="$(jq -r '.id' "$response_file")"
            existing_body="$(jq -r '.body // ""' "$response_file")"
            updated_body="$(jq -nr \
              --arg body "$existing_body" \
              --arg notes "$(cat "$notes_file")" \
              --arg start "$image_notes_start" \
              --arg end "$image_notes_end" \
              '
              if ($body | contains($start)) and ($body | contains($end)) then
                ($body | split($start)[0]) as $prefix
                | ($body | split($end)[1:] | join($end)) as $suffix
                | $prefix + $notes + $suffix
              elif ($body | length) > 0 then
                $body + "\n\n" + $notes
              else
                $notes
              end
              ')"
            jq -n \
              --arg body "$updated_body" \
              '{body:$body}' \
              > "$response_file.patch"
            curl -fsS -X PATCH \
              -H "$auth_header" \
              -H "$accept_header" \
              -H "$version_header" \
              -d @"$response_file.patch" \
              "$api_url/releases/$release_id" >/dev/null
          elif [ "$status" = "404" ]; then
            jq -n \
              --arg tag_name "$TAG_NAME" \
              --arg target_commitish "$COMMIT_SHA" \
              --arg name "$TAG_NAME" \
              --arg body "$(cat "$notes_file")" \
              '{tag_name:$tag_name, target_commitish:$target_commitish, name:$name, body:$body, draft:false, prerelease:false}' \
              > "$response_file.create"
            curl -fsS -X POST \
              -H "$auth_header" \
              -H "$accept_header" \
              -H "$version_header" \
              -d @"$response_file.create" \
              "$api_url/releases" >/dev/null
          else
            cat "$response_file"
            echo "Failed to inspect GitHub release for $TAG_NAME; HTTP status $status" >&2
            exit 1
          fi
