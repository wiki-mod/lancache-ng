# lancache-ng (https://github.com/wiki-mod/lancache-ng)
# CodeQL configuration for security and quality scanning of GitHub Actions, Rust source, and web UI
name: lancache-ng-codeql

queries:
  - uses: security-extended
  - uses: security-and-quality

paths:
  - .github/actions
  - .github/workflows
  - services/dns/nats-subscriber/src
  - services/ui/src

paths-ignore:
  - "**/target/**"
