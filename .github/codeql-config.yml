# lancache-ng (https://github.com/wiki-mod/lancache-ng)
# CodeQL configuration for security and quality scanning (root-level legacy config)
name: lancache-ng-codeql

queries:
  - uses: security-extended
  - uses: security-and-quality

paths:
  - services/dns/nats-subscriber
  - services/ui

paths-ignore:
  - '**/target/**'
