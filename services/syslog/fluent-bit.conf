# lancache-ng (https://github.com/wiki-mod/lancache-ng)
# Fluent Bit log aggregator — tails nginx access logs and writes to persistent storage

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     warn
    storage.path  /data/flb-storage

[INPUT]
    Name          tail
    Path          /var/log/nginx/access.log
    Tag           nginx.proxy
    DB            /data/flb-proxy.db
    Skip_Long_Lines On

[OUTPUT]
    Name          file
    Match         nginx.proxy
    Path          /var/log/lancache
    File          nginx-proxy.log
    Format        plain
