# lancache-ng (https://github.com/wiki-mod/lancache-ng)
#
# NATS server config written and reloaded by the UI for the v0.1.0 shared-token
# model. On each start, the NATS container regenerates the shared file from its
# environment and hands ownership to the UI user (UID/GID 10001). The UI can
# then rewrite the same shared config and reload authorization by restarting
# NATS through the narrowed Docker API. Docker exec is intentionally not
# required.

jetstream {
  store_dir: /data
}

authorization {
  users = [
    {
      user: "__NATS_UI_USER__"
      password: "__NATS_UI_PASSWORD__"
      permissions = {
        publish = ["lancache.dns.record", "lancache.dns.flush"]
      }
    }
    {
      user: "__NATS_DNS_WRITER_USER__"
      password: "__NATS_DNS_WRITER_PASSWORD__"
      permissions = {
        publish = [
          "lancache.dns.record",
          "$JS.API.STREAM.INFO.LANCACHE_DNS",
          "$JS.API.STREAM.CREATE.LANCACHE_DNS",
          "$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
          "$JS.ACK.LANCACHE_DNS.>"
        ]
        subscribe = ["lancache.dns.>", "_INBOX.>"]
      }
    }
    {
      user: "__NATS_DNS_READER_USER__"
      password: "__NATS_DNS_READER_PASSWORD__"
      permissions = {
        publish = [
          "$JS.API.STREAM.INFO.LANCACHE_DNS",
          "$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
          "$JS.ACK.LANCACHE_DNS.>"
        ]
        subscribe = ["lancache.dns.>", "_INBOX.>"]
      }
    }
  ]
}
