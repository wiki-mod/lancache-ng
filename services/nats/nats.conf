# lancache-ng (https://github.com/wiki-mod/lancache-ng)
#
# Reference copy only -- shows the effective, merged runtime config; the real
# files are split across two writers (issue #811). The nats service's own
# bootstrap script (deploy/*/docker-compose.yml) generates everything here
# EXCEPT the `auth_callout {}` block into /etc/nats/nats.conf on every start,
# and adds an `include "auth_callout.conf"` inside the authorization block. The
# Admin UI (services/ui/src/routes/secondaries.rs::update_nats_conf) is the SOLE
# writer of that separate /etc/nats/auth_callout.conf fragment -- it can't be in
# the bootstrap output because only the UI knows the auth-callout issuer key --
# and restarts the nats container to apply it (a full restart is required;
# nats-server refuses to hot-reload auth_callout). Splitting the two is what
# lets the entrypoint idempotently regenerate its own file on every restart
# without clobbering the UI's fragment. Docker exec is intentionally not
# required for either step.
#
# After that one startup write, this file is static (issue #583): the UI/
# DNS-writer/DNS-replica/callout-bypass roles below are the only four static
# identities, and none of them change when a secondary registers, rotates,
# or is removed -- those only ever touch the UI's `secondaries` SQLite table,
# because the `auth_callout {}` responder
# (services/ui/src/nats_auth_callout.rs) re-checks that table live on every
# single connection attempt instead of relying on a pre-rendered user list.
# See nats_auth_callout.rs's module docs for the full mechanism, including
# why every callout-authenticated secondary lands in the same implicit
# default account ("$G") the four static users below are in, with no
# `accounts {}` block needed -- confirmed against a real nats-server 2.14.3.
#
# nats_dns_replica_user/password (renamed from the old nats_dns_reader_*
# pair) is specifically the primary's own co-located dns-ssl container --
# there is always exactly one of it, so a static credential never hits the
# #52 scaling problem that made a *shared* credential across an unbounded
# number of external secondaries unworkable. That external-secondary case is
# exactly what auth_callout below replaces.

jetstream {
  store_dir: /data
}

authorization {
  users = [
    {
      user: "__NATS_UI_USER__"
      password: "__NATS_UI_PASSWORD__"
      permissions = {
        publish = ["lancache.dns.record", "lancache.dns.flush"]
      }
    }
    {
      user: "__NATS_DNS_WRITER_USER__"
      password: "__NATS_DNS_WRITER_PASSWORD__"
      permissions = {
        publish = [
          "lancache.dns.record",
          # The zone-rollback listener (rollback_listener.rs, dns-standard's
          # own identity) publishes a post-rollback cache-flush on this
          # subject. Without it here, the publish was silently denied by
          # nats-server and the recursor never actually flushed the stale
          # rolled-back-away answer -- see that file's rollback_handler doc
          # comment.
          "lancache.dns.flush",
          "$JS.API.STREAM.INFO.LANCACHE_DNS",
          "$JS.API.STREAM.CREATE.LANCACHE_DNS",
          "$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
          "$JS.ACK.LANCACHE_DNS.>"
        ]
        subscribe = ["lancache.dns.>", "_INBOX.>"]
      }
    }
    {
      user: "__NATS_DNS_REPLICA_USER__"
      password: "__NATS_DNS_REPLICA_PASSWORD__"
      permissions = {
        publish = [
          # Same reasoning as the writer identity above -- dns-ssl's own
          # nats-subscriber runs the same rollback listener and needs to
          # publish the post-rollback cache-flush too.
          "lancache.dns.flush",
          # `rollback_listener.rs::publish_rollback_records` (called for
          # `zone == "lan."`) republishes restored records on this subject
          # under whichever identity is running the rollback listener --
          # `NATS_DNS_WRITER_USER` on dns-standard (already had this),
          # `NATS_DNS_REPLICA_USER` here on dns-ssl. Not reachable today
          # (`DNS_ROLLBACK_URL` always defaults to dns-standard:8083), but if
          # it were ever pointed at dns-ssl, the republish would be silently
          # denied and secondaries would not converge after a `lan.`
          # rollback. Deliberate tradeoff, accepted by the maintainer: this
          # widens what a compromised dns-ssl credential could do (it can
          # now forge/replicate DNS records via this subject, not just
          # signal a cache-flush) rather than adding a fail-closed guard in
          # the listener itself.
          "lancache.dns.record",
          "$JS.API.STREAM.INFO.LANCACHE_DNS",
          "$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
          "$JS.ACK.LANCACHE_DNS.>"
        ]
        subscribe = ["lancache.dns.>", "_INBOX.>"]
      }
    }
    {
      # This is the auth-callout responder's own connection identity (the
      # Admin UI process itself). It carries no subject permissions of its
      # own.
      user: "__NATS_CALLOUT_USER__"
      password: "__NATS_CALLOUT_PASSWORD__"
    }
  ]
  # At runtime this block lives in the separate, UI-written auth_callout.conf
  # fragment, pulled in here via `include "auth_callout.conf"` (issue #811). It
  # is shown inline in this reference copy only to document the merged result.
  auth_callout {
    # Public NKey of the Admin UI's per-installation issuer keypair
    # (generated on first run, persisted at NATS_ISSUER_SEED_PATH). Every
    # per-secondary user JWT the callout responder issues is signed by the
    # matching private seed, which never leaves that file.
    issuer: "__NATS_ISSUER_PUBLIC_KEY__"
    # Every static user above must be listed here, not just the callout
    # responder itself -- nats-server only checks a connecting user's
    # password against the static `users` list above for names present in
    # this list; anyone else (including a username that happens to match a
    # static entry) is routed through the callout instead. Only external
    # secondaries, deliberately absent from both lists, are meant to go
    # through it. See nats_auth_callout.rs's module docs for how this was
    # confirmed against a real nats-server 2.14.3.
    auth_users: ["__NATS_UI_USER__", "__NATS_DNS_WRITER_USER__", "__NATS_DNS_REPLICA_USER__", "__NATS_CALLOUT_USER__"]
  }
}
