# NATS server config for lancache
# This file is written and reloaded by the UI when secondaries are added/removed.
# SIGHUP reloads authorization without restarting the server.

jetstream {
  store_dir: /data
}

authorization {
  # Local DNS containers use NATS_LOCAL_TOKEN
  # Secondary tokens are appended below by the UI
  users: [
    { token: "$NATS_LOCAL_TOKEN" }
  ]
}
