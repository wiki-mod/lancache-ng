# lancache-ng (https://github.com/wiki-mod/lancache-ng)
#
# NATS server config written and reloaded by the UI when secondaries are
# added/removed. The NATS startup command rewrites the shared copy and hands
# ownership back to the UI user (UID/GID 10001) so Admin UI writes remain
# possible after NATS restarts. The UI reloads authorization by restarting the
# NATS service through the narrowed Docker API; Docker exec is intentionally
# not required.

jetstream {
  store_dir: /data
}

authorization {
  users = [
    {
      user: "__NATS_UI_USER__"
      password: "__NATS_UI_PASSWORD__"
      permissions = {
        publish = ["lancache.dns.record", "lancache.dns.flush"]
      }
    }
    {
      user: "__NATS_DNS_WRITER_USER__"
      password: "__NATS_DNS_WRITER_PASSWORD__"
      permissions = {
        publish = [
          "lancache.dns.record",
          "$JS.API.STREAM.INFO.LANCACHE_DNS",
          "$JS.API.STREAM.CREATE.LANCACHE_DNS",
          "$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
          "$JS.ACK.LANCACHE_DNS.>"
        ]
        subscribe = ["lancache.dns.>", "_INBOX.>"]
      }
    }
    {
      user: "__NATS_DNS_READER_USER__"
      password: "__NATS_DNS_READER_PASSWORD__"
      permissions = {
        publish = [
          "$JS.API.STREAM.INFO.LANCACHE_DNS",
          "$JS.API.CONSUMER.INFO.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.CREATE.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.DURABLE.CREATE.LANCACHE_DNS.>",
          "$JS.API.CONSUMER.MSG.NEXT.LANCACHE_DNS.>",
          "$JS.ACK.LANCACHE_DNS.>"
        ]
        subscribe = ["lancache.dns.>", "_INBOX.>"]
      }
    }
  ]
}
