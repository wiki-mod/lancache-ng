# lancache-ng (https://github.com/wiki-mod/lancache-ng)
# nginx HTTP caching server (port 80) — DNS-spoofed clients cache downloads here

# HTTP caching server (port 80)
# DNS-spoofed clients connect here thinking they're talking to the CDN.
# We read the Host header and proxy to the real origin over HTTPS.

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    # Allow large request bodies (game patches can be uploaded, though rare)
    client_max_body_size 0;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location = /nginx_status {
        stub_status;
        access_log off;
        allow 172.16.0.0/12;
        deny  all;
    }

    location / {
        if ($lancache_client_allowed = 0) {
            return 403;
        }

        if ($cdn_host_allowed = 0) {
            return 403;
        }

        proxy_pass https://$host$request_uri;
        include    /etc/nginx/proxy-params.conf;
    }
}
