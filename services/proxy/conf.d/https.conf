# HTTPS caching server (ssl mode, port 443)
# Only loaded when SSL_ENABLED=1 (entrypoint removes this file otherwise).
# Listens on 0.0.0.0:443 — Docker routes IP_SSL:443→container:443 so only
# SSL-mode clients reach this block. IP_STANDARD:443→container:8443 (stream).

server {
    listen      443 ssl default_server;
    listen      [::]:443 ssl default_server;
    server_name _;

    # Dynamic cert selection based on SNI — see ssl-map.conf (generated at startup)
    ssl_certificate     /etc/nginx/ssl/certs/$ssl_cert_name.crt;
    ssl_certificate_key /etc/nginx/ssl/certs/$ssl_cert_name.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 0;

    location / {
        proxy_pass https://$host$request_uri;
        include    /etc/nginx/proxy-params.conf;
    }
}
