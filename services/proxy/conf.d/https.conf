# HTTPS caching server (port 443)
# DNS-spoofed clients connect here thinking they're talking to the CDN.
# nginx presents a per-hostname cert signed by our CA (clients must trust our CA once).
# After TLS termination, we proxy to the real origin and cache the response.

server {
    listen      443 ssl default_server;
    listen      [::]:443 ssl default_server;
    server_name _;

    # Dynamic cert selection based on SNI — see ssl-map.conf (generated at startup)
    ssl_certificate     /etc/nginx/ssl/certs/$ssl_cert_name.crt;
    ssl_certificate_key /etc/nginx/ssl/certs/$ssl_cert_name.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 0;

    location / {
        proxy_pass https://$host$request_uri;
        include    /etc/nginx/proxy-params.conf;
    }
}
