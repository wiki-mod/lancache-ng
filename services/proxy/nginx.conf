user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;

thread_pool default threads=32 max_queue=65536;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -------------------------------------------------------
    # Logging
    # -------------------------------------------------------
    log_format cache '$remote_addr - [$time_local] "$request" '
                     '$status $body_bytes_sent '
                     '"$upstream_cache_status" "$host"';

    access_log /var/log/nginx/access.log cache;
    error_log  /var/log/nginx/error.log warn;

    # -------------------------------------------------------
    # Performance
    # -------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    aio                threads=default;
    directio           4m;

    # -------------------------------------------------------
    # Proxy cache — shared by all modes (HTTP, HTTPS SSL)
    # -------------------------------------------------------
    proxy_cache_path /var/cache/nginx/lancache
        levels=1:2
        keys_zone=lancache:${CACHE_MEM_MB}m
        max_size=${CACHE_MAX_SIZE}
        inactive=${CACHE_INACTIVE}
        use_temp_path=off;

    # -------------------------------------------------------
    # DNS resolver (real upstream DNS, NOT our LAN cache DNS)
    # -------------------------------------------------------
    resolver 8.8.8.8 8.8.4.4 [2001:4860:4860::8888] [2001:4860:4860::8844]
             valid=300s ipv6=on;
    resolver_timeout 5s;

    # -------------------------------------------------------
    # conf.d is loaded alphabetically; 00-ssl-map.conf (generated
    # by entrypoint) must sort first so the map variable is defined
    # before the server blocks that reference $ssl_cert_name.
    # -------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}

# ─────────────────────────────────────────────────────────────────────────────
# SNI passthrough for standard mode on IP_STANDARD:443 (external)
# Maps to internal port 8443 via Docker port mapping
# ─────────────────────────────────────────────────────────────────────────────
stream {
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    log_format stream '$remote_addr [$time_local] $protocol '
                      '$status $bytes_sent $bytes_received '
                      '"$ssl_preread_server_name"';

    access_log /var/log/nginx/stream.log stream;

    server {
        listen 8443;
        listen [::]:8443;
        ssl_preread on;
        proxy_pass $ssl_preread_server_name:443;
        proxy_connect_timeout 30s;
        proxy_timeout        3600s;
    }
}
