# Shared proxy settings — included by both HTTP and HTTPS server blocks

slice                  ${CACHE_SLICE_SIZE};

proxy_cache            lancache;
proxy_cache_key        "$host$uri$slice_range";
proxy_set_header       Range $slice_range;
proxy_cache_lock       on;
proxy_cache_lock_timeout 2h;   # wait while another worker fetches a large file
proxy_cache_valid      200 206 301 302 ${CACHE_VALID_HIT};
proxy_cache_valid      any ${CACHE_VALID_ANY};
proxy_cache_use_stale  error timeout updating http_500 http_502 http_503 http_504;

# Ignore upstream cache-control headers so we actually cache game files
proxy_ignore_headers   Cache-Control Expires Vary Set-Cookie;
proxy_hide_header      Set-Cookie;
proxy_hide_header      Vary;

# Forward to origin over HTTPS regardless of how the client connected
proxy_ssl_server_name  on;
proxy_ssl_verify       off;
proxy_ssl_name         $host;

proxy_connect_timeout     30s;
proxy_send_timeout        3600s;
proxy_read_timeout        3600s;

proxy_max_temp_file_size  51200m;
proxy_temp_file_write_size 8m;

proxy_http_version     1.1;
proxy_set_header       Connection "";
proxy_set_header       Host $host;
proxy_set_header       X-Real-IP $remote_addr;

proxy_set_header       Accept-Encoding "";

add_header             X-Cache-Status $upstream_cache_status;
add_header             X-Served-By    lancache-standard;
