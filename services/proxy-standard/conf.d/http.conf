# HTTP caching (port 80) — identical to SSL proxy's HTTP block.
# HTTPS is handled by the stream block in nginx.conf (passthrough, not cached).

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    client_max_body_size 0;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location = /nginx_status {
        stub_status;
        access_log off;
        allow 172.16.0.0/12;
        deny  all;
    }

    location / {
        proxy_pass https://$host$request_uri;
        include    /etc/nginx/proxy-params.conf;
    }
}
