[package]
name = "lancache-ui"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "lancache-ui"
path = "src/main.rs"

[dependencies]
axum = { version = "0.7", features = ["form"] }
tokio = { version = "1", features = ["full"] }
tera = "1"
bollard = "0.16"
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
regex = "1"
base64 = "0.22"
