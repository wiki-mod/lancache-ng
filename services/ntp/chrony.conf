# lancache-ng (https://github.com/wiki-mod/lancache-ng)
#
# Base chrony configuration for the LanCache-NG-NTP service. The `pool`/
# `server` lines (from NTP_UPSTREAM_SERVERS) and the LAN-scoped `allow` lines
# (from NTP_ALLOWED_CLIENT_CIDRS) are appended by entrypoint.sh at container
# start, not written here -- both are operator-editable lists (via the Admin
# UI and/or env), so they cannot be fixed template content. See
# entrypoint.sh for that rendering and its own fail-closed checks.

driftfile /var/lib/chrony/chrony.drift

# Steps the clock immediately (rather than only slewing) if the very first
# few measurements show a large offset -- containers frequently start with a
# stale/host-inherited clock, and slewing alone can take a long time to
# converge from a large initial error.
makestep 1.0 3

# Deliberately NOT using chrony's `local stratum <n>` fallback directive:
# that would let this service keep answering client queries with a
# self-declared, undisciplined stratum during any period it cannot reach its
# configured upstream servers. Requirement 1 (see the issue this container
# was built for) is explicit that this must always be a relay/cache for
# externally-disciplined time, never an independent time source of its own,
# even as a fallback -- so if upstream sync is unavailable, chronyd should
# report "not synchronised" rather than quietly serving unverified time.
rtcsync

logdir /var/log/chrony
log tracking measurements statistics
