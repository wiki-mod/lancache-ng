{
  "Dhcp4": {
    "interfaces-config": {
      "interfaces": ["*"],
      "re-detect": false
    },
    "control-sockets": {
      "dhcp4": {
        "socket-type": "unix",
        "socket-name": "/var/run/kea/kea4.sock"
      }
    },
    "lease-database": {
      "type": "memfile",
      "persist": true,
      "name": "/var/lib/kea/kea-leases4.csv"
    },
    "subnet4": [
      {
        "subnet": "${DHCP_SUBNET}",
        "pools": [
          {
            "pool": "${DHCP_RANGE_START} - ${DHCP_RANGE_END}"
          }
        ],
        "option-data": [
          {
            "name": "routers",
            "data": "${DHCP_GATEWAY}"
          },
          {
            "name": "domain-name-servers",
            "data": "${DHCP_DNS_PRIMARY}, ${DHCP_DNS_SECONDARY}"
          },
          {
            "name": "domain-name",
            "data": "${DHCP_DOMAIN}"
          },
          {
            "name": "domain-search",
            "data": "${DHCP_DOMAIN}"
          },
          {
            "name": "ntp-servers",
            "data": "${DHCP_NTP_SERVERS}"
          }
        ],
        "default-lease-time": ${DHCP_LEASE_TIME},
        "max-lease-time": ${DHCP_MAX_LEASE_TIME}
      }
    ],
    "loggers": [
      {
        "name": "kea-dhcp4",
        "output-options": [
          {
            "output": "stdout"
          }
        ],
        "severity": "INFO",
        "debuglevel": 0
      }
    ]
  }
}
