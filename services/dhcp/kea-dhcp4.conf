{
  "Dhcp4": {
    "interfaces-config": {
      "interfaces": ["*"],
      "re-detect": false
    },
    "multi-threading": {
      "enable-multi-threading": false
    },
    "control-socket": {
      "socket-type": "unix",
      "socket-name": "/run/kea/kea4.sock"
    },
    "hooks-libraries": [
      {
        "library": "${KEA_LEASE_CMDS_HOOK_PATH}"
      }
    ],
    "dhcp-ddns": {
      "enable-updates": ${DHCP_DDNS_ENABLED},
      "server-ip": "127.0.0.1",
      "server-port": 53001,
      "sender-ip": "127.0.0.1",
      "max-queue-size": 1024,
      "ncr-protocol": "UDP",
      "ncr-format": "JSON"
    },
    "ddns-send-updates": true,
    "ddns-override-no-update": true,
    "ddns-override-client-update": true,
    "ddns-replace-client-name": "when-present",
    "ddns-generated-prefix": "dhcp",
    "ddns-qualifying-suffix": "${DHCP_DOMAIN}",
    "lease-database": {
      "type": "memfile",
      "persist": true,
      "name": "/var/lib/kea/kea-leases4.csv"
    },
    "subnet4": [
      {
        "id": 1,
        "subnet": "${DHCP_SUBNET}",
        "pools": [
          {
            "pool": "${DHCP_RANGE_START} - ${DHCP_RANGE_END}"
          }
        ],
        "option-data": [
          {
            "name": "routers",
            "data": "${DHCP_GATEWAY}"
          },
          {
            "name": "domain-name-servers",
            "data": "${DHCP_DNS_PRIMARY}, ${DHCP_DNS_SECONDARY}"
          },
          {
            "name": "domain-name",
            "data": "${DHCP_DOMAIN}"
          },
          {
            "name": "domain-search",
            "data": "${DHCP_DOMAIN}"
          }${DHCP_NTP_OPTION}
        ],
        "valid-lifetime": ${DHCP_LEASE_TIME},
        "max-valid-lifetime": ${DHCP_MAX_LEASE_TIME}
      }
    ],
    "loggers": [
      {
        "name": "kea-dhcp4",
        "output-options": [
          {
            "output": "stdout"
          },
          {
            "output": "/var/log/kea/kea-dhcp4.log"
          }
        ],
        "severity": "INFO",
        "debuglevel": 0
      },
      {
        "name": "kea-dhcp4.dhcp4",
        "output-options": [
          {
            "output": "stdout"
          },
          {
            "output": "/var/log/kea/kea-dhcp4.log"
          }
        ],
        "severity": "ERROR",
        "debuglevel": 0
      }
    ]
  }
}
