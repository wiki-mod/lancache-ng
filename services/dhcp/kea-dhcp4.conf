{
  "Dhcp4": {
    "interfaces-config": {
      "interfaces": ["*"],
      "re-detect": false
    },
    "multi-threading": {
      "enable-multi-threading": false
    },
    "control-socket": {
      "socket-type": "unix",
      "socket-name": "/run/kea/kea4.sock"
    },
    // lease_cmds provides lease4-del, used by two callers against this exact
    // Control Agent: the Admin UI's "release lease" button
    // (release_lease() in services/ui/src/routes/dhcp.rs, POST
    // /dhcp/lease/release) and scripts/dhcp-kea-ctrl-agent-mutation-simulation.sh's
    // cleanup step, which deletes an already-active lease before asserting a
    // removed reservation stops being honored. Without this hook loaded,
    // lease4-del is not a base Kea command -- the Control Agent rejects it
    // with result code 2 (CONTROL_RESULT_COMMAND_UNSUPPORTED), so both
    // callers would fail (Codex review, PR #694). libdhcp_lease_cmds.so
    // ships in the kea-common package, a hard dependency of kea-dhcp4-server
    // already installed by services/dhcp/Dockerfile -- no extra package
    // needed. Path is amd64-specific (the only arch this image currently
    // targets, see "Keine Themenvermischung" -- multi-arch is explicitly out
    // of scope here). Note: Kea strips // comments like this one from the
    // runtime file on the very first config-write (see kea_config_modify()
    // in dhcp.rs), so this rationale only survives in this template source,
    // not in /var/lib/kea/kea-dhcp4.conf after the first Admin UI mutation --
    // that is expected Kea behavior, not a bug.
    "hooks-libraries": [
      {
        "library": "/usr/lib/x86_64-linux-gnu/kea/hooks/libdhcp_lease_cmds.so"
      }
    ],
    "dhcp-ddns": {
      "enable-updates": true,
      "server-ip": "127.0.0.1",
      "server-port": 53001,
      "sender-ip": "127.0.0.1",
      "max-queue-size": 1024,
      "ncr-protocol": "UDP",
      "ncr-format": "JSON"
    },
    "ddns-send-updates": true,
    "ddns-override-no-update": true,
    "ddns-override-client-update": true,
    "ddns-replace-client-name": "when-present",
    "ddns-generated-prefix": "dhcp",
    "ddns-qualifying-suffix": "${DHCP_DOMAIN}",
    "lease-database": {
      "type": "memfile",
      "persist": true,
      "name": "/var/lib/kea/kea-leases4.csv"
    },
    "subnet4": [
      {
        "id": 1,
        "subnet": "${DHCP_SUBNET}",
        "pools": [
          {
            "pool": "${DHCP_RANGE_START} - ${DHCP_RANGE_END}"
          }
        ],
        "option-data": [
          {
            "name": "routers",
            "data": "${DHCP_GATEWAY}"
          },
          {
            "name": "domain-name-servers",
            "data": "${DHCP_DNS_PRIMARY}, ${DHCP_DNS_SECONDARY}"
          },
          {
            "name": "domain-name",
            "data": "${DHCP_DOMAIN}"
          },
          {
            "name": "domain-search",
            "data": "${DHCP_DOMAIN}"
          }${DHCP_NTP_OPTION}
        ],
        "valid-lifetime": ${DHCP_LEASE_TIME},
        "max-valid-lifetime": ${DHCP_MAX_LEASE_TIME}
      }
    ],
    "loggers": [
      {
        "name": "kea-dhcp4",
        "output-options": [
          {
            "output": "stdout"
          }
        ],
        "severity": "INFO",
        "debuglevel": 0
      },
      {
        "name": "kea-dhcp4.dhcp4",
        "output-options": [
          {
            "output": "stdout"
          }
        ],
        "severity": "ERROR",
        "debuglevel": 0
      }
    ]
  }
}
