{
  "Control-agent": {
    "http-host": "0.0.0.0",
    "http-port": 8000,
    "authentication": {
      "type": "basic",
      "realm": "kea-control",
      "clients": [
        {
          "user": "admin",
          "password": "${KEA_CTRL_TOKEN}"
        }
      ]
    },
    "control-sockets": {
      "dhcp4": {
        "socket-type": "unix",
        "socket-name": "/var/run/kea/kea4.sock"
      }
    },
    "loggers": [
      {
        "name": "kea-ctrl-agent",
        "output-options": [
          {
            "output": "stdout"
          }
        ],
        "severity": "INFO",
        "debuglevel": 0
      }
    ]
  }
}
