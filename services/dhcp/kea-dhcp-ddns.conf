{
  "DhcpDdns": {
    "ip-address": "127.0.0.1",
    "port": 53001,
    "control-socket": {
      "socket-type": "unix",
      "socket-name": "/run/kea/kea-ddns.sock"
    },
    "tsig-keys": [
      {
        "name": "lancache-ddns-key",
        "algorithm": "HMAC-SHA256",
        "secret": "${DDNS_TSIG_KEY}"
      }
    ],
    "forward-ddns": {
      "ddns-domains": [
        {
          "name": "${DHCP_DOMAIN}.",
          "key-name": "lancache-ddns-key",
          "dns-servers": [
            {
              "ip-address": "${DHCP_DNS_SERVER_IP}",
              "port": ${DHCP_DDNS_PORT}
            },
            {
              "ip-address": "${DHCP_DNS_SERVER_IP_SSL}",
              "port": ${DHCP_DDNS_PORT}
            }
          ]
        }
      ]
    },
    "reverse-ddns": {
      "ddns-domains": [
        {
          "name": "in-addr.arpa.",
          "key-name": "lancache-ddns-key",
          "dns-servers": [
            {
              "ip-address": "${DHCP_DNS_SERVER_IP}",
              "port": ${DHCP_DDNS_PORT}
            },
            {
              "ip-address": "${DHCP_DNS_SERVER_IP_SSL}",
              "port": ${DHCP_DDNS_PORT}
            }
          ]
        }
      ]
    },
    "loggers": [
      {
        "name": "kea-dhcp-ddns",
        "output-options": [
          {
            "output": "stdout"
          },
          {
            "output": "/var/log/kea/kea-dhcp-ddns.log"
          }
        ],
        "severity": "INFO",
        "debuglevel": 0
      }
    ]
  }
}
