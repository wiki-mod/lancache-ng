{
  "DhcpDdns": {
    "ip-address": "127.0.0.1",
    "port": 53001,
    "control-sockets": {
      "dhcp4": {
        "socket-type": "unix",
        "socket-name": "/var/run/kea/kea-ddns4.sock"
      }
    },
    "tsig-keys": [
      {
        "name": "lancache-ddns-key",
        "algorithm": "HMAC-SHA256",
        "secret": "${DDNS_TSIG_KEY}"
      }
    ],
    "forward-ddns": {
      "ddns-domains": [
        {
          "name": "${DHCP_DOMAIN}",
          "key-name": "lancache-ddns-key",
          "dns-servers": [
            {
              "ip-address": "${DHCP_DNS_SERVER_IP}",
              "port": 5300
            }
          ]
        }
      ]
    },
    "reverse-ddns": {
      "ddns-domains": [
        {
          "name": "in-addr.arpa",
          "key-name": "lancache-ddns-key",
          "dns-servers": [
            {
              "ip-address": "${DHCP_DNS_SERVER_IP}",
              "port": 5300
            }
          ]
        }
      ]
    },
    "loggers": [
      {
        "name": "kea-dhcp-ddns",
        "output-options": [
          {
            "output": "stdout"
          }
        ],
        "severity": "INFO",
        "debuglevel": 0
      }
    ]
  }
}
