# LanCache DNS — dnsmasq configuration

# Don't use /etc/resolv.conf or /etc/hosts for upstream
no-resolv
no-hosts

# Upstream DNS servers (real internet DNS)
server=8.8.8.8
server=8.8.4.4
server=2001:4860:4860::8888
server=2001:4860:4860::8844

# Listen on all interfaces (IPv4 + IPv6)
listen-address=0.0.0.0
listen-address=::

# CDN address records — generated by entrypoint from cdn-domains.txt
conf-file=/etc/dnsmasq.d/cdn-addresses.conf

# Internal DNS cache
cache-size=10000

# Log queries (verbosity controlled by DNSMASQ_LOG env var in entrypoint)
log-facility=-
